front:
  text: 圭齊文集卷之一宗孫銘鏞編集
  hash: sha256:48e34f2d44f8bad34e42dddde478459621e8516d1098b1e6e5deda05427e7975
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_001-1a}
body:
  text: 安成後學劉釪校正賦天馬賦翳房星之委精鍾天馬之權竒澡神質于渥窪砥徑氣于月氐貞非坤牝健本乾為上分扶輿之秀下孕蜿蟺之漦風雲資其格力雨露澤其光儀膺廣鳯臆鬛秀龍鬐首昻渴烏之勢影捷杜矢之馳于是陋騊駼之産邁麒麟之姿驂六飛于廣漠舞九奏于希夷若乃朝刷崑崙夕秣玄圃駕緱笙之子晋道霞觴于王母風冉冉兮斯征靈􅌭繽兮來寧覽熙世之德輝屬萬物之欣覩願陪禁衛自獻西土乃命移中戒造父釋雲幕于金鞍映孚尹于瓊户出則鏘和鸞驂輿組媚日馭之光華展天衢之步武然其氣質不可求之驪黃之餘其芻秣不可卑之皂櫪之伍峙玉山之殖未足供其齕委金㙜之資未足議其估是知天馬固難得而不易畜也所以罕見于盛時僅聞于前古時則有倣鄒枚請賡樂府而客或難之曰時方歌鹿鳴之章子乃為天馬之賦得無馳駕鼓車者寧不與此而逈殊也哉嗟夫寶不自貴以人而貴物不自異以人而異方神駒絢綵于水涯固期駑劣之同滯至其裂砮矢而庭實竟乃自齒于天駟信物美而無所遺兮亦竒才之䏻自致負鹽車而上太行者慨未遇夫伯樂伏皂櫪而志千里者又何慙乎老驥振長鬛而一嘶兮兾識余之所意壒埃風而上征兮願借翠雲以為鞁隨飛龍而上下兮羌先路其焉避彼豈乘虛而騰踏兮追雲逐電之可兾也庶幾求之玄黃之外兮則亦駿骨之可市也辟雍賦皇風清寧人文盛開京師崇天下之本國學萃天下之才粵若稽古爰自蒼姬始號辟雍昉厯代聲名之盛本大射行禮之宫其規創于文武其度講于周公節觀者于四面壅流水以環中若乃道閫邃嚴義闥軒朗澄源止而不泥文瀾溢而不蕩肉好適半如璧之象兹乃辟雍之初所以名狀也或在靈臺或在鎬京靈㙜者為文王所建鎬京者為武王所營兹乃辟雍之初非一地而同一名也或習射兮觀德或養老兮興孝匯九有之俊髦軌萬方之則效兹乃辟雍之初非一事而同一教也迹其建侯設鵠矩祫圓冠襄尺講事君之敬剡注視立已之端斯則辟雍之習射天下之盛觀鮐背鶴髮尊傅隆師祝噎以膳授几以咨斯則辟雍之養老天下之盛儀誾誾啾啾泮奐夷猶覽上國之光華踵賢關之雋遊斯則辟雍之養士天下之名流有客聞之曰子于成周之制講之詳矣于異代亦有所徴乎泝觀炎劉治盛中世臨雍再拜化及四裔要荒萬里就學遣質鼓篋圜橋以億萬計于斯時也辟雍亦可謂盛矣愚曰未然子徒慕先漢之遺風若未覩今日之文治我國家聲教之所暨也東踰若木之日津西探崦嵫之月竁南窮火維之陬北際氷天之澨文軓之治既同弦誦之風四被視寰海為一辟雍陶同宇為一庠序于是在天則應璧府圖書之祥在地則産孔廟金芝之瑞藏曲阜之特祠實飛龍之首歲乃擇成均之師申胄監之制三年而科詔頒文治蝟日星乎曠世之條風霆乎多士之氣將見自今以始彼漢之億萬尚敢與今日同年而語哉大抵惟聖人能盡君師之職惟吾道能並天地而存惟養賢為籲俊尊帝之大務惟建學為化民成俗之大原眷此辟雍屹乎本根固願為今日之賦者續古之頌被之和聲叶之永言前以光八百年之成周後以開萬億載之皇元義門賦并序宣文閣授經郎鄭君浚常以其家乘示余曰浦江鄭氏義門文録厯覽諸作蓋彬彬焉他日謁豫一言為作義門賦辭曰翳伯僑之裔孫兮紛振振其好修承世􅍇之蟬嫣兮寧隱耀而發幽偱義路以允蹈兮擇仁里而相攸被芳潔以為服兮襲溫良以為裘將孝弟以為車兮方敬讓以為舟厯九世而共㸑兮一乃心之休休曰五倫之于日用兮實有生之大猷父慈愛之恂恂兮子色養之油油若君臣朋友之際兮必忠信之與謀于睦姻其有惠兮在任恤其有賙閫儀雍雍以賔退兮家政凛凛其陽秋長者施其令則兮少者孝乎順柔圭赴弟以瘐死兮綺代親而自囚史何感乎緹縈兮詩何嘆乎原隰之裒嗟髙風之卓絶兮履艱貞乎何尤爰孜孜于稽古兮悉聖訓之是搜陳時祀之秩秩兮戴首辨之俅俅述五禮以為儀兮樂至和而不流以豫觀于往昔兮將公藝之可儔我歐公之史五季兮書旌表之法周門築壝以綽禊兮柱雙立而烏頭雪霜貿貿于當世兮松柏岑蔚乎故丘矧皇元巍巍乎有天下兮化丕冒于海陬敦懿行于四國兮播令聞其若郵聞孫起家而交辟兮列相第之前籌尋重席于官庠兮徹聲華于冕旒信積善之有報兮密邇寵光之綢繆也墨梅賦伊江梅之受命泊與淡其相遭灼天地之太素亂水雲兮齊髙方三冬之搖落索群木于秋毫恍回溪與轉嶺發孤映于蓬蒿枝苔封以瑩寒蕊玉切而華膏表萬有以獨聖誰與子兮同𫀆何佳人兮黯然阻煙霧于林皋豈皎潔之冒汙抑輝光之在韜𬒳翰墨之託寄亦何異乎風騷撫尺素而太息心臨逺而忉忉何以慰兮空谷瀉樽中之濁醪感外物之變化謹內志之持操物交物以不染我與我而焉勞世不辨兮奚尤巳或戾兮焉逃與昭質之自虧從見笑于繁桃于兹花其何有懼天下之滔滔奚附意于守墨以傳誨于兒曹頌至正二年壬午七月十八日丁亥皇帝御慈仁殿拂郎國進天馬二十一日庚寅自龍光殿敕周郎貌以為圖二十三日壬辰以圖進翰林學士承㫖巙巙傳㫖命傒斯為之贊臣惟漢武帝發兵二十萬僅得大宛馬數匹今不煩一兵而天馬至皆皇上文治之化所及臣雖駑劣敢不拜手稽首而獻頌曰天子仁聖萬國歸天馬來自西方西玄雲被身兩玉蹄髙踰五尺修倍之七渡海洋身若飛海若左右雷霆隨天子曉御慈仁殿西風忽來天馬見龍首鳯臆目飛電不用漢兵二十萬有德自歸四海羡天馬來時庶升乎天子仁夀萬國清臣願作詩萬國聽圭齊文集卷之一終
