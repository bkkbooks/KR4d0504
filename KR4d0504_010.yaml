body:
  text: 墓碑銘元故中奉大夫江南諸道行御史臺侍御史劉公墓碑銘至元元年冬十月江南行臺侍御史鐂公未引年拜疏致事歸長沙二年夏四月丁酉薨于私第是年冬十二月以治命葬湘西嶽麓山之原湖南憲使汝南梁公遺既志其藏諸孤奉行實來瀏以墓表屬于契家廬陵歐陽玄請文志諸石按公諱宗説字傳之世成都華陽人大父宋末嘗為茶陽軍使因家鄰境之攸輿幼侍祖父逺宦嶺外既孤適遭宋亡克自樹立從鄊先生趙公抃學于宜春年十二三能屬文有才諝踰弱冠以薦輔廣西憲史再辟湖南貢南臺察院史歲滿調衡州録事判官中書刑部辟職官史皆未赴臺除廣西憲司照磨選充南臺掾改湖東憲司照磨仍留掾南臺擢海北憲司經厯遷河南憲司經厯拜南臺監察御史轉河南江浙兩行省貟外郎江浙未赴改南臺都事入為中書右司都事拜內臺監察御史將進臺都事力辭出為山南浙西兩道肅政廉訪副使復𬒳選為臺都事俄出為淮東道肅政廉訪使升廣西道肅政廉訪使移江東道肅政廉訪使召拜刑部尚書尋歸休于家起為江南諸道行御史臺治書侍御史升侍御史積階中奉大夫公揚厯臺省諏咨四方出處偉節規橅古人𥘉掾桂臬訪故父旅殯行諸蒼梧即投檄辭歸以申情事孝節著聞見器諸老厥後宦業浸盛受知文皇主畫中臺上所親擢侍燕內廷鬚髮盡白或謂公老上曰傳之在南臺已然此正老成可用之日也公𬒳眷遇知無不言進退有度縉紬則之移疾告歸上弗能強廣右之命公去留之疾愈治行益用見信及以秋官召還文皇賔天遭時多艱大獄屢起語連宗親公公正不撓刑無濫施事㝎勇退論公生平忠孝大略于此概見所至蒞政詳明用法矜恕挺囚藤梧寇黃亰夫脅愚民為亂有司坐首從皆死公誅渠魁四人餘四十二人免家屬論徙遼陽肇州公謂驅炎墟之民居沍寒地名為減死實置死地請留嶺南屯田全者六百餘口讞獄閩浙言海寇𥘉皆王民身陷惡地無由自新宜許以貰罪復業後用其言盜皆為農河決大梁城門不開公按視得髙陵撤相國寺朝元宫水為橋百餘丈道民循城顛行薪米不絶比屋乃炊河決小黃村陳皓千里皆沒公督有司盡力犍閉河復故道流離日還淮東大飢勸分維揚一日得楮幣十五萬八千八百餘緡所賑以戶會三十一萬三百有畸以口計一百一十四萬一千八十故公政聲發軔海嶠振于河淮由平反恤災之功居多至于吏能則在中書右司兩月掾屬心服其竄正吏牘運筆如飛造次之間辭理俱暢在刑曹半年滯事悉決乃㝎遇革刑制七十六欵頒示天下無復質疑公處寮寀退然一儒未嘗少自衒襮獨善善惡惡無所避覬在河南時薦前憲使韓從益行省郎中納麟等二十七人為刑臺御史薦浙西憲使許思敬户部尚書康里回河南行省貟外郎胡彛等五十五人乞召還敢諫御史李謙亨成圭于竄所乞敘用故臺臣益陵真中丞苗侍御等八人于家劾前中書左丞黨附權臣暴斂為虐劾河南行省參政往括田江西橫斂府縣激變為廣右掌政能制僉憲不敢為苛為南臺幕賔力斥中丞繩下之酷為荆憲黜贓吏三百九十八員汴蒙古都萬户畜巨􅋙納豕肝肺芻人腹中習􅋙嘻人軍士忤已輒嗾殺之公正其罪江陵豪僧謀人獲園誣以殺三僧焚之置三豕心燼中為驗公辨其詐抵僧罪釋無辜二十一人湖廣辨章征徭恇怯公奏罷之古縣戍將據校宮毁宣聖像公㝎罰錮之海南其劾閩憲聲迹兩使者望風解印嘗不就江西行省辟掾時相為之慚色自居下僚比至要塗論事英發往往洞識治體至大中陳革弊防姦戢貪除暴等十事又言六品以下封妻不及父母非人子志後封贈倐罷又力請復之延祐中請置東宫弘文館選端人為宫教博士講六經以輔儲德又請除逃户糧置迤北沿河倉儲節臺中罰布之用以助賑濟榷古今錢幣之制以便小民至順中言盜駝馬牛羊罪當為等差百官名在罪籍不宜普該恩澤或至再敘侍文皇清燕密上封事其目曰明人倫序宗族命賢相慎殺戮義取仁守保全功臣貶酒闕色親忠逺佞儒臣進讀宜講帝王之道勿事浮靡罪人妻孥分賜臣下宜别宗親以存上下之分皆稱上旨凡所建明咸以著為令或遇布政輒在議中其惠利久逺若築堤海康闢田萬頃以徠海外耕民海北民鬻食鹽又輸鹽丁錢公奏弛其征文皇居潛瓊管以是知公疾革猶索紙筆作遺表欲有所陳未成而薨年六十有九曽祖鑑宋宣教郎祖景髙宋韶州通判贈嘉議大夫禮部尚書上輕車都尉追封彭城郡侯父重坤贈中奉大夫四川等處行中書省參知政事護軍追封彭城郡公娶毛氏繼娶王氏皆先公卒並追封彭城郡夫人再娶張氏三子長孝友承事郎嶽州路經厯公未寢疾奉命展省先塋聞訃得疾後公六十一日卒次孝敬登仕郎永州路知事辟湖廣省掾史次孝恭廣西道宣尉司照磨女五長適江西鄉貢進士張仁偉次適伯顔次適卜德生次適孟坤珍次適歐陽忠皆士族孫男四好禮好義好信苟兒孫女三觀音奴觀奴永安奴公博學強記淹貫經史以禮部公號雪界因號雪峰以志蜀土有奏議詩文若千卷傳于世早從涿郡盧公處道學詩擅名古體盧公憲湖南嘗語人曰鐂掾傳之天資髙邁他日綱維風憲必斯人也及公為臺端衆咸以為知人玄先君子內翰公于鐂公契友玄辱知尤深在胄監時嘗遣子孝恭受業館下誼不得辭乃敘而銘之辭曰溫溫劉公如玉不瑕臨事決義蹇蹇法家以儒發身以學施政措為治才著為辭令惓惓告君懇懇許國粵有風紀我扶我植自厥筮仕奮由承掾迄其懸車終始司憲入也獻替出也咨詢官之準人邦之藎臣文皇知公字而不名雖閔勞勩實仗老成上飲公醇公疾弗勝有殽有核賜以豆登丹頰白鬚拜起給扶尚竭心智載陳謀謨秋官豫環遷出綴衣有執國柄赫赫作威公職司平獨立無悚止辟不淫展也仁勇卜居長沙謝事建鄴輕舟來歸賦詠盈篋胡不百年為國蓍龜明禋召從疑事就咨蒲輪未臻榆沈斯作葬以公輴率履無怍子孫詵詵世𬒳德馨節惠有典視此貞銘元贈從仕郎吉安路吉水州判官周君潛心墓碑銘安成周君潛心卒之五十九年以子貴有恤典于朝將録其副以告墓次其孫絢奉其宗人南瑞所狀行來京師謁銘于豫維周氏姬姓厯秦涉漢𥘉至三國兩晉多名臣載史傳唐季有諱璟亦有聞當時其四世孫威避難遷金陵威子矩仕南唐至御史壻楊竦為吉州刺史矩至吉因家焉二子長翰次羡羡登宋建隆間第積官光祿大夫卒贈僕射又遷屬邑之西昌其族蕃衍科第相望部使者號其里曰爵譽羡子廷訓仕至供奉廷訓子昭為江陵令卒贈殿中丞有五子次子大理評事中師生虔化少府夀之夀之子倩遷安成之後林里又四世為潭州通判士貴士貴子人望人望子繼祖是為周君之父君諱晞顔𥘉字景顔後字潛心自童丱器如成人年十有六喪父內保家訓外親良師友奮自樹立稍長脫去拘攣識趣軒朗舉措不擾才力恢恢至元丙子江南初內附官府易置世務方􅎋故宋吏胥挾文為姦里無賴又為囊槖善良重足而立君以孤遺出應門户機警辨惠果決有謀既足自強又能為姻族鄊井捍禦外侮衆皆倚之為安兄志伊蚤世君撫其孤不趐已子先業粗給君善經理遂至贏餘推其所有輒濟貧乏惟浮靡虗誕之士雖數干請秋毫不可得居鄊善善惡惡豫敓不偏訴訟有未之有司而先質正于君省陳義秉法而劈析之咸得肯綮嚚俗為息江西行省郎中杜仲寬聞君之賢方薦君進用俄抱病歸未幾卒于家年裁三十有三初娶王氏先三年卒再娶觀溪劉氏五年而君卒初鐂氏之祖母亦蚤寡以貞節聞辛勤教子後皆擢科湖南轉運司帳管斗則劉氏諸父南康主簿玫則其父也鐂氏在閨門時習聞劉母懿範故能守節自誓又能以教子為先務次子遺腹所生日抱之泣行道聞而衰之君柩久在菆不葬人問之曰吾婦人安曉葬書俟吾兒長自卜其地且朱亡人守此柩日夕與俱猶同返窀穸也遣子就學歲時從師之禮無闕否則質簮珥以繼二子感激孝養備至學殖日勤今皆成立長毅用憲司試為瑞金縣儒學教諭升吉安路學正借注廣州新會縣藥徑寨巡撿辟廣東元帥府令史從元帥平循潮二州寇有功遷桂陽路捴管府知事有政績湖南憲課其最嘗平反死囚二人及去官為立生祠厯兩考進階從仕郎贑州録事次恆以儒推擇為臨江贑兩路掾歲滿為上猶縣典史毅仕至七品君得贈官其配亦追封宜人君卒以至元戊子六月十有四日葬以大德庚子十月十有九日墓在州北清化鄊鄴城里鐂氏卒以泰㝎丁卯四月十有九日年二十有七失所天六十有六而終葬以至正辛已十二月十有七日墓在新樂鄉之山塘祔姑李氏阡女一人王氏出適進士彭躍龍子務德孫男四人紘絢浩澄孫女三人曽孫七人君初失父遭時孔艱及其自立涉世又淺而鄊曲之譽流芳無窮殁世之後家有節婦門有孝子克亢厥宗子宦業日盛國家飾慎終追逺之惠方來未涯是宜有銘銘曰行以集義僅施于鄊為善竭力得年不長數有乘除分有豐嗇巳播弗穫後人是食趙祚既訖君方弱冠家緒不蠱君植之幹善負竒氣不為俠資救難則勇恤孤則慈視前斯振顧後斯燾年不滿德君子是悼有婦誓節志不負君有子力學底績于文生也曠遼一命若訒贈恩便蕃子仕方進有源斯委孰禦其沛惇史作銘以訓未艾元贈奉議大夫樞密院判官驍騎尉追封浦江縣子鄭府君墓碑銘有序大江之南浙河之東有州婺有縣浦江有旌表家鄭氏九世同㸑朝廷嘉而旌之至是又有贈典告于其家是為樞判府君由其子深起家為右丞相大傳府長史階正六品𥘉贈國子監丞及深遷宣文閣鑒書博士階正五品當進贈其親故府君有是命也府君諱鋭字景敏其先滎陽人十一世祖曰凝道遷歙凝道子自牗遷睦之淳安自牗之孫淮遷浦江淮樂善好施宋靖康年飢鬻田千餘畒以賑其里人號所居曰仁義里淮之孫曰綺號沖素處士事二親盡孝父照忤時貴得罪文以重辟綺上書郡守錢端禮乞代父坐法守為之直其父冤毋張病痺手足皆廢三十餘年凡就便液綺必抱持其主家政歲入絲粟不私鄭氏九世不異財實自綺始綺之玄孫龍遊丞德圭青田尉德璋尤篤友誼怨家以死中璋法當逮維楊圭請于有司以身代璋行竟死逮所圭子文嗣璋子文泰皆克紹一門薪餐食指數百如出一身令刺史舉察以聞旌表其門曰義泰二子長鋭即府君幼頴悟日記數千言長明春秋事母賈孝竭力以供子職賈病晝夜衣冠以侍湯劑者數十日無懈容其與兄弟處表裏始終無間言怡恱見于顔色嘗典義財每自朂曰吾家纍世義居至吾之身或墜先訓萬死不足以贖愧乃創為式用財纎悉必附日乘月吉以似家長署而通考之由是鈎檢有法一如官寺規可以久性勤儉任事不憚勞有餘即好施見里之貧約必思有以賑之暇日習詩及小楷殊有思致延祐甲寅𥘉科以明經貢于鄉一試不偶即舍之曰當以付吾後人生以至元己丑之二月二十有七日卒以延祐庚申之十有二月一日夀三十有二聞其訃者咸悼其蚤世明年辛酉三月三日𥘉葬義烏縣延壽山之原今改本縣靈泉鄊娶樓氏子二人長深次淇深字浚常失所依恃二十餘年負笈入京以文行受知前大傅右丞相𬒳選為長史推恩及君贈承直郎國子監丞樓氏封恭人及深遷宣文閣受經郎再遷鑒書博士擢吏部貟外郎今除僉江南浙西道肅政廉訪司事君進樞密院判官勳驍騎尉爵浦江縣子階奉議大夫樓氏亦纍封浦江縣大君深于豫有斯文之契以福建廉使貢公師泰所為行狀來謁銘辭不獲序而銘之銘曰昔在唐虞風俗淳美史稱可封比屋皆是降及戰國阡陌既開史稱素封實雄于財鄭門七世資義不竭使居唐虞在可封列家擬素封惟義發身致有誥命受封惟貞司造孔明無善不報惟樞判君實踐允蹈孝親友兄惇族睦鄰撙用致豐植弱賑貧義規我守義産我掌有勾有稽有籍有帳學明麟經一試場屋出抱遺編以授子讀子蔚有文進遇東閣謀禆鼎軸畫主帷幄再遷宫師授業內庭祕閣鑒書講筵譯經乃登要津判銓天臺維君恤典恩寵鼎來進班宥府錫爵蒲璧義門日崇車駟翕赩靈泉新阡遷自烏傷太史勒銘奕葉有光元贈應奉翰林文字從仕郎安成劉聘君墓碑銘國子助教鐂君文廷既升于朝當推恩其親天官為之擇館閣美名以居之于是贈其先君子劉公以應奉翰林文字從仕郎應奉即唐供奉金人避其主嫌名改今稱國朝因之雖七品階實北門詞臣惟朝士知名者得以是榮其親文廷將歸燎黃于阡狀其先德謁銘于余余至順庚午校藝南宫文廷余所得士也為國子祭酒又同在胄闈故為之敘而銘之敘曰公諱蒙正字聖功安成漢為縣屬長沙國劉氏為長沙㝎王後故家焉公十四世祖曰五處士初徙城西湯村晉安復縣也處士生唐末五季有善行子其鄊涉宋三百年鐂氏科第相望皆其後人公幼有宿慧五歲屬辭八歲能舉子業號曰竒童父嘗携之貴人家貴人命以賦援筆立成思致不凡坐客歎服一日父于役公戲母周夫人側適諸父夜課子姓以鄊校賦題燭跋未就周夫人曰諸兄方苦吟兒則戲劇何為公俄默若有所營餐頃曰兒賦就矣索紙筆寫之周夫人命以質諸父諸父為之失色以示諸郎曰若輩徒長大曽不愧是兒明日賦傳誦衆口鄉前輩爭造門呼出觀之居無幾世改科廢公年方富才器卓犖自以用不適時浸不屑為章句習會丁外艱撫事增悼終喪辭周夫人南逰衡湘常悒悒不樂喟然歎曰夫人在菽水之養不可久違箕裘之業不可久棄幡然歸故廬盡發先人遺書淹貫六籍馳騁百家旁及盤盂隱奧虞初稗官靡不搜扶已乃大肆力于文沛然出其有餘沾𬒳學者四方負笈及門如適工倕長短大小咸中矩矱它匠棄捐悉就斫削以公能誘人知方使厭飫日趍不容柅也性豪舉曠逹先廬故占勝地猾鄰乘公出誘大駔暗據規為已有諸從巽愞不能制公還誓必復之駔亦難公奉歸侵疆公拚除塓葺招復徙者鄰以是嗛公會歲侵鄊田不毛鄰攰于征布以計弛其肩于公人謂勢必返之不則病公曰人憊故求更憊而返之不仁里有貧不能輸者毁家以代之由是生計滋削然終不咎鄰獨自責曰居不擇鄰非智去之龍雲溪上居焉溪上多故人士族樂公之遷遣子弟受業恐後四方勞問繈屬公內給大夫人甘膬之需外修諸士友綢繆之好晚况殊適環堵蕭然戶屨常滿興至觴詠賔主盡歡髙談善謔傾倒四座酒酣取古人詩文擊節而歌聲沮金石踈髯古貌臞如列仙睥睨世故無足芥其胸次者一日飲傍舍莫歸沾醉就寢丙夜家人聞呻吟起問安公曰吾舊疾痛亘心膂歲常殆今二十年復作其不瘳乎詰朝更數醫皆郤其藥不飲七日忽宵興正冠而坐召諸子語不及他唯以不得終養大夫人為恨言訖而瞑皇慶壬子十二月二十有九日也年五十有三疾𥘉作周夫人已卧病公卒七日周夫人亡明年正月十有一日諸孤用治命奉公柩葬于故廬之隂曽大父方勞問繈屬公內給大夫人甘膬之需外修諸士友綢繆之好晚况殊適環堵蕭然戶屨常滿興至觴詠賔主盡歡髙談善謔傾倒四座酒酣取古人詩文擊節而歌聲沮金石踈髯古貌臞如列仙睥睨世故無足芥其胸次者一日飲傍舍莫歸沾醉就寢丙夜家人聞呻吟起問安公曰吾舊疾痛亘心膂歲常殆今二十年復作其不瘳乎詰朝更數醫皆郤其藥不飲七日忽宵興正冠而坐召諸子語不及他唯以不得終養大夫人為恨言訖而瞑皇慶壬子十二月二十有九日也年五十有三疾𥘉作周夫人已卧病公卒七日周夫人亡明年正月十有一日諸孤用治命奉公柩葬于故廬之隂曽大父繼周大父先登父雲鳯皆為鄊名士娶朱氏以子貴封宜人子四人長聞即文廷登第後調臨江録事有善政居成均事稱其稟以善教名次閈次閲次閏皆以經教授女二人長適賀氏次適張氏孫男女十三人公篤于孝友弟應龍幼孤妹歸李氏早寡于時飢饉師旅相仍公避難崎嶇往來百里間撫孤存寡恩極周緻家雖貧所識空乏即解衣推食無靳居鄉曲有譽處豪右有道雖不好以氣岸加人而見者自失其負挾平生喜讀書過目成誦朋友乩疑隨事疏答云出某書見某注如腹有笥然為文渾厚條逹不事竒澀下筆輒數千言雄議疊出多禆益世教切中治體人稱其有大對倫魁之材尤善知人誠偽䇿事成敗橫逆無故至前了不為動人驟遇之見其髙世不羈之林未容輒致親附而明白坦夷雖家人細故不以欺客退而消去鄙吝終身不忘雅不喜浮屠幻妄之説聞朋友有佞佛者移書切責鄉先生若靜德王公聖與青山趙公儀可復心崔公君舉養吾劉公將孫皆折輩行友之科詔既下公讀而喜曰吾老復見場屋寧非天乎尋至物故齊齋彭公長庚祭以文曰科目方興而伏生死禮樂將用而河汾亡其見重名士如此公號山泉先生有美矉集若干卷學者傳之既沒時人見論事不痛快臨文不強人意輒太息曰安得復見劉山泉先生銘曰公之學碩以多可擢巍科公之詞雅以麗可司帝制有其學不科其擢父懷其璞子獻其玨有其詞不制其司生背其馳死踐其資其有不居其蓄不祛其逹敷腴其償寓諸茫茫九亰公莫起矣瞽宗有辭惇史有讄元故徴士假公禮廷墓碑銘有元徴士假公禮廷既葬之十年其孤德輔德文介余故人之子聶孟宣以公之行實謁余請銘其墓道之石豫始辭之孟宣請益謹乃述其行而為之銘維假氏廬陵之龍溪人入唐以來代為顯官有積階至銀青金紫者公諱士龍字雲亨禮廷其號也曽祖仲仁祖文郁父子開字叔茂號真逸處士始遷長沙城中三世皆有德之士公本真逸族子宋季段氏有登進士第卒官成都華陽主簿諱文煥者公所生曽祖也以詞賦兩請漕貢進士諱議孫者所生父也內附初世故多艱貢士往安成依妻家劉氏以居前至元辛已公生劉氏家年九歲外祖鐂梅窗先生竒其頴悟真逸無後詢之族屬求可為後者見公拊之曰吾行四方閲人多矣是兒能振吾宗者請以為子貢士持不可貢士沒母劉氏辛勤自立教公從師受學甚謹又九年真逸申前請彌切乃許以為後時真逸以資雄于長沙得公幹蠱甚副所願公事真逸及母李氏盡孝遇弟士虎能友士虎字文亨本從姑之子與公同繼真逸為性剛果公每濟之以寬內篤恩愛外極彌縫家務大小咸當其可公之助居多由是家日益𥙿又加潤色焉真逸晚歲優遊之趣甚適公所生由文煥而下六喪未舉公竭力營厝悉如禮同氣四人兄可珍弟可立揭家從徒長沙公賙之有方既而夫婦俱亡公殯其二喪撫其諸孤使之咸有所憑藉女兄適印岡羅氏相距六百里饋問無虛月其他賑貧恤難施諸外人無少難色每歲發廪務平其值庚午大侵則損直傾積以濟存活無算平生讀書一見隨了大義有所得輒加體驗而行當道薦以文學掾力辭不就家居命僮僕治生一經指畫即不以嬰懷惟與士大夫遊樂而忘倦蓄古書畫暇日把玩清談纚纚不絶城東作三恩愛外極彌縫家務大小咸當其可公之助居多由是家日益𥙿又加潤色焉真逸晚歲優遊之趣甚適公所生由文煥而下六喪未舉公竭力營厝悉如禮同氣四人兄可珍弟可立揭家從徒長沙公賙之有方既而夫婦俱亡公殯其二喪撫其諸孤使之咸有所憑藉女兄適印岡羅氏相距六百里饋問無虛月其他賑貧恤難施諸外人無少難色每歲發廪務平其值庚午大侵則損直傾積以濟存活無算平生讀書一見隨了大義有所得輒加體驗而行當道薦以文學掾力辭不就家居命僮僕治生一經指畫即不以嬰懷惟與士大夫遊樂而忘倦蓄古書畫暇日把玩清談纚纚不絶城東作三友亭常領客觴詠歲癸酉遊南嶽登祝融夜半望海日超然有從方外之志乙亥歸廬陵遍修先塋之祭退而會諸族䣊姻友歡甚是年真逸年九帙歸為真逸夀擊鮮髙會繞膝奉觴鬚髮斑白座客歆羡未幾真逸病侍病勞勩及卒哀慕過情襄事甫畢公亦感疾逾三旬未瘳一日忽呼二子語之曰民生在勤勤則不匱汝曹勉之越數日疾復作瀕殆有僧怪牛素所往來問之曰究竟若何舉手盡一圈曰平生受用不離乎此子問家事不答啓手足示之翛然而逝後至元二年丙子五月十有二日也三年丁丑十一月庚申葬善化縣龍坑之留思嶺公性忠厚喜愠不見顔色訓子弟能以身教有質問必中理得年五十有六未弱冠來繼真逸始終幾四十載父子慈孝如一日中外無幾微間言難矣哉初娶胡女一人適廣東宣尉副使聶公以道次子孟宣劉氏子一人德輔李氏子一人德文皆克肖孫男女各一銘曰人生至難為後于人其難維何尊尊親親親既區别尊有隆殺君子處之先識其大所繼所生置身其間不爽其宜得譽匪囏于嗟禮廷動適厥中于分則嚴于情則通歲踰三紀恩義周浹至誠感孚靡間靡諜墳墓我省譜圖我修兩宗欣合二郡綢繆廬陵長沙地壤犬牙段氏蟬聮克昌厥家里稱善人士曰善士生有處譽沒蕃胤芷湘江之壖卜兆允臧魂魄所之咫尺故鄊慶源川增後人其承惇史作銘詒爾雲仍元故隱士更齋先生鐂公墓碑銘有序公諱過字益翁更齋其自號也幼頴悟日記數千言稍長受學里中王珏王客故相江公萬里家其弟信豐宰逵父往來公從兩王先生咸稱為畏友又嘗侍先君子登巽齋歐陽守道之門由是須溪劉辰翁中齋鄧光薦皆以忘年友之先君子博雅能文須溪號之曰山中小集古尤偉公論議馳騁墳素軼出旁行敷落躪躒虞初稗官劉氏雖好辨者終不能傲公當世務搶攘衣冠家子弟類巽愞不更事公器局散朗應對間暇父兄賴之以安至元元貞間境有山盜公承檄扞禦能申條教齊一民義里閈帖然間歲侵輒殺直以發飢者為饘寒者為衣殣者為棺靡不終惠家居敦敘倫紀姻戚困乏者委曲料理卒使之有業性妤客善謔歲時燕集酒酣歡洽擊節雅歌四座為悚尤不喜異端然時有佳者亦為之豁逹無忌𥘉號一山時慕􅕋大夫之賢著號更齋先輩耘廬鐂應登記之諸名士有詩生平𥙿有才諝薄于宦情分憲觀復馬公昭舉行鄉飲酒禮公侍先君子座側馬公愛其英爽欲辟以掾屬力辭御史方崖蕭泰登于公為中表屢勸公仕輒不答晚歲順適丘園容與翰墨嗜古圖畫市或千金為知巳持去亦輒委置家藏古書甚多皆手自校讎至所著作才既敏贍率易天成旋復散逸他日門客子弟始彚成編嘗即先廬之傍改築新宅將以逸老扁其樓曰望雲不敢忘先人也泰㝎丙寅哭其長子慟然時能命客自遺自是嬰疾疾革呼孫揆寅語無他及惟誦少陵微爾人盡非之句翛然而逝生以宋開慶己未前十一月十五日沒以元泰㝎丁卯閏九月二十七日年六十九歲曽祖從龍祖有開宋迪功郎安吉州烏程縣令父惟憲南軒書院山長皆山翁也娶戴母族以賢婉稱子男二士元士榮士元先公一歲卒士榮早夭女四人俱適士族男孫三揆寅揆辰揆申皆以儒學應徵辟孤孫揆寅以至順壬申十月二十二日奉公柩葬于里之煙竹原事竣屬其姻戚易君景升狀公行謁余請表其藏易余校藝江右時所得進士而余亦素知劉公學行節概凛有古風若揆寅之世家學亦士大夫之所願友者故為銘曰民生于三父師其二倫序有五其一友誼偉矣劉公名父之子隆師親友抑又名士三者之懿筮知其賢矧公學行允也可傳學以事君行施于政憗不少試斯焉有命命固有之公亦高蹈用不于時而適于道邁􅉨者氣騰踔者辭庶俾來世知公于斯新居奕奕花竹斯薈日月幾何松柏斾斾有濬其澤由孫及曾太史撰銘悠久之徴元故隱士廬陵劉桂隱先生墓碑銘廬陵劉桂隱先生卒葬之三年子應麟遣孫珵來京師請其墓銘于玄值世多故未暇請也又三年遵東海以歸乃致前請謹托其行狀敘而銘之先生諱詵字桂翁號桂隱其先清江之翟斜族也翟斜之族自宋公是公非弟兄叔姪以文學聞天下號江右三鐂先生之先世有諱滔字禹績者由翟斜徙吉水之南嶺傳六世至彥升彥明兩弟昆升留處南嶺明分處北坑北坑以地居上遊號上族因號南嶺下族升自鵬舉五子競爽弟四子曰僴字端臣生子少齊字思賢是為先生之髙祖考少齊生子黻字德卿宋大學內舍從誠齋楊文節公遊子鈴字衡甫受知文丞相號麓隱生子仁榮字雲祥號習靜與弟化龍長子元方同領景㝎甲子鄊薦明年俱及進士第雲祥授平陽尉先生平陽第四子也生二歲失母七歲失父九歲宋亡奮以頴悟之資自樹羈孤之中能不墜先業又斥大之今之大夫士論先生德行道藝必推本其先人于是平陽之聮科雖不獲究用于季代因先生克紹咸稱其有子而鐂氏自翟斜而下益有光焉先生之為德不為世俗之所搖􅟃不為風聲氣習之所淪染卓然以重厚醇雅進與鄒魯士埒而無怍容事諸父及諸昆弟盡恭敬友愛之道先世恆産悉推讓之子姪及門必厚遇以禮伯氏蚤世其子古臣方幼撫育教誨使有成立古臣卒又撫其子如古臣夏氏女沒所生角羇未齔教育而婚嫁之如禮晚即南嶺創始祖祠率族子歲時祭祀以正昭穆之敘居家處鄊有古君子風訓學者能以師道自立至其為文根柢六經屬饜子史􅏳轢百家渟滀演迤資深取宏矩矱哲匠逹于宗工液古融今自執其韛應慮不獲靡施弗宜雖未嘗露其俊傑廉悍踔厲風發之狀韞玉在櫝氣如白虹不可掩抑四方求文繦屬于門有古文若干卷諸體詩若干卷駢麗書劄若干卷揔題白桂隱集蜀郡虞先生豫章揭先生及玄皆嘗敘之各以所見極其形容詠歎之盛然以先生之文微吾三人言有不行世者乎先生殁吉之弟子顔成子狀其行稱先生年十二三時長于宋季程文若律賦論䇿臨文沛然蔚有老氣宋之遺老巨公若季公鶴田肯堂深齋三公于先生為母黨尊行一見即以斯文之任屬之中齋鄧公須溪鐂公于先生為鄊先正見其文尤加器異鄧公嘗延之家使範其子若彭巽吾晏山心于先生為畏友往往推服延祐初科舉復興先生年才四十餘州里有司舉孝悌明經太守強勸之駕先生好古與主司瑟竽理之必然不足深論先生退自場屋一時名家欲其子弟規進取者必厚幣求師事之古有善射者射牛鏃掠牛腹舍粗詣精以不中為勝賢父兄願欲得其不中之竒他日與拘拘然求中者角我欲中斯中耳方崖蕭公為御史以教官薦學山文公為集賢以館職薦尚書鵬南鄭公過廬陵見之歸朝以遺逸薦公卿推轂當時賢士推轂者可得美譽賢士何為焉先生生以宋咸淳戊辰八月二十六日卒以大元至正十年九月十三日年八十又三葬以是年十二月二十五日墓在州之仁夀鄊東槎灘娶印岡羅氏有婦德能致內助先二十年卒子男三長立敬先五年卒仲尚文克世文學先生鍾愛之惜蚤世季應麟業進士女四人適同郡李以孫夏昶彭鎡蕭泰端皆宦族孫男七觀先夭次珵瑜諒璉讓珣珵今除龍溪書院山長孫女八曽孫男二玄于先生未獲一識而書問不絶相知為深虞公晚歸田過從甚樂每有相見遲莫之歎虞揭二公皆先卒玄以垂髦之齒獨得銘公銘曰宇宙氣化消長有時斯文盛衰不繫于兹富貴倘來非悠久功名時至亦易就惟兹二事衆可朂天卑斯文曰豫獨近代四家廬陵眉山臨川南豐頡頏其間展也桂隱實宗歐陽豐曽約蘇謹嚴歸王天憗其施不靳所重我其承之賁若光寵在衆不隨豫獨不訾不貤厥齎俾昌于詒元故旌表髙年耆德山村先生歐陽公墓碑銘至順元年冬十有二月南郊禮成詔天下民年八十以上無失德者有司以髙年耆德旌表之袁之分宜山村先生歐陽公是年九十以齒以德當應詔元統改元又詔賜髙年帛公年九十三縣大夫來致帛見其人物議論之偉驚且喜曰此豈徒有年者哉二帛未足以示優禮也詢前詔旌表猶未遍舉方謀為之請玄適在朝登以文白當道檄有司奉行之于是旌表將至偶近公生朝子孫請即是日拜命為夀有司從之比至疾遽作竣事未幾卒後八年玄謁告南歸訪族防里至公之門旌表燁然而宰木拱矣子惟德以里名士孫復孫所狀公行請銘其墓玄忍銘乎忍不銘乎公諱涇字源清號山村先世自安福令而上詳見吾宗楚國文忠公譜令以下數世有自安福遷分宜防里者至公傳十有六代代多文儒曽祖安世祖必恭父起宗皆教授鄊里世父龍瑞登宋咸淳七年第公資貌偉特少以力學得羸疾有授以食療法久乃魁岸性孝友執親喪至柴瘠每起必杖為親擇葬地術家言某兆吉公曰何自致之曰以公孝感當自致已而果致季弟目眚溫良飢飽謹候伺之如是數十寒暑無幾微倦色沒而哭之盡哀葬之盡禮倫誼之重里人至今以為式家居飾子孫常舉平心待物四字為訓能以身教故子孫率從由是忠厚日積致家日肥奉養日腆而公如素之習不改平生𬒳服前代衣冠未嘗少易華靡子孫亦不能強之暮年身健神清稠人廣坐與一二同輩談承平舊事移日不倦歲時會族少長咸至多至數百指語子孫曰天倫之樂無以踰此饔餼隆殺非所計也爾後人母廢斯禮早年習舉子業精敏有聲場屋與季父同登俱侍補國學葉丞相守袁遇士慎許可見公之文獨稱賞求識公面屢加薦逹至宋亡科舉廢乃更沉潛性命之學手編諸經傳注彚稡先儒格言其精義奧旨融貫演繹多所論著細書大帙充牣巾廂詩文理致自足不事雕劌舉動一出誠恪不勞矜持嘗有老僧一日同集人見其踧踖于坐詢之曽從出學公教學者無他言唯勉其用功根柢異時少自樹立即有依據後進往往佩服其言生以宋淳祐辛丑六月二十六日沒以大元後至元乙亥十一月十一日年九十有五沒之明年丙子八月某日葬于里之小礱源娶某氏先公卒子男一惟德字秉彛幹蠱有譽克大厥家公殁之歲子已稀年今將八十康徑勝常人每以公夀期之孫男二務敏務實皆業進士曽孫男一玉成孫女一適彭曽孫女二長適朱少適許皆名族玄于公為族弟先世徙瀏蹤迹雖逖知遇獨深銘墓之請誼不敢辭銘曰惟公之身實備五福夀躋期頥富有茀祿茀祿雖冨公恬不知曷其康寧豐約不移惟其不移可久處樂耽書味道生不飲藥好德已稀况德之積逮夫考終數不滿百太朴未斫全福有人豈獨全福有行有文有文匪他惟性惟理以淑其徒以遺孫子有覺其閎國旌夀駿天光所臨百世流潤爾孫爾曽赫奕其承同宗匪吝惇史足徵居士歐陽南谷墓碑銘居士諱同寅字同甫號南谷袁之鈐岡防里人也世為望族家饒資尤多儲書居士自幼為學質實既長賦性剛塞居家庭有孝行處鄊黨有直聲輕財而賤利貴義而重德姻族有孤遺少任其教育長釐其嫁娶里中貧乏者飢有其粟死有其棺殣有其域歲旱先其鄊人禱不大雨不止鄰有災集救賞募􅑒夫必撲滅乃退人有訟求正善譬析以理閭閻細民有戒心來歸輒聚而保之五六十年之間未嘗希知遇于當世故已之德人者甚鮮人之德已者甚多嘗訓諸子曰處善循理人生至樂仕宦何為當道以教官薦辭不受又嘗自贊其畫像有曰務本之學施于孫子士稱其言先行而後從晚歲家居優裕肆力于學適意于文廣坐辨論經旨專門士或病之天曆己已夏五月疾作醫至却藥不飲疾甚諸子請所以命輒厲聲曰若輩皆四五十之年猶待刺刺語耶有間曰張公藝九世同居惟一忍字汝曹識之端坐正衣冠而瞑是月二十日也得年七十有六至元丁丑十二月壬辰葬臨江新喻鍾山鄊龍伏之原曾大父峻大父珦父夢顯積德起家𥘉娶鐂氏繼室許氏皆先卒子男四震亨晉亨巽亨克世家學鼎亨仕八蕃有招蠻功宣撫司辟薦以官聞母喪歸不就巽亨仕湖南辟清湘縣儒學教諭以親老辭女四適李適彭適胡適劉皆里名家孫男四長天祐次天福蚤卒次天與天啓孫女七曽孫男三曽孫女四吾歐陽氏以有姒支裔封越後并于楚受封于烏程之歐陽亭侯子孫以亭侯為氏厯兩漢涉魏晉六朝唐宋迄今南北歐陽惟一族非如他姓各有所從始者然自涿州太守而下顯者曰冀州渤海青州千乘千乘中絶今皆渤海後又自率更令而下顯者曰長沙自吉州刺史而下顯者曰廬陵其實出于一詳見唐書宰相世系表及我兖國文忠公譜説居士先世繇廬陵之安福義𩔶遷今防里上世有府君諱俙在諸昆弟中子孫多遷居外郡有復遷安福之早禾田有遷潭州之瀏陽馬渡者若是者不一居士亦俙後于防里其處者也玄之于瀏陽遷者也由始遷至先參政冀國公才三世故世次可考居士于冀國公族弟也玄于居士族子也巽亨來京師求表居士墓義不敢辭為之銘曰才周世用世用則訒德應人求求人則吝我宗儀刑遺不我憗我表其藏三世其親讀圭齋先生所撰南谷居士墓碑知昔人之所積者忠厚深長其遺諸子若孫固異乎衆人也自凋謝之餘而資源昆弟皆卓然復昌其先世又知天之報施善人果不爽也嗚呼世之人何苦而不積善哉洪武二十四年六月二十有二日翰林黃子澄書永新龍母吳氏墓銘晝而出必掩面幽其明銘何炫宵而行必秉燭明其幽銘何瀆生存正沒順寧酌二義可也銘婦之冡嫂之丘繄吳氏羅其憂事莫難彛倫間公無怨私無瘝姑宜家叔宜室卑者勞尊者逸城有屋郊有居相夫子手拮據子于親無二上禮有别孝無讓父之命子之誄人信之惟天理惠于宗德于鄊冝大史銘其藏余拙于書病餘愈拙近日求豫文者多強豫書余不得已力書以塞其請然實非豫之素志也禾川龍孝子謁其母吳氏墓銘獨能見諒于是請大常博士劉聞大書余甚嘉之因書銘後使知得余書者不如諒余書者之使余感也致其辭來請者其西賔戴與權也其人左賢使余不忘歐陽玄書元處士劉公梅國先生墓銘有序公姓鐂氏諱隆瑞字立賢世為安成望族幼頴悟力學家居孝友遭父母喪勉力襄事動循禮則宗黨繩之遇諸子姓奬借誘掖期于成人才性跅弛輒加警約劉氏孰業彬彬可觀公教居多世變􅮏海舊家子弟巽愞奴客乘勢恣睢公奮以法鋤拉強梗至元甲午獠寇陸梁青山朝廷遣簽樞督捕輒欲禽獮其鄊聞者竄匿公逺迎大軍供億畢給民用無恐豪右有宿憾于鄊伺間報復公辨出無辜活者千計寇平師旋居民殘燬札瘥荐臻公𬒳府檄勞來遺氓賑飢療疾流亡四集有司築堡壘以戒不虞公曰軍名備禦實則病民卒言大閫遂撤其戍民迄今便之公機警倜儻踈財樂施為人􅑒難觽紏德色不見幾微晚歲延名師淑諸孫暇日觴詠暢適泊然無求于時所居多梅因號梅國先生至治壬戌四月十五日卒明年十二月十六日葬鄊之南山夀五十有八按狀劉氏在南唐時有為袁州刺史者始遷安成蜜湖傳至克都府君再遷南溪五世為評事府君良輔二子長迪功郎龍南尉汶次修職郎沅陵令嵩沅陵子醴陵令孔彰善誠齋楊文節公萬里醴陵子塤塤子鑑以文學顯終承事郎祕書省校書郎祕書生天福修職郎廣西帥司幕官是為公之考號恕齋澗谷羅公椅壻之嘗及接見後村劉公克莊為人慷慨多智略與文丞相有姻好雅見器異須溪鐂公辰翁青山趙公文靜德王公夢應復心崔公君舉巽吾彭某皆嘗與之逰君子于公行義之卓尚論先世藴蓄之深先友過從之盛而知其負挾有自來矣伯兄震漕貢進士仲兄薦輔國學生咸有士譽公娶王氏女有婦德能持家後公一年卒子燁字持敬孫曰漢善鵬嵩嶽正泰鈞貫凡九人述行狀者湖南宣尉副使周君志仁介燁請銘者太常博士劉君聞也玄識燁久銘何可辭銘曰安成在漢隸邑長沙十世有羡蜜湖是家處士侃侃濬厥義問秩若紀綱不煩以紊範族以正剸物以剛抑浮惇雅植弱枿強鼯嘯子叢王師薄違鴻飛于渚公曰曷歸素筝軍門其勇萬夫貤其有餘翼蔽一隅孰弱爾巢我堅爾屋孰莠爾田我庤爾粟民將德公尸祝百世公曰噫嘻我求無愧衆芳所都紛郁粹醲涵泳堯仁優遊以終彼秩三品奉常斯諡法當立傳大史乃議奉常言之銘者大史儕是寵光展也君子松柏欎欎君子之域宜爾子孫維德之植元翰林侍講學士中奉大夫知制誥同修國史同知經筵事豫章揭公墓志銘至正四年七月壬辰翰林侍講學士揭公曼碩以總裁宿史館得寒疾歸寓舍戊戌薨時京師大雨彌月朝縉大夫聞者不避泥潦馳往哭之人人盡哀明日中書出公用鈔二千五百緡率先為賻于是樞密院御史臺六部以下咸致賻儀有差車駕在上京適遣使賜諸捴裁及史官燕勞以公故咸援禮辭中書為改燕之日使者歸上京白宰相宰相以聞有旨賜中統萬緡給喪事有司議以驛舟送其櫬歸江南孤汯奉史官劉聞所狀行詣玄謁公墓銘玄與公三為同寅相知為深公死為之哀痛踰月不能忘故不銘有所不忍銘有所不忍九月汯將扶護登舟乃勉敘而銘曼碩諱傒斯姓揭氏生而頴悟年十二三讀書屬文即知古人蹊徑家貧不能具束修從學惟蚤莫刻苦父子兄弟自為師友稍長豁然貫通日有增益未弱冠里大家延之授業諸生年或相等皆以師道嚴憚之二十餘負俊譽遊江漢間司徒程楚公為湖北憲使竒其才妻以從妹皇慶初程公入朝公館其門時國初諸老尚存聞程公有佳客咸願識之及與之言薦恐後延祐元年用薦為翰林國史院編修官三年升應奉翰林文字同知制誥四年遷國子助教學士承旨復奏留之五年謁告歸泰㝎元年復授應奉翰林文字丁內艱去職天曆二年秋文宗開奎章閣置授經郎教勳舊大臣子孫于宫中公首𬒳選至順元年預修經世大典三年書成超授藝文監丞參檢校書籍事元統遷翰林待制後至元四年擢集賢直學士五年奉旨代祀北嶽北海濟瀆南鎮竣事引疾便道由浙左歸豫章六年以奎章供奉學士召未至改授翰林直學士知制誥同修國史至正改元兼經筵官二年升翰林侍講學士且命同知經筵事三年年及七十請致仕歸上聞亟遣使追及漷南拜表力辭再遣使奉上尊諭旨還撰明宗皇帝神御殿碑文成求去不聽夏四月詔修遼金宋三史命右丞相為都總裁中書平章政事鐵睦爾逹以下凡六人為總裁官公預其選遂不得辭明年遼史既進金史垂成公薨壽七十有一揭姓相傳出楚司馬氏世逺姓稀譜逸或云出漢功臣陽信侯或云出安道侯漢以後揭氏居髙平居汝居郢唐乾寧中有諱鎮者以左僕射持節袁州刺史揭氏仕東南者昉見于此今江右諸揭居豫章居旴廣昌皆大族豫章族始祖稹旴廣昌始祖填推其訓名蓋稹填伯仲曼碩居豫章豐城今為富州曽祖光朝妣黃氏祖性聰纍贈嘉議大夫禮部尚書上輕車都尉追封豫章郡侯妣黃氏繼何氏並追封豫章郡夫人父來成以邃學篤行見推前輩先賜諡貞文先生贈中奉大夫江西等處行中書省參知政事護軍追封豫章郡公妣黃氏追封豫章郡夫人皆以公貴推恩𥘉娶李氏繼程氏荆湖北道宣尉同知巖卿之女先公卒並追封豫章郡夫人子男二長汯國學上舍生克世父業李氏出也幼廣陽生始四歲女一人適秀才楊湘孫男一敬祖孫女一公職子弟未嘗有纎芬貽其親憂昆弟有無相通始終無間言少自處約立身洎有祿入服食稍踰于前輒愀然思其親曰吾親未嘗享此故平生清苦儉素老而不渝在京師三紀官至五品出入始乘馬為授經郎諸貴遊子弟見其徒步每蚤作宫門辨色輒先諸侍臣至謀為之貰馬公聞之自置一騎尋復鬻之示非所欲𥘉逰湖南見前宣尉文惠公趙淇趙素號知人謂公曰君他日翰苑名流憲使涿郡盧公摯見輒稱許其歸朝竟以翰屬薦之薦牘今在掌故至京師受知太保李文忠公孟樞密王文㝎公約承旨趙文敏公孟俯學士元文敏公明善先是東南士聚輦下如四明公桷巴西公文原雍郡公集有盛名公卿間既而貢集賢奎章周待制應極薦之皆馳騁清途公與清江范梈德機滅城楊載仲弘繼至翰墨往復更為倡酬公文章在諸賢中正大簡潔體制嚴慗作詩長于古樂府選體律詩長句偉然有盛唐風楷法精健間雅行書尤工國家典册及功臣家傳賜碑遇其當筆往往傳誦于人匹方釋老氏碑板購其文若字袤及殊域門人集其所著巳板行于世在國史時李文忠公見所修功臣列傳撫卷歎曰他人謄史牘耳若此方謂之傳在奎章時上覽所撰秋官憲典驚曰兹非唐律乎又覽所進太平政要四十九章喜而呼其字以示臺臣曰此朕授經郎揭曼碩所進卿等試觀之其本常置御榻側為經筵官今上聽其講篇深嘉其忠懇故其際遇纍朝皆非疏逺儒臣所敢望者延祐末朝廷倐罷群臣贈典公之父獨得賜號貞文又賜之碑天曆至順中大臣有薦文士人主必問之曰其才比揭曼碩如何纍稱其才可用欲器使以政今上𥘉即位一日使衛士召公至則以內府所賜諸王假表裏賜之將賜躬自辨識然後以授講經退又賜金織紋假至正改選格諸超升不越二等公由中順大夫進中順大夫獨不為例超授四等轉八階進神御殿碑特賜楮幣中統萬緡白金五十兩中宮亦賜白金如其數又為之賜貞文書院額仍許置學官若此異數公受之踧踖不見幾微自衒之色而許國之志益自奮厲故處散地論政薦士以古人自期王文㝎公嘗言與揭公談治道大起人意對大臣言其辭不及他第言某處災傷未賑恤某政弊未除某人賢在下位未擢用自漷南召還丞相與候見便殿因問方今治政何先公曰養人養人何先公曰人才當譽望未隆之時養之在朝廷使周知庶務一旦用之自識治體及置史局又問修史之道何先曰收書用人又問用人何先曰用人先論心術心術者修史之本也心術不正其他雖長不可用公求去之意未釋上使丞相及諸執政面諭留公公曰使揭某有一得之獻而諸公能用其言天下遂獲其利雖老死于此不恨不然何益之有他日集議東內公倡言鈔法大弊合用新舊銅錢權以救之政府不樂論議辨駁示以顔色公辨不少變丞相心深敬之故人才因公言知名善政因公言張本公出不以告人人亦鮮知之惟豐城地不産金而金課益倍為害𩔶年公上言罷之集賢考校諸路學官所業下胄監移博士吏文淹滯儒者公請改其制以其事付本屬官竟得奏允御史言下第舉人以充學正山長鄊舉放次榜以充教諭學録廟堂以咨公公力贊成之此世所知者考鄊試會試一廷試為讀卷官二國子監公試七多得名士後居要路所教勳舊子孫後多為重臣公待之泊然不矜詡以為聲援于程公禮若賔客人弗知其為肺腑親性耿介易直好善惡惡表裏如一聞郡縣有一廉吏他日臨文必旁引曲諭以極其稱道或恐其過聽失實公則曰如是猶不足以勸善况敢億不信乎至聞吏有貪墨病民論之曽不少恕嘗有郡侯以勢諷其部民奉金為公夀求文記其德政公頗知其人斥之曰汝郡侯所行如何吾敢有以飾辭為諛乎其人未幾以賂敗朝中名臣意趣或不與之合終身不一造其門雖嘗以是為軋公曰吾之進退用舍一聽諸天人何能為世路齟齬時或不平心有所感形諸詩文傍觀謂其太甚公曰言當如是不必慮也其遇善類及新進諸生乃復恂恂汲引莫年求文者多寢食為廢子弟數以為言公殊無厭苦意有客為人求文而私其金公既豫文他客發其事公曰已受之矣終無所言聞者稱其長厚臧獲有過徐以理責之人問之曰長上遇下稍見卞急後生便習暴戾當以身教稟性堅壯動作簡便群下易事公集必蚤官事尤勤進遼史後有旨奬論史官早成金宋二史公奉命黽勉朝夕匪懈先代故事臧否奮筆書之身任勞責不以委人屢言今人徒知求作史法不知求作史意古人善言雖微必詳惡事雖隱必書其意主于勸戒耳當暑濕盛作移居館中頗自恃其精力踈于攝生遂致疾不起昔玄與公共修憲典公素習律儀又勤于玄其書大半成于公今又共史事公之勤不減昔時乃遽失援公未病前數日謂玄曰某平生愛公文恨無因獲一言早晚史事成求公作貞文書院記記成而刻吾志畢矣玄敬諾之悲夫斯言詎意未記書院而先銘公之墓乎汯卜葬某鄊某原期以某年月日預為之銘銘曰古稱良史造物忌子􅐁是非擅萬世嗟公直筆廉不劌奬善懲惡義之比惡書不貸善書亟寒暑晝夜勦形思公起南服抱腹笥布衣徒步品第二尚方召見呼以字致君惓惓效獻替講經作史出一意陳規進戒為己事惜哉負挾勤少試徒抒精忠載言議感慨論列時出涕唐之甫也漢之誼以文發身卒以斃豐城故墟干將人願以不朽託公之同年惟先生義而銘之庶幾公猶未死也余讀之欷歔夫同年以科目為弟昆師友以道義視父子師友廢道義不明同年乖科目不振人情死生之際天理存亡之機其所係也大矣吾于劉公忍不銘之乎公諱彭壽字壽翁家譜載其先本漢中山靖王裔隋時有諱建者仕為大將軍漢王諒使略地燕趙將不直其所為棄官入蜀家于隋疑誤十一世祖貞仕蜀署眉州司馬蜀亡宋召入復官之卒贈銀青光祿大夫五世祖貞卿字純老為廣漢軍司法至曽大父演字謙叔號中山由丹稜遷眉之金流鎮是為金溪中開禧丁卯潼川轉運司解有文集號雞肋傳于蜀大父蕃卿字子才號默齋登淳祐丁未第尉紹熙之靈應改教授卬州攝州倅壬子蜀被兵出蜀之荆南卒焉考淵字學海三領鄉解嘗以春秋冠全蜀內附初避地嶺南之桂尋之象還寓衡陽署號象環卓行篤學為士楷模事母至孝耆年修子職尤謹用薦為永州路學正既沒門人私諡曰永政先生公幼頴悟侍父瘴海不廢家學弱冠負才俊辟衡山縣教諭重闈康強公以薄俸迎養菽水怡然父子授徒從學雲委久之樂衡山士習之美遂留居焉再調武岡路儒學正秩滿待教授選會科舉行延祐甲寅初科以春秋貢湖廣乙卯登苐賜同進士出身授將仕郎桂陽路平陽縣丞轉嶽州路行用庫使升承務郎建德路淳安縣尹授代還踰年卒年六十有四先妣彭氏公名存外氏以志孝也迎養繼母于浙西年八十餘公卒深哭之公娶白氏用公貴皆當有封贈循資請于朝命未下公殁子一人侣女一人適茹蕃侣舉湖廣鄊貢進士遇恩調衡州路儒學正應選教授先公一年卒公以繼世之重為之衰絰及期竟以憂感嬰疾疾革門人江雲端劉延俊輩咸在將屬纊語延俊曰生順死安無遺恨也第老母不得終養孫圭幼未之學子教之而才吾受子賜言訖乃瞑圭以某年月日奉柩葬于某山之原公為蜀名家世明春秋之學自曾祖演至子侣五世一經相傳科第接武家多著述象環先生有讀易記易學須知春秋例義春秋續傳記左傳記事本末周正釋經古今要略等書公所校讐增附不少其自為書有四書提要春秋澤存春秋正經句釋易詩説未脫藁生平所著文集門人方彚編之初科舉未行公教學者必以五經四書為本為文必先理趣而後詞章及科詔頒悉如公所為教故髙第冡嗣以取科名校文鄊閭門生多擢髙甲在衡山時部使者涿郡盧公摯廣平趙公厲皆時名公一見輒遇以老成在嶽陽行中書省平章魏髙公昉拔自管庫館之幕下屢以行省提舉薦不報逮其為政勤于治民而疏于奉上故當時惟賢者知公玄與中丞浚儀馬公祖常侍御濟南張公起巗參知政事相臺許公有壬同朝暇日論及同年士五十有六人二十餘年聚散不常井沉不齊其間存亡疑信幾不忍詰至于鐂公則往􅉨相視有荀慈明愧陳太丘之色適翰林編修和逹來自淳安能言公幅中深衣每月𥘉吉升座講書淳安士庶聽講無倦致邑中風俗丕變玄明日白諸公曰方今宇內州路縣大夫皆有師帥之責于其民其能服先王之服誦先王之言卓然以承流宣化為己任者嘗屢見其人乎諸公方懷論薦公遽不起噫命也夫公葬象環先生衡山先塋之原名其阡曰岷衡因號我山銘曰誰謂岷逹百川其攴誰謂衡髙景行斯齊誰謂公死遺書在兹遺書在兹使我悲之銘者是用不費于辭元故將仕郎臨安路録事羅君墓志銘延祐二年仁廟初以科目取天下士左右榜得五十六人時朝廷驟黜舊制一以經學行義取人所得士非故業舉子以應時需者十五六年間司風紀掌綸綍內綜機務外使絶域才不乏使其間居位勇退能以風義先天下則惟羅君求師一人求師諱曽家廬陵新安里登第授將仕郎寧都州判官再調臨江録事以初授宫終焉其退非有扞挌不偶亦非以材具不適時而所慕有大于此者惕乎若不能以斯須留故同年之士聞君之風反自修省失所負挾怡然欲爭君之髙而莫之能也君至寧都蔡寇甫平凋瘵未復奮以身任撫摩芟其強梁剃去宿蠧久乃按堵臨江素號繁劇吏初疑儒者劣于剸裁君夙夜勤恪事無留難期年綱紀修舉一日聞親有疾遂棄官去自是不復出仕以死惜哉羅氏吉望族曽祖士友宋承務郎致仕士友母年滿百故相文山文公與其子弟有斯文昆弟之好奉幣載酒升堂拜母題詩廳壁鄊里榮之曽祖妣蕭氏恩封孺人祖垕父寅君孝出至性親病自臨江歸拜醫嘗藥衣不解帶親終毁瘠異常禫除餘年哀不忘嘗廬母鐂氏墓𬞞食數歲不變事繼母習氏尤孝其死習慟之切至其平居終日欣欣喜愠不色蒞政廉約遇物謙沖自束髮與人交不見幾微𥚹心登第偕同年蕭君立夫舟還蕭僕死給以己從蕭病臨清一月君一月留甘苦燥濕共之未幾蕭即世教其孤遺長妻以女其所為不愧古人類如是泰㝎四年丁卯十有二月二十二日以疾卒于家享年四十有五以次年某月某日葬于廬陵之清湖娶文氏子男一人會之克世其學造物之報庶幾在兹女四人長適蕭霽餘幼霽即立夫子今江西鄊貢進士狀其行來求銘嗚呼余于君為同年又同生昭陽協洽之歲霽來始聞君之訃乃哭諸寢門之外為之銘曰雅之烏烏不止于􅞉而集于枯車之輚輚不馳于坦而陟于阪嗚呼羅君士之以為難兮君固即所安兮而率老于一官兮曽秀才墓志銘秀才曽氏子一漢既沒于江南其兄德元在京師聞而哭之慟知其葬有時奉行狀乞銘于歐陽玄拜且泣曰人之生苟有德慧孰不願有辭于永世也弟一漢實曽氏才子弟今不幸短命父兄不能續以長願得先進一言以傳庶幾猶未死也玄聞其言惻然乃敘而銘之曽氏永豐顯親里大家一漢字明善本曽似翁第三子大父悼其兄之似俞早夭無後以繼之大德十年丙午五月庚午朏生天曆二年庚午五月癸丑朏死是月戊午改至順以是年某月某日葬于某里之原一漢五歲讀書數千百言過目成誦少長無童心年十二三能文章十五六頎然長以辨不尚浮靡不事貨殖篤志道德性命之書能服行其言事父兄善交朋友信遇宗族之長老恭未及壯有學行詞章凛凛趍老成人初師里士劉福逺習舉子業精熟尋執贄臨川吳先生門受諸經説大稱頴悟年二十有五病痰喘以死方疾未甚四月十日有厲風從西北來拔並舍大木似翁蓍得未濟之巽心疑之不踰月一漢乃不起妻鐂氏子男一人萬奴裁四月而孤行述似翁所自作其文不勝哀有甚于德元言者嗚呼為父兄鮮有不愛其子弟者論才不才恩義有不相掩者一漢死父兄若失希世重寶不能自存嗚呼一漢真佳子弟矣乎銘曰麟之不角麛不如殰鶠之不翰鷇不如􅖁奪其所有無豫之為愈墮其垂成無生之為寧坎而深樹而槮無重傷其父兄之心歐陽竒翁先生墓志銘先生諱文壽號竒翁姓歐陽氏玄之族兄也其先由廬陵徙安福之義厯復由義厯徙分宜之防里曽祖子敬祖西園皆篤厚好施與鄊稱長者考登仕郎化龍慷慨以功名自許妣李氏有淑德公生以年月日卒以年六月十八日享年十有賢配彭氏出里名族子所性才幹克家孫吾貫篤問學善吟詠頃豫在朝公遣姪勞豫京師及謁告南歸又勞豫于家囑敘其譜詎意譜序成而公沒玄聞訃哭諸寢門之外不能堪未幾所性懼公湮沒無傳屢以墓文為請將以圖于不朽豫雖欲遲之恐歲月逾邁無以盡情則于墓文又烏可巳耶公自糿頴悟甫數歲讀書過目輒成誦年十餘挾書出􅈬外傅勤謹不懈鄰人有厭其夜讀者公焚膏繼晷諷誦不轍自若也公沒不勝哀慟廬墓三年而後歸仁宗族義鄊黨內外稱之無間言常恐子弟廢其世業延名師儒訓切之日復親督其課夜分乃止如是者以為常中年文學大進不求利逹師表鄊閭晚節深居罕與人接見唯幅巾藜杖逍遙林壑間從一二賔客自娛其髙尚概可見矣以年卜葬安福縣六十七都地名黃竹坑坤申山寅艮向之原玄于公為族弟故不辭而為之銘銘曰裕已範世兮學行允敦內藴弗施兮既臧且淳子克其家兮孫踵其仁勒此貞石兮其永有聞圭齋文集卷之十終
