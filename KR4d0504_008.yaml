  text: 圭齋文集卷之八宗孫銘鏞編集
  hash: sha256:8c4c96c047f20927ddd164c4493bbc261eb50c19dc974d888c87c88af066ef67
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_008-1a}
body:
  text: 安成後學劉釨校正序玊振詩序安成鐂君玊振示豫以舊詩藁佳句疊見而名其集曰進修余見而歎曰異乎鐂君之名斯集也夫進修之于詩岐而為二也久矣殊不知詩固一技技進於道莫驗於詩修辭立誠詩非修辭之要乎胡五峯見朱文公萬古青山只麼青之句改賦之曰山中出雲雨大虗一洗塵埃山更好文公之學専務體用其教學者亦然豈必五峯而以此詩發之也如是則知詩為進修之助豈小輔也哉玊振諸體詩能為麗則不涉輕儇求去陳腐不至峭刻吾又將于詩而得其人焉梅南詩序詩得于性情者為上得之于學問者次之不期工者為工求工而得工者次之離騷不及三百篇漢魏六朝不及離騷唐人不及漢魏六朝宋人不及唐人皆此之以而習詩者不察也髙安儒者曰易君南友恬愈清白之士也富貴利逹不動于其中遊行江湖以得句為樂故其為樂府為諸體詩往往出于性情之所感觸咸臻其妙然其學問亦足以副之二者雖未能㝎其優劣而集中之詩偉然固佳作也京師近年詩體一變而趨古奎章虞先生實為諸賢倡南友從虞公逰昔人云既見異人當見異書吾有以知其詩日進而未巳也李宏謨詩序宋訖科舉廢士多學詩而前五十年所傳士大夫詩多未脫時文故習聖元科詔頒士亦未嘗廢詩學而詩皆趨于雅正舊謂舉子詩易似時文正未然也安成李宏謨彚所作詩以求序讀之終篇語多清新逈出時文舊窠誠可尚也抑國朝取士之文先尚雅與不知舊習浮靡故他所作亦然與抑亦治世之音流布樂府自是始與因序以志豫喜李希説詩序豫訪族安成多見佳士又多見佳作將歸得秀才李希説山中小藁玩之幾不能去手蓋作詩甚難多作不可少作亦不可多作易強少作易艱二者皆不得佳句非句不能佳興乏佳耳境趣之生如不欲詩而不能不詩古今絶唱率由是得也希説此藁開卷第一首雜賦有我欲近自然物物由天成以是求句何患無佳句也豫兹行喜見佳士佳句之多雖未見希説已見其人於詩何時當握手與共論詩之旨鐂執中詩序鳴臯集者安成劉君執中集其所作之詩之編也集成屬豫序其端豫見其集中樂府精深諸體詩壯麗間適信能以詩鳴者今人往往因人已然之窮逹而求之于詩謂逹者之詩從容而有餘窮者之詩戚促而不足殊不知豫之為卦逸樂而有餘者也鳴不當則凶謙之為卦卑下如不足也鳴而當則吉何有于窮逹乎執中之鳴據其境趣之實發乎性情之真吾見其鳴之昌也中孚鶴鳴子和我爵爾縻之象上下感應同出一誠耳異時執中以詩鳴而名實相賔一鳴而聞于野再鳴而聞于天何患九皋之逺乎執中號後梅吉士之老成者云蕭同可詩序詩自漢魏以下莫盛于唐宋東都南渡名家可數而可恨者亦多金人疏越跌宕之音自謂吳人萎靡然概之大雅鈞未為得也至元間山林遺老間暇抒思之詠一二搢紳大夫以其和平之氣弄翰自娛于是著論源委益陋舊尚近時學者于詩無作則已作則五言必歸黃𥘉歌行樂府七言蘄至盛唐雖才趣髙下造語不同而向時二家所守矩矱則有不施用于今者矣是雖辭章一變世道固可觀矣廬陵蕭君同可集所作詩成巨編屬豫序之豫嘗及同可論詩矣凡而晚宋氣格之近卑曲江製作之傷巧同可禁足而不涉是境也矧夫馳騖南北之餘攬燕代之雄傑賭亰闕之美富亦既囊括神竒而用之宜其詩日造夫髙逺而未艾也雖然人之榮遇往往于是占之同可其自此升矣夫羅舜美詩序江西詩在宋東都時宗黃太史號江西詩派然不皆江西人也南渡後楊廷秀好為新體詩學者亦宗之雖楊宗少于黃然詩亦小變宋末須溪劉會孟出于廬陵適科目廢士子専意學詩會孟點校諸家甚精而自作多竒崛衆翕然宗之于是詩又一變矣我元延祐以來彌文日盛京師諸名公咸宗魏晉唐一去金宋季世之弊而趍于雅正詩丕變而近于古江西士之京師者其詩亦盡棄其舊習焉廬陵羅舜美以詩一帙屬豫題其端讀之佳句疊出詩不輕儇則日進于雅不鍥薄則日造于正詩雅且正治世之音也太平之符也鄭箋言詩可以觀治道之盛衰豈不信哉楚與吳之詩不列國風而近世江表詩甚多他日置諸樂府者矣月樓上人詩序余頃得月樓上人投摯五言長律一首思致清醇氣格深安知其為能詩者及觀全集大篇短章亹亹佳作然則唐之九僧不専美于前矣士大夫非無能賦之才進有嘆老嗟卑之心退有啼飢號寒之纍其不爾又有懷祿固寵之思憂讒畏譏之慮昏濁其神志凋落其精華求其嗜欲淺而天機深與山間林下之髙士角一日之長則亦難矣是宜上人之精于詩也大息而題其帙端鄭以道文集序往年鄭君以道為廣右憲史請于部使者以一檄諭徭人數千出降列郡征戍一日而撤其民歡欣鼓舞沴氣頓息使者由是論功進爵後使者至復質往事知功由一檄謂以道曰兩江岑黃拒命兵久不解始以舉措弗當貽畔至今若復馳一檄紵其抑鬱之氣示以禍福之機蠻亦人耳烏得不從使者又説命以道立草檄文遣辨士馳入岑黃洞中二獠得檄感泣曰今日下情得上逹矣乃問草檄者誰斯人得吾逺人情實如見肺肝請悔罪納土各遣子弟奉貢既逹朝廷矜之為之賞賚有差後使者又以是峻遷于是言者謂賞不及以道不可代陳其勞天官為減一資厯而已余為大司成以道調官京師欲見其檄得其古文數篇甚佳而檄終不以自暴後自粵中見寄近制往往可愛今過宜陽必道司讞府中㫝以行餘全集見其大小詩文雜著等作如師中丈人指撝集㝎士卒稟令退就行伍無不整娖又如瞽矇視瞭遞其能堂上堂下之樂各得其正何其能官也世間不善遣文如不解事人作事位置失次令人悶悶以道諸作一一令人意強宜其能官也夫以道所至著稱廉幹在宜春淑慝分明民有郛郭可謂賢矣三復詠嘆敘而題諸劉桂隱先生文集序廬陵劉桂隱先生以文集寄余京師余為之言曰士生數千載後言性命道德如面質古人言成敗是非如目擊古人其間命意措辭則欲求古人之所未道而又欲不背馳古人其事可謂難矣或曰難可但已乎曰不然有一㝎之法而蔑一㝎之用者聖人之于規矩也有無窮之言而懷無窮之巧者造物之于文章也是故巧能為文章不能為規矩偭故常而為規矩者狂之于巧者也法能為規矩而不能為文章守故常而為文章者狷之于法者也今余讀劉先生之文溫柔敦厚歐也明辨閎雋蘇也至論其妙𥘉豈相師也哉又豈不相師也哉或曰妙可聞乎曰妙可意悟耳試從鐂先生求之蓋有不可得以言傳者矣而况余乎雖然余所謂規矩蔑一一㝎之用文章懷無窮之巧者庶乎近之劉先生文傳世可必尤長于詩詩五言古體短章尤佳因書以為之序族兄南翁文集序族兄南翁過余瀏上示豫以文藁讀其文廉靜而深醇是四辭者昔人嘗以稱人之有德者矣今豫以稱兄之文必有所見也兄抱道自足無求于時故形諸外者亦有德之言乎吾江右文章名四方也久矣以吾六一公倡為古也竊怪近年江右士為文間使四方學者讀之輒愕相視曰歐鄊之文乃險徑峭厲如此何不舒徐和易以宗吾六一公乎蓋嘗究其源焉吾鄊山水竒崛士多負英氣然不免尚人之心足為纍焉耳夫文上者載道其次記事其次逹焉烏以尚人為哉歐陽公生平于平心兩字用力甚多晚始有得前輩論讀書之法亦曰平心㝎氣人能平其心文有不近道者乎兄文廉則不誇靜則不躁深則不膚醇則不靡尚願羽翼吾歐陽公之學以模楷後進之士將見江右之文章粹然為四方師表矣贈李敏求序昔者聖人之教學者不貴資質尚學問往往引已以喻人故嘗曰我非生而知之者好古敏以求之者也今世學者率以為聖人謙辭殊不知問禮問官八太廟之問孜孜焉實用其力又非特禮樂名物古今事變為然其曰吾嘗終日不食終夜不寢以思無益不如學也學何事乎禮義而已矣斯言豈吾欺也廬陵朋川李氏唐西平王之後也族多文人有字敏求者屢以詩義貢于有司聞余至安成族中介豫族姪用賔以來見愧無以益也因即其字為序以贈之敏求將去復問曰敏何先曰君子欲訥于言而敏于行吾江鄊能訥言者恆少子敏于內請自訥于外始送虞德修序天曆二年夏洪省馹使虞君德修護送公賦來京師冬十月竣事復乘傳歸縉紳士夫賦詩以餞授余以首簡焉嚮余以諸生幸獲侍德修之先君子蜀郡公于長沙今以文翰屬吏又幸獲從其仲氏奎章閣學士于朝實有世契誼不得辭夫君子之從王事國爾忘家義也故天倫之樂與夫人爵之貴二者之輕重雖較然易知然求其合并亦人世之所難而造物之所靳也奎章公𬒳天子眷遇待問密勿其雅尚髙致固未嘗食息不志于江湖之上思從諸昆于山水之間以暢其平生逹觀之懷而勢有不可能公亦豈得直情而徑行哉德修乃能因王事之便以勞仲氏于數千里之外其樂之叵量此非可以言喻而增秩之華錫豫之寵又適合并于斯時可謂盛矣夫奎章公辨色入直日未入三刻始退就舍然如司馬君實時其寒燠飢飽于其兄蚤暮不懈也今翩然以南意其出郭而送别登髙而望行遙見夫烏帽出沒于黃塵之郊此境此况昔人之見于歌詩者豈非若為今日賦者耶倌人趣行祖道有作請以是為序送鐂文廷之清江録事序安成士登第自鐂文廷始調清江録事得視牧守縣大夫為親民長官自重宜矣其行歐陽玄重告之曰周官司市掌市之治教政刑量度禁令今之録事治城市關廂大略相同而古今之制則不侔矣古者都邑如井田畫為九區前二區為君之宫之廟社之廳治後一區為市左右三區為民居市别為四門日出而啓惟民得入焉蓋二畒半在邑之農也其餘大夫七凡有爵祿者入市有罰所謂出一幕一帟一一帷之類是也內而天子之都外而諸侯之國同一法其君過市則有刑者赦所以别尊卑也古法簡古俗淳惡囂而抑末尚爾今夫録事所治則市人居民出入同其門綜理同其官而况百族之寓公四方之遊士官府之府史胥徒兵戎之遊徼以逮卜祝老釋之流又下而百技工巧駔儈負販奴客倡優淆處而雜由之如是而望其布治教平政刑一其量度禁令如古司市法不既難矣乎雖然儒者將為政必使沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙此亦其有道者乎或聞玄之言而笑之曰迂儒者欲驅市人而讀周公之法欲進録事而行孔子之政其可駴也特甚嗟夫文廷儒者也進士也玄語儒者語市人哉送翰林應奉李一初南歸序國家有科舉以來凡七科二十有一年第一甲置三人三人者皆賜進士及第自元統初元之癸酉歲始南士居第二人而膺是寵者自雲陽李君一初始以第二人南士初登第入官即得供奉天子詞林預典制誥修史事又自一初始是皆儒者之所難遇也故衆人之言曰天以斯文之澤鍾于一初者何其厚耶余之言則曰儒者積學發身可幾其或然也一𥘉四親髙年居此重慶而榮遇若此然後知天之以斯文之澤厚吾一初者又何其至也夫世之人有子若孫莫不願之賢賢莫不願之成至于希有之遇可必于天耶雖然一𥘉得闕內輔而需次再期將使之居則致庭闈之歡出則盡鄉里之情退而休焉又得以繹其所舊聞增其所新習廣其所積博其所施異時登進王朝將以究其所學于其所事是豈獨為四親之榮而已哉此固吾鄊之人吾黨之士喜稱樂道以致其勸相之辭者也送鐂仲宣歸隱東山序豫甲寅乙卯間與計偕至京師時安成鐂仲宣為尚方大醫數𬒳恩寵奏之輒效獲金繒之賜又嘗奉命乘傳至于大漠療疾藩邸有竒功受厚賞于是服飾鞍馬皆華好如素富貴人第見其負氣岸不詭隨又好托難經索問糿眇辨詰同列以故同列往往病之後是三十年再會仲宣于輦下顔色蒼古而議論不衰袖中出東陽詩卷謁豫贈言且豫謂東陽者吾鄊之山名也山有林泉之勝吾雖居此將及三紀而逺引之志未嘗一日不在此山也先生盍為識之豫復仲宣曰漢東方朔言馬門可避豈必深山之中蒿廬之下豫愛朔言大似有理士君子涉世以迹不以心故能無纍于斯世朔譏猾倣睨處公卿間無所避忌雖待公車彼山林士孰能尚之哉仲宣躍然曰吾榮吾東陽歸有日矣聞先生言其能以留乎請書以為贈送鐂仲賔歸安成詩序老病侵尋蚤引年命車先向里門懸獻方謾有求文客市藥應無買賦錢顧我燕毛慚晚進感君鴻寶試家傳青原舊友如相問雪夜時乘訪戴船延祐乙卯豫𥘉擢第國醫鐂仲宣訪余旅邸時醫道甚行方𬒳恩寵但見論議辨説豫􅐁無少貸心恐其不見客于同列也泰㝎丙寅余召入朝詢其近况衆醫曰仲宣謁告歸矣至正甲申余以總裁三史之命晚歲復入詞林中仲宣亦至自南中比𥘉鬚髮蒼白而不少衰後輩亦嚴憚之未幾從余求東山序浩然有歸隱之志公卿貴人偶有難巳之病衆醫相視縮手思吾仲宣而不可得矣去冬豫以病告老歸瀏上客有薦劉君仲賓為豫診候問之仲宣乃伯氏也其取藥服之無疑知其世醫為可托既獲其效尤敬其為人仲賔身居市肆而無啇賈計利之心口誦醫書而有儒者救世之志是可尚也歲莫别豫還安成且求豫詩詩不足以盡豫托交之意又係以敘云送伍成均南歸序昔子路言志聖門願車馬衣輕裘與朋友共敝之而無憾他日夫子稱子路衣敝緼𫀆與衣狐狢者立而能不以貧富動乎其中誦詩之不忮不求以美之二事正相表裏子路之所志即夫子之所稱也今世布衣之士好以惡衣羸服傲視簮紱往往援子路以為依據殊不知子路所言車馬輕裘則其平生服御未嘗不至于華且好也惟己之華好猶思與人共之雖敝無憾則人之華好在此無羡在彼無媢非所謂不忮不求者乎自世以科目取士士子得失之相形有大于衣敝緼𫀆與衣狐狢者矣安成伍成均奮起世科之後領薦于鄊試預貢于春官而以額溢小却乃能泊然不以得失入于其心是可嘉也矣嗟乎成均今日之偶失利不以人遺已為憂他日而遂得雋其思與人同其樂也必矣故以子路之言志亞于曽點之浴沂者告之且使其駸駸于聖賢之事當自此始也慶鐂一山八十序廬陵鐂公一山先生明年八十鄊俗于其𥘉度之日豫致耄耋之慶子松州判官省吾適留京師將謁朝之縉紳士為歌詩歸以娛其親謁豫為之序余謂省吾曰水陸之竒南比之産籩豆之珍脆筐篚之麗密咸萃輦下君幸至于斯思所以為尊公夀者捨彼而取此何歟省吾曰不然吾聞君子致其愛敬于親飬志為大口體次焉君何責我以口體之奉乎且口體固不廢也親志之所樂為之子者豈不知其所在乎此吾之所以有請于縉紳士也余謝前言戲君耳雖然當廣君之意以告同志昔者衛武公年九十有五猶諷其大夫官師日誦雅以相告戒夫衛公固以是為進德之助然而音節之和有以宣其湮欎聲文之美有以導其愈恱衛生延年之道其有以加于是乎詩曰為此春酒以介眉夀介之為言助也介必有祝頌之辭辭意而已矧歌詩者又有益于壽乎願以是為作者之倡云圭齋文集卷之八終
