front:
  text: 圭齊文集卷之十五宗孫銘鏞編集
  hash: sha256:c355ce6e3e2301ba19a17466a1c0c0064cba1a7cc603a89a0bdacb079bfedd22
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_015-1a}
body:
  text: 安成後學劉釪校正贊御書九霄贊聖人居潜如日未旦待其將出光景于粲若木蟠桃實生海濵天光首被先萬物春離麗正中烜赫八表物物容光莫獲私照上在桂林臣有震宦躬荷寵顧染翰賜之作其踐胙億兆悉臣欲攬天章幾千萬人向所蒙恩曠遇希世隋珠和璧曷足言異今雖近臣孰敢奏請仰瞻雲漢惟有引領日邉之氣其名曰霄陽數用九乾德孔昭龍飛之徴有開必先形諸翰墨夫豈偶然天啓淵衷神助筆力震畫乾𥘉洞見天則猗嗟震宦世世寶藏億載萬年為龍為光麟鳯二大字贊皇太子習大書端本堂上命庋其所書記之于籍或以賜近侍宫臣則録所賜人姓名而登載之慎重之至也宣文閣授經郎浦江鄭深其官署既在內府與青坊密邇深家又以九世同居聞自諭德以下咸樂與之逰因得侍硯席𬒳寵顧故有是賜焉所賜為麟鳯二大字若曰同居為國家之瑞有若麟鳯云爾筆法方嚴意度閒暇天縱不凡深得之允為慶幸屬玄記其事于下方謹拜手作贊辭曰春宫臨池神助腕力結體楷嚴運筆端直上命宫臣以時貯儲遇有賜豫籍而記諸深仕延閣授徒宫庠獲陪燕翼膺是寵光維麟與鳯肇錫孔嘉有之似之瑞我國家潘雲谷墨贊徂徠松雲貯玄谷道人居中抱其獨琅琅空山萬杵熟道人曄然開電目松雲化石石化玉崢嶸寶氣霄漢燭貢之奎章月在櫝龍光淋漓九宇福十八羅漢畫像贊我觀應真玲瓏八窗具妙用故示諸愚憃世言神通自墮幼哤匪𣑽匪漢匪竒匪厖見師即呵孰前摶控千花冥冥百泉淙淙猿吟鶴飛白雲空谾龍伯山君巴滇蜀駹爪剛力獰冠詭服厖或象瑜來或于莬降信攝平等詎分珉玒如來在時慧日萬邦既入涅境俄然膏釭固修第二有二無雙矧此苦海實資徒杠南浮諸方金鼓肆摐建論性相樹兹疑幢彼不見月指月在江渟為泓洄激為湍龍我無成虧喧寂一腔此歐陽先生閒暇時著意為鐂仲賔題此草韻仲賔避亂客固江黃氏子魯所因以遺之識者當因文以重其畫不可因畫而泛觀其文也馮翼翁子羽觀跋為防里族姪題兖文忠公像歐陽永叔文在兩間與世推移道之將興文必先知八代萎蘼韓歐繼作讀者贍之實啓濂洛五季巨筆素王微權本論拳拳慶曆七篇人心既正士習斯淳黃河泰華我公其人自贊不古不怪不清不竒置之竹籬茅舍似無不可貢之玉堂金馬亦無不宜噫百年三萬六千日與吾相對吾亦不知其為誰族兄山村先生像贊實踐真修洙泗之學闊視雅撡箕穎之風節用謹身充而逹乎曽閔之行存心養性悟而超乎松喬之宗子孫極髙年之養而志存舊日之儉素鄊䣊推丈人之行而身教後生以謙冲郡侯賜帛重于鄉飲朝廷表門侈于素封是宜濟南諸生追懷九十之伏勝襄陽過客想見百代之龐公族子秉彜像贊山村子也以治官之能治家以應世之智應族不遺履舄任用咸當不勞鞭算資具自足心平而直何事城府行簡而易豈資邉幅有子孫之賢可恱情性有山林之勝可娛心目人見其康健而期為山村向上之夀我觀其忠厚而知為歐門鼎盛之福與靜修先生畫像贊先生姓劉名因字夢吉容城人至元中蒙𥙿宗召為贊善辟集賢學士皆不拜微點之狂而有沂上風雩之樂資由之勇而無北鄙鼓瑟之聲于𥙿皇之仁而見不可留之四皓以世祖之略而遇不能致之兩生嗚呼麒麟鳯凰固宇內之不常有也然一鳴而六典作一出而春秋成則其志不欲遺世而獨往也明矣亦將從周公孔子之後為往聖繼絶學為萬世開太平者耶默先生畫像贊東平安民寤寐乎明善誠身之書步趨乎格物致知之學關西三鱣未必榮于教授之四世荀陵八龍奚以過于伯仲之一壑豈非白茅作而忠信著玄酒淳而嗜欲薄者乎鍾期伯牙有同世而不相遇者吾胡于默之神交而益以重容城之先覺也威如蘇先生畫像贊英英𬗋芝皎皎素絲冥搜逺討默識近思子雲精深季海孝友德人之容君子之守郎中蘇公畫像贊維子寧父為名卿士其心塞淵如古君子既合于古誰諧於時職是正直弗究厥施居家嗃嗃在國諤諤屹如長松矯如一鶚蚤以讜言屢忤權相晚著惠愛足食邉餉剛者必仁仁必有後宜爾有子簡自造秀遺像儼然不亡者存九京可作孰敢吏雲曽文辿像贊先生之學吾誰與稽吾有源委澗瀍東西先生之書吾讀未遑吾有徴信季通𬗋陽大道無形公獨有像神仙不死公獨有葬葬留仙訣像馭仙風止乎觀丘池水澄融魂月魄水息慮艮止鶴鳴長空騰化震起遺鈐記傳嚴密謹言感發人心何日已焉防里族姪友人劉伯常名彛贊鐂氏奕世以更著號何事于更一變至道不變者存于其保之字子以常名子以彛陽明軒太玄子龍閶闔開蜿蜒回寶劒出天馬來疏寶雲禪寺題疏唐㑹仰小釋迦上彤禪師作雙峯禪寺于石鎖峰下迄今稱名剎座席多叢林望士至則咸有所樹建舊殿僧堂作者為别傳泓法堂為晦谷輝鍾樓為夢作滿南廡丈室為近年謙山福今堂頭一清徹公克武前仰瞻佛殿屋老思撤之揣力弗贍以余舊家宜陽寺邇吾族求作儷語發端巨家兾獲資助圖維厥新詞曰唐剎占山水之竒舊多勝迹瞿曇備天人之福必有廣居維兹寶雲雄我鈐邑翬飛傍峙已聳巗瞻象馭中臨未崇殿制兹欲裒多益寡舍舊圖新即蕪陋以徴辭謁華腴而求助于是講遺規于娑馺證妙境于率陀長者布金祗園咄嗟集事老人懸車故里讃詠成功故疏書啓附與所性姪書自夏謁告祠垣道假江左取便欲經祖郡省墓譜亭之行途中暑劇心與迹違抵家以來且人事蠶叢文債日生逺辱慰問但卑叔在朝沗自從臣未罄黼黻之報恩及二代兼蒙賜碑榮幸不勝今遣僕老李特賫敕賜碑一本相奉别致薄贐贈諸族屬煩吾姪分俵勿患其寡而患其有未至也邇者賤疾百病交攻使者復促上道起居未可自必老僕即使之歸似難稽召命舟中欲使任其扶持之勞家兄而次雷此致問不宣答意山先生意山聘君老兄文侍玄去冬防里彌月之留涵濡道德之味于骨肉之情得于兄所教良多逮今銘感未已令郎來辱惠問勤懇第恨溢美辭多令人讀之赧然賤跡自正月中旬以來右膝腫其痛如剜始者護痛不敢屈信久之兩足筋攣即目行立俱廢稽延召命恐違官針遂援年雖未及身委有病自願致仕者聽之例移文有司行逹朝省兾此庶得藥褁􅌹心然亦沉痼如舊書來所謂促裝上道那得許事耶令郎𥘉至適值病體服宣利之藥遂致泄瀉不已困憊不䏻見客數日稍復當圖報深愧莫䏻效毫髮之助聞張毅甫尚書除江右憲使其人相知力疾作一書干之或䏻相汲引一試也側聞兹歲垂帳仍在舊館郡泮必時至彼諸生常得親炙老成亦幸事也餘惟萬萬自愛占答崖略不敵先施等于尊照不宣又與意山先生書玄壬午譜亭之别于今六年都下蒙惠書但送書人乘便即行往往不别而去不及報書為歉方馳仰間令郎至荐辱佳翰承寓居春㙜夀履康裕殊慰殊慰文集舊序如戒更寫令郎所著易問辨甚佳已為作序第愧病餘意緒不佳乏好語也令郎氣宇明爽因推其八字非常發逹行當擢科吾兄收義方之效享榮養之祿計日可待也劣弟蹣􅘐如昨右臂時苦風氣流注大為所窘最是文債日生無少休息令人悶悶未卜㑹期惟以道珍嗇草草伏希尊照不備回所中書猶是癸卯年叙譜以來今三十有五年矣是時不肖與所中俱在子弟之列每思幼從兄弟之樂今復欲爾尚可得耶去夏謁告祠垣假道江浙初意徑趍洪袁一訪故耳中途劇暑遂與願違老僕還聞族中諸公相候甚久令人慚恧無已兹逺席宗庇自沗從臣恩及二代兼蒙賜碑尤出望外受寵驚懼蒙書乃以賀言惟重怵惕祖塋題表之喻僕何敢當第曩歲侍親春陵見元公家數世之墓皆太守方孚若為題之他日援此故事或得一名筆表識亦未晚也踐迹近叨兩召貧病交窘居行未知攸措吾姪何以告之儀翁還􅌹此占復潦略等幾孚照回所立書相距五百里相别十五年逆旅倚伏靡不更常起居動靜邈焉無從忽宜翁兄携所惠書得之驚喜相半追憶曩侍先君子琴册適執事自綵侍來以拜見退相從齊閣是時僕與執事俱為人子弟一門自為師友之樂有不容喻今日此况此味惟屬之所立仰為名門雍熙之軌翁季道德之盛異時秋蟬賦側耳獨領略吾知叔弼久矣兩科士論殊以魯生不來為恨六月之息三年之鳴端有所待他日榜中龍虎第一相承舍君其誰政當堅坐冲密守庚申耳區區遭時承乏何足置牙頰來書諄諄然及之令人卷舒愧瀋可拾甚者以六一為是何以美疢强加我耶此公事業未論其他只蘆荻畫地我輩曽受此苦曽下此工夫否此則斷斷然不夢見腳板者也廬陵長沙之議不謂兹事亦徹聽聞僕在二郡不趐滄海一稊或者之語僕亦不辨惟應之曰僕為崇韜不敢藉談尤不敢也不敢布素一語亦告者過番氊瘦馬自是鄼億家風且先輩三尺森嚴在前何敢猖獗一步寄示畫軸皆米家虹月惜蕪穢不足發揮歲晏百冗填委宜翁行又遽尊翁朝奉令叔意山學士令弟芳茂暨族黨諸先逹皆不及顓狀敢告申敬何時譜亭叙拜以罄鄙懷家兄而次附致謝臆等幾魁照不宣回鐂申齊先生書玄頓首再拜復書提舉聘君申齊先生丈席玄即辰清和承體候佳勝濟南耆年有相之道不勝願見之禱吾宗振先來辱書且知姪孫宗任客臘參謁座下第緘寄雄文逮今未至不審何故亟稱督索端便復命隴阡樵採之禁事出當然流言之惑實無是也區區抱病三載始獲一歸心志凋殘舊學如失其不䏻為先正大夫役也審矣適候卜氏女病振先就之相見借紙占酬凡百潦略惟鼎茵加毖以夀斯文謹奉狀不宣答劉桂隱書玄頓首再拜復書桂隱先生執事玄視廬陵江鄊乃未獲一寓桑􅎚之敬諸鄊先生亦未嘗一望履絇虛名誤人僕僕南北抱兹二缺負負奚文先生道德之重藻鑑之明今先之以書且有文集叙之喻僕何足以叙髙文之後此亦虗名誤聽聞耳踵襲訛謬如是不已豈不甚可畏哉僕自去春痺疾盛作一歲之中謁告十九今者又有哭子之戚倀倀南歸豫環之使要諸潞上夏初誤恩落侍講升學士俯僂循墻逮今未敢拜命心常怔忡舊學廢忘仲賔還姑爾塞責滓穢髙明知罪知愧盛暑力疾治答不敵先施切希照亮答孫春洲書玄頓首再拜上記春洲聘君先生玄讀天台賦金聲嫋嫋吾耳將二十年識公于此蓋久昔人識心在識面之前斯謂知已族弟志行家人至辱佳翰勞問勤懇殊慰瞻馳第玉署再遷之言此傳說者之謬幸勿過聽區區抱痾三年朝廷熟察而深憐之譬之病駒不任銜勒置之茂林豐草之地使之姑遂其本性豈有復可驅䇿者哉令郎才俊自當不乏知遇萬一邂逅在他人尚䏻推轂豈敢愛一援手之力于秦晋之戚哉價旋力疾占答秋杪冬𥘉必到防里胥晤有日餘儲面賦草略切希照察不宣又玄頓首再拜春洲先生契友玄嚮在史館與曼碩揭公談江右人物揭稱譽足下才美在臨川孫履常何太虗間㑹見咄咄逼人他日相知翰墨中益見故人藻鑑之髙日者弊族諸子弟見過又知結習斯文固有瓜葛第恨才薄資淺仰慕前修薦士不得倣佛其萬一耳所求春洲詩及大字草草塞責報章逺勝作者子昻墨蘭自是佳品感愧無斁區區劇暑抱病趂便裁答不敵先施尚幾照察不宣與張憲使書都門别後賤跡尋亦謁告還湘相距地逺乏便致書惟深馳仰近傳全除目共諗移軺􅏅浙弭節西江西江之民蘇息之期實在此矣僕先世西江人也里中長老時相往來語及公來相與喜抃少白僕近訪族族中少俊甚多有姪原春者其才足以應舉然得失未可必袁州路學薦為直學例必經憲司試驗欲望相公賜一援手之力他日寸進實出陶鎔何敢忘也賤體入春以來痺疾愈甚兩足筋攣行立俱廢雖被召命自度病勢如此未見即愈自願休致之章已逹有司每日從事藥褁而已為况無足為知已道者舍姪行顓此起居未中冀順序珍嗇行膺柄用不具備慰國博喪母書玄頓首奉慰文廷博士至孝玄不意慶門倚伏之㑹先大夫人奄棄榮養緬惟哀痛奈何玄聞變不勝慘怛已僦小車詣行府申唁昨暮適苦痰嗽鬱眩之證又聞車行甚亟勢未獲面㑹中統若干聊為雇車之資道逺兾節哀順變以襄大事手疏潦略不具與劉文廷書玄手書再拜上文廷博士提學相公仁友玄往夏去國同列中以不獲一言以别為恨客冬還鄊久之又以不蒙一紙之寄為缺今夏忽睹除目承有儒㙜之擢既喜且駭其喜則以國𥘉甚重此職覃懷許公由是拜左轄亦愚葉公由是拜右轄大德中吳與趙公由是入為待講吾文廷居之允愜士論其駭則以賤跡離翰苑時當揆力勉其留其言以為斯文漸覺人少僕抗言薦數士為代如文廷皆其列也當揆蓋嘗諾之今忽外𥙷非文廷求出必不爾也已而果傳有子夏之戚聞之胸次作惡者數日昔有三人聞客言虎患一人蹙額特甚僕其人也才不才亦各言其子往年嘗以此致心疾後來熟思之理數自然皆有乘除修短存乎其間莫年䀌傷亦復何濟不如姑聽造物所以處我者何如耳劉仲賔行亟此代面外有一啓極知剩出或可助發一莞聊以寬君之憂也僕態勝舊近又苦痰暈之疾但夙緣無涯竟日為人造綺語業殊可厭也毫楮草草希照亮啓兹諗輟班學省進秩文臺晨入都堂陳衷懷而求去晝歸六館别同舍以治行綸綍及門輶軒在路既許即家而為府又容需次以申情仕宦以稱職為稱心宜無內外重䡖之辨賢逹唯知義故知命自明禍福倚伏之機故于趍賀之緘輒為譬解之語孔文舉楊德祖古人所親即兒羡門子浮丘公今世未聞有後首尾不嫌于衡决肺肝所托于深知毣毣馳忱匆匆闖便回有壬許參政啓辱示謙鳴喜新賁治包胥感無衣之賦竟償復楚之言相如獲全璧之歸始著却秦之勇蓋人之秉忠者必遂而物之拂性者終還追惟往事之堪驚益懷髙位之難處文埸有議豈容居西掖而弗知丹詔驟頒乃獨使東􅈦而恭聽此挾姦回之祕䇿欲摧俊又之前茅尋移疾以去官姑待時而俟命生意已存于碩果大材寧繫于匏瓜皇天實鍳乎臣衷聖主自㝎乎國是豫環鶴渚公曰盍歸乎來哉授柄鳯池衆謂兆足以行矣屬開端于更化嘗效力于代言然非烏獲莫勝曷免絳侯見沮急迓輶軒而傾蓋真同韋布以彈冠洎僉黃髮之謀親預緑章之寫于是退前日掩奎之宿即當時押角之人嘉與賢䏻洊行周家選舉之法至詒朋友共播虞廷賡歌之音第愧踈庸莫陪揚厲王通受罔極之賜惟乞間身孟明收再效之功當書逸史亟酬先施倍切歡悰祝告文天卑寶命列聖相承貽萬世之丕基輯九圍之至治顧兹菲德嗣守基圖念皇考之上賔結孝思之罔極爰舉徽稱之典躬陳時祝之儀尚兾垂歆敷錫祚胤明宗皇帝附廟祝文于穆皇考聖德配天何臨御之弗遐儼威靈之如在顧兹冲眇嗣守皇圖惕惟丕訓之承祗奉鴻名之舉是用躬執圭瓉薦其苾芬仰惟願懷來格來貺焚黃祝版維至元三年歲在丁丑二月朔壬申越十三日甲申孝孫翰林直學士國子祭酒玄敢昭告于祖考贈中順大夫中書禮部侍郎上騎都尉追封渤海郡伯淡軒先生歐陽公玄奉元統三年甲戌三月制書以玄沗列藝文大監備位三品推恩二代贈封祖考官職勳爵如右是年九月以書到家告廟改題且遵彛式為玄尋遷大常翰苑等官限以職守今者謁假來歸告墓之典始克成禮惟我祖考懿行粹文師表湘楚惟誠㳤人惠利後學儒者之德莫盛于兹餘慶所被施于諸孫獲承國恩致有褒贈思昔咸淳甲戌鼓篋上庠在其當時六館諸生為厥父母咸得推恩世運遷移先考齎志六十年間歲運一周積善之報久而罙彰有若此者侍郎法從之官貴列八座渤海大郡之壤崇視徹侯載燔密章昭侈上賜伏惟膺此寵光濬厥福澤庇賴我後益熾以昌謹以牲齊殽饌式伸䖍告焚黃告后土維至元三年歲次丁丑二月壬申朔越十有三日甲申翰林直學士中順大夫知制誥同修國史國子祭酒歐陽玄敢昭告于官榮橋白雲菴后土之神玄欽奉制書贈封祖考中順大夫中書禮部侍郎上騎都尉追封渤海郡伯爰擇榖旦燎黃于塋惟神苞流崇深頴擢明秀相我先祖妥靈于兹芘厥後又本固枝茂實惟神庥惠徼方增報祝敢後自今以紿恩休數至維爾明神亶有榮耀尚圖利之謹以酒殽庶羞式伸䖍告防里祭祖祝文二大元至正二年歲次壬午十一月己已朔十有三日辛已曽孫翰林學士資善大夫知制誥同修國史玄謹以牲酒之奠致祭于防里第十一代祖七承事府君歐陽公墓前而言曰禮去鄊國省墓而行重違逺也先世遷瀏動踰十紀井邑既殊歲月既久踈逖松檟事勢使然餘慶所覃靡間彼此玄自竊科第登進公朝備列法從推厥本原敢昧所自謁告來㱕展省墓下追懷雨露怵惕深增惟我先祖流慶後昆願自今始無曠彛禮尚享防里歐陽氏始遷第一代祖府君墓前人本乎祖百世匪遙精神旁通體魄如在逺孫席庇展省還鄊萬木一春萬水一清豐本濬源用永有譽惟我先祖實克相之祭后土文二防里第十一代祖墓后土氏之神先世遷瀏違逺墳墓曽孫展禮宅靚以固祖考來歆神亦惠顧濬靈鍾奇錫我蕃祚我族既惇百世無斁尚享防里歐陽氏始遷第一代祖墓后土氏之神自吉之袁我祖始遷妥靈兹阡今三百年髙山蜿蜒其上隆然神相我后慶流如川翰林國史院祭揭侍講文嗚呼公之道德忠厚篤實洞徹內外公之文章純深爾雅警發憒憒方館閣之踐敡實昌期之際㑹密勿論思從容進退當譽望之日隆惟恪恭之弗戒掌斯文于玉堂贊皇猷之光大侍講讀之經幄知啓沃之切聞待引年而挂冠戒舟楫而南邁帝錫命而來還兾黃髮之未艾遹聞詔之方殷思竟考夫前代詔總裁于三史庶緝熙于帝載天不憗遺慨其殄惟我同僚思其莫再望望喪車悠悠丹斾尚期英爽歆此薄酹祭子逹老文至正元年歲次辛已二月十一日老父八翁即大都崇仁門之寶泉寺為特羊舉酒殽之奠告汝十二郎上舍之靈曰嗚呼哀哉尊者哭卑者而哭于暮年生者送死者而送于異鄊天下之慟有甚于斯乎吾年五十餘而無子也既以汝為子矣凡吾老身之侍奉後日之繼承惟汝是賴一旦而失所望焉天乎人乎孰使老父罹此毒乎以子之學可受茀祿以子之孝宜享夀齡天乎人乎孰使吾子至此極乎丁丑之秋赴名北來汝伯汝叔送吾與汝他日吾還汝獨何往吾亦何面目見汝伯汝叔乎汝之生父吾之愛弟也久矣抱痾遂廢宦業令聞汝訃還數千里其將何以為懷乎為之兄者又將何以堪此情乎且汝之病吾謁之醫而竭之劑汝之斂吾致之禭而哭之痛猶以為有憾也吾弟于汝其病也不見所服之劑其斂也不見所禭之衣將何以解其憾乎吾于汝身虧顧復之義失父道矣又于吾弟乖付托之意失兄道矣二者胥失其將何以逃于天地之間乎吾才不逾今之中人吾學不及占之下士祿寵踰涯不自乏絶釁鍾後人致汝夭閼今雖知過其可及乎去年送汝先至通州汝柩發後有詔止之留汝一年不遣行者欲送汝也今兹將行詔又止之其敢違乎勢難再留計無從出專遣幹僕托之信友扶汝護汝先還家山昔汝孝行感于神明生不獲祐死當蒙休汝登舟車無震無驚汝涉江湖無恐無怖魂神清明依汝體魄吾今抱病逾二載矣其哭汝也淚盡而斤枯血澀而心悸虗名禁持無所告訴上天監臨終遂所請歸治汝喪歸立汝後然庶幾周吾父子之情塞吾兄弟之責也汝其有知强飲强食往即長路以還故鄉其無以老父留此為念也嗚呼人世之别有慘于此者乎老父之哀其可巳乎其不可已乎圭齊文集卷之十五終跋元贈亞中大夫歐陽公神道碑後元歐陽圭齊先生玄本分宜防里族寓居瀏陽登延祐乙卯進士第􅍓官中外四十三年終翰林學士承㫖文章道德卓然名世朝廷寵眷終始甚隆加恩于其父祖者屢矣方先生為翰林直學士時制贈其父成叔翰林直學士亞中大夫䡖車都尉追封渤海郡侯而奎章閣大學士沙臘班為請命侍講學士張起巗撰碑文侍書學士巙巙書之起巗與先生同年且同官故于碑中叙其族世行誼為詳而此本蓋當時摹之以遺防里之族者也防里之裔曰鏞裝潢成帙將永藏之以為家寶間來京師持以示子求跋豫莊誦再四見其家世文學之美行誼之髙然後知先生之所以顯融光大者有自信所謂積厚而發弘也不勝起敬焉且是碑立于至元丙子迄今百二十六載而完好如新非什襲而珍藏之其至此歟然藏于家孰若藏諸身碑中所載世可法也使為宗族子孫者誠法其所為心念而身體之溢淬礪乎文學敦篤乎行誼以求及乎前聞安知無若先生其人者出以大顯于時哉昔六一翁以文鳴宋而先生繼之固知繼先生而出者尚必有人信歐陽氏之多賢故也鏞字光樂為國子生拜官且有日而才卓卓又今防里族之翹然者其他子弟志學尤衆承先啓後庶其在此因識于碑未併致期望之意云天順五年歲次辛已冬十月朔賜進士及第中憲大夫太常少卿兼翰林院學士知制誥安成彭時跋
