front:
  text: 圭齋文集卷之三宗孫銘鏞編集
  hash: sha256:0a858bf2743cc0d760a67cb05844544a744050298fc0a27e23de756cf742c2a8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_003-1a}
body:
  text: 安成後學劉釪校正七言絶句喜門生中状元泰㝎丁卯八月十二日崇天門傳臚賜進士右榜第一人阿察亦左榜第一人李黼皆肄業國學日新齋余西􅈦授業生也是日京尹備皷樂旗旘麾盖甚都導二状元入學謝師拜余明倫堂榜眼鐂思誠探花郎徐容甞因同年黄晋卿彭㓜元從予逰亦拜其側其餘進士以門生禮来拜謝雜遝不記姓名圜橋門而觀者萬計都人以為斯文盛事昔未有也同寅舉酒相属偶成四絶以紀其事昔被仁皇雨露恩三朝五度筞臨軒小臣報國無他伎舘下新添兩状元禁院層層桃李開天街繡轂轉晴雷銀𫀆飛盖人爭看兩兩龍頭入學来淡墨題名二十年一官獨自擁寒氊居然國子先生舘三五魁躔拜座前都人舉手賀昇平不羡黄金遺子籝進士從今成典故唱名纔罷拜先生天暦庚午㑹試院中馬伯庸尚書楊廷鎮司業及玄皆乙卯榜進士偶成四絶紀其事出院明日有敕督修經世大典又成小詩寄諸弟省垣東畔至公堂十五年前戦藝埸飽食大官無補報兩科来此校文章御史承差鎻院門侍臣傳詔出天􅕡試官𬒳命聮鑣至同榜三人出謝㤙長樂鍾鳴柝號時三台八座列參差自憐手把天瓢水一滴鄊関不得私聖主宫中逰幸踈日臨袐閣玩芸儲昨朝蘭省纔開試清曉玉音催著書别駕祠前雪水渾弟兄沙上舉離樽三年不洗来時褐要看淋漓别酒痕薊門城頭過階塔一一行人通竇間今朝送客又還入那忍更投名利閑香山山頭新月彎一似家里㸔西山去家五十度强望圓璧何時照我還仁廟初科射䇿郎如今斑白玷朝行東風昨夜聞歸鴈夢繞江南烟水長夜開金鑰詔詞臣對御抽毫草帝綸始信朝家重儒術一時同榜拜三人試院偶題贈巽齋蓮燭通宵擬御題槐龍風急漏聲遲玉堂冷透青綾被憶佀灤京五月時小雨隂風夏夜䦨穿窓撲面雪成團平明笑與長官說天上玉京如此寒聖徳文明鼎運開相君承詔謹掄材誰言慶暦科無補中有韓歐富范来百鵠充庭氣若虹千蠢食葉響春空東風一夜吹嘘力明日紛紛緑又紅鯤鵬一化徙天池白日青雲在頃時我以世科慚克紹那能妬喘更笞兒陳編矻矻老無聞寂寞箕裘㡬許存方寸畱耕猶有朢擬㝷手澤訓諸孫所貴姪梅老樹縦横出氣條一枝還又亞牆腰西湖湖上掀蓬看一夜吹香滿六橋為所性姪題小景緑樹清江遶舍邉門前長泊徃来船休官亦欲来林下只恐人嗤我學仙所性姪家蔵東坡看竹圖銀燭髙燒照艷粧繁華過眼巳相忘㪣門自愛看脩竹未必􅎋勤為海棠所性姪蔵所翁全身戯珠龍萬户千門夜半雷明朝日岀五雲堆老龍引領春消息玩弄明珠未肯来漫題四絶鈴索無聲玉漏稀青綾夜直月侵扉五更一覺梅花夢催得江南學士歸屬官分住省郎曹省樹年深過屋髙翰長晝閑来啜茗下簾危坐聴松濤鼇山六月少蚊蠅四壁松風動畫繒長貳聚􅈦清澈骨一人人繫一㗸氷翰林老屋勢深雄猶是金家兀术宫㝎鼎初年曽作省至今門徑鳯池通為琅溪題折枝海棠點綴春風只一枝此花猶是半開時更令老杜如今見便是無情也賦詩萬竿煙雨圖森森萬木種清和柰此霏㣲煙雨何千古首陽宗二墨清風又佀不須多墨竹踈枝淡淡與濃濃垂葉應無靃靡容玉立滿身都是雨何人䏻識葛陂龍驢上曉寒圖水聲山色畫屏中衛子凌兢兩䄂風曽向天津橋上否誰從驢背覔三公㶚橋風雪圖漢樹秦雲一色黄新詩拍塞小溪嚢藍關尚有朝陽債不識先生有底忙玉林琪樹路漫漫驢上凌兢兩䄂寒一叚乾坤清意思又駈老子出長闗學士烹茶掃雪時當時巳被侍児嗤㶚橋驢背何為者直要衝寒去覔詩驢上凌兢兩手龜南来客子為㝷詩而今十倍瀘溝冷偏許青雲熱士知宣和梅雀三牛圖兩竪騎牛過逺村一童横笛弄黄昬老僧正觧荆舒字坐愛三牛了不犇萬竹圖露壓煙稍整復斜有時風㝎翠交加閒身幸老清平世喜見鵷雛待竹花宋徽宗菌圖地上層雲起玉柯依稀遺墨認宣和莆陽相國君知否好作齋房芝草歌髙宗御書君王不受辟寒釵永巷泥金進損齋欲上大清樓下石啼鴉落日滿宫槐陳摶睡圖陳橋一夜柘𫀆黄天下都無鼾睡床嬴得墜驢閑老子為君眠斷白雲鄊雪夜訪戴圖雪夜操舟童僕勞偶然㱕去便稱豪若為返棹成佳趣轉憶當時不出髙呉西村雪霽圖鄭䖍能畫又䏻詩獨立經營雪霽時曽向湘江挐釣艇賣鮮沽酒鬂如絲老蒲萄半蝕秋虫老葉皴祖藤孫蔓淡濃勻何人偶值髯君睡奪得驪珠足眩人蒲萄院落隂隂一架秋新鴻聲裏月如鈎老龍偃蹇垂無力戯吐玄珠不肯收子昻雪鵠水晶宫裏文章伯當世誰知翰墨名頼有瀛洲光價在不曽承詔寫鵁鶄墨荔枝向来千里騎塵紅生色羅𥜗濕翠濃顔色似嫌妃子涴蕭然猶有墨君風鐂山立梅圖山澤癯儒面目真見梅徃徃見先人屋梁月色新湔拂茅舍玉堂同一春天師月梅圖隴頭誰寄一枝来多謝天公巧剪裁猶自夀陽粧額後到今玉蕋忍全開寒雀梅斗柄𥘉開第一枝逰蜂寒雀巳先知相逢不忍輕飛去直與梅花了歲時榮碧潭全身龍巨壑深溪萬水潨四時濃黛浸千峰天衢邂逅全身露還信碧潭盤老龍榮朝瑞正面龍天光恒赫五雲間千仞丹梯不可攀鰲禁侍臣今白首㡬囘正面見龍顔榮建翁家蔵陳所翁龍畫龍居士舊慿㷱能寫青雲隠見蹤阿堵神光留意䖏肯教飛去葉公龍夀卿龍頭聖朝龍首六七軰總是知心識面人我亦待渠頭角老不知誰命繪麒麟吾友龍頭少年不學躍天衢便𬒳良工寫入圖老去全身何所隠㑹當謁帝乞江湖山間山水手卷十年京國㸔圖畫半幅雲煙亦惱儂今日身行屏障裏却思移住最髙峯又動靜之間毫髮㣲要扵㣲䖏動天機一中消息君知否玉琯葭灰夜半飛醉翁亭障為南翁作長史琵琶皮作弦使君眉宇飲中仙滁山滁水渾堪畫獨有風流意不傳武三思雙陸上陽無子局方䦨又到乗龍第一盤餅餤未来聊藥耳郎君好好點籌㸔贈翠璧玸講主上人官寺講華嚴聞說心華日日添晚歲結茅依翠壁龍嵐乕氣滿晴􅉉贈彭漢節君家已有笏堆床惟勿筌蹄書傳香昨蓿山堂中夜起西窓燈火誦琅琅贈彭雲溪真少年書劒出鄊闗晚歲雙旌五馬還辛苦一生清曰吏秖留松菊應蒼顔過髙郵髙郵海上水雲空曽說明珠夜吐虹底事年来光恠息阿誰身到廣寒宫題永清觀天瀾黄木扶胥日出時泊天波浪渺無涯濁河上接銀灣䖏只許乗槎博望知題柏庭和尚香葉曽經宿鳯鸞苦心容蟻量應難明堂自有擎天柱且喜山中耐歲寒偶題溪水清漣樹老蒼行穿溪樹踏春陽溪深樹宻無人到時有幽花度水香寄山村兄季子京塵滿黒貂兄年九袠鬂蕭蕭何時約我山村路傍栁随花過野橋贈歐陽震逺震驚百里未為遥嚴谷回春只一朝要見禹門頭角異乗時一躍上青霄京城雜用玉堂集日列金覊學士新兼祭酒時五百書生簽講遍八甎花影最来遲麗正門當千歩街九重深䖏五雲開鷄人三唱萬官集應制須迎學士来白玉堂前夜合花髙髙綠樹散朱霞朝来如見唐人畫繫着誰家白鼻騧龍笙鳯管舞輕盈步障逰看花滿城行到瓊林春更好新来進士唱名聲鰲山宴罷月溶溶大液池邉湛露濃不用金蓮送㱕院水晶宫出玉芙蓉京城赱馬聴晨鐘我欲宵征僕興慵却憶江南春睡羙小樓欹枕聴村春奉詔脩書白玉堂朝朝騎馬倚宫墻牐河東畔垂楊栁時有鶯聲似故鄊題永清寺白巖清暉方池古松四韻上人燕坐白巗阿巖上皚皚白石多曽到𥙷陀南海岸白花無數擁盤陀巗前髙閣扁清輝碧瓦朱甍暎翠㣲老子懸車還故里倚闌何日看雲飛白巖山下俯清池花有清香水有漪㡬度收經看月上分明水底見摩尼古寺長松倚半空問渠年臘祖師同應知方外輪囷噐多謝清時雨露功題昭文携琴圖孺子携琴未去弢兩翁山水偶相遭知音巳置虧成外到底昭文不鼓髙和寳雲長老澈一清二絶禪板蒲團百念空坐聞宿鳥起霜風廵堂首坐三更過師在雲山第㡬峰虎溪一笑瓓珊了不似當時剡棹回髙興莫教容易盡青鞋布襪約重来逢江易藝芳干賦芳洲楊栁垂垂拂釣磯平沙雨過緑生衣王孫闘草㱕来晚撲漉鴛鴦帶水飛題旱禾田歐陽琅溪四絶用歐陽公琅琊為韻安成山水清如壮百里長溪遶清障春來不到環珮鳴山雪消時溪水漲貼城稻熟百日賖樷祠祠背早歐家黄鶯睍睆上灌木白鷺聮拳立釣槎溪翁能来訪溪隱溪上山山淨如浣並堤菰葉迷淺深隔屋桂香知近逺溪魚可羡飯無沙溪水無氷梅着花美人娟娟隔淮浦好山處處皆瑯琊題春江釣艇圖煙中樓閣響蒲牢漁艇歸来月已髙記得疎鐘長樂曉為人揮手掣連鰲贈振先歐陽文春雨彌旬滿道泥山中煮樂早鶯啼歐公孫子来相過又見人間一角犀東山春景春光淡淡日遲遲正是名園撲蝶時却憶小橋流水過東山春色在桃枝歐陽公牡丹詩盛逰西洛方年少晚樂漁樵號醉翁白首歸来玉堂署君王殿後見鞓紅題蒲萄二首代李公溉之作玉堂曽侍看花遍滿架蒲萄翠作樷今日歸来見圖畵渾疑身在上林中宛馬西来貢帝鄊驪珠顆顆露凝光只今移植江南地蔓引龍鬚百尺長題分宜趙尹所蔵子昻竹石圖有客有客白其馬汶篁移植燕山下歲寒心事木石知雨露恩深詎能寫圭齋文集卷之三終
