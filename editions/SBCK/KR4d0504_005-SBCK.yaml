front:
  text: 圭齋文集卷之五宗孫銘鏞編集
  hash: sha256:6e783c8eddcc83af37a572e9c1cff129f557caee3c5cf4cacb44cb965455269f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_005-1a}
body:
  text: 安成後學劉釪校正記道州路重􅁱濂溪書院記道州路濓溪書院是為子周子􅌹祠其址在郡城西偏與郡學為隣郡學有先聖廟毎􅀊春秋二仲上丁郡侯率教授山長各以其職事命生徒祀先聖扵郡學次丁則合祀子周子扵書院之􅌹祠毎月􅃋望欵謁皆然原其初建雖由時君有獨祠濂溪之命亦其地􅀔適然故祠事之􅌹無間言者焉􅀊乆祠宇寖壊至正壬午山長張某議撤而新之郡士李某樂助以相其志工未訖去代者歐誠䏻􅁇其事扵是祠宇一新􅀊乙酉番陽呉侯肯来為郡判官仰瞻新祠而門廡弗稱謀諸郡長復加繕􅁱􅆘山長戴世榮又来代歐而郡士􅃽通復請出貲改作應門四楹兩撫稱是祠之後舊為誠源堂堂之後為故守髙峰楊公之祠左有愛蓮亭及清逺樓後有光風霽月之堂至是斥故易新丹雘輝暎世榮割已俸作石臺扵應門之南縦廣二丈横倍之又率郡士文某作瞻徳亭亭下甃石為街繩直􅁓平中外改觀前此未甞有也先是周子有子二人長司封郎中夀次直徽猷閣燾夀之後遷居江州燾之後居道州呉侯求得其八世孫善溥薦之當道請援顔孟例世以其後人之賢者為書院山長以奉􅌹祠憲府是其議移有司逹之行省焉明年丙戌冬呉以漕事至瀏偕世榮奉事状謁于歐陽玄請記以文玄惟周子祠事若㫪􅁜若九江豫章邵陽諸郡皆有碑􅈓作者多世大儒玄扵是記敘勞績紀􅀊月斯可己矣然而紬繹父師之言亦有可賛一辤者不敢以勦􅀃辭也昔者子貢曰夫子之文章可得而聞也其言性與天道不可得而聞也孔子言性與天道莫著扵易􅀁謂乾道變化各正性命􅀁謂一隂一陽之謂道􅁇之者善也成之者性也皆言性與天道當時門人可以與扵斯言者鮮其人焉子貢晚年始􅀗有聞故以嘆美之及孔子沒知此者子思孟子西漢以下諸儒見其彷彿焉子周子生乎千有餘載之下得孔孟之緒言著太極圖通書泄造化之藴發聖賢之祕如指諸掌故孔孟之後首言性與天道者周子一人焉世儒或疑周程授受不及圖書殊不考程子之言有曰天地儲精得五行之秀者爲人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動扵中矣其中動而七情出焉曰喜怒哀懼愛惡欲謂斯言不出扵太極圖􅀃通書可乎孟子言天地之性程子兼言氣質之性然後荀楊韓子之􅀃俱廢氣質之論原扵周子灼然無疑者也且自太極圖􅀃通書行世世之爲儒者茍知讀濂溪之書無不􅀗聞性與天道之言焉假令子貢復生當歎今之學者得聞斯言為幸而諸儒有横議扵當時者果二書之為異乎抑立論者之好異歟皇元定宋九儒􅀙祀周子居其首尋又有制進汝南伯為道國公盖乾淳以来新安朱子最先尊信其書聖朝重朱子之學以程式天下之士則周子之書益表章扵世宜㢤雖然國家興學之地可謂至矣周子曰師道立則善人多善人多則朝廷正而天下治矣􅁇自今教者以師道自􅀣學者以善人自期􅀅見真儒之効施扵朝廷四方未有紀極如是則書院之􅁱豈徒侈􅌹祠示觀羙而己玄㓜年侍先君子職教是􅀖讀書濂塾之側追憶徃時来㳺来􅁔之地因呉侯之請􅂺以舊所聞扵家庭者附著于斯焉呉侯肯字肯堂以教官入流選為憲􅁺進行省􅁺厯南海武昌兩縣尹皆以善最為政㢘明且知大體云是役也逹魯花赤塔海大中同知某寔綱維之其始終恊恭則經厯李時知事李信也貞文書院記昔在仁宗皇帝之世集賢大學士陳顥翰林學士承㫖忽都魯都兒迷失等言翰林掲傒斯之父来成學行師表一方宜特賜謚以示聖朝尚徳之意扵是有㫖賜其謚曰貞文先生至正三年夏四月中書平章政事帖木兒逹式右丞太平賀等又請于今上皇帝建立書院遂以貞文之號賜為額其址在富州之長寜鄊舊山之陽前挹遥岫後􅀝崇岡平疇曲谿暎帶林麓盖掲氏先世故居之地也其制爲大成殿四楹扵中殿之北爲明倫堂四楹殿之南爲門四楹上爲重屋門之南爲靈星門四楹别爲貞文祠置明倫堂之後左爲山長之署四楹其兩廡爲諸生齋居左右皆四楹齋之南又爲屋各五楹􅁃庫庖湢咸以次置其上始于至正三年之九月訖于九年之七月其後􅀙子範經始之而元貞寺僧智辨相之山長湯盤􅁇成之其山長則行省以儒士之甞厯學官爲之其門之東屋則􅀙孫徳懋萃舊岡書院之材􅀁建也其靈星門則僧智辨之􅀁立也其祭祀教育經乆之貲則里人之好義者割上􅃾田以相其事書院垂成文安公與玄以同在史舘一日詣玄以記書院為請玄敬諾之喜而㱕以語其子汯曰今日吾書院事畢矣歐陽君已諾吾記矣越数日文安疾作又数日卒三年汯申是請玄乃記之又告其徒曰古之學校為教事設而政事出焉辟雍泮宫習射養老出師受成皆在其地何莫非政事也後世學校雖治教事而特以祀事重焉攷其􅀁始古之入學者舍菜先師未嘗􅌹有􅀁􅃌而舍菜之禮亦祭之至蕳者也今州縣學校則必􅌹祠先聖先師扵是國家秩諸祀典若夫書院則又多為先賢之祠或其過化之􅀖或其講道之地如是者不一也亦嘗攷其􅀁始焉周禮大司樂有道有徳者使教焉死則以為樂祖祭扵瞽宗瞽宗者學之名也古者教之以徳為先􅉼養徳性莫先扵樂故有道徳而為師者其生也以教人其死也人推本其教以樂祖祀之非必洙泗而下若漢董子若隋唐王通韓愈氏若宋周程張朱數君子之為先儒而後為可也矧夫書院興學校之制其始又自不同東漢以来大夫士徃徃作精舍扵郊外晋魏􅀁謂春夏讀書秋冬射獵者即其􅀁也唐宋之世或因朝廷賜名士之書或以故家積善之多學者就其書之􅀁在而讀之因號為書院及有司設官以治之其制遂眡學校故祀事有不容闕者扵是或求名世之君子以祠焉玄甞循流而遡源盖自入學舍菜先師一變而為通祀自學有樂祖之祭一變而為先賢之祠自春誦夏弦一變而為呻畢􅄪變而為詞章又且黨庠術序一變而為精舍􅄪變而為書院學者苟不䏻知建學之初意又豈􅀎知為學之大功學校􅀁重在祀事而宫室象設之制日趍為觀美所任在教事而禮樂律暦之學或諉諸􅌹門遑議􅀁謂政事之行扵學校者㢤皇元超軼百王務以崇雅黜浮為教以去華就實為學復古之機其在扵是貞文先生以道徳教一鄊之人死而祠扵其鄊稽諸樂祖瞽宗之􅀕真無愧乎古人者也玄故著其􅀁始願以求正扵好古愽雅之君子焉至扵掲氏父子以稽古之功􅁱身之效􅀍遇而朝垂耀百世可謂儒者之至榮猶有待乎論述也夫貞文先生諱来成字􅈒夫以子貴累贈通奉大夫江西等䖏行中書省􅂙知政事護軍先謚貞文國朝䖏士易名之典自公始文安公諱傒斯字曼碩卒官翰林侍講學士中奉大夫知制誥同􅁱國史贈護軍謚文安父子並爵豫章郡公二公懿行偉節各有列諸别碑云􅀽州路繕􅁱記宜春為郡介江湖間山水清隩風氣厚宻其神䏻灵其民䏻淳為厥長吏固俗易使導以身教利建事功至順二年冬十二月通議大夫錦侯不花擢由容㙜来刺名郡􅀻未黔突畢􅅚在公乃睇府治東拄西搘徂厥門廡上漏傍穿部使之舘賔幕之次以及燕休之堂登朓之樓㳺息之囿觴詠之亭府史胥徒脆閽廐厮􅃇有位置今􅁾不治或傾欲􅈥或危欲壓維時錦侯乃諏寮寀乃咨賔属宿戒父老斯徴富民進而爵之侯乃言曰治宫猶家家之􅂭替觀􅀁恒居垣墉􅃜䟽廡陛夷削凢百廢墜推是知之視彼富潤有覺斯楹􅀔固不侔亦􅀁自致矧今牧守視古侯伯維今富民其道視子其分視臣爾退而䖏服御華好側睨長上居懐阽危􅀙我遑䘏寧汝獨安吾嘗觀風考察部属有司興繕弊有二焉民賦力産吏容奸欺官督期程工售濫惡苟完未㡬馴致朽撓粤有文吏拘牽故常事在得已􅂺持兩端媮容目前遺享之守何與兹父老富民咸下其手合辭報公且矢扵福願錫蕃祉與治俱新天子萬夀百度斯甄公敏且潔宜爲藎臣居匪奉巳示我等倫我民扵變不戒以信受命工上服勞其親筮占在玆施我子孫無遺公憂以愧我民叅軍楊撝奉圖赱書来求予文予核其事辤以繹之且告来者嗣而續之有廢不理衆手撠之撝􅀙予逰爲我石之是役初作郡牧之長伯顔帖穆相與佽之用迄干成是皆宜書尉韋元輔寔董其事吏宋必逹又宣力焉侯至之明年壬申九月僝工又明年癸酉七月竣事記以是年之八月土木金石埏埴壟㫁工費若干既集衆力不㑹扵公無􅀙稽云安成李氏重􅁱安賢義塾記安成李君辛翁初作安賢義塾扵州西郊一倣書院精舍之制禮殿廡門講堂齋舍各有其􅀁未㡬即世䂓模有未備者子剛慨然念先世羙績無加扵此乃割上􅃾田若于㝎為教養恒式出納恒度凢可以經乆而不廢者一一講求而完羙之扵是塾師劉君權具事實謁予記之予嘉李氏有子之䏻􅁇承也又感義塾之作是盖君子至公之心而古道可復之機也為之記曰昔者先王為井田以養民為鄊校以教民周衰井田法壞斯民貧富至扵相懸鄊校法壊斯民賢愚至扵相絶而君子小人之事判然兩途賤日益多貴日益少法日益宻禮日益踈後世興者雖汲汲然設為教官之任而井田經界􅀔不可復郡邑教養豈􅀎徧及齊民也哉有富而好禮之士出而建義塾焉義塾既作一鄊之士患不志扵學不患無􅀙師之資一塾之師患學者之不勤不患供億之不􅁇推此至公之心求復世道之古其機不在兹心乎師道由是而立善人由是而多風俗由是而美義不可勝用矣禮門左之堂曰塾塾之為言熟也吾固願義塾師友之至斯也教者熟扵其教母􅃱扞格而無序學者熟扵其業母致寒􅁀之罔功如是則無􅀒李氏建塾之美意矣李氏安成大族宋末累以著述獻于朝其貢名天府者接武辛翁號一峯剛字立中世以文行稱扵州里云趙忠簡公祠堂記臨川王安石以新學誤宋致天下騷然河南程氏兩夫子出而救之卒不勝其􅀃既而蔡京爲相宗王氏􅀃黜程氏學宋遂大壊京客張觷教京亟召程氏門人楊中立用之庶㡬救其半及宋中興觧人趙忠簡公鼎爲相首罷王安石孔廟配享尊尚二程子書凢其門人之僅存者悉見召用江左乃復振不幸秦檜相忠簡公斥程氏門人散亡洎中興業衰又不幸韓侂胄相禁建安朱文公熹之徒之爲程氏學者其後禁稍弛宋已日削皇元煟興江漢趙氏復䏻倍誦程朱書北渡江􅀻筆以授學者許文正公衡衡神明其書進以􅀁得相世祖興禮樂文大平後是四十年貢舉法行非程朱學不試扵有司扵是天下學術凛然一趍扵正時相㝷㝎濂洛以下九儒及衡十人祀孔子廟庭天子􅀙之至順二年春趙忠簡公六世孫篔翁請即觧之聞喜縣學為忠簡祠其辭曰公當宋南渡排王氏邪􅀃崇程子正學以至于今有功扵斯世甚大宜祠其鄊胄􅁥集賢是其議中書禮部告晋寧路以符屬其同年歐陽玄記之玄平居讀孟子至承三聖一章未甞不掩卷汗下以為何致是烈也及畧考近世儒學之邪正有関扵國家之􅂭替氣化之盛衰民物之榮悴其可徴者盖如是嗚呼是祠豈細故㢤公師邵伯温友胡寅其問學原委措諸行事詳見宋史篔翁延祐二年進士卓然有志先正亦可㮣見于斯保靚祠堂記保靚祠堂者安成劉君尚節詞其七世祖考保靚先生者也先生諱作字賢礪保靚其􅃅居􅀽吉間地曰秀源在宋乾淳一時聲光燁然起于郡邑􅀄用世賞授􅀅仕郎辟贑之安逺尉母老不赴中􅀊韞德抱才不屑世用友當時搢紳清江兩尚書謝公昌國章公茂獻廬􅁜楊文節公廷秀皆㝎交筆硯骨鯁如胡忠簡公􅀖衡亦深見結納其他名賢不可悉数百餘年以来世代變遷遺韻日逺諸孫尚節㓜􅀒志氣讀其遺書慨然慕其生平懼其親盡既乆後人無􅀁瞻仰謀即故居建祠堂以􅆀􅌹祀而諸賢翰墨存諸碑版者亦復散逸尋得忠簡公保靚記䟦及謝公諸書又漁父来告某潭有石状如碑以手切之有字尚節使沒者群入助漁舉石出果左宣郎劉君廷直􅀁為保靚祠堂銘也他日營父葬扵白石岡掘地三尺得碑䘏勿音窣沒讀之又永州通判董徳中􅀁為保靚先生祠記也扵是尚莭益喜繕祠益勤至元後庚辰春祠成置龕奉保靚主列碑其前議割上􅃾田若干以給常祀擇日率族属子姓祭以告成竣事而飲族屬舉杯勞尚節曰保靚徃矣非君之賢祠事􅂚興造物者出二碑以相君志也余至鈐南族中族與劉氏世為婚􅊚尚節謁予文為記予惟瞽宗祠于學鄊先生祠于社尊有道尚有徳也此禮廢已乆保靚祠堂雖成扵其後人異時郡國因餼羊以復告􅃋古道其庶㡬乎乃為迎送神詩遺劉氏子孫使􅁔以祀先生詞曰􅁻之檜􅀆􅀽之裔介兩郡􅀆大容礪昔賢居此􅀆物無厲物無厲􅀆民有􅀊道之耕􅀆徳之刈刈徳􅀆耕道深資􅀆靚保保靚􅀆何為山有碣􅀆水有碑碑無沉􅀆碣無􅄟曽孫有祠􅀆傳千世世世幅巾􅀆深衣先生来歸􅀆無我違違我􅀆焉徃􅀙諸賢􅀆詠歸尊有冽􅀆爼有􅏂芳菲􅀆闔兩扉石韞玉􅀆山有輝微先生􅀆後人疇依安先生祠堂記􅀁貴乎䖏士者䏻以一已之􅀁守為一國之􅀁慕雖當世英君誼辟操其捴􅄃豪傑包舉宇内之􅹔一旦遇夫爵禄慶賞􅀁不可致之人扵是怡然企乎先王道徳之懿真有貴扵已之􅀁負挾者而後上之趣向㝎下之習俗成斯人者功下韓孟哉元有國以来學者言䖏士必宗容城劉靜􅁱先生方是時聞其風而起者曰真㝎安氏敬仲焉敬仲未甞一造劉也顧得其傳扵濂洛考亭者知之為甚篤行之為甚堅由是推宗以合扵祖一也劉氏髙亢明爽梯級峻絶士親炙者寡安氏簡靚和静􅁭韻敞夷士樂附者衆異時有祠宜乎抑自先民石峯恕齋兩先生以學淑其鄊盖三世百餘年于兹矣此又祠之􅀁由作歟敬仲既殁門人蘇君伯􅁱貽書同舍槀城西管鎮李君士興請祠爲鄊先生士興議克合乃築于鎮作三室而奉之自敬仲上而至扵石峰恕齋咸有位焉明世羙也落成率里塾子舍萌􅀊時具蠲􅀁事至是伯􅁱請予記之然予記安氏祠而本以容城者亦猶論東漢名節而始嚴光乎漢至孔張末之儒也矣微光東都士何自作新㢤先未必知道也而且如彼而况吾濂洛考亭乎而况吾容城乎夫瞽宗祠于學鄊先生祠于社古典也瞽宗久無聞鄊先生有祭自伯􅁱士興始以是知古道無難復人患不爲爾繼自今西管鎮之俗日益以厚其民敬學而賤利其士樂學而逺􅀔安氏之澤其有既乎讀是文者尚知􅀁始石峰諱滔恕齋諱松敬仲諱熈出䖏詳見家集云秀川羅氏祠堂記先尚書公逰鄊校時善校官羅子逺子逺廬􅁜秀川世族篤學力行有詩文傳扵世後爲朝請大夫主􅅦貨務言賈丞相􅌹權誤國棄官去予家蔵其遺墨思欲見其子孫今其族孫仁逹過予爲人英敏有爲爲文雄暢有氣予扵是喜先友文獻之有傳焉仁逹徴予記其秀川祠堂其言曰吾祖太時府君著籍秀川四傳至南塘府君家日以大府君之子若孫始割烏石陂􅃾田若干畒為祀田時宋嘉祐二年也其後乃貢于舍貢于鄊登第于禮部凢百􅁆十人扵是蓬山先生溪園先生與其子蒼崖公磵谷公推廣祀田遺意追逺則有拜墓有合祭合族則有族譜有聚拜迄今三百餘年祀田世守如初族雖散居昭穆秩然必不可亂邈在萬里相見相問外有骨􅁏愛不相視如途人是皆吾祖貽謀之徳與前聞人善述之功也惟祠堂未立合祭聚拜無㝎􅀁議者咸病焉按家禮祠堂在正􅃦之東貞之居􅈦事之東有堂曰遜緜凡十有八楹其深二丈有竒其袤稱之堂之前有軒軒之外有亭髙明深靚宜祠乃請掌記務本翁以為祠堂祠大時府君而下八世至十二世各圖分􅂀之祖止其有行􅁩有文學有爵位者特祠焉扵是禹圭與翁之子繩祖第一圖孫瑛第十圖孫蘭復買田為洒掃􅁱治薫燎之費自是合祭于斯聚拜于斯與祠田相為永久以卒前人之志先生幸一言以詔来者予既嘉仁逹之䏻世其學又嘉其宗之䏻念其祖􅀼喜載名姓其間自附通家之後有榮耀焉乃諗于衆曰惟大姓其祖必有隠徳非徳無以蕃無以著無以久久則我後人念之宜也念之念之奉其烝嘗云乎㢤行其揖譲云乎哉思其人必繩其武食其徳必篤其慶父詔其子兄詔其弟以詩書禮樂為教以孝弟忠信為行逹則澤其民窮則善其身使國人稱願之曰幸㢤有子孫若此祠堂之作為不虗矣詩云無念爾祖聿􅁱厥徳秀川子孫其勉之㢤時予宗方作祠堂于故鄊以書来告成秀川去予故鄊百里而近而祠堂之成適相先後扵是喜徳之不􅀌也乃以斯言為吾氏告亦以告之秀川焉是乃通家之道也仰更齋記臨川先生扁安成劉氏讀書之齋曰仰更劉君方升属余客彭斯文来求予記􅀄方升之大父號更齋先軰鐂君耘廬記之故臨川先生之命齋名也寓其大父之號焉夫仰更之義始扵子貢之言嘗意其當時必有所謂然日月之明未嘗息者也故人仰之扵既更之後初不改扵未食之前譬諸君子䏻存其心扵衆人之正其或違而去之亦暫焉而已耳若夫本體之明則固未嘗息也余㓜讀孟子至庶民去之君子存之等章見其􅍓序列聖􅀁爲憂勤􅅥厲之事至扵孟氏自託孔子之意止下四章脉絡相属而其卒章乃言君子小人之澤皆五世而盡􅀄若甚無謂也已而思之盖以明親有盡而理無窮耳夫日月之不息其明君子之不失其􅀄斯固天理之􅀁以長存人心之􅀁以不死者也更齋之􅂑號扵更臨川之益之以仰其㫖不如是與在禮有之先祖有善不知不明知而不傳不仁是責在吾方升矣知乎此更之流風餘韻五世而巳乎劉氏自皆山翁友吾宗巽齋先生一時如西磵葉氏槐城王氏及清江之蕭氏皆山皆善之至方升克世其學殖亦為臨川􅀁期待云呉氏觀樂齋記石橋介攸輿天水間有二郡文獻焉呉君明父之季曰禮遜堂而藻播而嘉禾者也弱冠捧檄司直鳯㙜予漫㳺至斯邀予至其家見其翁季唯諾伯仲塤箎信乎其名下無虗矣􅀁居西偏因山以為讀書之齋謁余銘之􅀅以號焉乃命之曰觀樂其事則􅀼延􅁜季子之扵魯也其義則以明君子之立禮􅀁欒乎成扵樂也記曰禮者天理之序樂者天理之和然聖人之扵禮必繼之以樂者盖禮有􅀁不逹樂也禮有􅀁不行樂也何謂􅀁不逹何謂􅀁不行位也者人不厭髙而禮辤髙不辤卑財也者人不厭多而禮譲多不譲寡渇也而禮掣之肘也不敢先長而爵也飢也而禮扼之咽也不敢先長而飡也如是則辤譲之不可長也勉强之不可久也迺為之樂焉融液其交際而辭譲岀扵欣然導宣其湮欝而勉强至扵安然矣昔者呉之公子其有見扵此乎季子之遜有禮烏可以勉强言也而吾知季子之觀樂􅀁謂樂其樂者也遜行扵其家而風動乎列國之觀聴遜得扵􅀁性而脗合扵先王之聲容其南也某雅也某韶也某夏也是皆以雍容登降為樂而非以乖爭扞挌為樂者也孟子曰樂之實樂斯二者仁義是也吾亦曰季子之扵樂樂其禮也樂其遜也其樂斯二者之謂乎或者曰觀樂可也遜如季子未易言也余曰噫人能克無放飯流啜之心禮不可勝用也人能充無疾行先長之心遜不可勝用也而獨季子乎哉禮遜事親也㳟從兄也順務學也敏遇人也温是殆甘受和白受采茍觀樂也不豆􅇼扵辟雍則哻弁於曲臺矣小之不有得扵美哉渢渢之魏乎大之不有得扵羙哉泱泱之齊乎則余之名齋也而豈徒哉而豈徒哉髙山仰止自予言始則幸甚遜齋記有一言而可終身行之者乎聖門髙弟固嘗有如是之問矣近代有行之者司馬君實之􅁼是也盖人之一生苟有得扵一言而合於道則其生平精神心術凢見諸行事者莫不扵此取則焉故雖言也而可勝用哉君實之扵實自為兒時至扵相天下終始惟一言也然則守約之道顧不至當歟呉君禮遜佳子弟也學殖之務􅀹孜孜焉嘗請於予曰吾於遜一字也深有慕而未能願仍遜以自號何如余曰㫖哉言乎非所謂一言而可終身行之者乎夫遜也者吾黨之士入門第一義出門第一程也在禮入學鼓篋即以遜為先􅀃命亦曰惟學遜志盖吾之扵道慊然如有所不知而後人告我以知退然如有􅀁不能而後人告我以能謙以受道抑以從人兹非入門之第一義乎夫子曰義以為質而遜以出之義之在人猶物之有幹也然辭焉而弗婉色焉而弗愉則嚴者愈嚴而義有不可直遂者矣婉辤足以逹意愉色足以致和兹非出門之第一程乎今吾禮遜學道則猶升堂而望入室者也渉世則積跬歩而至千里者也舎遜何所偱而進何􅀁齎而行哉雖然遜以出之又不可不信以成之也信以成之則如君實之守其實而後可也孟子曰孟施舍之守氣又不如曽子之守約吾扵是亦云譚氏肖山記民生扵三事之如一人言師有父道不知父亦有師道也父有師道則取之近而見之的信之􅃀而慕之深故能用心專成效速也然則人之有賢父兄天下之樂孰加此哉余從攸士聞譚君古山之賢二十年盖嘗周旋群公先正間猶能衣􅀍乾淳以來之風裁者也今年至是􅀖雖不及識古山幸友其子天球中剛外和之麗行則攸學無少長䟽戚咸謂余曰天球今之古山也故自􅃅肖山以著其志而天球亦出璜溪丁魁􅀁書肖山二大字且言吾有丁字寳之有年君其為我􅀤揮俾不至湮欝幸甚余扵是有復扵天球曰古之師其親者周公伯禽晋文㐮師功業者也茂羅良辟強師才智者也太史氏談遷鐂氏歆向師文章者也然皆君子􅀁務者也君子之所師惟其道相似而已昔者顔氏子之扵夫子也歩亦歩趍亦趍亦扵其道而已故夫子有視予猶父之言然孔顔非真父子也矧其真乎且道一也古山之學學孔子者肖山之學亦學孔子者也苟䏻速肖其道焉豈獨肖其親而已㢤儒者自孔氏言必稱聖賢不得以為僣古山諱用顔氏子字而字曰希聖豈非希顔而學孔子者乎故用是以相肖山之志芳林記宜春郭廷秀世儒家子也因其􅀁居之地名著號曰芳林属予族兄宜翁求予為之記予復之曰蘭生深林之中未甞不自閟其芳也人以為有國香而服媚之蘭欲自逺扵當時其可得乎君子􅁱其身扵暗室屋漏之地而聲流扵四方萬里之外亦豈􅀁願㢤且夫芳林者君之􅀁以自况也余雖乏一日之雅而樂為君記之良有以也夫殆猶蘭䖏扵僻而芳播扵逺也雖然蘭㦯握以事上或佩以修禊而其芳烈之氣不改扵深林豈非其性然與草木無情䏻一其性人惟有情鮮不汨性君子存之蘭荃同畦不混扵植蘭鮑同室不移扵染斯以異乎衆人也吾聞廷秀之風清白之操使一日而進諸市朝吾知其無愧扵芳林也卓矣請以是為記圭齋文集􅃃之五終
