front:
  text: 圭齋文集卷之十五宗孫銘鏞編集
  hash: sha256:6ae82b210786913be717aed9b415429224897e6e744b2d951800cbfce64eda5e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_015-1a}
body:
  text: 安成後學劉釪校正賛御書九霄賛聖人居潜如日未旦待其􅀅出光景扵粲若木蟠桃實生海濵天光首被先萬物春􅄐麗正中烜赫八表物物容光莫􅀗私照上在桂林臣有震宦躬荷寵頋染翰賜之作其踐胙億兆悉臣欲􅄃天章㡬千萬人向􅀁􅀩恩曠遇希世隋珠和璧􅂚􅁕言異今雖近臣孰敢奏請仰瞻雲漢惟有引領日邉之氣其名曰霄陽􅁆用九乾徳孔昭龍飛之徴有開必先形諸翰墨夫豈偶然天啓淵􅂨神助筆力震畫乾􅀄洞見天則猗嗟震宦世世寳蔵億載萬年為龍為光麟鳯二大字賛皇太子習大書端本堂上命庋其􅀁書記之扵籍或以賜近侍宫臣則録所賜人姓名而登載之慎重之至也宣文閣授經郎浦江鄭深其官署既在内府與青坊宻迩深家又以九世同居聞自諭徳以下咸樂與之逰因得侍硯席􅀍寵頋故有是賜焉􅀁賜為麟鳯二大字若曰同居為國家之瑞有若麟鳯云爾筆法方嚴意度閒暇天縦不凢深得之􅁢為慶幸屬玄記其事扵下方謹拜手作賛辭曰春宫臨池神助腕力結體楷嚴運筆端直上命宫臣以時貯儲遇有賜予籍而記諸深仕延閣授徒宫庠􅀗陪燕翼膺是寵光維麟與鳯肇錫孔嘉有之似之瑞我國家潘雲谷墨賛徂徕松雲貯玄谷道人居中抱其獨琅琅空山萬杵熟道人曄然開電目松雲化石石化玉崢嶸寳氣霄漢燭貢之奎章月在櫝龍光淋漓九宇福十八羅漢􅀞像賛我觀應真玲瓏八牎具妙用故示諸愚憃世言神通自墮㓜哤匪􅆊匪漢匪竒匪厖見師即呵孰前摶控千花㝠㝠百泉淙淙猿吟鶴飛白雲空谾龍伯山君巴滇蜀駹爪剛力獰冠詭服厖或象瑜来或扵莬降信攝平等詎分珉玒如来在時慧日萬邦既入􅄺境俄然膏釭固􅁱第二有二無雙矧此苦海寔資徒杠南浮諸方金鼓肆摐建論性相􅀣兹疑幢彼不見月指月在江渟為泓洄激為湍龍我無成􅃜喧寂一腔此歐陽先生閒暇時着意為鐂仲賔題此廿韻仲賔避亂客固江黄氏子魯􅀁因以遺之識者當因文以重其畫不可因畫而汎觀其文也馮翼翁子羽觀䟦為防里族姪題兖文忠公像歐陽永叔文在兩間與世推移道之􅀅興文必先知八代萎蘼韓歐􅁇作讀者贍之實啓濂洛五季鉅筆素王㣲權本論拳拳慶暦七篇人心既正士習斯淳黄河泰華我公其人自賛不古不恠不清不竒置之竹籬茅舍似無不可貢之玉堂金馬亦無不宜噫百年三萬六千日與吾相對吾亦不知其為誰族兄山村先生像賛實踐真􅁱洙泗之學闊視雅撡箕穎之風節用謹身充而逹乎曽閔之行存心養性悟而超乎松喬之宗子孫極髙年之養而志存舊日之儉素鄊䣊推丈人之行而身教後生以謙冲郡侯賜帛重扵郷飲朝廷表門侈扵素封是宜濟南諸生追懐九十之伏勝㐮陽過客想見百代之龐公族子秉彜像賛山村子也以治官之􅀎治家以應世之智應族不遺履舄任用咸當不勞鞭筭資具自􅁕心平而直何事城府行簡而易豈資邉幅有子孫之賢可恱情性有山林之勝可娱心目人見其康徤而期爲山村向上之夀我觀其忠厚而知爲歐門鼎盛之福與静􅁱先生􅀞像賛先生姓劉名因字夣吉容城人至元中蒙􅁉宗召爲賛善辟集賢學士皆不拜㣲􅀧之狂而有沂上風雩之樂資由之勇而無北鄙鼓瑟之聲扵􅁉皇之仁而見不可留之四皓以世祖之畧而遇不􅀎致之兩生嗚呼麒麟鳯凰固宇内之不常有也然一鳴而六典作一出而春秋成則其志不欲遺世而獨徃也明矣亦􅀅􅀙周公孔子之後爲徃聖􅁇絶學爲萬世開太平者耶黙先生􅀞像賛東平安民寤寐乎明善誠身之書歩趋乎格物致知之學􅀜西三鱣未必榮扵教授之四世荀􅁜八龍奚以過扵伯仲之一壑豈非白茅作而忠信著玄酒淳而􅄝慾薄者乎鍾期伯牙有同世而不相遇者吾胡扵黙之神交而益以重容城之先覺也威如蘇先生􅀞像賛英英􅂵芝皎皎素絲冥捜逺討黙識近思子雲精深季海孝友徳人之容君子之守郎中蘇公畫像賛維子寧父為名卿士其心塞淵如古君子既合扵古誰諧於時職是正直弗究厥施居家嗃嗃在國諤諤屹如長松矯如一鶚蚤以讜言屢忤權相晚著恵愛􅁕食邉饟剛者必仁仁必有後宜爾有子簡自造秀遺像儼然不亡者存九京可作孰敢吏雲曽文辿像賛先生之學吾誰與稽吾有源委澗􅗉東西先生之書吾讀未遑吾有徴信季通􅂵陽大道無形公獨有像神仙不死公獨有塟塟留仙訣像馭仙風止乎觀丘池水澄融魂月魄水息慮艮止鶴鳴長空騰化震起遺鈐記傳嚴宻謹言感發人心何日已焉防里族姪友人劉伯常名􅃔賛鐂氏奕世以更著號何事扵更一變至道不變者存于其保之字子以常名子以􅃔陽明軒太玄子龍閶闔開蜿蜒回寳劒出天馬来䟽寳雲禪寺題䟽唐㑹仰小釋迦上彤禪師作雙峯禪寺扵石鎻峰下迄今稱名刹座席多叢林望士至則咸有􅀁􅀣建舊殿僧堂作者為别傳泓法堂為晦谷輝鍾樓為夢作滿南廡丈室為近年謙山福今堂頭一清徹公克武前仰瞻佛殿屋老思撤之揣力弗贍以余舊家宜陽寺迩吾族求作儷語發端鉅家兾􅀗資助圖維厥新詞曰唐刹占山水之竒舊多勝迹瞿曇備天人之福必有廣居維兹寳雲雄我鈐邑翬飛傍峙已􅋍巗瞻象馭中臨未崇殿制兹欲裒多益寡舍舊圖新即蕪陋以徴辭謁華􅃾而求助扵是講遺規扵娑馺證妙境扵率陀長者布金祗園咄嗟集事老人懸車故里讃詠成功故䟽書啓附與􅀁性姪書自夏謁告祠垣道假江左取便欲經祖郡省墓譜亭之行途中暑􅇵心與迹違抵家以来且人事蚕叢文債日生逺辱慰問但卑叔在朝沗自􅀙臣未罄黼黻之報㤙及二代兼蒙賜碑榮幸不勝今遣僕老李特賫􅃙賜碑一本相奉别致薄贐贈諸族属煩吾姪分俵勿患其寡而患其有未至也迩者賤疾百病交攻使者復促上道起居未可自必老僕即使之歸似難稽召命舟中欲使任其扶持之勞家兄而次雷此致問不宣荅意山先生意山聘君老兄文侍玄去冬防里彌月之留􅆂濡道徳之味扵骨􅁏之情得扵兄􅀁教良多迨今銘感未已令郎来辱恵問勤懇第恨溢羙辭多令人讀之赧然賤跡自正月中旬以来右􅂰腫其痛如剜始者護痛不敢屈信乆之兩􅁕筋挛即目行立俱廢稽延召命恐違官箴遂援年雖未及身委有病自願致仕者聴之例移文有司行逹朝省兾此庶得藥褁􅌹心然亦沉痼如舊書来所謂促装上道那得許事耶令郎􅀄至適值病體服宣利之藥遂致泄瀉不已困憊不䏻見客􅁆日稍復當圖報深媿莫䏻效毫􅄠之助聞張毅甫尚書除江右憲使其人相知力疾作一書干之或䏻相汲引一試也側聞兹􅀊垂帳仍在舊舘郡泮必時至彼諸生常得親炙老成亦幸事也餘惟萬萬自愛占荅崖畧不敵先施等于尊照不宣又與意山先生書玄壬午譜亭之别于今六年都下蒙恵書但送書人乗便即行徃徃不别而去不及報書為歉方馳仰間令郎至荐辱佳翰承寓居春㙜夀履康裕殊慰殊慰文集舊序如戒更寫令郎􅀁著易問辨甚佳已為作序第媿病餘意緒不佳乏好語也令郎氣宇明爽因推其八字非常發逹行當擢科吾兄收義方之效享榮養之禄計日可待也劣弟蹣􅘐如昨右臂時苦風氣流注大為􅀁窘最是文債日生無少休息令人悶悶未􅁲㑹期惟以道珍嗇草草伏希尊照不俻回􅀁中書猶是癸卯年叙譜以来今三十有五年矣是時不肖與所中俱在子弟之列毎思㓜􅀙兄弟之樂今復欲爾尚可得耶去夏謁告祠垣假道江淛初意徑趍洪􅀽一訪故耳中途劇暑遂與願違老僕還聞族中諸公相􅀱甚乆令人慚恧無已兹逺席宗庇自沗􅀙臣恩及二代兼􅀩賜碑尤出望外受寵驚懼􅀩書乃以賀言惟重怵􅅥祖塋題表之喻僕何敢當第􅇮􅀊侍親春􅁜見元公家􅁆世之墓皆太守方孚若為題之他日援此故事或得一名筆表識亦未晚也踐迹近叨兩召貧病交窘居行未知攸措吾姪何以告之儀翁還􅌹此占復潦畧等㡬孚照囬所立書相距五百里相别十五年逆旅􅀝伏靡不更常起居動静邈焉無􅀙忽宜翁兄携􅀁恵書得之驚喜相半追憶曩侍先君子琴册適執事自綵侍来以拜見退相􅀙齋閣是時僕與執事俱為人子弟一門自為師友之樂有不容喻今日此况此味惟屬之􅀁立仰為名門雍熈之􅁤翁季道徳之盛異時秋蟬賦側耳獨領畧吾知叔弼乆矣兩科士論殊以魯生不来為恨六月之息三年之鳴端有所待他日榜中龍虎第一相承舍君其誰政當堅坐冲宻守庚申耳區區遭時承乏何􅁕置牙頰来書諄諄然及之令人卷舒媿瀋可拾甚者以六一爲是何以美疢强加我耶此公事業未論其他只蘆荻畫地我軰曽受此苦曽下此工夫否此則斷斷然不夣見脚板者也廬􅁜長沙之議不謂兹事亦徹聴聞僕在二郡不趐滄海一稊或者之語僕亦不辨惟應之曰僕爲崇韜不敢藉談尤不敢也不敢布素一語亦告者過番氊痩馬自是鄼億家風且先軰三尺森嚴在前何敢猖獗一歩􅀉示􅀞軸皆米家虹月惜蕪􅁾不􅁕發揮􅀊晏百冗填委宜翁行又􅃍尊翁朝奉令􅅩意山學士令弟芳茂暨族黨諸先逹皆不及顓状敢告申敬何時譜亭叙拜以罄鄙懐家兄而次附致謝臆等㡬魁照不宣囬鐂申齋先生書玄頓首再拜復書提舉聘君申齋先生丈席玄即辰清和承體􅀱佳勝濟南􅂄年有相之道不勝願見之禱吾宗振先来辱書且知姪孫宗任客臘叅謁座下第緘􅀉雄文迨今未至不審何故亟稱督索端便復命隴阡樵採之禁事出當然流言之惑實無是也區區抱病三載始􅀗一歸心志凋殘舊學如失其不䏻爲先正大夫役也審矣適􅀱􅁲氏女病振先就之相見借紙占酧凡百潦畧惟鼎茵加毖以夀斯文謹奉状不宣答劉桂隱書玄頓首再拜復書桂隠先生執事玄視廬􅁜江鄊乃未􅀗一寓桑􅎚之敬諸鄊先生亦未甞一望􅂂絇虚名誤人僕僕南北抱兹二欠􅀒􅀒奚文先生道徳之重藻鑑之明今先之以書且有文集叙之喻僕何􅁕以叙髙文之後此亦虗名誤聴聞耳踵襲訛謬如是不已豈不甚可畏㢤僕自去春痺疾盛作一􅀊之中謁告十九今者又有哭子之戚倀倀南歸予環之使要諸潞上夏初誤恩落侍講升學士俯僂循墻迨今未敢拜命心常怔忡舊學廢忘仲賔還姑爾塞責滓􅁾髙明知罪知愧盛暑力疾治答不敵先施切希照亮荅孫春洲書玄頓首再拜上記春洲聘君先生玄讀天台賦金聲嫋嫋吾耳􅀅二十年識公扵此盖乆昔人識心在識面之前斯謂知已族弟志行家人至辱佳翰勞問勤懇殊慰瞻馳第玉署再遷之言此傳􅀃者之謬幸勿過聴區區抱痾三年朝廷熟察而深憐之譬之病駒不任銜勒置之茂林豐草之地使之姑遂其本性豈有復可驅䇿者哉令郎才俊自當不乏知遇萬一邂逅在他人尚䏻推轂豈敢愛一援手之力扵秦晋之戚㢤价旋力疾占荅秋杪冬􅀄必到防里胥晤有日餘儲面賦草略切希照察不宣又玄頓首再拜春洲先生契友玄曏在史舘與曼碩掲公談江右人物掲稱譽足下才美在臨川孫履常何太虗間㑹見咄咄逼人他日相知翰墨中益見故人藻鑑之髙日者弊族諸子弟見過又知結習斯文固有􅀲􅁑第恨才薄資淺仰慕前􅁱薦士不得彷彿其萬一耳􅀁求春洲詩及大字草草塞責報章逺勝作者子昻墨蘭自是佳品感媿無斁區區劇暑抱病趂便裁荅不敵先施尚㡬照察不宣與張憲使書都門别後賤跡㝷亦謁告還湘相距地逺乏便致書惟深馳仰近傳全除目共諗移軺􅏅浙弭節西江西江之民蘇息之期實在此矣僕先世西江人也里中長老時相徃来語及公来相與喜抃少白僕近訪族族中少俊甚多有姪原春者其才􅁕以應舉然得失未可必􅀽州路學薦為直學例必經憲司試驗欲望相公賜一援手之力他日寸進寔出陶鎔何敢忘也賤體入春以来痺疾愈甚兩􅁕筋攣行立俱廢雖被召命自度病􅀔如此未見即愈自願休致之章已逹有司毎日􅀙事藥褁而已為况無􅁕為知已道者舍姪行顓此起居未中冀順序珎嗇行膺柄用不具備慰國愽䘮母書玄頓首奉慰文廷愽士至孝玄不意慶門􅀝伏之㑹先大夫人奄棄榮養緬惟哀痛柰何玄聞變不勝􅃤怛已僦小車詣行府申唁昨暮適苦痰嗽欝眩之證又聞車行甚亟􅀔未􅀗面㑹中統若干聊為雇車之資道逺兾節哀順變以㐮大事手䟽潦略不具與劉文廷書玄手書再拜上文廷博士提學相公仁友玄徃夏去國同列中以不􅀗一言以别為恨客冬還鄊乆之又以不蒙一紙之􅀉為欠今夏忽睹除目承有儒㙜之擢既喜且駭其喜則以國􅀄甚重此職覃懐許公由是拜左轄亦愚葉公由是拜右轄大徳中呉與趙公由是入為待講吾文廷居之􅁢愜士論其駭則以賤跡離翰􅁐時當揆力勉其留其言以為斯文漸􅁴人少僕抗言薦􅁆士為代如文廷皆其列也當揆盖甞諾之今忽外􅀘非文廷求出必不爾也已而果傳有子夏之戚聞之胸次作惡者􅁆日昔有三人聞客言虎患一人蹙額特甚僕其人也才不才亦各言其子徃年甞以此致心疾後来熟思之理􅁆自然皆有乗除􅁱短存乎其間莫年䀌傷亦復何濟不如姑聴造物􅀁以䖏我者何如耳劉仲賔行亟此代面外有一啓極知剰出或可助發一莞聊以寛君之憂也僕態勝舊近又苦痰暈之疾但夙縁無涯竟日為人造綺語業殊可厭也毫楮草草希照亮啓兹諗輟班學省進秩文臺晨入都堂陳􅂨懐而求去晝歸六舘别同舍以治行綸綍及門輶軒在路既許即家而為府又容需次以申情仕宦以稱職為稱心宜無内外重䡖之辨賢逹唯知義故知命自明禍福􅀝伏之機故扵趍賀之緘􅂺為譬觧之語孔文舉楊徳祖古人􅀁親即児羡門子浮丘公今世未聞有後首尾不嫌扵衡决肺肝􅀁托扵深知毣毣馳忱怱怱闖便囘有壬許叅政啓辱示謙鳴喜新賁治包胥感無衣之賦竟償復楚之言相如􅀗全璧之歸始著却秦之勇盖人之秉忠者必遂而物之拂性者終還追惟徃事之堪驚益懐髙位之難䖏文􅂣有議豈容居西掖而弗知丹詔驟頒乃獨使東􅈦而恭聴此挾姦回之秘䇿欲摧俊又之前茅㝷移疾以去官姑待時而俟命生意已存扵碩果大材寧繫扵匏􅀲皇天實鍳乎臣􅂨聖主自㝎乎國是予環鶴渚公曰盍歸乎来㢤授柄鳯池衆謂兆􅁕以行矣属開端扵更化嘗効力扵代言然非烏􅀗莫勝􅂚免絳侯見沮急迓輶軒而傾盖真同韋布以弹冠洎僉黄􅄠之謀親預緑章之寫扵是退前日掩奎之宿即當時押角之人嘉與賢䏻洊行周家選舉之法至詒朋友共播虞廷賡歌之音第媿踈庸莫陪􅀭厲王通受罔極之賜惟乞閑身孟明收再効之功當書逸史亟酬先施倍切懽悰祝告文天􅂌寳命列聖相承貽萬世之丕基輯九圍之至治頋兹菲徳嗣守基圖念皇考之上賔結孝思之㒺極爰舉徽稱之典躬陳時祝之儀尚兾垂歆敷􅃬祚胤明宗皇帝附廟祝文扵穆皇考聖徳配天何臨御之弗遐儼威靈之如在顧兹冲􅆌嗣守皇圖􅅥惟丕訓之承祗奉鴻名之舉是用躬執圭瓉薦其苾芬仰惟願懐来格来貺焚黄祝版維至元三年􅀊在丁丑二月朔壬申越十三日甲申孝孫翰林直學士國子祭酒玄敢昭告于祖考贈中順大夫中書禮部侍郎上􅀐都尉追封渤海郡伯澹軒先生歐陽公玄奉元統三年甲戌三月制書以玄沗列藝文大􅁥俻位三品推㤙二代贈封祖考官職勲爵如右是年九月以書到家告廟改題且遵􅃔式為玄㝷遷大常翰􅁐等官限以職守今者謁假来歸告墓之典始克成禮惟我祖考懿行粹文師表湘楚惟誠㳤人恵利後學儒者之徳莫盛扵兹餘慶􅀁被施于諸孫􅀗承國㤙致有褒贈思昔咸淳甲戌鼓篋上庠在其當時六舘諸生為厥父母咸得推㤙世運遷移先考齎志六十年間􅀊運一周積善之報乆而罙彰有若此者侍郎法􅀙之官貴列八座渤海大郡之壌崇視徹侯載燔宻章昭侈上賜伏惟膺此寵光濬厥福澤庇頼我後益熾以昌謹以牲齊殽饌式伸䖍告焚黄告后土維至元三年􅀊次丁丑二月壬申朔越十有三日甲申翰林直學士中順大夫知制誥同􅁱國史國子祭酒歐陽玄敢昭告于官榮橋白雲菴后土之神玄欽奉制書贈封祖考中順大夫中書禮部侍郎上􅀐都尉追封渤海郡伯爰擇榖旦燎黄于塋惟神苞流崇深頴擢明秀相我先祖妥靈于兹芘厥後又本固枝茂實惟神庥恵徼方増報祝敢後自今以紿恩休􅁆至維爾明神亶有榮耀尚圖利之謹以酒殽庶羞式伸䖍告防里祭祖祝文二大元至正二年􅀊次壬午十一月己已朔十有三日辛已曽孫翰林學士資善大夫知制誥同修國史玄謹以牲酒之奠致祭于防里第十一代祖七承事府君歐陽公墓前而言曰禮去鄊國省墓而行重違逺也先世遷瀏動踰十紀井邑既殊􅀊月既乆踈逖松檟事􅀔使然餘慶􅀁覃靡間彼此玄自􅀼科第登進公朝俻列法從推厥本原敢昧􅀁自謁告来㱕展省墓下追懐雨露怵惕深増惟我先祖流慶後昆願自今始無曠彛禮尚享防里歐陽氏始遷第一代祖府君墓前人本乎祖百世匪遥精神旁通體魄如在逺孫席庇展省還鄊萬木一春萬水一清豐本濬源用永有譽惟我先祖寔克相之祭后土文二防里第十一代祖墓后土氏之神先世遷瀏違逺墳墓曽孫展禮宅靚以固祖考来歆神亦恵顧濬靈鍾奇錫我蕃祚我族既惇百世無斁尚享防里歐陽氏始遷第一代祖墓后土氏之神自吉之􅀽我祖始遷妥靈兹阡今三百年髙山蜿蜒其上隆然神相我后慶流如川翰林國史院祭掲侍講文嗚呼公之道徳忠厚篤實洞徹内外公之文章純深爾雅警發憒憒方舘閣之踐􅆒實昌期之際㑹宻勿論思從容進退當譽望之日隆惟恪恭之弗戒掌斯文扵玉堂賛皇猷之光大侍講讀之經幄知啓沃之切聞待引年而挂冠戒舟楫而南邁帝􅃬命而来還兾黄􅄠之未艾遹聞詔之方􅇻思竟考夫前代詔總裁扵三史庶緝熈扵帝載天不憗遺慨其殄惟我同僚思其莫再望望喪車悠悠丹斾尚期英爽歆此薄酹祭子逹老文至正元年􅀊次辛已二月十一日老父八翁即大都崇仁門之寳泉寺為特羊舉酒殽之奠告汝十二郎上舍之靈曰嗚呼哀㢤尊者哭卑者而哭扵暮年生者送死者而送扵異鄊天下之慟有甚扵斯乎吾年五十餘而無子也既以汝為子矣凢吾老身之侍奉後日之繼承惟汝是頼一旦而失所望焉天乎人乎孰使老父罹此毒乎以子之學可受茀禄以子之孝宜享夀齡天乎人乎孰使吾子至此極乎丁丑之秋赴名北来汝伯汝叔送吾與汝他日吾還汝獨何徃吾亦何面目見汝伯汝叔乎汝之生父吾之愛弟也乆矣抱痾遂廢宦業令聞汝訃還􅁆千里其􅀅何以為懐乎為之兄者又􅀅何以堪此情乎且汝之病吾謁之醫而竭之劑汝之歛吾致之禭而哭之痛猶以為有憾也吾弟扵汝其病也不見􅀁服之劑其歛也不見􅀁禭之衣􅀅何以觧其憾乎吾扵汝身􅃜頋復之義失父道矣又扵吾弟乖付托之意失兄道矣二者胥失其將何以逃扵天地之間乎吾才不逾今之中人吾學不及占之下士禄寵踰涯不自乏絶釁鍾後人致汝夭閼今雖知過其可及乎去年送汝先至通州汝柩􅀤後有詔止之留汝一年不遣行者欲送汝也今兹􅀅行詔又止之其敢違乎􅀔難再留計無􅀙出專遣幹僕托之信友扶汝護汝先還家山昔汝孝行感扵神明生不􅀗祐死當􅀩休汝登舟車無震無驚汝涉江湖無恐無怖魂神清明依汝體魄吾今抱病逾二載矣其哭汝也淚盡而觔枯血濇而心悸虗名禁持無􅀁吿訴上天監臨終遂所請歸治汝䘮歸立汝後然庶幾周吾父子之情塞吾兄弟之責也汝其有知强飲强食往即長路以還故鄉其無以老父留此為念也嗚呼人世之别有􅆭扵此者乎老父之哀其可巳乎其不可已乎圭齋文集卷之十五終䟦元贈亞中大夫歐陽公神道碑後元歐陽圭齋先生玄本分宜防里族寓居瀏陽登延祐乙卯進士第􅍓官中外四十三年終翰林學士承㫖文章道徳卓然名世朝廷寵眷終始甚隆加㤙扵其父祖者屢矣方先生為翰林直學士時制贈其父成叔翰林直學士亞中大夫䡖車都尉追封渤海郡侯而奎章閣大學士沙臘班為請命侍講學士張起巗撰碑文侍書學士巙巙書之起巗與先生同年且同官故扵碑中叙其族世行誼為詳而此本盖當時摹之以遺防里之族者也防里之裔曰鏞装潢成帙􅀅永蔵之以為家寳間来京師持以示子求䟦予荘誦再四見其家世文學之美行誼之髙然後知先生之所以顯融光大者有自信􅀁謂積厚而發弘也不勝起敬焉且是碑立扵至元丙子迄今百二十六載而完好如新非什襲而珎蔵之其至此歟然蔵扵家孰若蔵諸身碑中􅀁載世可法也使為宗族子孫者誠法其所為心念而身體之溢淬礪乎文學敦篤乎行誼以求及乎前聞安知無若先生其人者出以大顯扵時㢤昔六一翁以文鳴宋而先生繼之固知繼先生而出者尚必有人信歐陽氏之多賢故也鏞字光樂為國子生拜官且有日而才卓卓又今防里族之翹然者其他子弟志學尤衆承先啓後庶其在此因識于碑未併致期望之意云天順五年􅀊次辛已冬十月朔賜進士及第中憲大夫太常少卿兼翰林院學士知制誥安成彭時䟦
