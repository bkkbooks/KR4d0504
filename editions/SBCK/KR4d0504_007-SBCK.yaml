body:
  text: 安成後學劉釪校正序防里歐陽氏族譜序歐陽氏之初望出兩郡千乗中絶今存者皆渤海裔也其譜牒視他姓氏宜為易考又自唐以後譜學乆廢我文忠公最先倡之其譜牒視他姓氏宜為先備今或不􅀎然則以子孫衆多轉徙不常也吾家自趙宋淳熈丁酉髙祖八府君自防里遷瀏之馬渡曽大父宜軒先生自馬渡遷長沙大父澹軒先生及先太常渤海伯復居于瀏聞八府君在時間􅀊一至防里由曽大父而下仕學四方至者盖鮮獨幸我族属不可鄙夷而得叙其世次焉頃予在朝防里族兄竒翁先生遣姪勞予京師去年謁告南歸又勞予于家且囑叙其譜焉余方約爲譜亭之行當得備詢而悉載之未㡬予環之使至是以不果来也因念吾宗之盛儒者又多譜或不一致貽先正巽齋公之恨然以予今日之事觀之又何恨乎昔人耶雖然族譜之作􅀅以重倫紀厚風俗使其子孫知源委之􅀁自􅁕矣必求如唐人之譜學自受姓以来皆有可考則固有難者矣無已則用吾文忠公之法姑叙防里之近者焉則庶乎其可訪求也譜􅅏予􅀁半載迨􅀅北行乃叙而歸之竒翁以俟他日彭氏族譜序分宜彭氏其先東漢長平侯宣居淮陽傳九世至北齊陳留王樂居安㝎又八世唐禮部侍郎景直居瀛州子搆雲避天寳之難遷江右傳四世為安㝎王玗居廬􅁜玗兄弟五人為太尉者四子十一人人皆檢校大傳大保六曹尚書諸鎮刺史孫二十七人相繼登進士第為顯宦五世孫嗣慶復遷分宜縣南之珠溪今珠溪族甚盛或􅀮于林麓或顯于王門卓犖豪傑世不乏人或明經而􅁱進士之業者殆不可量予甞讀彭氏家傳王雄㩀一方士馬精銳􅁆與淮陽爭衡湖南馬楚為之請于後唐錫爵崇貴迹其材智英毅豈下五季諸雄㢤惟􅀎自䖏冲抑不竊位號故其子孫衆多美譽不墜此殆鬼神之福謙者歟傳又言王亨年九十有八繼學不衰子弟􅀙授二戴禮及春秋者千餘人非有絶人之資不至是也抑彭氏世有聞人爵為侯王長平侯以文學陳留王以武功安㝎王資兼文武繼自今為子孫榘矱先訓箕裘先業文武以應國家之需則是顯融者豈有既㢤珠溪之彭吾防里之歐陽族望相同婚􅊚相繼故叙是譜不辭白石周氏族譜序六朝以来家有譜系之學又有譜系之書隋經籍志載天下郡國族譜若干卷吉州譜八卷洪都􅀽州稱是江右諸郡詳他郡也唐世此學此書盛行五季淆亂四方割據馬􅎋在湖南獨􅀎􅁿徭薄賦又招納賢者故中州名家士多歸之後以希聲兄弟争國士稍稍散去今觀廬􅁜周氏族譜言其先世避地江淮丁馬氏􅅍復徙金陵盖唐末自中州依馬氏及亂而遷此亦當時之一族也但譜云江淮當作江湖殷境土未甞及淮考之馬氏失國既乆南唐始亡周氏府君羡仕唐至僕射理宜然也由僕射迄今冠盖不絶屢遷而不替則周氏之徳其盛可知矣孫名師韓者有志扵譜乆備録而刻之猶子諒以刻本至京眡余求志其帙夫譜學廢譜書亡巳乆余何幸見古道扵周氏然余甞以杜君卿作通典詩譜書具存而杜不紀録為可恨今則無􅀁於購矣適承􅃙􅁱經世大典偶見周譜因附著予感扵斯且志吾廬陵之人尊尚氏族其来甚逺也後林周氏譜序廬􅁜周叔量以其族譜謁余序其端予序南北大姓多矣求其自受姓以来世系不絶厯厯然可考者鮮盖由世變相承或斷續扵南北六朝之離合或散逸扵五季列國之紛爭徃徃而是也唯代有聞人出而振起之及有卓識之士當世變之来善擇地以䖏則族可至不絶譜可至不􅈥也予觀周氏始遷周原迨漢之爵徹侯者有其人又降而為魏慱士厯晋至北周為長安之周甚盛渉陏至唐中葉府君璟顯融于時至四世威遭世有難避地金陵五世矩事南唐為御史晚愛廬􅁜山水之秀可居遂依郡公楊竦而家焉即今之西昌宋􅀄有曰史舘學士有曰光禄僕射皆傑然表扵其族淳化而下宦業日盛朝廷賜其所居里曰爵譽六世倩又嘉安成泉石之勝曰後林而徙居之内附後子孫亦􅀎輯其前聞由是詩書之澤與爵譽相輝暎盖九世于兹矣叔量受知當揆􅀍選為公府􅁺㑹有特㫖省􅄗通用南北士遂應令首為御史􅄗􅁺遷􅄗照磨進中書檢校官因思近代名公卿有自以先世或閾扵偏方不􅀗有聲扵中國及貴徙居中州頗為士論􅀁少今觀叔量之際遇則為子孫相攸唯當以山水風俗之美若地里之僻左自當遇大同之世推一世之公也雖然居者種徳以芘其後行者畜學以發其身亢宗之道在是而已爾叔量名浩學行偉然時譽歸之後林周氏之復盛其昉扵斯乎廬􅁜中州劉氏族譜序前代藝文志載郡縣氏族書甚多士君子若唐路氏宋吕氏明譜牒之學學者亦不乏人近世氏族書散失士扵譜學無聞中州故家屢更兵燹仕者投牒天官曽大父大父或犯其諱其族譜可知矣江南内附多不煩干戈承平既乆冠盖之族幸遭明時􅆂濡深仁徃徃治其家譜不知者以為一家之私事知者則以昇平之氣象可觀扵此至正壬午十月余訪族就醫扵宜陽道經南泉與中州劉君西巖及宗海㑹于山中出其􅀁􅁱族譜眎余徵余叙其事廬陵劉氏之顯者獨多扵郡中州族自廣平来始祖紹聞府君傳至今厯十有七世詩禮相仍簮紱相踵試閱其編支分􅂀别昭然在目西巖宗海二君之用心可謂勤矣予族宜陽而家瀏居間屢欲訪族而阻疾聞族有善醫徃即之中途見劉氏族譜私􅀼自喜知吾族之必可訪疾巳者㡬半故因其請而樂叙其帙端紹聞歸宋積官運使其子有與金陵李氏姻戚者盖大姓也其詳見王城山先生及宗海自叙云國朝名臣事略序應奉翰林文字趙郡蘇伯􅁱年弱冠即有志著書初爲胄子時科目未行舘下士諅言詞章講誦既有餘暇月筆札又富君獨愽取中朝鉅公文集而日録之凡有元臣世卿墓表家傳徃徃見諸編帙中及夫閑居紀録師友誦􅀃扵國􅀄以来文獻有􅁕徵者彚而稡之始䟽其人若干屬以其事中更校讐􅌨去而導存抉􅀮而蒐逸乆而成書命曰國朝名臣事略他日余與伯􅁱同預史屬􅀙借讀之作而歎曰壮㢤元之有國也無競由人乎若太師魯國淮安河南楚諸王公之勲伐中書令丞相耶律楊史之噐業宋啇姚張之謀猷保㝎藁城東平鞏昌之方畧二主楊徐之詞章劉李賈趙之政事興元順徳之有古良相風㢘恒山康軍國之有士君子操其他􅄗府忠藎之臣帷幄文武之士内之樞機外之藩朝班班可紀也太保少師三太史天人之學􅁜川容城名節之特異代豈多見㢤至扵司徒文正公尊主疪民之術􅀁謂九京可作我則随武子乎乾坤如許大人才當輩出伯􅁱是編未渠央也姑志余􅀁見如是云廬陵鐂氏通鑑綱目書法後序昔司馬文正公變紀傳為編年作資治通鑑朱文公稍變其法且寓􅀁去取焉是謂綱目讀是書者夫人以為春秋三傳之遺意也夷攷文公生平於易詩書禮或自傳註或寓門人皆有成書獨春秋缺焉至胡氏傳又􅉨􅉨信未之確然則綱目何為而作耶盖甞求之春秋者魯史舊文􅀃者謂直書其事羙惡自見初未甞拘拘扵義例者愚盖不敢必以其言為非也若司馬公則志存鑒戒巳見扵著書之名而予奪權衡時有􅀁憾文公患之故有是作焉􅀄意固有間矣書王宗周天下是時有與周同稱號者乎黜魏帝漢有􅀃也乾侯之公在是也房陵之帝王乎帝乎故知是書扵春秋􅀁以異之跡則知􅀁以同之㫖矣推二大節引而申之書法斷不誣矣近時儒者疑為文公未脫藁之書或疑為門人之作皆未究􅀁以作綱目之志云爾廬􅁜鐂先生研覃於是三十餘載比辭而覈研推事以求度綱舉目張如指諸掌曰通鑑綱目書法亶其嚴乎余􅀙友人鄂省宰属馮君子羽得而讀之三復歎之曰春秋微公榖啖趙諸􅀃猶可綱目微鐂氏書誠不可也何時歸青原故鄊願即先生一二而􅀭􅃀之姑志余􅀃于帙末忠史序忠者盡己之名也天以事物當然之理賦扵人人盡其所當然者而無憾焉是之謂忠今語人曰臣事君以忠與忠恕之忠同則莫不駭然以為非而實然也或曰臣盡臣道扵君忠矣子盡子道扵父何獨曰孝乎曰不然也禮記􅀁謂内盡扵已而外順扵道忠臣以事其君孝子以事其親其本一也此即吾􅀃也然則上盡其􅀁當然扵其下其名曰何曰盡有不敢不勉之義上下之間必有别也故盡之對為推即恕矣程子甞謂忠恕一也事上之道莫若忠使下之道莫若恕後儒疑之未喻此也人生而静動與物接即有盡已推己二者出乎其間識者知其然固無一息而非吾效忠之時也是道也所以事君所以事天詩曰昊天曰明及爾出王昊天曰旦及爾㳺􅄛亶其嚴乎番易楊玄翁有見扵此矣大父通守左軒先生當宋季官守以正直聞臨難以死節著玄翁慨慕先志作忠史十餘年成書扵是上下􅁆千年臣子大義粲然畢具微而一言一行苟無愧扵盡已者悉録之又微而裔夷小邦婦人女子之操不遺也又極而心跡形似之間皆有以覈其實是非瞭然不繆扵古人何其至公而當也嗚呼自忠之􅀃不明士大夫平居無􅆂養省察之功蒞事無鞠躬盡瘁之志立朝無直言極諌之風至扵臨難死節􅀎保其必然也耶嗚呼宇宙間此道明即天地變化草木蕃不明即天地閉塞賢人􅀮甚可畏也余爲國子􅀶士時職當校獻書既表章之猶恐玄翁著書之志未白也故述忠􅀃扵斯嗚呼是書果行扵世也夫書之幸也夫世之幸也夫虗􅄜集序古人之詩􅀍之絃歌其入人之深猶有待扵聲今人之詩簡牘而已或一字之工一言之妙真􅀎使人心存而不忘以是徃徃知音扵千里之外㑹心扵百世之下求其􅀁以然而莫知孰使然非天乎愚讀秀江縣春洲詩清曠簡逺擬古精到有韋栁風而自名其集曰虗􅄜嗟乎􅉚者吾知其為匏筩者吾知其為管今吾與春洲神交􅄀漠扵不識不知之鄊讀其詩愛其人吾不自知吾為何心此盖南郭子綦之􅀁為隠几者耶抑又聞逹人之詩猶治世之音人未逹世􅀅治有識者察焉天地間有無相推虗實相感聲之妙萬物者其在乎此孫君勉乎㢤吾有以知君矣題而歸其詩至正條格序至元四年戊寅三月二十六日中書省臣言大元通制為書纉集扵延祐之乙卯頒行扵至治之癸未距今二十餘年朝廷續降詔條法司續議格例􅀊月既乆簡牘滋繁因革靡常前後衡决有司無所質正徃復稽留奸吏舞文􅄗臣屢以為言請擇老成􅂄舊文學法理之臣重新刪㝎為宜上乃􅃙中書專官典治其事遴選樞府憲􅄗大宗正翰林集賢等官明章程習典故者遍閱故府所蔵新舊條格􅇎議而圜聴之參酌比校増損去存務當其可書成為制詔百有五十條格千有七百斷例千五十有九至正五年冬十一月十有四日右丞相阿魯圖左丞相别里怯不花平章政事鐵穆爾逹識鞏􅁲班納麟伯顔右丞相搠思監叅知政事朶兒職班等入奏請賜其名曰至正條格上曰可既而群臣復議曰制詔國之典常尊而閣之禮也昔者周官正月之吉始和大宰而下各以政教治刑之法懸之象魏挾日而歛之示不敢褻也條格斷例有司奉行之事也甫刑云明啓刑書胥占其􅀁􅀙来逺矣我元以忠質治天下寛厚得民心簡易㝎國政臨事制宜晋叔向􅀁謂古人議事以制之意斯謂得之請以制詔三本一置宣文閣以備聖覽一留中書蔵國史院條格斷例申命鋟梓示萬方上是其議扵是属玄叙其首篇玄乃拜手稽首揚言曰人君制法奉天而行臣知事君即知事天敬君敬天敢不敬法書曰天命有徳五服五章㢤天討有罪五刑五用㢤易曰雷電噬嗑先王以明罰勑法又曰雷電皆至豐君子以折獄致刑二卦之象為電為雷所以明天威也繼自今司平之官執法之士當官蒞政有徴是書母瀆國憲母干天常刑期無刑實自此始亦曰懋敬之㢤奕序古者人生入小學比及弱冠而禮樂射御書􅁆六㙯之事巳徧習矣他日因射之餘意為投壷且寓禮焉因􅁆之意為奕且寓智焉其初皆􅁕以養其良心而合乎張弛之道者也投壷之􅀃見禮記奕之說孔孟甞及之世傳堯以丹朱以智教之以奕雖未必然然奕有算法存焉􅁕以導智容有是也今小學之教乆廢而二事以為􅇊精之者徃徃名世焉廬陵嚴徳甫善奕􅀄集奕法為書晏文可故家子也乃以家藏諸譜又増益之奉禮青城楊君以書来為之求叙􅀅鋟諸梓以廣其傳予性狷且拙以賤力學乏暇扵琴扵奕皆懵然每為大夫士所哂楊君之請愧不䏻言奕之幽眇以荅之姑叙其􅀁知者如是考古臆􅀃序昔誠齋先生觧易取史事以證爻辭安成李廷傑上書取史事以言時務皆􅀎極事變而盡物情非特􅁕以垂来世之戒推而行之有􅁕以救當時之弊然非學博而義明焉䏻援㩀如是之精覈論訂如是之詳切耶舉子學䇿套扵燈窓求籠簟主司之問立志已在扵進取為論何恠扵迂踈廷傑此作志在祛時蠹而起民瘼豈切切為功名計耶宜其剴直而無諱明白而可行也閑中閱此知山林中有識時之俊憂世之士如廷傑者第未用爾用則扵斯民豈無􅀁禆益乎鈐岡續忘序郡縣之圖志何為而作也國有賢守令猶家有賢子孫守令保圖志以治分地子孫保關券以治分業􅀎治其所有即為賢矣因田野之有㝎界也而考其有汚莱者乎因户口之有㝎􅁆也而考其有流亡者乎因賦役之有定制也考其在公者有湮沒乎在私者有暴横乎因士習之有舊俗也考其有可匡直而振徳者乎有可濯磨而作新者乎治之而無倦則田野可闢户口可增賦役可均風化可以日美人林可以日盛矣然則圖志可一日而􅀜乎分宜有縣起宋雍熈至南渡嘉㝎間謝令謀作縣志㝷復不果淳祐黄尉始克成之混一以来更六十有七載浚儀趙侯尚之為尹百廢具舉乃作鈐岡新志以續前編書成適予叙族至邑南之防里侯以予扵是邦寔多桑梓之誼以序見属辤不􅀗則願以昔人治官如家之責告夫求芻扵吾邑者庶知前人作圖志之意非徒以廣紀載備考訂而已􅀅以為勤政之一大􅂇也推本作者之意黽勉述者之事吾邑吾民其多幸矣乎風雅􅀋編序風雅之道先王治天下一要務也風即風以動之之風雅即雅烏之雅以其身􅀎動物也本扵邦國播扵樂府薦扵郊廟以考風俗以觀世道尚矣然惟其聲不必惟其辭故有聲而無辭者有之無聲而有辭者無有也孔子論韶舞本惟其聲武王所遭遇與舜不同世儒因其不同而優劣之未必聖人意也周衰風雅道熄既而聲音之學寖廢無已而求言辭之間則後世詩為近盖其志氣之盛衰意􅃐之高下音節之淳漓扵風俗世道猶有可考者是以君子有取也􅀽君懋昭作風雅􅀋編介予宗姪貞為之求序見其凡例强人意甚多以世代次序此得詩譜遺法起四言至樂府止五言七言絶句論建精詳去取簡當他日書成扵風雅豈小􅀘㢤余甞典司太常又甞出為觀風使者留意兹事而弗克遂偉㢤􅀽君是編其為我趣成之潛溪後集序經筵檢討鄭君濤以金華宋濂先生􅀁著文集徵予序予為之言曰三代而下文章唯西亰為盛逮及東都其氣寖衰至李唐復盛盛極又衰宋有天下百年始漸復于古南渡以還為士者以􅀙焉無根之學而荒思扵科試間有稍自振拔者亦多誕幻卑冗不􅁕以名家其衰又益甚矣我元龍興以渾厚之氣變之而至文生焉中統至元之文龎以蔚元貞大徳之文暢而􅃾至大延祐之文麗而貞秦定天曆之文贍以雄􅆂育既夕日富月繁上而日星之昭晣下而山川之流峙皆歸諸粲然之文意􅀅超宋唐而至西京矣宋君雖近出其天分至髙極天下之書無不盡讀大江以南最號傅學者也以其所藴大肆厥辭其氣韻沉䧺如淮隂出師百戰百勝志不少懾其神思飄逸如列子御風翩然褰舉不沾塵土其辭調爾雅如殷鼎周彛龍紋漫㓕古意獨存其態度多變如晴躋終南衆皺前陳應接不暇非才具衆長識邁千古安能與扵斯雜扵古人篇章中盖甚難辨唯真知文者始信予言之弗謬予在翰林也乆海内之文無不得寓目焉求如宋君何其鮮也苟置之承明奉常之署使掌制作豈不能黼黻一代乎先民有言曰知言聖賢之能事立言學問之極功不學知言不能明理不學立言不能成文有若宋君其殆理明而文成者歟因書以為序宋君字景濂濂其名也嘗著人物記二卷余為序之鄭君謂其可擬五代史記亦公論云易問辯易之為書上通神明之藴下該事物之理以變易為用以㑹通為方其初立名起義如是其為􅀃宜無窮焉漢以來易專門師多於五經而其疑􅀹多千有餘年未有紀極族子貞歴考諸家之異同質正先儒之論議􅀄名易疑後改曰問辯凡三十卷用功精深可尚也吾宗巽齋先生為曽大父冀郡公作經訓堂記言歐陽氏經學司馬氏史學由三代而下伐有其人盖六經甫出孔氏之壁歐陽氏即以八世博士世其學其來豈一日哉司馬氏史學至宋君實復振歐陽氏經學我六一公易有童子問詩有本義凡宋儒以通經學古為髙寔公倡之故余見貞是編喜吾歐陽氏經學亹亹其不絶乎抑是編豈獨便􅂣屋之習山林窮經皓首之士見之未必無􅂇我之歎也貞為我勉成之鈐南道士歐陽賔實詩集序嘗有客論詩言古今僧之能詩者甚多道之能詩者絶少予曰軒轅彌明柰何客曰或以爲崆峒道士鄒訢􅀋也余曰嵇叔夜陳子昻李太白爲詩識者謂其辭有飄颻凌雲之氣盖道家者流之餘風焉道士學之其爲詩何以加吾宗歐陽賔實􅀉興老子法他日以所作詩帙遂來求序於余余讀之愛其清緻而有體其間幽間之容冲抑之氣又有因詩而足以知其人者以是知嚮之論詩之言之未信也雖然余扵賔實猶有甚可喜者焉近日龍翔首座海東淖以能詩深爲蜀郡虞先生所賞識亦歐陽氏也今賔實詩聲日起豈非吾宗多文人秀士寓跡方外􅀹能以所學知名四方歟東淖白水族賔實防里族云梅邉先生吾汶藁序論人行事枚舉而稱之者其善為可􅁆論人文章舉一以蔽之者其善為不可勝􅁆也廬􅁜梅邉先生與先君渤海侯為大學存心齋同舎咸淳甲戌随路混􅀘入學又同生淳祐之壬子先君甞稱其才噐卓犖有徃􅈒風運改世遷篤志稽古蘄為文章以見志予恨未及一識他日􅀙其門人鐂君省吾得吾汶藁讀之至生祭文丞相文作而嘆曰嗚呼王鼎翁宇宙竒士也士之趣人以自裁者惟朱雲扵其師蕭望之然望之特一身計耳鼎翁之為言為天下萬世之為人臣者計也嗚呼雄㦲盖嘗論之斯文者宇宙之元氣也幸而治平措諸事業則為典謨為雅頌不幸而反是則為春秋為變風雅為離騷然正人心扶世教之功難見扵治平無事之時而屹然可仗扵流離顛沛之日然後知斯文之所繫如是其重歟詩曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫􅂇之夫天人維持之際惟是心耳何其深厚悠長之味溢出言表耶文武之澤在人其未泯歟鼎翁是篇與是詩辭氣雖若不同實相表裏愚故表而出之他詩文竒氣壮節􅀋是環山詩藁序前年與族弟齊吾同客京華暇日相聚齊吾口誦近作予傾聴移日旅懷為之豁然今年予謁告還家復相遇扵瀏東之沙江出詩藁示予佳句疊見私􅀼自喜吾宗之多文人也齊吾盛年子長之逰方壮涉厯日逺覩記日廣吟詠日富大編巨帙當自此始老兄退䖏􅅵畒凉竹簟之風曝茅􅉉之日思草池之句得新集讀之亦􅁕以怡暮景矣三復玩味題而歸其帙圭齋文集􅃃之七終
