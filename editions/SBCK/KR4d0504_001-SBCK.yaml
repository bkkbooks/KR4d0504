front:
  text: 圭齋文集卷之一宗孫銘鏞編集
  hash: sha256:b5fbffda15244e97341ba48c9cbad027371971d56056d35b930fceef434291e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_001-1a}
body:
  text: 安成後學劉釪校正賦天馬賦翳房星之委精鍾天馬之權竒澡神質扵渥洼砥勁氣扵月氐貞非坤牝徤本乾為上分扶輿之秀下孕蜿蟺之漦風雲資其格力雨露澤其光儀膺廣鳯臆鬛秀竜鬐首昻渇烏之􅀔影捷杜矢之馳扵是陋騊駼之産邁麒麟之姿􅆖六飛扵廣漠舞九奏扵希夷若乃朝刷崑崙夕秣玄圃駕緱笙之子晋道霞觴扵王母風冉冉􅀆斯征靈􅌭繽􅀆来宁覽熈世之徳輝属萬物之欣覩願陪禁衛自獻西土乃命移中戒造父釋雲幕扵金鞍暎孚尹扵瓊户出則鏘和鸞􅆖輿組媚日馭之光華展天衢之歩武然其氣質不可求之驪黄之餘其芻秣不可􅂌之皁􅌴之伍峙玉山之殖未􅁕供其齕委金㙜之貲未􅁕議其估是知天馬固難得而不易畜也所以罕見扵盛時僅聞扵前古時則有倣鄒枚請賡樂府而客或難之曰時方歌鹿鳴之章子乃為天馬之賦得無馳駕鼓車者寧不與此而逈殊也㢤嗟夫寳不自貴以人而貴物不自異以人而異方神駒絢綵扵水涯固期駑劣之同滯至其裂砮矢而庭實竟乃自齒扵天駟信物美而無􅀁遺􅀆亦竒才之䏻自致􅀒塩車而上太行者慨未遇夫伯樂伏皁􅌴而志千里者又何慙乎老驥振長鬛而一嘶􅀆兾識余之所意􅅽埃風而上征􅀆願借翠雲以為鞁随飛龍而上下􅀆羗先路其焉避彼豈乗虚而騰踏􅀆追雲逐電之可兾也庶㡬求之玄黄之外􅀆則亦駿骨之可市也辟雍賦皇風清寧人文盛開京師崇天下之本國學萃天下之才粤若稽古爰自蒼􅁎始號辟雍昉厯代聲名之盛本大射行禮之宫其䂓剏扵文武其度講扵周公節觀者扵四面壅流水以環中若乃道閫邃嚴義闥軒朗澄源止而不泥文瀾溢而不蕩肉好適半如璧之象兹乃辟雍之初􅀁以名状也或在靈臺或在鎬京靈㙜者為文王􅀁建鎬京者為武王􅀁營兹乃辟雍之初非一地而同一名也或習射􅀆觀徳􅂉養老􅀆興孝匯九有之俊髦軌萬方之則效兹乃辟雍之初非一事而同一教也迹其建侯設鵠矩祫圓冠㐮尺講事君之敬剡注視立已之端斯則辟雍之習射天下之盛觀鮐背鶴􅄠尊傅􅂭師祝噎以膳授几以咨斯則辟雍之養老天下之盛儀誾誾啾啾泮奐夷猶覧上國之光華踵賢􅀜之雋㳺斯則辟雍之養士天下之名流有客聞之曰子扵成周之制講之詳矣扵異代亦有􅀁徴乎泝觀炎劉治盛中世臨雍再拜化及四裔要荒萬里就學遣質鼓篋圜橋以億萬計于斯時也辟雍亦可謂盛矣愚曰未然子徒慕先漢之遺風若未覩今日之文治我國家聲教之􅀁暨也東踰若木之日津西探崦嵫之月竁南窮火維之陬北際氷天之澨文軓之治既同弦誦之風四被視寰海爲一辟雍陶同宇爲一庠序扵是在天則應璧府圖書之祥在地則産孔廟金芝之瑞蔵曲阜之特祠實飛龍之首􅀊乃擇成均之師申胄監之制三年而科詔頒文治蝟日星乎曠世之條風霆乎多士之氣􅀅見自今以始彼漢之億萬尚敢與今日同年而語㢤大抵惟聖人􅀎盡君師之職惟吾道􅀎並天地而存惟養賢爲􅈼俊尊帝之大務惟建學爲化民成俗之大原睠此辟雍屹乎本根固願為今日之賦者續古之頌被之和聲叶之永言前以光八百年之成周後以開萬億載之皇元義門賦并序宣文閣授經郎鄭君浚常以其家乘示余曰浦江鄭氏義門文録厯覽諸作盖彬彬焉他日謁予一言為作義門賦辭曰翳伯僑之裔孫􅀆紛振振其好􅁱承世􅍇之蟬嫣􅀆寧􅀮耀而發幽偱義路以􅁢蹈􅀆擇仁里而相攸被芳潔以為服􅀆襲温良以為裘􅀅孝弟以為車􅀆方敬譲以為舟厯九世而共㸑􅀆壹乃心之休休曰五倫之扵日用􅀆實有生之大猷父慈愛之恂恂􅀆子色養之油油若君臣朋友之際􅀆必忠信之與謀扵睦婣其有恵􅀆在任䘏其有賙閫儀雍雍以賔退􅀆家政凛凛其陽秋長者施其令則􅀆少者孝乎順柔珪赴弟以瘐死􅀆綺代親而自囚史何感乎緹縈􅀆詩何嘆乎原隰之裒嗟髙風之卓絶􅀆􅂂艱貞乎何尤爰孜孜扵稽古􅀆悉聖訓之是蒐陳時祀之秩秩􅀆戴首弁之俅俅述五禮以為儀􅀆樂至和而不流以予觀扵徃昔􅀆􅀅公藝之可儔我歐公之史五季􅀆書旌表之法周門築壝以綽禊􅀆柱雙立而烏頭雪霜貿貿扵當世􅀆松栢岑蔚乎故丘矧皇元巍巍乎有天下􅀆化丕冐扵海陬敦懿行扵四國􅀆播令聞其若郵聞孫起家而交辟􅀆列相第之前籌㝷重席扵官庠􅀆徹聲華扵冕旒信積善之有報􅀆宻邇寵光之綢繆也墨梅賦伊江梅之受命泊與澹其相遭灼天地之太素亂水雲􅀆齊髙方三冬之揺落索群木扵秋毫怳􅅆溪與轉嶺發􅀌暎扵蓬蒿枝苔封以瑩寒蕋玉切而華膏表萬有以獨聖誰與子􅀆同􅂁何佳人􅀆黯然阻煙霧扵林皋豈皎潔之冐汙抑輝光之在韜􅀍翰墨之託􅀉亦何異乎風騷撫尺素而太息心臨逺而忉忉何以慰􅀆空谷瀉樽中之濁醪感外物之變化謹内志之持操物交物以不染我與我而焉勞世不辨􅀆奚尤巳或戾􅀆焉迯與昭質之自􅃜􅀙見咲扵繁桃扵兹花其何有懼天下之滔滔奚附意扵守墨以傳誨扵兒曹頌至正二年壬午七月十八日丁亥皇帝御慈仁殿拂郎國進天馬二十一日庚寅自龍光殿􅃙周郎貌以為圖二十三日壬辰以圖進翰林學士承㫖巙巙傳㫖命傒斯為之賛臣惟漢武帝發兵二十萬僅得大宛馬􅁆匹今不煩一兵而天馬至皆皇上文治之化所及臣雖駑劣敢不拜手稽首而獻頌曰天子仁聖萬國歸天馬来自西方西玄雲被身兩玉蹄髙踰五尺􅁱倍之七渡海洋身若飛海若左右雷霆随天子曉御慈仁殿西風忽来天馬見龍首鳯臆目飛電不用漢兵二十萬有徳自歸四海羡天馬来時庶昇乎天子仁夀萬國清臣願作詩萬國聴圭齋文集卷之一終
