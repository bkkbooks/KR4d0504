front:
  text: 圭齋文集卷之十六宗孫銘鏞編集
  hash: sha256:cc0adefd38571c395ae81be4e839a9b9eadb4b6e12a1326d0c5b4dae50df243d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_016-1a}
body:
  text: 安成後學劉釪校正附録元勑賜翰林直學士亞中大夫輕車都尉追封渤海郡侯歐陽公神道碑銘有序翰林侍講學士通奉大夫知制誥同􅁱國史知經筵事臣張起巖奉􅃙譔奎章閣學士院侍書學士中奉大夫同知經筵事臣巙巙奉􅃙書奎章閣學士院承制學士中奉大夫兼經筵官臣尚師簡奉勑􅂐額今皇上即位之三年至元改元冬十一月三十日奎章閣大學士臣沙臘班奏翰林直學士臣玄識翰林論思有勞制贈其考官三品爵列侯欲著之碑銘光移上恩其􅃙翰林臣起巖撰文奎章臣巙巙書丹臣師簡􅂐額上曰可臣起巖承詔伏惟延祐初年仁宗聖文欽孝皇帝繼述祖訓建立科舉大廷䇿士臣玄臣起巗賜第拜官為同年皇上御極簡擢侍􅀙臣玄臣起巗代言紬史為同官明詔諭臣俾􅀭其先烈發其潜徳求之臣職揆之友誼皆不敢辭謹按公諱龍生字成􅅩歐陽氏其先冀之渤海人􅀙晋南渡徙長沙率更令詢以文學顯名陏唐四世孫琮為吉州刺史因家廬􅁜琮八世孫萬為安福令故又有居安福者安福府君而下四世曰效三子謨託逺託徙􅁻水後􅁻水析置永豐傳二世是為宋大師兖國文忠公之考崇國公其他子孫散䖏安福邑境雍熈􅀄割安福置分宜縣􅀠宜春郡故居安福永豊者籍廬􅁜居分宜防里者籍宜春而安福分宜地相去不滿五十里公防里族也别號防里歐陽氏曽祖安時及祖新皆漕試湖南愛瀏陽山水之勝又徙居焉新字仲齊以經學著稱淳祐未荆溪呉公子良漕湖南辟廬􅁜歐陽巽齋守道為岳麓書院山長又以禮聘仲齊為講書因寓長沙巽齋聆其講􅀃嘆曰長沙自有仲齊吾何為至扵此考逢泰字忠叟經術行業師表一方學者常􅁆百人擢科登第相属也用薦為潭學録安撫司檄與湘潭譚景衡􅂂學田堙沒者登故額士廪以羡廬􅁜羅子逺在教授席頼其佐助為多今贈中順大夫禮部侍郎上􅀐都尉追封渤海郡伯妣何氏渤海郡君公年十六入潭學巳􅀒俊譽月試占髙第相國古心江公判潭州帖為崇禮齋長又二年􅀙醴陵田氏受春秋三傳甲戌混試國學生湖南終􅂣萬三千人有竒㧞士二十八人公以春秋中第二肄業存心齋時羅教授為朝官以書賀云曏潭學經界忠叟景衡盡心焉去􅀊景衡子魁鄊薦今年忠叟子入上庠造物報人不爽如此至元丙子内附侍禮部還瀏陽居霞陽山之白雲荘禮部晚􅀊究心大玄作律曆統元圖書􅁆十卷因耗心得渇疾公泣諌不為止未脫藁卒公抱其遺書毎慟哭至絶左丞崔公斌行省于潭召之以親老辭居山十有七年部使者李淇至瀏瀏有文靖書院祠􅀛山楊先生淪廢扵隣使者考郡志謀復其舊詢衆求才望士任斯責衆以公對乃􅌹縣尹杜元忠即山中延至㑹有司例試儒户中選者復其身使者命公考士湘隂瀏陽去􅂑公當人至今稱之憲部薦其才牒宣閫逹之省府授文靖書院山長郡人强之起始受命改築書院猿山之陽踰年禮殿講堂門廡齋舍及􅀛山先生祠事内外具舉學者雲集書院廪稍不贍佐以巳資夫人亦徹奩具助其經費落成之日升堂講孟子承三聖章言􅀛山先生傳周程學而及豫章延平􅂵陽朱子實承道統斥王安石配享孔廟功亦可配孟子山林老儒聞書院之復筵講至為出涕秩滿㳂牒之亰師贈大􅀓魯國康里文貞公野齋翰林李文正公抑庵集賢宋公交薦為校書郎行就職矣㑹集賢言歐陽山長有功文靖書院今瀏陽陞中州例設教授師席􅀄筵須宿儒碩望啓迪来學宜移教其􅀖人便朝論是之改陽州儒學教授至則㑹學􅅒可贍二十人月約一十五日􅃟俊秀􅀘員㑹食躬親教督諸生皆勤勉自力科塲既闢進士軰出實公權輿之遷道州路教授道介兩廣或以為逺公曰兹為周夫子之鄊何逺之有至官郡庠隣濂溪書院公㝎䂓約朔望謁宣聖畢教授率諸生謁濂溪祠一日過祠東見老屋􅁆間詢知為西山精舍勝國時祠蔡季通蕪廢乆矣祠舊􅀠郡庠有田百五十畒或利其入欲兼并之故以屋僦軍官去遂不治幸其速壞公立召僕夫拚除按籍得田􅁱其祠郡學田多為豪民㩀有公請諸憲司被檄徃括暑行山間得租三百餘石因感疾歸卒官舍至大元年八月五日也年五十有七諸姑奉柩歸以三年十月三十日塟郡東羅田之木􅀲埭公既殁之七年當延佑甲寅玄舉進士魁湖廣省貢明年乙卯以第三人賜第同知平江州遷蕪湖尹􅀄贈公承事郎同知湘隂州事再贈朝列大夫同簽太常禮儀院事上􅀐都尉追封渤海郡伯今贈翰林直學士亞中大夫輕車都尉追封渤海郡侯初娶譚氏一年卒再娶李氏金􅁜仕族有婦徳知書前公四年䘚􅀄追封宜人進封渤海郡君今封渤海郡夫人繼室李追封長沙郡君譚夫人有子曰浩龍川書院山長娶唐渤海郡夫人有子五長貞孫石林書院山長娶王次㝎孫曲阜林廟學録娶李次玄也今中大夫國子祭酒依前翰林直學士知制誥同􅁱國史娶謝封渤海郡夫人次憲孫㓜鞠外氏李沅陵縣學教諭娶湯季彭年舉明經娶周女二長適武岡路教授卜天佑次適瑞州雲石務稅使湯居恭孫男八長慶以教授借住建昌路樂口砦廵檢次暹遹遜逹皆業儒女孫六曽孫男四曽孫女四公儀表峻清瑩晳如玉有膽略幹局性孝友㓜􅀊甞刲股肉以已母疾兄士卨蚤世撫其遺􅀌皆有成婚嫁必先兄于而後及已子先疇悉推與之讀書目五行下八􅀊屬文十五下筆萬言文雄渾有體裁學精敏有識趣尤長扵講􅀃義理毎講篇出士傳誦之晚號雲荘有經學理窟雲荘講義及􅀁著文集傳扵家歐陽氏世以文學名廬陵之族大顯于宋矣宜春防里清門素業文行有傳至扵禮部倡鳴經學師道尊嚴表率多士公學為通儒行為士榘宣勞庠序位不滿徳維持斯文克肩其任再世如一遺善後人是有良嗣首擢巍科聲華燁然演論玉署黼藻帝猷追封二代有位有土大書表隧㤙賁殁存則公父子平昔纉學衛道之報昭然四逹而防里之族克昌以大將嫓美扵廬􅁜矣扵乎盛㢤銘曰惟歐陽氏廬􅁜别族有家瀏陽同岀安福文忠相宋魁然大儒防里清門世徳不􅀌操義風烈堅持􅁢蹈服膺克繩義方之教三代之英士生其時世其道徳以恬以熈至行應古鄊􅀖攸重士子景􅀙如鳥歸鳯衛道育才再世一心播耰百年有穫斯今綸章載頒秩登侯伯霈恩所覃扵渥其澤大君賜命詞臣敬承撰銘發潜匹休廬陵宣昭幽顯帝仁􅀂天垂示無垠何千萬年大元故翰林學士承㫖光禄大夫知制誥兼脩國史圭齋先生歐陽公行状曽祖新贈中奉大夫嶺北湖南道宣慰使護軍追封冀郡公祖逢泰贈昭文舘大學士資善大夫上護軍追封冀郡公父龍生宋太學上舍生累贈集賢大學士榮禄大夫上柱國追封冀國公公諱玄字原功姓歐陽氏其先出扵夏禹之苗裔漢涿郡太守子孫有居冀州之渤海從晋南渡居長沙唐率更令詢四世孫曰琮爲􅁻州刺史因家廬陵琮八世孫曰萬爲安福今故有居安福者安福而下四世曰效三子謨託逺託徙居吉水析置永豊傅三世曰觀是宋大師楚國文忠公之父崇國公逺留安福子孫散處境内宋割安福置分宜縣􅀠宜春郡故居安福永豊者籍廬陵居分宜防里者籍宜春而安福分宜地相去不滿五十里公爲防里族宣慰公試湖南轉運司愛瀏陽山水之勝遂卜居焉淳祐末荆溪呉公子良􅀅漕湖南辟廬陵歐陽公㢲齋守道爲岳麓書院山長又聘宣慰公爲講書歐陽公聆其講􅀃爲之驚嘆昭文公經術行業師表一方若集賢公之行事始終則有今上所賜碑備載云集賢公子四人長貞孫次定孫次即公季彭年公生扵至元二十年五月母冀國夫人李氏賀州簽書判官􅈦公事某之女讀書􅀎文親授孝經論語小學諸書公八􅀊巳䏻成誦始􅀙鄊先生張貫之授學日記􅁆千言即知属文十􅀊有黄冠師至里塾坐㝎周視諸生注目視公乆之曰是兒骨格不凡神氣凝逺耳白過面目光射人惜本朝未興科目有則状元何疑然異日亦當文章冠世聲名滿天下廊廟噐也言既而去亟追與語巳失􅀁之集賢公為文靖書院山長部使者某至州謁之書院公與諸生講誦使者異之就坐命賦梅詩立成十首晚歸増至百首使者謂集賢公曰令子竒才也年十四􅀙宋進士方山李公某受業下筆􅂺千言年十六􅀊􅀙宋進士吾山鄧公某毎試庠序必占髙等老師宿儒讀公詞賦制科之文戒其子弟􅀓習焉弱冠下惟􅁆年人莫見其面經史百家靡不研究伊洛諸儒源委尤􅀁淹貫間至郡城憲使涿郡盧公摯見公儀表及觀所為文大噐重之相與倡和留連不遣去薦為憲史力辭不就大徳元年母李氏大夫人卒居䘮哀毀致疾十一年公生之日集賢公為詞以夀之期待之意甚逺集賢公遷道州路儒學教授公寔侍行道為周元公鄊里儒風尤盛公日􅀙諸先生逰學力銳進境内勝㮣題藻殆徧集賢公卒居䘮毀瘠扶柩以還築室墓側居廬三年然後㱕復還郡城江東憲使􅀩古公孫澤省親長沙一見大奇之㽞居舍館為忘年友薦公文學堪居翰苑牒郡府以達朝廷雍郡虞公井齋汲分教扵潭毎見公􅀁為文為之擊節時其子集為􅀦子助教繕寫成帙親題以寄于是公蹤跡未至京師而聲名已彰著扵朝矣皇慶二年州之霞陽山宣慰公墓在焉前有万池水流清㶁仲春之月西偏有泉觱沸其色正綠初出如綫凝結漸大如層雲疊翠浮泛水面日出生扵西亭午至池心日入沈扵東者三日汲而書扵􅁓經久而色不變延祐元年李春之月芝草一莖七葉生扵舍東桃樹猫犬樂相乳哺綠衆復見作三瑞堂以志其事㑹下詔設科取士公以治尚書與貢廬陵龍公仁夫為考試官夢神馬見扵雲霄書公姓名于大旗上果以天馬賦中苐一明年賜進士及第授承事郎岳州路同知平江州事四年丁繼母李氏憂六年調太平路蕪湖縣尹疑獄數起累年不能决公得其情皆為平反豪右非法虐驅其奴公俾之􅀙良貢賦徴發及時民樂趨事民有􅀁為皆曰縣尹聞之得無不可扵意否莫不忖度而後行事飛蝗獨不入境嘉禾生野􅁞熟成繭教化大行道不拾遺父老相率上其状公立止之乃刻石吉祥僧舍行臺憲司交章薦揚泰定元年改承直郎武岡縣尹縣控制溪洞蠻獠雜居俗尚勇好鬬撫字少乖事釁不測公視事踰月赤水大清兩洞聚衆相攻殺隣境告變官曹恣睢失色計無􅀙出公曰彼亦人耳欲弭其變惟以徳化感之吾􅀅躬行撫諭即日單􅀐􅀙二人徑抵其地至則死傷盈道戰闘未巳徭人素知公徳望及至皆愕然相視棄兵仗羅拜馬首請罪曰我曹非不畏法而擅興兵縁訢其事于縣縣不為直而吏更需求無已繇役横歛掊克百端使終􅀊勞苦無以為生情有不堪發憤就死耳不意煩我清官自来罪不可逃公乃宣布徳威明示信義歸理其頌其人感激遂安召為國子博士四年考試進士扵禮部陞國子監丞致和元年授翰林待制奉議大夫兼國史院編􅁱官㑹賔興承㫖學士或有事役或留上京一二同属皆稱疾不出公領印攝院事日直内廷叅决機務凡逺近調發制詔書檄既而改元天曆郊廟建后立儲肆赦之文皆經譔述且條時政􅁆十事實封以聞多推行之二年考大都鄊試􅀄置奎章閣學士院又置藝文監􅀠焉選清望之官中書擬翰林􅁱撰某爲少監文宗不􅁢郡臣莫測其故乆之乃問􅁱􅁧品級對曰六品又問嚮蕪湖歐陽縣尹有㢘聲今安在對曰爲翰林待制又問待制品級對曰五品曰何爲不擬待制而擬修撰耶即􅂑奏目御書歐陽玄可授藝文少監特命左丞相伯顔叅政阿榮傳㫖公􅀖命入謝文宗大恱復問公曰汝爲廬􅁜族長沙族耶應對稱旨閱古今書􅀞或以宸翰賜群臣必命為叙賛至順元年考試進士於禮部奉詔纂􅁱皇朝經世大典明年春書成奏御夏謁告南歸秋陞藝文大監檢校書籍事階朝散大夫是日中書奏遷不愜上意者去其大半既而特筆藝文少監歐陽玄可陞大􅁥除目今蔵近臣家即遣使召還今上即位改中順大夫僉大常禮儀院事元統二年拜翰林直學士中憲大夫知制誥同􅁱國史奉􅃙編修四朝實録譔太皇太后玉册文賜白金五十兩詔􅁱先師兖國公廟成奉勑譔碑文明年春兼國子祭酒進階中奉大夫召赴中都議事詔侍講學士張起巖譔公先塋碑至元二年得請還家􅀣碑三年升侍講學士中奉大夫知制誥同􅁱國史遣編修郭嘉檢校張先後各齎内醖趣召譔太皇太后玉􅉺文四年復兼國子祭酒進通奉大夫譔皇后玉冊文賜白金五十两五年􅁕患風痺乞南歸便醫有㫖不􅁢修曲阜宣聖廟成奉􅃙譔碑文初公有子皆早卒復以弟彭年之子逹老為嗣六年二月卒公哭之過哀舊疾復作乞還鄊里携柩返塟近臣以聞上深念之即日遣奎章閣典籖全普庵撒里賜内醖二尊追至臨清勉諭諄切不克辤復還拜翰林學士資善大夫知制誥同􅁱國史命馬札兒台右丞相草詔懇辭去位降㫖不允止免朝賀行禮至正改元更張朝政事有不便者集議廷中極言無􅀮科目之復沮者尤衆公力爭之命脫脫右丞相草詔九月南歸眀年遣使賜白金五十兩金幣表裏叚各一内醖二尊復起爲翰林學士以疾未行有勑譔故相和寧忠獻王脫脫神道碑三年詔􅁱遼金宋三史遣使賜内醖二尊召爲總裁官使者迫促力疾就道至則廟堂問􅁱史之要公曰是猶作室在扵聚材擇匠聚材則先當購書擇匠則必遴選史官扵是用公言遣使購書増設史官立三史凢例又爲便宜數十條俾論譔者有􅀁􅃍依史官中有悻悻露才議論不公者公不以口舌爭俟其呈藁援筆竄正其論自㝎至扵論賛表奏皆公属筆南郊禮成冊文肆赦賜白金百兩居庸関過街塔成奉勑譔碑賜白金五十两四年奉􅃙譔成宗御殿碑賜白金五十兩五年知貢舉進翰林學士承㫖榮禄大夫知制誥兼􅁱國史初御史大夫也先帖木兒在宿衛上問在廷儒臣乃以公姓名對上曰斯人厯事累朝制作甚多朕素知之今􅁱三史尤任勞勲汝其諭㫖丞相超授爵秩用勸賢􅀎明日大夫出遭丞相扵延春閣下傳㫖既畢立具奏牘上大恱稱快者再三命左丞相董守簡賜宴史舘明日入謝平章納麟謂曰吾乆在省臺未見昨日天顔如是之喜也張公起巖先為承㫖位第六公所代第四公曰張公吾榜首又先拜命今位次反居末雖曰君命誼有未安乃固譲之及宋史後進上喜書成賜白金百兩金幣表裏叚四乞致仕還鄊不􅁢六年御史㙜奏除福建閩海道肅政㢘訪使行次浙西疾復作因請致仕九年夏遣使賜白金五十兩内醖二尊􅃙譔故相冀寧忠宣王帖木逹實神道碑文公自休致作南山隠居優㳺山水之間謝絶世務日與昆弟故舊觴詠自適有終焉之志十年秋復授承㫖遣使賜内醖二尊以老病力辭不􅀗湖廣省臣知朝廷注意扵公属養疾武昌道宫日徃候問勸公北行控辭之文屢上不􅁢又遣使賜内醖二尊趣行適車駕還自開平迎謁行殿復有㫖行禮朝賀聚會皆免冬奉􅃙譔㝎國律譔選格序河决白􅈋口大興工役勑公譔河平之碑十二年春宣赴延春閣集議肆赦草詔夏乞致仕陳情誠懇乃特授湖廣等䖏行中書省石丞相致仕賜楮幣萬貫玉帶一條仍給全俸􅀙子遜老授本省檢校官孫佑持授湖廣道宣慰使司照磨俾得便養􅀅行降㫖不􅁢依前承㫖進階光禄大夫辭不􅀗十三年上如開平中途賜楮幣萬五千貫㝷奉勑譔金字蔵經序新建夀元忠國寺碑文十四年知貢舉又充廷試讀卷官至是始知家罹寇禍二兄一弟相繼去世親属四百指死已大半配冀國夫人謝氏避難郡城亦沒公聞變哀甚上深閔念賜楮幣萬五千貫傳㫖慰勞復命遜老以資成庫副使給驛還鄊收聚􅀁餘骨􅁏遷寓武陵奉􅃙譔三皇廟新置雅樂記大赦天下草詔時又以病不䏻出外命就家具藁秋皇太子遣宫臣齎親書經訓二大字内醖二尊以賜上箋稱謝皇太子命世臣觧􅀃蔵諸端本堂十五年譔皇太子玉􅁽文賜金帛表裏叚楮幣萬五千貫十六年上遣近臣賜楮幣萬五千貫撫諭髙句驟草詔十七年春乞致仕欲由蜀還鄊不􅁢大赦天下宣赴内府草詔時乆病不䏻歩􅂂丞相傳㫖肩輿至延春閣下上問丞相斯人在朝最乆製述益富年夀今㡬何丞相悉以對賜楮幣二萬五千貫遣執政存勞皇太子千秋節賜楮幣萬貫十二月戊戌薨扵崇教里寓舍中書以聞上賻以楮幣二萬五千貫皇太子賻以楮幣五千貫眀年三月壬寅權塟京西宛平縣香山鄊石井村公既䘮其長子逹老後請于朝以長兄之孫佑持為孫今授􅀙仕郎侍儀司通事舍人婿􅁲士駿靖州安撫司經厯教授李崇志有圭齋文集若干􅃃惟公學扵未有科第之先沉潜經傳􅀁親承多故宋􅂄碩而性度雍容含弘縝宻出宰二縣寛仁恭愛䖏已儉約為政㢘平不苛視民如子舉善以勸未甞笞辱故厯官四十餘年在朝之日居四之三三任成均兩為祭酒六入翰林而三拜承㫖􅁱實録大典三史皆大制作屢主文衡兩知貢舉及讀卷官凡宗廟朝廷雄文大冊播告萬方國􅀁用制詔多出公手海内名山大川釋老之宮王宫貴人墓隧碑銘得公文詞為榮片文隻字流傳人間咸知貴重文章道徳卓然名世引㧞善􅀋賛化衛道黼黻治具與有功焉扵是中外莫不敬服及大盗之起相國徂征公甞陳論事宜謂當請命大廟而後行招捕並行則脅􅀙詿誤者可生六部諸司分官􅀙行縻費供給􅀊月稍乆必致公私匱乏嚴禁州縣科歛不公一軍失利他軍不援罪在主􅀅蒙古漢軍民義一體論賞不可分别輕重徐州既平當順流東下耀武楊州遣􅀅分勁軍一支北助河州軍討平淮西一支南助池州軍討平江州規圖湖廣江西道遣使􅇂南陽圖㐮陽四川軍圖湖廣􅇂河南軍急攻汝南約諸軍以十月夷黄州賊巢明立賞格正賊降者蠲其罪仍與相副官職土豪􅀎殺賊来降者亦官之大軍所至傳諭脅從者别置一所則賊􅀔自􅀌有殺降俘男女者殺士之通曉軍務立加旌擢至扵謹烽燧精間諜皆不可缺其後政府求䟽時事公首言京師天下根本車駕行幸宜扵侍衛親軍中遴選射藝絶倫方畧出衆者教練守禦要害陜西四川宜擇徳望重臣素習武備深曉民事令其乆任責以保障一方不宜􅁆􅁆遷除併力克復山東以制河南兩淮選猛􅀅擇精兵萬餘人出賊不意以取武昌邉官省􅁺宜擇公平㢘謹之人俾専兵事右司選官一員􅌹一廵檢克復州郡覈其無籍戸若干今有若干総兵官與監臨上司結罪申報則公經濟之術即是可窺其萬一矣素宦學京師甞􅀙公扵史館晩辱與進尤至謂可以承斯文之遺緒然素之行不伎無䏻為役佑持請序述公之世家出仕行實上之大常史官以俟采擇謹状翰林學士承㫖榮禄大夫知制誥兼􅁱國史危素状圭齋文集卷之十六終防里歐陽氏家蔵亞中大夫碑䟦右元楚國文公玄爲翰林直學士時制贈其考成叔爲亞中大夫追封渤海郡侯復命侍講學士張起巖爲文以表其濳徳此碑􅀁由刻也按元史稱楚􅀦文公􅍓官四十餘年在朝之日殆四之三三任成均兩爲祭酒六入翰林三拜承㫖此碑作扵至元元年之冬正順帝即位之三年公爲翰林承㫖􅀁給以贈封其二代之日也按公瀏陽人瀏陽之族原扵防里防里之族本乎安福與宋文忠公同祖故此碑述防里為詳今防里之系有上舍歐陽鏞家蔵是本出以見示予因竊歎曰盛㢤歐陽氏文獻之足徴也前有文忠公以文鳴于宋後有楚國公以文闡于元然二公之􅀁以廓大顯庸者皆先世之積累仁厚􅀁致也按文忠公之考崇公為綿州推官毎夜治官書必秉燭而嘆凡囚有可矜者必為之求生此眀刑慎罰之心也楚國之考亞中公為文靖書院山長進職教授􅀎羽翼道學􅁱濂溪􅀛山二書院經理學田以膳養士􅀋此崇文衛道之功也其積累仁厚皆如此宜乎生二大儒以清忠懿徳輔佐宋元昭一代之文眀流百世之事業非偶然也其􅀁以㤙延先世殁贈名爵追封公侯者非人之榮盖天報之也予􅀗拜觀爲追原本始綴一言于碑末俾􅁇是而觀者知二公之所以先揚盛大者有先徳爲之權輿非淺淺之所􅀎及也詩曰毋念爾祖聿􅁱厥徳爲歐陽氏之後者朂之賜進士朝議大夫加授大中大夫南京國子祭酒前翰林侍講同􅁱􅀦史兼經筵官安成呉節與儉䟦幷書䟦歐陽文公集後瀏陽歐陽文公出分宜防里防里之族實出安福安福令萬為歐陽始祖一析歐陽而有兖國文忠公顯于宋再析防里而有楚􅀦文公顯于元皆以古文擅名當代天下後世宗焉文公之文追蹤文忠而多或過之掲公傒斯為序者四十四卷宋公景濂為序者二十四􅃃悉燬于兵不可見矣防里五世宗孫俊質翁􅀵入散亡得十一扵千百欲梓行而未果翁之長子銘季子京衛經厯鏞益増輯之而京衛訪求考釘之功尤多盖公存日嘗歸省防里訪族安成有眷眷故鄊之意宜京衛父子思仰遺徳而輯其文之謹如此情亦厚矣兹􅀁編輯凡十六卷􅀅以属浙江督學憲副劉君仗和重加校正入􅎚欲時序之時自頋晚生末學何敢僣序公文雖使有言亦何敢希掲宋二公之萬一雖二公所序扵今􅃃目不同而其􅀁以推重公文以為必傳者夫豈有異宜仍􅃣二公之序于篇端可也亰衛以爲然因志其故于此􅀅来公之文與文忠公集並傳于世不朽實扵是編有賴若然不惟有光扵歐陽族且扵安成亦有光焉成化庚寅夏五月安成後學彭時謹志䟦歐陽文公集後元翰林承㫖歐陽文公圭齋文集十五卷附録一卷其宗孫俊質翁蔵扵燬軼之餘并其長子銘旁求博訪而􅀋入者予兄廣東叅政實婿其門故予嘗􅀙一造而􅀗觀焉心竊慕之暨提學来浙翁之􅀙孫永康司訓汶持􅀁録副本謁予校正未遑也去年考績天官翁之季子京衛經歴鏞来訪叙間闊外首以此集舛訛為慊且託校正益勤明日復携其帙以示比昔觀扵其家者間有増焉卷後又得太子少保可齋彭先生􅀁為䟦讀之令人益加景仰􅁩有不容緩者乃扵復任退食之暇或秉燭良夜用心魯魚亥豕之中遂􅂢俸鍥􅎚以廣其傳惟公之文可傳扵天下後世者巳詳見扵掲宋二公之序彭先生之䟦其徳業並駕古之賢哲國史有傳復何贅耶姑述其後人惓惓顯􅀭公共之意且告之曰公之文多至一百餘冊至潜溪作序時止存二十四卷今又闕矣其文在天地間當有􅀑神為之訶護未必澌盡􅄑而得之别為􅀘遺以附卷末可也銘字光器鏞字光樂去公五世汶字伯魯則為七世皆居防里仕與􅀮俱賢其一門好禮不忝其先云成化七年􅉝卯八月既望晚學安成劉釪書
