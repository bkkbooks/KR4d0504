body:
  text: 墓碑銘元故中奉大夫江南諸道行御史􅄗侍御史劉公墓碑銘至元元年冬十月江南行臺侍御史鐂公未引年拜䟽致事歸長沙二年夏四月丁酉薨于私第是年冬十二月以治命􅁙湘西嶽麓山之原湖南憲使汝南梁公遺既志其蔵諸􅀌奉行實来瀏以墓表属扵契家廬􅁜歐陽玄請文志諸石按公諱宗􅀃字傳之世成都華陽人大父宋末甞為茶陽軍使因家隣境之攸輿㓜侍祖父逺宦嶺外既􅀌適遭宋亡克自􅀣立􅀙鄊先生趙公抃學于宜春年十二三䏻屬文有才諝踰弱冠以薦􅀘廣西憲史再辟湖南貢南􅄗察院史􅀊滿調衡州録事判官中書刑部辟職官史皆未赴臺除廣西憲司照磨選充南臺􅁺改湖東憲司照磨仍留􅁺南臺擢海北憲司經厯遷河南憲司經厯拜南臺􅁥察御史轉河南江浙兩行省貟外􅀰江浙未赴改南臺都事入爲中書右司都事拜内臺監察御史􅀅進􅄗都事力辭出爲山南浙西兩道肅政㢘訪副使復􅀍選爲臺都事俄出爲淮東道肅政㢘訪使陞廣西道肅政㢘訪使移江東道肅政㢘訪使召拜刑部尚書㝷㱕休于家起爲江南諸道行御史􅄗治書侍御史陞侍御史積階中奉大夫公敭厯􅄗省諏咨四方出䖏偉節䂓橅古人􅀄􅁺桂臬訪故父旅殯行諸蒼梧即投檄辭㱕以申情事孝節著聞見器諸老厥後宦業浸盛受知文皇主畫中􅄗上所親擢侍燕内廷􅂡髪盡白或謂公老上曰􅀓之在南臺已然此正老成可用之日也公􅀍眷遇知無不言進退有度縉紬則之移疾告歸上弗䏻强廣右之命公去􅅏之疾愈治行益用見信及以秋官召還文皇賔天遭時多艱大獄屢起語連宗親公公正不撓刑無濫施事㝎勇退論公生平忠孝大畧扵此㮣見􅀁至蒞政詳明用法矜恕挺囚藤梧㓂黄亰夫脅愚民為亂有司坐首􅀙皆死公誅渠魁四人餘四十二人免家属論徙遼陽肇州公謂驅炎墟之民居沍寒地名為减死實寘死地請㽞嶺南屯田全者六百餘口讞獄閩淛言海㓂􅀄皆王民身䧟惡地無由自新宜許以貰罪復業後用其言盗皆為農河决大梁城門不開公按視得髙陵撤相國寺朝元宫水為橋百餘丈道民循城顛行薪米不絶比屋乃炊河决小黄村陳顥千里皆沒公督有司盡力犍閉河復故道流離日還淮東大饑勸分維􅀭一日得楮幣十五萬八千八百餘緡􅀁賑以戸㑹三十一萬三百有畸以口計一百一十四萬一千八十故公政聲發軔海嶠振于河淮由平反恤災之功居多至扵吏䏻則在中書右司兩月􅁺属心服其竄正吏牘運筆如飛造次之間辭理俱暢在刑曹半年滯事悉决乃㝎遇革刑制七十六欵頒示天下無復質疑公䖏寮寀退然一儒未甞少自衒襮獨善善惡惡無􅀁避覬在河南時薦前憲使韓􅀙益行省郎中納麟等二十七人為刑臺御史薦浙西憲使許思敬户部尚書康里囬河南行省貟外郎胡􅃔等五十五人乞召還敢諫御史李謙亨成珪扵竄􅀁乞叙用故􅄗臣益陵真中丞苗侍御等八人扵家劾前中書左丞黨附權臣暴歛為虐劾河南行省叅政徃括田江西横歛府縣激變為廣右掌政􅀎制僉憲不敢為苛為南臺幙賔力斥中丞繩下之酷為荆憲黜賍吏三百九十八員汴蒙古都萬户畜巨􅋙納豕肝肺芻人腹中習􅋙咥人軍士忤已􅂺嗾殺之公正其罪江􅁜豪僧謀人获園誣以殺三僧焚之置三豕心燼中為驗公辨其詐抵僧罪釋無辜二十一人湖廣辨章征徭恇怯公奏罷之古縣戍􅀅㩀校宮毁宣聖像公㝎罰錮之海南其劾閩憲聲跡兩使者望風觧印嘗不就江西行省辟􅁺時相為之慚色自居下僚比至要塗論事英發徃徃洞識治體至大中陳革弊防姦戢貪除暴等十事又言六品以下封妻不及父母非人子志後封贈倐罷又力請復之延祐中請置東宫弘文舘選端人為宫教愽士講六經以輔儲徳又請除迯户粮置迤北㳂河倉儲節􅄗中罰布之用以助賑濟榷古今錢幣之制以便小民至順中言盗駝馬牛羊罪當為等差百官名在罪籍不宜普該㤙澤或至再叙侍文皇清燕宻上封事其目曰明人倫序宗族命賢相慎殺戮義􅂑仁守保全功臣貶酒􅊴色親忠逺佞儒臣進讀宜講帝王之道勿事浮靡罪人妻孥分賜臣下宜别宗親以存上下之分皆稱上㫖凢􅀁建明咸以著為令􅂉遇布政􅂺在議中其恵利乆逺若築堤海康闢田萬頃以徕海外耕民海北民鬻食塩又輸塩丁錢公奏弛其征文皇居潜瓊筦以是知公疾革猶索紙筆作遺表欲有所陳未成而薨年六十有九曽祖鑑宋宣教郎祖景髙宋韶州通判贈嘉議大夫禮部尚書上䡖車都尉追封彭城郡侯父重坤贈中奉大夫四川等䖏行中書省叅知政事護軍追封彭城郡公娶毛氏繼娶王氏皆先公卒並追封彭城郡夫人再娶張氏三子長孝友承事郎岳州路經厯公未寝疾奉命展省先塋聞訃得疾後公六十一日卒次孝敬登仕郎永州路知事辟湖廣省􅁺史次孝恭廣西道宣尉司照磨女五長適江西郷貢進士張仁偉次適伯顔次適􅁲徳生次􅆘孟坤珎次適歐陽忠皆士族孫男四好禮好義好信苟児孫女三觀音奴觀奴永安奴公博學強記淹貫經史以禮部公號雪界因號雪峰以志蜀土有奏議詩文若千卷傳于世早􅀙􅃰郡盧公䖏道學詩擅名古體盧公憲湖南甞語人曰鐂􅁺傳之天資髙邁他日綱維風憲必斯人也及公爲􅄗端衆咸以爲知人玄先君子内翰公扵鐂公契友玄辱知尤深在胄監時嘗遣子孝恭受業舘下誼不得辭乃叙而銘之辭曰温温劉公如玉不瑕臨事决義蹇蹇法家以儒發身以學施政措爲治才著爲辤令惓惓告君懇懇許國粤有風紀我扶我植自厥筮仕􅁬由承􅁺迄其懸車終始司憲入也獻替出也咨詢官之準人􅀖之藎臣文皇知公字而不名雖閔勞勩實仗老成上飲公醇公疾弗勝有殽有核賜以豆登丹頰白􅂡拜起給扶尚竭心智載陳謀謨秋官予環迁出綴衣有執國柄赫赫作威公職司平獨立無悚止辟不滛展也仁勇􅁲居長沙謝事建鄴輕舟来㱕賦詠盈篋胡不百年爲國􅆱􅀛明禋召􅀙疑事就諮蒲輪未臻榆沈斯作􅁙以公輴率履無怍子孫詵詵世􅀍徳馨節恵有典眡此貞銘元贈􅀙仕郎􅁻安路􅁻水州判官周君潜心墓碑銘安成周君潜心卒之五十九年以子貴有䘏典扵朝􅀅録其副以告墓次其孫絢奉其宗人南瑞􅀁状行来京師謁銘扵予維周氏姬姓厯秦渉漢􅀄至三國兩晉多名臣載史傳唐季有諱璟亦有聞當時其四世孫威避難遷金􅁜威子矩仕南唐至御史壻楊竦爲吉州刺史矩至吉因家焉二子長翰次羡羡登宋建隆間第積官光禄大夫卒贈僕射又遷属邑之西昌其族蕃􅄛科第相望部使者號其里曰爵譽羡子廷訓仕至供奉廷訓子昭為江􅁜令卒贈殿中丞有五子次子大理評事中師生䖍化少府夀之夀之子倩遷安成之後林里又四世為潭州通判士貴士貴子人望人望子􅁇祖是為周君之父君諱晞顔􅀄字景顔後字潜心自童丱噐如成人年十有六䘮父内保家訓外親良師友􅁬自􅀣立稍長脫去拘攣識趣軒朗舉措不擾才力恢恢至元丙子江南初内附官府易置世務方􅎋故宋吏胥挾文為姦里無頼又為囊槖善良重􅁕而立君以􅀌遺出應門户機警辨恵果决有謀既􅁕自彊又􅀎為姻族鄊井捍禦外侮衆皆􅀝之為安兄志伊蚤世君撫其􅀌不趐已子先業粗給君善經理遂至贏餘推其􅀁有􅂺濟貧乏惟浮靡虗誕之士雖􅁆干請秋毫不可得居鄊善善惡惡予敓不偏訴訟有未之有司而先質正扵君省陳義秉法而劈析之咸得肯綮嚚俗為息江西行省郎中杜仲寛聞君之賢方薦君進用俄抱病歸未㡬卒于家年裁三十有三初娶王氏先三年䘚再娶觀溪劉氏五年而君䘚初鐂氏之祖母亦蚤寡以貞節聞辛勤教子後皆擢科湖南轉運司帳管斗則劉氏諸父南康主簿玫則其父也鐂氏在閨門時習聞劉母懿範故􅀎守節自誓又􅀎以教子為先務次子遺腹􅀁生日抱之泣行道聞而衰之君柩乆在菆不􅁙人問之曰吾婦人安曉􅁙書俟吾兒長自卜其地且朱亡人守此柩日夕與俱猶同返窀穸也遣子就學􅀊時􅀙師之禮無􅊴否則質簮珥以繼二子感激孝養俻至學殖日勤今皆成立長毅用憲司試為瑞金縣儒學教諭陞吉安路學正借注廣州新㑹縣藥徑砦廵撿辟廣東元帥府令史􅀙元帥平循潮二州㓂有功遷桂陽路捴管府知事有政績湖南憲課其最甞平反死囚二人及去官為立生祠厯兩考進階􅀙仕郎贑州録事次恒以儒推擇為臨江贑兩路􅁺􅀊滿為上猶縣典史毅仕至七品君得贈官其配亦追封宜人君卒以至元戊子六月十有四日􅁙以大徳庚子十月十有九日墓在州北清化鄊鄴城里鐂氏卒以泰㝎丁卯四月十有九日年二十有七失􅀁天六十有六而終塟以至正辛已十二月十有七日墓在新樂郷之山塘祔姑李氏阡女一人王氏出適進士彭躍龍子務徳孫男四人紘絢浩澄孫女三人曽孫七人君初失父遭時孔艱及其自立渉世又淺而鄊曲之譽流芳無窮殁世之後家有節婦門有孝子克亢厥宗子宦業日盛國家飾慎終追逺之恵方来未涯是宜有銘銘曰行以集義僅施于鄊為善竭力得年不長􅁆有乗除分有豐嗇巳播弗穫後人是食趙祚既訖君方弱冠家緒不蠱君植之榦善􅀒竒氣不爲俠資救難則勇恤􅀌則慈視前斯振顧後斯燾年不滿徳君子是悼有婦誓節志不負君有子力學底績于文生也曠遼一命若訒贈恩便蕃子仕方進有源斯委孰禦其沛惇史作銘以訓未艾元贈奉議大夫樞宻院判官驍􅀐尉追封浦江縣子鄭府君墓碑銘有序大江之南淛河之東有州婺有縣浦江有旌表家鄭氏九世同㸑朝廷嘉而旌之至是又有贈典告于其家是爲樞判府君由其子深起家爲右丞相大傳府長史階正六品􅀄贈國子監丞及深遷宣文閣鍳書􅀶士階正五品當進贈其親故府君有是命也府君諱銳字景敏其先滎陽人十一世祖曰凝道遷歙凝道子自牗遷睦之淳安自牗之孫淮遷浦江淮樂善好施宋靖康年饑鬻田千餘畒以賑其里人號􅀁居曰仁義里淮之孫曰綺號冲素䖏士事二親盡孝父照忤時貴得罪文以重辟綺上書郡守錢端禮乞代父坐法守為之直其父􅁈毋張病痺手􅁕皆廢三十餘年凢就便液綺必抱持其主家政􅀊入絲粟不私鄭氏九世不異財實自綺始綺之玄孫龍㳺丞徳珪青田尉徳璋尤篤友誼怨家以死中璋法當逮維楊珪請于有司以身代璋行竟死逮所珪子文嗣璋子文泰皆克紹一門薪餐食指􅁆百如出一身令刺史舉察以聞旌表其門曰義泰二子長銳即府君㓜頴悟日記􅁆千言長明春秋事母賈孝竭力以供子職賈病晝夜衣冠以侍湯劑者􅁆十日無􅈈容其與兄弟䖏表裏始終無間言怡恱見扵顔色甞典義財每自朂曰吾家累世義居至吾之身或墜先訓萬死不􅁕以贖媿乃創為式用財纎悉必附日乗月􅁻以似家長署而通考之由是鈎檢有法一如官寺䂓可以乆性勤儉任事不憚勞有餘即好施見里之貧約必思有以賑之暇日習詩及小楷殊有思致延祐甲寅􅀄科以明經貢扵鄉一試不偶即舍之曰當以付吾後人生以至元己丑之二月二十有七日卒以延祐庚申之十有二月一日夀三十有二聞其訃者咸悼其蚤世明年辛酉三月三日􅀄􅁙義烏縣延壽山之原今改本縣靈泉鄊娶楼氏子二人長深次淇深字浚常失􅀁依恃二十餘年􅀒笈入京以文行受知前大傅右丞相􅀍選為長史推恩及君贈承直郎國子􅁥丞樓氏封恭人及深遷宣文閣受經郎再遷鑒書􅀶士擢吏部貟外郎今除僉江南浙西道肅政㢘訪司事君進樞宻院判官勲驍􅀐尉爵浦江縣子階奉議大夫樓氏亦累封浦江縣大君深扵予有斯文之契以福建㢘使貢公師泰所為行状来謁銘辭不􅀗序而銘之銘曰昔在唐虞風俗淳美史稱可封比屋皆是降及􅀾國阡陌既開史稱素封實雄扵財鄭門七世資義不竭使居唐虞在可封列家擬素封惟義發身致有誥命受封惟貞司造孔明無善不報惟樞判君實踐􅁢蹈孝親友兄惇族睦隣撙用致豐植弱賑貧義規我守義産我掌有勾有稽有籍有帳學明麟經一試塲屋出抱遺編以授子讀子蔚有文進遇東閣謀禆鼎軸畫主帷幄再遷宫師授業内庭秘閣鍳書講筵譯經乃登要津判銓天臺維君恤典恩寵鼎来進班宥府錫爵蒲璧義門日崇車駟翕赩靈泉新阡遷自烏傷太史勒銘奕葉有光元贈􅀿奉翰林文字􅀙仕郎安成劉聘君墓碑銘國子助教鐂君文廷既陞于朝當推恩其親天官為之擇舘閣羙名以居之扵是贈其先君子劉公以應奉翰林文字􅀙仕郎應奉即唐供奉金人避其主嫌名改今稱國朝因之雖七品階寔北門詞臣惟朝士知名者得以是榮其親文廷􅀅歸燎黄于阡状其先徳謁銘于余余至順庚午校藝南宫文廷余􅀁得士也為國子祭酒又同在胄闈故為之叙而銘之叙曰公諱􅀩正字聖功安成漢為縣属長沙國劉氏為長沙㝎王後故家焉公十四世祖曰五䖏士初徙城西湯村晋安復縣也䖏士生唐末五季有善行子其鄊渉宋三百年鐂氏科第相望皆其後人公㓜有宿慧五􅀊屬辤八􅀊䏻舉子業號曰竒童父甞携之貴人家貴人命以賦援筆立成思致不凡坐客歎服一日父于役公戯母周夫人側適諸父夜課子姓以鄊校賦題燭䟦未就周夫人曰諸兄方苦吟児則戯􅇵何為公俄黙若有􅀁營飡頃曰兒賦就矣索紙筆寫之周夫人命以質諸父諸父為之失色以示諸郎曰若軰徒長大曽不愧是兒明日賦傳誦衆口郷前軰争造門呼出觀之居無㡬世改科廢公年方富才噐卓犖自以用不適時浸不屑為章句習㑹丁外艱撫事増悼終䘮辭周夫人南逰衡湘常悒悒不樂喟然歎曰夫人在菽水之養不可乆違箕裘之業不可乆棄幡然歸故廬盡發先人遺書淹貫六籍馳騁百家旁及盤盂隠奥虞初稗官靡不搜扶已乃大肆力扵文沛然出其有餘沾􅀍學者四方􅀒笈及門如適工倕長短大小咸中矩矱它匠棄􅂢悉就斲削以公􅀎誘人知方使厭飫日趍不容柅也性豪舉曠逹先廬故占勝地猾鄰乗公出誘大駔暗㩀䂓為已有諸􅀙巽愞不􅀎制公還誓必復之駔亦難公奉歸侵疆公􅂸除塓葺招復徙者隣以是嗛公㑹􅀊侵鄊田不毛隣攰扵征布以計弛其肩扵公人謂􅀔必返之不則病公曰人憊故求更憊而返之不仁里有貧不䏻輸者毁家以代之由是生計滋削然終不咎隣獨自責曰居不擇隣非智去之龍雲溪上居焉溪上多故人士族樂公之遷遣子弟受業恐後四方勞問繈屬公内給大夫人甘膬之需外􅁱諸士友綢繆之好晚况殊適環堵蕭然戸屨常滿興至觴詠賔主盡歡髙談善謔傾倒四座酒酣取古人詩文擊節而歌聲沮金石踈髯古貌臞如列仙睥睨世故無􅁕芥其胸次者一日飲傍舍莫歸沾醉就寝丙夜家人聞呻吟起問安公曰吾舊疾痛亘心膂􅀊常殆今二十年復作其不瘳乎詰朝更􅁆醫皆郤其藥不飲七日忽宵興正􅃣而坐召諸子語不及他唯以不得終養大夫人為恨言訖而瞑皇慶壬子十二月二十有九日也年五十有三疾􅀄作周夫人已卧病公卒七日周夫人亡明年正月十有一日諸􅀌用治命奉公柩􅁙于故廬之隂曽大父方勞問繈屬公内給大夫人甘膬之需外􅁱諸士友綢繆之好晚况殊適環堵蕭然戸屨常滿興至觴詠賔主盡歡髙談善謔傾倒四座酒酣取古人詩文擊節而歌聲沮金石踈髯古貌臞如列仙睥睨世故無􅁕芥其胸次者一日飲傍舍莫歸沾醉就寝丙夜家人聞呻吟起問安公曰吾舊疾痛亘心膂􅀊常殆今二十年復作其不瘳乎詰朝更􅁆醫皆郤其藥不飲七日忽宵興正􅃣而坐召諸子語不及他唯以不得終養大夫人為恨言訖而瞑皇慶壬子十二月二十有九日也年五十有三疾􅀄作周夫人已卧病公卒七日周夫人亡明年正月十有一日諸􅀌用治命奉公柩􅁙于故廬之隂曽大父繼周大父先登父雲鳯皆為鄊名士娶朱氏以子貴封宜人子四人長聞即文廷登第後調臨江録事有善政居成均事稱其禀以善教名次閈次閱次閏皆以經教授女二人長適賀氏次適張氏孫男女十三人公篤扵孝友弟應龍㓜􅀌妹歸李氏早寡于時饑饉師旅相仍公避難崎嶇徃来百里間撫􅀌存寡恩極周緻家雖貧􅀁識空乏即觧衣推食無靳居郷曲有譽䖏豪右有道雖不好以氣岸加人而見者自失其􅀒挾平生喜讀書過目成誦朋友乩疑随事䟽荅云出某書見某註如腹有笥然為文渾厚條逹不事竒澁下筆􅂺􅁆千言雄議疊出多禆益世教切中治體人􅁛其有大對倫魁之材尤善知人誠偽䇿事成敗横逆無故至前了不為動人驟遇之見其髙世不覊之林未容􅂺致親附而明白坦夷雖家人細故不以欺客退而消去鄙吝終身不忘雅不喜浮屠幻妄之􅀃聞朋友有佞佛者移書切責郷先生若靜徳王公聖與青山趙公儀可復心崔公君舉養吾劉公􅀅孫皆折軰行友之科詔既下公讀而喜曰吾老復見塲屋寧非天乎㝷至物故齊齋彭公長庚祭以文曰科目方興而伏生死禮樂􅀅用而河汾亡其見重名士如此公號山泉先生有美矉集若干卷學者傳之既沒時人見論事不痛快臨文不强人意輒太息曰安得復見劉山泉先生銘曰公之學碩以多可擢巍科公之詞雅以麗可司帝制有其學不科其擢父懷其璞子獻其㲄有其詞不制其司生背其馳死踐其資其有不居其蓄不祛其逹敷􅃾其償寓諸茫茫九亰公莫起矣􅎩宗有辤惇史有讄元故徴士叚公禮廷墓碑銘有元徴士叚公禮廷既􅁙之十年其􅀌徳輔徳文介余故人之子聶孟宣以公之行實謁余請銘其墓道之石予始辭之孟宣請益謹乃述其行而為之銘維叚氏廬陵之龍溪人入唐以来代為顯官有積階至銀青金紫者公諱士龍字雲亨禮廷其號也曽祖仲仁祖文郁父子開字叔茂􅃅真逸䖏士始遷長沙城中三世皆有徳之士公本真逸族子宋季段氏有登進士第卒官成都華陽主簿諱文煥者公􅀁生曽祖也以詞賦兩請漕貢進士諱議孫者􅀁生父也内附初世故多艱貢士徃安成依妻家劉氏以居前至元辛已公生劉氏家年九􅀊外祖鐂梅窓先生竒其頴悟真逸無後詢之族属求可為後者見公拊之曰吾行四方閱人多矣是児䏻振吾宗者請以為子貢士持不可貢士沒母劉氏辛勤自立教公􅀙師受學甚謹又九年真逸申前請彌切乃許以為後時真逸以貲雄于長沙得公幹蠱甚副􅀁願公事真逸及母李氏盡孝遇弟士虎􅀎友士虎字文亨本􅀙姑之子與公同繼真逸為性剛果公毎濟之以寛内篤㤙愛外極彌縫家務大小咸當其可公之􅂇居多由是家日益􅁉又加潤色焉真逸晚􅀊優㳺之􅃐甚適公􅀁生由文煥而下六䘮未舉公竭力營厝悉如禮同氣四人兄可珍弟可立揭家􅀙徒長沙公賙之有方既而夫婦俱亡公殯其二䘮撫其諸􅀌使之咸有􅀁憑藉女兄適印岡羅氏相距六百里饋問無虚月其他賑貧䘏難施諸外人無少難色每􅀊發廪務平其值庚午大侵則損直傾積以濟存活無筭平生讀書一見随了大義有􅀁得􅂺加體驗而行當道薦以文學􅁺力辭不就家居命僮僕治生一經指畫即不以嬰懐惟與士大夫㳺樂而忘倦蓄古書􅀞暇日把翫清談纚纚不絶城東作三㤙愛外極彌縫家務大小咸當其可公之􅂇居多由是家日益􅁉又加潤色焉真逸晚􅀊優㳺之􅃐甚適公􅀁生由文煥而下六䘮未舉公竭力營厝悉如禮同氣四人兄可珍弟可立揭家􅀙徒長沙公賙之有方既而夫婦俱亡公殯其二䘮撫其諸􅀌使之咸有􅀁憑藉女兄適印岡羅氏相距六百里饋問無虚月其他賑貧䘏難施諸外人無少難色每􅀊發廪務平其值庚午大侵則損直傾積以濟存活無筭平生讀書一見随了大義有􅀁得􅂺加體驗而行當道薦以文學􅁺力辭不就家居命僮僕治生一經指畫即不以嬰懐惟與士大夫㳺樂而忘倦蓄古書􅀞暇日把翫清談纚纚不絶城東作三友亭常領客觴詠􅀊癸酉㳺南嶽登祝融夜半望海日超然有􅀙方外之志乙亥歸廬􅁜徧􅁱先塋之祭退而㑹諸族䣊姻友驩甚是年真逸年九袠歸為真逸夀擊鮮髙㑹遶􅂰奉觴􅂡􅄠斑白座客歆羡未㡬真逸病侍病勞勩及卒哀慕過情襄事甫畢公亦感疾逾三旬未瘳一日忽呼二子語之曰民生在勤勤則不匱汝曹勉之越􅁆日疾復作瀕殆有僧怪牛素􅀁徃来問之曰究竟若何舉手盡一圏曰平生受用不離乎此子問家事不荅啓手􅁕示之翛然而逝後至元二年丙子五月十有二日也三年丁丑十一月庚申塟善化縣龍坑之􅅏思嶺公性忠厚喜愠不見顔色訓子弟􅀎以身教有質問必中理得年五十有六未弱冠来繼真逸始終㡬四十載父子慈孝如一日中外無㡬㣲間言難矣㢤初娶胡女一人適廣東宣尉副使聶公以道次子孟宣劉氏子一人徳輔李氏子一人徳文皆克肖孫男女各一銘曰人生至難為後扵人其難維何尊尊親親親既區别尊有隆殺君子䖏之先識其大􅀁繼所生置身其間不爽其宜得譽匪囏于嗟禮廷動適厥中扵分則嚴扵情則通􅀊踰三紀恩義周浹至誠感孚靡間靡諜墳墓我省譜圖我􅁱兩宗訢合二郡綢繆廬陵長沙地壤犬牙段氏蟬聮克昌厥家里稱善人士曰善士生有䖏譽沒蕃胤芷湘江之壖􅁲兆􅁢􅆇魂魄􅀁之咫尺故鄊慶源川増後人其承惇史作銘詒爾雲仍元故隠士更齋先生鐂公墓碑銘有序公諱過字益翁更齋其自號也幼頴悟日記􅁆千言稍長受學里中王珏王客故相江公萬里家其弟信豐宰逵父徃来公􅀙兩王先生咸稱為畏友又甞侍先君子登巽齋歐陽守道之門由是須溪劉辰翁中齋鄧光薦皆以忘年友之先君子􅀶雅䏻文湏溪號之曰山中小集古尤偉公論議馳騁墳素軼出旁行敷落躪躒虞初稗官劉氏雖好辨者終不䏻傲公當世務搶攘衣􅃣家子弟􅀋巽愞不更事公噐局散朗應對間暇父兄頼之以安至元元貞間境有山盗公承檄扞禦􅀎申條教齊一民義里閈帖然間􅀊侵􅂺殺直以發飢者為饘寒者為衣殣者為棺靡不終恵家居敦叙倫紀姻戚困乏者委曲料理卒使之有業性妤客善謔􅀊時燕集酒酣歡洽擊節雅歌四座為悚尤不喜異端然時有佳者亦為之豁逹無忌􅀄號一山時慕􅕋大夫之賢著號更齋先軰耘廬鐂應登記之諸名士有詩生平􅁉有才諝薄扵宦情分憲觀復馬公昭舉行郷飲酒禮公侍先君子座側馬公愛其英爽欲辟以􅁺属力辭御史方厓蕭泰登扵公為中表屢勸公仕􅂺不荅晚􅀊順適丘園容與翰墨嗜古圖􅀞市或千金為知巳持去亦􅂺委置家蔵古書甚多皆手自校讎至􅀁著作才既敏贍率易天成旋復散逸他日門客子弟始彚成編甞即先廬之傍改築新宅􅀅以逸老扁其樓曰望雲不敢忘先人也泰㝎丙寅哭其長子慟然時􅀎命客自遺自是嬰疾疾革呼孫揆寅語無他及惟誦少􅁜㣲爾人盡非之句翛然而逝生以宋開慶己未前十一月十五日沒以元泰㝎丁夘閏九月二十七日年六十九􅀊曽祖􅀙龍祖有開宋迪功郎安􅁻州烏程縣令父惟憲南軒書院山長皆山翁也娶戴母族以賢婉稱子男二士元士榮士元先公一􅀊卒士榮早夭女四人俱適士族男孫三揆寅揆辰揆申皆以儒學應徵辟􅀌孫揆寅以至順壬申十月二十二日奉公柩􅁙于里之煙竹原事竣属其姻戚易君景升狀公行謁余請表其蔵易余校藝江右時􅀁得進士而余亦素知劉公學行節㮣凛有古風若揆寅之世家學亦士大夫之􅀁願友者故為銘曰民生扵三父師其二倫序有五其一友誼偉矣劉公名父之子􅂭師親友抑又名士三者之懿筮知其賢矧公學行􅁢也可傳學以事君行施于政憗不少試斯焉有命命固有之公亦高蹈用不扵時而􅃴扵道邁􅉨者氣騰踔者辭庶俾来世知公于斯新居奕奕花竹斯薈日月㡬何松栢斾斾有濬其澤由孫及曾太史撰銘悠乆之徴元故􅀮士廬陵劉桂􅀮先生墓碑銘廬陵劉桂隠先生卒􅁙之三年子應麟遣孫珵来京師請其墓銘扵玄值世多故未暇請也又三年遵東海以歸乃致前請謹摭其行状叙而銘之先生諱詵字桂翁號桂􅀮其先清江之翟斜族也翟斜之族自宋公是公非弟兄叔姪以文學聞天下􅃅江右三鐂先生之先世有諱滔字禹績者由翟斜徙吉水之南嶺傳六世至彦􅂛彦明兩弟昆升留䖏南嶺明分䖏北坑北坑以地居上㳺號上族因號南􅊐下族升自􅉇舉五子競爽弟四子曰僴字端臣生子少齊字思賢是為先生之髙祖考少齊生子黻字徳卿宋大學内舍􅀙誠齋楊文節公㳺子鈴字衡甫受知文丞相號麓隠生子仁榮字雲祥號習静與弟化龍長子元方同領景㝎甲子鄊薦明年俱及進士第雲祥授平陽尉先生平陽第四子也生二􅀊失母七􅀊失父九􅀊宋亡􅁬以頴悟之資自􅀣羈􅀌之中􅀎不墜先業又斥大之今之大夫士論先生徳行道藝必推本其先人扵是平陽之聮科雖不􅀗究用扵季代因先生克紹咸稱其有子而鐂氏自翟斜而下益有光焉先生之為徳不為世俗之􅀁摇􅟃不為風聲氣習之所淪染卓然以重厚醇雅進與鄒魯士埒而無怍容事諸父及諸昆弟盡恭敬友愛之道先世恒産悉推譲之子姪及門必厚遇以禮伯氏蚤世其子古臣方㓜撫育教誨使有成立古臣䘚又撫其子如古臣夏氏女沒􅀁生角覉未齔教育而婚嫁之如禮晚即南嶺剏始祖祠率族子􅀊時􅀕祀以正昭穆之叙居家䖏鄊有古君子風訓學者䏻以師道自立至其爲文根柢六經属饜子史􅏳轢百家渟滀演迤資深取宏榘矱哲匠逹于宗工液古融今自執其韛應慮不􅀗靡施弗宜雖未嘗露其儁傑㢘悍踔厲風發之状韞玉在櫝氣如白虹不可掩抑四方求文繦属于門有古文若干卷諸體詩若干卷駢麗書劄若干卷揔題白桂隠集蜀郡虞先生豫章掲先生及玄皆嘗叙之各以􅀁見極其形容詠歎之盛然以先生之文㣲吾三人言有不行世者乎先生殁􅁻之弟子顔成子状其行稱先生年十二三時長扵宋季程文若律賦論䇿臨文沛然蔚有老氣宋之遺老鉅公若季公鶴田肯堂深齋三公扵先生為母黨尊行一見即以斯文之任属之中齋鄧公湏溪鐂公扵先生為鄊先正見其文尤加噐異鄧公甞延之家使範其子若彭㢲吾晏山心扵先生為畏友徃徃推服延祐初科舉復興先生年纔四十餘州里有司舉孝悌明經太守强勸之駕先生好古與主司瑟竽理之必然不􅁕深論先生退自塲屋一時名家欲其子弟䂓進取者必厚幣求師事之古有善射者射牛鏃掠牛腹舎麤詣精以不中為勝賢父兄願欲得其不中之竒他日與拘拘然求中者角我欲中斯中耳方厓蕭公為御史以教官薦學山文公為集賢以舘職薦尚書鵬南鄭公過廬􅁜見之㱕朝以遺逸薦公卿推轂當時賢士推轂者可得羙譽賢士何為焉先生生以宋咸淳戊辰八月二十六日卒以大元至正十年九月十三日年八十又三塟以是年十二月二十五日墓在州之仁夀鄊東槎灘娶印岡羅氏有婦徳􅀎致内助先二十年卒子男三長立敬先五年䘚仲尚文克世文學先生鍾愛之惜蚤世季應麟業進士女四人適同郡李以孫夏昶彭鎡蕭泰端皆宦族孫男七觀先夭次珵瑜諒璉譲珣珵今除龍溪書院山長孫女八曽孫男二玄扵先生未􅀗一識而書問不絶相知為深虞公晚歸田過􅀙甚樂每有相見遲莫之歎虞揭二公皆先卒玄以垂髦之齒獨得銘公銘曰宇宙氣化消長有時斯文盛衰不繫于兹富貴倘来非悠乆功名時至亦易就惟兹二事衆可朂天􅂌斯文曰予獨近代四家廬陵眉山臨川南豐頡頏其間展也桂隠實宗歐陽豐曽約蘇謹嚴歸王天憗其施不靳􅀁重我其承之賁若光寵在衆不随予獨不訾不貤厥齎俾昌扵詒元故旌表髙年􅂄徳山村先生歐陽公墓碑銘至順元年冬十有二月南郊禮成詔天下民年八十以上無失徳者有司以髙年􅂄徳旌表之􅀽之分宜山村先生歐陽公是年九十以齒以徳當應詔元統改元又詔賜髙年帛公年九十三縣大夫来致帛見其人物議論之偉驚且喜曰此豈徒有年者㢤二帛未􅁕以示優禮也詢前詔旌表猶未徧舉方謀為之請玄適在朝登以文白當道檄有司奉行之扵是旌表􅀅至偶近公生朝子孫請即是日拜命為夀有司􅀙之比至疾􅃍作竣事未㡬卒後八年玄謁告南㱕訪族防里至公之門旌表燁然而宰木拱矣子惟徳以里名士孫復孫􅀁状公行請銘其墓玄忍銘乎忍不銘乎公諱涇字源清號山村先世自安福令而上詳見吾宗楚國文忠公譜令以下􅁆世有自安福遷分宜防里者至公傳十有六代代多文儒曽祖安世祖必恭父起宗皆教授鄊里世父龍瑞登宋咸淳七年第公資貌偉特少以力學得羸疾有授以食療法乆乃魁岸性孝友執親䘮至柴瘠每起必杖為親擇􅁙地術家言某兆􅁻公曰何自致之曰以公孝感當自致已而果致季弟目眚温良饑飽謹􅀱伺之如是􅁆十寒暑無㡬微倦色沒而哭之盡哀塟之盡禮倫誼之重里人至今以為式家居􅅚子孫常舉平心待物四字為訓􅀎以身教故子孫率􅀙由是忠厚日積致家日肥奉養日腆而公如素之習不改平生􅀍服前代衣冠未甞少易華靡子孫亦不䏻强之暮年身徤神清稠人廣坐與一二同軰談承平舊事移日不倦􅀊時㑹族少長咸至多至􅁆百指語子孫曰天倫之樂無以踰此饔餼隆殺非􅀁計也爾後人母廢斯禮早年習舉子業精敏有聲塲屋與季父同登俱侍補國學葉丞相守􅀽遇士慎許可見公之文獨稱賞求識公面屢加薦逹至宋亡科舉廢乃更沉潜性命之學手編諸經傳註彚稡先儒格言其精義奥㫖融貫演繹多􅀁論著細書大帙充牣巾廂詩文理致自􅁕不事雕劌舉動一出誠恪不勞矜持嘗有老僧一日同集人見其踧踖扵坐詢之曽􅀙出學公教學者無他言唯勉其用功根柢異時少自􅀣立即有依㩀後進徃徃佩服其言生以宋淳祐辛丑六月二十六日沒以大元後至元乙亥十一月十一日年九十有五沒之明年丙子八月某日􅁙于里之小礱源娶某氏先公卒子男一惟徳字秉􅃔幹蠱有譽克大厥家公殁之􅀊子已稀年今􅀅八十康勁勝常人每以公夀期之孫男二務敏務實皆業進士曽孫男一玉成孫女一適彭曽孫女二長適朱少適許皆名族玄扵公為族弟先世徙瀏踪跡雖逖知遇獨深銘墓之請誼不敢辭銘曰惟公之身寔備五福夀躋期頥富有茀祿茀禄雖冨公恬不知􅂚其康寧豐約不移惟其不移可乆䖏樂躭書味道生不飲藥好徳已稀况徳之積迨夫考終􅁆不滿百太樸未斲全福有人豈獨全福有行有文有文匪他惟性惟理以㳤其徒以遺孫子有覺其閎國旌夀駿天光所臨百世流潤爾孫爾曽赫奕其承同宗匪吝惇史􅁕徵居士歐陽南谷墓碑銘居士諱同寅字同甫號南谷􅀽之鈐岡防里人也世為望族家饒貲尤多儲書居士自㓜為學質實既長賦性剛塞居家庭有孝行䖏鄊黨有直聲􅁿財而賤利貴義而重徳姻族有􅀌遺少任其教育長􅁵其嫁娶里中貧乏者飢有其粟死有其棺殣有其域􅀊旱先其鄊人禱不大雨不止鄰有災集救賞募􅑒夫必撲㓕乃退人有訟求正善譬析以理閭閻細民有戒心来㱕􅂺聚而保之五六十年之間未甞希知遇扵當世故已之徳人者甚鮮人之徳已者甚多甞訓諸子曰䖏善循理人生至樂仕宦何為當道以教官薦辭不受又甞自賛其􅀞像有曰務本之學施扵孫子士稱其言先行而後􅀙晚􅀊家居優裕肆力扵學適意扵文廣坐辯論經㫖專門士或病之天曆己已夏五月疾作醫至却藥不飲疾甚諸子請􅀁以命􅂺厲聲曰若軰皆四五十之年猶待刺刺語耶有間曰張公藝九世同居惟一忍字汝曹識之端坐正衣冠而瞑是月二十日也得年七十有六至元丁丑十二月壬辰􅁙臨江新喻鍾山鄊龍伏之原曾大父峻大父珦父夣顯積徳起家􅀄娶鐂氏􅁇室許氏皆先卒子男四震亨晋亨巽亨克世家學鼎亨仕八蕃有招蠻功宣撫司辟薦以官聞母䘮歸不就㢲亨仕湖南辟清湘縣儒學教諭以親老辭女四適李適彭􅆘胡適劉皆里名家孫男四長天祐次天福蚤卒次天與天啓孫女七曽孫男三曽孫女四吾歐陽氏以有姒支裔封越後并扵楚受封扵烏程之歐陽亭侯子孫以亭侯為氏厯兩漢渉魏晋六朝唐宋迄今南北歐陽惟一族非如他姓各有􅀁􅀙始者然自􅃰州太守而下顯者曰冀州渤海青州千乘千乘中絶今皆渤海後又自率更令而下顯者曰長沙自􅁻州刺史而下顯者曰廬􅁜其實出扵一詳見唐書宰相世系表及我兖國文忠公譜􅀃居士先世繇廬􅁜之安福義㦄遷今防里上世有府君諱俙在諸昆弟中子孫多遷居外郡有復遷安福之早禾田有遷潭州之瀏陽馬渡者若是者不一居士亦俙後扵防里其䖏者也玄之扵瀏陽遷者也由始遷至先叅政冀國公纔三世故世次可考居士扵冀國公族弟也玄扵居士族子也巽亨来京師求表居士墓義不敢辭為之銘曰才周世用世用則訒徳應人求求人則恡我宗儀刑遺不我憗我表其蔵三世其親讀圭齋先生􅀁撰南谷居士墓碑知昔人之􅀁積者忠厚深長其遺諸子若孫固異乎衆人也自凋謝之餘而資源昆弟皆卓然復昌其先世又知天之報施善人果不爽也嗚呼世之人何苦而不積善㢤洪武二十四年六月二十有二日翰林黄子澄書永新龍母呉氏墓銘晝而出必掩面幽其明銘何炫宵而行必秉燭明其幽銘何瀆生存正沒順寧酌二義可也銘婦之冡嫂之丘繄呉氏羅其憂事莫難􅃔倫間公無怨私無瘝姑宜家叔宜室卑者勞尊者逸城有屋郊有居相夫子手拮据子扵親無二上禮有别孝無譲父之命子之誄人信之惟天理恵于宗徳于鄊冝大史銘其蔵余拙扵書病餘愈拙近日求予文者多强予書余不得已力書以塞其請然實非予之素志也禾川龍孝子謁其母呉氏墓銘獨䏻見諒扵是請大常博士劉聞大書余甚嘉之因書銘後使知得余書者不如諒余書者之使余感也致其辭来請者其西賔戴與權也其人左賢使余不忘歐陽玄書元䖏士劉公梅國先生墓銘有序公姓鐂氏諱􅂭瑞字立賢世為安成望族㓜頴悟力學家居孝友遭父母䘮勉力㐮事動循禮則宗黨䋲之遇諸子姓奨借誘掖期于成人才性跅弛􅂺加警約劉氏塾業彬彬可觀公教居多世變􅮏海舊家子弟巽愞奴客乗􅀔恣睢公􅁬以法鋤拉强梗至元甲午獠㓂陸梁青山朝廷遣簽樞督捕􅂺欲禽狝其鄊聞者竄匿公逺迎大軍供億畢給民用無恐豪右有宿憾于鄊伺間報復公辨出無辜活者千計㓂平師旋居民殘燬札瘥荐臻公􅀍府檄勞來遺氓賑飢療疾流亡四集有司築堡壘以戒不虞公曰軍名備禦實則病民卒言大閫遂撤其戍民迄今便之公機警倜儻踈財樂施為人􅑒難觽紏徳色不見㡬㣲晚􅀊延名師淑諸孫暇日觴詠暢適泊然無求扵時􅀁居多梅因號梅國先生至治壬戌四月十五日卒明年十二月十六日􅁙鄊之南山夀五十有八按狀劉氏在南唐時有為􅀽州刺史者始遷安成􅁡湖傳至克都府君再遷南溪五世為評事府君良輔二子長迪功郎龍南尉汶次􅁱職郎沅陵令崧沅􅁜子醴􅁜令孔彰善誠齋楊文節公萬里醴􅁜子塤塤子鑑以文學顯終承事郎秘書省校書郎秘書生天福􅁱職郎廣西帥司幕官是為公之考號恕齋澗谷羅公椅婿之甞及接見後村劉公克荘為人慷慨多智畧與文丞相有婣好雅見噐異須溪鐂公辰翁青山趙公文静徳王公夣應復心崔公君舉巽吾彭某皆甞與之逰君子扵公行義之卓尚論先世藴蓄之深先友過􅀙之盛而知其􅀒挾有自来矣伯兄震漕貢進士仲兄薦􅀘國學生咸有士譽公娶王氏女有婦徳䏻持家後公一年卒子燁字持敬孫曰漢善􅉇嵩岳正泰鈞貫凡九人述行状者湖南宣尉副使周君志仁介燁請銘者太常􅀶士劉君聞也玄識燁乆銘何可辭銘曰安成在漢􅀠邑長沙十世有羨􅁡湖是家䖏士侃侃濬厥義問秩若紀綱不煩以紊範族以正剸物以剛抑浮惇雅植弱枿强鼯嘯子樷王師薄違鴻飛于渚公曰􅂚歸素筝軍門其勇萬夫貤其有餘翼蔽一隅孰弱爾巢我堅爾屋孰莠爾田我庤爾粟民􅀅徳公尸祝百世公曰噫嘻我求無愧衆芳􅀁都紛郁粹醲􅆂泳堯仁優㳺以終彼秩三品奉常斯謚法當立傳大史乃議奉常言之銘者大史儕是寵光展也君子松栢欎欎君子之域宜爾子孫維徳之植元翰林侍講學士中奉大夫知制誥同􅁱國史同知經筵事豫章掲公墓誌銘至正四年七月壬辰翰林侍講學士掲公曼碩以總裁宿史舘得寒疾歸寓舎戊戌薨時京師大雨彌月朝縉大夫聞者不避泥潦馳徃􅂘之人人盡哀明日中書岀公用鈔二千五百緡率先為賻扵是樞宻院御史􅄗六部以下咸致賻儀有差車駕在上京􅆘遣使賜諸捴裁及史官燕勞以公故咸援禮辭中書為改燕之日使者歸上京白宰相宰相以聞有㫖賜中統萬緡給䘮事有司議以驛舟送其櫬㱕江南􅀌汯奉史官劉聞􅀁状行詣玄謁公墓銘玄與公三為同寅相知為深公死為之哀痛踰月不􅀎忘故不銘有􅀁不忍銘有􅀁不忍九月汯􅀅扶護登舟廼勉叙而銘㬅碩諱傒斯姓掲氏生而頴悟年十二三讀書属文即知古人蹊徑家貧不䏻具束􅁱􅀙學惟蚤莫刻苦父子兄弟自為師友稍長豁然貫通日有增益未弱冠里大家延之授業諸生年或相等皆以師道嚴憚之二十餘􅀒儁譽㳺江漢間司徒程楚公為湖北憲使竒其才妻以􅀙妹皇慶初程公入朝公舘其門時國初諸老尚存聞程公有佳客咸願識之及與之言薦恐後延祐元年用薦為翰林􅀦史院編􅁱官三年陞應奉翰林文字同知制誥四年遷國子助教學士承旨復奏留之五年謁告歸泰㝎元年復授應奉翰林文字丁内艱去職天曆二年秋文宗開奎章閣置授經郎教勲舊大臣子孫扵宫中公首􅀍􅃟至順元年預脩經世大典三年書成超授藝文監丞叅檢校書籍事元統遷翰林待制後至元四年擢集賢直學士五年奉㫖代祀北嶽北海濟瀆南鎮竣事引疾便道由浙左歸豫章六年以奎章供奉學士召未至改授翰林直學士知制誥同􅁱國史至正改元兼經筵官二年陞翰林侍講學士且命同知經筵事三年年及七十請致仕歸上聞亟遣使追及漷南拜表力辤􅄪遣使奉上尊諭㫖還撰明宗皇帝神御殿碑文成求去不聴夏四月詔􅁱遼金宋三史命右丞相為都總裁中書平章政事鐵睦爾逹以下凡六人為總裁官公預其選遂不得辤明年遼史既進金史垂成公薨壽七十有一掲姓相傳出楚司馬氏世逺姓稀譜逸或云出漢功臣陽信侯或云出安道侯漢以後掲氏居髙平居汝居郢唐乾寧中有諱鎮者以左僕射持節􅀽州刺史掲氏仕東南者昉見扵此今江右諸掲居豫章居旴廣昌皆大族豫章族始祖稹旴廣昌始祖填推其訓名盖稹填伯仲㬅碩居豫章豐城今為富州曽祖光朝妣黄氏祖性聦累贈嘉議大夫禮部尚書上䡖車都尉追封豫章郡侯妣黄氏繼何氏並追封豫章郡夫人父来成以邃學篤行見推前軰先賜謚貞文先生贈中奉大夫江西等䖏行中書省叅知政事護軍追封豫章郡公妣黄氏追封豫章郡夫人皆以公貴推恩􅀄娶李氏繼程氏荆湖北道宣尉同知巖卿之女先公卒並追封豫章郡夫人子男二長汯國學上舎生克世父業李氏出也㓜廣陽生始四􅀊女一人適秀才楊湘孫男一敬祖孫女一公職子弟未甞有纎芬貽其親憂昆弟有無相通始終無間言少自䖏約立身洎有禄入服食稍踰扵前􅂺愀然思其親曰吾親未甞享此故平生清苦儉素老而不渝在京師三紀官至五品出入始乗馬為授經郎諸貴㳺子弟見其徒歩每蚤作宫門辨色􅂺先諸侍臣至謀為之貰馬公聞之自置一􅀐㝷復鬻之示非􅀁欲􅀄逰湖南見前宣尉文恵公趙淇趙素號知人謂公曰君他日翰􅁐名流憲使涿郡盧公摯見􅂺稱許其㱕朝竟以翰属薦之薦牘今在掌故至京師受知太保李文忠公孟樞宻王文㝎公約承㫖趙文敏公孟頫學士元文敏公明善先是東南士聚輦下如四明公桷巴西公文原雍郡公集有盛名公卿間既而貢集賢奎章周待制應極薦之皆馳騁清途公與清江范梈徳機滅城楊載仲弘􅁇至翰墨徃復更為倡酧公文章在諸賢中正大簡㓗體制嚴慗作詩長扵古樂府選體律詩長句偉然有盛唐風楷法精徤閒雅行書尤工國家典􅉺及功臣家傳賜碑遇其當筆徃徃􅀓誦扵人匹方釋老氏碑板購其文若字袤及殊域門人集其􅀁著巳板行扵世在國史時李文忠公見􅀁􅁱功臣列傳撫卷歎曰他人謄史牘耳若此方謂之傳在奎章時上覽􅀁撰秋官憲典驚曰兹非唐律乎又覧所進太平政要四十九章喜而呼其字以示􅄗臣曰此朕授經郎掲曼碩􅀁進卿等試觀之其本常置御榻側爲經筵官今上聴其講篇深嘉其忠懇故其際遇累朝皆非䟽逺儒臣􅀁敢望者延祐末朝廷倐罷群臣贈典公之父獨得賜號貞文又賜之碑天曆至順中大臣有薦文士人主必問之曰其才比掲㬅碩如何累􅁛其才可用欲噐使以政今上􅀄即位一日使衛士召公至則以内府􅀁賜諸王叚表裏賜之􅀅賜躬自辨識然後以授講經退又賜金織紋叚至正改選格諸超陞不越二等公由中順大夫進中順大夫獨不爲例超授四等轉八階進神御殿碑特賜楮幣中統萬緡白金五十兩中宮亦賜白金如其􅁆又爲之賜貞文書院額仍許置學官若此異􅁆公受之踧踖不見㡬㣲自衒之色而許國之志益自􅁬厲故䖏散地論政薦士以古人自期王文㝎公甞言與掲公談治道大起人意對大臣言其辤不及他第言某䖏灾傷未賑䘏某政􅁦未除某人賢在下位未擢用自漷南召還丞相與􅀱見便殿因問方今治政何先公曰養人養人何先公曰人才當譽望未隆之時養之在朝廷使周知庶務一旦用之自識治體及置史局又問􅁱史之道何先曰􅀵書用人又問用人何先曰用人先論心術心術者􅁱史之本也心術不正其他雖長不可用公求去之意未釋上使丞相及諸執政面諭􅅏公公曰使掲某有一得之獻而諸公䏻用其言天下遂􅀗其利雖老死扵此不恨不然何益之有他日集議東内公倡言鈔法大弊合用新舊銅錢權以救之政府不樂論議辨駁示以顔色公辨不少變丞相心深敬之故人才因公言知名善政因公言張本公出不以告人人亦鮮知之惟豐城地不産金而金課益倍為害㦄年公上言罷之集賢考校諸路學官􅀁業下胄監移愽士吏文淹滯儒者公請改其制以其事付本属官竟得奏􅁢御史言下第舉人以充學正山長鄊舉放次榜以充教諭學錄廟堂以咨公公力賛成之此世􅀁知者考鄊試㑹試一廷試為讀卷官二國子監公試七多得名士後居要路􅀁教勲舊子孫後多為重臣公待之泊然不矜詡以為聲援扵程公禮若賔客人弗知其為肺腑親性耿介易直好善惡惡表裏如一聞郡縣有一㢘吏他日臨文必旁引曲諭以極其􅁛道或恐其過聴失實公則曰如是猶不􅁕以勸善况敢億不信乎至聞吏有貪墨病民論之曽不少恕嘗有郡侯以􅀔諷其部民奉金為公夀求文記其徳政公頗知其人斥之曰汝郡侯􅀁行如何吾敢有以飾辭為䛕乎其人未㡬以賂敗朝中名臣意趣或不與之合終身不一造其門雖嘗以是為軋公曰吾之進退用舍一聴諸天人何䏻為世路齟齬時或不平心有􅀁感形諸詩文傍觀謂其太甚公曰言當如是不必慮也其遇善􅀋及新進諸生乃復恂恂汲引莫年求文者多寝食為廢子弟􅁆以為言公殊無厭苦意有客為人求文而私其金公既予文他客發其事公曰已受之矣終無􅀁言聞者􅁛其長厚􅆇􅀗有過徐以理責之人問之曰長上遇下稍見卞急後生便習暴戾當以身教禀性堅壮動作簡便群下易事公集必蚤官事尤勤進遼史後有㫖奨論史官早成金宋二史公奉命黽勉朝夕匪􅈈先代故事􅆇否􅁬筆書之身任勞責不以委人屢言今人徒知求作史法不知求作史意古人善言雖㣲必詳惡事雖隠必書其意主扵勸戒耳當暑濕盛作移居舘中頗自恃其精力踈扵攝生遂致疾不起昔玄與公共􅁱憲典公素習律儀又勤扵玄其書大半成扵公今又共史事公之勤不减昔時乃􅃍失援公未病前􅁆日謂玄曰某平生愛公文恨無因􅀗一言早晚史事成求公作貞文書院記記成而刻吾志畢矣玄敬諾之悲夫斯言詎意未記書院而先銘公之墓乎汯􅁲􅁙某鄊某原期以某年月日預爲之銘銘曰古稱良史造物忌子􅐁是非擅萬世嗟公直筆㢘不劌奨善懲惡義之比惡書不貸善書亟寒暑晝夜勦形思公起南服抱腹笥布衣徒歩品第二尚方召見呼以字致君惓惓効獻替講經作史出一意陳規進戒爲己事惜㢤􅀒挾勤少試徒抒精忠載言議感慨論列時出涕唐之甫也漢之誼以文發身卒以斃豊城故􅇕干將人願以不朽託公之同年惟先生義而銘之庻㡬公猶未死也余讀之欷歔夫同年以科目為弟昆師友以道義視父子師友廢道義不明同年乖科目不振人情死生之際天理存亡之機其􅀁係也大矣吾扵劉公忍不銘之乎公諱彭壽字壽翁家譜載其先本漢中山靖王裔隋時有諱建者仕為大將軍漢王諒使畧地燕趙將不直其􅀁為棄官入蜀家扵隋疑誤十一世祖貞仕蜀署眉州司馬蜀亡宋召入復官之䘚贈銀青光禄大夫五世祖貞卿字純老為廣漢軍司法至曽大父演字謙叔號中山由丹稜􅁶眉之金流鎮是為金溪中開禧丁卯潼川轉運司解有文集號雞肋傳扵蜀大父蕃卿字子才號黙齋登淳祐丁未第尉紹熙之靈􅀿改教授卬州攝州倅壬子蜀被兵出蜀之荆南卒焉考淵字學海三領郷解甞以春秋冠全蜀内附初避地嶺南之桂㝷之象還寓衡陽署號象環卓行篤學為士楷模事母至孝耆年修子職尤謹用薦為永州路學正既沒門人私諡曰永政先生公㓜頴悟侍父瘴海不廢家學弱冠負才儁辟衡山縣敎諭重闈康强公以薄俸迎養菽水怡然父子授徒從學雲委久之樂衡山士習之美遂㽞居焉再調武岡路儒學正秩滿待教授選㑹科舉行延祐甲寅初科以春秋貢湖廣乙卯登苐賜同進士出身授將仕郎桂陽路平陽縣丞轉岳州路行用庫使陞承務郎建徳路淳安縣尹授代還踰年䘚年六十有四先妣彭氏公名存外氏以志孝也迎養繼母于淛西年八十餘公卒深哭之公娶白氏用公貴皆當有封贈循資請于朝命未下公殁子一人侣女一人適茹蕃侣舉湖廣鄊貢進士遇恩調衡州路儒學正應選教授先公一年䘚公以繼世之重為之衰絰及期竟以憂感嬰疾疾革門人江雲端劉延儁軰咸在􅀅屬纊語延儁曰生順死安無遺恨也第老母不得終養孫圭㓜未之學子教之而才吾受子賜言訖乃瞑圭以某年月日奉柩􅁙于某山之原公為蜀名家世明春秋之學自曾祖演至子侣五世一經相傳科第接武家多著述象環先生有讀易記易學須知春秋例義春秋續傳記左傳記事本末周正釋經古今要略等書公􅀁校讐増附不少其自爲書有四書提要春秋澤存春秋正經句釋易詩􅀃未脫藁生平􅀁著文集門人方彚編之初科舉未行公教學者必以五經四書爲本爲文必先理􅃐而後詞章及科詔頒悉如公􅀁爲教故髙第􅃁嗣以取科名校文鄊閭門生多擢髙甲在衡山時部使者涿郡盧公摯廣平趙公厲皆時名公一見􅂺遇以老成在岳陽行中書省平章魏髙公昉㧞自筦庫舘之幕下屢以行省提舉薦不報迨其爲政勤扵治民而䟽扵奉上故當時惟賢者知公玄與中丞浚儀馬公祖常侍御濟南張公起巗叅知政事相臺許公有壬同朝暇日論及同年士五十有六人二十餘年聚散不常井沉不齊其間存亡疑信㡬不忍詰至扵鐂公則徃􅉨相視有荀慈明愧陳太丘之色適翰林編􅁱和逹来自淳安䏻言公幅中深衣每月􅀄吉陞座講書淳安士庶聴講無倦致邑中風俗丕變玄明日白諸公曰方今宇内州路縣大夫皆有師帥之責扵其民其􅀎服先王之服誦先王之言卓然以承流宣化爲己任者甞屢見其人乎諸公方懐論薦公􅃍不起噫命也夫公􅁙象環先生衡山先塋之原名其阡曰岷衡因號我山銘曰誰謂岷逹百川其攴誰謂衡髙景行斯齊誰謂公死遺書在兹遺書在兹使我悲之銘者是用不費于辭元故􅀅仕郎臨安路録事羅君墓誌銘延祐二年仁廟初以科目取天下士左右榜得五十六人時朝廷驟黜舊制一以經學行義取人􅀁得士非故業舉子以應時需者十五六年間司風紀掌綸綍内綜機務外使絶域才不乏使其間居位勇退䏻以風義先天下則惟羅君求師一人求師諱曽家廬􅁜新安里登第授􅀅仕郎寧都州判官􅂯調臨江録事以初授宫終焉其退非有扞挌不偶亦非以材具不􅆘時而􅀁慕有大扵此者􅅥乎若不䏻以斯須留故同年之士聞君之風反自􅁱省失􅀁􅀒挾怡然欲爭君之髙而莫之䏻也君至寧都蔡㓂甫平凋瘵未復􅁬以身任撫摩芟其强梁薙去宿蠧乆乃按堵臨江素號繁劇吏初疑儒者劣扵剸裁君夙夜勤恪事無留難朞年綱紀􅁱舉一日聞親有疾遂棄官去自是不復出仕以死惜㢤羅氏吉望族曽祖士友宋承務郎致仕士友母年滿百故相文山文公與其子弟有斯文昆弟之好奉幣載酒升堂拜母題詩㕔壁鄊里榮之曽祖妣蕭氏㤙封孺人祖垕父寅君孝出至性親病自臨江歸拜醫甞藥衣不觧帶親終毁瘠異常禫除餘年哀不忘嘗廬母鐂氏墓􅂼食􅁆􅀊不變事繼母習氏尤孝其死習慟之切至其平居終日忻忻喜愠不色蒞政㢘約遇物謙冲自束􅄠與人交不見㡬㣲􅄶心登第偕同年蕭君立夫舟還蕭僕死給以己􅀙蕭病臨清一月君一月留甘苦燥濕共之未㡬蕭即世教其􅀌遺長妻以女其􅀁爲不愧古人􅀋如是㤗㝎四年丁夘十有二月二十二日以疾卒于家享年四十有五以次年某月某日􅁙于廬􅁜之清湖娶文氏子男一人㑹之克世其學造物之報庶㡬在兹女四人長適蕭霽餘㓜霽即立夫子今江西鄊貢進士状其行来求銘嗚呼余扵君爲同年又同生昭陽恊洽之􅀊霽来始聞君之訃乃哭諸寝門之外爲之銘曰雅之烏烏不止于􅞉而集于枯車之輚輚不馳于坦而陟于阪嗚呼羅君士之以爲難􅀆君固即􅀁安􅀆而率老扵一官􅀆曽秀才墓誌銘秀才曽氏子一漢既沒扵江南其兄徳元在京師聞而哭之慟知其塟有時奉行状乞銘扵歐陽玄拜且泣曰人之生苟有徳慧孰不願有辭扵永世也弟一漢寔曽氏才子弟今不幸短命父兄不䏻續以長願得先進一言以傳庶㡬猶未死也玄聞其言惻然乃叙而銘之曽氏永豐顯親里大家一漢字明善本曽似翁第三子大父悼其兄之似俞早夭無後以繼之大徳十年丙午五月庚午朏生天暦二年庚午五月癸丑朏死是月戊午改至順以是年某月某日􅁙于某里之原一漢五􅀊讀書􅁆千百言過目成誦少長無童心年十二三䏻文章十五六頎然長以弁不尚浮靡不事貨殖篤志道徳性命之書䏻服行其言事父兄善交朋友信遇宗族之長老恭未及壮有學行詞章凛凛趍老成人初師里士劉福逺習舉子業精熟㝷執贄臨川呉先生門受諸經􅀃大􅁛頴悟年二十有五病痰喘以死方疾未甚四月十日有厲風􅀙西北来㧞並舍大木似翁蓍得未濟之巽心疑之不踰月一漢乃不起妻鐂氏子男一人萬奴裁四月而􅀌行述似翁􅀁自作其文不勝哀有甚扵徳元言者嗚呼為父兄鮮有不愛其子弟者論才不才恩義有不相掩者一漢死父兄若失希世重寳不䏻自存嗚呼一漢真佳子弟矣乎銘曰麟之不角麛不如殰鶠之不翰鷇不如􅖁奪其􅀁有無予之為瘉􅈥其垂成無生之為寧坎而深􅀣而槮無重傷其父兄之心歐陽竒翁先生墓誌銘先生諱文壽號竒翁姓歐陽氏玄之族兄也其先由廬􅁜徙安福之義厯復由義厯徙分宜之防里曽祖子敬祖西園皆篤厚好施與鄊􅁛長者考登仕郎化龍慷慨以功名自許妣李氏有㳤徳公生以年月日卒以年六月十八日享年十有賢配彭氏出里名族子􅀁性才幹克家孫吾貫篤問學善吟詠頃予在朝公遣姪勞予京師及謁告南㱕又勞予于家嘱叙其譜詎意譜序成而公沒玄聞訃哭諸寢門之外不􅀎堪未㡬所性懼公湮沒無傳屢以墓文為請􅀅以圖扵不朽予雖欲遲之恐􅀊月逾邁無以盡情則扵墓文又烏可巳耶公自糿頴悟甫􅁆􅀊讀書過目􅂺成誦年十餘挾書出􅈬外傅勤謹不􅈈鄰人有厭其夜讀者公焚膏繼晷諷誦不轍自若也公沒不勝哀慟廬墓三年而後歸仁宗族義鄊黨内外稱之無間言常恐子弟廢其世業延名師儒訓切之日復親督其課夜分乃止如是者以為常中年文學大進不求利逹師表鄊閭晚節深居罕與人接見唯幅巾藜杖逍遥林壑間􅀙一二賔客自娱其髙尚㮣可見矣以年卜􅁙安福縣六十七都地名黄竹坑坤申山寅艮向之原玄扵公為族弟故不辭而為之銘銘曰裕已範世􅀆學行􅁢敦内藴弗施􅀆既􅆇且淳子克其家􅀆孫踵其仁勒此貞石􅀆其永有聞圭齋文集卷之十終
