body:
  text: 卷之一賦天馬賦辟雍賦義門賦墨梅賦頌天馬頌卷之二五言古詩舟師諸牐􅀉詩奉謝都水分監瑞卿監丞送振先宗丈歸祖庭并列小序于左為􅀁性姪題小景三首題東坡恠石七言律詩大明殿早朝試院倡和四首相臺祭祖墓二首祭祖墓于防里用春洲先生韻送李宜忠之教寧州竹澗敗筆郊天禮成應制謝㤙日呈同年比干墓接花木壷清過洞庭二首侍宴北省春洲夀慶堂􅀉許叅政謝家建通濟橋夜宿寺前農家贈西明道人瀏江昌山讀鐂養吾虞青城書聴秋居士園池鐂草亭詩􅃁排律賜經筵官酒次蘇伯􅁱韻謝徳盛春萱堂卷之三七言絶句喜門生中状元四絶試院偶成及􅀉諸弟試院偶題贈巽齋六首􅀁貴姪梅為􅀁性姪題小景􅀁性姪家蔵東坡看竹圖􅀁性姪蔵所翁全身戯珠龍漫題四絶折枝海棠萬竿烟雨圖墨竹驢上曉寒圖灞橋風雪圖四首宣和梅雀一行禪師講經顧子虎再題臨川别卷三牛圖萬竿圖宋徽宗菌圖髙宗御書陳􅅮睡圖雪夜訪戴圖呉西村雪霽圖老蒲萄蒲萄子昻雪鵠墨荔枝劉山立梅圖天師月梅圖寒雀梅榮碧潭全身龍榮朝瑞正龍榮建翁家蔵􅀁翁龍夀卿龍頭吾友龍頭山間山水手卷醉翁亭障為南翁作武三思􅀟陸贈翠璧玸講主贈彭漢節彭雲溪真過髙郵永清觀天瀾栢庭和尚偶題􅀉山村兄贈歐陽震逺羮戞圖京城雜詠八絶永清寺白巖清暉方池古松四韻昭文携琴圖和寳雲長老澈一清二絶逄江易藝芳干賦芳洲旱禾田歐陽琅溪四絶用歐陽公琅琊為韻春江釣艇圖贈振先歐陽文東山春景歐陽公牡丹詩蒲萄二首分宜趙尹􅀁蔵子昻竹石圖卷之四歌畊學問荅四時百子圖趙菊山文肅公閱武像山荘􅀁蔵東坡􅀞古木圖簡劉相公歌贈趙祥表禙詠春閨怨和柯愽士􅁔和李溉之舞􅁎脫鞋吟贈􅀞公􅀺仲瑾號碧山子美㝷芳圖􅂵微老人大字歌送鐂子簡之武昌學正送聶以道之官武昌示姪躍海朝天龍道呉山大圍山奉􅃙題明皇馬雜體􅠥之坰古樂府有序漁家傲南詞并序卷之五記道州路重􅁱濂溪書院記貞文書院記􅀽州路繕􅁱記安成李氏重􅁱安賢義塾記趙忠簡公祠堂記保靚祠堂記安先生祠堂記秀川羅氏祠堂記仰更齋記呉氏觀樂齋記遜齋記譚氏蕭山記芳林記卷之六記分宜縣官題名記分宜縣學復田記求志堂記世綵堂記坦明堂記􅁇善堂記精道堂記讀書堂記聴雨堂記霞外庵記永思庵記臨溪亭記竹西亭記其樂亭記卷之七序防里歐陽氏族譜序彭氏族譜序白石周氏族譜序後林周氏族譜序廬陵中州劉氏族譜序國朝名臣事略序廬陵鐂氏通鑑綱目書法後序忠史序虚􅄜集序至正條格序奕序考古臆􅀃序鈐岡續志序風雅􅀋編序濳溪後集序易問辨序鈐南道士歐陽賔實詩集序梅􅁁先生吾汶藁序環山詩藁序卷之八序玉振詩序梅南詩序李宏謨詩序李希􅀃詩序鐂執中詩序蕭同可詩序羅舜美詩序月樓上人詩序鄭以道文集序劉桂隠先生文集序族兄南翁文集序贈李敏求序送虞徳􅁱序送鐂文廷之清江録事序送翰林應奉李一初南歸序送鐂仲宣歸隠東山序送鐂仲賔歸安成詩序送伍成均南歸序慶劉一山八十序卷之九神道碑許文正公神道碑趙文敏公神道碑貫酸齋神道碑虞雍公神道碑碑文曲阜重􅁱宣聖廟碑江陵王新廟碑洞淵閣碑張齊郡公先世碑趙忠靖公馬合馬碑卷之十墓碑銘鐂御史墓碑銘周判官墓碑銘鄭府君墓碑銘劉聘君墓碑銘叚徴士墓碑銘劉更齋墓碑銘鐂桂隠墓碑銘歐陽山村先生墓碑銘歐陽南谷墓碑銘龍母呉氏墓銘劉梅國墓銘掲文安公墓誌銘劉縣尹墓誌銘羅録事墓誌銘曽秀才墓誌銘歐陽竒翁先生墓誌銘卷之十一阡表安成鐂氏儒行阡表哀詞蕭同善哀詞傳髙昌偰氏家傳卷之十二經疑問夫子以小噐稱管仲而又以如其仁許之何也問孟子以隘與不恭稱夷惠而又以聖人百世之師推之何也書義翕受敷施九徳咸事俊又在官百僚師師百工惟時䇿問今天下之事毋泛毋畧制曰朕聞聖賢之君之治天下也或恭已無為㦯不遑暇食朕􅀅親覽焉卷之十三詔表􅁽文命相出師詔再命出師詔進遼史表進金史表進宋史表進經世大典表明宗皇帝尊號􅁽文銘友吾銘敬心齋銘􅀃楊鍳瑩之字􅀃劉叔耔字􅀃族子章晦字􅀃李觀尚賔字􅀃彭以恭字􅀃琅溪􅀃彬彬􅀃齊吾􅀃竒峰􅀃明軒􅀃鐂恭安􅀃并銘卷之十四題北行録安成劉氏家譜西平李氏族譜衆芳􅀁存彭功逺先世手澤南谷居士自賛像後五馬圖草虫圖娱拙集白麟溪三大字後太師石丞相􅀞墨竹御賜石􅈓千文搨本後䟦逺林鐂君墓銘後䟦王大年詩帙䟦劉士行墓誌銘羅孺文族祖澗谷藁歐陽文忠墨蹟䟦眉夀二大字䟦沁園春䟦䟦先公與南谷先生卷之十五賛御書九霄賛麟鳯二大字賛潘雲谷墨賛羅漢像賛兖文忠公像賛自賛山村先生像賛秉􅃔像賛静􅁱先生像賛黙安先生像賛蘇先生像賛蘇郎中像賛曽文辿賛鐂伯常賛題陽明軒太玄子龍䟽寳雲禪寺題䟽書啓附與所性姪書荅族兄南翁書與意山先生書回所中書囘􅀁立書囘鐂申齋先生書荅劉桂􅀮書荅孫春洲書二與張憲使書慰國博喪母書與鐂文廷書與鐂文廷啓回許叅政啓祝告文太祖以下祝文眀宗皇帝附廟祝文焚黄祝版焚黄告后土防里祭祖祝文二祭后土文二祭掲侍講文祭子逹老文卷之十六附録神道碑行􅃺傳像賛文忠䟦文廷荅圭齋啓許有壬與圭齋啓并詩文廷次圭齋偶題圭齋文集目録終
