front:
  text: 歐陽公文集序文辭與政化相為流通上而朝廷下而臣庶皆資之以逹務是故祭饗郊廟則有祠祝播告寰宇則有詔令胙土分茅則有冊命陳師鞠旅則有􅊎戒諌諍陳情則有章䟽紀功燿徳則有銘頌吟詠鼓舞則有詩騷所以著其典章之懿叙其聲名之實制其事為之變發其性情之正闔闢化原推拓政本盖有不疾而速不行而至者矣然必生扵光嶽氣完之時通乎天人精㣲之藴窮乎厯代盛衰之故洞乎萬物榮悴之情覈乎􅀑神幽明之􅄨貫乎華夷離令之由舉其大也則極乎天地語其小也則入夫芒秒而後聚其精魄形諸篇翰渢渢乎泱泱乎誠不可尚巳世有與扵斯者其惟大司徒楚國歐陽文公乎公諱玄字原功潭之瀏陽人其先家廬􅁜與文忠公􅁱同出扵安福令萬之後公㓜岐㠜十􅀊䏻屬文逮弱冠下帷􅁆年人莫見其面經史百家靡不研究伊洛諸儒源委尤為淹貫遂擢延祐乙卯進士第厯官四十餘年在朝之日殆四之三三任成均而兩為祭酒六入翰林而三拜承㫖盖當四海混一之時文物方盛纂􅁱實録大典三史皆大制作兩知貢舉及讀卷官凡宗廟朝廷雄文大􅁽頒示萬方制詔多出公手金繒上尊之賜㡬無虗􅀊海内名山大川釋老之宫王公墓隧之碑得公文辭以為榮片言隻字流傳人間咸知寳愛文學徳行卓然名世羽儀斯文黼黻治具公之功為最多君子評公之文意雄而辤贍如黒雲四與雷電恍惚而雨雹颯然交下可怖可愕及其雲散雨止長空萬里一碧如洗可謂竒偉不凢者矣非見道篤而擇理精其䏻致然乎嗚呼自宋迨元三四百年之間文忠公以斯道倡之扵其先天下學士翕然而宗之今我文公復倡之扵其後天下學士復翕然而宗之雙璧相望照耀兩間何歐陽氏一宗之多賢也不亦盛㢤初虞文靖公集助教成均其父井齋先生汲方教授于潭見公文大驚手封一帙􅀉文靖謂公他日必與之並駕齊驅由是文靖薦公升朝聲譽赫赫然相埒卒符扵井齋之言文靖之文巳盛行公薨二十四年其孫佑持持公集二十四􅃃来謂濂曰先文公之文自擢第以来多至一百餘冊蔵于瀏陽里第皆燬于兵此則在燕􅀁録自辛卯至丁酉七年之間作爾間有見扵金石者随附入之子幸為文叙之以傳濂也不敏自丱角時即知誦公之文屢欲褁粮相􅀙而不可得公甞見濂所著濳溪集不賜鄙夷輙冠以雄文􅀁以期待者甚至第以志念荒落學識迂踈不􅁕副公之望况敢冐昩而序其文㢤雖然公文之在霄壤中上則為徳星為慶雲下則為朱草為醴泉光景常新而精神無􅃜亘萬古猶一日序之與否尚何暇論㢤佑持字公輔問學精該論議英發無愧扵家學者也金華宋濂撰歐陽先生集序歐陽先生集曰詩流者三卷曰鈆中者十􅃃曰驅煙者十五卷曰强學者十􅃃曰述直者三卷曰脞語者三卷其門人王師模所輯也􅀁輯者止此作而未已者不止此先生扵書無不讀其爲文豐蔚而不繁精宻而不晦者有典有則可諷可誦無南方啁哳之音無朔土暴悍之氣惜棄在草野不得與典謨訓誥之述作以黼黻皇度然文関扵世教斯可傳矣不繫其人之􅀮顯學貴扵知道知道斯可法矣不繫其書之繁簡先生之可傳可法者固有在矣余獨恨不登先生之堂􅀙諸生之後而請益焉因王君請爲集叙姑書以識予嚮慕之意後至元六年冬十有一月朔掲傒斯序圭齋文集目録
