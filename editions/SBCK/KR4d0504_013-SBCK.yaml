  text: 圭齋文集卷之十三宗孫銘鏞編集
  hash: sha256:d9276ec138215037a8c3c6df0982e6f9286a19fb45d39d7a644e81d6425228a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_013-1a}
body:
  text: 安成後學劉釪校正詔表􅉺文命相出師詔惟天惟祖宗混一凾夏全付􅆌躬朕承丕基兢兢圖治罔敢逸豫不謂邇者河南反賊乗此承平之乆􅀒固弄兵流毒􅀺庶巳甞命􅀅討捕屢􅀗渠魁戮以徇衆餘黨狂猘尚逋嚴誅亦嘗肆宥開以自新怙終不悛致煩師旅太傅中書右丞相脫脫爰自賊發迄今屢請董師致討朕以心膂之親應難其請而期扵自効誠懇益堅朕惟事體之大付託實難匪資巨濟之才孰勝戡㝎之任今命脫脫以荅刺罕太傅中書右丞相分省于外總督諸道軍馬水陸並進其樞密院御史臺各分官属􅀙行禀受節制無或有違務要廓清妖沴永底隆平於􅃧太傅寔左右朕躬其行在安靖天下故分總揆之重属以討賊之勞尚克欽承懋建丕績故兹詔示想宜知悉再命出師詔朕承國家􅂭平之運四方無虞民不識兵士不講武于兹有年矣不謂迩者河南反賊弄兵構難荼毒蒸􅀺用是前􅀊大丞相脫脫請自出征一􅀾平徐朕惟股肱大臣宜朝夕在朕左右亟命召還分將致討豈謂因循遷玩倐經二年湖廣荆㐮雖嘗克復餘賊逋誅􅀒固恣睢致使軍士暴露日乆吾民供給困繁愁歎怨嗟徹于朕聴朕不遑寧䖏乃命脫脫以答刺罕大師中書右丞相分省于外緫督諸該軍馬振其威武刻日進兵殄賊安民以釋朕慮凢􅀅士用命者賞不用命者誅賊衆来降者赦旅拒者戮扵􅃧朕與丞相共理天下者也天下多故朕軫其憂相任其勞理􅀁必致汝徃欽㢤慎厥事事乃有濟圖厥功功乃有成徃哉汝諧布朕威徳措安吾民朕惟汝頼汝徃欽哉進遼史表代右丞相脫脫􅁧開府儀同三司上柱國錄軍國重事中書右丞相􅁥􅁱􅀦史領經筵事臣脫脫言竊惟天文莫驗扵機衡人文莫證扵簡䇿人主鍳天象之休咎則必察乎機衡之精鍳人事之得失則必考乎簡䇿之信是以二者􅀁掌俱有大史之稱然而天道幽而難知人情顯而易見動静者􅁻㐫之兆敬怠者興亡之機史臣雖迷前代之設施大意有助時君之鍳戒遼自唐季基于朔方造􅀖本席扵干戈致治􅀎資扵黼黻敬天尊祖而出入必祭親仁善隣而和戰以宜南府治民北府治兵春狩省耕秋狩省歛吏課每嚴扵芻牧􅀊飢屢賜乎田租至若觀市赦罪則脗合六典之䂓臨軒䇿士則恪尊三􅀊之制君慕漢髙之為帝托耶律扵劉宗相儗鄼侯之為臣更􅄒律以蕭姓享國二百一十有七載政刑日舉品式俻具盖有􅁕尚者焉迨夫子孫失御上下離心驕盈盛而釁􅂩生殘賊興而根本蹙變强為弱易扵反掌吁可畏㢤天祚自絶大祐苟延國既丘􅇕史亦蕪茀耶律儼語多避忌陳大任辭乏精詳五代史係之終篇宋舊史埓諸載記予奪各循其主傳聞况失其真我世祖皇帝一視同仁深加憫惻嘗􅃙詞臣撰次三史首及扵遼六十餘年􅀊月因循造物有待臣脫脫誠歡誠􅘨頓首頓首欽惟皇帝陛下如堯稽古而簡寛容衆若舜好問而濬哲冠倫講經兼誦乎祖謨訪治旁求于徃牒兹循史事斷自宸􅂨睿㫖下而徴聘行朝士賀而遺逸起扵是命臣以右揆領都總裁中書平章政事臣鐵睦爾逹識臣賀惟一翰林學士承㫖臣張起巖翰林學士承㫖臣歐陽玄翰林侍講學士臣揭傒斯侍御史今集賢侍講學士臣吕思誠為總裁官中書遴􅃟儒臣崇文大監今兵部尚書臣㢘恵山凱雅翰林􅈂學士臣王沂秘書著作佐郎臣徐昺翰林􅁥􅁱臣陳繹曽為􅁱史官分選遼史起至正三年四月迄四年二月發故府之櫝蔵輯遐方之匭獻捜羅剔抉刪潤研磨紀志表傳備成一代之書􅆇否是非不迷千載之實臣脫脫等叨承隆􅀉幸睹成功載宣日月之光華願効㳙埃之􅀘報我朝之論議歸正氣之直則辭之昌遼􅀦之君臣有知善者喜而惡者懼􅀁撰本紀三十卷志三十一卷表若干􅃃列傳四十五卷各著論賛具存體式随表以聞上塵天覽無任激切屏營之至謹言進金史表􅀼惟漢髙帝入闗任蕭何而收秦籍唐太宗即祚命魏徴以作隋書盖曆􅁆歸真主之朝而簡編載前代之事國可㓕史不可㓕善吾師惡亦吾師矧夫典故之源流章程之㳂革弗披徃牒􅂚蓄前聞惟此金源起扵海裔以滿萬之衆横行天下不十年之乆􅌹制域中其用兵也如縦燎而乗風其立國也若置郵而傳命及煟興扵禮樂乃煥有乎名聲嘗循初而迄終因考功而論徳非武元之英畧不􅁕以開九帝之業非大㝎之仁政不􅁕以固百年之基天㑹有吞四海之志而未有一四海之規明昌􅀎成一代之制而亦􅀎壊一代之法海􅁜無道自取覆敗宣宗䡖動􅂚濟中興迨夫浚郊多壘之秋汝水飛烟之日天人属望乆有在矣君臣守義盖􅁕取焉我太祖法天啓運聖武皇帝以有名之師而釋奕世之愾以無敵之仁而􅀵兆民之心勁兵擣居庸􅀜北拊其背大軍出􅂵荆口南扼其吭指頋可成扵儁功操縦莫窺扵廟筭懲彼取遼之暴容其渉河以遷太宗英文皇帝席卷河朔而徇地并營嚢括趙代而傳檄齊魯㓕夏國而蹴秦鞏通宋人以逼河淮睿宗仁聖景㐮皇帝冐萬死出饒風長驅平陸􅀾三峰乗大雪遂定中原大陽出而爝火􅑒正音作而衆樂廢及我世祖聖徳神功文武皇帝恢弘至化勞徕遺􅀺燕地㝎都徹武靈之舊趾遼陽建省撫肅慎之故􅇕于時張柔歸金史扵其先王鶚集金事扵其後是以纂􅁱之事見諸敷遺之謀延祐申舉而未遑天暦推行而弗竟恭惟皇帝陛下緝熈聖學紹述先猷當􅀖家閒暇之時治經史討論之務念彼泰和以来之事迹接我聖代初興之􅀊年太祖受帝號扵丙寅先五載而朱鳯應世祖􅗱聖質扵乙亥􅂊一􅀊而黄河清若此真符昭然成命第以變故多而舊史闕􅂄艾沒而新􅀃譌弗折􅂨扵大朝恐失真扵他日扵是聖心獨斷盛事力行申命臣等集衆技以責成書佇奏篇以覽近鍳臣等仰承􅂭委俯竭㣲勞紬石室之書誠乏司馬遷之作獻金鏡之録願攄張相國之忠謹撰􅄒本紀十九卷志三十九卷表四卷列傳七十三卷目録二卷装潢成一百三十七帙随表以聞進宋史表代丞相阿魯圖譔開府儀同三司上柱國録軍國重事中書右丞相監􅁱國史領經筵事提調太醫院廣恵司事臣阿魯圖言􅀼惟周公念先業之艱難七月之詩是作孔子論前王之文獻二代之禮可言故觀趙氏隆替之由􅁕見皇元混一之績欽惟世祖聖徳神功文武皇帝初由宗邸親總大軍龍旂出指扵離方羽葆歸登於乾馭􅌨風沐雨詎辭䟦􅂂之勞略地攻城咸遵禀授之筭􅀭舲而平江漢卷甲而克㐮樊恭行吊伐之師昭受寵綏之􅀉及夫􅀵圖書扵勝國輯甫􅒐扵神京㧞宋臣而列政塗載宋史而歸秘府然後告成郊廟􅃬慶臣民推大賚以惟均視一統之無外樞庭偃武既編戡㝎之勲翰􅁐摛文㝷奉纂􅁱之㫖事㡬有待􅀊月易遷累朝毎切扵􅁇承多務未遑扵制作臣阿魯圖等誠惶誠恐稽首頻首欽惟皇帝陛下恢弘至道紹述丕謨徃行前言樂討論于古訓祖宗功徳思􅀭厲扵耿光惟我朝大啓基圖彼吴㑹後歸板籍視金源其未逺細石室以具存及兹累洽之時成此彌文之典命臣阿魯圗左丞相臣别兒怯不華領事前右丞相臣脫脫為都總裁平章政事臣帖穆尓逹識御史大夫臣惟一翰林學士承㫖臣起巗臣玄治書御史臣好文禮部尚書臣沂崇文大􅁥臣宗瑞為總裁官平章政事臣納麟臣伯顔翰林學士承㫖臣逹實帖木爾左丞臣守簡叅議臣岳柱臣拜臣陳思謙郎中臣幹欒臣孔思立等恊恭董治史官工部侍郎臣斡玉倫徒秘書卿臣泰不華大常簽院臣杜秉􅃔翰林直學士臣宋褧國子司業臣王思誠臣汪澤民集賢待制臣干文博翰林待制臣張瑾臣貢師道宣文閣鑒書博士臣麥文貴監察御史臣余􅊴大常愽士臣李齊翰林􅁱􅁧臣鐂文大醫院都事臣賈魯國子助教臣馮福可大廟署令臣陳祖仁西臺御史臣趙中翰林應奉臣王儀臣余貞秘書著作左郎臣譚慥翰林編􅁱臣張翥國子􅂇教臣吳當經筵檢討臣危素編劘分局彚稡為書起自東都迄于南渡紀載餘三百載始終􅂊一再期考夫建隆淳化之經營景㝎咸淳之潤色慶暦皇祐以忠厚羙風化元豐熈寧以聦明紊憲章馴致紹聖紛紜崇寧荒􅅍治忽昭陳扵方冊操存寔本扵宮庭若乃建炎紹興之圖囘乾道淳熈之保又正直用則人存政舉邪佞進則臣辱主憂光寜之朝僅守宗社理度之世日蹙封疆頋乃拘信使以渝盟納畔臣而侵境由權奸之擅命啓事釁以召兵厥後瀛國㱕朝􅁻王航海齊亡而謗王蠋乃存秉節之臣楚盛而諭魯公堪矜守禮之國載惟貞元之㑹合属當秦道之熈明衆言淆亂扵當時大義昭宣扵今日矧先儒性命之􅀃資聖代表章之功先理致而後文辭崇道徳而黜功利書法以之而矜式􅃔倫頼是以匡扶雖㣲董狐直筆之可稱庶逃司馬寡識而輕信至若論其有弊亦惟斷以至公大㮣聲容盛而實徳衰論建多而成效少且辭之繁簡以事而文之古今以時舊史之傳述既多襍記之蒐羅又廣扵是叅是非而去取權豐約以損増事嚴敢計扵疾徐日積亦虞扵玩愒臣阿魯圖等黍司當揆實預提綱周詢在局之言靡不究心乃職第述作之才有限而報効之志無窮倘垂清燕之觀尚助緝熈之益曰若帝堯曰若帝舜惟聖心稽古之功􅁥扵有夏監于有殷乃臣子告君之道謹撰􅄒本紀四十七卷志一百六十二卷表三十二卷列傳世家二百二十五卷装潢成四百九十二帙随表塵獻以聞進經世大典表至順三年三月進堯舜之道載諸典謨文武之政布在方䇿道雖形扵上下政無間扵精粗特扵紀録之間􅁕見彌綸之具是以秦漢有掌故之職唐宋有㑹要之書于以著當代之設施于以備􅀅来之考索我國家受命龍朔纉休鴻基發政施仁行葦之忠厚世積制禮作樂関雎之風化日興紀綱具舉扵朝廷統㑹未歸扵簡牘欽惟欽天統聖至徳誠功大文孝皇帝陛下總􅄃群䇿躬親萬機思祖宗創業之艱難與天地同功扵經緯必有鋪張以掲皦日必有術作以蔵名山爰命文臣體㑹要之遺意徧􅃙宫寺發掌故之舊章倣周禮之六官作皇朝之大典臣某叨承㫖喻俾綜纂􅁱物有象而事有源質為本而文為輔百􅁆十年之治蹟固大畧之僅存千萬億世之宏䂓在鴻儒之繼作謹繕寫皇朝經世大典八百八十卷目録十二卷公牘一卷纂􅁱通議一卷装潢成帙随表以聞伏取裁㫖明宗皇帝尊號􅉺文伏以得名得位大君之盛徳必兼事亡事存孝子之至誠如一爰徴古訓追上徽稱欽惟皇考皇帝陛下禀純乾之剛居洊震之長當世祖之丕構接武皇之正傳厯試諸難侔蹤虞舜舊勞于外儷跡啇髙當龍躍以在淵變化莫測其量及雷行而育物動静不違乎時兹豈非順天乎若夫綸言未頒而仁聞之馳滿天下寳璽初受而皇極之建繫人心兹豈非立道乎至扵親儒生扵汗馬之塲輯宗盟扵櫜弓之頃兹豈非叡文之教知武之功乎聖莫大扵無為孝莫大扵善􅁇玄造固難乎擬議鴻名宜罄乎宣昭矧徃事之艱貞増􅆌躬之􅇶􅅥欲旌永慕庶享多儀謹遣攝大尉臣某奉玉冊玉寳追上尊號曰明宗順天立道叡文知武大聖皇帝銘友吾銘吾友號吾仁我以友我是須輔雖資友􅂑友在吾人肯友吾視吾可否善不吾若友吾何􅂑尊者友卑貴不吾見乃忘􅀔分乃友貧賤賤者友貴􅀁貴吾立傲固不可佞豈可習有人扵此如澤相麗吾友友吾交盡友誼曽子之學省先吾身吾友為誰必顔其人惟顔與曽尚友千載讀詩讀書吾志吾在敬心齋銘人之有學治心為先心得其理乃聖乃賢賢聖之為其要曰敬清明在躬齋荘中正敬不于貌敬于其心思而儼若上帝汝臨無貳無虞惟精惟一􅅚我天君守而勿失學之終始惟敬靡他身之主宰非心而何克敬在心亦敬亦聖聡明為堯温恭者舜湯曰日躋􅁎文緝熈孔嚴三畏顔謹四非孟子養身尤善養氣彼何人㢤希之則是朂爾敬心心以銘鐫為此銘者太史氏玄戚友劉君思清以其猶子尚敬謁予瀏上予嘉其好古􅀅掖而進道乃為之銘其敬心齋請事斯語余日望之字􅀃散􅀃附楊鑑瑩之字􅀃劉文廷壻工製噐皆有隂陽其陽文其隂質古者物善技精故表裏一文質均後世物多窳技售觕故金有滓玉有瑕絲有纇則為文以盖之若質之素乃為貴耳惟鑑不然其質之羙見扵面其文之美見扵背盖鑑主扵瑩故也瑩自外徹内用䏻以内燭外鑑之瑩未甞為文而天下之文無不入焉吾故謂鑑有君子之道以其先質而後文也雖然百煉而金精金精而鑑瑩豈一日之功㢤人質亦然􅀁資扵學也大矣安成學者楊其姓鑑其名瑩之其字者誠者文節公諸孫也質美近道蔚然有文通春秋三傳學用薦為國子四門舘生圭齋歐陽玄書是􅀃以贈之劉叔耔字􅀃安成鐂生名士疇字叔耔􅀙余謁字􅀃夫疇者易治之田之名也耔者既立之苗又壅其根使之梗有㩀以禦水旱者也子名疇字叔耔尊公為子計者周矣農在四民䏻衣食其三者工之技啇之利或􅁕以病之先王有厲禁矣惟士與農同體故畊學徃徃並稱扵經士生斯世筋力不匱才智有餘退恃可治之田進挾可用之學傲然無求扵穹壌間以聴命扵司造世之偉丈夫也然古今則㡬人焉進為鹵莾之學以倖一時之遇退為㓕裂之畊以倖一􅀊之秋滔滔者不乏也然豈願吾友効之哉實耕學扵一貫堅智力扵一勤疇有其地耔有其本國之良士又良農也余為大司成時生之尊公常􅀶為國子助教生以胄子入學日升堂講論余愛生之聲琅琅而論纚纚也今别又數年矣生勉乎哉族子章晦字􅀃宗兄議翁子耀既冠當字謁余字之余字之以章晦又申其􅀃以朂之今天下之有光而䏻燭者水也火也而二者不同焉水内明外暗火内暗外明然世以水鑑者什一以火照者什九豈非外闇内明者晦養其明假物而明始見外明内闇者明出乎物遇物而明自生君子則之内外交養明晦相資猶水火日用扵世而明不匱豈不以是與或曰朱晦翁􅀄授教扵屏山鐂氏有木晦扵根春華燁敷之言由是號晦菴今子以水火言明晦何居余曰木受氣水而傳氣火者也晦明明晦豈二本㢤余生平喜吾歐陽氏之業為儒者甚多章晦聦明好學尤多藝䏻年則弱冠已見舘榖扵大家余字以晦盖望其顯融者奚止如今日􅀁觀者云李觀尚賔字􅀃鈐邑大姓曰西溪之李有名觀而字尚賔者吾宗用綱之甥也聞余訪族至其外舅家逺来即余求尚賔􅀃夫觀一字而有二義以觀示言者九五之主一卦也以觀瞻言者一卦之宗九五也六四一爻去九五最近故其繇曰觀國之光利用賔于王謂其以隂柔而近陽剛有仕而覲于上之象今子名觀而字尚賔可謂知􅀁尚也已然亦何道而臻兹乎故愚甞謂觀示觀瞻之義猶未􅁕以盡乎觀九五之觀我生上九之觀其生二爻皆有觀省其已之義為六四之君子者盍亦退而觀諸已乎利用賔于王實在我之􅀁自致也周官之法三􅀊大比考其徳行道藝而興其賢者䏻者鄊老及鄊大夫帥其群吏與其衆以禮賔之獻其書于王則再拜而受之夫徳行道藝之三物者士之可自勉者也今科目復矣子勉于學由是而觀國之光利用賔于王孰禦子㢤余聞尚賔家多書又多山水之勝甞作亭名兩山間子既扁之矣用功扵幽閴深靚之鄊䇿勲扵昭明正大之地六四之觀之占属之子矣彭以恭􅀃學者以字􅀙名有内外之辨斯不瀆也安成劉仰更致其表弟彭尚謙字以恭者之請求予為字􅀃以贈夫謙者恭也皆見乎外者也謙之中有物恭之中亦有􅀁主何為有物謙之象曰地中有山卑者藴髙者扵其中中有屹然不可犯之意特有之而不居則見乎外者自然而謙也何為有􅀁主主者一而已矣主一之謂敬有􅃀乎不可㧞之意䏻出乎無偽則見乎外者自然而恭也謙也恭也曽謂色􅂑而可乎善乎君之為字也䏻求諸乎中則容之著乎外者無以尚也謙之失曰􅁿恭之失曰􅁕怯二者之失求諸中斯可彭氏多文人吾以恭好學不倦故樂以内外之􅀃告之琅溪􅀃吾家自鈐南之防里徙長沙之瀏陽族属之近者亦徙安成北境上是為早禾田號曰早歐有名俊字用綱者早歐之秀者也嘗扁其讀書之室曰琅溪頃過余上謁余為之􅀃夫王瑩然而澤者琅玕也溪之色幽幽其似之乎琅然而清者珩璜也溪之聲淙淙盖又近之然君子之比扵玉以有徳也取扵水以有本也豈徒以聲色為尚㢤玉有徳故用扵宗廟朝廷水有本故逹扵江河淮海善推其所為而巳吾用綱中有外著聲與實流琅溪云乎哉彬彬􅀃吾宗歐陽氏之甥新澤胡君復字曰扵信而名其讀書䖏曰彬彬因宗人宜翁兄謁余為􅀃夫彬彬之言昔我夫子嘗兩言之其一曰文質彬彬然後君子其一曰假我􅁆年若是我扵易則彬彬矣釋者謂彬彬猶班班物相雜而適均之貌大㮣質不勝文文不勝質二者適均彬彬可想見也獨易之彬彬義安取乎豈非中古之言易者象或過乎質理或過乎文必經聖人之手而後彬彬與雖然愚甞􅀼以謂彬彬固貴乎二者之適均特物相雜而易見青黄赤白是為文章則彬彬即文矣君子之論終不以彼而易此也禮噐曰甘受和白受采忠信之人可以學禮君子先質而後文之意豈待文勝而後捄之與損其有餘而􅀘其不􅁕在夫善學君子者矣於信妙齡老蒼爲學近裏以孝弟貢試于鄊故余樂有以進之齊吾􅀃族弟巽翁號齊吾因字以爲號者也兄原功甫爲之􅀃曰後天之易巽東南之卦也萬物至是而潔齊焉然東南之爲位以一􅀊言之則孟夏建已之月也以一日言之則日至禺中之時也以人之一生言之則二十以至三十之年也物生齊扵孟夏之月人事齊扵禺中之時大抵然也士為學弱冠以至壮􅀊就厥條理則成人之功過半矣宫庭有儀衛焉排比而不亂軍旅有行伍焉整娖而不淆府庫有委積焉屏當而不煩然後為齊也齊之功豈易集㢤昔者聖人自序為學之功毎十􅀊一進唯十有五志于學至三十而立獨多其年豈非為學求齊扵斯時亦難矣然則齊之道當何先乎曰齊與齋同義又訓一齋主乎敬敬主乎一求之之要無踰敬者或曰巽東南之卦其氣温厚敬非肅不􅀎何事扵㢲乎曰不然巽之為言順也順莫大乎禮禮莫大乎敬敬則有序而順有序而順則和生焉巽在其中矣巽翁謝曰吾今而後知齊吾之綱領矣請書其􅀃以贈巽翁一名巽亨愽洽而聦敏吾宗之英也竒峯􅀃天地間氣形惟正與竒受其正者為正受其竒者為竒山之有五岳水之有四瀆正也然五岳有泰華崚嶒而峭㧞四瀆有清濟潜洑而趵躍是正之中有竒者焉人亦然端荘靜重之士偶遇事變未甞無超邁卓絶之行也特水之竒以衝激而見人之竒以感發而見皆因動而見竒者也惟山之竒在峰雖静亦竒􅀌夐之姿騰踔之􅀔有自然之竒不可以言喻者故士之靜獨􅀮居而有竒節者徃徃則之安成鐂君世良著竒峰以為號吾既以靜而竒者况之然劉氏􅁆世皆名儒􅀼意斯文之福澤􅀅鍾扵世良之身􅀁謂因動以見其竒未必見舍扵當世竒之體用扵是乎備歟明軒􅀃族兄晋翁號曰明軒夫晋之明有離象也􅀃卦離為日為火晋之象君子以自昭明徳晉之明以離􅄐之明為日為火君子之自明心乎性乎愚甞謂日者火之精是日以火為明也然火自日出者也心者性之郛是心之明有性在其中也而性實自心岀者也故曰盡其心者知其性也日與火之明心與性之明固無二也雖然日以屢入養其明火以屢改養其明心之養其明也以虗性之養其明也以静明有􅀁養自不息也明而誠其道在斯乎晋翁兄愽學之士也其渉厯世故又乆所以養其明而日進者俟余言㢤姑以是為明軒􅀃以應其命爾劉恭安􅀃并銘安成鐂君彦恭才氣敏逹學問充裕因其有彦恭之字朋友號之曰恭安彦恭不䏻辭求一言以自朂予昔受讀論語子温而厲一章嘗謂温而厲一辭若總下兩句所謂威而不猛恭而安者威自厲岀不猛有温在其中此易曉也威而不猛可緫扵温厲恭而安何􅀁附属曰書言恭作肅又有􅀁謂嚴恭嚴也肅也非厲而何且二者非可乆之道也持之而安惟温而厲者䏻之豈非互有􅀁發明乎恨玄生晚不􅀗質正扵前修彦恭之請姑志臆􅀃于此願與識者啇􅃀之銘曰人生徳性本無不備氣質或偏動鮮無媿聖人􅀁養全體渾然貌恭而安語黙皆天希聖力行持乆持敬澄其氣質懿㢤徳性恭非勉强安亦􅀙容聖功既熟無適非中大舜命夔臯陳九徳變化攸宜君子斯則千五年後横渠猶疑劉氏之子其殆庶㡬圭齋文集卷之十三終
