front:
  text: 圭齋文集卷之十四宗孫銘鏞編集
  hash: sha256:69e8e1f00b65f4c2c69cdaf1a77b4b8daf64980fb4182c1e0101df1378a48913
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_014-1a}
body:
  text: 安成後學劉釪校正題䟦北行録士生休明之代區宇混一意之􅀁之跡跡皆可以逹即其耳目之所覩記搴英􅄃華託諸翰墨論議之間異時竒聞偉績因是以有徴扵来世也廬􅁜奔元凱挾其吟詠之學卓犖之才其至京師與當代名縉紳劇談雄辯周諮國家之巨麗而升平諸福之物舉集一時扵是黄鵠朱鴈之什人爭誦之至扵登髙眺逺追懐徃哲風晨月夕排遣覊思佳句尤富使之得展􅀁藴扵承明著作之地以任􅀭厲輔張之風豈不大强人意乎三復降嘆題而歸之安成劉氏家譜徃年宗人南記自􅁻州刺史琮遡歐陽亭侯上及神禹下逮安福府君萬不以地之遐僻族之蕃廣必旁蒐逺羅不少遺譜成且欲合祠吉州刺史安福府君為不祧之祖集宗人之近者莭春秋展敬祠下其䂓措不凢用志亦仁矣嘗因堯賔兄序之惜㢤南記已矣安成鐂君思清携先世告身六七通求予識其後且眂余家譜上推其祖之所自出下列各􅂀之􅀁同出徴兩漢南宋以上至陶唐氏得姓以来之祖其意亦由南記也余嘉其其敦睦之誼圖分􅂀别得别生分􅀋遺意故爲之書且告之曰子歸爲我訪黄石宗人之賢者謝曰其毋廢譜學毋廢祠事庶㡬余猶有望焉思清字清隠扵予先世通家又同生癸未今爲湘鄊校官家譜則其􅀙弟思復之􅀁圖也西平李氏族譜桓桓西平爲唐中興功著鼎􅃔徳􅀍􅀺烝當時賢良風雲依乗如渾侍中如馬北平曽㡬何世系冷如氷惟西平裔趾美相仍更唐厯宋我元是承設科曰雋試吏曰􅀎守令之選㙜閣之登表表愈偉爲時名稱子孫千億蟄蟄繩繩天道之報信㢤可慿予書其㮣寓勸以懲後之来者扵焉斯徴衆芳􅀁存安成劉伯仁號芳所後以扁其齋嗟衆芳之所在宜君子之盤桓巖班璘􅀆有菊畹紛披􅀆有蘭朝菲菲􅀆紉佩文采采􅀆為餐通神明扵鼻觀納上清扵泥丸却氛穢而益夀志無昬而氣完襲馨徳乎先􅈒託髙風乎􅀊寒彭功逺先世手澤先叅政冀公􅇮善廬􅁜彭君士楚先公上庠髙選雖治春秋䏻通諸經忍見前代時文散逸毎属士楚收拾士楚至則稇載充牣先公暇日亂紬而泛閱之擇其尤者别彚為帙士楚亦䏻朗誦先世詩義賔至迭論玄兄弟澷不及省先公朂之曰黄􅉺子㑹有行世時児曹毋忽也先公薨之七年科舉興玄首擢第追憶先訓泰㝎甲子彭公冲􅀁以詩經擢進士為士楚􅀙弟扵是其家學益振他日冲􅀁子功逺来京師䄂其曽祖坦軒祖碧野二先生及一門諸父舊業程文盖冲所題識手澤謁余求一言是盖吾先公平日之所購求而士楚之􅀁樂誦者彭氏世科之左劵不在兹乎俯仰四十餘年科目廢而煟興興而歘廢今明詔復􅅚中書舉行玄叨塵􅀙臣􅀄議􅊴下力賛其成又適秉筆代言播告海内矣㑹􅀅見程文復盛當世喜而志扵斯南谷居士自賛像後士大夫自賛其真例多自抑之辭而生平自知之明徃徃見扵言表如善寫真者引鏡自照以圖其形宜無遺巧玄甞銘南谷翁墓今觀其寫真自賛表裏純誠殆非丹青之所䏻状尤非發潜者之所可模寫也至正二年三月余客瀏東厚田湯氏家齊吾弟携此見過因贅􅁆語于後五馬圖卷中五馬龍者其誰如隔腦脂如行烟外如辨九疑而况南山四十萬匹中欲求流雲飛電之姿嗚呼世無伯樂龍者其誰草虫圖蜂戀其房􅀆不可以㳺蛛待以網兮為有􅀁求曽不知蛺蝶與草虫􅀆飛躍之自由娱拙集娱拙集者吾宗歐陽存中甫之作也其中古樂府諸篇情景俱至追議當時近體詩清新俊逸佳句層見是何吾宗人之多才也題曰娱拙雖謙辭實出見觧六朝劣扵漢魏得其巧未得其拙也晚唐媿扵盛唐亦得其巧未得其拙也繼自今拙日進則詩日進矣何當見存中甫重􅀭確之白麟溪三大字後右白麟溪三大字前中書右丞相脫脫為浦江鄭大和書溪舊號香嚴在縣東二十八里白麟則大和二十六世祖之名也有恵淮者字季淵寔白麟十九世孫由遂安遷溪上易以今名示有先也淮之孫綺至大和凡六世大和􅀙子鑑至某又三世皆同居共財朝廷表為孝義門扵乎溪流無終時公特書是以寵之者盖􅀅朂其門相為悠乆㢤字畫方毅酷􅀋顔真卿觀者孰不改容不待賛也大師右丞相􅀞墨竹右墨竹一枝大師右丞相􅀁畫以遺其舘客授經郎鄭浚常者也丞相天資明叡知識過人一日得文與可竹譜學之即臻其妙觀其枝葉面嚮柯幹節脉皆與可法而筆意老蒼與近代李薊丘諸人所作逈然不同浚常在相府直言不阿又多引拔善􅁼為長史甚得體相君雅愛重之故受以心畫云御賜石刻千文搨本後題今上皇帝得智永千文命近臣摹勒刻置宣文閣中􅀁拓墨本從官之有文學者則識以宣文閣寳而賜之授經􅀰浦陽鄭深浚常嘗侍上經筵故預是賜可謂稽古之榮也夫金璧珠寳天下貴賤之􅀁同尚者也國家以旌有德賞有功扵􅀁同尚者而不靳焉􅀁以示恩也至扵法書名書遇彌文之代時君聖性好古則其所尚有重扵金璧珠寳矣於其文學侍從之臣不靳其􅀁獨尚者而賜之所以示異恩也鄭氏浦陽義門九世同㸑朝廷嘗旌之今浚常以斯文又膺是賜愚故願義門之子孫世世寳之上以無忘聖天子好古博雅之志下無以忘乃祖父漕遇之由足以垂乆逺矣䟦逺林鐂君墓銘後前代士大夫非居憂人不敢以銘墓情非此則奉勑或契友族属尊行與座主舉主也今常愽鐂君文廷制中作逺林劉君墓銘文字簡古又得古式故特表而出之䟦王大年詩帙余從王實初先生得其族孫徳生詩賦一帙讀之翩翩然渥洼竒駿筯骨甫壯肆其馳騁未有紀極也他日範以王良造父之法納之和鸞大輅之下則才氣老矣三復題而歸其帙䟦劉士行墓誌銘廬陵䖏士劉士行父以經學名家􅇮予在京師國學進士解子元甞請序其詩文矣今其弟解觀又以邵菴虞公􅀁為墓銘求予跋失廬陵九老以忠節文章顯國史書之天下宗之士行讀其書誦其詩論世尚友顧非斯人之徒與抑卲菴之銘至矣予奚庸贅族祖澗谷先生留藁䟦至正壬午十一月予訪族至鈐岡之防里縣大夫浚儀趙侯尚之因休日時來勞既而又專其舘賔羅君孺文與其子璉求鈐岡題名記等作時予又之別族之安成孺文踪跡余􅀁至暇日敬問其先世則先軰澗谷先生之從諸孫也先生分教長沙時先尚書澹軒先生居郡泮前廡道同志合友誼彌篤既去官書問不絶咸淳甲戌先冀公以混􅀘入國學先生時為權院留臨安貽書相慶以為先尚書宣力學校之報内附後猶數有書於是予與孺文叙先世通家之好聚首數日驩甚􅀅別出先生長沙藁一帙視予帙中或手自抄或筆更録朱墨如新皆􅀁􅀧校歛袵讀之如從先世與先生㳺詠碧湘翠􅅢間也獨詢其適傳則有如徃時湘中之所傳者使人不能不係之以感􅁣士大夫寓形天地可託者二一曰有文二曰有後二者未必得兼不得巳而去則有文庶無憾也歐陽文忠公墨跡䟦玄生平􅀁見兖國文忠公真蹟甚多其篇帙大者扵同年許安陽家見毘􅁜胡文恭公墓銘藁百丈輝上人􅀁見州郡名急就章胡氏碑行草急就章皆微渉行楷余家􅀁蔵佳者曰與杜祁公蘇明􅁢書及晚年三乞致仕表草皆筆法如一獨祁公書端謹結體頗若蘇氏父子豈非蘇氏感公之至初年倣公之書後充拓自為一家體邪兹来叙族至早禾田歐氏見集古題名碑䟦而歐氏在楓􅀣下者又出與留守學士書見示皆名墨也第書中貺字兩用雖貺况古文通然意若有􅀁謂留守學士者得非田元均乎旅寓乏文字考訂姑識此􅀃以竢愽古之君子眉夀二大字䟦至正丁酉九月浦陽鄭深浚常由吏部員外郎除浙西憲僉􅀅行自念先為授經郎學在内府密迩青坊常􅀗侍皇太子硯席今日逺􅃥􅁩當入辭乃因宫臣以見既詢其南歸之由對曰老母年近八十思便侍養是以逺渉鯨波不敢憚勞也儲君惻然頋左右取近日所書眉夀二大字賜之盖以髙其親之年庶以永其子之養也敬惟皇太子天迪仁孝之性扵兹一事二美備焉仁事親之實孝為仁之本皇太子平日視膳問安盡其愛敬之道扵三宫兾以寧君親之心􅀃君親之志以蘄君之夀也一旦推其􅃬􅀋之盛心成己成物之功仁與孝不可勝用矣眉夀始見扵􅃎風之七月老人眉有毫夀之徴也後屢見於魯頌之閟宮今鄭氏在淛東九世同㸑旌表孝義之家也部使者興化羙俗之官深知斯行奉元良心􅀞以歸心法之正大筆法之端嚴焜燿山川新民觀瞻於是稱􅃎雅之兕觥効􅃎人夀君之敬而竭其忠賦魯頌之駘背保魯侯夀母之樂而遂其孝繼今鄭氏忠孝之祚日熾而日昌其兆在此也深属玄述其實謹書之下方云沁園春玄旦日先君冀郡公作此示勉敬跋于後玄子来前還憶汝今朝初度時是吾家㡬世書香閥閱我翁疇昔心地坦夷宅相伊何泛紅老子汝母慈仁有兒如今恨􅀝門人去和膽為誰丈夫七十何為􅄸三十功名已是遅要經天緯地拓開實用嘲風弄月省可虗詞我亦平生巵言徒費猶酌花向九疑團欒好待老吾泉石留汝鍾􅃔大徳丁未玄賤生之日先公祝之以沁園春玄受而蔵之第年以家貧性亦踈散房中惟有一敗篋以繩約之篋中無􅀁有又以紙外護之甚嚴暇日時復展玩明年戊申不幸先公棄􅂢自是見􅂺嗚咽殆不忍觀皇慶壬子玄免先公䘮又二年矣先公在時􅀁㝎謝氏􅀊乆不克成婚繼妣長沙郡君謀為玄畢㛰􅊚而玄方㳺湘中繼妣老妮啓玄篋取故衣浣濯􅀘紉以俟新婚老妮目不知書篋中文字亦為􅀁持去此詞亦在焉玄歸而求之竟失其􅀁遍索十􅁆日無得深自刻責以為不䏻寳蔵先人之訓遂為此生抱恨之大端毎至劬勞之日則泣而識之如是二十五年屢甞􅈼之先公兾隂相之庶㡬復見此詞以無􅀒付嘱之意延祐乙夘以来玄僥倖科第厯官中外至元元年乙亥叨恩翰林直學士國子祭酒先公贈翰林􅀡學士亞中大夫䡖車都尉追封渤海郡侯㝷􅀩奎章近臣奏請有㫖申勑詞臣製碑以賜玄感激之餘付書還家嘱舍弟信翁先白扵彌告祭之日諸昆弟子姪咸集中堂姪進老􅃍前曰昨日偶治故書得先祖手澤一紙蟫食殆半乃夀八翁沁園春也兄弟相視大驚曰此汝叔平時徧求而不得者汝何得此衆取視之果然即付書報玄京師二年丙子夏謁告南歸立碑甫抵舍姪即以詞見遺玄奉詞涕泣如隋珠和璧去而復還自計生平可喜之事未有過此嗚呼異㢤詞􅀁謂宅相伊何泛紅老子者謂外大父臨賀府判理齋李公也􅀝門人去和膽為誰者是􅀊免先夫人䘮也潮風弄月省可虚詞者玄少作頗患多故先公以實學朂之也猶酌檐花向九疑者先公分教舂􅁜時􅀅之官也雖然玄之至喜者以此詞之失而驟得則先公若有隂相之也他日或可逭伯魯授簡之責也其至懼者則以先公期待之意如彼而玄之踈文謭學􅀁成就若此其何以逭伯符不克􅀒荷之譏乎装禠既完踪跡􅀁至必携以自随三年丁丑以侍講學士召入京戊寅春以二品恩例申請夏五月進贈中奉大夫湖廣等䖏行中書省叅知政事護軍追封冀郡公先妣追封冀郡夫人六月甲申祭禮畢因出此卷再寫善本并致􅀁感云男玄泣血書于賢良坊寓舍䟦先公與南谷先生書先冀公與南谷居士未及一識族中宜翁為之求書扵安福同知王君習齋未㡬習齋去官故未及投㽞之篋笥考其􅀊月盖大徳丙午丁未間書則玄為子弟時代先公作者也至正壬午十一月玄叙族至防里俯仰􅀅四十年南谷先公即世皆乆兩家子弟覧之愴然圭齋文集卷之十四終
