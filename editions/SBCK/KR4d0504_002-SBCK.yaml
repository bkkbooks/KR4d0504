front:
  text: 圭齋文集卷之二宗孫銘鏞編集
  hash: sha256:4eba9a59c0101ecd9d13f98658949198492d7296a33c275eb90b151fcec700a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_002-1a}
body:
  text: 安成後學劉釪校正五言古詩舟次諸牐􅀉詩奉謝都水分監瑞卿監丞抱疴辭承明買舟㴑官牐袢􅁭正無悰蓬底可容納舳艫尾相衘宻次若鱗甲憶初離神京餘暑尚揮箑淹留近秋杪朝爽欲􅄈裌紆傳進元䇿走介奉一札使君適分監嬴縮制有法得書即欣然愛我踰素狎遣騶護輕舟快若厯三峽鄊心鷹脫鞲野性兕出柙昔憂阻殽澠今喜泛苕霅黄蘆間蒲稗緑藻唼鳬鴨舒懐對幽景寓目成􅀞夾公堂為展席觴客禮意治病予難却酒亦復飲盈呷吁嗟逆旅途知已元不乏相期逺大噐留詩當盟㰱感􅂐辤則長欲賦慚韻狹送振先宗丈歸祖庭并列小序于左歐公孫子多擘􅂀以為四暮年歸頴隂非無首丘志乞洪不得請由是􅈈歸計攷公生平言亦頗憾先世先世多才賢生適逢五季輻貟政分裂盡瘁扵􅀁事竟乏垂世名盖亦限地􅀔况復公少􅀌坎􅇄蜀漢裔身當混一秋代逢承平際擇里審􅀁安實迩輦轂地子孫托畿内宦轍亦云易人情􅂚免爾公豈溺聲利詎知汳􅒶移南北㝷睽異一枝先南邁司造有深意沙溪標徳里瀧岡重塋祭至今青原家十世祀不替振先吾宗英守正恥骫骳誾誾保家法䖏約不少懟嘉􅀣無由枝嘉榖無穗滯原本既不凢時需諒無棄矧今掄俊髦徃徃論根噐老夫辭冊府多病乆憔悴徒懐薦士心言莫士軒輊賦詩當推轂自愧辭巳費憧憧青雲友誰如古人誼歐陽公晚年乞守洪州累表不得請扵是歸江右之志遂不果余詩􅀁謂其居偏方熟扵歐文者䏻知之盖公之不歸廬􅁜其志深有可諒者矣南渡以後宋人多議公此事洪景盧楊廷秀之賢亦未免有此意甚者謂公子孫居頴為金人所􅆷而遂絶是大不然近年奉詔􅁱三史一日扵翰林故府中攟金人遺書得元遺山􅁉之手寫壬辰􅇎編一帙中言安平都尉完顔斜烈漢名鼎字國噐甞鎮啇州偶搜伏扵竹林中得歐公子孫甚多以歐公之故并其族屬鄊里三千餘人悉縦遣之則知未嘗殱于金兵也此好事者為之辤明矣元遺山金士領䄂生平極重歐公嘗有詩云九原如可作吾願􅀙歐陽北人至今佩服其言振先歸以似鄊先生桂􅀮劉公一觀為􅀁性姪題小景三首林廬􅌿踈煙歸㠶泊沙渚披圖得空闊總是經行䖏寒屋苑薝古踈煙野􅀣春遥遥濟川者應是此中人浦口歸㠶落沙頭行客囘林間酒旗出快着一篙来東坡恠石我懐赤壁仙此心巳穿透憶曽㩀虎豹今與鶴俱瘦七言律詩大明殿早朝扶摇萬里上青霄鳯闕龍池歩􅇍瑶駞背􅀒琛金絡索象身備駕玉逍遥衣冠俯伏傳呼嶽千羽低囘看舞韶湖海布衣瞻盛事他時田野夣天朝試院倡和仁皇下詔急求賢糠粃當時偶在前兩榜復科新大比三人聮事舊同年関山道路㝷常夣㙜閣風雲尺五天但使得材今勝昔吾儕寧復嘆華顛張子䏻詩檀士林無時無地􅂺披㝷文章咫尺不相見春興㡬多應自吟錬字直疑成白首知音有待鑄黄金何時尊酒論真訣要自康謡􅀃到今進講金華集衆賢禮闈㗸命拜君前花摧蠟炬仝清夜餅餤紅綾憶昔年龍尾歩随黄閣老鵠頭書下􅂵微天南宫群彦時相問何似官街有米顛至正羣興郡國賢威儀重見甲寅前杏園花發當三月桂􅁐香銷又七年豹隠山中文澤霧鵬搏海上翼垂天明時禮樂湏竒俊莫道儒生自聖顛相臺南是東南裴相㙜縁溪一徑踏蒼苔此日城闉少人到當時公府棄官来禪床象屋留光雨書治蛙聲噤鞠􅁅泉石至今有貴炁山靈應觧識三台至正壬午十一月十三日􅀕初祖墓早仰更秘書有佳句見勞匆勿奉酧嚴押白􅄠甘泉沗􅀙官歸来曳􅂂上吟壇故山虎豹多文采白水蛟螭有屈蟠謁客及門容􅂂滿贄文盈篋借燈看百年省墓償初志心憶先親痛苦剜青春萬木一根荄一一春工妙剪裁頋我乞歸懐穎水羡君訪隠到天台題橋肯學相如志􅊎墓慚無逸少才但喜陽剛􅀅彚進明朝緹室動葭􅁅至正壬午十一月十三日祭始遷祖墓于防里村心是日春洲先生有古律四首紀其事玄用韻奉荅道左遺􅇕三百載曽孫疊石作階基儒家冬至祭初祖客子異鄊來逺攴白髪始􅁱桑􅎚敬青編乆廢蓼莪詩無由作吏守墳墓願訪故山耘􅂵芝與公俱乏濟時具舊日相思不得過南國􅀉書川路永西樓剪燭雨聲多池邉黄鵠有人賦門外驪駒先客􅁔但得􅈋齋相伴䖏臨風遥想玉為珂陶令歸来謀作室孟郊老去乏應門政縁踈􅂴動遐思無柰過􅀙求贈言平江曲澗助盩厔􅃨嶺層巒如浩亹􅀊晚胡為滯空谷萋萋芳草怨王孫十年玉署絲綸手新把漁竿傍釣磯平生亦愛蒔蘭􅈍歸日惟知求蕨􅅔干禄郎君離綵侍投閑老子賦緇衣山中薦士書長寫弱翰猶䏻為客揮送白芒李宜忠之寧州教授廣文家住白芒原唐世忠臣閥閱存寧郡喜迎新􅀶士􅀖人特重舊王孫楊花絳帳春雲陣苔蘚丹書暮雨痕向使汾陽晞曖在應慚詩禮在名門竹澗圖青林翠巘俯江郊谷口湍流巨石㘭戞玉萬竽鳴水樂垂紳雙瀑盪雲旓風漪靜浸蒼龍影月瀬光揺􅂵鳯巢􅁔罷啇巖採芝曲兩翁翰墨㝎神交敗筆秋拈秃筆似愚慵曽為雲煙掃墨松脫頴荒凉空憶兎舊腰消瘦乆如鋒小臣奏事冠初免敗􅀅降胡甲不重老矣此心無可用少年豪氣為誰雄郊天禮成應制􅂵壇黄幄夜無風牲璧初陳月正中瑞靄霏㣲成五色神光烜赫暎重瞳千官屏息瞻天表萬國関心在聖躬清曉慶雲髙捧日簫韶前導駕還官謝㤙日呈同年把劒風􅉉日欲曛偶􅀙甲舍得髙文煙雲過目猶䏻記花栁逢春各自欣竒字擬􅀙楊執㦸俊才端属鮑叅軍客来為我傳新作筆硯無忘舊榮勲比干墓獨夫臺上醉紅裙七竅丹心豈忍聞白日已随流水沒青山猶護太師墳忠肝一片埋秋草直氣千年起暮雲我亦停􅆖薦蘋藻太行落木正紛紛接花木園丁妙手即花神換葉移枝偽脫真刀剪豈􅀎傷化力色香無復記前身春深自有鸞膠續􅀊乆行看鶴􅂰伸堪咲微生亦如此牛為馬後吕為秦壷清朝飲層氷瀹性靈夕飡秋露引􅁱齡江湖大瓠中無物海嶠方壷外有情貌示神巫機闔闢醉邀市􅁺酒芳馨何人欲作先生傳長憶寒􅉁月滿庭過洞庭二首白沙隠隠見金鰲殿閣慿虗結構牢天水渾融浮大極神人幽顯隔秋毫龍堂深閟靈栖冷象緯低垂客枕髙欲作廟堂迎送曲杜紅蘅碧盡離騷媧皇􅅮土擲虗空屹立君山面􅀔雄一畫犠圖天地骨九江鯨觀􅀑神功裾飄帝子蒼茫外樂奏鈞天澒洞中頗幸當年鄒魯客觀瀾未到楚諸熊侍宴北省臣本江南一布衣恩榮今日及寒㣲台􅅶列宿光相射湛露迎陽晝未晞仙醖飲来生羽翼宫花留得奉庭闈酒䦨車馬如流水囘望紅雲遶闕飛孫春洲夀慶堂孫母歐陽九袠登外家譜諜自廬陵髙年備養人俱羡同姓􅂛堂我未􅀎好客郎君深巷轍讀書稚子小窓燈朝廷屢賜尚方帛更待􅅆鸞織誥綾􅀉有壬許叅政京華白􅄠染塵埃喜見文􅂣閉復開自是曹叅當継相不然王式肻輕来上躬藻火慙無補衆口塩梅属有材素志已酬㱕欲早相期濁酒坐莓苔澧州謝家建通濟橋慶雲籠日護雲根玉􅀣薫薌接澧沅大􅀓功留召伯埭相君心競謝公墩已誇螮蝀綿今古猶羡封胡偉弟昆珎重盧溝溝上月随時車駟勞于門夜宿寺前農家漢南旅店已星稀􅌒宿田家帶落暉蕭寺依山聊復爾鄴侯送酒是耶非風餐并覺凉生飯露坐俄驚月在衣老子漫逰吾漫送登山臨水澹忘㱕西明道人武昌堤上水雲身三十年来識道人只為漫逰相見少故知臨别贈言頻憧憧車馬紅塵老靡靡江山白􅄠新邂逅一囬詩一首錦囊千首未為貧瀏江瀏江江水色幽幽兩岸青山雲木稠一自桑欽載源委曽留孫盛作春秋猿岫風来起波浪龍湫月出見汀洲下流兩度翠􅂠過光氣至今浮斗牛昌山昌山峽口日西斜蘭渚維舟近酒家水潄􅀣根龍露􅀲石排江㟁虎交牙路廻佛寺蔵深塢風動漁舟掃落花􅄪拜靈均獻蘋藻月明環珮下汀沙讀鐂養吾虞青城書季子胡為􅁙嬴博大公復欲返營丘匆匆塵事半萍梗徃徃異土迷松楸誰䏻樊澤為表識頼有杜羔勤訪求但當作吏守墳宅莫待暮年思逺逰早歐聴秋居士園池碧池流水緑潺潺髙下樓㙜􅂵翠間阮籍才華勝南族謝安清致滿東山標名花塢鶯事道集句桃符鹿守関灑掃園丁今白􅄠秋翁化鶴㡬時還鐂草亭詩冡朝廷采詩廢已乆公卿薦士亦罕聞坐令劉氏伯倫鍤生作唐人賈島墳光如黄壌翳明月副在青山蔵白雲米家骨朽怪事息又見廬陵老隠君排律賜經筵官酒次蘇伯􅁱韻鼇極天初􅀘娥池月已修鮮颷生廣厦清旭暎垂旒三漏聦無壅黄瞳視不流凝神思燕翼虚已納鴻猷章撤金爐灺筵􅀵玉斚浮甘泉歸歩逺大液便程優鸚鵡棲宫􅀣鵁鶄避客舟啇􅂄戔漢幣瀛儁膳唐著名軰應相語明時豈易醻徘徊西掖晚鴈影度延秋謝徳盛奉蘐堂種得忘憂草母安憂可忘葉滋金水潤花帶石雲香淑景盈東閣春暉盎北堂靈苗仁夀域晚節治平鄊世澤深培植先聲續顯􅀭才華昌後裔事業富􅀌孀沃壤根株茂慈闈鬂􅄠蒼詠􅁔傳翰􅁐雨露溢恩光圭齋文集卷之二終
