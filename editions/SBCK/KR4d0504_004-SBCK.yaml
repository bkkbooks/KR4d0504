front:
  text: 圭齋文集卷之四宗孫銘鏞編集
  hash: sha256:8982fac76d97b27461e7f213e3a95747a38c237bb4c714d015b46e80f8f7d025
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_004-1a}
body:
  text: 安成後學劉釪校正歌畊學問荅世間惟有畊與學思量二藝皆無錯畊者榮華得富豪學者羽翼生鱗角畊問學得恁賢累年累月在窓前田地抛荒園圃廢日間忘食夜忘眠學者答非容易筆頭雖小驚天地但㸔王侯􅀅相家盡是當年勤苦至學問耕得恁苦渾身􅁾汚生泥土冬月之間被雪霜春天曉暮遭風雨耕者答不辭辛鋤頭翻地出黄金但㸔世間儲積者盡是當年勤苦人畊可憐學可愛思量二藝皆懐大少年辛苦老来閑粉壁朱門多自在題四時百子圖藏藁紙弊墨渝實圭齋親筆近見他集亦有恐悮天無一日具四時人無一母生百児何人筆端巧造化人事天時俱盡之三三兩兩如魚隊日長逰戯䦨干外采蓮攀栁爭後先繞竹觀梅分向背一真未鑿萬象春誰家􅁐囿誰家人莫是越王泛􅑺嗣西湖湖上嬉芳塵當時富貴傍觀羡至今宇宙流傳遍爭如茅屋浣花溪竹根雉子無人見摩挲此圖真拊髀多憂正為多男子但須得似仲謀児人生一䕫已􅁕矣題趙菊山文肅公閱武像浚儀王孫宫錦􅂁紅鞓玉帶㻫琫刀大夫在官盛􅃣佩州􅀅按旅陳旌旄汝陽眉宇照今古五陵志氣横江濤世皇大舉獵徳網池上不遺丹鳯毛宫門承詔鑄銅馬瀛洲接武乗金鰲駸駸亳社百年乆奕奕燕㙜千仞髙題山荘􅀁蔵東坡􅀞古木圖眉山昔日生三蘇一山草木為之枯後来筆端挾春􅃾却令生意回枯株􅀣經公筆無老醜天以春工付公手誰云軰行龍眠翁奚必法嗣洋州守山荘劉氏富清玩家有蘇公舊揮翰恍驚濕蘚粘恠石慣見倒根生斷岸涪翁對此煑春茶為公梢上掛長蛇燈窓細讀假山記秀氣終属眉山家至正壬午十一月余以疾謁告南歸求毉至安成郡北之族中節判􅁇先劉君相公不逺一舍携尊爼見勞談􅁁得知為西皋趙學士之壻别次為余徴詩即席赱筆作長句併呈似王守筠溪相公及郭倅明則相公一粲徳州沃野濟岱雄池産徃徃多明公與君初見問爵里塵邉又復知冰翁冰翁西皋古君子擇壻如君信佳士故應邂逅氣味同逺来勞我扵桑梓南州初筮發新硎安成名藩駕屏星金鑾學士已頭白玉潤郎君終眼青我嘗三仕厯郡邑聴訟催科紛蝟集䏻令過客情誼洽可見􅀖侯才力及古􅈦小飲亟分手因君索詩為君夀郡中政清長貳和為我􅀉聲賢太守贈趙祥表禙浚儀公子今㡬葉装池装潢以為業道傍蒼玦猶一惜池底玄􅁅信多刼鋪張幸及時黼藻流落還同故書篋魏武子孫曹覇馬唐家宗室􅅬王蝶淳化石本墨糢糊宣和印章紅摺疊魚鱗已是善排比鷖尾猶况工剪貼但持絶藝動縉紳勿向同儕論譜牒藝文舊監慚潦倒翰墨當時勤渉獵心期知子價千金只恨無才寫蒲箑詠春閨怨東風園林花草香芳閨寂寞春晝長佳人獨守情黙黙銀床錦被閑鴛鴦終朝倦繡拈針指怕向花前聴鶯語喚回舊事千萬端杏臉蛾眉淚如雨玉郎去年辤家時緑楊紅杏嬌春暉緑楊紅杏色如舊悵望玉郎猶未歸一春魚鴈音書絶雪膚消瘦千腸結斷腸猶立㡬黄昬那更青山苦啼鴂頃見同舍柯愽士􅀁贈趙孝子歌真佳作也客以是卷繼求余言遂用柯韻作一首利津城城上烏飛向城南叢塚呼塚前無人作寒食但有􅀍􅄠哀號􅀌行人厭烏見􅀍􅄠憾欲射烏金僕姑靈烏下告􅀌児苦逺訪親骨踰重湖兒生四􅀊時父别阿㜷去􅭊老婦已孀養皃為児娶児思徃􅀙父念􅭊共燥濕今年令伯正陳情他日韓湘竟收骨江南五千里山東二百州州州旅寓有南北爾父存亡何䖏求跣行及河十趾血河風吹沙天慄烈遭逢執友向燕薊指示丘墟瀕海碣身為衛子􅄠縋鞍鞍忽堕地開親穴君不聞饒娥江頭哭父屍浮黿魚孝子精神貫今古明神降鍳寒空虗􅀶士作歌傳里閭和李溉之舞􅁎脫鞋吟宫袍繡蹙金花綺紅綃緊襯􅀟鸞尾盈盈幔服舞腰􅁿綵雲飛䖏香風起藕絲掣斷春雲鬆瑞蓮􅀟結並頭紅夭夭曲曲玉彎卷翠鳬飛去天欲軟玉階秀茁蘭笋長瓊砂迸出蘆芽淺徘徊困􅀝東風力濕砌香雲墜無跡無限嬌羞不自持君王喚起扶花立贈􅀞工􅀺仲瑾號碧山吾聞萇弘之忠裂金石精氣千年化為碧人生頼有方寸妙萬變神竒􅀙此出又聞西方􅆊僧名法􅀎􅀎令兩眼碧色晶熒熒有時时後洒墨汁纎穠踈秀皆成形碧山􅀞神欲入品表裏神光碧瞳炯浮嵐曖翠山不受盡付晴窓落泓影碧山學士今為誰玉堂茒舍各有時煩君􅄈我山下屋更看白雲相陸􅄐題子美㝷芳圖吾年三􅀊聲吾伊慈親􅂰下教杜詩如今蟫蠧三十載夣寐欲見終無期誰家山水空翠濕彷彿相逢拾遺揖金馬門前封事稀碧雞坊裏㝷春急野桃官栁春連連水流山店依平川眉尖不着杜䳌恨壷中風月開元天君乗蹇驢歩如􅁄後有驊騮追不得茅屋西風五百年虗度人問㡬春色題􅂵微老人大字歌􅂵微老人射生手挽強竟取黄金斗驃􅀐營中拜驍勇鳯凰池上􅁛􅂄舊時平腕力無􅀁施觔力猶􅀎學顔柳縦横戎畧結構休殺活兵機屈伸肘山荘劉氏得最多當日襜䄖駐應乆髙樓大扁曰明逺况有愛山并尚友我来後公五十年主人酌我樓中酒平田野水鳬鴈集重岡複嶺蛟龍赱登髙欲賦乏佳興忽覩台􅄤照窓牗家蔵有此希世珎􅂑酒當為主人夀想當洗硯弢筆時羽􅀏生風劍龍吼焉知今人正傳玩名與麒麟同不朽嶠南鼪鼯十五秋老􅀅如今安得有鄂公九原如可作養夀清啇為公奏送劉子簡之武昌學正劉侯兄弟競秀發仲氏卓犖殊可人訓徒名門示髙爽棖臬中實皆輪囷未誇于氏容駟馬豈羡楊侯朱十輪荆才非止箘簵楛燕􅒄迭見玗琪珣伯留天庠不可去仲始捧檄歸娱親滔滔南紀盛藩翰文武化行初未泯世皇八駿􅀁厯䖏扈蹕至今疑有神盤中首蓿不在飽座上芷蘭俱可紉吁嗟劉郎慎勿浪弹鋏自古江漢無窮鱗送聶以道之官武昌天暦聖人在海南南省大臣理塩筴聶君老儒幕下郎日飲清氷􅂡􅄠白是時潜邸具知聞召見殷勤親賜食明年翠華望北還復過湖南駐清蹕試舉郎君問宣閫閫臣上前盛稱􅄒省郎􅀊滿調江華回瞻馬首天南北生平固自結主知下邑惟思躬吏責志心懇惻撫􅑏􅊔宿蠧堆求剔纎悉甘棠遺愛十二碑其中一碑磨崱屴豪民􅐁水三百年力䏻挽注甦涸轍爾来㳂牒至京師廟堂除吏餘八百重瞳覽奏記姓名呼之以字頋臣列若云賈誼乆不見猶喜真卿獨先識秉鈞敷對此掄材司讞無如武昌劇天顔沈思霽色囘姑惟首肯心未擇逺臣客舍擁敗氊誰知京兆牛衣泣青天晝有風雲哮猛虎獰蛟向山澤華蕚樓頭賞蘤葑臨菑門下分竽瑟念昔部使舉政最徃徃當途多抺揊秪緣早忤耳目司豈復虗􅀩股肱力人生榮進自有期簡在淵􅂨非易得小儒作􅁔属山甫愛莫助之増太息示姪吾宗孫子多好學爭持卷軸求余詩嗟予膏馥有㡬許况復老􅂴惟其時子年弱冠氣方銳立志要與青雲期冀馬生駒汗血噐越女堕地瓊瑶姿固知美質故應爾􅀁貴論道􅂭師資牧之渉世晚自悮冬至作詩鐫阿宜初陽萌動慎培養萬木一本含春滋題曜海朝天龍玄雲霮䨴海波立神龍挺水趍天潢畫師題筆聣八極意與元氣爭毫芒玉京僊聖驂翶翔雜􅀐麒麟與鳯凰龍拖雲氣歸洞府海日杲杲天中央道呉山道呉山頭目龍卧疊嶂重崗深􅂵邏靈湫瀑布千丈長古寺神杉十圍大崇祠坎坎風雨来樵徑丁丁鴻鴈過郡人夜望北斗魁下有突兀青蓮座大圍山大圍山髙髙㡬許絶頂嵯峨戴林塢石間花開自夏春地爐僧擁無寒暑清流白鷴滌毛距緑􅀣黄熊引筯膂山腰日午嬰兒啼知有雷公出行雨奉􅃙題明皇馬明皇八駿爭馳道知是開元是天寳當時一顧傾國姿萬里君王蜀中老奎章閣下文書静衮衣髙拱唐虞盛此圖一出非偶然要與明時作􅀛鏡雜體􅠥之坰古樂府有序至正壬午皇帝有􅃙賜故和寧忠憲王勲徳碑命翰林學士玄爲文碑立􅠥門近郊戴螭􅂂􅀛􅀛有異瑞首如繪􅁕如玉搢紳賦詩紀異玄作􅠥之坰一首􅠥之坰穹碑銘銘維何誄和寧維和寧勲􅀭庭臣玄詞帝者荓倕􅅣石石効靈靈何居傴句形顒之文旋瀅濙絡鼻口逹厥䫤疋之晳色晶熒馬䣛武騵腹駉嗟彼蔡象應靈國守噐列前廷王之忠格髙􅄀珉之瑞天使令發幽光炳丹青王有子承徳馨决大疑陳大經疇五福詒千齡作傴句寳􅀛名漁家傲南詞并序余讀歐公李大尉席上作十二月漁家傲皷子詞王荆公亟稱賞之心服其盛麗生平思彷彿一言不可得近年􅀼官于朝乆客輦下毎欲倣此作十二闋以道京師兩城人物之富四時節令之華他日歸農或可資閒暇也至順壬申二月玄􅁱大典既畢經營南歸属春雪連日無事出門晚寒附火私念及此夜漏􅁆􅈓腹藁具成枕上不􅄰稍諧叶之明日筆之扵簡雖乏工緻然數􅀊之中耳目之􅀁聞見情性之􅀁感發者無不􅕍括㮣見扵斯至扵國家之典故乗輿之興居與夫盛代之服食噐用神京之風俗方言以及四方賓客宦㳺之况味山林之士未嘗至京師者欲有􅀁考焉此亦可見其大畧矣正月都城寒料峭除非上􅁐春光到元日班行相見了朝回早闕前褫帕歡相抱漢女姝娥金搭腦國人􅁎侍金貂帽綉轂雕鞍来徃閙閑馳驟拜年􅀡過燒燈後二月都城春動野引龍􅁅向銀床􅀞士女城西爭買架看馳馬官家迎佛官蘭若水暖天鵝紛欲下鷹房奏獵催車駕却道海青逢燕怕􅅻過社柳林飛放相􅀅罷三月都城逰賞競宫墻官栁青相暎十一門頭車馬並清明近豪家寒具金盤飣墦祭留連芳草逕歸来夙送梨花信向晚輕寒􅄈酒病春煙􅉂深深院落秋千逈四月都城氷碗凍含桃初薦瑛盤貢南寺新開羅漢洞伊蒲供楊花滿院鶯聲弄􅀊幸上京車駕動近臣凖備鑾輿􅀙建徳門前飛玉鞚爭持送葡萄馬乳歸銀甕五月都城猶衣裌端陽蒲酒新開臈月傍西山青一搯荷花夾西湖近􅀊過苕霅血色金羅輕汗搨宫中畫扇傅油法雪腕綵絲紅玉甲􅄈香鴨凉糕時􅀱秋生榻六月都城偏晝永轆轤聲動浮􅀲井海上紅樓欹扇影河朔飲碧蓮花肺槐芽瀋緑髩親王初守省乗輿去後嚴廵警大液池心波萬頃間芳景掃宫人户撈漁艇七月都城爭乞巧荷花旖旎新棚笟龍䄂嬌民兒女狡偏相攪穿針月下濃粧佼碧玉蓮房和柄抝晡時飲酒醒時夘淋罷麻稭秋雨飽新凉稍夜燈呌買鷄頭炒八月都城新過鴈西風偏觧驚㳺宦十載辤家衣線綻清宵半家家擣練砧聲亂等待中秋明月翫客中只作家中看秋草墻頭螢火爛踈鐘㫁中心䑓畔流河漢九月都城秋日亢馬頭白露迎朝爽曽上西山觀蒼莾川原廣千林紅葉同春賞一本黄花金十繦富家菊譜籖銀榜龍虎臺前駝皷響擎仙掌千官􅀲菓迎鸞仗十月都人家百蓄霜松雪韮氷蘆菔暖炕煤爐香豆熟燔獐鹿髙昌家賽羊頭福貂䄂豹祛銀䑕襮羙人来徃氊車續花户油窓通曉旭回寒燠梅花一夜開金屋十一月都人居暖閣呉中雪紙明如堊錦帳豪家深夜酌金鷄喔東家撤雪西家噱纎指柔長宫線弱陽囘九九官氷鑿盡道今冬氷不薄都人樂官家喜愛新年朔十二月都人供暖箑宫中障面霜風獵甲弟蔵鈎環侍妾紅䄂咲􅁔聲送金蕉葉倦客玉堂寒正怯曉洮金井冰生鬛凍合竈瓢餳一楪呉霜鑷換年􅂴寫冝春帖圭齋文集卷之四終
