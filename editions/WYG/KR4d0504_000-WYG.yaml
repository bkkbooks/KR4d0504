  text: 欽定四庫全書集部五
  hash: sha256:91d391b03400458fe4b5406ed6606e69862a8e4f767c40fe8478f37cc3ae4e00
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_WYG_000-1a, image: WYG1210/WYG1210-0001a.png}
body:
  text: 圭齋集别集類四元提要臣等謹按圭齋集十五卷元歐陽元撰元有拯荒事畧已著録元早以文名平生三任成均兩為祭酒六入翰林三拜承㫖凡朝廷髙文典冊多出於其手掲傒斯作元集序稱有曰詩流者三卷曰鈆中者十卷曰驅烟者十五卷曰強學者十卷曰述直者三卷其門人王師模所編明宋濓序則謂原集一百餘冊皆燬於兵惟存辛夘至丁酉七年之作二十四卷其孫祐持編錄之此本詩賦四卷文十一卷附録一卷題宗孫銘鏞編集又非祐持之舊矣孔齊至正直記曰歐陽元作文必詢其實事而書未嘗代世俗誇誕時人謂文法不及虞集掲傒斯黄溍而事實不妄則過之然宋濓稱其文如雷電恍惚雨雹交下可怖可愕及乎雲散雨止長空萬里一碧如洗實亦未減于三人也虞集道園學古錄有送元謁告還瀏陽詩曰憶昔先君早識賢手封製作動成編交游有道真三益翰墨同朝又十年葢集父教授于潭州見元文大驚手封一帙寄集曰他日當與汝並駕齊驅故集詩云然然則元發軔之初聲價已與集相亞矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五圭齋文集目録别集類四元卷一賦頌卷二五言古詩七言律詩排律卷三七言絶句卷四歌雜體卷五記卷六記卷七序卷八序卷九神道碑碑文卷十墓碑銘卷十一阡表哀詞卷十二經疑書義策卷十三詔表冊文銘説卷十四題跋卷十五贊疏書啟祝告文卷十六附録歐陽公文集原序文辭與政化相為流通上而朝廷下而臣庶皆資之以達務是故祭饗郊廟則有祠祝播告寰宇則有詔令胙土分茅則有冊命陳師鞠旅則有誓戒諫諍陳情則有章疏紀功燿徳則有銘頌吟詠鼓舞則有詩騷所以著其典章之懿叙其聲名之實制其事為之變發其性情之正闔闢化原推拓政本盖有不疾而速不行而至者矣然必生於光嶽氣完之時通乎天人精㣲之藴窮乎厯代盛衰之故洞乎萬物榮悴之情覈乎鬼神幽明之賾貫乎華夷離合之由舉其大也則極乎天地語其小也則入夫芒秒而後聚其精魄形諸篇翰渢渢乎泱泱乎誠不可尚已世有與於斯者其惟大司徒楚國歐陽文公乎公諱𤣥字原功潭之瀏陽人其先家廬陵與文忠公修同出於安福令萬之後公幼岐嶷十嵗能屬文逮弱冠下帷數年人莫見其面經史百家靡不研究伊洛諸儒源委尤為淹貫遂擢延祐乙卯進士第厯官四十餘年在朝之日殆四之三三任成均而兩為祭酒六入翰林而三拜承㫖盖當四海混一之時文物方盛纂修實録大典三史皆大制作兩知貢舉及讀卷官凡宗廟朝廷雄文大冊頒示萬方制詔多出公手金繒上尊之賜幾無虚嵗海内名山大川釋老之宫王公墓隧之碑得公文辭以為榮片言隻字流傳人間咸知寶愛文學徳行卓然名世羽儀斯文黼黻治具公之功為最多君子評公之文意雄而辭贍如黑雲四興雷電恍惚而雨雹颯然交下可怖可愕及其雲散雨止長空萬里一碧如洗可謂竒偉不凡者矣非見道篤而擇理精其能致然乎嗚呼自宋迨元三四百年之間文忠公以斯道倡之於其先天下學士翕然而宗之今我文公復倡之於其後天下學士復翕然而宗之雙璧相望照耀兩間何歐陽氏一宗之多賢也不亦盛哉初虞文靖公集助教成均其父井齋先生汲方教授于潭見公文大驚手封一帙寄文靖謂公他日必與之並駕齊驅由是文靖薦公升朝聲譽赫赫然相埒卒符於井齋之言文靖之文已盛行公薨二十四年其孫佑持持公集二十四卷來謂濂曰先文公之文自擢第以來多至一百餘冊藏于瀏陽里第皆燬于兵此則在燕所録自辛夘至丁酉七年之間作爾間有見於金石者隨附入之子幸為文叙之以傳濂也不敏自丱角時即知誦公之文屢欲裹糧相從而不可得公嘗見濂所著潛溪集不賜鄙夷輒冠以雄文所以期待者甚至第以志念荒落學識迂疎不足副公之望况敢冒昧而序其文哉雖然公文之在霄壤中上則為徳星為慶雲下則為朱草為醴泉光景常新而精神無虧亘萬古猶一日序之與否尚何暇論哉佑持字公輔問學精該論議英發無愧於家學者也金華宋濂撰歐陽先生集序歐陽先生集曰詩流者三卷曰鈆中者十卷曰驅煙者十五卷曰强學者十卷曰述直者三卷曰脞語者三卷其門人王師模所輯也所輯者止此作而未已者不止此先生於書無不讀其為文豐蔚而不繁精宻而不晦者有典有則可諷可誦無南方啁哳之音無朔土暴悍之氣惜棄在草野不得與典謨訓誥之述作以黼黻皇度然文闗於世教斯可傳矣不繋其人之隠顯學貴於知道知道斯可法矣不繋其書之繁浩先生之可傳可法者固有在矣余獨恨不登先生之堂從諸生之後而請益焉因王君請為集叙姑書以識予嚮慕之意後至元六年冬十有一月朔掲傒斯序欽定四庫全書
