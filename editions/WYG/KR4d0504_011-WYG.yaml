body:
  text: 圭齋文集卷十一元歐陽𤣥撰阡表哀辭安成劉氏儒行阡表至正甲申安成劉君粹衷以翰林應奉為後宋局脩史官未病前一月述其先世梗槩凡𦵏于里之儒行郷者㡬所總名之曰儒行阡謁余表之余諾其請矣粹衷未㡬病作又未㡬疾甚遣其子都来趣余為阡表余有所不忍也已而果卒哭之盡哀而告之曰古人有挂劎之義儒行阡之表余諾君請矣余忍有愧扵古人乎越二年丙戌春余将南歸乃表之曰安成在漢屬長沙國定王發子孫衆多今安成鐂氏獨多扵他所盖其後然安成之鐂亦有兩支焉其一曰南陽太守遐之裔遐魏元陽壻也考遐之先亦漢宗室粹衷性質直叙其先世起自五世直卿府君迄扵父龍泉府君行實有可考者書之其不可考者則亦􅇅之而已矣直卿府君諱諤娶彭氏沒合𦵏小唐之原子雄材字子厚生淳熈壬寅殁㬌定壬戌祔於先塋之東南娶李氏𦵏雙牌嶺繼王氏祔子厚墓右生三子長炳字季文殁于至元乙酉祔祖塋之左次煗􅂱皆無後季文生三子長應龍娶趙氏殁同祔李孺人墓側次祐孫娶鍾氏合𦵏由慈灣次承翁字徳甫王氏出也累監吉水泰和呉城南康等稅生於宋淳祐壬子六月殁扵大徳壬寅四月祔祐孫之塋娶穰氏生景定庚申之十一月殁大厯之九月祔王孺人墓右子輝字眀卿生至元辛巳沒至治壬戌以子貴贈承事郎龍泉縣尹𦵏里之稼木塘娶陽氏封宜人子性即粹衷孫一人曰都此其自叙若此五世皆業儒其郷又以儒行著名阡曰儒行誰曰不宜大夫士惜之者曰劉氏數世力學至粹衷始有禄爵于朝以粹衷之才使得中夀其所就豈可量哉余則曰天下之事惟不足故有餘日行一日不及天者一度月行一日不及天者十三度有竒是不足也積其不足乃有餘分及有置閏則氣朔分齊而成功矣天且如是而况於人乎人謂之不足則鐂氏之有餘慶者庶乎在此粹衷有學識能詞章會試御試皆第二在南士中實第一名為旌徳縣尹亷眀有威政化大行遷應奉翰林文字儒林郎同知制誥兼脩國史院編修官其與修宋史大惬士論余庚午科考試南宫實余所得士有斯文之契故為之表云蕭同善哀辭人貴有後兮子貴為男男固可尚兮子職曷堪生而懸弧兮西東北南終老䣛下兮壮志斯慚違親從禄兮孰爲㫖甘榮與養俱兮此樂孔耽求備造物兮十無二三一或觖望兮終身之嗛隠君有子兮詩禮是撢更習律令兮讀例與凡夘以儒薦兮辰抱憤慘泝瞻隠君兮宰木既嶄幸哉有母兮華髮滿鬖兒服楚楚兮懐母擔擔燕碪十霜兮吳桑㡬蠶縮戍望更兮匪進之貪生可為養兮逝恩其覃嵗月不貸兮枯魚之御吁嗟隠君兮聲流渢渢孝則愚史兮夀非彭􅆅遭世仛傺兮脫身戈釤負毋遁逃兮賊鋒以戒荒流血漸腓兮惟脢之咸創巨雖逺兮永䘏之函掾語反是兮煩憂如惔泰山有雲兮起乎嵓嵓膚寸裁合兮八翼可曇維此下洳兮氣升江潭將族而雨兮風醨其醰思溉根本兮澤茀及􅆂感彼何易兮順如馳颿此進獨難兮右跣履巉所處實異兮命疇吊讒擔志不渝兮眀神允監税為哀詞兮視此幽劖圭齋文集卷十一
