body:
  text: 圭齋集别集類四元提要臣等謹按圭齋集十五卷元歐陽元撰元有拯荒事畧已著録元早以文名平生三任成均兩為祭酒六入翰林三拜承㫖凡朝廷髙文典冊多出於其手掲傒斯作元集序稱有曰詩流者三卷曰鈆中者十卷曰驅烟者十五卷曰強學者十卷曰述直者三卷其門人王師模所編明宋濓序則謂原集一百餘冊皆燬於兵惟存辛夘至丁酉七年之作二十四卷其孫祐持編錄之此本詩賦四卷文十一卷附録一卷題宗孫銘鏞編集又非祐持之舊矣孔齊至正直記曰歐陽元作文必詢其實事而書未嘗代世俗誇誕時人謂文法不及虞集掲傒斯黄溍而事實不妄則過之然宋濓稱其文如雷電恍惚雨雹交下可怖可愕及乎雲散雨止長空萬里一碧如洗實亦未減于三人也虞集道園學古錄有送元謁告還瀏陽詩曰憶昔先君早識賢手封製作動成編交游有道真三益翰墨同朝又十年葢集父教授于潭州見元文大驚手封一帙寄集曰他日當與汝並駕齊驅故集詩云然然則元發軔之初聲價已與集相亞矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五圭齋文集目録别集類四元卷一賦頌卷二五言古詩七言律詩排律卷三七言絶句卷四歌雜體卷五記卷六記卷七序卷八序卷九神道碑碑文卷十墓碑銘卷十一阡表哀詞卷十二經疑書義策卷十三詔表冊文銘説卷十四題跋卷十五贊疏書啟祝告文卷十六附録歐陽公文集原序文辭與政化相為流通上而朝廷下而臣庶皆資之以達務是故祭饗郊廟則有祠祝播告寰宇則有詔令胙土分茅則有冊命陳師鞠旅則有誓戒諫諍陳情則有章疏紀功燿徳則有銘頌吟詠鼓舞則有詩騷所以著其典章之懿叙其聲名之實制其事為之變發其性情之正闔闢化原推拓政本盖有不疾而速不行而至者矣然必生於光嶽氣完之時通乎天人精㣲之藴窮乎厯代盛衰之故洞乎萬物榮悴之情覈乎鬼神幽明之賾貫乎華夷離合之由舉其大也則極乎天地語其小也則入夫芒秒而後聚其精魄形諸篇翰渢渢乎泱泱乎誠不可尚已世有與於斯者其惟大司徒楚國歐陽文公乎公諱𤣥字原功潭之瀏陽人其先家廬陵與文忠公修同出於安福令萬之後公幼岐嶷十嵗能屬文逮弱冠下帷數年人莫見其面經史百家靡不研究伊洛諸儒源委尤為淹貫遂擢延祐乙卯進士第厯官四十餘年在朝之日殆四之三三任成均而兩為祭酒六入翰林而三拜承㫖盖當四海混一之時文物方盛纂修實録大典三史皆大制作兩知貢舉及讀卷官凡宗廟朝廷雄文大冊頒示萬方制詔多出公手金繒上尊之賜幾無虚嵗海内名山大川釋老之宫王公墓隧之碑得公文辭以為榮片言隻字流傳人間咸知寶愛文學徳行卓然名世羽儀斯文黼黻治具公之功為最多君子評公之文意雄而辭贍如黑雲四興雷電恍惚而雨雹颯然交下可怖可愕及其雲散雨止長空萬里一碧如洗可謂竒偉不凡者矣非見道篤而擇理精其能致然乎嗚呼自宋迨元三四百年之間文忠公以斯道倡之於其先天下學士翕然而宗之今我文公復倡之於其後天下學士復翕然而宗之雙璧相望照耀兩間何歐陽氏一宗之多賢也不亦盛哉初虞文靖公集助教成均其父井齋先生汲方教授于潭見公文大驚手封一帙寄文靖謂公他日必與之並駕齊驅由是文靖薦公升朝聲譽赫赫然相埒卒符於井齋之言文靖之文已盛行公薨二十四年其孫佑持持公集二十四卷來謂濂曰先文公之文自擢第以來多至一百餘冊藏于瀏陽里第皆燬于兵此則在燕所録自辛夘至丁酉七年之間作爾間有見於金石者隨附入之子幸為文叙之以傳濂也不敏自丱角時即知誦公之文屢欲裹糧相從而不可得公嘗見濂所著潛溪集不賜鄙夷輒冠以雄文所以期待者甚至第以志念荒落學識迂疎不足副公之望况敢冒昧而序其文哉雖然公文之在霄壤中上則為徳星為慶雲下則為朱草為醴泉光景常新而精神無虧亘萬古猶一日序之與否尚何暇論哉佑持字公輔問學精該論議英發無愧於家學者也金華宋濂撰歐陽先生集序歐陽先生集曰詩流者三卷曰鈆中者十卷曰驅煙者十五卷曰强學者十卷曰述直者三卷曰脞語者三卷其門人王師模所輯也所輯者止此作而未已者不止此先生於書無不讀其為文豐蔚而不繁精宻而不晦者有典有則可諷可誦無南方啁哳之音無朔土暴悍之氣惜棄在草野不得與典謨訓誥之述作以黼黻皇度然文闗於世教斯可傳矣不繋其人之隠顯學貴於知道知道斯可法矣不繋其書之繁浩先生之可傳可法者固有在矣余獨恨不登先生之堂從諸生之後而請益焉因王君請為集叙姑書以識予嚮慕之意後至元六年冬十有一月朔掲傒斯序欽定四庫全書圭齋文集卷一元歐陽𤣥撰賦天馬賦翳房星之委精鍾天馬之權竒澡神質於渥洼砥勁氣於月氐貞非坤牝健本乾為上分扶輿之秀下孕蜿蟺之漦風雲資其格力雨露澤其光儀膺廣鳳臆鬛秀龍鬐首昂渴烏之勢影捷杜矢之馳於是陋騊駼之産邁麒麟之姿驂六飛於廣漠舞九奏於希夷若乃朝刷崑崙夕秣𤣥圃駕緱笙之子晉道霞觴於王母風冉冉兮斯征靈繽繽兮來宁覽熙世之徳輝屬萬物之欣覩願陪禁衛自獻西土乃命栘中戒造父釋雲幕於金鞍暎孚尹於瓊户出則鏘和鸞驂輿組媚日馭之光華展天衢之步武然其氣質不可求之驪黄之餘其芻秣不可畀之皁櫪之伍峙玉山之殖未足供其齕委金臺之貲未足議其估是知天馬固難得而不易畜也所以罕見於盛時僅聞於前古時則有倣鄒枚請賡樂府而客或難之曰時方歌鹿鳴之章子乃為天馬之賦得無馳駕鼓車者寧不與此而迥殊也哉嗟夫寶不自貴以人而貴物不自異以人而異方神駒絢綵於水涯固期駑劣之同滯至其裂砮矢而庭實竟乃自齒於天駟信物美而無所遺兮亦竒才之能自致負鹽車而上太行者慨未遇夫伯樂伏皁櫪而志千里者又何慙乎老驥振長鬛而一嘶兮冀識余之所意􅅽埃風而上征兮願借翠雲以為鞁隨飛龍而上下兮羗先路其焉避彼豈乘虚而騰踏兮追雲逐電之可冀也庶幾求之𤣥黄之外兮則亦駿骨之可市也辟雍賦皇風清寧人文盛開京師崇天下之本國學萃天下之才粤若稽古爰自蒼姬始號辟雍昉厯代聲名之盛本大射行禮之宫其規剏於文武其度講於周公節觀者於四面壅流水以環中若乃道閫邃嚴義闥軒朗澄源止而不泥文瀾溢而不蕩肉好適半如璧之象兹乃辟雍之初所以名狀也或在靈臺或在鎬京靈臺者為文王所建鎬京者為武王所營兹乃辟雍之初非一地而同一名也或習射兮觀徳或養老兮興孝滙九有之俊髦軌萬方之則效兹乃辟雍之初非一事而同一教也迹其建侯設鵠矩袷圓冠襄尺講事君之敬剡注視立已之端斯則辟雍之習射天下之盛觀鮐背鶴髪尊傅隆師祝噎以膳授几以咨斯則辟雍之養老天下之盛儀誾誾啾啾泮奐夷猶覽上國之光華踵賢關之雋游斯則辟雍之養士天下之名流有客聞之曰子於成周之制講之詳矣於異代亦有所徵乎泝觀炎劉治盛中世臨雍再拜化及四裔要荒萬里就學遣質鼓篋圜橋以億萬計于斯時也辟雍亦可謂盛矣愚曰未然子徒慕先漢之遺風若未覩今日之文治我國家聲教之所暨也東踰若木之日津西探崦嵫之月竁南窮火維之陬北際氷天之澨文軌之治既同弦誦之風四被視寰海為一辟雍陶同宇為一庠序於是在天則應璧府圖書之祥在地則產孔廟金芝之瑞藏曲阜之特祠實飛龍之首嵗乃擇成均之師申胄監之制三年而科詔頒文治煟日星乎曠世之條風霆乎多士之氣將見自今以始彼漢之億萬尚敢與今日同年而語哉大抵惟聖人能盡君師之職惟吾道能並天地而存惟養賢為籲俊尊帝之大務惟建學為化民成俗之大原睠此辟雍屹乎本根固願為今日之賦者續古之頌被之和聲叶之永言前以光八百年之成周後以開萬億載之皇元義門賦并序宣文閣授經郎鄭君浚常以其家乘示余曰浦江鄭氏義門文録歴覽諸作盖彬彬焉他日謁予一言為作義門賦辭曰翳伯僑之裔孫兮紛振振其好修承世媺之蟬嫣兮寧隠耀而發幽循義路以允蹈兮擇仁里而相攸被芳潔以為服兮襲温良以為裘將孝弟以為車兮方敬讓以為舟厯九世而共㸑兮壹乃心之休休曰五倫之於日用兮實有生之大猷父慈愛之恂恂兮子色養之油油若君臣朋友之際兮必忠信之與謀於睦婣其有惠兮在任䘏其有賙閫儀雍雍以賔退兮家政凛凛其陽秋長者施其令則兮少者孝乎順柔珪赴弟以瘐死兮綺代親而自囚史何感乎緹縈兮詩何嘆乎原隰之裒嗟髙風之卓絶兮履艱貞乎何尤爰孜孜於稽古兮悉聖訓之是蒐陳時祀之秩秩兮戴首弁之俅俅述五禮以為儀兮樂至和而不流以予觀於往昔兮將公藝之可儔我歐公之史五季兮書旌表之法周門築壝以綽楔兮柱雙立而烏頭雪霜貿貿於當世兮松栢岑蔚乎故丘矧皇元巍巍乎有天下兮化丕冒於海陬敦懿行於四國兮播令聞其若郵聞孫起家而交辟兮列相第之前籌尋重席於官庠兮徹聲華於冕旒信積善之有報兮宻邇寵光之綢繆也墨梅賦伊江梅之受命泊與澹其相遭灼天地之太素亂水雲兮齊髙方三冬之搖落索群木於秋毫怳迴溪與轉嶺發孤暎於蓬蒿枝苔封以瑩寒蕋玉切而華膏表萬有以獨聖誰與子兮同袍何佳人兮黯然阻煙霧於林皋豈皎潔之冒汙抑輝光之在韜彼翰墨之託寄亦何異乎風騷撫尺素而太息心臨逺而忉忉何以慰兮空谷瀉樽中之濁醪感外物之變化謹内志之持操物交物以不染我與我而焉勞世不辨兮奚尤已或戾兮焉逃與昭質之自虧從見笑於繁桃於兹花其何有懼天下之滔滔奚附意於守墨以傳誨於兒曹頌至正二年壬午七月十八日丁亥皇帝御慈仁殿拂郎國進天馬二十一日庚寅自龍光殿勅周郎貌以為圖二十三日壬辰以圖進翰林學士承㫖庫庫傳㫖命傒斯為之賛臣惟漢武帝發兵二十萬僅得大宛馬數匹今不煩一兵而天馬至皆皇上文治之化所及臣雖駑劣敢不拜手稽首而獻頌曰天子仁聖萬國歸天馬來自西方西𤣥雲被身兩玉蹄髙踰五尺修倍之七渡海洋身若飛海若左右雷霆隨天子曉御慈仁殿西風忽來天馬見龍首鳳臆目飛電不用漢兵二十萬有徳自歸四海羨天馬來時庶昇平天子仁壽萬國清臣願作詩萬國聽圭齋文集卷一欽定四庫全書圭齋文集卷二元歐陽𤣥撰五言古詩舟次諸牐寄詩奉謝都水分監瑞卿監丞抱疴辭承明買舟㴑官牐袢襟正無悰蓬底可容納舳艫尾相衘宻次若鱗甲憶初離神京餘暑尚揮箑淹留近秋杪朝爽欲添裌紆傳進元䇿走介奉一札使君適分監嬴縮制有法得書即欣然愛我踰素狎遣騶䕶輕舟快若厯三峽鄉心鷹脫鞲野性兕出柙昔憂阻殽澠今喜泛苕霅黄蘆間蒲稗綠藻唼鳬鴨舒懷對幽景寓目成畫夾公堂為展席觴客禮意洽病予難却酒亦復飲盈呷吁嗟逆旅途知己元不乏相期逺大器留詩當盟歃感篆辭則長欲賦慚韻狹送振先宗丈歸祖庭并列小序于左歐公孫子多擘𣲖以為四暮年歸頴陰非無首丘志乞洪不得請由是懈歸計攷公生平言亦頗憾先世先世多才賢生適逢五季輻員政分裂盡瘁於所事竟乏垂世名盖亦限地勢况復公少孤坎􅇄蜀漢裔身當混一秋代逢承平際擇里審所安實邇輦轂地子孫托畿内宦轍亦云易人情曷免爾公豈溺聲利詎知汳􅒶移南北尋暌異一枝先南邁司造有深意沙溪標徳里瀧岡重塋祭至今青原家十世祀不替振先吾宗英守正恥骫骳誾誾保家法處約不少懟嘉樹無由枝嘉穀無穗滯原本既不凡時需諒無棄矧今掄俊髦往往論根器老夫辭冊府多病乆憔悴徒懷薦士心言莫士軒輊賦詩當推轂自愧辭已費憧憧青雲友誰如古人誼歐陽公晚年乞守洪州累表不得請於是歸江右之志遂不果余詩所謂其居偏方熟於歐文者能知之盖公之不歸廬陵其志深有可諒者矣南渡以後宋人多議公此事洪景盧楊廷秀之賢亦未免有此意甚者謂公子孫居頴為金人所戕而遂絶是大不然近年奉詔修三史一日於翰林故府中攟金人遺書得元遺山裕之手寫壬辰襍編一帙中言安平都尉完顔色埓漢名鼎字國器嘗鎮商州偶搜伏於竹林中得歐公子孫甚多以歐公之故并其族屬鄉里三千餘人悉縱遣之則知未嘗殱于金兵也此好事者為之辭明矣元遺山金士領袖生平極重歐公嘗有詩云九原如可作吾願從歐陽北人至今佩服其言振先歸以似鄉先生桂隠劉公一觀為所性姪題小景三首林廬澹踈煙歸帆泊沙渚披圖得空闊總是經行處寒屋茒簷古踈煙野樹春遙遙濟川者應是此中人浦口歸帆落沙頭行客回林間酒旗出快著一篙來東坡恠石我懷赤壁仙此心已穿透憶曾據虎豹今與鶴俱瘦七言律詩大明殿早朝扶搖萬里上青霄鳳闕龍池步步瑤駞背負琛金絡索象身備駕玉逍遙衣冠俯伏傳呼嶽干羽低回看舞韶湖海布衣瞻盛事他時田野夢天朝試院倡和仁皇下詔急求賢糠粃當時偶在前兩榜復科新大比三人聯事舊同年闗山道路尋常夢臺閣風雲尺五天但使得材今勝昔吾儕寧復嘆華顛張子能詩擅士林無時無地輙披尋文章咫尺不相見春興幾多應自吟鍊字直疑成白首知音有待鑄黄金何時尊酒論真訣要自康謠說到今進講金華集衆賢禮闈啣命拜君前花摧蠟炬仝清夜餅餤紅綾憶昔年龍尾步隨黄閣老鵠頭書下紫㣲天南宫群彦時相問何似官街有米顛至正羣興郡國賢威儀重見甲寅前杏園花發當三月桂苑香銷又七年豹隠山中文澤霧鵬摶海上翼垂天明時禮樂須竒俊莫道儒生自聖顛相臺負郭東南裴相臺縁溪一徑踏蒼苔此日城闉少人到當時公府棄官來禪床象屋留光雨書沼蛙聲噤鞠灰泉石至今有貴炁山靈應解識三台至正壬午十一月十三日祭初祖墓早仰更秘書有佳句見勞匆匆奉酧嚴押白髪甘泉沗從官歸來曳履上吟壇故山虎豹多文采白水蛟螭有屈蟠謁客及門容履滿贄文盈篋借燈看百年省墓償初志心憶先親痛苦剜青春萬木一根荄一一春工妙剪裁顧我乞歸懷頴水羨君訪隠到天台題橋肯學相如志誓墓慚無逸少才但喜陽剛將彚進明朝緹室動葭灰至正壬午十一月十三日祭始遷祖墓于防里村心是日春洲先生有古律四首紀其事𤣥用韻奉答道左遺墟三百載曾孫疊石作階基儒家冬至祭初祖客子異鄉來逺支白髪始修桑梓敬青編乆廢蓼莪詩無由作吏守墳墓願訪故山耘紫芝與公俱乏濟時具舊日相思不得過南國寄書川路永西樓剪燭雨聲多池邊黄鵠有人賦門外驪駒先客歌但得茒齋相伴處臨風遙想玉為珂陶令歸來誰作室孟郊老去乏應門政縁踈懶動遐思無奈過從求贈言平江曲澗助盩厔複嶺層巒如浩亹嵗晚胡為滯空谷萋萋芳草怨王孫十年玉署絲綸手新把漁竿傍釣磯平生亦愛蒔蘭蕙歸日惟知求蕨薇干禄郎君離綵侍投閑老子賦緇衣山中薦士書長寫弱翰猶能為客揮送白芒李宜忠之寧州教授廣文家住白芒原唐世忠臣閥閱存寧郡喜迎新博士䢴人特重舊王孫楊花絳帳春雲陣苔蘚丹書暮雨痕向使汾陽晞曖在應慚詩禮在名門竹澗圖青林翠巘俯江郊谷口湍流巨石㘭戞玉萬竿鳴水樂垂紳雙瀑盪雲旓風漪静浸蒼龍影月瀬光搖紫鳳巢歌罷商巖採芝曲兩翁翰墨定神交敗筆秋拈禿筆似愚慵曾為雲煙掃墨松脫頴荒涼空憶兎舊腰消瘦乆如蜂小臣奏事冠初免敗將摩旗甲不重老矣此心無可用少年豪氣為誰雄郊天禮成應制紫壇黄幄夜無風牲璧初陳月正中瑞靄霏㣲成五色神光烜赫暎重瞳千官屏息瞻天表萬國關心在聖躬清曉慶雲髙捧日簫韶前導駕還宫謝恩日呈同年把劒風簷日欲曛偶從甲舍得髙文煙雲過目猶能記花栁逢春各自欣竒字擬從楊執㦸俊才端屬鮑㕘軍客來為我傳新作筆硯無忘舊筞勲比干墓獨夫臺上醉紅裙七竅丹心豈忍聞白日已隨流水沒青山猶䕶太師墳忠肝一片埋秋草直氣千年起暮雲我亦停驂薦蘋藻太行落木正紛紛接花木園丁妙手即花神換葉移枝偽脫真刀剪豈能傷化力色香無復記前身春深自有鸞膠續嵗乆行看鶴膝伸堪笑㣲生亦如此牛為馬後吕為秦壺清朝飲層氷瀹性靈夕飡秋露引修齡江湖大瓠中無物海嶠方壺外有情貌示神巫機闔闢醉邀市掾酒芳馨何人欲作先生傳長憶寒葅月滿庭過洞庭二首白沙隠隠見金鰲殿閣憑虚結構牢天水渾融浮大極神人幽顯隔秋毫龍堂深閟靈栖冷象緯低垂客枕髙欲作廟堂迎送曲杜紅蘅碧盡離騷媧皇摶土擲虚空屹立君山面勢雄一畫犠圖天地骨九江鯨觀鬼神功裾飄帝子蒼茫外樂奏鈞天澒洞中頗幸當年鄒魯客觀瀾未到楚諸熊侍宴北省臣本江南一布衣恩榮今日及寒㣲台纏列宿光相射湛露迎陽晝未晞仙醖飲來生羽翼宫花留得奉庭闈酒闌車馬如流水回望紅雲遶闕飛孫春洲壽慶堂孫母歐陽九袠登外家譜諜自廬陵髙年備養人俱羨同姓升堂我未能好客郎君深巷轍讀書稚子小窓燈朝廷屢賜尚方帛更待迴鸞織誥綾寄有壬許㕘政京華白髪染塵埃喜見文場閉復開自是曹㕘當繼相不然王式肻輕來上躬藻火慙無補衆口鹽梅屬有材素志已酬歸欲早相期濁酒坐莓苔澧州謝家建通濟橋慶雲籠日䕶雲根玉樹薰薌接澧沅太傅功留召伯埭相君心競謝公墩已誇螮蝀綿今古猶羨封胡偉弟昆珍重盧溝溝上月隨時車駟勞于門夜宿寺前農家漢南旅店已星稀倦宿田家帶落暉蕭寺依山聊復爾鄴侯送酒是耶非風餐并覺凉生飯露坐俄驚月在衣老子漫遊吾漫送登山臨水澹忘歸西明道人武昌堤上水雲身三十年來識道人只為漫遊相見少故知臨别贈言頻憧憧車馬紅塵老靡靡江山白髪新邂逅一回詩一首錦囊千首未為貧瀏江瀏江江水色幽幽兩岸青山雲木稠一自桑欽載源委曾留孫盛作春秋猿岫風來起波浪龍湫月出見汀洲下流兩度翠華過光氣至今浮斗牛昌山昌山峽口日西斜蘭渚維舟近酒家水潄樹根龍露爪石排江㟁虎交牙路迴佛寺藏深塢風動漁舟掃落花再拜靈均獻蘋藻月明環珮下汀沙讀鎦養吾虞青城書季子胡為葬嬴博太公復欲返營邱匆匆塵事半萍梗往往異土迷松楸誰能樊澤為表識頼有杜羔勤訪求但當作吏守墳宅莫待暮年思逺遊早飲聽秋居士園池碧池流水緑潺潺髙下樓臺紫翠間阮籍才華勝南族謝安清致滿東山標名花塢鶯争道集句桃符鹿守闗灑掃園丁今白髪秋翁化鶴幾時還鎦草亭詩冡朝廷采詩廢已乆公卿薦士亦罕聞坐令劉氏伯倫鍤生作唐人賈島墳光如黄壤翳明月副在青山藏白雲米家骨朽怪事息又見廬陵老隠君排律賜經筵官酒次蘇伯修韻鼇極天初補娥池月已修鮮颷生廣厦清旭暎垂旒三漏聰無壅黄瞳視不流凝神思燕翼虚已納鴻猷章撤金爐灺筵收玉斚浮甘泉歸步逺太液便程優鸚鵡棲宫樹鵁鶄避客舟商耆戔漢幣瀛儁膳唐名輩應相語明時豈易醻徘徊西掖晚鴈影度延秋謝徳盛奉蘐堂種得忘憂草母安憂可忘葉滋金水潤花帶石雲香淑景盈東閣春暉盎北堂靈苗仁壽域晚節治平鄉世澤深培植先聲續顯揚才華昌後裔事業富孤孀沃壤根株茂慈闈鬂髪蒼詠歌傳翰苑雨露溢恩光圭齋文集卷二欽定四庫全書圭齋文集卷三元歐陽𤣥撰七言絶句喜門生中狀元泰定丁卯八月十二日崇天門傳臚賜進士右榜第一人阿恰齊左榜第一人李黼皆肄業國學日新齋余西㕔授業生也是日京尹備皷樂旗旘麾盖甚都導二狀元入學謝師拜余明倫堂榜眼鎦思誠探花郎徐容嘗因同年黄晉卿彭幼元從予遊亦拜其側其餘進士以門生禮來拜謝雜還不記姓名圜橋門而觀者萬計都人以為斯文盛事昔未有也同寅舉酒相屬偶成四絶以紀其事昔被仁皇雨露恩三朝五度筞臨軒小臣報國無他伎舘下新添兩狀元禁院層層桃李開天街繡轂轉晴雷銀袍飛盖人爭看兩兩龍頭入學來淡墨題名二十年一官獨自擁寒氊居然國子先生舘三五魁躔拜座前都人舉手賀昇平不羨黄金遺子籝進士從今成典故唱名纔罷拜先生出試院有作寄諸弟天厯庚午會試院中馬伯庸尚書楊廷鎮司業及𤣥皆乙夘榜進士偶成絶句紀其事出院明日有敕督修經世大典又成小詩寄諸弟省垣東畔至公堂十五年前戰藝場飽食大官無補報兩科來此校文章御史承差鎖院門侍臣傳詔出天閽試官被命聯鑣至同榜三人出謝恩長樂鍾鳴拆號時三台八座列參差自憐手把天瓢水一滴鄉闗不得私聖主宫中遊幸疎日臨祕閣玩芸儲昨朝蘭省纔開試清曉玉音催著書别駕祠前雪水渾弟兄沙上舉離樽三年不洗來時褐要看淋漓别酒痕薊門城頭過階塔一一行人通竇間今朝送客又還入那忍更投名利閑香山山頭新月彎一似家里看西山去家五十度强望圓璧何時照我還仁廟初科射䇿郎如今斑白玷朝行東風昨夜聞歸鴈夢繞江南烟水長夜開金鑰詔詞臣對御抽毫草帝綸始信朝家重儒術一時同榜拜三人試院偶題贈巽齋蓮燭通宵擬御題槐龍風急漏聲遲玉堂冷透青綾被憶佀灤京五月時小雨陰風夏夜闌穿窓撲面雪成團平明笑與長官說天上玉京如此寒聖徳文明鼎運開相君承詔謹掄材誰言慶厯科無補中有韓歐富范來百鵠充庭氣若虹千蠶食葉響春空東風一夜吹嘘力明日紛紛緑又紅鯤鵬一化徙天池白日青雲在頃時我以世科慚克紹那能妬喘更笞兒陳編矻矻老無聞寂寞箕裘幾許存方寸留耕猶有望擬尋手澤訓諸孫所貴姪梅老樹縱横出氣條一枝還又亞牆腰西湖湖上掀蓬看一夜吹香滿六橋為所性姪題小景緑樹清江遶舍邊門前長泊往來船休官亦欲來林下只恐人嗤我學仙所性姪家藏東坡看竹圖銀燭髙燒照艷粧繁華過眼已相忘敲門自愛看修竹未必殷勤為海棠所性姪藏所翁全身戲珠龍萬户千門夜半雷明朝日出五雲堆老龍引領春消息玩弄明珠未肯來漫題四絶鈴索無聲玉漏稀青綾夜直月侵扉五更一覺梅花夢催得江南學士歸屬官分住省郎曹省樹年深過屋髙翰長晝閑來啜茗下簾危坐聽松濤鼇山六月少蚊蠅四壁松風動畫繒長貳聚㕔清澈骨一人人繫一銜氷翰林老屋勢深雄猶是金家兀术宫定鼎初年曾作省至今門徑鳳池通為琅溪題折枝海棠㸃綴春風只一枝此花猶是半開時更令老杜如今見便是無情也賦詩萬竿煙雨圖森森萬木種清和奈此霏㣲煙雨何千古首陽宗二墨清風又佀不須多墨竹疎枝淡淡與濃濃垂葉應無靃靡容玉立滿身都是雨何人能識葛陂龍驢上曉寒圖水聲山色畫屏中衛子凌兢兩袖風曾向天津橋上否誰從驢背覔三公灞橋風雪圖漢樹秦雲一色黄新詩拍塞小奚囊藍闗尚有潮陽債不識先生有底忙玉林琪樹路漫漫驢上凌兢兩袖寒一叚乾坤清意思又駈老子出長闗學士烹茶掃雪時當時已被侍兒嗤灞橋驢背何為者直要衝寒去覔詩驢上凌兢兩手龜南來客子為尋詩而今十倍瀘溝冷偏許青雲熱士知宣和梅雀嵗晚孤根獨發時飛飛凍雀苦相依鶯花世界春三月會有名園照夕暉題明皇葉法善一行禪師講經廣陵玉笛夜何如明日宫中看佛書兩界山河當指似盧龍塞上有龍猪題顧子虎松風謖謖茒葉低於菟顧子行欲遲從今慎勿殘乳麛心亦可學秦巴西再題臨川别卷西蜀橋邊薛校書風流自是女相如平生不受梅花聘只為清才自有餘三牛圖兩竪騎牛過逺村一童横笛弄黄昏老僧正解荆舒字坐愛三牛了不犇萬竹圖露壓煙稍整復斜有時風定翠交加閒身幸老清平世喜見鵷雛待竹花宋徽宗菌圖地上層雲起玉柯依稀遺墨認宣和莆陽相國君知否好作齋房芝草歌髙宗御書君王不受辟寒釵永巷泥金進損齋欲上大清樓下石啼鴉落日滿宫槐陳摶睡圖陳橋一夜柘袍黄天下都無鼾睡床贏得墜驢閑老子為君眠斷白雲鄉雪夜訪戴圖雪夜操舟童僕勞偶然歸去便稱豪若為返棹成佳趣轉憶當時不出髙吳西村雪霽圖鄭虔能畫又能詩獨立經營雪霽時曽向湘江挐釣艇賣鮮沽酒鬂如絲老蒲萄半蝕秋虫老葉皴祖藤孫蔓淡濃勻何人偶值髯君睡奪得驪珠足眩人蒲萄院落陰陰一架秋新鴻聲裏月如鈎老龍偃蹇垂無力戲吐𤣥珠不肯收子昂雪鵠水晶宫裏文章伯當世誰知翰墨名頼有瀛洲光價在不曽承詔寫鵁鶄墨荔枝向來千里騎塵紅生色羅襦濕翠濃顔色似嫌妃子涴蕭然猶有墨君風鎦山立梅圖山澤癯儒面目真見梅往往見先人屋梁月色新湔拂茅舍玉堂同一春天師月梅圖隴頭誰寄一枝來多謝天公巧剪裁猶自壽陽粧額後到今玉蕋忍全開寒雀梅斗柄初開第一枝遊蜂寒雀已先知相逢不忍輕飛去直與梅花了嵗時榮碧潭全身龍巨壑深溪萬水潨四時濃黛浸千峰天衢邂逅全身露還信碧潭盤老龍榮朝瑞正面龍天光烜赫五雲間千仞丹梯不可攀鰲禁侍臣今白首幾回正面見龍顔榮建翁家藏陳所翁龍畫龍居士舊憑熊能寫青雲隠見蹤阿堵神光留意處肯教飛去葉公龍壽卿龍頭聖朝龍首六七輩總是知心識面人我亦待渠頭角老不知誰命繪麒麟吾友龍頭少年不學躍天衢便被良工寫入圖老去全身何所隠會當謁帝乞江湖閒展山水手卷十年京國看圖畫半幅雲煙亦惱儂今日身行屏障裏却思移住最髙峯又動靜之間毫髪㣲要於㣲處動天機此中消息君知否玉琯葭灰夜半飛醉翁亭障為南翁作長史琵琶皮作弦使君眉宇飲中仙滁山滁水渾堪畫獨有風流意不傳武三思雙陸上陽無子局方闌又到乘龍第一盤餅餤未來聊樂耳郎君好好㸃籌看贈翠璧玸講主上人官寺講華嚴聞説心華日日添晚嵗結茅依翠壁龍嵐虎氣滿晴簷贈彭漢節君家已有笏堆床惟勿筌蹄書傳香昨宿山堂中夜起西窓燈火誦琅琅贈彭雲溪真少年書劒出鄉闗晚嵗雙旌五馬還辛苦一生清白吏秖留松菊應蒼顔過髙郵髙郵海上水雲空曾說明珠夜吐虹底事年來光恠息阿誰身到廣寒宫題永清觀天瀾黄木扶胥日出時泊天波浪渺無涯濁河上接銀灣處只許乘槎博望知題栢庭和尚香葉曾經宿鳳鸞苦心容蟻量應難明堂自有擎天柱且喜山中耐嵗寒偶題溪水清漣樹老蒼行穿溪樹踏春陽溪深樹宻無人到時有幽花度水香寄山村兄季子京塵滿黑貂兄年九袠鬂蕭蕭何時約我山村路傍栁隨花過野橋贈歐陽震逺震驚百里未為遙巖谷回春只一朝要見禹門頭角異乘時一躍上青霄京城雜詠玉堂集日列金羈學士新兼祭酒時五百書生簽講遍八甎花影最來遲麗正門當千步街九重深處五雲開雞人三唱萬官集應制須迎學士來白玉堂前夜合花髙髙緑樹散朱霞朝來如見唐人畫繫着誰家白鼻騧龍笙鳳管舞輕盈步障遊看花滿城行到瓊林春更好新來進士唱名聲鰲山宴罷月溶溶太液池邊湛露濃不用金蓮送歸院水晶宫出玉芙蓉京城走馬聽晨鐘我欲宵征僕興慵却憶江南春睡美小樓欹枕聽村舂奉詔修書白玉堂朝朝騎馬倚宫墻牐河東畔垂楊栁時有鶯聲似故鄉題永清寺白巖清暉方池古松四韻上人燕坐白巗阿巖上皚皚白石多曾到補陀南海岸白花無數擁盤陀巗前髙閣扁清輝碧瓦朱甍映翠㣲老子懸車還故里倚闌何日看雲飛白巗山下俯清池花有清香水有漪幾度收經看月上分明水底見摩尼古寺長松倚半空問渠年臘祖師同應知方外輪囷器多謝清時雨露功題昭文擕琴圖孺子擕琴未去弢兩翁山水偶相遭知音已置虧成外到底昭文不鼔髙和寶雲長老澈一清二絶禪板蒲團百念空坐聞宿鳥起霜風巡堂首坐三更過師在雲山第幾峰虎溪一笑瓓珊了不似當時剡棹回髙興莫教容易盡青鞋布襪約重來逢江易藝芳干賦芳洲楊栁垂垂拂釣磯平沙雨過緑生衣王孫闘草歸來晚撲漉鴛鴦帶水飛東山春景春光澹澹日遲遲正是名園撲蝶時却憶小橋流水過東山春色在桃枝題蒲萄宛馬西來貢帝鄉驪珠顆顆露凝光只今移植江南地蔓引龍鬚百尺長題分宜趙尹所藏子昂竹石圖有客有客白其馬汶篁移植燕山下嵗寒心事木石知雨露恩深詎能寫圭齋文集卷三欽定四庫全書圭齋文集卷四元歐陽𤣥撰歌畊學問答世間惟有畊與學思量二藝皆無錯畊者榮華得富豪學者羽翼生鱗角畊問學得恁賢累年累月在窓前田地抛荒園圃廢日間忘食夜忘眠學者答非容易筆頭雖小驚天地但看王侯将相家盡是當年勤苦至學問耕得恁苦渾身穢汚生泥土冬月之間被雪霜春天曉暮遭風雨耕者答不辭辛鋤頭翻地出黄金但看世間儲積者盡是當年勤苦人畊可憐學可愛思量二藝皆懷大少年辛苦老來閑粉壁朱門多自在題四時百子圖藏藁紙弊墨渝實圭齋親筆近見他集亦有恐悞天無一日具四時人無一母生百兒何人筆端巧造化人事天時俱盡之三三兩兩如魚隊日長逰戲闌干外采蓮攀栁爭後先繞竹觀梅分向背一真未鑿萬象春誰家苑囿誰家人莫是越王泛螟嗣西湖湖上嬉芳塵當時富貴傍觀羡至今宇宙流傳遍爭如茅屋浣花溪竹根雉子無人見摩挲此圗真拊髀多憂正為多男子但須得似仲謀兒人生一夔已足矣題趙菊山文肅公閱武像浚儀王孫宫錦袍紅鞓玉帶琕琫刀大夫在官盛冠佩州将按旅陳旌旄汝陽眉宇照今古五陵志氣横江濤世皇大舉獵徳網池上不遺丹鳳毛宫門承詔鑄銅馬瀛洲接武乗金鰲駸駸亳社百年久奕奕燕臺千仞髙題山荘所藏東坡畫古木圗眉山昔日生三蘇一山草木為之枯後來筆端挾春腴却令生意回枯株樹經公筆無老醜天以春工付公手誰云軰行龍眠翁奚必法嗣洋州守山荘劉氏富清玩家有蘇公舊揮翰恍驚濕蘚粘恠石慣見倒根生斷岸涪翁對此煑春茶為公梢上掛長蛇燈窓細讀假山記秀氣終屬眉山家至正壬午十一月余以疾謁告南歸求毉至安成郡北之族中節判繼先劉君相公不逺一舎携尊爼見勞談邊得知為西皋趙學士之壻别次為余徴詩即席走筆作長句併呈似王守筠溪相公及郭倅明則相公一粲徳州沃野濟岱雄池産往往多明公與君初見問爵里塵邊又復知氷翁氷翁西皋古君子擇壻如君信佳士故應邂逅氣味同逺來勞我於桑梓南州初筮發新硎安成名藩駕屏星金鑾學士已頭白玉潤郎君終眼青我嘗三仕歴郡邑聽訟催科紛蝟集能令過客情誼洽可見邦侯才力及古㕔小飲亟分手因君索詩為君壽郡中政清長貳和為我寄聲賢太守贈趙祥表禙浚儀公子今㡬葉装池装潢以為業道傍蒼玦猶一惜池底𤣥灰信多刼鋪張幸及時黼藻流落還同故書篋魏武子孫曹覇馬唐家宗室滕王蝶淳化石本墨糢糊宣和印章紅摺疊魚鱗已是善排比鷖尾猶况工剪貼但持絶藝動縉紳勿向同儕論譜牒藝文舊監慚潦倒翰墨當時勤渉獵心期知子價千金只恨無才寫蒲箑詠春閨怨東風園林花草香芳閨寂寞春晝長佳人獨守情黙黙銀床錦被閑鴛鴦終朝倦繡拈針指怕向花前聽鶯語喚回舊事千萬端杏臉蛾眉淚如雨玉郎去年辭家時綠楊紅杏嬌春暉綠楊紅杏色如舊悵望玉郎猶未歸一春魚雁音書絶雪膚消瘦千腸結斷腸猶立㡬黄昏那更青山苦啼鴂頃見同舎柯博士所贈趙孝子歌真佳作也客以是卷繼求余言遂用柯韻作一首利津城城上烏飛向城南叢塚呼塚前無人作寒食但有被髪哀號孤行人厭烏見被􅄠憾欲射烏金僕姑靈烏下告孤兒苦逺訪親骨踰重湖兒生四歲時父别阿㜷去㜷老婦已孀養兒為兒娶兒思往從父念㜷共燥濕今年令伯正陳情他日韓湘竟收骨江南五千里山東二百州州州旅寓有南北爾父存亡何處求跣行及河十趾血河風吹沙天慄烈遭逢執友向燕薊指示丘墟瀕海碣身為衞子􅄠縋鞍鞍忽堕地開親穴君不聞饒娥江頭哭父屍浮黿魚孝子精神貫今古明神降鑒寒空虗博士作歌傳里閭和李溉之舞姬脱鞋吟宫袍繡蹙金花綺紅綃𦂳襯䨇鸞尾盈盈漫服舞腰輕綵雲飛處香風起藕絲掣斷春雲鬆瑞蓮䨇結並頭紅夭夭曲曲玉彎卷翠鳬飛去天欲軟玉階秀茁蘭笋長瓊砂迸出蘆芽淺徘徊困倚東風力濕砌香雲墜無跡無限嬌羞不自持君王喚起扶花立贈畫工黎仲瑾號碧山吾聞萇𢎞之忠裂金石精氣千年化為碧人生賴有方寸妙萬變神竒從此出又聞西方梵僧名法能能令兩眼碧色晶熒熒有時肘後洒墨汁纎穠踈秀皆成形碧山畫神欲入品表裏神光碧瞳炯浮嵐曖翠山不受盡付晴窓落泓影碧山學士今為誰玉堂茒舎各有時煩君添我山下屋更看白雲相陸離題子美尋芳圖吾年三歲聲吾伊慈親膝下教杜詩如今蟫蠧三十載夢寐欲見終無期誰家山水空翠濕彷彿相逢拾遺揖金馬門前封事稀碧鷄坊裏尋春急野桃官栁春連連水流山店依平川眉尖不着杜鵑恨壺中風月開元天君乗蹇驢歩如棘後有驊騮追不得茅屋西風五百年虗度人間㡬春色題紫微老人大字歌紫微老人射生手挽强竟取黄金斗驃騎營中拜驍勇鳳凰池上稱耆􅃇時平腕力無所施筋骨猶能學顔栁縱横戎畧結構體殺活兵機屈伸肘山荘劉氏得最多當日襜褕駐應久髙樓大扁曰明逺况有愛山并尚友我來後公五十年主人酌我樓前酒平田野水鳬雁集重岡複嶺蛟龍走登髙欲賦乏佳興忽覩台躔照窓牖家藏有此希世珎取酒當為主人壽想當洗硯弢筆時羽筈生風劍龍吼焉知今人正傳玩名與麒麟同不朽嶠南鼪鼯十五秋老将如今安得有鄂公九原如可作養壽清商為公奏送劉子簡之武昌學正劉侯兄弟競秀發仲氏卓犖殊可人訓徒名門示髙爽棖臬中實皆輪囷未誇于氏容駟馬豈羡楊侯朱十輪荆才非止箘簵楛燕璞迭見玗琪珣伯留天庠不可去仲始捧檄歸娛親滔滔南紀盛藩翰文武化行初未泯世皇八駿所厯處扈蹕至今疑有神盤中苜蓿不在飽座上芷蘭俱可紉吁嗟劉郎慎勿浪彈鋏自古江漢無窮鱗送聶以道之官天厯聖人在海南南省大臣理鹽筴聶君老儒幕下郎日飲清氷鬚髪白是時潛邸具知聞召見殷勤親賜食明年翠華望北還復過湖南駐清蹕試舉郎君問宣閫閫臣上前盛稱述省郎歲滿調江華回瞻馬首天南北生平固自結主知下邑惟思躬吏責慈心懇惻撫惸嫠宿蠧推求剔纎悉甘棠遺愛十二碑其中一碑磨崱屴豪民敓水三百年力能挽注甦涸轍爾來㳂牒至京師廟堂除吏餘八百重瞳覽奏記姓名呼之以字顧臣列若云賈誼久不見猶喜真卿獨先識秉鈞敷對此掄材司讞無如武昌劇天顔沈思霽色回姑惟首肯心未擇逺臣客舎擁敗氊誰知京兆牛衣泣青天晝有風雲哮猛虎獰蛟向山澤華蕚樓頭賞蘤葑臨菑門下分竽瑟念昔部使舉政最往往當途多抹楅秖縁早忤耳目司豈復虗蒙股肱力人生榮進自有期簡在淵𠂻非易得小儒作歌屬山甫愛莫助之增太息示姪吾宗孫子多好學爭持卷軸求余詩嗟予膏馥有㡬許况復老懶惟其時子年弱冠氣方鋭立志要與青雲期冀馬生駒汗血器越女堕地瓊瑶姿固知美質故應爾所貴論道隆師資牧之渉世晚自悞冬至作詩鐫阿宜初陽萌動慎培養萬木一本含春滋題曜海朝天龍𤣥雲霮䨴海波立神龍挺水趍天潢畫師題筆睨八極意與元氣爭毫芒玉京僊聖驂翺翔雜騎麒麟與鳳凰龍拖雲氣歸洞府海日杲杲天中央道吳山道吳山頭龍自卧疊嶂重崗深紫邏靈湫瀑布千丈長古寺神杉十圍大崇祠坎坎風雨來樵徑丁丁鴻雁過郡人夜望北斗魁下有突兀青蓮座大圍山大圍山髙髙㡬許絶頂嵯峨戴林塢石間花開自夏春地爐僧擁無寒暑清流白鷴滌毛距綠樹黄熊引筋膂山腰日午嬰兒啼知有雷公出行雨奉勑題明皇馬明皇八駿爭馳道知是開元是天寳當時一顧傾國姿萬里君王蜀中老奎章閣下文書靜衮衣髙拱唐虞盛此圗一出非偶然要與明時作龜鏡雜體􅠥之坰古樂府有序至正壬午皇帝有勑賜故和寜忠憲王勲徳碑命翰林學士𤣥為文碑立􅠥門近郊戴螭履龜龜有異瑞首如繪足如玉搢紳賦詩紀異𤣥作􅠥之坰一首􅠥之坰穹碑銘銘維何誄和寜維和寜勲揚庭臣𤣥詞帝者荓倕琢石石効靈靈何居傴句形顒之文旋瀅瀅絡鼻口逹厥䫤疋之晳色晶熒馬郲武騵腹駉嗟彼蔡象應靈國守器列前廷王之忠格髙㝠珉之瑞天使令發幽光炳丹青王有子承徳馨决大疑陳大經疇五福詒千齡作傴句寳龜名漁家傲南詞并序余讀歐公李太尉席上作十二月漁家傲皷子詞王荆公亟稱賞之心服其盛麗生平思彷彿一言不可得近年竊官於朝久客輦下每欲倣此作十二闋以道京師兩城人物之富四時節令之華他日歸農或可資閒暇也至順壬申二月𤣥修大典既畢經營南歸屬春雪連日無事出門晚寒附火私念及此夜漏數刻腹藁具成枕上不寐稍諧叶之明日筆之於簡雖乏工緻然數歲之中耳目之所聞見情性之所感發者無不櫽括㮣見於斯至於國家之典故乗輿之興居與夫盛代之服食器用神京之風俗方言以及四方賔客宦逰之况味山林之士未嘗至京師者欲有所考焉此亦可見其大畧矣正月都城寒料峭除非上苑春光到元日班行相見了朝回早闕前褫帕歡相抱漢女姝娥金搭腦國人姬侍金貂帽綉轂雕鞍來往閙閒馳驟拜年直過燒燈後二月都城春動野引龍灰向銀牀畫士女城西爭買架看馳馬官家迎佛官蘭若水暖天鵝紛欲下鷹房奏獵催車駕却道海青逢燕怕纔過社栁林飛放相将罷三月都城遊賞競宫墻官栁青相暎十一門頭車馬並清明近豪家寒具金盤飣墦祭留連芳草逕歸來風送梨花信向晚輕寒添酒病春煙暝深深院落秋千逈四月都城氷碗凍含桃初薦瑛盤貢南寺新開羅漢洞伊蒲供楊花滿院鶯聲弄歲幸上京車駕動近臣凖備鑾輿從建徳門前飛玉鞚爭持送葡萄馬乳歸銀甕五月都城猶衣裌端陽蒲酒新開臈月傍西山青一搯荷花夾西湖近歲過苕霅血色金羅輕汗搨宫中畫扇傳油法雪腕綵絲紅玉甲添香鴨凉糕時候秋生榻六月都城偏晝永轆轤聲動浮𤓰井海上紅樓欹扇影河朔飲碧蓮花肺槐芽瀋緑髩親王初守省乗輿去後嚴廵警太液池心波萬頃閒芳景掃宫人户撈漁艇七月都城爭乞巧荷花旖旎新棚笟龍袖嬌民兒女狡偏相攪穿針月下濃粧佼碧玉蓮房和柄抝晡時飲酒醒時夘淋罷麻稭秋雨飽新凉稍夜燈呌買雞頭炒八月都城新過鴈西風偏解驚㳺宦十載辭家衣線綻清宵半家家擣練砧聲亂等待中秋明月翫客中只作家中看秋草墻頭螢火爛踈鐘斷中心臺畔流河漢九月都城秋日亢馬頭白露迎朝爽曽上西山觀蒼莽川原廣千林紅葉同春賞一本黄花金十繦富家菊譜籖銀榜龍虎臺前駝皷響擎仙掌千官𤓰菓迎鸞仗十月都人家百蓄霜松雪韮氷蘆菔暖炕煤爐香豆熟燔獐鹿髙昌家賽羊頭福貂袖豹袪銀鼠襮美人來往氊車續花户油窓通曉旭回寒燠梅花一夜開金屋十一月都人居暖閣吳中雪紙明如堊錦帳豪家深夜酌金鷄喔東家撤雪西家噱纎指柔長宫線弱陽回九九官氷鑿盡道今冬氷不薄都人樂官家喜愛新年朔十二月都人供暖箑宫中障面霜風獵甲第藏鈎環侍妾紅袖咲歌聲送金蕉葉倦客玉堂寒正怯曉洮金井冰生鬛凍合竈瓢餳一楪吳霜鑷換年懶寫宜春帖圭齋文集卷四欽定四庫全書圭齋文集卷五元歐陽𤣥撰記道州路重修濓溪書院記道州路濓溪書院是為子周子專祠其址在郡城西偏與郡學為隣郡學有先聖廟毎歲春秋二仲上丁郡侯率教授山長各以其職事命生徒祀先聖於郡學次丁則合祀子周子於書院之専祀毎月朔望欵謁皆然原其初建雖由時君有獨祠濓溪之命亦其地勢適然故祠事之専無間言者焉歲久祠宇寖壞至正壬午山長張某議撤而新之郡士李某樂助以相其志工未訖去代者歐誠能繼其事於是祠宇一新歲乙酉番陽吳侯肯來為郡判官仰瞻新祠而門廡弗稱謀諸郡長復加繕修適山長戴世榮又來代歐而郡士蒋通復請出貲改作應門四楹兩橅稱是祠之後舊為誠源堂堂之後為故守髙峯楊公之祠左有愛蓮亭及清逺樓後有光風霽月之堂至是斥故易新丹雘輝映世榮割已俸作石臺於應門之南縱廣二丈横倍之又率郡士文某作瞻德亭亭下甃石為街繩直砥平中外改觀前此未嘗有也先是周子有子二人長司封郎中壽次直徽猷閣燾壽之後遷居江州燾之後居道州吳侯求得其八世孫善溥薦之當道請援顔孟例世以其後人之賢者為書院山長以奉専祠憲府是其議移有司逹之行省焉明年丙戌冬吳以漕事至瀏偕世榮奉事狀謁於歐陽𤣥請記以文𤣥惟周子祠事若㫪陵若九江豫章邵陽諸郡皆有碑刻作者多世大儒𤣥於是記叙勞績紀歲月斯可已矣然而紬繹父師之言亦有可贊一辭者不敢以勦説辭也昔者子貢曰夫子之文章可得而聞也其言性與天道不可得而聞也孔子言性與天道莫著於易所謂乾道變化各正性命所謂一陰一陽之謂道繼之者善也成之者性也皆言性與天道當時門人可以與於斯言者鮮其人焉子貢晚年始獲有聞故以嘆美之及孔子沒知此者子思孟子西漢以下諸儒見其彷彿焉子周子生乎千有餘載之下得孔孟之緒言著太極圗通書泄造化之蘊發聖賢之祕如指諸掌故孔孟之後首言性與天道者周子一人焉世儒或疑周程授受不及圗書殊不考程子之言有曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀懼愛惡欲謂斯言不出於太極圗説通書可乎孟子言天地之性程子兼言氣質之性然後荀楊韓子之説俱廢氣質之論原於周子灼然無疑者也且自太極圗説通書行世世之為儒者苟知讀濓溪之書無不獲聞性與天道之言焉假令子貢復生當歎今之學者得聞斯言為幸而諸儒有横議於當時者果二書之為異乎抑立論者之好異歟皇元定宋九儒從祀周子居其首尋又有制進汝南伯為道國公蓋乾淳以來新安朱子最先尊信其書聖朝重朱子之學以程式天下之士則周子之書益表章於世宜哉雖然國家興學之地可謂至矣周子曰師道立則善人多善人多則朝廷正而天下治矣繼自今教者以師道自樹學者以善人自期将見真儒之効施於朝廷四方未有紀極如是則書院之修豈徒侈専祠示觀美而已𤣥㓜年侍先君子職教是邦讀書濓塾之側追憶往時來㳺來歌之地因吳侯之請輙以舊所聞於家庭者附著於斯焉吳侯肯字肯堂以教官入流選為憲掾進行省掾厯南海武昌兩縣尹皆以善最為政亷明且知大體云是役也逹嚕噶齊塔海大中同知某實綱維之其始終恊恭則經厯李時知事李信也貞文書院記昔在仁宗皇帝之世集賢大學士陳顥翰林學士承㫖和塔拉都哩黙色等言翰林揭傒斯之父來成學行師表一方宜特賜諡以示聖朝尚徳之意於是有㫖賜其諡曰貞文先生至正三年夏四月中書平章政事特穆爾達實右丞太平賀等又請於今上皇帝建立書院遂以貞文之號賜為額其址在富州之長寜鄉舊山之陽前挹遥岫後倚崇岡平疇曲谿映帶林麓蓋揭氏先世故居之地也其制為大成殿四楹於中殿之北為明倫堂四楹殿之南為門四楹上為重屋門之南為靈星門四楹别為貞文祠置明倫堂之後左為山長之署四楹其兩廡為諸生齋居左右皆四楹齋之南又為屋各五楹庾庫庖湢咸以次置其工始于至正三年之九月訖於九年之七月其後從子範經始之而元貞等僧智辨相之山長湯盤繼成之其山長則行省以儒士之嘗歴學官為之其門之東屋則從孫徳懋萃舊岡書院之材所建也其靈星門則僧智辨之所立也其祭祀教育經久之貲則里人之好義者割上腴田以相其事書院垂成文安公與𤣥以同在史館一日詣𤣥以記書院為請𤣥敬諾之喜而歸以語其子汯曰今日吾書院事畢矣歐陽君已諾吾記矣越數日文安疾作又數日卒三年汯申是請𤣥乃記之又告其徒曰古之學校為教事設而政事出焉辟雍泮宫習射養老出師受成皆在其地何莫非政事也後世學校雖治教事而特以祀事重焉攷其所始古之入學者舎菜先師未嘗専有所指而舎菜之禮亦祭之至簡者也今州縣學校則必専祠先聖先師於是國家秩諸祀典若夫書院則又多為先賢之祠或其過化之邦或其講道之地如是者不一也亦嘗攷其所始焉周禮大司樂有道有徳者使教焉死則以為樂祖祭於瞽宗瞽宗者學之名也古者教之以徳為先涵養徳性莫先於樂故有道徳而為師者其生也以教人其死也人推本其教以樂祖祀之非必洙泗而下若漢董子若隋唐王通韓愈氏若宋周程張朱數君子之為先儒而後為可也矧夫書院與學校之制其始又自不同東漢以來大夫士往往作精舎於郊外晉魏所謂春夏讀書秋冬射獵者即其所也唐宋之世或因朝廷賜名士之書或以故家積書之多學者就其書之所在而讀之因號為書院及有司設官以治之其制遂眡學校故祀事有不容闕者於是或求名世之君子以祠焉𤣥嘗循流而遡源蓋自入學舎菜先師一變而為通祀自學有樂祖之祭一變而為先賢之祠自春誦夏弦一變而為呻畢再變而為詞章又且黨庠術序一變而為精舎再變而為書院學者苟不能知建學之初意又豈能知為學之大功學校所重在祀事而宫室象設之制日趍為觀美所任在教事而禮樂律厯之學或諉諸専門遑議所謂政事之行於學校者哉皇元超軼百王務以崇雅黜浮為教以去華就實為學復古之機其在於是貞文先生以道徳教一鄉之人死而祠於其鄉稽諸樂祖瞽宗之祭真無愧乎古人者也𤣥故著其所始願以求正於好古博雅之君子焉至於揭氏父子以稽古之功修身之效被遇兩朝垂耀百世可謂儒者之至榮猶有待乎論述也夫貞文先生諱來成字哲夫以子貴累贈通奉大夫江西等處行中書省叅知政事䕶軍先謚貞文國朝處士易名之典自公始文安公諱傒斯字曼碩卒官翰林侍講學士中奉大夫知制誥同修國史贈䕶軍諡文安父子並爵豫章郡公二公懿行偉節各有列諸别碑云袁州路繕修記宜春為郡介江湖間山水清隩風氣厚密其神能靈其民能淳為厥長吏固俗易使導以身教利建事功至順二年冬十二月通議大夫濟勒布哈擢由容臺來刺名郡私未黔突畢飭在公乃睇府治東拄西搘徂厥門廡上漏傍穿部使之館賔幕之次以及燕休之堂登眺之樓㳺息之囿觴詠之亭府史胥徒脆閽廐厮舊有位置今穢不治或傾欲隳或危欲壓維時錦侯乃諏寮寀乃咨賔屬宿戒父老斯徴富民進而爵之侯乃言曰治官猶家家之隆替觀所恒居垣墉虧疏廡陛夷削凡百廢墜推是知之視彼富潤有覺斯楹勢固不侔亦所自致矧今牧守視古侯伯維今富民其道視子其分視臣爾退而處服御華好側睨長上居懷阽危從我遑䘏寜汝獨安吾嘗觀風考察部屬有司興繕弊有二焉民賦力産吏容奸欺官督期程工售濫惡苟完未㡬馴致朽撓粤有文吏拘牽故常事在得已輙持兩端媮容目前遺患厥後迄夫淪胥滋以病衆斯二弊者吾實恥之今及汝約恒産髙下推次惟女工稍多寡陳力惟汝官不督廹吏無徴呼汝某治甲汝某治乙我惟示成有不樂者疇抑汝配於是父老曰便富民曰宜言訖飲酒罷而與期及期子來並手角能植者用壯承者用隆幂者無窳者無壚裓者砥平磨而甓之丹者黝者藻者繪者無或漫漶後先工訖完美如一窔從衡楹數百計悉前所陳煥若新作侯乃練日共具牢醴合樂落之又進父老及諸富民爵如初儀為之言曰維此宜春郡治奕奕山川發靈神降純嘏暘雨時若有年穰穰民富以教士秀而文吾幸處此與爾同休去即傳舎凡厥洵美汝世享之守何與兹父老富民咸下其手合辭報公且矢於福願錫蕃祉與治俱新天子萬壽百度斯甄公敏且㓗宜為藎臣居匪奉已示我等倫我民於變不戒以信受命於上服勞其親筮占在兹施我子孫無遺公憂以愧我民叅軍楊撝奉圗走書來求予文予核其事辭以繹之且告來者嗣而續之有廢不理衆手撠之撝從予逰為我石之是役初作郡牧之長巴延特穆爾相與佽之用迄于成是皆宜書尉韋元輔實董其事吏宋必逹又宣力焉侯至之明年壬申九月僝工又明年癸酉七月竣事記以是年之八月土木金石埏埴壟斷工費若干鳩集衆力不會於公無從稽云安成李氏重脩安賢義塾記安成李君辛翁初作安賢義塾於州西郊一倣書院精舎之制禮殿廡門講堂齋舎各有其所未㡬即世規模有未備者子剛慨然念先世美績無加於此乃割上腴田若干定為教養恒式出納恒度凡可以經久而不廢者一一講求而完美之於是塾師劉君權具事實謁予記之予嘉李氏有子之能繼承也又感義塾之作是蓋君子至公之心而古道可復之機也為之記曰昔者先王為井田以養民為鄉校以教民周衰井田法壞斯民貧富至於相懸鄉校法壞斯民賢愚至於相絶而君子小人之事判然兩途賤日益多貴日益少法日益密禮日益踈後世興者雖汲汲然設為教官之任而井田經界勢不可復郡邑教養豈能徧及齊民也哉有富而好禮之士出而建義塾焉義塾既作一鄉之士患不志於學不患無從師之資一塾之師患學者之不勤不患供億之不繼推此至公之心求復世道之古其機不在兹心乎師道由是而立善人由是而多風俗由是而美義不可勝用矣禮門左之堂曰塾塾之為言熟也吾固願義塾師友之至斯也教者熟於其教母致扞格而無序學者熟於其業母致寒暴之罔功如是則無負李氏建塾之美意矣李氏安成大族宋末累以著述獻於朝其貢名天府者接武辛翁號一峯剛字立中世以文行稱於州里云趙忠簡公祠堂記臨川王安石以新學誤宋致天下騷然河南程氏兩夫子出而救之卒不勝其説既而蔡京為相宗王氏説黜程氏學宋遂大壞京客張觷教京亟召程氏門人楊中立用之庶㡬救其半及宋中興解人趙忠簡公鼎為相首罷王安石孔廟配享尊尚二程子書凡其門人之僅存者悉見召用江左乃復振不幸秦檜相忠簡公斥程氏門人散亡洎中興業衰又不幸韓侂胄相禁建安朱文公熹之徒之為程氏學者其後禁稍弛宋已日削皇元煟興江漢趙氏復能倍誦程朱書北渡江私筆以授學者許文正公衡衡神明其書進以所得相世祖興禮樂文太平後是四十年貢舉法行非程朱學不試於有司於是天下學術凛然一趍於正時相尋定濓洛以下九儒及衡十人祀孔子廟庭天子從之至順二年春趙忠簡公六世孫篔翁請即解之聞喜縣學為忠簡祠其辭曰公當宋南渡排王氏邪説崇程子正學以至於今有功於斯世甚大宜祠其鄉胄監集賢是其議中書禮部告晉寜路以符屬其同年歐陽𤣥記之𤣥平居讀孟子至承三聖一章未嘗不掩卷汗下以為何致是烈也及畧考近世儒學之邪正有闗於國家之隆替氣化之盛衰民物之榮悴其可徴者蓋如是嗚呼是祠豈細故哉公師邵伯溫友胡寅其問學原委措諸行事詳見宋史篔翁延祐二年進士卓然有志先正亦可概見於斯保靚祠堂記保靚祠堂者安成劉君尚節祠其七世祖考保靚先生者也先生諱作字賢礪保靚其號居袁吉間地曰秀源在宋乾淳一時聲光􅂱然起於郡邑初用世賞授将仕郎辟贑之安逺尉母老不赴中歲韞徳抱才不屑世用友當時搢紳清江兩尚書謝公昌國章公茂獻廬陵楊文節公廷秀皆定交筆硯骨鯁如胡忠簡公邦衡亦深見結納其他名賢不可悉數百餘年以來世代變遷遺韻日逺諸孫尚節㓜負志氣讀其遺書慨然慕其生平懼其親盡既久後人無所瞻仰謀即故居建祠堂以致専祀而諸賢翰墨存諸碑版者亦復散逸尋得忠簡公保靚記䟦及謝公諸書又漁父來告某潭有石状如碑以手切之有字尚節使沒者羣入助漁舉石出果左宣郎劉君廷直所為保靚祠堂銘也他日營父塟於白石岡掘地三尺得碑䘏勿音窣沒讀之又永州通判董徳中所為保靚先生祠記也於是尚節益喜繕祠益勤至元後庚辰春祠成置龕奉保靚主列碑其前議割上腴田若干以給常祀擇日率族屬子姓祭以告成竣事而飲族屬舉杯勞尚節曰保靚徃矣非君之賢祠事曷興造物者出二碑以相君志也余至鈐南族中族與劉氏世為婚姻尚節謁予文為記予惟瞽宗祠於學鄉先生祠於社尊有道尚有徳也此禮廢已久保靚祠堂雖成於其後人異時郡國因餼羊以復告朔古道其庶㡬乎乃為迎送神詩遺劉氏子孫使歌以祀先生詞曰吉之檜兮袁之裔介兩郡兮大容礪昔賢居此兮物無厲物無厲兮民有歲道之耕兮徳之刈刈徳兮耕道深資兮靚保保靚兮何為山有碣兮水有碑碑無沉兮碣無瘞曽孫有祠兮傳千世世世幅巾兮深衣先生來歸兮無我違違我兮焉往從諸賢兮詠歸尊有冽兮爼有肥芳菲兮闔兩扉石韞玉兮山有輝微先生兮後人疇依安先生祠堂記所貴乎處士者能以一已之所守為一國之所慕雖當世英君誼辟操其總攬豪傑包舉宇内之柄一旦遇夫爵禄慶賞所不可致之人於是怡然企乎先王道徳之懿真有貴於已之所負挾者而後上之趣向定下之習俗成斯人者功下韓孟哉元有國以來學者言處士必宗容城劉靜修先生方是時聞其風而起者曰真定安氏敬仲焉敬仲未嘗一造劉也顧得其傳於濓洛考亭者知之為甚篤行之為甚堅由是推宗以合於祖一也劉氏髙亢明爽梯級峻絶士親炙者寡安氏簡靚和靜襟韻敞夷士樂附者衆異時有祠宜乎抑自先民石峯恕齋兩先生以學淑其鄉蓋三世百餘年於兹矣此又祠之所由作歟敬仲既殁門人蘇君伯修貽書同舎槀城西管鎮李君士興請祠為鄉先生士興議克合乃築于鎮作三室而奉之自敬仲上而至於石峯恕齋咸有位焉明世美也落成率里塾子舎節歲時具蠲所事至是伯修請予記之然予記安氏祠而本以容城者亦猶論東漢名節而始嚴光乎漢至孔張末之儒也矣微光東都士何自作新哉光未必知道也而且如彼而况吾濓洛考亭乎而况吾容城乎夫瞽宗祠於學鄉先生祠於社古典也瞽宗久無聞鄉先生有祭自伯修士興始以是知古道無難復人患不為爾繼自今西管鎮之俗日益以厚其民敬學而賤利其士樂學而逺勢安氏之澤其有既乎讀是文者尚知所始石峯諱滔恕齋諱松敬仲諱熈出處詳見家集云秀川羅氏祠堂記先尚書公逰鄉校時善校官羅子逺子逺廬陵秀川世族篤學力行有詩文傳於世後為朝請大夫主榷貨務言賈丞相専權誤國棄官去予家藏其遺墨思欲見其子孫今其族孫仁逹過予為人英敏有為為文雄暢有氣予於是喜先友文獻之有傳焉仁逹徴予記其秀川祠堂其言曰吾祖大時府君著籍秀川四傳至南塘府君家日以大府君之子若孫始割烏石陂腴田若干畝為祀田時宋嘉祐二年也其後乃貢於舎貢於鄉登第於禮部凡百數十人於是蓬山先生溪園先生與其子蒼崖公磵谷公推廣祀田遺意追逺則有拜墓有合祭合族則有族譜有聚拜迄今三百餘年祀田世守如初族雖散居昭穆秩然必不可亂邈在萬里相見相問外有骨肉愛不相視如途人是皆吾祖貽謀之徳與前聞人善述之功也惟祠堂未立合祭聚拜無定所議者咸病焉按家禮祠堂在正寝之東貞之居㕔事之東有堂曰遜緜凡十有八楹其深二丈有竒其袤稱之堂之前有軒軒之外有亭髙明深靚宜祠乃請掌記務本翁以為祠堂祠大時府君而下八世至十二世各圗分𣲖之祖止其有行誼有文學有爵位者特祠焉於是禹圭與翁之子繩祖第一圗孫瑛第十圗孫蘭復買田為洒掃修治薰燎之費自是合祭於斯聚拜於斯與祠田相為永久以卒前人之志先生幸一言以詔來者予既嘉仁逹之能世其學又嘉其宗之能念其祖竊喜載名姓其間自附通家之後有榮耀焉乃諗於衆曰惟大姓其祖必有隱徳非徳無以蕃無以著無以久久則我後人念之宜也念之念之奉其烝嘗云乎哉行其揖讓云乎哉思其人必繩其武食其徳必篤其慶父詔其子兄詔其弟以詩書禮樂為教以孝弟忠信為行逹則澤其民窮則善其身使國人稱願之曰幸哉有子孫若此祠堂之作為不虗矣詩云無念爾祖聿修厥徳秀川子孫其勉之哉時予宗方作祠堂於故鄉以書來告成秀川去予故鄉百里而近而祠堂之成適相先後於是喜徳之不孤也乃以斯言為吾氏告亦以告之秀川焉是乃通家之道也仰更齋記臨川先生扁安成劉氏讀書之齋曰仰更劉君方升屬余客彭斯文來求予記初方升之大父號更齋先軰鎦君耘廬記之故臨川先生之命齋名也寓其大父之號焉夫仰更之義始於子貢之言嘗意其當時必有所謂然日月之明未嘗息者也故人仰之於既更之後初不改於未食之前譬諸君子能存其心於衆人之中其或違而去之亦暫焉而已耳若夫本體之明則固未嘗息也余㓜讀孟子至庶民去之君子存之等章見其厯序列聖所為憂勤惕厲之事至於孟氏自託孔子之意上下四章脉絡相屬而其卒章乃言君子小人之澤皆五世而盡初若甚無謂也已而思之蓋以明親有盡而理無窮耳夫日月之不息其明君子之不失其初斯固天理之所以長存人心之所以不死者也更齋之取號於更臨川之益之以仰其㫖不如是與在禮有之先祖有善不知不明知而不傳不仁是責在吾方升矣知乎此更之流風餘韻五世而已乎劉氏自皆山翁友吾宗巽齋先生一時如西磵葉氏槐城李氏及清江之蕭氏皆山皆善之至方升克世其學殖亦為臨川所期待云吳氏觀樂齋記石橋介攸輿天水間有二郡文獻焉吳君明父之季曰禮遜堂而藻播而嘉禾者也弱冠捧檄司直鳳臺予漫㳺至斯邀予至其家見其翁季唯諾伯仲塤箎信乎其名下無虗矣所居西偏因山以為讀書之齋謁余銘之将以號焉乃命之曰觀樂其事則竊延陵季子之於魯也其義則以明君子之立禮所樂乎成於樂也記曰禮者天理之序樂者天理之和然聖人之於禮必繼之以樂者蓋禮有所不逹樂也禮有所不行樂也何謂所不逹何謂所不行位也者人不厭髙而禮辭髙不辭卑財也者人不厭多而禮讓多不讓寡渴也而禮掣之肘也不敢先長而爵也飢也而禮扼之咽也不敢先長而飡也如是則辭讓之不可長也勉强之不可久也廼為之樂焉融液其交際而辭讓出於欣然導宣其湮欝而勉强至於安然矣昔者吳之公子其有見於此乎季子之遜有禮烏可以勉强言也而吾知季子之觀樂所謂樂其樂者也遜行於其家而風動乎列國之觀聽遜得於所性而脗合於先王之聲容其南也某雅也某韶也某夏也是皆以雍容登降為樂而非以乖爭扞格為樂者也孟子曰樂之實樂斯二者仁義是也吾亦曰季子之於樂樂其禮也樂其遜也其樂斯二者而已或曰謂之觀樂可也遜如季子未易言也余應曰人能充無放飯流啜之心禮不可勝用也人能充無疾行先長之心遜不可勝用也而獨季子乎哉禮遜事親也恭從兄也敬務學也敏遇人也溫是殆甘受和白受采苟觀樂焉則豆籩於辟雍則冔弁於曲臺矣小之不有得於美哉渢渢之魏乎大之不有得於美哉泱泱之齊乎則余之名齋也而豈徒哉而豈徒哉芳林記宜春郭廷秀世儒家子也因其所居之地名著號曰芳林屬予族兄宜翁求予為之記予復之曰蘭生深林之中未嘗不自閟其芳也人以為有國香而服媚之蘭欲自逺於當時其可得乎君子修其身於暗室屋漏之地而聲流於四方萬里之外亦豈所願哉且夫芳林者君之所以自况也余雖乏一日之雅而樂為君記之良有以也夫殆猶蘭處於僻而芳播於逺也雖然蘭或握以事上或佩以修禊而其芳烈之氣不改於深林豈非其性然與草木無情能一其性人惟有情鮮不汨性君子存之蘭荃同畦不混於植蘭鮑同室不移於染斯以異乎衆人也吾聞廷秀之風清白之操使一日而進諸市朝吾知其無愧於芳林也卓矣請以是為記圭齋文集卷五欽定四庫全書圭齋文集卷六元歐陽𤣥撰記分宜縣官題名記分宜縣袁上邑置逹嚕噶齊縣尹丞主簿尉各一員尹以上省選丞以下部選起至元十三年丙子迄今至正二年壬午六十又七載仕於斯者接踵而邑未有題名浚儀趙君思順以世家文獻來宰斯邑二年官政修舉乃考索故府得前尹名氏到罷歲月悉登載諸石𤣥適訪族邑鈐南防里屬題其端以告來者𤣥嘗謂題石之設官署皆有之本非以為勸善也而其道寓焉士歴官服采人品不齊上焉者不恒有下焉者無庸言中人苟且之政十居八九其志皆為三歳終更身去是即已殊不知身去而名留臧否何可泯也使能以是而存諸心則知官之為恫瘝也久矣雖然謂其身去而不之䘏者非才而闇於事者也求為有名至於生事以厲民者有才而過乎中者也𤣥既為題名有勸善之道則不敢不著近名之弊以為戒趙君為我刻之後之覽者有以自省則吾鈐岡之人繼自今受亷勤之賜而被愷悌之福於無窮也分宜縣學復田記昔前宋咸淳癸酉分宜民曰宋應槐訟其鄉有田稱梁子思所置立户為萬壽菴長明庄者崇法院僧正冲之所作偽也宋田令寺已有常住田不得買民業冲違法私買妄稱梁氏所置故應槐發之漕使鍾某閲實據法罪冲等而沒其田以畀分宜縣學養士士刻石為記其文載縣志甚明越三年宋亡分宜内附其田租歳入學廩前後凡二十有八載大徳己亥庚子縣學直學鎦應丑死其子自昭受崇法寺僧錢盗以本學砧基簿賣之由是僧恃力奪田學雖有文移在官求與僧論直而儒多寒酸學官滿三歲率去力莫能競僧挾其有餘之資又歳收所奪田租以助其力故訟連年不决延祐間江西僉憲薩勒迪黙色按問至邑攷覈始末以田歸學僧又爭之既而奉使宣撫及江西行省理直如前田復歸學僧徳旻者往愬宣政院院逹之都省省循例移行省體勘其是否行省檄下袁州路路以其事付錄事判官克哷决之克哷惟僧言是聽僧又誘刑餘之人冐儒名者曰宋應祥赴官誣伏怯烈輙以學田歸僧公論咸不直之學乃有詞展轉歲久本路専委縣尹趙侯思順研究尹詣田所集耆老佃人詢知固學田也會宋應槐子從吾出前主學徐祺印信徴租之文以為左驗先是自昭盗賣學籍於僧學無其副田之條叚四至無所於考至是得從吾之文疆界瞭然尹乃周諏密訪備實上於路議以田歸學路質於憲僉憲巴延適按部力主其議憲掾某相之路推官鄭時中又屢言之尋得行省儒學提舉范君匯悉以其實告藩垣大臣咸直趙言遂以田歸學如初寺主大有坐是爭亦敝罷歸咎始謀赴官入凖伏状願遵分宜縣所斷以田復分宜縣學為業第數内有水田四十畝及山園地大有舊所佃者乞减輕租額仍付耕種歲輸學租尹再三審之以其親書入案而徐議其所陳乞於是四十餘年之訟一日而絶諸儒礱石請文以記予乃大息而言曰天地間物人各得主其所有者以時王之法為可恃也在法可則物已物也在法不可則非己物也僧違法而田歸官則田非僧物矣官以田與學學受田於官非受田於僧也神聖受命易世凡前代之所予欲亦惟其是之從耳世祖皇帝在位崇儒之詔累下其以膳學錢糧為養士之資者既久則分宜之學田實在其中矣成廟即阼又明有諸人母得侵占學田之㫖由是考之分宜縣學之主是田也在宋之日甚淺在皇元之日甚深由丙子内附至於庚子二十五年間田固學有也僧於斯時未嘗起而爭之也直至劉自昭盗賣砧基之後始生詭謀則其枉直較然易知也已國家近年田令民間田宅僧道不得為隣不為隣者不使買民産也後至元以來又著僧道買田之禁使正冲私買在今日之法亦豈得為寺業乎嗟夫士四民之一僧亦自民出者也王官奉命以司王民之直於斯二者豈容心於其間哉事枉則必復事直則易斷趙侯之明能信其直故無疑也田在儒林鄉土名良歩等處計一頃二十三畝三分六釐歲入租七十三石二斗一升又有一山園地計五頃四十三畝一角亦在其處云是役也儒之宣力者曰某特附著於斯求志堂記安成彭君自堂名其讀書之所曰求志二季㓜學尊聞以文來贄而謂予曰先君子作求志堂而有齎志於斯者以未有記也願為我成之予乃記之曰隱居以求其志行義以逹其道吾聞其語未見其人先儒釋之曰求其志者守其所逹之道逹其道者行其所求之志唯伊尹太公足以當之其次則顔子庶乎此而未及有所行故夫子為是嘆也以是言之大哉翁季之名斯堂也夫雖然昔人名斯堂也非不知人之以㤗議我也王子墊問士何事孟子曰士尚志及問所為志則曰仁義而已矣伊尹太公顔子之三聖賢亦豈能外仁義以為志乎故士志三聖賢識者猶不可謂泰未聞志仁義而議其為泰者也予嘗憫夫世之人求在外者求不必得而鮮有憚於求者何其多也今賢翁季能求在我者而已又何泰堂俯廬江揖孤山偭安成郛前有樓扁清髙有亭扁會文又有楹臨池曰知樂足領一郡之勝斯則自堂所以遺其後人為藏修㳺息之地者也世綵堂記渌江廖氏自其先代積善於家施恵於鄉世保醇徳居多耆年至宜山府君子孫衆多茀禄豐腆晚歲康健身享榮養歲時上壽綵衣成行才俊疊見里人榮之因取宋名臣廖剛用中甫家世綵舊號為其堂扁余家距渌江數舎雖未獲升世綵之堂而先内翰於宜山公友契兩家子弟往來稔甚有名士元字泰福者廖氏之令器也謁余以斯堂之記余惟世綵之得名自老萊子為嬰兒之狀以娛其親始余嘗評之老萊子愛親之心純一無偽一時感觸發不容遏故忘耄耋之齒服斒斕之衣追童乳之態以冀其親萬一之歡在其當時已非不知親非不悟二者之天相契深愛其所為喜蓋有不期然者不然一時嘻咲之適何能使人千載之下想像而稱道如是其盛耶在禮子事父母之飾剪髪夾鬢親在子雖老不敢去之不敢忘赤子之初也深衣之制具大父母父母衣純以繢然則老萊子之綵容或上古之世有父母者之常服歟戲之為言将以取鷇等事而云耳雖然吾於此有以語廖氏子弟矣孟子曰令聞廣譽施於身不願人之文繡也君家用中甫之為中執法也守正不阿名震逺邇當紹興時其曾大父母年九十竊意髙堂垂白之親見其曽孫負一世之名公退委蛇偉然羔羊素絲之風志夫南陔白華之養其為世綵也斯亦大矣古之孝子出而治官入而治家周旋進退于夫婦昆弟朋友宗族鄉黨之間如執玉捧盈惴然自持者無往而不為事親之地也親之可悦與否非敢計也求無怍於已庶無怍於其親矣吾願廖氏世世子孫之升斯堂者推是心以為立身顯親之道焉雖中執法之事業可能也豈獨踵其美名而已哉國家混一初年宜山公以薦受宜山縣簿尉壯歲勇退不仕近年賑饑募民入粟補官公發數萬貤爵不受朝省旌表其門又為義廪凡宗族親戚及里之貧者婚姻䘮塟輙助其不及殣無殯者為棺以給之割田數百畝為義舎百區以館從學之子弟禮聘名士以教之余嘗為之記平居奉已清約遇人謙撝獨好施予如此子膺福號玉峯泰福號納菴伯仲皆肖其父生長華腴而能被服詩書殊無膏粱之習故所友多名士大夫其他子姓之賢者未能悉數云坦明堂記古杭山水之秀莫秀於屬邑之臨安蓋錢武穆王之鄉也其民多豪爽而俊邁章君子明居是鄉鷄山之陽胸次磊落所向通敏壯逰四方名士大夫樂與之交余近年因侍講楊廷鎮識其人於京師余老告歸瀏上逺來訪余曰昔也冠而字父兄命之曰子明拜而受之自是服行平生凡澷漶淟涊之事秋毫不敢匿於厥心以求無負於父兄命我以明之意今作堂於其家因扁之曰坦明願聞一言以自警余進而告之曰易有之乾以易知説易者曰人之所為如乾之易則其心明白而易知夫天之為道幽且逺也究其所以然亦惟坦明而已爾語曰君子坦蕩蕩君子之異於衆人能存乎天也故其類為陽小人不能存乎天也所以回互紏結闇昧嶮巇人莫得而測之故其類為陰豈獨使人易知哉在已亦易行也人已無忤焉往而不坦蕩蕩乎今子明志趍於明而心措於坦知先務矣守之以不欺行之以不息他日為君子之歸孰能禦之其别授之以辭辭歸而列之於坦明之堂以為記繼善堂記鎦性存者安成人也居鄉以孝弟聞客醴泉十餘年士君子咸尚其信義頃因其友浙人章子性明來求余繼善堂三字既而求予文甚勤予得無言乎夫孟子言性善至矣盡矣易大傳言繼之者善也成之者性也詳其㫖意性未賦予以前善已具於是乎蓋易言一陰一陽之謂道具於陰行於陽繼言行也陽之所施凡見諸萬物發育之功者無非善也萬物生而是理賦焉受是理以生者斯之謂性成言具也道具於陰行於陽知斯二者之蘊則造化之能事畢矣是故善即性性即善繼之者此善成之者亦此善也人能明其善以復其性則抱負二氣以為人可以無愧於兩間矣乎吾聞安成醴泉皆多明經之士而性存儒家子其以斯言講求之精道堂記吾宗性翁居安成郡北之鳳林實安福府君之五世孫逹明處士之裔世次於兖文忠公擘𣲖為近十有一世府君號精道居士父子祖孫相繼科目一門凡五六贊府嘗即舎傍别作新居以處伯子攸縣丞季子平陽縣丞自於故居作一書院名曰精道堂與仲子光叔子幹居之世代變遷子孫榮悴不齊幹之後有委棄其先業者於是堂之基址兼并豪家鞠為榛莽性翁於是又八世孫奮自樹立慨然復之尋得尚書謝公艮齋故題堂扁乃除故址作㕔事一重樓一重堂一堂之北楣揭精道堂故扁既而具始末謁文宗盟以訓後裔余辭不獲乃記之曰在易有之日往則月來月往則日來寒往則暑來暑往則寒來陰陽屈信以成萬事萬物之變何有紀極也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也斯又吾身之所為屈信也堂在居士之身信也久矣屈於中葉性翁信之繼自今居斯堂者亦惟修人事之有恒以制氣化之靡定可也惟能内外交養則精義崇徳之為屈屈可進取致用利用之為信信可長守矣嗟夫精之為言察乎理欲之㡬順理者無不裕從欲者無不危裕則堂日以興求去夫從欲之危耳為吾精道子孫尚勉之哉堂作於至元後戊寅之十二月壬子成於己卯之正月辛未遂遷居焉至於庚辰子舎連舉二雄陽類之信自此乎始故特記之讀書堂記廬陵永和蕭尚賔為醫十有一世能根柢儒業非但縁飾表襮而已也六世祖子信能屬文善胡忠簡公公予田贈金辭薦以官又辭問所欲則曰富貴非所願但得世世子孫讀書立身以廣活人之功則亦足矣忠簡笑曰君所謂薄於利而厚於徳者乎書讀書堂三大字以遺之使以朂其後人焉至其大父震甫號竹軒又繹其説曰醫道由儒書而出非精於義理者不能舎儒而言醫世俗之醫耳尚賔之父徳祥乃拓室之東偏作讀書堂揭忠簡公之扁以志其先訓焉尚賔㳺京師具顛未謁余為之記夫儒者讀書以正心術為務醫者讀書尤以正心術為急心術正則學術亦正心術偏則學術亦偏正則人受其賜偏則人與已皆為所累矣近世儒家子孫往往擢科第人以為有陰徳行斯陰徳自心術始故為蕭氏願之聽雨堂記人生俯仰穹壤間耳目之所觸心志之由生士君子仕而慕君則見日而思長安出仕而思親則見雲飛而思親舎索居而思朋友則見明月而思故人兄弟友愛一日而逺别則聽夜雨而思同氣近代眉山蘇長公送弟子由之官有夜雨何時聽蕭瑟之句後世弟昆之在宦逰者往往諷詠而致思焉安成大姓周君士能生以遺腹其兄士𢎞亦六周星而孤㓜同艱貞今也競爽皆以儒弁服綵明時士𢎞今龍南縣大夫士能今南豐州幕官子叔量又辟為公府掾一門宦業鼎盛而南北相望道逺時時追懷少年之况味真有蘇公之所深思者乃作堂於家扁曰聽雨以志毣毣焉先是士𢎞有樓曰歸雲余嘗記之至是叔量致尊公之辭請記斯堂以文嗟夫君也親也弟兄也朋友也人之於綱常一也日也雲也月也雨也人之於見聞一也其感於外而動於中有淺深焉此士君子之所存異乎常人者也雨注於霤其聲鞺鞈滴於階其聲淅瀝馳於竹松其聲屑窣春而聽之有發生之意兄弟之和氣怡愉以之秋而聽之有寂靜之容兄弟之神凝慮逺以之所以然者豈有外至哉予同母兄弟五人今皆黄髪之叟予晚廹召命力疾而至京師因叔量之請蓋諗知聽雨之状而能述以言者焉遂以是記霞外菴記宇宙間雲霞雨露同一氣也而有别焉雲陰霞陽雨露生物為陰中之陽霜雪反是以能肅物也今夫朝霞雨徴陽亢盛足以變陰陰則雨矣暮霞日徴陰盛猶不足以勝陽詰朝其出日乎道家有大霞之號即純陽之異名也是故其珮曰飛霞陽精騰上佩之可歩景矣其食曰飱霞陽氣充實食之可却粒矣道士亟取於霞蓋如是與壽昌觀周允中鍊師作菴名曰霞外謁余文記之因與論陰陽之妙且慨夫田野作勞之人朝夕而候雲霞詎知陰陽之理有如是哉若允中之謂外意其别有超然之識離於二氣之表者斯則方内之士何足以知之永思菴記永思菴者安成王君宜逺廬其親之墓而作者也宜逺之先君子是為梅邊先生梅邊初入太學尋丁外艱自以不得與大人永訣終其身不願仕奉大夫人至孝三十年不懈大夫人亡廬墓者三年孝感昭著宜逺天性純篤才氣超邁被先生身教世以孝行聞鄉里先生疾晝夜扶持衣不解帶者二年先生殁慟至嘔血㡬絶乃蘇既塟結草如繭寢處墓左哀至悲泣苫草為腐風雪豺虎不避久之母命再三乃歸服闋猶不食醯醬蔬果今宰木已拱言及其父哀如初䘮毎食稍甘必遣人馳奉墓所歸乃就食里人表其阡曰白華所居曰永思然皆非宜逺意也其友劉君省吾來京師具言永思菴之所始謁余記之予之在京師也四方之士來謁為其父兄求記其樓居齋室者蓋多若永思菴者則友人懼其行之無聞於世而記之者也孟子言五十而慕者於舜見之曠千百世而見一五十慕親之人至終身之慕猶推而知之則孝子之永思不既難乎梅邊於先君渤海侯為同舎而又同甲有通家之好感良友之誼記不得辭宜逺名留孫弟初逺名壽孫孚逺名敏孫來逺名州孫學行皆能肖其父兄云臨溪亭記安成李君鼎翁好賢而篤義里大夫士樂其善而親其賢而鼎翁又能同其物外之樂固自樂之存諸中者沛乎其有餘裕也家居枕溪水上作亭並溪以醉翁滁亭記語名亭書來暨圗屬予記余少年有山水癖壯乃為禄仕今老矣未能去壯之累而時有少之趣聞客談幽居之勝恨不欣然舎已而從之况見吾鼎翁之圗乎何時與臨溪分坐俯闞清流毛髪可鑒潛鱗游泳不避人影清風舒徐漪漣回旋悟溪之有文也霜瀨激湍石齒玉雪喜溪之能聲也摇琴而歌曰溪之水深且清兮我濯我纓溪之水清且深兮我濯我心纓有塵兮尚可心有累兮溪將無以澣我外潔靜兮中明娟我與溪兮各全其天歐公為此文時余扈從上都歸則公已謝疾去明年十月鼎翁之子本禹求予書歐公年未六十欲分臨溪之樂予垂七十而書此可愧矣揭傒斯識竹西亭記安成郡南劉君定宇强仕之年蔚有雅操即所居西偏闢圃作亭圃有林竹内翰揭公因名其亭曰竹西定宇又因以為號聞予至其里中遣子仲炯謁予為斯堂記因思昔人之名宫室往往指實而已爾或識其耳目之所接或識其時序之所遇或識其面勢之所居魯之壇曰杏齊之宫曰雪東觀曰東南門曰南比比皆是後世務加美名古意泯矣善哉揭公之名亭亭在竹西據實而已爾且詩六義興多於比記竹西亭類曰主人清脩盖取諸竹主人疎直亦竹是取竹與主人雖或不辭譬如燕相得韓相書言舉賢治國治則治矣如本指何衞淇澳之詩固美武公其言菉竹不過興爾所謂猗猗青青果何預於瑟僴赫喧者乎説詩者不以淇澳菉竹為比吾記定宇竹西求詳於竹殆不可也定宇盛年進懷用世之志則有幹蠱之子可任以事務退為山林之趣則有嘉遯之地可怡其性情斯則作亭之意不可不記也是為竹西亭記其樂亭記宜春士駱秉哲名其燕憇之亭曰其樂吾兄南翁嘗館穀於其家以秉哲之意來求文記之予謂昔之君子於其藏修游息之所有所懲則名有所慕則名惟有所得以名斯志喜也其樂云者孔子以稱顔子者也近代周茂叔教程伯淳兄弟尋仲尼顔子樂處所樂何事聖賢言樂率皆引而不發欲使學者自有所得爾未得而尋必有其方也已得而居必有其處也樂不可以言喻而可以學求處不可以力到而可以學致故非學無以知方非得無以知處秉哲從事於斯久矣今以著名其亭從可知矣乎予謁告來歸亦思從容名教之樂何時徑造其樂之亭從主人問其樂之處也圭齋文集卷六欽定四庫全書圭齋文集卷七元歐陽𤣥撰序防里歐陽氏族譜序歐陽氏之初望出兩郡千乘中絶今存者皆渤海裔也其譜牒視他姓氏宜為易考又自唐以後譜學乆廢我文忠公最先倡之其譜牒視他姓氏宜為先備今或不能然則以子孫衆多轉徙不常也吾家自趙宋淳熈丁酉髙祖八府君自防里遷瀏之馬渡曾大父宜軒先生自馬渡遷長沙大父澹軒先生及先太常渤海伯復居于瀏聞八府君在時間嵗一至防里由曾大父而下仕學四方至者盖鮮獨幸我族屬不可鄙夷而得叙其世次焉頃予在朝防里族兄竒翁先生遣姪勞予京師去年謁告南歸又勞予于家且囑叙其譜焉余方約為譜亭之行當得備詢而悉載之未幾予環之使至是以不果來也因念吾宗之盛儒者又多譜或不一致貽先正巽齋公之恨然以予今日之事觀之又何恨乎昔人耶雖然族譜之作將以重倫紀厚風俗使其子孫知源委之所自足矣必求如唐人之譜學自受姓以來皆有可考則固有難者矣無已則用吾文忠公之法姑叙防里之近者焉則庶乎其可訪求也譜留予所半載迨將北行乃叙而歸之竒翁以俟他日彭氏族譜序分宜彭氏其先東漢長平侯宣居淮陽傳九世至北齊陳留王樂居安定又八世唐禮部侍郎景直居瀛州子構雲避天寶之難遷江右傳四世為安定王玗居廬陵玗兄弟五人為太尉者四子十一人人皆檢校太傅太保六曹尚書諸鎮刺史孫二十七人相繼登進士第為顯宦五世孫嗣慶復遷分宜縣南之珠溪今珠溪族甚盛或隠于林麓或顯于王門卓犖豪傑世不乏人或明經而修進士之業者殆不可量予嘗讀彭氏家傳王雄據一方士馬精銳數與淮陽爭衡湖南馬楚為之請于後唐錫爵崇貴迹其材智英毅豈下五季諸雄哉惟能自處冲抑不竊位號故其子孫衆多美譽不墜此殆鬼神之福謙者歟傳又言王享年九十有八繼學不衰子弟從授二戴禮及春秋者千餘人非有絶人之資不至是也抑彭氏世有聞人爵為侯王長平侯以文學陳留王以武功安定王資兼文武繼自今為子孫榘矱先訓箕裘先業文武以應國家之需則是顯融者豈有既哉珠溪之彭吾防里之歐陽族望相同婚姻相繼故叙是譜不辭白石周氏族譜序六朝以來家有譜系之學又有譜系之書隋經籍志載天下郡國族譜若干卷吉州譜八卷洪都袁州稱是江右諸郡詳他郡也唐世此學此書盛行五季淆亂四方割據馬殷在湖南獨能輕徭薄賦又招納賢者故中州名家士多歸之後以希聲兄弟争國士稍稍散去今觀廬陵周氏族譜言其先世避地江淮丁馬氏亂復徙金陵盖唐末自中州依馬氏及亂而遷此亦當時之一族也但譜云江淮當作江湖殷境土未嘗及淮考之馬氏失國既乆南唐始亡周氏府君羨仕唐至僕射理宜然也由僕射迄今冠盖不絶屢遷而不替則周氏之徳其盛可知矣孫名師韓者有志於譜乆備録而刻之猶子諒以刻本至京眡余求志其帙夫譜學廢譜書亡已乆余何幸見古道於周氏然余嘗以杜君卿作通典時譜書具存而杜不紀録為可恨今則無所於購矣適承勅修經世大典偶見周譜因附著予感於斯且志吾廬陵之人尊尚氏族其來甚逺也後林周氏譜序廬陵周叔量以其族譜謁余序其端予序南北大姓多矣求其自受姓以來世系不絶厯厯然可考者鮮盖由世變相承或斷續於南北六朝之離合或散逸於五季列國之紛争往往而是也唯代有聞人出而振起之及有卓識之士當世變之來善擇地以處則族可至不絶譜可至不隳也予觀周氏始遷周原迨漢之爵徹侯者有其人又降而為魏博士厯晉至北周為長安之周其盛涉隋至唐中葉府君璟顯融于時至四世威遭世有難避地金陵五世矩事南唐為御史晚愛廬陵山水之秀可居遂依郡公楊竦而家焉即今之西昌宋初有曰史館學士有曰光祿僕射皆傑然表於其族淳化而下宦業日盛朝廷賜其所居里曰爵譽六世倩又嘉安成泉石之勝曰後林而徙居之内附後子孫亦能輯其前聞由是詩書之澤與爵譽相輝暎盖九世于兹矣叔量受知當揆被選為公府掾會有特㫖省臺通用南北士遂應令首為御史臺掾遷臺照磨進中書檢校官因思近代名公卿有自以先世或閾於偏方不獲有聲於中國及貴徙居中州頗為士論所少今觀叔量之際遇則為子孫相攸唯當以山水風俗之美若地里之僻左自當遇大同之世推一世之公也雖然居者種徳以芘其後行者畜學以發其身亢宗之道在是而已爾叔量名浩學行偉然時譽歸之後林周氏之復盛其昉於斯乎廬陵中州劉氏族譜序前代藝文志載郡縣氏族書甚多士君子若唐路氏宋吕氏明譜牒之學學者亦不乏人近世氏族書散失士於譜學無聞中州故家屢更兵燹仕者投牒天官曾大父大父或犯其諱其族譜可知矣江南内附多不煩干戈承平既乆冠盖之族幸遭明時涵濡深仁往往治其家譜不知者以為一家之私事知者則以昇平之氣象可觀於此至正壬午十月余訪族就醫於宜陽道經南泉與中州劉君西巖及宗海會于山中出其所修族譜眎余徵余叙其事廬陵劉氏之顯者獨多於郡中州族自廣平來始祖紹聞府君傳至今厯十有七世詩禮相仍簮紱相踵試閱其編支分𣲖别昭然在目西巖宗海二君之用心可謂勤矣予族宜陽而家瀏居間屢欲訪族而阻疾聞族有善醫往即之中途見劉氏族譜私竊自喜知吾族之必可訪疾已者幾半故因其請而樂叙其帙端紹聞歸宋積官運使其子有與金陵李氏姻戚者盖大姓也其詳見王城山先生及宗海自叙云國朝名臣事略序應奉翰林文字趙郡蘇伯修年弱冠即有志著書初為胄子時科目未行舘下士諅言詞章講誦既有餘暇且筆札又富君獨博取中朝鉅公文集而日録之凡有元臣世卿墓表家傳往往見諸編帙中及夫閒居紀録師友誦說於國初以來文獻有足徴者彚而輯之始疏其人若干屬以其事中更校讐櫛去而導存抉隠而蒐逸乆而成書命曰國朝名臣事略他日余與伯修同預史屬從借讀之作而歎曰壯哉元之有國也無競由人乎若太師魯國淮安河南楚諸王公之勲伐中書令丞相耶律楊史之器業宋商姚張之謀猷保定藁城東平鞏昌之方畧二王楊徐之詞章劉李賈趙之政事興元順徳之有古良相風㢘恒山康軍國之有士君子操其他臺府忠藎之臣帷幄文武之士内之樞機外之藩翰班班可紀也太保少師三太史天人之學陵川容城名節之特異代豈多見哉至於司徒文正公尊主庇民之術所謂九京可作我則隨武子乎乾坤如許大人才當輩出伯修是編未渠央也姑志余所見如是云廬陵鎦氏通鑑綱目書法後序昔司馬文正公變紀傳為編年作資治通鑑朱文公稍變其法且寓所去取焉是謂綱目讀是書者夫人以為春秋三傳之遺意也夷攷文公生平於易詩書禮或自傳註或屬門人皆有成書獨春秋缺焉至胡氏傳又􅉨􅉨信未之確然則綱目何為而作耶盖嘗求之春秋者魯史舊文說者謂直書其事美惡自見初未嘗拘拘於義例者愚盖不敢必以其言為非也若司馬公則志存鑒戒已見於著書之名而予奪權衡時有所憾文公患之故有是作焉初意固有間矣書王宗周天下是時有與周同稱號者乎黜魏帝漢有說也乾侯之公在是也房陵之帝王乎帝乎故知是書於春秋所以異之跡則知所以同之㫖矣推二大節引而申之書法斷不誣矣近時儒者疑為文公未脫藁之書或疑為門人之作皆未究所以作綱目之志云爾廬陵鎦先生研覃於是三十餘載比辭而覈研推事以求度綱舉目張如指諸掌曰通鑑綱目書法亶其嚴乎余從友人鄂省宰屬馮君子羽得而讀之三復歎之曰春秋微公穀啖趙諸說猶可綱目㣲鎦氏書誠不可也何時歸青原故鄉願即先生一二而揚確之姑志余說于帙末忠史序忠者盡己之名也天以事物當然之理賦於人人盡其所當然者而無憾焉是之謂忠今語人曰臣事君以忠與忠恕之忠同則莫不駭然以為非而實然也或曰臣盡臣道於君忠矣子盡子道於父何獨曰孝乎曰不然也禮記所謂内盡於已而外順於道忠臣以事其君孝子以事其親其本一也此即吾說也然則上盡其所當然於其下其名曰何曰盡有不敢不勉之義上下之間必有别也故盡之對為推即恕矣程子嘗謂忠恕一也事上之道莫若忠使下之道莫若恕後儒疑之未喻此也人生而静動與物接即有盡已推已二者出乎其間識者知其然固無一息而非吾效忠之時也是道也所以事君所以事天詩曰昊天曰明及爾出王昊天曰旦及爾游衍亶其嚴乎番易楊𤣥翁有見於此矣大父通守左軒先生當宋季官守以正直聞臨難以死節著𤣥翁慨慕先志作忠史十餘年成書於是上下數千年臣子大義粲然畢具㣲而一言一行苟無愧於盡已者悉録之又微而裔夷小邦婦人女子之操不遺也又極而心跡形似之間皆有以覈其實是非瞭然不繆於古人何其至公而當也嗚呼自忠之說不明士大夫平居無涵養省察之功蒞事無鞠躬盡瘁之志立朝無直言極諫之風至於臨難死節能保其必然也耶嗚呼宇宙間此道明即天地變化草木蕃不明即天地閉塞賢人隠甚可畏也余為國子博士時職當校獻書既表章之猶恐𤣥翁著書之志未白也故述忠說於斯嗚呼是書果行於世也夫書之幸也夫世之幸也夫虚籟集序古人之詩被之絃歌其入人之深猶有待於聲今人之詩簡牘而已或一字之工一言之妙真能使人心存而不忘以是往往知音於千里之外會心於百世之下求其所以然而莫知孰使然非天乎愚讀秀江縣春洲詩清曠簡逺擬古精到有韋栁風而自名其集曰虚籟嗟乎瓠者吾知其為匏筩者吾知其為管今吾與春洲神交㝠漠於不識不知之鄉讀其詩愛其人吾不自知吾為何心此盖南郭子綦之所為隠几者耶抑又聞達人之詩猶治世之音人未達世將治有識者察焉天地間有無相推虚實相感聲之妙萬物者其在乎此孫君勉乎哉吾有以知君矣題而歸其詩至正條格序至元四年戊寅三月二十六日中書省臣言大元通制為書纉集於延祐之乙卯頒行於至治之癸未距今二十餘年朝廷續降詔條法司續議格例嵗月既乆簡牘滋繁因革靡常前後衡决有司無所質正往復稽留奸吏舞文臺臣屢以為言請擇老臣耆舊文學法理之臣重新刪定為宜上乃勅中書專官典治其事遴選樞府憲臺大宗正翰林集賢等官明章程習典故者遍閱故府所藏新舊條格襍議而圜聽之參酌比校增損去存務當其可書成為制詔百有五十條格千有七百斷例千五十有九至正五年冬十一月十有四日右丞相阿嚕圗左丞相伯勒濟爾布哈平章政事特穆爾達實恭布巴勒納琳巴延右丞相吹斯絅參知政事多爾濟巴勒等奏請賜其名曰至正條格上曰可既而群臣復議曰制詔國之典常尊而閣之禮也昔者周官正月之吉始和太宰而下各以政教治刑之法懸之象魏挾日而歛之示不敢䙝也條格斷例有司奉行之事也甫刑云明啓刑書胥占其所從來逺矣我元以忠質治天下寛厚得民心簡易定國政臨事制宜晉叔向所謂古人議事以制之意斯謂得之請以制詔三本一置宣文閣以備聖覽一留中書藏國史院條格斷例申命鋟梓示萬方上是其議於是屬𤣥叙其首篇𤣥乃拜手稽首揚言曰人君制法奉天而行臣知事君即知事天敬君敬天敢不敬法書曰天命有徳五服五章哉天討有罪五刑五用哉易曰雷電噬嗑先王以明罰勅法又曰雷電皆至豐君子以折獄致刑二卦之象為電為雷所以明天威也繼自今司平之官執法之士當官蒞政有徴是書毋瀆國憲毋干天常刑期無刑實自此始亦曰懋敬之哉奕序古者人生入小學比及弱冠而禮樂射御書數六藝之事已徧習矣他日因射之餘意為投壺且寓禮焉因數之意為奕且寓智焉其初皆足以養其良心而合乎張弛之道者也投壺之說見禮記奕之說孔孟嘗及之世傳堯以丹朱少智教之以奕雖未必然然奕有算法存焉足以導智容有是也今小學之教乆廢而二事以為伎精之者往往名世焉廬陵嚴徳甫善奕初集奕法為書晏文可故家子也乃以家藏諸譜又増益之奉禮青城楊君以書來為之求叙將鋟諸梓以廣其傳予性狷且拙少賤力學乏暇於琴於奕皆懵然每為大夫士所哂楊君之請愧不能言奕之幽眇以答之姑叙其所知者如是考古臆說序昔誠齋先生解易取史事以證爻辭安成李廷傑上書取史事以言時務皆能極事變而盡物情非特足以垂來世之戒推而行之有足以救當時之弊然非學博而義明焉能援據如是之精覈論著如是之詳切耶舉子學䇿套於燈窓求籠主司之問立志已在於進取為論何恠於迂疎廷傑此作志在祛時蠧而起民瘼豈切切為功名計耶宜其剴直而無諱明白而可行也閑中閱此知山林中有識時之俊憂世之士如廷傑者第未用爾用則於斯民豈無所裨益乎鈐岡續志序郡縣之圖志何為而作也國有賢守令猶家有賢子孫守令保圖志以治分地子孫保闗劵以治分業能治其所有即為賢矣因田野之有定界也而考其有汚萊者乎因户口之有定數也而考其有流亡者乎因賦役之有定制也考其在公者有湮沒乎在私者有暴横乎因士習之有舊俗也考其有可匡直而振徳者乎有可濯磨而作新者乎治之而無倦則田野可闢户口可増賦役可均風化可以日美人材可以日盛矣然則圖志可一日而闕乎分宜有縣起宋雍熈至南渡嘉定間謝令謀作縣志尋復不果淳祐黄尉始克成之混一以來更六十有七載浚儀趙侯尚之為尹百廢具舉乃作鈐岡新志以續前編書成適予叙族至邑南之防里侯以予於是邦寔多桑梓之誼以序見屬辭不獲則願以昔人治官如家之責告夫求芻於吾邑者庶知前人作圖志之意非徒以廣紀載備考訂而已將以為勤政之一大助也推本作者之意黽勉述者之事吾邑吾民其多幸矣乎風雅類編序風雅之道先王治天下一要務也風即風以動之之風雅即雅烏之雅以其聲能動物也本於邦國播於樂府薦於郊廟以考風俗以觀世道尚矣然惟其聲不必惟其辭故有聲而無辭者有之無聲而有辭者無有也孔子論韶舞本惟其聲武王所遭遇與舜不同世儒因其不同而優劣之未必聖人意也周衰風雅道熄既而聲音之學寖廢無已而求言辭之間則後世詩為近盖其志氣之盛衰意趣之髙下音節之淳漓於風俗世道猶有可考者是以君子有取也袁君懋昭作風雅類編介予宗姪貞為之求序見其凡例强人意甚多以世代次序此得詩譜遺法起四言至樂府止五言七言絶句論建精詳去取簡當他日書成於風雅豈小補哉余嘗典司太常又嘗出為觀風使者留意兹事而弗克遂偉哉袁君是編其為我趣成之梅邉先生吾汶藁序論人行事枚舉而稱之者其善為可數論人文章舉一以蔽之者其善為不可勝數也廬陵梅邉先生與先君渤海侯為太學存心齋同舍咸淳甲戌隨路混補入學又同生淳祐之壬子先君嘗稱其才器卓犖有往哲風運改世遷篤志稽古蘄為文章以見志予恨未及一識他日從其門人鎦君省吾得吾汶藁讀之至生祭文丞相文作而嘆曰嗚呼王鼎翁宇宙竒士也士之趣人以自裁者惟朱雲於其師蕭望之然望之特一身計耳鼎翁之為言為天下萬世之為人臣者計也嗚呼雄哉蓋嘗論之斯文者宇宙之元氣也幸而治平措諸事業則為典謨為雅頌不幸而反是則為春秋為變風雅為離騷然正人心扶世教之功難見於治平無事之時而屹然可仗於流離顛沛之日然後知斯文之所繫如是其重歟詩曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之夫天人維持之際惟是心耳何其深厚悠長之味溢出言表耶文武之澤在人其未泯歟鼎翁是篇與是詩辭氣雖若不同實相表裏愚故表而出之他詩文竒氣壯節類是環山詩藁序前年與族弟齊吾同客京華暇日相聚齊吾口誦近作予傾聽移日旅懷為之豁然今年予謁告還家復相遇於瀏東之沙江出詩藁示予佳句疊見私竊自喜吾宗之多文人也齊吾盛年子長之遊方壯涉歴日逺覩記日廣吟詠日富大編巨帙當自此始老兄退處畎畆凉竹簟之風曝茅簷之日思草池之句得新集讀之亦足以怡暮景矣三復玩味題而歸其帙圭齋文集卷七欽定四庫全書圭齋文集卷八元歐陽𤣥撰序玉振詩序安成鎦君玉振示予以舊詩藁佳句疊見而名其集曰進修余見而歎曰異乎鎦君之名斯集也夫進修之於詩岐而為二也乆矣殊不知詩固一技技進於道莫驗於詩修辭立誠詩非修辭之要乎胡五峯見朱文公萬古青山只麽青之句改賦之曰山中出雲雨大虚一洗塵埃山更好文公之學専務體用其教學者亦然豈必五峯而以此詩發之也如是則知詩為進修之助豈小補也哉玉振諸體詩能為麗則不涉輕儇求去陳腐不至峭刻吾又將於詩而得其人焉梅南詩序詩得於性情者為上得之於學問者次之不期工者為工求工而得工者次之離騷不及三百篇漢魏六朝不及離騷唐人不及漢魏六朝宋人不及唐人皆此之以而習詩者不察也髙安儒者曰易君南友恬愉清白之士也富貴利達不動於其中游行江湖以得句為樂故其為樂府為諸體詩往往出於性情之所感觸咸臻其妙然其學問亦足以副之二者雖未能定其優劣而集中之詩偉然固佳作也京師近年詩體一變而趨古奎章虞先生實為諸賢倡南友從虞公遊昔人云既見異人當見異書吾有以知其詩日進而未已也李宏謨詩序宋訖科舉廢士多學詩而前五十年所傳士大夫詩多未脫時文故習聖元科詔頒士亦未嘗廢詩學而詩皆趨於雅正舊謂舉子詩易似時文正未然也安成李宏謨彚所作詩以求序讀之終篇語多清新逈出時文舊窠誠可尚也抑國朝取士之文先尚雅與不知舊習浮靡故他所作亦然與抑亦治世之音流布樂府自是始與因序以志予喜李希說詩序予訪族安成多見佳士又多見佳作將歸得秀才李希說山中小藁玩之幾不能去手盖作詩甚難多作不可少作亦不可多作易强少作易艱二者皆不得佳句非句不能佳興乏佳耳境趣之生如不欲詩而不能不詩古今絶唱率由是得也希說此藁開卷第一首襍賦有我欲近自然物物由天成以是求句何患無佳句也予兹行喜見佳士佳句之多雖未見希說已見其人於詩何時當握手與共論詩之㫖鎦執中詩序鳴臯集者安成劉君執中集其所作之詩之編也集成屬予序其端予見其集中樂府精深諸體詩壮麗閒適信能以詩鳴者今人往往因人已然之窮達而求之於詩謂達者之詩從容而有餘窮者之詩戚促而不足殊不知豫之為卦逸樂而有餘者也鳴不當則凶謙之為卦卑下如不足也鳴而當則吉何有於窮達乎執中之鳴據其境趣之實發乎性情之真吾見其鳴之昌也中孚鶴鳴子和我爵爾縻之象上下感應同出一誠耳異時執中以詩鳴而名實相賔一鳴而聞于野再鳴而聞于天何患九臯之逺乎執中號後梅吉士之老成者云蕭同可詩序詩自漢魏以下莫盛於唐宋東都南渡名家可數而可恨者亦多金人疏越跌宕之音自謂吳人萎靡然槩之大雅鈞未為得也至元間山林遺老閒暇抒思之詠一二縉紳大夫以其和平之氣弄翰自娛於是著論源委益陋舊尚近時學者於詩無作則已作則五言必歸黄初歌行樂府七言蘄至盛唐雖才趣髙下造語不同而向時二家所守矩矱則有不施用於今者矣是雖辭章一變世道固可觀矣廬陵蕭君同可集所作詩成巨編屬予序之予嘗及同可論詩矣凡於晚宋氣格之近卑曲江製作之傷巧同可禁足而不渉是境也矧夫馳騖南北之餘攬燕代之雄傑睹京闕之美富亦既囊括神竒而用之宜其詩日造夫髙逺而未艾也雖然人之榮遇往往於是占之同可其自此升矣夫羅舜美詩序江西詩在宋東都時宗黄太史號江西詩派然不皆江西人也南渡後楊廷秀好為新體詩學者亦宗之雖楊宗少於黄然詩亦小變宋末須溪劉會孟出於廬陵適科目廢士子專意學詩㑹孟㸃校諸家甚精而自作多竒崛衆翕然宗之於是詩又一變矣我元延祐以來彌文日盛京師諸名公咸宗魏晉唐一去金宋季世之弊而趨於雅正詩丕變而近於古江西士之京師者其詩亦盡棄其舊習焉廬陵羅舜美以詩一帙屬予題其端讀之佳句疊出詩不輕儇則日進於雅不鍥薄則日造於正詩雅且正治世之音也太平之符也鄭箋言詩可以觀治道之盛衰豈不信哉楚與吳之詩不列國風而近世江表詩甚多他日寘諸樂府者矣月樓上人詩序余頃得月樓上人投摯五言長律一首思致清醇氣格深妥知其為能詩者及觀全集大篇短章亹亹佳作然則唐之九僧不專美於前矣士大夫非無能賦之才進有嘆老嗟卑之心退有啼飢號寒之累其不爾又有懷禄固寵之思憂䜛畏譏之慮昏濁其神志凋落其精華求其嗜欲淺而天機深與山間林下之髙士角一日之長則亦難矣是宜上人之精於詩也太息而題其帙端鄭以道文集序往年鄭君以道為廣右憲史請于部使者以一檄諭猺人數千出降列郡征戍一日而撤其民歡忻鼓舞沴氣頓息使者由是論功進爵後使者至復質往事知功由一檄謂以道曰兩江岑黄拒命兵乆不解始以舉措弗當貽畔至今若復馳一檄紓其抑鬱之氣示以禍福之機蠻亦人耳烏得不從使者又說命以道立草檄文遣辯士馳入岑黄洞中二䝤得檄感泣曰今日下情得上達矣乃問草檄者誰斯人得吾逺人情實如見肺肝請悔罪納土各遣子弟奉貢既達朝廷矜之為之賞賚有差後使者又以是峻遷於是言者謂賞不及以道不可代陳其勞天官為減一資厯而已余為大司成以道調官京師欲見其檄得其古文數篇甚佳而檄終不以自暴後自粤中見寄近制往往可愛今過宜陽以道司讞府中眡以行餘全集見其大小詩文雜著等作如師中丈人指撝集定士卒禀令退就行伍無不整娖又如瞽矇眡瞭逓其能堂上堂下之樂各得其正何其能官也世間不善遣文如不解事人作事位置失次令人悶悶以道諸作一一令人意强宜其能官也夫以道所至著稱㢘幹在宜春淑慝分明民有郛郭可謂賢矣三復詠嘆叙而題諸劉桂隠先生文集序廬陵劉桂隠先生以文集寄余京師余為之言曰士生數千載後言性命道徳如面質古人言成敗是非如目擊古人其間命意措辭則欲求古人之所未道而又欲不背馳古人其事可謂難矣或曰難可但已乎曰不然有一定之法而蔑一定之用者聖人之於䂓矩也有無窮之言而懷無窮之巧者造物之於文章也是故巧能為文章不能為䂓矩偭故常而為規矩者狂之於巧者也法能為規矩而不能為文章守故常而為文章者狷之於法者也今余讀劉先生之文温柔敦厚歐也明辯疎雋蘇也至論其妙初豈相師也哉又豈不相師也哉或曰妙可聞乎曰妙可意悟耳試從鎦先生求之盖有不可得以言傳者矣而况余乎雖然余所謂規矩蔑一定之用文章懷無窮之巧者庶乎近之劉先生文傳世可必尤長於詩詩五言古體短章尤佳因書以為之序族兄南翁文集序族兄南翁過余瀏上示予以文藁讀其文㢘靜而深醇是四辭者昔人嘗以稱人之有徳者矣今予以稱兄之文必有所見也兄抱道自足無求于時故形諸外者亦有徳之言乎吾江右文章名四方也乆矣以吾六一公倡為古也竊恠近年江右士為文間使四方學者讀之輒愕相視曰歐鄉之文乃險勁峭厲如此何不舒徐和易以宗吾六一公乎盖嘗究其源焉吾鄉山水竒崛士多負英氣然不免尚人之心足為累焉耳夫文上者載道其次記事其次達言烏以尚人為哉歐陽公生平於平心兩字用力甚多晚始有得前輩論讀書之法亦曰平心定氣人能平其心文有不近道者乎兄文㢘則不誇靜則不躁深則不膚醇則不靡尚願羽翼吾歐陽公之學以模楷後進之士將見江右之文章粹然為四方師表矣贈李敏求序昔者聖人之教學者不貴資質尚學問往往引已以喻人故嘗曰我非生而知之者好古敏以求之者也今世學者率以為聖人謙辭殊不知問禮問官入太廟之問孜孜焉實用其力又非特禮樂名物古今事變為然其曰吾嘗終日不食终夜不寝以思無益不如學也學何事乎禮義而已矣斯言豈吾欺也廬陵朋川李氏唐西平王之後也族多文人有字敏求者屢以詩義貢于有司聞余至安成族中介予族姪用賔以來見愧無以益也因即其字為序以贈之敏求將去復問曰敏何先曰君子欲訥於言而敏於行吾江鄉能訥言者恒少子敏於内請自訥於外始送虞徳修序天厯二年夏洪省馹使虞君徳修䕶送公賦來京師冬十月竣事復乘傳歸縉紳士夫賦詩以餞授余以首簡焉嚮余以諸生幸獲侍徳修之先君子蜀郡公於長沙今以文翰屬吏又幸獲從其仲氏奎章閣學士于朝寔有世契誼不得辭夫君子之從王事國爾忘家義也故天倫之樂與夫人爵之貴二者之輕重雖較然易知然求其合并亦人世之所難而造物之所靳也奎章公被天子眷遇待問宻勿其雅尚髙致固未嘗食息不志於江湖之上思從諸昆於山水之間以暢其平生達觀之懷而勢有不可能公亦豈得直情而徑行哉徳修乃能因王事之便以勞仲氏於數千里之外其樂之叵量此非可以言喻而増秩之華錫予之寵又適合并於斯時可謂盛矣夫奎章公辨色入直日未入三刻始退就舍然如司馬君實時其寒燠飢飽於其兄蚤暮不懈也今翩然以南意其出郭而送别登髙而望行遙見夫烏帽出沒於黄塵之郊此境此况昔人之見於歌詩者豈非若為今日賦者耶倌人趣行祖道有作請以是為序送鎦文廷之清江録事序安成士登第自鎦文廷始調清江録事得視牧守縣大夫為親民長官自重宜矣其行歐陽𤣥重告之曰周官司市掌市之治教政刑量度禁令今之録事治城市闗廂大畧相同而古今之制則不侔矣古者都邑如井田畫為九區前二區為君之宫之廟社之㕔治後一區為市左右三區為民居市别為四門日出而啓惟民得入焉盖二畆半在邑之農也其餘大夫七凡有爵禄者入市有罰所謂出一幙一帟一一帷之類是也内而天子之都外而諸侯之國同一法其君過市則有刑者赦所以别尊卑也古法簡古俗淳惡囂而抑末尚爾今夫録事所治則市人居民出入同其門綜理同其官而况百族之寓公四方之游士官府之府史胥徒兵戎之游徼以逮卜祝老釋之流又下而百技工巧駔儈負販奴客倡優淆處而襍由之如是而望其布治教平政刑一其量度禁令如古司市法不既難矣乎雖然儒者將為政必使沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙此亦其有道者乎或聞𤣥之言而笑之曰迂儒者欲驅市人而讀周公之法欲進録事而行孔子之政其可駴也特甚嗟夫文廷儒者也進士也𤣥語儒者語市人哉送翰林應奉李一初南歸序國家有科舉以來凡七科二十有一年第一甲寘三人三人者皆賜進士及第自元統初元之癸酉嵗始南士居第二人而膺是寵者自雲陽李君一初始以第二人南士初登第入官即得供奉天子詞林預典制誥修史事又自一初始是皆儒者之所難遇也故衆人之言曰天以斯文之澤鍾於一初者何其厚耶余之言則曰儒者積學發身可幾其或然也一初四親髙年居此重責而榮遇若此然後知天之以斯文之澤厚吾一初者又何其至也夫世之人有子若孫莫不願之賢賢莫不願之成至於希有之遇可必於天耶雖然一初得闕内補而需次再期將使之居則致庭闈之歡出則盡鄉里之情退而休焉又得以繹其所舊聞増其所新習廣其所積博其所施異時登進王朝將以究其所學於其所事是豈獨為四親之榮而已哉此固吾鄉之人吾黨之士喜稱樂道以致其勸相之辭者也送鎦仲宣歸隠東山序予甲寅乙卯間與計偕至京師時安成鎦仲宣為尚方太醫數被恩寵奏之輙効獲金繒之賜又嘗奉命乘傳至於大漠療疾藩邸有竒功受厚賞於是服餙鞍馬皆華好如素富貴人第見其負氣岸不詭隨又好摭難經素問幻眇辯詰同列以故同列往往病之後是三十年再會仲宣於輦下顔色蒼古而議論不衰袖中出東陽詩卷謁予贈言且謂予東陽者吾鄉之山名也山有林泉之勝吾雖居此將及三紀而逺引之志未嘗一日不在此山也先生盍為識之予復仲宣曰漢東方朔言金馬門可避豈必深山之中蒿廬之下予愛朔言大似有理士君子涉世以跡不以心故能無累於斯世朔譏猾傲睨處公卿間無所避忌雖待詔公車彼山林士孰能尚之哉仲宣躍然曰吾榮吾東陽歸有日矣聞先生言其能以留乎請書以為贈送鎦仲賔歸安成詩序延祐乙夘予初擢第國醫鎦仲宣訪余旅邸時醫道甚行方被恩寵但見論議辯說予􅐁無少貸心恐其不見容於同列也泰定丙寅余召入朝詢其近况衆醫曰仲宣謁告歸矣至正甲申余以總裁三史之命晚嵗復入詞林中仲宣亦至自南中比初鬚髪蒼白而不少衰後輩亦嚴憚之未幾從余求東山序浩然有歸隠之志公卿貴人偶有難已之病衆醫相視縮手思吾仲宣而不可得矣去冬予以病告老歸瀏上客有薦鎦君仲賔為予診候問之仲宣乃伯氏也其取藥服之無疑知其世醫為可托既獲其效尤敬其為人仲賔身居市肆而無商賈計利之心口誦醫書而有儒者救世之志是可尚也嵗莫别予還安成予賦詩贈之曰老病侵尋蚤引年命車先向里門懸獻方謾有求文客市藥應無買賦錢顧我燕毛慚晚進感君鴻寳試家傳青原舊友如相問雪夜時乘訪戴船顧不足以盡予托交之意也因為叙以送其行送伍成均南歸序昔子路言志聖門願車馬衣輕裘與朋友共敝之而無憾他日夫子稱子路衣敝緼袍與衣狐貉者立而能不以貧富動乎其中誦詩之不忮不求以美之二事正相表裏子路之所志即夫子之所稱也今世布衣之士好以惡衣羸服傲視簮紱往往援子路以為依據殊不知子路所言車馬輕裘則其平生服御未嘗不至於華且好也惟已之華好猶思與人共之雖敝無憾則人之華好在此無羨在彼無媢非所謂不忮不求者乎自世以科目取士士子得失之相形有大於衣敝緼袍與衣狐貉者矣安成伍成均奮起世科之後領薦於鄉試預貢于春官而以額溢小却乃能泊然不以得失入於其心是可嘉也矣嗟乎成均今日之偶失利不以人遺已為憂他日而遂得雋其思與人同其樂也必矣故以子路之言志亞於曾㸃之浴沂者告之且使其駸駸於聖賢之事當自此始也慶鎦一山八十序廬陵鎦公一山先生明年八十鄉俗於其初度之日豫致耄耋之慶子松州判官省吾適留京師將謁朝之縉紳士為歌詩歸以娱其親謁予為之序余謂省吾曰水陸之竒南北之産籩豆之珍脆筐篚之麗宻咸萃輦下君幸至於斯思所以為尊公壽者捨彼而取此何歟省吾曰不然吾聞君子致其愛敬於親養志為大口體次焉君何責我以口體之奉乎且口體固不廢也親志之所樂為之子者豈不知其所在乎此吾之所以有請於縉紳士也余謝前言戲君耳雖然當廣君之意以告同志昔者衛武公年九十有五猶諷其大夫官師日誦雅以相告戒夫衛公固以是為進徳之助然而音節之和有以宣其湮鬱聲文之美有以導其愉悅衛生延年之道其有以加於是乎詩曰為此春酒以介眉壽介之為言助也介必有祝頌之辭辭意而已矧歌詩者又有益於壽乎願以是為作者之倡云圭齋文集卷八欽定四庫全書圭齋文集卷九元歐陽𤣥撰神道碑元中書左丞集賢大學士國子祭酒贈正學垂憲佐理功臣太傅開府儀同三司上柱國追封魏國公諡文正許先生神道碑洪惟聖元度越千古世祖皇帝以天縱之資得帝王不傳之學上接伏羲神農黄帝堯舜不傳之統而為不世之君若魯齋許先生以純正之學下接周公孔子曾思孟軻以來不傳之道而為不世之臣君臣遇合之契堂陛都俞之言所以建皇極立民命繼絶學開太平者萬世猶一日也猗歟盛哉先生既没之三十三年為皇慶二年仁宗皇帝詔暨宋九儒從祀宣聖廟庭明斯道之所自傳矣又二十三年為元統三年今上皇帝勑賜臣𤣥文其神道之碑以賜其子師敬使刻之於是臣𤣥再拜稽首以復明詔曰論世祖之為君則見我元國家之初當真元會合之氣運故善言先生必以道統為先而後及功業則上可以稱塞聖天子命臣作碑之初意下可以厭服天下後世學者景慕之盛心也臣謹按先生家乗及嘗私淑父師者序而銘之以金泰和九年己巳九月丙寅生於新鄭邑中㓜有異質八歲入學從師問讀書欲何為師曰應舉取第耳曰如是而已乎師大竒之謂其識趣非常他日必有大過人者自顧章句儒非其師遂辭去年十餘有道士過見之驚曰骨清神完目光射人如箭苟非命世大賢即當神超八表人間富貴不足道也稍長嗜學如渴飢而精强絶人世亂家貧無從得書聞有善本冐險數百里就而錄之讀之有疑即能有所折𠂻歲壬辰天兵渡河為游騎所得其萬夫長酗酒殺人為嬉先生從容曲譬卒革其暴久乃信其言如蓍龜人賴全活者無筭萬夫長南征乃東去隱徂徠山遷泰安之舘鎮尋遷大名扁其齋曰魯世因號日魯齋先生國家既有河朔遣官分道以試選士中者得占籍為儒魏人力勸應試既中選留魏三年自挽鹿車載書還河内魏人致僕馬不聽入洛求第果得之自洛適魏聞河内政虐還止蘇門十餘年間雖顛沛流離行不愧影其與人交中剛外和一介取予必揆於義人與之居雖有忮求馴致俱化所至學者翕然歸之察其誠至乃留舘下既留誘掖忘倦身教屬屬言教循循於是師道尊嚴親友日至在魏友竇黙蘇門友姚樞相與論辨探幽析微詣者慴伏凡伊洛性理之書及程子易傳朱子語孟集註中庸大學或問小學等書言與心㑹於所從㳺教以進徳之基慨然思復三代庠序之法甲寅世祖受地秦中聞先生名遣使者徴赴京兆教授先生避之魏使者物色偕行亷希憲宣撫陜右傳教令授以京兆提學卜居鴈塔之東與同志講井田之制買園為義桑㑹得請還世祖即祚建元中統召先生為家教既至謁歸復召至上京入見上問所學以學孔子對留上所無㡬以疾還燕明年自上京兆數有敷對時相王文統用事而先生及姚樞竇黙日被顧問黙在上前屢斥其學術不正樞以才見嫉蓋竇言本出於先生文統亦頗疑之乃奏姚為太子太保外示尊禮内欲擯使疏逺竇姚拜命将入謝先生獨毅然辭謂二公曰禮師傅見太子位東西向師傅坐太子乃坐今能遽復此乎否則此禮自我廢也二公懐制闕下辭文統聞斯言遂寢其命改授先生為國子祭酒竇為翰林侍講學士姚為大司農先生亟辭以疾久乃予告還内既而上京使狎至應命至燕病弗能往至元元年自燕復還先是有詔即家為校以業來學乃躬耕里中未嘗以詔示人至是召入省議事旋踵求去丞相安圗來謁欲留之退謂人曰時流欲軰行許先生吾見相去千百尋有詔趣赴省遂北行見上檀州諭之曰安圗少不更事卿無負所學悉以傳之有嘉謀嘉猷語使入告對曰聖人道極髙逺學者所得有淺深然當罄所知如聖詔其所不知不敢强也安圗明敏有操守告以古人格言往􅉨領悟第恐有間之者則難行耳自是預大議時至都堂扈行上京咨訪日廣宿衞之士見先生入對舉手加額相慶曰是欲澤被生民者上疏陳五事曰立國規模曰中書大要曰為君難曰農桑學校曰慎徽典禮累數千言讀奏未徹上久聽微有倦色先生即斂袵求退上肅然正襟危坐先生乃再讀讀訖上嘉納之其餘論諫多削其藁世罕得聞有頃辭疾聽五日一詣省賜西域名藥善酒俄許其還繼召與太保鎦秉忠左丞相張文謙議朝儀官制多所詳定阿哈瑪特請建尚書省總六部與中書省角立特用先生為中書右丞先生求面辭不得見者再越數日奏所議事畢自陳曰臣有三宜辭一非舊勲二蔑文徳三所學迂恐於聖模神筭未能盡合上曰用卿出朕意毋事多讓先生辭不已上命從官掖之起有㫖曰出既出及閾還奏曰陛下令臣出省耶上改容曰出殿門耳明日又辭遣近臣哈扎爾孫先諭止之强出視事至上京奏論阿哈瑪特罔上不道事不服因病謝㡬務丞相難之御史中丞博囉為之請上惻然曰召子師可諭使舉代對曰用人宜出上意臣下舉代恐開市恩覬覦之漸有㫖以國人世胄子弟就學遂篤意教事奏門生王梓劉季偉韓思永耶律有尚吕端善姚燧髙凝白棟蘇郁姚燉孫安鎦安中十二人為伴讀被㫖咸驛致之以先生為集賢大學士兼國子祭酒先生之為教精粗有序張弛有宜而必本諸聖賢啟後學之方踰年諸生涵養薰陶周旋中禮講貫通適上喜其業成時自程之越三歲以改塟親䘮謁歸屬召赴行在遂請朝辭以行上命諸老議其去留姚樞謂先生出處有闗世運宜成其志更命張文謙問所以告歸之意其對如初始允十四年召議改厯法仍拜集賢大學士兼國子祭酒教領太史院事十七年授時厯成以疾屢告上禮貌隆至路朝錫杖内殿賜坐疾劇裕宗在東宫聞之為言於上以驛送還師可以河東按察副使改懷孟路總管以便養皆東宫請也且使宫臣諭曰先生幸醫藥自輔無以道不行為憂十八年三月戊戌薨於私第之正寢易簀不變年七十三是日大雷電風㧞木城中無貴賤少長哭於門商唁於塗農弔於野天下識與不識聞訃慨嘆四月乙酉塟李封村先塋之南既塟四方學者來會為位哭墓而去先生真知力行實見允蹈齋居終日肅如神明嘗遇迅雷起前泰宇凝定不䘮執守其為學也以明體逹用為主其脩已也以存心養性為要其事君也以責難陳善為務其教人也以灑掃應對進退為始精義入神為終雖時尚枘鑿不少變其規矩也故君召輙往進輙思退方世祖急於親賢而先生篤於信已以是終無枉尺直尋之意及夫仕不受祿人以為髙則喟然嘆曰甚矣余之不幸而有是名也仕豈不有食君禄者哉食無忝而已伐宋之舉一時名公卿人受攻取之畧先生言惟當脩徳以致賔服若以力取必戕兩國之生靈以决萬一之勝負及宋既平未嘗以失慊世祖亦未嘗以是少之臣觀三代而下漢唐君臣未聞以道統係之者當時儒宗或知足與知仁未足與居也宋濓洛數公克續斯道然未嘗有得君者世祖龍潛諸儒請尚其號曰儒教大宗師嗚呼漢唐宋創業之主烏得而有是號哉此天以道統而屬之世祖也先生出際斯運一時君臣心以堯舜為心學以孔孟為學中外如一喙號公魯齋先生嗚呼魯者曽子傳道之器歴代佐命之臣雖欲為此號豈可得也非天以道統屬之先生乎先生之謀國譬工師受命作室既得大木不肯斵而小之是以寜不受工師之命而必使學焉後臣之道無愧於伊尹寜不預平宋之功而必使以徳行仁之言無負於孟軻中統至元之治上有不世出之君能表章其臣繼述往聖之志下有不世出之臣能贊襄其君憲章往聖之心於是我元之宏規有非三代以下有家國者之所可及矣及夫元貞大徳髙第弟子彬彬軰出致位卿相為代名臣皇慶延祐之設科子師敬叅預大政以通經學古之制一洗隋唐以來聲律之陋致海内之士非程朱之書不讀又豈非其家學之效見諸已試者歟先生平時頗病文籍之繁嘗曰聖人復出必大芟而治之則周衰以來文勝之弊尤将有以正救於其間是豈淺之為知者乎先生諱衡字仲平其先河内人父通避地河南隱徳弗耀今贈銀青榮祿大夫大司徒追封魏國公諡恵和妣李氏追封魏國夫人子男四師可師遜師孚追封魏國夫人敬氏子師敬封魏國太夫人賀氏子公於閨門有禮中饋皆賢事公甚敬師可由河東按察副使歴襄陽路總管贈禮部尚書諡文簡博學敏思工於辭章有文集貽後師遜師孚未仕卒師敬由監察御史踐敭中外歴治書侍御史吏部尚書中書參知政事國子祭酒太子詹事中書左右丞兩為翰林學士承㫖知經筵事今由兩臺中丞拜御史中丞階光祿大夫明經務誠學尚節槩肖父風女三長適于章儒者餘早世孫男六長從憲以蔭累遷湖廣行省理問以歸徳知府政事次東孫夭次從宸積官監察御史山南憲僉終河東副使志趣端正惜未究用次從宜太史院經歴中書省照磨今翰林院國史經歴次從宣太保府長史中書右三部照磨官次從宗章佩監異珎庫提㸃孫女五長適廣東宣慰司都元帥寗居仁次適大禧院管勾覃質次適翰林應奉蕭璘次適寜陵簿張構次適阜城尉陳恕曾孫六長崇祖次紹祖秘書著作佐郎武進縣尹次書童文童禮童武童曾孫女某大徳元年贈大司徒諡文正制詞有曰聖學方湮惟洙泗之源是泝嘉謀日告非堯舜之道不陳至大三年加贈太傅追封魏國公制詞有曰天非繼聖學之墜緒則不生命世之大賢國欲與王道以比隆肆命為蒸民之先覺姚文公燧作詞堂記則謂五百年必有王者興其間必有名世者出惟公足以當之蓋太祖皇帝建國丙寅而先生生於己巳上距宋慶元庚申朱子之卒才十年當興王之㑹續傳道之業必有數存焉世祖嘗稱其論事多與太祖之言合至取祖訓示之𤣥生晚學陋何以知先生然誦諸儒之説而想望其餘光焉先生之道統非徒托諸言語文字而已蓋自謹獨之功充而至於天徳王道之藴故告世祖治天下之要惟曰王道及問其功則曰三十年有成矣是以啟沃之際務以堯舜其君堯舜其民為已任由其真積力久至誠交孚言雖剴切終無以忤至於其身之進退則凜若萬夫之勇何可以利祿誘而威武屈也晚年義精仁熟躬萃四時之和道出萬物之表無事而靜則大空晴雲卷舒自如遇物而動則雷雨滿盈草木甲拆事至而不疑事過而無迹四方之人聞之而知敬望之而知畏親之而知愛逺之而知慕求其所以然則惟見其胸中磅礴浩大人欲淨盡天理流行動靜語黙何往而非斯道之著形也又嘗切論之先生天資髙出固得不傳之妙於聖賢之遺經然純篤似司馬君實剛果似張子厚光齊似周茂叔英邁似邵堯夫窮理致知擇善固執似程叔子朱元晦至於體用兼該表裏洞徹超然自得於不動而敬不言而信之域又有濓洛數君子所未發者宜夫抗萬鈞之勢而道不危擅四海之名而行無毁近代元豐之異論熈寧之紛争先生處之豈有是哉拜手稽首銘曰世降邃古大樸日雕天吏不作治教寂寥帝恫我民眷求有徳世祖齊聖作其建極臣有許公身任斯道為仁肫肫制作慥慥昔公在野世難薦臻精義致用屈蠖之信心樂則顔志任則伊朝思夕維天将啟之朋來逺方以辨以問㑹融一貫氷釋理順世祖居潛時號儒宗多士既歸功徳日崇召公起家斯世将泰灼之俊心天地正大既握乾符尊履五位利見大人乃在九二覃懷之居輅車實來屢進亟退求福不回論議上所容徳休休獻可替否言直以遒上曰仲平汝左朕丞其悉爾學資朕股肱惟誠惟一以結主知惟明惟哲其止也時初問伐國對不以兵上逹公猷不在宋平官盛既稟公恥素餐敬事後食匪為苟難近臣貴胄世荷國寵我淑以道國收其用小學功隳大學陵節我教多術循循無越雖聖有模載範其驅以歩以趨疇敢侮予自古在昔氣化推移仁人之興惟世盛衰凡今有生就司榮瘁惟道為大與天罔墜世祖繼天惟天生賢道統有任民彛賴焉有徳有言有子有孫皇命作誄貽厥永存元翰林學士承㫖榮禄大夫知制誥兼修國史贈江淛等處行中書省平章政事魏國趙文敏公神道碑至元二十三年世祖皇帝遣使求賢江南得趙宋昌陵十一世孫孟頫入見奏對稱㫖起家為郎由是被遇累朝敭歴中外仁宗皇帝聖眷優渥擢掌詞垣致位一品文宗之世有司舉行贈典進秩辨章馳爵上公仍議節恵至正五年春三月今上皇帝以集賢大學士塔爾哈等特賜墓道之碑勑翰林學士歐陽𤣥為文集賢侍講學士蘇天爵書丹翰林學士氶㫖張起巖篆額臣𤣥奉命謹考行狀次第而銘之叙曰公諱孟頫字子昂姓趙氏系出秦王德芳五世祖為秀安僖王實生阜陵賜第湖州曾祖考師垂故宋定江軍節度使開府儀同三司萬壽觀使累贈太師追封新興郡王諡忠襄妣莊氏衞國大夫人祖考希承故宋贈朝奉大夫直華文閣致仕累贈通議大夫妣鄭氏封碩人考與訔故宋正議大夫尚書户部侍郎知臨安府浙西安撫使臨安縣開國子累贈銀青光禄大夫妣李氏封碩人及公入仕我元推恩三代曾祖考改贈集賢侍講學士中奉大夫䕶軍追封吳興郡公祖考改贈資善大夫太常禮儀院使上䕶軍追封吳興郡公考改贈集賢大學士榮祿大夫柱國追封魏國公曽祖妣祖妣並吳興郡夫人妣及生母並魏國夫人初太常公蚤世無子鄭夫人選同宗子為之後集賢公本蘭溪房侍兄與譍通判湖州鄭夫人一見竒之遂請以為嗣内降許之初娶李氏續娶丘氏公丘出行蓋集賢公之第七子也生十有一歲集賢卒丘夫人賢能朂其子學公資禀俊邁讀書一目五行俱下弱冠中胄監試調真州司户叅軍皇元混一後浮沉鄉社間丘夫人嘗語之曰天下既定聖朝必偃武脩文收四方才士用之汝非多讀書何以自異齊民公聞益加講貫毎從里中老儒敖繼公質正數歲大進尚書夾谷竒之以翰林編脩薦不就江南侍御史程公鉅夫出訪江南遺逸得二十餘人以應詔公在首選初授奉訓大夫兵部郎中轉集賢直學士奉議大夫遷朝列大夫同知濟南路總管府事兼管諸軍奥魯以脩世祖實録召入書成謁歸改知汾州未上以集賢直學士行江浙等處儒學提舉除揚州路泰州尹進階中順大夫需次於家仁廟在東宫聞公名召入拜翰林侍讀學士知制誥同脩國史改集賢侍講學士中奉大夫復入翰林為侍講學士知制誥同脩國史俄遷集賢侍讀學士正奉大夫進集賢學士資徳大夫拜翰林學士承㫖榮祿大夫知制誥兼脩國史延祐六年五月告老還湖州是冬召入朝以疾不果行至元元年上章乞致仕不報二年春遣使存問夏六月辛已薨於私第至順三年贈榮禄大夫江浙等處行中書省平章政事柱國追封魏國公諡曰文敏公初見世祖風神散朗容止閒暇上以為有神仙風會尚書省立命草詔公援筆立成上聞大㫖召近臣譯以對喜謂公曰卿言皆朕所欲言者自是國有大議必與咨詢一日侍側有詔羣臣議政上顧公曰卿往共議至則衆議贓以至元鈔二百貫為滿論死公曰鈔法初行以銀為則歲入厥直輕重相去至數十倍今雖改法比及虗實政未可知古律以米絹論贓二物民生所須謂之二實最為適中况鈔乃宋人所造其初止行逺方今襲用之以鈔論死恐非良法刑部楊郎中起而作色曰朝廷初行至元鈔故以計贓公詆其非欲阻其法乎吾意今日議法必集儒臣又豈無一士如公者乎公曰人命至重議法失當人将不得其死奉詔與議偶有所見不敢不言且中統鈔虗故改至元鈔君謂至元鈔終無虗時有是理哉楊為之赧然議罷出謝曰某失在不學細思公之言是也洎入夏官會天下驛置凡使客委積之費至元十三年以來毎歲僅支中統鈔二千錠物價騰踊使客曰增吏無以自給物倍於民不勝其擾請増至二萬錠用乃舒㑹濟南總管闕公獨判府事聽斷明恕訟牒以稀或經月獄空有元掀兒役于鹽官逃之他郡其父疑同役者殺之得遺骼之半於澤中以為子骸同役不勝榜掠誣服公疑有寃緩其獄掀兒果歸誣服者釋城東有上腴田二頃兩家兵後互爭而皆亡其劵有司不能决公斷以養士夜出邏聞有讀書之聲使人私削其柱為識明日饋酒為勞得一能文之士必加奨異自教以文法郡儒風以盛歲旱禱雨龍洞有雲如車蓋隨馬至城中大雨旬餘城東有龍湫自為文責之雨洊至歲大熟白直數人者盗米其徒自首吏請加詰公郤之曰加詰累人必多及去官有數人送之至京號泣不忍去問之即向盗米者盗當墨必自臨視語吏曰是中豈無廹於飢寒及詿誤者戒之細書盗聞轉相告曰趙公仁人也吾徒何忍數犯其在朝廷多所匡正圻甸地震北京尤甚死傷數十萬上憂之自灤京還先遣平章諤爾根薩里馳至都召集賢翰林兩院老臣問故密㫖勿令丞相僧格知之時僧格遣錫都王濟等理筭天下錢糧已徴數百萬未徴猶數千萬名曰理筭其實暴斂無藝州縣置獄株逮故家破産十九逃亡入山吏發兵蒐捕因相挺拒命兩河間盗有衆數萬公顧諸老無敢詆時政者素善諤爾根薩里密謂之曰今理筭苛虐民不堪命事變且起地震之由實在於此宜請於上援貞觀故事大赦天下蠲除逋負則和氣可回災異可弭諤爾根薩里入奏如公言上大説從之詔草具會兩院諸老都堂僧格瞠視諸老見公進讀詔草至蠲除一條怒摇手曰此事必不可行汝曹所擬必非上意公徐進曰今理筭錢糧其不可徴者皆死亡之數不及今放散免之他日有言中書省累失陷錢糧數千萬者丞相何以自解僧格訹曰吾慮不及是詔書既下兆姓舉手相慶始有蘇息之望上問李尚書葉右丞二人優劣何如對曰夢炎昔與臣父事宋時臣方㓜忠佞不能周知臣與夢炎同事陛下見其為人重厚篤於自信思慮深長善斷國事有大臣風若李之所學在臣亦不知亦不能言言未既上遽曰卿意豈非謂夢炎優於李也賈似道罔上誤國夢炎在中書時無一言李布衣伏闕上書乞斬似道是賢於夢炎明矣李論事厲聲色盛氣凌人若好已勝者故剛直太過人多怨之今朕得卿之情卿父與夢炎同朝不欲斥其非耳可為朕賦詩諷夢炎公立進詩曰状元昔受宋家恩國困臣强不盡言往事已非那可説且将忠直報皇元上深善卒章之意出見奉御薩里於幄殿側告之曰上論賈似道誤國之罪青葉夢炎不能言今僧格誤國甚於似道我軰緘黙他日何以逭此責乎近臣中讀書知道理慷慨有大節上所親信無踰公者誠能捐一旦之命為天下除此賊仁人之事也薩里曰今災異數見盗賊蜂起皆僧格聚斂所致吾所以為日夜切齒腐心者公實啟我以機殆天誘之徑造榻前歴數僧格之罪百倍似道不亟誅必亂天下上初大怒叱衞士批其頬口鼻流血仆地少間復呼而問之對如初既而大臣有助其言上大悟遂按誅僧格後薩里語及斯事歎曰使我有萬世名者子昂之力也平江守趙全不法前守王虎臣訟之詔遣虎臣就問右丞葉李執奏以為不可上不允公曰全在平江為政貪酷固當治虎臣在官亦嘗犯法全嘗持之今虎臣罪幸在赦前故得攟摭全罪若使就訊必挟公濟私别遣官為當上從其言其在館閣尤多裨益因有事南郊他學士撰祝册有云章亥復生不足以歩皇元之幅員又云太祖皇帝正東向之位公曰天子父事天子誇疆理於其父可乎不可且公不為禮乎禮大祫太祖東向居中子孫在左者南向故稱昭在右者北向故稱穆若南郊之位上帝南面太祖自宜西向故事第稱配天作主公不用何也其人謝服從所刋定皇太后命學士擬改隆福宫名同列擬光被公擬光天或曰光天陳後主詩不祥公曰帝光天之下出虞書何謂不祥各書所擬以進後竟用光天以逺臣遭遇累朝特見優禮世祖戒宿衞公入内庭毋禁賜坐葉右丞相毎見與語或至夜分公於天下事當言者無所不及嘗稱公聰明剛正敢為直言公聞之益自斂退一日問公曰卿太祖子孫乎太宗子孫乎對曰臣太祖子孫上曰趙太祖真英主也其行事卿知之乎對曰臣蚤失父故老不以語臣故臣粗知其畧耳上曰太祖行事多可法者朕皆知之暇日當以語卿又嘗面諭之曰大臣奏事卿可與俱人有過差意渉欺罔悉為朕言之公謝不對自爾數求補外後聞其家貧賜鈔二千五百緡仁廟字公而不名詔近臣曰文人世所難得唐李太白宋蘇子瞻姓名至今在人耳目朕有子昂與古人何别時有譔述輙傳㫖屬筆與侍臣論公他臣不能及者數事苗裔一也姿表二也博學三也操履純正四也文詞古雅五也書畫絶倫六也旁通釋老書七也他日賜鈔五百錠恐中書留難以普度别貯賜之慮其畏寒勑内府賜銀䑕翻披英廟命公書孝經亦遣使以上尊酒衣二襲即家賜公公為兵部早入官署過東苑墻外道隘馬遇滑即堕牐河水中僧格言於上因移墻近裏者二丈許僧格下令曙鐘鳴治事部官後至者笞公至遇晚獨得釋自是笞止曹吏公雖忠結主知亦致衆忌性簡易䟽伉發言切中時病屢在上左右上察其無他獲全晚節程鉅夫方薦公有臺中丞言趙某故宋宗室不宜薦進使近左右鉅夫奏曰陛下盛徳立賢無方臺臣以是劾臣將陷臣不測上曰彼竪子何知顧侍臣傳㫖不越今日逐其人出臺仁廟眷公方隆不悦公者言公趙太祖子孫上初若不聞已而㳺辭不已乃厲聲視之曰汝言趙子昂趙宋子孫豈謂家世不汝若耶始惶􅘨趨出又言國史不宜使公與聞上大怒曰趙子昂乃先朝簡㧞以為帷幄臣者朕使討論古義典司著作此曹呶呶不懲一二無以戒後言者乃息世皇屢欲用公公自知直道不容於人居正路弗便往往力辭初授官廷論欲以為吏部侍郎髙參議持不可尚書省罷賀巴延入辭參知政事公適侍立上目公進曰卿亟往中書叅决庶政以分朕憂公堅辭不拜上問閻復宋渤二人如何對曰相才實難是日京師盛傳公已入省暮歸賀客候門者填塞公笑而遣之至元鈔法澁滯公與尚書劉伯宣同被命往江南按問行省丞相慢令之罪左右司路府官許就笞公深以為衣冠之辱比還一無所决罰僧格欲加譴責公不為動初受程鉅夫薦晚進翰長與程交代必先往拜其門而後入院公所為務崇亷恥先禮遜縉紳相傳以為厚徳平居嗜好冲澹家世紈綺况味埓布韋貴及崇階不見矜色客求文字與之周旋终日雖極勞甚憊未嘗拒人獨人有過失必面致諷諫無隱然直而不訐人亦易從病劇將终援簡濡毫如常時有頃翛然而逝娶管氏諱道昇字仲姬工詞翰善畫治内有才具累封魏國夫人先四年薨子男三人亮早夭雍夙慧有父風以蔭歴守昌國海寜二州奕舉茂才女六人長適强文實次適海道運糧萬户費雄次適李元孟次適王國器次適劉某孫男二人曰鳳曰麟薨之年九月塟徳清縣千秋鄉東衡山之陽管氏附公治尚書有書註於禮樂度數甚明知音律幽𦕈有琴原樂原各一篇號松雪道人有松雪齋文集若干卷談錄一卷為文清約典要諸體詩造次天成不為竒崛格律髙古不可及尺牘能以數語曲暢事情鑒定古器物名書畫望而知之百不失一精篆𨽻小楷行草書惟其意所欲為皆能伯仲古人畫入逸品髙者詣神四方貴游及方外士逺而天竺日本諸外國咸知寳藏公翰墨為貴故世知之淺者好稱公書畫識者論公則其該洽之學經濟之才與夫妙解絶藝自當並附古人人多有之何至相掩也仁廟彚公及管夫人及子雍所書藏中祕書曰使後人知今朝人臣中一家書學有如此者適新太廟成君相欲講禘祫定廟樂求習禮樂者如公已鮮今上脩宋史思士大夫熟宋事者亦何可得哉𤣥初以禮部奏名召奉大對公為讀卷官擢寘前列及公薨状公之行乃同年進士寜國路推官楊載距二紀𤣥備列北門公有賜誄之命誼不敢辭請系以銘曰有白其馬惟周之客周人尚騂客世􅇻白我元忠厚軼彼成周宋有近屬遇之加優侃侃魏公徴自炎方入見殿廷美如圭璋昔客在周但聞助祭未聞侍側命以獻替維此魏公進為親臣詢厥世系念其前人魏公在列玊立陛前上有顧問其言便便羣臣議法命往咨度援古例今論政以確法司在坐盛氣見侵理到之告折服其心上命代言對御操筆宸𠂻未宣已布尺一上遇災變詔問其由公言暴斂時政是尤委曲獻忠請釋逋負公進詔草時相震怒相怒未已公言徐徐相莫之沮乃下寛書萬方懽呼涵泳聖恩公啟近臣力㧞惡根近臣感激碎首强諍權奸既摧乃息稗政宣室夜問言不及他吏蠧民瘼直言無阿弱弗勝衣食弗盡器臨事論建奮無畏避世祖援公俾入政府聞命而僂懇求外補仁皇踐祚首召入覲皓首未歸寵冠禁近乃登瀛洲載頂鼇岫丕煥皇猷黼黻在手琨牒瑶編藏在宗廟屈玉垂金分鎮山澤逺方裔夷偶獲簡櫝雖未識公想見眉目嗟乾之資唯一清氣人稟至清乃精道藝天朗日晶一清所為星月明穊雲章陸離圗書以陳文字以立頡始造書鬼神為泣宇宙精英發决在兹清氣所萃乃臻瑰竒允矣魏公玉壺秋氷巧出天智智窺神能鳳翽其羽止於阿閣朱鴈天馬播之廟樂彌文日増制作日淑國於老臣百不一贖皇上稽古訪問舊儒豐碑為賜螭首龜趺敬告後人毋忘帝力世祖深仁仁皇至徳黼􅒐祼周孰擬我朝詞翰揚休百世孔昭元故翰林學士中奉大夫知制誥同脩國史貫公神道碑至治三年歲癸亥秋𤣥校藝浙省既竣事出而徜徉湖山之間故人内翰貫公與𤣥周旋者半月餘及將去杭薄暮携酒來别謂𤣥曰少年於朋友知契毎别輙繾綣數日近年讀釋氏書乃知釋子諅有是心謂之記生根焉吾因以是為戒今於君之别獨不能禁且奈何哉言已悽然而别明年甲子夏公捐館於杭數月訃至哭之盡哀自是凡至杭遇公舊逰追憶臨别之後未嘗不為之愴然出涕呼酒相酹也公薨廿又五年子阿爾斯蘭哈雅展省于燕顧公神道未銘願屬筆焉其忍銘乎公家世北庭裕實其名酸齋其號也故湖廣行省右丞相贈宣威服逺輔德翊運功臣大師開府儀同三司上柱國追封江陵王諡武定阿爾哈雅之孫故浙江行省平章政事贈光禄大夫河南行省平章政事柱國追封楚國公諡忠恵格濟格之子母趙國夫人廉氏故平章政事希閔之女公之初生趙國夜夢神人取天星為明珠以授趙國掌玩而吞之已而有身公生神采逈異年十二三膂力絶人善騎射工馬槊嘗使壮士驅三惡馬疾馳公持矟前立而逆之馬至騰上越而跨之運矟風生觀者辟易挽强射生逐猛獸上下初襲父爵為兩淮萬户府逹嚕噶齊鎮永州在軍氣候分明賞罰必信初忠恵公寛仁麾下玩之公至嚴令行伍肅然軍務整暇雅歌投壺意欲自適不為形勢禁格然其超擢塵外之志夙定於斯時一日呼弟呼圗克哈雅語之曰吾生宦情素薄然祖父之爵不敢不襲今已數年法當讓汝即日以書告于忠恵公署公牘移有司解所綰黄金虎符欣然授之退與文士徜徉佳山水處倡和終日浩然忘歸北從承㫖姚文公學公見其古文峭厲有法及歌行古樂府慷慨激烈大竒其才仁宗皇帝在春坊聞其以爵位讓弟謂其宫臣曰將相家子弟有如是賢者誠不易得姚公入侍又數薦之未㡬進直解孝經稱㫖進為英宗潛邸説書秀才宿衞御位下仁宗正位宸極特㫖拜翰林學士中奉大夫知制誥同脩國史一時館閣之士素聞公名為之爭先快覩會國家議行科舉姚公已去國與承㫖程文憲公侍講元文敏公數人定條格贊助居多今著於令未㡬公上書條六事一曰釋邊戌以脩文徳二曰教太子以正國本三曰立諫官以輔聖徳四曰表姓氏以旌勲冑五曰定服色以變風俗六曰舉賢才以恢至道凡萬餘言往往切中時弊上覽嘉歎未報公自籌曰昔賢辭尊居卑今翰􅁐侍從之職髙於所讓軍資人將謂我沽美譽而貪美官也是可去矣移疾辭歸江南十餘年間歴覽勝概著述滿家所至縉紳之士逢掖之子方外竒人從之若雲得其詞翰片言尺牘如獲拱璧公曰我志逃名而名隨我是將見害江浙物繁地大可以晦迹乃東逰錢塘賣藥市肆詭姓名易冠服混於居人嘗過梁山濼見漁父織蘆花絮為被愛之以紬易被漁父見其貴易賤異其為人佯曰君欲吾被當更賦詩公援筆立成竟持被往詩傳人間號蘆花道人公至錢塘因以自號入天目山見本中峯禪師劇談大道箭鋒相當毎夏坐禪包山暑退始入城自是為學日博為文日邃詩亦冲澹簡逺書法稍取法古人而變化自成一家其論世務精覈平實識者喜公謂將復為世用而公之踪跡與世接漸疎日過午擁被堅卧賔客多不得見僮僕化之以晝為夜道味日濃世味日淡去而違之不翅解帶泰定改元五月八日薨於錢塘寓舎年三十有九自士大夫至兒童賤𨽻莫不悼惜某年月日諸孤奉柩塟於析津之祖塋娶石氏北京名家江陵總管天麟之女有婦徳追封京兆郡夫人子二人長阿爾斯蘭哈雅歴蘭溪州逹嚕噶齊榷茶提舉慈利州逹嚕噶齊所至以清白吏著聞次博索哈雅孫四人長南山次寜山次葆山皆業進士應舉女一人適懷慶路總管叚謙有學識能文章𤣥嘗評公武有戡定之筞文有經濟之才以武易文職掌帝制固為斯世難得然承平之代世禄之家勢宜有之至如銖視軒冕髙蹈物表居之弗疑行之若素泊然以终身此山林之士所難能斯其人品之髙豈可淺近量哉有碑銘記叙雜著詩詞若干卷及所進孝經行於世銘曰嗚呼貫公麒麟鳳凰其往不可詰其來不可期者乎嗚呼貫公神龍天馬其變不可測其常不可窺者乎抑宇宙英氣合袪為雲流布為霆感物神化文武動靜無施而不宜者乎將飛僊應真出入機用渉世為􅃧一旦解悟翛然而聚散砉然而合離者乎死生幽明之際焉知公之所甚樂乃世之所為悲者乎嗚呼噫嘻事有可知有不可知所可知者燕塋之藏體魄在兹我為銘詩詎能為公之輕重姑以慰公後人之思元故奎章閣侍書學士翰林侍講學士通奉大夫虞雍公神道碑自漢魏六朝以來經生文士判為兩塗唐昌黎韓公宋廬陵歐陽公力能一之而故習未盡變也濓洛諸君子出其所著作表裏六經言或似之於是文極文之典奥道極道之精微一趨於至善而後止其殁也門人錄其語以相授受其為書雖出一時之紀聞然概之聖人脩辭立誠之㫖未盡合也昧者凖之以立言世之文士共起而病之然文士知病其為文而未必知文外非别有道道外非别有文也二者胥失焉宋末病滋甚皇元混一天下三十餘年虞雍公赫然以文鳴於朝著之間天下之士翕然謂公之文當代之巨擘也而不知公之立言無一不本於道也既而退居山林垂二十載乃得昌言於斯道一志於斯文而遂老矣惜哉易簀之再朞子安民奉状踵門謁𤣥銘其麗牲之石𤣥辭不獲則先發其所深慨而請繼以言焉叙曰公諱集字伯生姓虞氏系出虞仲世家會稽唐永興文懿公世南為唐初名臣子孫始遷雍永興生戸部侍郎昭昭生江陰令陟陟生旴􅇇丞智長城令禮金吾衞長史明傳五世至仁壽太守敦人從僖宗幸蜀子孫為蜀人仁壽九子伯曰賞五子次曰琚琚生庾庾生承承生詢詢生繼繼生崇崇三子季曰昭白宋銀青光禄大夫國子祭酒贈太師周國公五子季曰軒贈太師魏國公三子季曰祺進士及第歴官左中大夫贈太師秦國公生左丞相雍國公允文贈太師諡忠肅三子伯曰公亮早年髙尚不仕晚以奉議郎直秘閣贈開府儀同三司仲曰公著知渠州官至中奉大夫仁壽縣開國男累贈光禄大夫季曰抗孫大理寺丞官至中奉大夫開府六子次曰剛簡是為蒼江先生官至朝請大夫利州路提㸃刑獄二子伯圭官至奉直大夫歴知永連兩州自永移連道臨川其女弟適邕管安撫陳公元普先寓屬邑崇仁聞其至使人迎之得前郡守江陵項公别第於南門外以居之自是家崇仁皇贈中奉大夫禮部尚書追封雍郡侯妣張氏雍郡夫人無子而從祖渠州有子六人長兵部直寳文閣晉三子仲子朝請郎通判恵州從龍子汲長而賢乃以為後是為井齋先生公之先考也皇贈通奉大夫四川等處行中書省叅知政事上䕶軍追封雍國公妣眉山楊氏追封雍郡夫人夫人給事中工部侍郎國子祭酒見山先生文仲之子叅知政事平州先生棟之猶子也所出三子長即公次槃進士及第卒官嘉魚縣尹次葉叅政公初授承直郎黄岡縣尉見山守衡州夫人從叅政方需次與偕時未有子見山禱於南嶽己而有娠及將蓐見山一日晨興出治事眎時尚蚤公服坐中堂以坐久假寐夢一牙兵刺持劍入白南嶽主者來謁起肅之而寤聞兒啼聲公生焉故命公小字衡公對客嘗自言未昬宦時屢夢逰南嶽能言其勝處乙亥見山移守漳州叅政伉儷同行丙子宋亡公五齡夙慧避地無書籍楊夫人能倍誦論孟及春秋左傳歐蘇文之常誦者口授輙成誦九嵗還長沙始得墨本而公已悉通大義又五年居崇仁故寓已善屬文草廬先生吳公請見其所作謂叅政公曰賢郎他日當有文名於當世邑庠循舊式月出詞賦經義題課士公與嘉魚令以書義試皆中前列老儒為之歎服兵後勝國名公卿家多流寓是邦公㳺諸公間備聞前脩格言考覈前代典故舊家世系源委言若指掌楊夫人素髙呉公伯清之學贊叅政公遣二子從之㳺吳公方著書有所論辨公能推類逹意吳公毎獲助焉大徳六年用大臣薦授大都路儒學教授平陽王文憲公尹京待以客禮十一年擢國子助教丁内艱至大二年服闋以舊官復用四年轉將仕郎國子博士延祐元年改從仕郎太常博士奉詔西祠岳瀆四年遷承事郎集賢脩譔考大都鄉試五年被㫖召集賢直學士吳公伯清於家尋除翰林待制儒林郎兼國史院編脩官丁外艱服闋以舊官召還泰定元年考試禮部陞承徳郎國子司業三年進奉訓大夫秘書少監四年再考試禮部拜翰林直學士奉議大夫知制誥同脩國史俄以前職兼經筵官進階奉政大夫明年又兼國子祭酒天厯三年特授中順大夫未㡬拜奎章閣侍書學士陞亞中大夫依前翰林直學士知制誥同脩國史兼經筵官國子祭酒會有令諸兼職不過三辭祭酒得請兩月進階中奉大夫餘如故至順元年御試選讀卷官被㫖脩皇朝經世大典為總裁官三年拜翰林侍講學士通奉大夫餘如故今上皇帝入正大統用至大故事召諸老赴上京議事公在召列及還大都以病謁告歸家元統二年遣使賜上尊酒金帛召還朝使者至郡疾作不能行而歸至正三年勑修遼金宋三史欲用公總裁或陳其病状毋苦其逺行奏牘將上而止朝使有自江右來者廷中大臣趨詢起居八年五月二十三日以疾薨於私第年七十又七大風飄瓦㧞屋前後巨木數十株治命以深衣斂毋用浮屠明年己丑八月二十一日乙酉塟邑之長安鄉道徳里天寳山西之潭源娶浚儀趙氏系出宋秦邸前公四十二年卒累封雍郡夫人子安民趙夫人出也蔭奉訓大夫廣州路東莞縣尹轉奉直大夫恵州路總管府判官陞奉議大夫吉安路安福州知州徐氏生男二人維摩努七十女一人俱早夭劉氏生男一人憲孫女一人欒欒適譚紱郭氏生男二人長延年以廣東帥府奏差授武縁縣博合砦廵檢次翁歸業進士馬氏生男一人髙門甫弱冠孫男五人某蓋嘗論公家世勲績文懿事唐文皇博學洽聞偉節讜論忠眂魏徴而始終無疵塟陪昭陵像圗凌烟忠肅當今海陵南侵至江以儒者一戰而却之思陵在江上歸禪位阜陵金易其國書南北勢始定阜陵遂相之功烈不卑矣及公之身遇聖代事九朝鋪張皇猷位列法從與文懿忠肅後先七百年照暎史册嗚呼盛哉又嘗論公家學禮部公與臨卭魏華甫成都范文敬李微之講學蜀東門外為西南道學之倡他日以學為政叅蜀制閫自請行邊却敵兵數十萬人守簡州憲䕫路立保置屯田得流民三十九萬餘以實邊鄙敵不敢犯叅政公克振滄江先生之文學吳公稱其為文清醇典教江右湖南簡㧞俊又如南陽富珠哩翀子翬後多顯融號稱知人吳氏學未盛行首與藳城董公表章之使大有名於時時楊夫人早得見山先生春秋之㫖從父平舟先生以道學自任當時夫人未笄盡聞其説景定甲子彗出平州草封事於家夫人侍側進曰從父當辭位久矣平舟嘆曰汝曷不為男子生我家耶及歸虞氏以家庭所親得者教其子公資質之粹學識之正豈獨得之父兄師友而已公在成均思正化本以媺士習上丁監禮殿上伴讀劉生被酒失儀公命扶之出明日聲其罪削之貴近有為生謝過者公持不可蒙古生欵者傳仁皇東宫諭㫖姑薄其罰公以吏牘列生罪状咨詹事院以啟仁皇更是公所為由是益知公賢踐祚後以中書平章李道復領胄監事公與李公議歲貢法謂舊法以制禄立程誘諸生以進學如是則雖勉弗善請於衆中擇靜重有識嘗試以事者歳薦二人上親擢而用之以為勸李公亟言於上行之會李公去位不果已而拜臺臣為祭酒召四方名儒為司業銳然有責成之志公與同列講求以副上意有好為異同者撓之司業投劾去公亦以病免諸生之賢者卒業私塾居數歲不絶其在集賢上議極陳學校之弊其畧曰師道立則善人多學校者士所受教以至於成徳逹才者也今天下學官猥以資叙强加諸生之上名之曰師有司弗信之諸生亦弗信之於學校無益也如此而望斯道之立可乎偏州下邑之士無所見聞父兄遣子弟入學初無必為學問之意師友之從㳺亦莫辨其邪正然則所謂賢才者非天降地出有可望之理哉今既莫若求經明行修之成徳者身師尊之求以至誠庶㡬徳化之及斯民有所觀感其次則求操履之近古而不為詭異者經義守正説而不尚竒論者為衆推服而非鄉愿者延致之使教學者他日當有所發也又其次則取鄉貢之退者其議論文藝猶賢於汎汎莫知根柢者也朝廷韙其論而憚改作初考㑹試議曰國家科目之法諸經傳註合有所主將以一道徳同風俗者非使學者専門擅業如近代五經學究之固陋也聖經深逺恐非一人之見可盡試藝之人惟其髙者取之不必先有主意使求賢之意狹而差自此始也又嘗經筵講罷上言東南海運勞險因謂京師瀕海以東至於遼碣皆萑葦之地潮汐日至淤為沃壤宜用吳人圩田法築隄捍水為田募富民欲得官者合其衆請耕官授以地而定其畔能以萬夫耕者授以萬夫之田版萬夫長千夫百夫亦如之三年而視成惰者易之勤者物地力之髙下定額於有司以漸而征之五年有積蓄真授以命就其儲給之禄十年然後佩以符信如軍官法世襲之庶可寛東南歲餉之役可得民丁數萬衞京師制島夷又因使富民役仕之志遂而江海求食民有所歸凶歲不至為盗今海口萬户之立頗宗其説而未盡用其法云闗中大饑公建言大災之後土曠民稀可因之以行田制擇一二有仁術知民事者為牧守寛其禁令使得有為因舊民所在定城郭閭里治溝洫畎畝之法招其流亡勸以樹藝數年之間復其田租力役春耕秋斂量有所助久之逺者漸歸封域漸正友望相濟風俗日成法度日備則三代遺規將復見於虗空之野矣天子稱善羣臣未有相其謀者太史院教授雒陽楊茂先知造律候氣之法試用於郭太史有徴晚合律厯為一書謀以進而患其辭煩簡失當知公研究是學屬潤色之公慨然整治其書且告當道冀其見用茂先病死不見進今藏太史齊伯髙家皇朝經世大典之為書公任其勞居多其目則周禮之六典其制則近代之會要其事則今樞密院御史臺六部總治中外百有司之事務而其牘藏於故府者不足則采四方之來上者叅之祖宗之成憲功臣之閥閲具存凡八百帙既進謂同列曰他日國史諸志表傳舉此措彼耳考公制作之志使究所長其為聖治裨益能使一代之風軌藹然先王之遺烈焉則其事業豈下於先世兩公之在唐宋哉仁皇末年謂近臣曰今儒者盡用惟虞伯生未顯擢耳俄晏駕而止英皇既居儲宫議寳册禮有司講前代典故無所於考鄆忠憲王拜住在太常雅器重公亟召公入議公曰世祖初年即命裕皇東宫後授玉册金寳詔告萬方此我朝典章也何以前代為王以公言入奏上大説輙行之及相英皇力薦公可大用時居憂方省墓姑蘇遣使求之江西不得求之蜀又不得比返命而事變作晉邸御講筵見公氣貌溫和敷對剴切賜中統楮幣五十錠今上皇帝召公不至時賜臣下碑銘則諭㫖於家撰述公侍延英閣求去者屢因言陜西田制得俞㫖徐進曰願假臣一郡試以此法行之左右曰虞伯生託此為歸計耳曲阜新廟成求使代祀允而復寝面請補外則諭㫖若曰卿才何所不堪顧今未可去耳中丞趙伯寜乗間為之請怒曰一虞伯生汝軰不能容耶閣中日承顧問或應制作文皆寓規諫或遇事諫止出不語人諫弗能止歸家悒悒數日家人察知之不能詰其故也為讀卷官擬進士䇿問二篇倣中庸九經之目問所以宜於今之道次篇問九聖之學上覽嘉歎用其次篇一日受命草一勲舊封王制詞於内庭同列二人嘗為上所親信者密謂公曰上意姑與國公公如其言有頃丞相來自榻前趣進草甚遽公以草視之愕然公悟同列紿已亟易其詞以進终無所言又一日受命記一古寺稍陳前代遺蹟有構飾於上者謂公前代相臣子孫適美前事爾他日入見上以是語之對曰前代已逺臣庶子孫思其父祖固不忘其所事此可為忠孝臣愚不足以及此但臣以疎庸遭遇聖代致位通顯他日臣之子孫以臣遭遇世世毋忘本朝厚恩亦忠孝之勸也故臣謂能為此言於上前者亦必忠孝之人也上目近臣歎異之公坦易質直揚㩁人品質正文字臧否惟是之從無所顧忌故朝論屢以御史才薦之然亦以是賈怨動以危事中之賴人主察其無他以免惟篤孝友少與嘉魚令共學於家父子兄弟自為知已人以儗眉山三蘇嘉魚殁撫其孤遺如已子孟兄秉以莞庫解送官物至京道途折閲直數千緡公悉代償無難色遇庶弟棐及其孤妹皆盡恩禮常以禄養不及其親遇珎膳不敢盡器盛暑不命童子揮扇曰勞人以佚已君子不為也生平知已大臣藁城董宣公保定張蔡公隴西趙魯公皆國元老趙之復相嘗面請召栁城姚公涿郡盧公廣平程公吳興趙公毎與公論文輙以方來文柄屬之當世文士嘗經論薦後皆知名諸公受業為所推許今多公輔之器不可悉數公之為學非託空言毎言先王建事立功必本於天理民情之實故教學者務欲貫事理於一致同雅俗於至情以是為圗治之本其於經則曰易之為書首尾完具於三聖人之手生乎千載之下仰觀千載之上以凡下之資而欲窺見天與聖人之道不可下此而他求也得江東謝君直之説以先天八卦圗為河圗九數而九位者為洛書十數而五位者為五位相得之圗心雅善之或請著説則辭曰易道廣大苟得其自然之數何往不合先儒有成言焉存以俟知者於禮則曰學知先務莫切是經惟二戴雜以後人所記變禮不可盡信其餘則二帝三王之遺文天子諸侯大夫士之成制粲然可考不可以淺近言也屢欲通古今為一書以為後來考禮之助以宦業不克就濓洛新安諸君子之書就其所存以極其至而慨夫吾黨之士知之者微矣於吳氏書亦然二氏之學往往窮其指歸即其徒叩其負挾有所見則為之太息曰學者不能潛心聖人之微言以明下學上逹之要而欲切究性命之源死生之説其能不引而歸之者難矣其為文自其外而觀之汪洋澹泊不見涯涘􅺶乎其中深靚簡㓗亷劌俱泯造乎混成與四明袁公伯長清河元公復初友厚二人有著作必即公論之元初謂公文無雷霆之震驚鬼神之靈異將何以稱於世公謝曰誠不能也晚乃大服其言至大延祐以來詔告册文四方碑板多出乎手其撰次論建與其陶冶性情黼藻庶品之作襍之古名賢之編卓然自成一家言客未嘗見其學書篆𨽻行楷題榜下筆便覺超詣以書名於世者憚之少讀邵子書領悟其妙題其室曰邵菴學者因號之曰邵菴先生然廷陛都俞朝野稱謂率多以字行其存藁自題曰道園學古錄門人彚而鋟之得應制十二卷在朝二十四卷歸田三十六卷方外八卷其散逸尚多閒居雖久歸美報上之心仁民澤物之志未嘗一日忘之邑有平糶倉田淪於方外力言於當道復之邑大夫陳有容率同志作邵菴書院迎公講道其中以恵學子公欣然諾之落成而公薨在法公當進爵賜諡既塟而命未下𤣥於公有奕世之契最先受知叅政公博士之召公實薦之朝同朝十年奨借非一故於是銘雖重於作而不敢辭銘曰吁嗟先生衡山之髙岷江之長磅礴深廣何可量也山英川靈合為天章變化倐忽何可常也君子用世斯文耿光鳯凰鳴矣于朝陽也善人云亡士氣弗昌鶗鴂先鳴百草為之不芳也王良善御騏驥上驤孰能寘之周行也范冠蟬緌蠶績蟹筐孰能措之範防也載彼營魄返乎混茫朱鳥之舎離明之鄉也於粲遺文布濩四方琬琰之刻名山之藏也吁嗟先生古有先哲兮知徳知言知徳不易知言尤囏先生繼作兮誰謂九京九京可作兮百世弗諼大化幽黙兮孰控孰搏芝草三秀醴泉有源天將以斯文兮厚公之子孫碑文曲阜重脩宣聖廟碑今上皇帝臨御之七年歲在己夘春三月戊辰御史大夫臣伯勒濟爾布哈臣托克托御史中丞臣達實特穆爾臣約治書侍御史臣鏞等奏監察御史言天厯二年十月文宗皇帝在御奎章閣學士院臣奏曲阜宣聖廟自漢唐宋金凡有隳廢必奉勑繕脩功成則勒之石衍聖公以舊廟將壞飾書奉圗屬學士院以聞時文宗覽圗諭㫖省臣趣脩之事竣則立碑以詔方來今新廟既落而成績未紀懼無以稱塞先詔御史章上臣等僉議請勑翰林侍講學士臣𤣥為文奎章閣學士院臣庫庫為書侍御史臣起巖為篆以臺儲中統楮幣二萬五千緡為立石之貲制皆允傳勑臣𤣥俾序其事𤣥拜手稽首言曰天佑下民作之君作之師昔者伏羲神農黄帝堯舜禹湯文武數聖人者作君師之道備於一人用能左右上帝克綏厥猷吾夫子出天獨俾以斯道凡天叙天秩天命天討之事夫子明禮樂刪詩書贊易道脩春秋而品節之以為百王法於後世儀封人曰天將以夫子為木鐸子貢曰固天縱之將聖夫子自論斯文之任上以屬於天下以屬於已使得位設教即前數聖人所為繼天立極者也是故天欲興一代之治則吾夫子之道必大昭明於時歴千萬世如出一轍皇元龍興朔方太祖皇帝聖知天授經營四方太宗皇帝平金初年歲在丁酉首詔孔元措襲封衍聖公復孔顔孟三世子孫世世無所與増給廟户皆復其家是歲厯日銀諸路以其半東平以其全給脩宣聖廟尋詔括金之禮樂官師及前代典冊辭章鐘磬等器遣官分道程試儒業世祖皇帝初在藩邸多士景從比其即位大召名儒闢廣庠序命御史臺勉勵校官大司農興舉社學建國子監學以訓誨胄子興文署以板行海内書籍立提學教授以主領外路儒生宿衞子弟咸遣入學弼輔大臣居多俊乂内廷獻納能明夫子之道者言必稱㫖在位三十五年之間取士之法興學之條討論之規裨益逺矣裕宗皇帝時在東宫贊成崇儒之美成宗皇帝克繩祖武鋭意文治詔曰夫子之道垂憲萬世有國家者所當崇奉既而作新國學増廣學宫數百區胄監教養之法始備武宗皇帝煟興制作加號孔子為大成至聖文宣王遣使祠以太牢仁宗皇帝述世祖之事𢎞列聖之規尊五經黜百家以造天下士我朝用儒於斯為盛英宗皇帝鋪張鉅麗廓開彌文明宗皇帝凝情經史愛禮儒士文宗皇帝緝熈聖學加號宣聖皇考為啟聖王皇妣為啟聖王夫人改衍聖公三品印章歸山東鹽運司歲課及江西江浙兩省學田歲入中統楮幣三十一萬四千緡俾濟寜路以脩曲阜廟庭文宗賔天太皇太后有㫖董其成功今上皇帝入纂丕圗儒學之詔方頒闕里之役鼎盛山東憲司洎濟南總管蒞事共恪以元統二年四月十一日鳩工至元二年十月初吉落成宫室之壮以寜神棲樓閣之崇以庋寳訓周垣繚廡重門層觀丹碧黝琧制侔王居申命詞臣揚厲丕績於是内聖外王之道君治師教之誼大備於今時猗歟盛哉皇元有國百餘年以來繕脩宣聖廟再丁酉之初以開同文之運天厯之際以彰承平之風東冐扶桑西踰崑崙南盡火維北際氷天聖道王化廣大悠久相為無窮治本實在兹矣有詔御史臣思立奉祝幣牲齊馳驛往祭臣𤣥既叙顛末請系以詩詞曰厥初生民倥侗顓蒙三五既作大道為公風氣日開民俗日漓道統絶續孰綱孰維少昊之􅇕東魯之土誕生聖人以淑萬古聖人以生代天以言立我民極與天並存維皇建極尊用其道百王軌範於以順考三光以全寒暑以平俊民用彰時乃迓衡天子垂拱大臣承弼體信逹順鳳麟時出皇元之興厚集大命太宗興文首法孔聖世祖龍飛多士屬心恢𢎞文治濬發徳音世及三紀仁漸義摩建學立師善人用多裕宗溫文祗荷詒燕成廟崇儒廸若天顯武皇英毅入繼離明載崇徽號玉振金聲濬哲仁皇文徳繼世誕揚祖訓籲俊尊帝爰及英宗禮樂孔殷穆穆明考蓄徳懿文文宗纘緒聖聖克肖乃開奎府廼飾孔廟今上嗣位丕式大猷勒石新廟宏賁洪庥新廟奕奕泰山具瞻衡紞紘綖衮裳衣䄡維宋維金遺刻具在於赫我元冠冕百代我元聲教極被堪輿黌舎萬里誦詩讀書維兹曲阜斯道之壼如水有源如木有本皇鑒在上執我道樞相我熈朝躋民唐虞睠言臺臣職是風紀昭宣獻謨實用歸美聖道王化如日麗天儒臣詠歌億載萬年江陵王新廟碑大元至正七年某月制故湖廣等處行中書省左丞相贈佐平南紀宣力功臣太師開府儀同三司上柱國追封楚國公諡武定阿爾哈雅改贈宣威服逺輔徳翊運功臣進爵江陵王官職勲諡如初制下王之諸孫以舊廟在天臨郡治之義和坊者襍於闤闠廟貌弗肅徙於故第之側作正廟七間中肖王像後堂稱是别作神主父祖子孫咸列於位歲遇王之忌日祭像前廟時祭嘗烝設主後室罇爼籩豆壹遵古遺廟之門廡垣墻崇大厥制克稱封爵享祀之庖齋宿之舎祭畢飲福之所各有序置經始於六年之秋落成於是年之冬曽孫慈利監郡阿爾斯蘭哈雅至瀏上謁𤣥記之惟王建國為國家表功之極榮子孫旌徳之盛典具載國史𤣥請舉其犖犖大者掲而書之麗牲之石庶㡬觀者知王之功在社稷徳在人心所為不朽者實在於兹𤣥博觀天下大勢古今以江陵平江南者四代焉未有不先得荆州而能得天下者晉以王濬益州舟師下江陵而吳降隋因宇文氏先取蕭詧江陵之北用以圗陳而陳亡趙藝祖即位之初即命慕容釗將兵假道以伐湖南延釗至江陵襲降髙繼冲由岳趨湖南周保權平然後東舉閩越西舉巴蜀南唐稱臣我世祖皇帝征宋既渡江阿爾哈雅以偏師搗江陵既而㧞之由是進兵遡洞庭薄長河遂平湖湘聲震南海丞相巴延以大兵順流而東徇吳越傅臨安宋主納欵故今之善言兵者謂王先取江陵其功不在巴延下向使江陵未附是時東蜀猶宋地也萬一宋人合荆蜀之兵以闚江漢雖勝負素定然豈萬全之䇿哉王下江陵降髙逵㨗書至上為之大燕三日手書以勞王誠以荆州定則東南之勢定矣厥後王建省湖湘分兵嶺嶠恩威並翔悉有其地宋太師既􅑒其孤臣謀立兩孱王於閩海文天祥亦舉兵江西湖南廣右王承制署吏勞來既久人心已安勢難動摇尋自覆敗故今善論功者謂王於斯時綏定湖廣視先取江陵之功亦未易以髙下論也抑𤣥嘗聞長沙先軰縉紳大夫言王初圍潭州守臣李芾嬰城固守者三月餘芾死力盡諸將乃開門入我師同列兩叅政怒其後降欲屠其城王持不可兩叅政不從遣使入奏王亦遣使附奏於上皇曰臣初徂征受命陛下首以曹彬下江南不殺人為訓今潭州城已降同列疾其拒命之久欲獮其民臣誠不敢負陛下先詔昧死為民請命叅政使偶先至京半月上詢知不自王所來疑之未即召見有頃王使至亟召入内得王奏大喜曰阿爾哈雅言與朕志正合乃召叅政使入切責之若曰國家征南非貪其國欲使吾徳化均及其民人爾今得土地而空其城政復何為汝不稟命主將輙為異同當正汝罪以汝薄勞今姑貰汝後復敢爾必寘汝法其從阿爾哈雅慰安吾民毋或異議使者往復十有四日奏下王布宣徳音城中官民士庶道俗男女貴賤長穉亡慮百萬㳺魚在釜寄命頃刻賴王一言易骨而肉由是列城聞風歸附相望未及朞年南盡八桂冐于南隅悉歸職方王之威恵其盛矣哉夫天之為徳莫大於好生聖人一天下之道莫先於不嗜殺用兵之不祥莫大於殺降殺降之慘尤莫盛於屠城將家一念之烈流毒數世其後嗣盛衰之報百不失一豈獨曹彬曹翰為有徴也王之子孫多賢文武才器代有聞人天之報亦昭昭矣雖然國家先定臨安後平淮東今追爵巴延淮安王表武功之所終先定江陵次平臨安追封王以江陵之地表武功之所始歟二王之論定天下混一七十餘年矣王家世北庭阿爾哈雅其小字也及貴以小字行其世系之詳見故翰林學士承㫖姚文公燧神道碑銘𤣥既述功徳之大者以遺後人復作迎送神詞曰出師四方訓以不殺惟江陵王受命徂征卷甲西南荆州底平揚旗洞庭和風鳴條駐軍長沙以逸制勞湘人籲降王實活之三軍不刃王實遏之土田第宅賜在湘野僮客千億是畊是稼奕奕新廟于湘之堧犧牲粢盛歲取湘沅朱弓金鎧新廟是藏鐘皷鞺鞳牲肥酒香王徠徐徐旗旄獵獵湘靈嶽祇惟是震疉王降庭止有蕃𦙍祉繩繩曽孫以享以祀曽孫繩繩自雲徂仍江漢同流汝功匹休皇家百世吾王不留言從世皇世皇遐征曠曯八荒乃睠南顧維此荆州曰汝之功荆州汝功朕世服膺今我嗣皇王汝江陵王拜稽首曰憑天威神筭天授荆人來歸洞庭泱泱湘水是滙王有曽孫廟祭來會國利利忠家利利孝忠有旂常孝有廟貌王來風雨王去日星焄蒿昭明曽孫以寜廟貌𢎞敞曽孫衆多挽留莫從屢舞以歌有朱斯扉有雕斯爼工歌渢渢福禄來祜載奉雕爼載闔朱扉萬有千祀王無我遺洞淵閣碑太極判二氣分陰陽各究其變後天設六子陳雷風獨彰其烈陰陽究其變而數行理氣之中雷風彰其烈而神寓造化之表迨夫世别醇醨位殊幽顯札瘥水旱若有握其柄者矣生殺予奪若有尸其職者矣道也者範圍乎兩儀法也者檢押乎品彚由是保制阨運道稱主宰攘除凶妖法入機用考夫漢儒列五畤之名而祠禱盛周官書十日之號而符呪興司厲有秩而祭于國袪疫有典而儺於鄉其所由來不既逺乎斯則洞淵之閣作於石晉之年端有自矣夫惟五季否塞羣黎憔悴時有神人拯世者出是殆旻天覆下之仁維伏魔三昧之尊實神宵九帝之一以無為制動以不怒示威觀厥圗回漠然兆朕爰自黄冠道士肇跡天成青衣道童接武淳化歲歴四百功施億兆稽諸郡誌酌以輿誦禦民大陵之患已民雩壇之嗟感應㨗於皷桴枉直明於槐棘至若樹降魔之幢于雲間得斬鬼之符于地下沴氣以之而屏息靈文由是而宣朗繼道童而神效者有大夫曰章氏焉剏三層之神居表一郡之傑觀雖焮隣冦具存遺規里人評事彭梅叟獨割已貲追還舊貫驅五丁之力以鑿石掄百尺之材以荷棟揭洞淵於絶頂用縱凡目顔寥陽於上層繼曰聖境中標諸天冠寳閣之稱下扁朝元著璇題之會寥陽肖像七御儼如天宫伏魔専俟諸天列叙帝馭朝元距地而稍邇飛仙齊班而上趍直北面勢題極髙明綺䟽透乎初日藻繪留乎行雲閣後崇壝其名虗皇贊府歐陽確旌表彭知微裒衆力之所作也壝後累榭以奉三寳居士周繼祖李必興踵義士之所為也三棟中逹兩廂傍峙左挾之屋重上懸鐘千斤右挾之屋如之鳴皷百里左廡則薰南鎦崇勛作天師閣右廡則潭東劉龍祥作三官閣東為延真觀舊主洞淵新侑𤣥帝北坡彭仁叟之所剏其神遷自壬癸福地者也北為鳳林橋上引鈐岡下通青原茂林楊學周之所建其意比擬河漢閣道者也神幣燎而不炊其爐曰光明藏神泉引而無害其井曰清淨源毎嵗上元設齋半月金碧炫轉於西東琉璃晃耀乎表裏張燈如漢太乙蹤跡通宵而可行題榜若魏凌雲鬚髪望空而欲白刼利兜率彼皆鋪張華林鬱羅孰得逰覽故夫地位之髙有若兹閣神人之好信在於樓乎而况發武功過孤川山脉鍾其秀矣導攸輿匯盧洞江流蓄其靈矣城濠通龍湫之穴郡市布蜂房之居要之地固以仙而名境亦資人而勝鍊師雲牕周孔鼎靜嘿蕭宣徳西叟李應康𤣥門之梁梠羽帔之冠弁品登真錄功播珠庭者也守約曽從龍省齋歐陽慶祥翠峰彭大同坦菴施端履斯立曽廷暉靜學劉孔彰矮牕蕭恵通無為王雷發洎夫桂林可心之劉曰元亨曰道𢎞環中澂川之彭曰克恭曰道明塵外之曾曰貴寛適吾之劉曰益新皆宗證之幹蠱冲侣之裒謙能使丹芝之茹有圃青精之飯有田扇離坎而液祥金起般輸而獻神伎然後聲鏗律吕之和器備天人之供者也貴寛㓜從先人來斆真館及長離俗之志勇褆身之律嚴佩混元之祕章茹抱黄之梵炁撝訶而百靈集禜禬而諸福臻為兹山而徴辭壽斯道於來裔真其人也與嗟夫赤明延康坐更歴刼勾芒𤣥㝠迭御四時洪惟皇元昭授神筞歲宗羣望代闡釐事切意洞淵之於明時正猶希夷之於衆物人見主張之功若無事者孰知輔翼之恵又振徳之乎雖然商顔邇徳人之居當疵癘之年亦獲免是華封居放勛之世舎富壽之祝則何以哉載揚洪庥請志善頌銘曰粤若邃古太和磅礴柔剛相乘饒乏紛錯情滋偽生氣嬴沴作道惟虗集庶物槖龠神繇精聚九圍郛郭閏晉非据烝黎罔託煜處江沱晝火其爝軫野遘災帝𠂻是愕維時洞淵受命碧落相爾黄冠抽我𤣥鑰茢氛彗歊禊穢哲惡道心刳螟善氣辟蠚三樟巢鳳孤笛舞鶴爰欵冲逰誕矗穹閣琪樹層柯金枝重蕚翾升華拱疊欆朱欂飛亷霄騫天祿雲躇赫曦雕櫳鮮猋虗箔帝真燕娭營衞揮攉匽旌吳囬函琛海若祝融灌烽蓐收噤􅈀年降屢康歲興長樂士勤竹素農力錢鏄商通車輦工世榘矱征行靡占疾疢勿藥皇風載熈大道斯廓罔俾仁聖職憂民瘼神之格思萬壽攸酢曾塵外鍊師來求洞淵閣碑惜予久病不能親書煩致意青城楊奉禮為余䨇樞筆作漢𨽻書之歲久當與韓擇木桐柏觀記爭先進而方駕漢魏可也如字多碑窄可倣張長史郎官石用小楷書之青城皆足辦此故以相屬也元封祕書少監累贈中奉大夫河南江北等處行省參知政事䕶軍追封齊郡公張公先世碑皇元勑有中原樹建侯伯經營四方濟南張氏得國於齊在東諸侯中脩臣職甚謹權府歴城張公受命我元為齊陪臣父子相承屢攝齊政内治新政外禦强隣彌縫周旋使齊事我元甚忠故張公有功齊人甚大世祖罷侯歴城子孫仕於天朝仁宗繼述祖訓開科取士延祐甲寅有臣起巖首貢於齊明年乙夘大廷䇿士擢第一人實歴城張公曾孫多士偉之父中祕書齊公範碩德髙年生受顯爵及其即世子仕日崇贈典日厚今皇上纉緒起巖列官中書參崇國議尋進二品父範贈河南江北等處行中書省參知政事追封齊郡公推及大父贈封有差至元二年三月十日上御厚載門奎章大學士臣錫喇卜從言於上曰侍講學士起巖服勞累朝恩賚先世将為碑銘垂諸久逺其勑翰林直學士臣𤣥製文奎章閣學士庫庫書丹奎章閣承制學士師簡篆其碑首以賜上允其言於是臣𤣥承詔討論張氏本章丘人逺祖逸避兵難贅禹城吳氏家生三子曰某季曰寅娶髙寅二子長曰敬宗娶燕三子長曰道娶李一子曰廸字吉甫是為懷逺公實權府府君之父中秘書齊公之曾大父也姿貌偉傑膂力絶倫臂擐石獅子起行戲與里中少年角無敢嬰者狂虣無賴遇輙以力伏而拱之善騎射能兼控二强弩綰弦著指連彀俱滿軀榦才力中募版本軍三翼都總領金人南遷寓迹農業齊國張忠襄公行尚書省濟南招致帳下用戰功遷濟南兵馬鈐轄城中更兵燹公私廨舎盡焮忠襄命權府事公繕郭郛建府治畫閭里招流亡駸復舊觀時有隣冦晝旂夕柝斥堠明肅衆賴無恐行省自水砦還治拜懷逺大将軍元帥右監軍濟南府推官佩黄金虎符仍提領歴城縣事忠襄南征荐命留後公蒞政亷平號稱良吏兵後民稀城内外多間田召民占射墾為水業已獨無取事平從民買田城北浹河生平治産不求豐腴纔足即已嘗曰吾祿足以給衣食居足以避風雨安用怙勢殖私以為子孫累為吾志玷耶娶李追封齊郡夫人一子福字顯祖是為權府君府君雄健有父之風尤孝敬好學讀春秋左氏傳貞觀政要能背誦年十九嘗重午日與諸将馳射栁閱武堂下一發命中身手驍㨗忠襄賞補列校歲庚寅從朝和琳預議伐金從取邳圍沛食盡其将率敢死士夜斫營謀突圍出府君力戰却之退擊劘其壘而還詰朝沛陷給白金符為中書奏差從攻宋蘄黄有功縣官増諸路兵濟南調二千三百人齊人繹騷奉省命謁於上曰兵興民疲役無虗歲今又増兵物情易駭盍寢其命以安危疑敷對詳懇上大恱從之准舊制丁二十人調一餘罷不行得㫖馹還所過宣上徳懽聲如雷擢濟南軍民鎮撫都彈壓行中書省伊囉斡齊建議常征外増銀六兩視絲綿中分折輸嗣侯宣恵公将遣使入奏而難其人府君請行至白藩王曰新邑民已定正賦今又增額将不堪命王以聞命遂罷遷兵馬鈐轄府事從宣恵私覲面陳上前乞休兵息民以養其力上嘉納之侯解𤣥貂玉帶以旌其忠侯薨即藩王所奉子宏朝和琳宏嗣國是為武靖公府君歸力請致仕進諸子曰吾輔齊國三世朝㑹征伐未嘗不從今五十有六其歸休之時乎年七十一終居家處官教子人取以為法娶楊氏鎮國上将軍左副元帥通女弟有淑徳孝行追封齊郡夫人五子中子鑄山字宣卿一字仲宣號黄臺野客是為天官齊侯英邁豪爽㓜負竒節讀書通大義交友重然諾布衣以大任自期古人自朂出中庸大學授諸子曰爾曹熟此宰相可能也天官嘗宰歴城讓其丞叚而已丞之祿入均恵族䣊而日與賔客擊鮮為髙㑹每傾已賑人已匱不悔人負不尤至元官制行遷官臺監塲管勾辭不赴改愽州錄事判官轉陞東昌仍其任居官介然官滿赴調常鬻産治装逆旅雖至乏絶人或周之非義不取能工書得黄豫章米襄陽筆法至元癸未十月十八日卒薊南城年四十九以孫貴初贈中順大夫禮部侍郎上騎都尉追封齊郡侯娶安氏山東行省左右司郎中圭之女累封齊郡夫人二子長範次髙蚤卒三女長適翟氏夫亡貞節次適宋某次適侯瓚範字議甫號孟齋是為中祕書蚤穎悟長博學强記先侯守官清約家無宿儲公深自貶損贏以為養及厝塟如禮嘗寓平原徳平鎮因古堤架屋為童蒙師或踰旬時不出門人號不下堤先生性不事華靡篤學信道尊聞行知善善不倦惡惡不避學者擬諸古人厯仕維州學正寜海左翊侍衞教授除四川等處副提舉子貴封集賢待制奉議大夫驍騎尉厯城縣子加封朝列大夫祕書少監驍騎都尉齊郡伯天厯戊辰正月二十七日就養京師卒年七十有七贈翰林直學士亞中大夫輕車都尉追封齊郡侯加贈中大夫河南江西等處行中書省叅知政事䕶軍追封齊郡公公善吟詠富著述有蓬牕藁益齋旅齋二集能大小篆𨽻行楷皆遒勁有體娶丘氏先卒再娶薛並封齊郡夫人二子長起巖薛氏所出初授集賢脩撰遷國子博士監丞司業歴翰林待制監察御史中書右司貟外郎郎中兼經筵官轉太子左贊善燕王司馬拜禮部尚書參議中書省事陞翰林侍講學士中奉大夫知制誥同脩國史尋以本官知經筵事出為江南淛西道肅政亷訪使未行奏留侍講進知經筵俄除陜西諸道行御史臺侍御史娶某氏封齊郡夫人次如古國子伴讀大司晨掾娶某氏孫男二順孫堅孫女一初𤣥登第出起巖榜下同朝十年入翰林為僚友齊公之墓𤣥為之誌先𤣥父渤海侯蒙恩賜碑上勑起巖故𤣥聞命不敢以固陋辭惟張姓之始軒轅子青陽之子揮觀乾文制弓矢因得姓濟南忠襄爰聚厯城姓同一初始奮以武終顯以文君臣相須蕃屏王室後先封齊豈偶然者懷逺公賁育之勇至於治國仁如鄭僑亷如晏嬰撫民乳雛如療飢渴權府府君生而忠孝資備文武盡瘁所事勤施於民旂常司勲伏臘里社殆未為過齊侯志崇心庳尚友往哲齊公真脩實踐蔚為醇儒四世功徳積久發閎宜厥後人出際熈世褎然掄魁為國羽儀迨其立朝凜有風節舒徐進退求福不回豈非先世嘗有豪傑偉人稟賦敦龎未究厥藴氣鍾子孫才器深茂福澤與俱我國家因以得名世之士哉抑功及民者未食其報造物以遺其子孫哉推其所自是宜為銘銘曰自古有國文武迭張顯允厯城齊姓之将代有鼎士奮於齊疆經緯文武與世相當國初戡定厯城父子有力如虎世為齊卿攝治其府區宅畷田民奠環堵既輯其民又禦其侮夫優維何民訖可休有増乗賦是克是掊夕馳我馬朝告厥猷天子曰嘻予嘉汝謀為是暴斂我民何郵欽哉爾往獻納是籌命爾朂爾侯度是脩爾田勿萊爾政勿苛農弛勞於野士畜銳於家時維張公恵齊孔多齊轄日膏齊廩日盈張氏獨貧三世筆耕豈善治國而不知治兵有遯黄臺有斆徳平蓄德陳陳發聲訇訇宜侯宜公庶其哀榮累洽重熈時尚維文有偉國彦積文䇿勲奏篇大廷上曰不羣繩武乃祖藎忠我君出敷王言入贊聖謨踐敭政塗匪臺伊閣徳容溫溫良玉善琢維仁騶虞惟瑞鸑鷟上勑詞臣考徳諏義錫朕寵命誄其先世有貞斯珉有亢斯竁亶其揚休式勸有位元贈效忠宣力功臣太傅開府儀同三司上柱國追封趙國公謚忠靖瑪哈穆特實克碑國家彌文百度惟貞納民軌範垂則永世於是羣公先正先朝臣隣敷陳申命賜誄昭天漏泉罔不承休元統二年九月壬子中書平章政事臣薩廸臣克埒濟蘇等言於上曰户部尚書臣和塔拉實克乃祖伊克徳勒乃父瑪哈穆特實克事我世祖皇帝懋建嘉績仁廟在御並贈太傅封趙國公今将為碑其勑翰林直學士臣𤣥製文侍講學士臣起巖篆額戸部員外郎臣楊益為書以賜制可臣𤣥受命退閲故府得故學士桷行詞及和塔拉實克具事狀來乃叙而銘之思昔先王辨方正位體國經野必有多才藝之臣共成厥功爰及後主繼體守文亦必有世爵祿之臣共享其利有虞共工之官成周宫闈之守後世子孫著以為氏其可徴也考功記曰國有六職百工居其一國詩定之方中之傳大夫有九能第一曰建邦命龜夫六職者王公論道大夫立政在焉九能者使臣造命師旅􅊎衆次焉以是知審曲面勢之為職揆日作室之為能方是數者厥用大矣我元造邦臣伊克徳勒瑪哈穆特實克功居六職之一才擅九能之先贊體國之謀濟世官之美是碑為宜按伊克徳勒系出西域唐為大食國人世祖居潛已見親任己未南征還幸其第伊克徳勒聞乗輿至衣地金以藉馬蹄尋裂金分恵從官上深納其勤欵庚申即祚命董察卜達爾局凢潛邸民匠𨽻是局者悉以屬之察卜達爾云者國言廬帳之名也是年九月錫金虎符䕶以璽書至元三年定都於燕八月授嘉議大夫佩已賜虎符領察卜達爾局諸色人匠總管府逹嚕噶齊兼領監宫殿時方用兵江南金甲未息土木嗣興屬以大業甫定國勢方張宫室城邑非鉅麗宏深無以雄視八表伊克徳勒受任勞夙夜不遑心講目算指授肱麾咸有成畫太史練日圭臬斯陳少府命匠冬卿掄材取貲地官賦力車騎教䕶屬功其麗不億魏闕端門正朝路寢便殿掖庭承明之署受釐之祠宿衞之舎衣食器御百執事臣之居以及池塘苑囿游觀之所崇樓阿閣縵廡飛簷具以法故役不厲民財不靡國慈足使衆恵足勞人功成落之貤賞稱首歲十二月有㫖命光祿大夫安肅張公柔工部尚書叚天祐暨伊克徳勒同行工部脩築宫城乃具畚鍤乃樹楨榦伐石運甓縮版覆簣兆人子來厥基阜崇厥址矩方其直引繩其堅凝金又大稱㫖自是寵遇日隆而筯力老矣紀功太常攸效欽崇部人鑿石作像髭髯咸肖沒置墓舎族屬見之謂其非法謀棄隱處世祖夜夢伊克徳勒若有愬事狀如生平明發召詰其家以像事告亟命止之賜楮幣萬緡作祭事子瑪哈穆特實克實世其任大駕時廵上京出狩近郊入門甫植幄帳預存風雨攸除燥濕具宜齊祭張次燕享設帟制作疊出等威以張物絶濫惡工極縝緻亦既厯年小心匪解數被殊眷積階正議大夫遥授工部尚書領察卜達爾局諸色人匠總管府逹嚕噶齊以終四子長曰穆爾薩蚤世次曰茂巴爾斯以正議大夫領察卜達爾局仕至元貞授工部尚書次曰和塔拉實克由餘杭浦江監縣厯江南陜西兩臺監察御史轉漢中僉憲雲南行省都司入為户部員外郎内臺御史大都路同知出為南山淮泗兩憲副杭州為總管復入為大都路逹嚕噶齊再出為濟南總管三入為大興府尹十五遷為正議大夫戸部尚書次曰阿哩衮實克不仕孫烏瑪喇寔穆爾薩子當襲是官以㓜乃用阿哩衮實克子穆爾薩繼領察卜達爾總管府逹嚕噶齊烏瑪喇既長授揚州織染局同提舉先世茂巴爾斯請于朝制贈伊克徳勒效忠宣力功臣太傅開府儀同三司上柱國追封趙國公謚忠敏娶和塔拉額實封趙國夫人贈瑪哈特穆實克推誠贊治功臣太傅開府儀同三司上柱國追封趙國公謚忠靖娶烏喇特呼圖克封趙國夫人至是和塔拉實克中外踐敭不失令譽有司厚往飾終施及祖襧厥有繇焉人臣盡忠所事信必有後𤣥惟考周官之法誦楚宫之詩執太史之簡為小史之誄有君命焉不辭卒塟歲月事在壙石不書二代共為一碑用漢薛君劉君故事銘曰西域有國大食故壤地産異珎户饒良匠匠給将作以實内帑人用才諝邦周攸維忠敏公外譓中朗機警赴功敬慎事上私第翼翼南還駐仗軾我路馬地布美璗左右世祖羽翼雄創受命繕營廓智𢎞敞楗梯設梁九軌夷曠木槤陶萬夫于往取鍜取厲于剗于磢有盈斯覺有閎斯抗皇皇紫宫民極環仰軒轅綴列鈎陳聨象黄龍負柱金爵栖榜六寢儷美百雉侔狀心諦間架目諧尋丈手胼屏翰心瘁保障詒彼忠靖世筦廬帳氈施重霤駞挽百兩秦蓋封樹唐衣愧瓬曷覩國制麗宻無讓榘矱相尋雲來是倣熈庸帝縡佩寵天奨業盛曷奕光流􅆄蠁穹碑啟道貞石詔像夢徴辰告秩冠寅亮賵文膴原襚貺謚壙雍都疇俶洛宅敦昉企蹤保奭嫓績蕭相圭齋文集卷九欽定四庫全書圭齋文集巻十元歐陽𤣥撰墓碑銘元故中奉大夫江南諸道行御史臺侍御史劉公墓碑銘至元元年冬十月江南行臺侍御史鐂公未引年拜䟽致事歸長沙二年夏四月丁酉薨于私第是年冬十二月以治命𦵏湘西嶽麓山之原湖南憲使汝南梁公遺既志其蔵諸孤奉行實来瀏以墓表屬扵契家廬陵歐陽𤣥請文志諸石按公諱宗說字傳之世成都華陽人大父宋末甞為茶陽軍使因家鄰境之攸輿㓜侍祖父逺宦嶺外既孤適遭宋亡克自樹立從郷先生趙公抃學于宜春年十二三能屬文有才諝踰弱冠以薦補廣西憲史再辟湖南貢南臺察院史嵗滿調衡州録事判官中書刑部辟職官史皆未赴臺除廣西憲司照磨選充南臺掾改湖東憲司照磨仍畱掾南臺擢海北憲司經厯遷河南憲司經厯拜南臺監察御史轉河南江浙兩行省貟外郎江浙未赴改南䑓都事入爲中書右司都事拜内䑓監察御史将進臺都事力辭出為山南浙西兩道肅政㢘訪副使復被選為臺都事俄出為淮東道肅政㢘訪使陞廣西道肅政㢘訪使移江東道肅政廉訪使召拜刑部尚書尋歸休於家起為江南諸道行御史臺治書侍御史陞侍御史積階中奉大夫公敭厯臺省諏咨四方出䖏偉節規橅古人初掾桂臬訪故父旅殯行諸蒼梧即投檄辭歸以申情事孝節著聞見器諸老厥後宦業寖盛受知文皇主畫中臺上所親擢侍燕内廷鬚髮盡白或謂公老上曰傳之在南臺已然此正老成可用之日也公被眷遇知無不言進退有度縉紳則之移疾告歸上弗能强廣右之命公去留之疾愈治行益用見信及以秋官召還文皇賓天遭時多艱大獄屢起語連宗親公公正不撓刑無濫施事定勇退論公生平忠孝大畧扵此槩見所至蒞政詳眀用法矜恕挺囚藤梧冦黄亰夫脅愚民為亂有司坐首從皆死公誅渠魁四人餘四十二人免家屬論徙遼陽肇州公謂驅炎墟之民居沍寒地名為减死實寘死地請留嶺南屯田全者六百餘口讞獄閩淛言海冦初皆王民身䧟惡地無由自新宜許以貰罪復業後用其言盜皆為農河决大梁城門不開公按視得髙陵撤相國寺朝元宫木為橋百餘丈道民循城顛行薪米不絶比屋乃炊河决小黄村陳顥千里皆沒公督有司盡力犍閉河復故道流離日還淮東大饑勸分維揚一日得楮幣十五萬八千八百餘緡所賑以戸㑹三十一萬三百有竒以口計一百一十四萬一千八十故公政聲發軔海嶠振于河淮由平反恤災之功居多至於吏能則在中書右司兩月掾屬心服其竄正吏牘運筆如飛造次之間辭理俱暢在刑曹半年滯事悉决乃定遇革刑制七十六欵頒示天下無復質疑公處寮寀退然一儒未甞少自衒襮獨善善惡惡無所避覬在河南時薦前憲使韓從益行省郎中納琳等二十七人為刑臺御史薦浙西憲使許敬思户部尚書喀爾囬囬河南行省員外郎胡彛等五十五人乞召還敢諌御史李謙亨成珪扵竄所乞叙用故臺臣益陵真中丞苗侍御等八人於家劾前中書左丞黨附權臣暴歛為虐劾河南行省叅政徃括田江西横歛府縣激變為廣右掌政能制僉憲不敢為苛為南臺幙賓力斥中丞繩下之酷為荆憲黜賍吏三百九十八員汴蒙古都萬户畜巨獒納豕肝肺芻人腹中習獒咥人軍士忤已輙嗾殺之公正其罪江陵豪僧謀人荻園誣以殺三僧焚之置三豕心燼中為騐公辨其詐抵僧罪釋無辜二十一人湖廣辨章征徭恇怯公奏罷之古縣戍將據校宫毁宣聖像公定罰錮之海南其劾閩憲聲跡兩使者望風解印嘗不就江西行省辟掾時相為之慚色自居下僚比至要塗論事英發往往洞識治體至大中陳革弊防姦戢貪除暴等十事又言六品以下封妻不及父母非人子志後封贈倐罷又力請復之延祐中請置東宫宏文舘選端人為宫教博士講六經以輔儲徳又請除迯戸糧置迤北㳂河倉儲節臺中罰布之用以助賑濟榷古今錢幣之制以便小民至順中言盜駝馬牛羊罪當為等差百官名在罪籍不宜普該恩澤或至再叙侍文皇清燕密上封事其目曰眀人倫序宗族命賢相慎殺戮義取仁守保全功臣貶酒􅇅色親忠逺佞儒臣進讀宜講帝王之道勿事浮靡罪人妻孥分賜臣下宜别宗親以存上下之分皆稱上㫖凡所建眀咸以著為令或遇布政輙在議中其恵利久遠若築堤海康闢田萬頃以徕海外耕民海北民鬻食塩又輸塩丁錢公奏弛其征文皇居潜瓊筦以是知公疾革猶索紙筆作遺表欲有所陳未成而薨年六十有九曽祖鑑宋宣教郎祖㬌髙宋韶州通判贈嘉議大夫禮部尚書上輕車都尉追封彭城郡侯父重坤贈中奉大夫四川等䖏行中書省㕘知政事護軍追封彭城郡公娶毛氏繼娶王氏皆先公卒並追封彭城郡夫人再娶張氏三子長孝友承事郎岳州路經厯公未寝疾奉命展省先塋聞訃得疾後公六十一日卒次孝敬登仕郎永州路知事辟湖廣省掾史次孝恭廣西道宣尉司照磨女五長適江西郷貢進士張仁偉次適伯顔次適卜徳生次適孟坤珍次適歐陽忠皆士族孫男四好禮好義好信苟兒孫女三觀音奴觀奴永安奴公博學强記淹貫經史以禮部公號雪界因號雪峰以志蜀土有奏議詩文若干卷傳于世早從涿郡盧公處道學詩擅名古體盧公憲湖南嘗語人曰鐂掾傳之天資髙邁他日綱維風憲必斯人也及公為臺端衆咸以為知人𤣥先君子内翰公於鐂公契友𤣥辱知尤深在胄監時嘗遣子孝恭受業舘下誼不得辭乃叙而銘之辭曰温温劉公如玉不瑕臨事決義蹇蹇法家以儒發身以學施政措為治才著為辭令惓惓告君懇懇許國粤有風紀我扶我植自厥筮仕奮由丞掾迄其懸車終始司憲入也獻替出也咨詢官之凖人邦之藎臣文皇知公字而不名雖閔勞勩實仗老成上飲公醇公疾弗勝有殽有核賜以豆登丹頬白鬚拜起給扶尚竭心智載陳謀謨秋官予環遷出綴衣有執國柄赫赫作威公職司平獨立無悚止辟不滛展也仁勇卜居長沙謝事建鄴輕舟来歸賦詠盈箧胡不百年為國蓍龜眀禋召從疑事就諮蒲輪未臻榆沈斯作𦵏以公輴率履無怍子孫詵詵世被徳馨節恵有典眡此貞銘元贈從仕郎吉安路吉水州判官周君潜心墓碑銘安成周君潜心卒之五十九年以子貴有䘏典於朝将録其副以告墓次其孫絢奉其宗人南瑞所状行来京師謁銘扵予維周氏姬姓厯秦涉漢初至三國兩晉多名臣載史傳唐季有諱璟亦有聞當時其四世孫威避難遷金陵威子矩仕南唐至御史壻楊竦為吉州刺史矩至吉因家焉二子長翰次羡羡登宋建隆間第積官光禄大夫卒贈僕射又遷屬邑之西昌其族蕃衍科第相望部使者號其里曰爵譽羡子廷訓仕至供奉廷訓子昭為江陵令卒贈殿中丞有五子次子大理評事中師生䖍化少府夀之夀之子倩遷安成之後林里又四世為潭州通判士貴士貴子人望人望子繼祖是為周君之父君諱晞顔初字景顔後字潜心自童丱器如成人年十有六喪父内保家訓外親良師友奮自樹立稍長脫去拘攣識趣軒朗舉措不擾才力恢恢至元丙子江南初内附官府易置世務方殷故宋吏胥挟文為姦里無賴又為囊槖善良重足而立君以孤遺出應門戸機警辨恵果决有謀既足自彊又能為姻族郷井捍禦外侮衆皆倚之為安兄志伊蚤世君撫其孤不翅已子先業粗給君善經理遂致贏餘推其所有輙濟貧乏惟浮靡虚誕之士雖數干請秋毫不可得居郷善善惡惡予敓不偏訴訟有未之有司而先質正扵君者陳義秉法而劈析之咸得肯綮嚚俗為息江西行省郎中杜仲寛聞君之賢方薦君進用俄抱病歸未㡬卒于家年裁三十有三初娶王氏先三年卒再娶觀溪劉氏五年而君卒初劉氏之祖母亦蚤寡以貞節聞辛勤教子後皆擢科湖南轉運司帳管斗則劉氏諸父南康主簿玫則其父也劉氏在閨門時習聞劉母懿範故能守節自誓又能以教子為先務次子遺腹所生日抱之泣行道聞而哀之君柩久在菆不𦵏人問之曰吾婦人安曉𦵏書俟吾兒長自卜其地且未亡人守此柩日夕與俱猶同返窀穸也遣子就學嵗時從師之禮無􅇅否則質簮珥以繼二子感激孝養備至學殖日勤今皆成立長毅用憲司試為瑞金縣儒學教諭陞吉安路學正借注廣州新㑹縣藥徑砦廵檢辟廣東元帥府令史從元帥平循潮二州冦有功遷桂陽路捴管府知事有政績湖南憲課其最嘗平反死囚二人及去官為立生祠厯兩考進階從仕郎贑州録事次恒以儒推擇為臨江贑兩路掾嵗滿為上猶縣典史毅仕至七品君得贈官其配亦追封宜人君卒以至元戊子六月十有四日葬以大徳庚子十月十有九日墓在州北清化郷鄴城里鐂氏卒以泰定丁夘四月十有九日年二十有七失所天六十有六而終葬以至正辛巳十二月十有七日墓在新樂郷之山塘祔姑李氏阡女一人王氏出適進士彭躍龍子務徳孫男四人紘絢浩澄孫女三人曽孫七人君初失父遭時孔艱及其自立涉世又淺而郷曲之譽流芳無窮沒世之後家有節婦門有孝子克亢厥宗子宦業日盛國家飾慎終追逺之恵方來未涯是宜有銘銘曰行以集義僅施于郷為善竭力得年不長數有乘除分有豐嗇已播弗穫後人是食趙祚既訖君方弱冠家緒不蠱君植之幹若負竒氣不為侠資救難則勇恤孤則慈視前斯振顧後斯燾年不滿徳君子是悼有婦誓節志不負君有子力學底績于文生也曠遼一命若訒贈恩便蕃子仕方進有源斯委孰禦其沛惇史作銘以訓未艾元贈奉議大夫樞宻院判官驍騎尉追封浦江縣子鄭府君墓碑銘有序大江之南淛河之東有州婺有縣浦江有旌表家鄭氏九世同㸑朝廷嘉而旌之至是又有贈典告于其家是為樞判府君由其子深起家為右丞相太傅府長史階正六品初贈國子監丞及深遷宣文閣鑒書博士階正五品當進贈其親故府君有是命也府君諱銳字景敏其先滎陽人十一世祖曰凝道遷歙凝道子自牗遷睦之淳安自牗之孫淮遷浦江淮樂善好施宋靖康年饑鬻田千餘畝以賑其里人號所居曰仁義里淮之孫曰綺號冲素處士事二親盡孝父照忤時貴得罪文以重辟綺上書郡守錢端禮乞代父坐法守為之直其父寃母張病痺手足皆廢三十餘年凡就便液綺必抱持其主家政嵗入絲粟不私鄭氏九世不異財實自綺始綺之元孫龍㳺丞徳珪青田尉徳璋尤篤友誼怨家以死中璋法當逮維楊珪請于有司以身代璋行竟死逮所珪子文嗣璋子文泰皆克紹一門薪餐食指數百如出一身令刺史舉察以聞旌表其門曰義泰二子長銳即府君㓜頴悟日記數千言長眀春秋事母賈孝竭力以供子職賈病晝夜衣冠以侍湯劑者數十日無懈容其與兄弟處表裡始終無間言怡悅見扵顔色嘗典義財每自朂曰吾家累世義居至吾之身或墜先訓萬死不足以贖媿乃創為式用財纎悉必附日乗月吉以似家長署而通考之由是鈎檢有法一如官寺規可以久性勤儉任事不憚勞有餘即好施見里之貧約必思有以賑之暇日習詩及小楷殊有思致延祐甲寅初科以眀經貢扵郷一試不偶即舍之曰當以付吾後人生以至元己丑之二月二十有七日卒以延祐庚申之十有二月一日壽三十有二聞其訃者咸悼其蚤世眀年辛酉三月三日初葬義烏縣延夀山之原今改本縣靈泉郷娶樓氏子二人長深次淇深字浚常失所依恃二十餘年負笈入京以文行受知前太傅右丞相被選為長史推恩及君贈承直郎國子監丞樓氏封恭人及深遷宣文閣受經郎再遷鑒書博士擢吏部貟外郎今除僉江南浙西道肅政㢘訪司事君進樞宻院判官勲驍騎尉爵浦江縣子階奉議大夫樓氏亦累封浦江縣太君深於予有斯文之契以福建㢘使貢公師泰所為行狀来謁銘辭不獲序而銘之銘曰昔在唐虞風俗淳美史稱可封比屋皆是降及戰國阡陌既開史稱素封實雄扵財鄭門七世資義不竭使居唐虞在可封列家擬素封惟義發身致有誥命受封惟貞司造孔眀無善不報惟樞判君實踐允蹈孝親友兄惇族睦鄰撙用致豐植弱賑貧義規我守義産我掌有勾有稽有籍有帳學眀麟經一試塲屋出抱遺編以授子讀子蔚有文進遇東閣謀裨鼎軸畫主帷幄再遷宮師授業内庭秘閣鑒書講筵譯經乃登要津判銓天臺惟君恤典恩寵鼎来進班宥府錫爵蒲璧義門日崇車駟翕赩靈泉新阡遷自烏傷太史勒銘奕葉有光元贈應奉翰林文字從仕郎安成劉聘君墓碑銘國子助教鐂君文廷既陞于朝當推恩其親天官為之擇舘閣美名以居之扵是贈其先君子劉公以應奉翰林文字從仕郎應奉即唐供奉金人避其主嫌名改今稱國朝因之雖七品階實北門詞臣惟朝士知名者得以是榮其親文廷將歸燎黄于阡状其先徳謁銘于余余至順庚午校藝南宫文廷余所得士也為國子祭酒又同在胄闈故為之叙而銘之叙曰公諱蒙正字聖功安成漢為縣屬長沙國劉氏為長沙定王後故家焉公十四世祖曰五䖏士初徙城西湯村晉安復縣也處士生唐末五季有善行于其郷涉宋三百年鐂氏科第相望皆其後人公㓜有宿慧五嵗屬辤八嵗能舉子業號曰竒童父甞攜之貴人家貴人命以賦援筆立成思致不凡坐客歎服一日父于役公戯母周夫人側適諸父夜課子姓以郷校賦題燭䟦未就周夫人曰諸兄方苦吟兒則戲劇何為公俄黙若有所營飡頃曰兒賦就矣索紙筆寫之周夫人命以質諸父諸父為之失色以示諸郎曰若輩徒長大曽不愧是兒眀日賦傳誦衆口郷前輩争造門呼出觀之居無㡬世改科廢公年方富才器卓犖自以用不適時寖不屑為章句習㑹丁外艱撫事増悼終喪辭周夫人南逰衡湘常挹挹不樂喟然歎曰大人在菽水之養不可久違箕裘之業不可久棄幡然歸故廬盡發先人遺書淹貫六籍馳騁百家旁及盤盂隠奥虞初稗官靡不搜抉已乃大肆力於文沛然出其有餘沾被學者四方負笈及門如適工倕長短大小咸中矩矱它匠棄捐悉就斲削以公能誘人知方使厭飫日趍不容柅也性豪舉曠達先廬故占勝地猾鄰乗公出誘大駔暗據䂓為已有諸從巽愞不能制公還誓必復之駔亦難公奉歸侵疆公􅂸除塓葺招復徙者鄰以是嗛公㑹嵗祲郷田不毛鄰攰扵征布以計弛其肩於公人謂勢必返之不則病公曰人憊故求更憊而返之不仁里有貧不能輸者毁家以代之由是生計滋削然終不咎隣獨自責曰居不擇鄰非智去之龍雲溪上居焉溪上多故人士族樂公之遷遣子弟受業恐後四方勞問繦屬公内給太夫人甘膬之需外脩諸士友綢繆之好晩况殊適環堵蕭然戸屨常滿興至觴詠賓主盡歡髙談善謔傾倒四座酒酣取古人詩文擊節而歌聲沮金石踈髯古貌臞如列仙睥睨世故無足芥其胸次者一日飲傍舍暮歸沾醉就寝丙夜家人聞呻吟起問安公曰吾舊疾痛亘心膂嵗常殆今二十年復作其不瘳乎詰朝更數醫皆郤其藥不飲七日忽宵興正冠而坐召諸子語不及他唯以不得終養太夫人為恨言訖而瞑皇慶壬子十二月二十有九日也年五十有三疾初作周夫人已臥病公卒七日周夫人亡眀年正月十有一日諸孤用治命奉公柩葬于故廬之隂曽大父繼周大父先登父雲鳳皆為郷名士娶朱氏以子貴封宜人子四人長聞即文廷登第後調臨江録事有善政居成均事稱其稟以善教名次閈次閱次閏皆以經教授女二人長適賀氏次適張氏孫男女十三人公篤扵孝友弟應龍㓜孤妹歸李氏早寡于時饑饉師旅相仍公避難﨑嶇徃来百里間撫孤存寡恩極周緻家雖貧所識空乏即解衣推食無靳居郷曲有譽處豪右有道雖不好以氣岸加人而見者自失其負挟平生喜讀書過目成誦朋友乩疑隨事䟽荅云出某書見某註如腹有笥然為文渾厚條達不事竒澁下筆輙數千言雄議疊出多裨益世教切中治體人稱其有大對掄魁之材尤善知人誠偽䇿事成敗横逆無故至前了不為動人驟遇之見其髙世不覊之材未容輙致親附而明白坦夷雖家人細故不以欺客退而消去鄙吝終身不忘雅不喜浮屠幻妄之說聞朋友有佞佛者移書切責郷先生若静徳王公聖與青山趙公儀可復心崔公君舉養吾劉公将孫皆折輩行友之科詔既下公讀而喜曰吾老復見塲屋寜非天乎尋至物故齊齋彭公長庚祭以文曰科目方興而伏生死禮樂将用而河汾亡其見重名士如此公號山泉先生有美矉集若干卷學者傳之既沒時人見論事不痛快臨文不强人意輙太息曰安得復見劉山泉先生銘曰公之學碩以多可擢巍科公之詞雅以麗可司帝制有其學不科其擢父懐其璞子獻其㲄有其詞不制其司生背其馳死踐其資其有不居其蓄不祛其達敷腴其償寓諸茫茫九京公莫起矣瞽宗有辤惇史有讄元故徴士叚公禮廷墓碑銘有元徵士叚公禮廷既𦵏之十年其孤徳輔徳文介余故人之子聶孟宣以公之行實謁余請銘其墓道之石予始辭之孟宣請益謹乃述其行而為之銘維叚氏廬陵之龍溪人入唐以来代為顯官有積階至銀青金紫者公諱士龍字雲亨禮廷其號也曽祖仲仁祖文郁父子開字叔茂􅃅真逸處士始遷長沙城中三世皆有徳之士公本真逸族子宋季叚氏有登進士第卒官成都華陽主簿諱文煥者公所生曽祖也以詞賦兩請漕貢進士諱議孫者所生父也内附初世故多艱貢士徃安成依妻家劉氏以居前至元辛巳公生劉氏家年九嵗外祖鐂梅忩先生竒其頴悟真逸無後詢之族屬求可為後者見公拊之曰吾行四方閱人多矣是兒能振吾宗者請以爲子貢士持不可貢士沒母劉氏辛勤自立教公從師受學甚謹又九年真逸申前請彌切乃許以為後時真逸以貲雄于長沙得公幹蠱甚副所願公事真逸及母李氏盡孝遇弟士虎能友士虎字文亨本從姑之子與公同繼真逸為性剛果公每濟之以寛内篤恩愛外極彌縫家務大小咸當其可公之助居多由是家日益裕又加潤色焉真逸晩嵗優㳺之趣甚適公所生由文煥而下六喪未舉公竭力營厝悉如禮同氣四人兄可珍弟可立揭家從徙長沙公賙之有方既而夫婦俱亡公殯其二喪撫其諸孤使之咸有所凴藉女兄適印岡羅氏相距六百里饋問無虚月其他賑貧䘏難施諸外人無少難色每嵗發廪務平其值庚午大祲則損直傾積以濟存活無筭平生讀書一見隨了大義有所得輙加體驗而行當道薦以文學掾力辭不就家居命僮僕治生一經指畫即不以嬰懐惟與士大夫㳺樂而忘倦蓄古書畫暇日把翫清談纚纚不絶城東作三友亭常領客觴咏嵗癸酉㳺南嶽登祝融夜半望海日超然有從方外之志乙亥歸廬陵徧脩先塋之祭退而㑹諸族䣊姻交歡甚是年真逸年九􅐆歸為真逸夀擊鮮髙㑹遶膝奉觴鬚髮班白座客歆羡未㡬真逸病侍病勞勩及卒哀慕過情襄事甫畢公亦感疾逾三旬未瘳一日忽呼二子語之曰民生在勤勤則不匱汝曹勉之越數日疾復作瀕殆有僧怪牛素所往来問之曰究竟若何舉手畫一圈曰平生受用不離乎此子問家事不荅啓手足示之翛然而逝後至元二年丙子五月十有二日也三年丁丑十一月庚申塟善化縣龍坑之留思嶺公性忠厚喜愠不見顔色訓子弟能以身教有質問必中理得年五十有六未弱冠来繼真逸始終㡬四十載父子慈孝如一日中外無㡬㣲問言難矣哉初娶胡女一人適廣東寅尉副使聶公以道次子孟宣劉氏子一人徳輔李氏子一人徳文皆克肖孫男女各一銘曰人生至難為後於人其難維何尊尊親親親既區别尊有隆殺君子處之先識其大所繼所生置身其間不爽其宜得譽匪艱吁嗟禮廷動適厥中於分則嚴於情則通嵗踰三紀恩義周浃至誠咸孚靡間靡諜墳墓我省譜圖我脩兩宗訢合二郡綢繆廬陵長沙地壤犬牙叚氏蟬聨克昌厥家里稱善人士曰善士生有處譽沒蕃􅉙芷湘江之壖卜兆允臧魂魄所之咫尺故郷慶源川増後人其承惇史作銘詒爾雲礽元故隠士更齋先生鐂公墓碑銘有序公諱過字益翁更齋其自號也㓜頴悟日記數千言稍長受學里中王珏王客故相江公萬里家其弟信豐宰逵父往來公從兩王先生咸稱為畏友又嘗侍先君子登㢲齋歐陽守道之門由是須溪劉辰翁中齋鄧光薦皆以忘年友之先君子博雅能文須溪號之曰山中小集古尤偉公論議馳騁墳素軼出旁行敷落躪躒虞初稗官劉氏雖好辨者終不能傲公當世務搶攘衣冠家子弟類巽愞不更事公器局散朗應對間暇父兄賴之以安至元元貞間境有山盜公承檄扞禦能申條教齊一民義里閈帖然間嵗祲輙殺直以發飢者為饘寒者為衣殣者為棺靡不終恵家居敦叙倫紀姻戚困乏者委曲料理卒使之有業性好客善謔嵗時燕集酒酣歡洽擊節雅歌四座為悚尤不喜異端然時有佳者亦為之豁達無忌初號一山時慕蘧大夫之賢著號更齋先輩耘廬鐂應登記之諸名士有詩生平裕有才諝薄於宦情分憲觀復馬公昭舉行郷飲酒禮公侍先君子座側馬公愛其英爽欲辟以掾屬力辭御史方厓蕭泰登於公為中表屢勸公仕輙不荅晩嵗順適􅏀園容與翰墨嗜古圖畫市或千金為知己持去亦輙委置家蔵古書甚多皆手自校讎至所著作才既敏贍率易天成旋復散逸他日門客子弟始彚成編嘗即先廬之傍改築新宅将以逸老扁其樓曰望雲不敢忘先人也泰定丙寅哭其長子慟然時能命客自遣自是嬰疾疾革呼孫揆寅語無他及惟誦少陵㣲爾人盡非之句翛然而逝生以宋開慶己未前十一月十五日沒以元泰定丁卯閏九月二十七日年六十九嵗曽祖從龍祖有開宋廸功郎安吉州烏程縣令父惟憲南軒書院山長皆山翁也娶戴母族以賢婉稱子男二士元士榮士元先公一嵗卒士榮早夭女四人俱適士族男孫三揆寅揆辰揆申皆以儒學應徴辟孤孫揆寅以至順壬申十月二十二十奉公柩𦵏于里之煙竹原事竣屬其姻戚易君景升状公行謁余請表其蔵易余校藝江右時所得進士而余亦素知劉公學行節概凜有古風若揆寅之世家學亦士大夫之所願友者故為銘曰民生扵三父師其二倫序有五其一友誼偉矣劉公名父之子隆師親友抑又名士三者之懿筮知其賢矧公學行允也可傳學以事君行施于政憗不少試斯焉有命命固有之公亦髙蹈用不於時而適於道邁􅉨者氣騰踔者辭庶俾来世知公于斯新居奕奕花竹斯薈日月㡬何松栢斾斾有濬其澤由孫及曽太史撰銘悠久之徵元故隠士廬陵劉桂隠先生墓碑銘廬陵劉桂隠先生卒𦵏之三年子應麟遣孫珵来京師請其墓銘扵𤣥值世多故未暇請也又三年遵東海以歸乃致前請謹摭其行狀叙而銘之先生諱詵字桂翁號桂隠其先清江之翟斜族也翟斜之族自宋公是公非弟兄叔姪以文學聞天下號江右三鐂先生之先世有諱滔字禹績者由翟斜徙吉水之南嶺傳六世至彦升彦眀兩弟昆升留處南嶺明分處北坑北坑以地居上㳺號上族因號南嶺下族升自鵬舉五子競爽苐四子曰僴字端臣生子少齊字思賢是為先生之髙祖考少齊生子黻字徳卿宋太學内舍從誠齋楊文節公㳺子鈴字衡甫受知文丞相號麓隠生子仁榮字雲祥號習静與弟化龍長子元方同領景定甲子郷薦眀年俱及進士第雲祥授平陽尉先生平陽第四子也生二嵗失母七嵗失父九嵗宋亡奮以頴悟之資自樹羈孤之中能不墜先業又斥大之今之大夫士論先生徳行道藝必推本其先人扵是平陽之聨科雖不獲究用於季代因先生克紹咸稱其有子而鐂氏自翟斜而下益有光焉先生之為徳不為世俗之所搖敓不為風聲氣習之所淪染卓然以重厚醇雅進與鄒魯士埒而無怍容事諸父及諸昆弟盡恭敬友愛之道先世恒産悉推讓之子姪及門必厚遇以禮伯氏蚤世其子古臣方㓜撫育教誨使有成立古臣卒又撫其子如古臣夏氏女沒所生角覉未齔教育而婚嫁之如禮晩即南嶺剏始祖祠率族子嵗時祭祀以正昭穆之叙居家䖏郷有古君子風訓學者能以師道自立至其為文根柢六經屬饜子史躪轢百家渟滀演迤資深取宏榘矱哲匠逹于宗工液古融今自執其韛應慮不獲靡施弗宜雖未嘗露其儁傑㢘悍踔厲風發之状韞玉在櫝氣如白虹不可掩抑四方求文繦屬於門有古文若干卷諸體詩若干卷駢麗書劄若干卷摠題曰桂隠集蜀郡虞先生豫章掲先生及𤣥皆嘗叙之各以所見極其形容詠歎之盛然以先生之文㣲吾三人言有不行世者乎先生沒吉之弟子顔成子状其行稱先生年十二三時長於宋季程文若律賦論䇿臨文沛然蔚有老氣宋之遺老鉅公若季公鶴田肯堂深齋三公於先生為母黨尊行一見即以斯文之任屬之中齋鄧公須溪鐂公扵先生為郷先正見其文尤加器異鄧公嘗延之家使範其子若彭巽吾晏山心扵先生為畏友徃往推服延祐初科舉復興先生年纔四十餘州里有司舉孝悌眀經太守强勸之駕先生好古與主司瑟竽理之必然不足深論先生退自塲屋一時名家欲其子弟䂓進取者必厚幣求師事之古有善射者射牛鏃掠牛腹舍麤詣精以不中為勝賢父兄願欲得其不中之竒他日與拘拘然求中者角我欲中斯中耳方厓蕭公為御史以教官薦學山文公為集賢以舘職薦尚書鵬南鄭公過廬陵見之歸朝以遺逸薦公卿推轂當時賢士推轂者可得美譽賢士何為焉先生生以宋咸淳戊辰八月二十六日卒以大元至正十年九月十三日年八十又三塟以是年十二月二十五日墓在州之仁夀郷東槎灘娶印岡羅氏有婦徳能致内助先二十年卒子男三長立敬先五年䘚仲尚文克世文學先生鍾愛之惜早世季應麟業進士女四人適同郡李以孫夏昶彭鎡蕭泰端皆宦族孫男七觀先夭次珵瑜諒璉讓珣珵今除龍溪書院山長孫女八曽孫男二𤣥於先生未獲一識而書問不絶相知為深虞公晩歸田過從甚樂每有相見遲莫之歎虞揭二公皆先卒𤣥以垂髦之齒獨得銘公銘曰宇宙氣化消長有時斯文盛衰不繫于兹富貴倘来非悠久功名時至亦易就惟茲二事衆可朂天畀斯文曰予獨近代四家廬陵眉山臨川南豐頡頏其間展也桂隠實宗歐陽豐曽約蘇謹嚴歸王天憗其施不靳所重我其承之賁若光寵在衆不隨予獨不訾不貤厥齎俾昌于詒元故旌表髙年耆徳山村先生歐陽公墓碑銘至順元年冬十有二月南郊禮成詔天下民年八十以上無失徳者有司以髙年􅂄徳旌表之袁之分宜山村先生歐陽公是年九十以齒以徳當應詔元統改元又詔賜髙年帛公年九十三縣大夫来致帛見其人物議論之偉驚且喜曰此豈徒有年者哉二帛未足以示尊禮也詢前詔旌表猶未徧舉方謀為之請𤣥適在朝登以文白當道檄有司奉行之於是旌表将至偶近公生朝子孫請即是日拜命為夀有司從之比至疾遽作竣事未㡬卒後八年𤣥謁告南歸訪族防里至公之門旌表煥然而宰木拱矣予惟徳以里名士孫復孫所状公行請銘其墓𤣥忍銘乎忍不銘乎公諱涇字源清號山村先世自安福令而上詳見吾宗楚國文忠公譜令以下數世有自安福遷分宜防里者至公傳十有六代代多文儒曽祖安世祖必恭父起宗皆教授郷里世父龍瑞登宋咸淳七年第公資貌偉特少以力學得羸疾有授以食療法久乃魁岸性孝友執親喪至柴瘠每起必杖為親擇葬地術家言某兆吉公曰何自致之曰以公孝感當自致已而果致季弟目眚温凉饑飽謹候伺之如是數十寒暑無㡬㣲倦色沒而哭之盡哀塟之盡禮倫誼之重里人至今以為式家居飭子孫常舉平心待物四字為訓能以身教故子孫率從由是忠厚日積致家日肥奉養日腆而公如素之習不改平生被服前代衣冠未嘗少易華靡子孫亦不能强之暮年身健神清稠人廣坐與一二同輩談承平舊事移日不倦嵗時會族少長咸至多至數百指語子孫曰天倫之樂無以踰此饔餼隆殺非所計也爾後人毋廢斯禮早年習舉子業精敏有聲塲屋與季父同登俱待補國學葉丞相守袁遇士慎許可見公之文獨稱賞求識公面屢加薦達至宋亡科舉廢乃更沉潜性命之學手編諸經傳註彚粹先儒格言其精義奥㫖融貫演繹多所論著細書大帙充牣巾廂詩文理致自足不事彫劌舉動一出誠恪不勞矜持嘗有老僧一日同集人見其踧踖於坐詢之曽從出學公教學者無他言唯勉其用功根柢異時少自樹立即有依㨿後進往往佩服其言生以宋淳祐辛丑六月二十六日沒以大元後至元乙亥十一月十一日年九十有五沒之眀年丙子八月某日塟于里之小礱源娶某氏先公䘚子男一惟徳字秉彛幹蠱有譽克大厥家公殁之嵗子巳稀年今将八十康勁勝常人每以公夀期之孫男二務敏務實皆業進士曽孫男一玉成孫女一適彭曽孫女二長適朱少適許皆名族𤣥扵公為族弟先世徙瀏踪跡雖逖知遇獨深銘墓之請誼不敢辭銘曰惟公之身實備五福夀躋期頥富有茀祿茀禄雖富公恬不知曷其康寜豐約不移惟其不移可久䖏樂躭書味道生不飲藥好徳已稀况徳之積迨夫考終數近滿百太樸未斲全福有人􅥾獨全福有行有文有文匪他惟性惟理以淑其徒以遺孫子有覺其閎國旌夀駿天光所臨百世流潤爾孫爾曽赫奕其承同宗匪吝惇史足徴居士歐陽南谷墓碑銘居士諱同寅字同甫號南谷袁之鈐岡防里人也世爲望族家饒貲尤多儲書居士自㓜為學質實既長賦性剛塞居家庭有孝行處郷黨有直聲輕財而賤利貴義而重徳姻族有孤遺少任其教育長釐其嫁娶里中貧乏者飢有其粟死有其棺殣有其域嵗旱先其郷人禱不大雨不止鄰有災集救賞募熸夫必撲滅乃退人有訟求正善譬析以理閭閻細民有戒心来歸輙聚而保之五六十年之間未甞希知遇於當世故已之徳人者甚鮮人之徳已者甚多嘗訓諸子曰處善循理人生至樂仕宦何為當道以教官薦辭不受又嘗自賛其畫像有曰務本之學施於孫子士稱其言先行而後從晩嵗家居優裕肆力於學適意扵文廣坐辯論經㫖専門士或病之天厯己巳夏五月疾作醫至却藥不飲疾甚諸子請所以命輙厲聲曰若輩皆四五十之年猶待刺刺語耶有間曰張公藝九世同居惟一忍字汝曹識之端坐正衣冠而瞑是月二十日也得年七十有六至元丁丑十二月壬辰𦵏臨江新喻鍾山郷龍伏之原曽大父峻大父珦父夣顯積徳起家初娶鐂氏繼室許氏皆先卒子男四震亨晉亨巽亨克世家學鼎亨仕八蕃有招蠻功宣撫司辟薦以官聞母䘮歸不就巽亨仕湖南辟清湘縣儒學教諭以親老辭女四適李適彭適胡適劉皆里名家孫男四長天祐次天福蚤卒次天與天啓孫女七曽孫男三曽孫女四吾歐陽氏以有姒支裔封越後并於楚受封於烏程之歐陽亭侯子孫以亭侯為氏厯兩漢涉魏晉六朝唐宋迄今南北歐陽惟一族非如他姓各有所從始者然自涿州太守而下顯者曰冀州渤海青州干乗千乘中絶今皆渤海後又自率更令而下顯者曰長沙自吉州刺史而下顯者曰廬陵其實出於一詳見唐書宰相世系表及我兖國文忠公譜説居士先世繇廬陵之安福義厯遷今防里上世有府君諱俙在諸昆弟中子孫多遷居外郡有復遷安福之早禾田有遷潭州之瀏陽馬渡者若是者不一居士亦俙後於防里其處者也𤣥之於瀏陽遷者也由始遷至先㕘政冀國公纔三世故世次可考居士扵冀國公族弟也𤣥扵居士族子也巽亨来京師求表居士墓義不敢辭為之銘曰才周世用世用則訒徳應人求求人則恡我宗儀刑遺不我憗我表其蔵三世其親讀圭齋先生所撰南谷居士墓碑知昔人之所積者忠厚深長其遺諸子若孫固異乎衆人也自凋謝之餘而資源昆弟皆卓然復昌其先世又知天之報施善人果不爽也嗚呼世之人何苦而不積善哉洪武二十四年六月二十有二日翰林黄子澄書永新龍母吳氏墓銘晝而出必掩面幽其眀銘何炫宵而行必秉燭眀其幽銘何凟生存正沒順寜酌二義可也銘婦之冡嫂之丘繄吳氏羅其憂事莫難彛倫間公無怨私無瘝姑冝家叔宜室卑者勞尊者逸城有屋郊有居相夫子手拮据子於親無二上禮有别孝無讓父之命子之誄人信之惟天理恵于宗徳于郷宜太史銘其蔵余拙扵書病餘愈拙近日求予文者多强予書余不得已力書以塞其請然實非余之素志也禾川龍孝子謁其母吳氏墓銘獨能見諒於是請太常博士劉聞大書余甚嘉之因書銘後使知得余書者不如諒余書者之使余感也致其詞来請者其西賓戴與權也其人左賢使余不忘歐陽𤣥書元處士劉公梅國先生墓銘有序公姓鐂氏諱隆瑞字立賢世為安成望族㓜頴悟力學家居孝友遭父母䘮勉力襄事動循禮則宗黨䋲之遇諸子姓奨借誘掖期于成人才性跅弛輙加警約劉氏塾業彬彬可觀公教居多世變桑海舊家子弟巽愞奴客乗勢恣睢公奮以法鋤拉强梗至元甲午獠冦陸梁青山朝廷遣簽樞督捕輙欲禽狝其郷聞者竄匿公逺迎大軍供億畢給民用無恐豪右有宿憾于郷伺間報復公辨出無辜活者千計冦平師旋居民殘燬札瘥荐臻公被府檄勞来遺氓賑飢療疾流亡四集有司築堡壘以戒不虞公曰軍名備禦實則病民卒言大閫遂撤其戍民迄今便之公機警倜儻踈財樂施為人熸難觽紏徳色不見㡬㣲晩嵗延名師淑諸孫暇日觴詠暢適泊然無求於時所居多梅因號梅國先生至治壬戌四月十五日卒眀年十二月十六日𦵏郷之南山夀五十有八按狀劉氏在南唐時有為袁州刺史者始遷安成蜜湖傳至克都府君再遷南溪五世為評事府君良輔二子長廸功郎龍南尉汶次脩職郎沅陵令崧沅陵子醴陵令孔彰善誠齋楊文節公萬里醴陵子塤塤子鑑以文學顯終承事郎秘書省校書郎秘書生天福脩職郎廣西帥司幕官是為公之考號恕齋澗谷羅公椅婿之嘗及接見後村劉公克荘為人慷慨多智畧與文丞相有婣好雅見器異須溪鐂公辰翁青山趙公文静徳王公夣應復心崔公君舉巽吾彭某皆嘗與之逰君子於公行義之卓尚論先世蘊蓄之深先友過從之盛而知其負挟有自来矣伯兄震漕貢進士仲兄薦補國學生咸有士譽公娶王氏女有婦徳能持家後公一年卒子􅂱字持敬孫曰漢善鵬嵩岳正泰鈞貫凡九人述行状者湖南宣尉副使周君志仁介􅂱請銘者太常博士劉君聞也𤣥識􅂱久銘何可辭銘曰安成在漢𨽻邑長沙十世有羡蜜湖是家䖏士侃侃濬厥義問秩若紀綱不煩以紊範族以正剸物以剛抑浮惇雅植弱强鼯嘯于樷王師薄違鴻飛于渚公曰曷歸素筝軍門其勇萬夫貤其有餘翼蔽一隅孰弱爾巢我堅爾屋孰莠爾田我庤爾粟民将徳公尸祝百世公曰噫嘻我求無愧衆芳所都紛郁粹醲􅆂泳堯仁優㳺以終彼秩三品奉常斯謚法當立傳太史乃議奉常言之銘者太史儕是寵光展也君子松栢欝鬰君子之域宜爾子孫維徳之植元翰林侍講學士中奉大夫知制誥同脩國史同知經筵事豫章揭公墓誌銘至正四年七月壬辰翰林侍講學士掲公曼碩以總裁宿史舘得寒疾歸寓舍戊戍薨時京師大雨彌月朝縉大夫聞者不避泥潦馳往哭之人人盡哀眀日中書出公用鈔二千五百緡率先為賻於是樞宻院御史臺六部以下咸致賻儀有差車駕在上京適遣使賜諸摠裁及史官燕勞以公故咸援禮辭中書為改燕之日使者歸上京白宰相宰相以聞有㫖賜中統萬緡給喪事有司議以驛舟送其櫬歸江南孤汯奉史官劉聞所状行詣𤣥謁公墓銘𤣥與公三為同寅相知為深公死為之哀痛踰月不能忘故不銘有所不忍銘有所不忍九月汯将扶䕶登舟廼勉叙而銘曼碩諱傒斯姓揭氏生而頴悟年十二三讀書屬文即知古人蹊徑家貧不能具束脩從學惟蚤暮刻苦父子兄弟自為師友稍長豁然貫通日有増益未弱冠里大家延之授業諸生年或相等皆以師道嚴憚之二十餘負儁譽㳺江漢間司徒程楚公為湖北憲使竒其才妻以從妹皇慶初程公入朝公舘其門時國初諸老尚存聞程公有佳客咸願識之及與之言薦恐後延祐元年用薦為翰林國史院編脩官三年陞應奉翰林文字同知制誥四年遷國子助教學士承㫖復奏留之五年謁告歸泰定元年復授應奉翰林文字丁内艱去職天厯二年秋文宗開奎章閣置授經郎教勲舊大臣子孫扵宫中公首被選至順元年預脩經世大典三年書成超授藝文監丞㕘檢校書籍事元統遷翰林待制後至元四年擢集賢直學士五年奉㫖代祀北嶽北海濟瀆南鎮竣事引疾便道由浙左歸豫章六年以奎章供奉學士召未至改授翰林直學士知制誥同脩國史至正改元兼經筵官二年陞翰林侍講學士且命同知經筵事三年年及七十請致仕歸上聞亟遣使追及漷南拜表力辤再遣使奉上尊諭㫖還撰眀宗皇帝神御殿碑文成求去不聽夏四月詔脩遼金宋三史命右丞相為都總裁中書平章政事特穆爾達實以下凡六人為總裁官公預其選遂不得辭眀年遼史既進金史垂成公薨夀七十有一掲姓相傳出楚司馬氏世逺姓稀譜逸或云出漢功臣陽信侯或云出安道侯漢以後掲氏居髙平居汝居郢唐乾寜中有諱鎮者以左僕射持節袁州刺史掲氏仕東南者昉見於此今江右諸揭居豫章居旴廣昌皆大族豫章族始祖稹旴廣昌始祖填推其訓名盖稹填伯仲曼碩居豫章豐城今為富州曽祖光朝妣黄氏祖性聰累贈嘉議大夫禮部尚書上輕車都尉追封豫章郡侯妣黄氏繼何氏並追封豫章郡夫人父来成以邃學篤行見推前輩先賜謚貞文先生贈中奉大夫江西等處行中書省㕘知政事䕶軍追封豫章郡公妣黄氏追封豫章郡夫人皆以公貴推㤙初娶李氏繼程氏荊湖北道宣尉同知巖卿之女先公卒並追封豫章郡夫人子男二長汯國學上舍生克世父業李氏出也㓜廣陽生始四嵗女一人適秀才楊湘孫男一敬祖孫女一公職子弟未嘗有纎芥貽其親憂昆弟有無相通始終無間言少自處約立身洎有禄入服食稍踰於前輙愀然思其親曰吾親未嘗享此故平生清苦儉素老而不渝在京師三紀官至五品出入始乗馬為授􅀴郎諸貴㳺子弟見其徒歩每蚤作宫門辨色輙先諸侍臣至謀為之貰馬公聞之自置一騎尋復鬻之示非所欲初逰湖南見前宣尉文恵公趙淇趙素號知人謂公曰君他日翰苑名流憲使涿郡盧公摯見輙稱許其歸朝竟以翰屬薦之薦牘今在掌故至京師受知太保李文忠公孟樞宻王文定公約承㫖趙文敏公孟頫學士元文敏公眀善先是東南士聚輦下如四眀公桷巴西公文原雍郡公集有盛名公卿間既而貢集賢奎章周待制應極薦之皆馳騁清途公與清江范梈徳機浦城楊載仲宏繼至翰墨往復更為倡酧公文章在諸賢中正大簡㓗體制嚴整作詩長扵古樂府選體律詩長句偉然有盛唐風楷法精徤閒雅行書尤工國家典册及功臣家傳賜碑遇其當筆往往傳誦扵人四方釋老氏碑版購其文若字袤及殊域門人集其所著已板行於世在國史時李文忠公見所脩功臣列傳撫卷歎曰他人謄史牘耳若此方謂之傳在奎章時上覽所撰秋官憲典驚曰兹非唐律乎又覽所進太平政要四十九章喜而呼其字以示臺臣曰此朕授經郎掲曼碩所進卿等試觀之其本常置御榻側為經筵官今上聽其講篇深嘉其忠懇故其際遇累朝皆非踈逺儒臣所敢望者延祐末朝廷倐罷群臣贈典公之父獨得賜號貞文又賜之碑天厯至順中大臣有薦文士人主必問之曰其才比掲曼碩如何累稱其才可用欲器使以政今上初即位一日使衛士召公至則以内府所賜諸王叚表裏賜之将賜躬自辨識然後以授講經退又賜金織紋叚至正改選格諸超陞不越二等公由中順大夫進中奉大夫獨不為例超授四等轉八階進神御殿碑特賜楮幣中統萬緡白金五十兩中宫亦賜白金如其數又為之賜貞文書院額仍許置學官若此異數公受之踧踖不見㡬微自衒之色而許國之志益自奮厲故處散地論政薦士以古人自期王文定公嘗言與掲公談治道大起人意對大臣言其辭不及他第言某處灾傷未賑䘏某政弊未除某人賢在下位未擢用自漷南召還丞相與候見便殿因問方今治政何先公曰養人養人何先公曰人才當譽望未隆之時養之在朝廷使周知庶務一旦用之自識治體及置史局又問脩史之道何先曰収書用人又問用人何先曰用人先論心術心術者脩史之本也心術不正其他雖長不可用公求去之意未釋上使丞相及諸執政面諭留公公曰使揭某有一得之獻而諸公能用其言天下遂獲其利雖老死於此不恨不然何益之有他日集議東内公倡言鈔法大弊合用新舊銅錢權以救之政府不樂論議辨駁示以顔色公辨不少變丞相心深敬之故人才因公言知名善政因公言張本公出不以告人人亦鮮知之惟豐城地不産金而金課益倍為害厯年公上言罷之集賢考校諸路學官所業下胄監移博士吏文淹滯儒者公請改其制以其事付本屬官竟得奏允御史言下第舉人以充學正山長郷舉放次榜以充教諭學録廟堂以咨公公力賛成之此世所知者考郷試㑹試一廷試為讀卷官二國子監公試七多得名士後居要路所教勲舊子孫後多為重臣公待之泊然不矜詡以爲聲援扵程公禮若賓客人弗知其為肺腑親性耿介易直好善惡惡表裡如一聞郡縣有一廉吏他日臨文必旁引曲諭以極其稱道或恐其過聽失實公則曰如是猶不足以勸善况敢億不信乎至聞吏有貪墨病民論之曽不少恕嘗有郡侯以勢諷其部民奉金為公夀求文記其徳政公頗知其人斥之曰汝郡侯所行如何吾敢有以飾辭為諛乎其人未㡬以賂敗朝中名臣意趣或不與之合終身不一造其門雖嘗以是為軋公曰吾之進退用舍一聽諸天人何能為世路齟齬時或不平心有所感形諸詩文旁觀謂其太甚公曰言當如是不必慮也其遇善類及新進諸生乃復恂恂汲引莫年求文者多寝食為廢子弟數以為言公殊無厭苦意有客為人求文而私其金公既予文他客發其事公曰已受之矣終無所言聞者稱其長厚臧獲有過徐以理責之人問之曰長上遇下稍見卞急後生便習暴戾當以身教禀性堅壮動作簡便羣下易事公集必蚤官事尤勤進遼史後有㫖奨論史官早成金宋二史公奉命黽勉朝夕匪懈先代故事臧否奮筆書之身任勞責不以委人屢言今人徒知求作史法不知求作史意古人善言雖㣲必詳惡事雖隠必書其意主扵勸戒耳當暑濕盛作移居舘中頗自恃其精力踈於攝生遂致疾不起昔𤣥與公共脩憲典公素習律儀又勤扵考訂書大半成於公今又共史事公之勤不减昔時乃遽失援公未病前數日謂𤣥曰某平生愛公文恨無因獲一言早晩史事成求公作貞文書院記記成而刻吾志畢矣𤣥敬諾之悲夫斯言詎意未記書院而先銘公之墓乎汯卜塟某鄉某原期以某年月日預為之銘銘曰古稱良史造物忌予敓是非擅萬世嗟公直筆亷不劌奨善懲惡義之比惡書不貸善書亟寒暑晝夜勦形思公起南服抱腹笥布衣徒歩品第二尚方召見呼以字致君惓惓効獻替講經作史出一意陳規進戒為己事惜哉負挟勤少試徒抒精忠載言議感慨論列時出涕唐之甫也漢之誼以文發身卒以斃豐城故墟干將瘞夜占斗牛有文氣將徴遺篇録後裔元故將仕郎臨安路録事羅君墓誌銘延祐二年仁廟初以科目取天下士左右榜得五十六人時朝廷驟黜舊制一以經學行義取人所得士非故業舉子以應時需者十五六年間司風紀掌綸綍内綜機務外使絶域才不乏使其間居位勇退能以風義先天下則惟羅君求師一人求師諱曽家廬陵新安里登第授将仕郎寜都州判官再調臨江録事以初授官終焉其退非有扞格不偶亦非以材具不適時而所慕有大於此者惕乎若不能以斯須留故同年之士聞君之風反自脩省失所負挟怡然欲争君之髙而莫之能也君至寧都蔡㓂甫平凋瘵未復奮以身任撫摩芟其强梁薙去宿蠧久乃按堵臨江素號繁劇吏初疑儒者劣於剸裁君夙夜勤恪事無留難朞年綱紀脩舉一日聞親有疾遂棄官去自是不復出仕以死惜哉羅氏吉望族曽祖士友宋承務郎致仕士友母年滿百故相文山文公與其子弟有斯文昆弟之好奉幣載酒升堂拜母題詩㕔壁郷里榮之曽祖妣蕭氏恩封孺人祖垕父寅君孝出至性親病自臨江歸拜醫嘗藥衣不解帶親終毁瘠異常禫除餘年哀不忘嘗廬母鐂氏墓蔬食數嵗不變事繼母習氏尤孝其死習慟之切至其平居終日忻忻喜愠不色蒞政㢘約遇物謙冲自束髮與人交不見㡬㣲褊心登第偕同年蕭君立夫舟還蕭僕死給以已從蕭病臨清一月君一月留甘苦燥濕共之未㡬蕭即世教其孤遺長妻以女其所為不愧古人類如是泰定四年丁夘十有二月二十二日以疾卒於家享年四十有五以次年某月某日𦵏于廬陵之清湖娶文氏子男一人㑹之克世其學造物之報庶㡬在兹女四人長適蕭霽餘㓜霽即立夫子今江西郷貢進士状其行来求銘嗚呼余於君為同年又同生昭陽恊洽之嵗霽來始聞君之訃乃哭諸寝門之外為之銘曰雅之烏烏不止於藪而集于枯車之輚輚不馳于坦而陟于阪嗚呼羅君士之以為難兮君固即所安兮而卒老扵一官兮曽秀才墓誌名秀才曽氏子一漢既沒于江南其兄徳元在京師聞而哭之慟知其塟有時奉行狀乞銘扵歐陽𤣥拜且泣曰人之生苟有徳慧孰不願有辭扵永世也弟一漢實曽氏才子弟今不幸短命父兄不能續以長願得先進一言以傳庶㡬猶未死也𤣥聞其言惻然乃叙而銘之曾氏永豐顯親里大家一漢字眀善本曽似翁第三子大父悼其兄之似俞早夭無後以繼之大徳十年丙午五月庚午朏生天厯二年庚午五月癸丑朏死是月戊午改至順以是年某月某日𦵏于某里之原一漢五嵗讀書數千百言過目成誦少長無童心年十二三能文章十五六頎然長以弁不尚浮靡不事貨殖篤志道徳性命之書能服行其言事父兄善交朋友信遇宗族之長老恭未及壯有學行詞章凛凛趍老成人初師里士劉福逺習舉子業精熟尋執贄臨川吳先生門受諸經說大稱頴悟年二十有五病痰喘以死方疾未甚四月十日有厲風從西北来㧞並舍大木似翁蓍得未濟之巽心疑之不踰月一漢乃不起妻鐂氏子男一人萬奴裁四月而孤行述似翁所自作其文不勝哀有甚扵徳元言者嗚呼為父兄鮮有不愛其子弟者論才不才恩義有不相掩者一漢死父兄若失希世重寶不能自存嗚呼一漢真佳子弟矣乎銘曰麟之不角麛不如殰鶠之不翰鷇不如毈奪其所有無予之為瘉隳其垂成無生之為寜坎而深樹而槮無重傷其父兄之心歐陽竒翁先生墓誌銘先生諱文夀號竒翁姓歐陽氏𤣥之族兄也其先由廬陵徙安福之義厯復由義厯徙分宜之防里曽祖子敬祖西園皆篤厚好施與郷稱長者考登仕郎化龍慷慨以功名自許妣李氏有淑德公生以辛未五月初四日䘚以祭未六月十八日享年七十有三賢配彭氏出里名族子所性才幹克家孫吾貫篤問學善吟咏頃予在朝公遣姪勞予京師及謁告南歸又勞予于家囑叙其譜詎意譜序成而公沒𤣥聞訃哭諸寝門之外不能堪未㡬所性懼公湮沒無傳屢以墓文為請将以圖於不朽予雖欲遲之恐嵗月逾邁無以盡情則于墓文又烏可已耶公自㓜頴悟甫數嵗讀書過目輙成誦年十餘挟書出就外傅勤謹不懈鄰人有厭其夜讀者公焚膏繼晷諷誦不輟自若也父沒不勝哀慟廬墓三年而後歸仁宗族義郷黨内外稱之無間言常恐子弟廢其世業延名師儒訓切之日復親督其課夜􅀆乃止如是者以為常中年文學大進不求利達師表郷閭晚節深居罕與人接見惟幅巾藜杖逍遥林壑間從一二賓客自娯其髙尚槩可見矣以某年卜塟安福縣六十七都地名黄竹坑坤申山寅艮向之原𤣥於公爲族弟故不辭而為之銘銘曰裕已範世兮學行允敦内藴弗施兮既臧且淳子克其家兮孫踵其仁勒此貞石兮其永有聞圭齋文集卷十欽定四庫全書圭齋文集卷十一元歐陽𤣥撰阡表哀辭安成劉氏儒行阡表至正甲申安成劉君粹衷以翰林應奉為後宋局脩史官未病前一月述其先世梗槩凡𦵏于里之儒行郷者㡬所總名之曰儒行阡謁余表之余諾其請矣粹衷未㡬病作又未㡬疾甚遣其子都来趣余為阡表余有所不忍也已而果卒哭之盡哀而告之曰古人有挂劎之義儒行阡之表余諾君請矣余忍有愧扵古人乎越二年丙戌春余将南歸乃表之曰安成在漢屬長沙國定王發子孫衆多今安成鐂氏獨多扵他所盖其後然安成之鐂亦有兩支焉其一曰南陽太守遐之裔遐魏元陽壻也考遐之先亦漢宗室粹衷性質直叙其先世起自五世直卿府君迄扵父龍泉府君行實有可考者書之其不可考者則亦􅇅之而已矣直卿府君諱諤娶彭氏沒合𦵏小唐之原子雄材字子厚生淳熈壬寅殁㬌定壬戌祔於先塋之東南娶李氏𦵏雙牌嶺繼王氏祔子厚墓右生三子長炳字季文殁于至元乙酉祔祖塋之左次煗􅂱皆無後季文生三子長應龍娶趙氏殁同祔李孺人墓側次祐孫娶鍾氏合𦵏由慈灣次承翁字徳甫王氏出也累監吉水泰和呉城南康等稅生於宋淳祐壬子六月殁扵大徳壬寅四月祔祐孫之塋娶穰氏生景定庚申之十一月殁大厯之九月祔王孺人墓右子輝字眀卿生至元辛巳沒至治壬戌以子貴贈承事郎龍泉縣尹𦵏里之稼木塘娶陽氏封宜人子性即粹衷孫一人曰都此其自叙若此五世皆業儒其郷又以儒行著名阡曰儒行誰曰不宜大夫士惜之者曰劉氏數世力學至粹衷始有禄爵于朝以粹衷之才使得中夀其所就豈可量哉余則曰天下之事惟不足故有餘日行一日不及天者一度月行一日不及天者十三度有竒是不足也積其不足乃有餘分及有置閏則氣朔分齊而成功矣天且如是而况於人乎人謂之不足則鐂氏之有餘慶者庶乎在此粹衷有學識能詞章會試御試皆第二在南士中實第一名為旌徳縣尹亷眀有威政化大行遷應奉翰林文字儒林郎同知制誥兼脩國史院編修官其與修宋史大惬士論余庚午科考試南宫實余所得士有斯文之契故為之表云蕭同善哀辭人貴有後兮子貴為男男固可尚兮子職曷堪生而懸弧兮西東北南終老䣛下兮壮志斯慚違親從禄兮孰爲㫖甘榮與養俱兮此樂孔耽求備造物兮十無二三一或觖望兮終身之嗛隠君有子兮詩禮是撢更習律令兮讀例與凡夘以儒薦兮辰抱憤慘泝瞻隠君兮宰木既嶄幸哉有母兮華髮滿鬖兒服楚楚兮懐母擔擔燕碪十霜兮吳桑㡬蠶縮戍望更兮匪進之貪生可為養兮逝恩其覃嵗月不貸兮枯魚之御吁嗟隠君兮聲流渢渢孝則愚史兮夀非彭􅆅遭世仛傺兮脫身戈釤負毋遁逃兮賊鋒以戒荒流血漸腓兮惟脢之咸創巨雖逺兮永䘏之函掾語反是兮煩憂如惔泰山有雲兮起乎嵓嵓膚寸裁合兮八翼可曇維此下洳兮氣升江潭將族而雨兮風醨其醰思溉根本兮澤茀及􅆂感彼何易兮順如馳颿此進獨難兮右跣履巉所處實異兮命疇吊讒擔志不渝兮眀神允監税為哀詞兮視此幽劖圭齋文集卷十一欽定四庫全書圭齋文集卷十二元歐陽𤣥撰經疑問夫子以小器稱管仲而又以如其仁許之何也對聖人之用人有以德之體言者有以徳之用言者不可以一槩觀也夫以徳之全體而言則天之所以賦於人人之所以得於天者其體甚大也惟聖人為能踐形下聖人㡬等而以徳之全體論之烏得不少為之貶哉故喻之以器器者如物之所受淺深限量自有不可得而誣者也若夫有以徳之用言者則不然夫徳非徒貴乎足已以其有及物之功也而王霸之㑹世變之來有人於此乃能眀大義以安斯民聖人即是論之安得不深許之哉故稱之曰仁仁者之用莫大於愛物也迹其恵之在民心功之在天下亦安得而泯之哉昔夫子之論管仲或曰小器或曰如其仁其體用之殊乎夫仁之一字夫子未嘗輕以許人是以顔冉之流工夫造詣之髙下夫子於言仁之際若有分寸較扵其間獨於管仲則曰如其仁如其仁既許而又不一許之豈有他哉盖自姬轍既東楚氛浸盛生民之擾擾紛紛者未有紀極也仲也出而相桓公合諸侯匡天下不以兵車之力焉其仁之及物為何如邪求之當時未見仲比也至於其器之易盈不能使已無三歸之僣公無多嬖之失齊政旋踵而衰則器之所受不過如是而止使其擴而充之以至於一初之全體則可以拓聖賢之業載宇宙之重惜乎非仲所能及也盖必至是然後為大器之體叚焉仲之為小不亦冝乎然則聖人之論何往而非公乎問孟子以隘與不恭稱夷恵而又以聖人百世之師推之何也對人有絶世之行可以為聖矣而未至於化也故不能無一偏之弊焉夫聖而至於化則世無得而名有聖人之一事而至其極焉始有絶世之名矣由其有絶世之名是以清者一扵清而未必和和者一於和而未必清於是不廣之意擴不恭之氣象生焉雖不害其為聖人也而君子至公之論豈得以此廢彼哉孟子之稱夷恵或曰隘與不恭或以聖人百世之師推之非異論也自今觀之讓國而逃諌伐而餓與夫不羞汚君不卑小官聞其風者頑廉而懦立薄敦而鄙寛則百世一夷恵而已誠聖人也然而朝冠塗炭之偏袒裼我側之汚不㡬疾惡之已甚同流之無别乎大抵清不期於隘和不期於不恭特其不能化而馴致其弊焉彼夷恵亦不自知其然也由是觀之負絶世之名者夷恵之得為聖人以此也其不得為大而化之之聖人亦以此也若吾孔子則不然絶孺悲拒陽貨見小君於衛國應佛肸於中牟時乎清時乎和無適而不可也夷恵能之乎故不觀孔子無以見夷恵雖然亦豈可以是遽少夷恵哉孟子曰伯夷聖之清栁下恵聖之和孔子聖之時然則二子亦孔子之徒歟書義翕受敷施九徳咸事俊乂在官百僚師師百工惟時自古者以成徳觀人而人才治效之盛為不可及也夫成徳者君子自然之徳然君子有是徳而不能以是徳自見於事功惟古之聖人有以知之而每以為觀人之法焉凡有司百執事之臣莫不由是而取材故嘉謨之入告庶績之咸熈無往而非是徳之形著也人才治效之盛無越於帝舜之朝此其故歟書曰云云所謂九徳者非臯陶所謂人之有九徳歟訓書者以為成徳之自然非以彼濟此之謂也自帝世以知人為難而臯陶陳九徳之目或養直而温和或簡易而㢘隅或果毅以為擾或塞實以為强其他或六或三不一槩也有六徳而嚴祗者則錫之以有邦有三徳而宣眀者則任之以有家觀人之法拳拳於九徳焉生斯世者不患其無位也而患其不能有是徳於是莫不精白以承休勤敏以趍事者以聖人能翕合而受之敷布而施之也人見其俊乂在官也而不知九徳之時措也故夫九官相遜兹非百僚師師之興起乎十有二牧惟時亮天工兹非百工惟時之則倣乎所以相遜所以亮天工者非九徳之君子孰能與於斯由是觀之九徳咸事之一語其虞朝觀人之法得人之本歟後世惟殷周之宅俊灼俊意為近之故其人才之盛亦髣髴有虞之世秦漢而降急於功利權謀之近效而用區區勝徳之小才於是九徳之目僅存於書耳或曰虞廷君子之多而舜猶以知人為難者盖慮静言庸違之在朝讒説殄行之震驚朕師者未盡杜絶聖人觀人之法不可一日廢也然吾觀百僚師師百工惟時之後則君子多而不仁逺矣故又曰何畏乎巧言令色孔壬䇿問今天下之事有可言者多矣姑舉其大者言之冗官之未汰銓選之未精殿最之未眀法律之未定此四者方今之急務朝廷之所欲聞而士君子所當講者其㕘酌古今以對毋泛毋略對洪惟盛時設茂科䇿多士而開其直述之門執事典文衡詢承學而試以時務之大夫天下之事誠多矣至於大而可言者亦今世之所囁嚅者也自士大夫間以道故常為練事以言要切為干時是以至論罕聞今執事不循故常不貴泛畧舉急務以詢諸人豈非盛時開直述之門而得爲不諱之問然而所謂直述者非以其文朴野而以其言之切直也既以不諱問宜以直述對昔夫子以林放為大哉問非大其問以其知本也事不知本多言何裨愚請言事之本矣眀問有曰云云是四者方今所欲聞也愚謂非特方今之所欲聞乃方今之已行者也其間行之弗竟守之弗一或者未究其本乎如冗官之汰大徳之初嘗舉行之中書以打减置局而董之以平章某公或議某司當併某司則創某司以兼領之議者或創而罷者尋復矣辛亥更化渙發徳音减遥授之官改陞創設者日議併罷乃併通政於兵部武備等院皆復舊制京畿寺監罷者非一是則冗官汰矣然而輿圖之廣郡邑之衆旁蹊曲徑之捷出者未悉汰也銓選之精則自混一以来立省選部選之法為二别子弟承襲承繼承䕃之例為三設吏員譯學儒業軍功出身之科為四是則銓選精矣然而氏族貴賤之未别嵗月賢否之同淹或未暇精也殿最之眀則自大徳皇慶以來定十三條之章法或遣宣撫廵觀或命御史徧厯是則非不眀也然而各䖏㢘能五人之薦未見即用也三考黜陟之法未見可久也法律之定則非無至元新格也非無省部之編例也然而掾史一時之議擬而通行者盡合於至元之法意乎廣平何相之撰擬而未進者竟能為大徳之成書乎由是觀之四者非不知也非不行也愚請論其本焉其一曰汰冗官之本在於减間㪚之俸以厚正官塞僥倖之路以清正選今正官之俸甚薄而散秩之禄尚多昔劉景升有大牛芻豆數倍而負任不及常畜曹操以之享士戒冗食也况方以厯俸為出身减禄俸之無名則出身有限矣若僥倖之門斯又正選之大患也古者判行使之置損外同之設未必非有所循而為是名以處之而漢之爛胃晉之續貂實濫觴扵兹誠能如漢文欲用嗇夫而張釋之終以為不可家人濫求郎官而眀帝終不以為私恩則冗者可汰矣其二曰精銓選之本在於嚴族屬之分以尊吾國人畧嵗月之考以㧞其才用今之女真河西眀有著令而自混色目北庭族屬鄰於近似而均視䝉古乗堅駈良亟列通顯盖我國人天性渾厚不自標榜愚恐數百年之後求麟趾之公姓不可復别異矣欲還淳古之風去傑黠之習則必如貞觀之於崔盧氏族命近臣編之使其𣲖系分眀不得揉進可也至扵嵗月之考能否同滯此可蓄常調不可以待賢才誠能覈名實以甄異能使碌碌庸叟不得含糊淟涊苟資厯求序遷則當如崔祐甫除官八百而不拘常資冦萊公却例用新進而號得士則銓選可精矣其三曰眀殿最之本在於擇才眀之監司絶殿序之汚吏夫貨来之徒玩法而殘民者也豈可復為民之父母乎三年之殿邉逺之任未是悛也孟子曰不祥之實蔽賢者當之身為方岳而見善不舉豈得復為人之耳目乎絶汙吏則願如唐太宗之於黨仁宏苟犯贓賄雖至親幸難以滅公責監司則願如齊宣王之封即墨而烹阿大夫晉文公之誅曹而數其不用僖負覊則監司必舉汚吏必除最者非假請托殿者不可僥倖矣其四曰定法律之本在于酌古今以成法書優禄秩以選法吏今法書無一定法吏無優選推讞混於常流條令裒於書肆官不徧覩法無定科輕重髙下逢其喜怒出入比附係其愛憎無成書則近於罔民無優秩則昧於勸善昔者子産鑄刑書雖曰叔向笑之而鄭以治以能止辟也于定國為廷尉以民無寃而至三公近代錢若水以同州推官清直而擢樞副前以示勸也如是則法書必作法吏必優刑自平允律自精熟矣四者之本愚既已畧言之其目之備更僕未可終也雖然四者之本所以行之者一也一者何也信而已方今天下急務所可言者孰有大於信之一字乎書曰令出惟行商鞅之伯術亦以示信為先令而不信則冗官何由汰銓選何由精殿最何由眀法律何由定乎愚故曰所以行之者信而已眀問有曰宜㕘酌古今以對毋泛毋畧嗟夫執事以急務為問愚敢以泛畧為對乎然四者之有信猶水木之有本源也故敢以為終篇獻執事其思之制曰朕聞聖賢之君之治天下也或恭己無為或不遑暇食或寛仁恭儉或力於為善其所以致治雖殊及乎民安物阜風淳俗美刑辟措而鮮用頌聲作於田里制禮作樂翕然太和而麟鳳龜龍嘉禾朱草甘露醴泉諸福之物莫不畢至雖帝王之美不徒在是亦其氣之應也舜文之徳化尚矣若漢之文帝唐之太宗猶能致治如彼况薄漢唐而不居者乎今天下雖久寜謐戸口雖甚蕃滋而稼穡或傷於水旱細民或致於阻飢未能家給人足時猶仰濟縣官豈行仁義有未盡效耶子大夫明古以識今知常而通變毋迂闊於事情毋乖戾於典則明以對朕朕将親覽焉臣對臣聞有志者事竟成人主之致治莫先於立志故善觀人主之治者先觀其志夫人主以能致之資操可致之勢所圖無不獲所欲無不成以求乎天而天應之以求乎人而人從之所以然者以其志之先定也其或致理之效偶有未備天人之間偶有未和則當守之以専達之以彊以俟夫悠久之效不可以疑貳阻之也臣草茅賤士何敢上揆淵𠂻然以臣切觀陛下之所為真近古以來大有為之君也陛下曩在東宫仁孝之資英毅之畧聞於天下也久矣既而徵四方書以考古今飛龍之初大召宿儒詢問要道臨御之後不邇聲色不事逰畋凡耳目之娯營繕之事秋毫不經於心惟經籍史傳日接于前於是大興儒科黼黻至治祖宗以來百餘年之曠典一旦舉而行之遂使臣之淺陋亦獲叨奉大對於明時雖然臣之望陛下者以陛下為有大志而陛下之䇿臣者亦適有以發臣之愚臣伏讀聖䇿曰朕聞聖賢之君之治天下也或恭己無為或不遑暇食或寛仁恭儉或力於為善其所以致治雖殊及乎民安物阜風俗淳美刑辟措而鮮用頌聲作於田里制禮作樂翕然大和而麟鳳龜龍嘉禾朱草甘露醴泉諸福之物莫不畢至雖帝王之美不徒在是亦其氣之應也舜文之徳化尚矣若漢之文帝唐之太宗猶能致治如彼况薄漢唐而不居者乎嗟夫薄漢唐一語此乃聖志之發見也陛下此志可與四三王可與六五帝矣其曰或恭己無為或不遑暇食或寛仁恭儉或力於為善臣愚以謂此未可以觀致治之殊當有以騐立志之同也古人有言曰始於憂勤終於逸樂若以恭己無為異乎不遑暇食則隆古之恭己無為者莫舜若也然而一日二日萬㡬舜何不少自逸豫乎若以恭儉寛仁異乎力扵為善則近代之恭儉寛仁者莫漢文若也然而拊髀思賢夜半前席漢文何不為是元黙乎由是觀之未有不自憂勤始者自憂勤始志之同也陛下既薄漢唐臣不復膚引漢唐之事請以舜文終焉舜文之道布在典䇿陛下既慕舜文亦法其所為而已矣如欲民安而物阜風淳而俗美則當思夫利用厚生之何急也惇典敷教之何先也由庚魚麗何自而多也關雎麟趾何從而厚也陛下能法舜文即舜文矣如欲刑辟措而鮮用頌聲作扵田里則當求如臯陶者命之眀刑有如虞苪者俾之息訟九歌可使勿壊也大雅可使無廢也陛下能法舜文即舜文矣如欲制禮作樂翕然太和則當求如伯夷后䕫周公者命之制作於其間六典之制或尚可講也九韶之音或尚可學也陛下能法舜文亦舜文矣至如麟鳳龜龍諸福之物莫不畢至聖䇿有曰亦其氣之應也臣愚以謂知氣則知志矣聖人志氣清眀若神一動則天地隨之諸福之物皆自聖人方寸中來非自外至也中庸曰致中和天地位焉萬物育焉盖吾之氣順則天地萬物之氣亦順吾之氣和則天地萬物之氣亦和天地之氣見於萬物同一和順則百獸自舞於舜之庭鳳凰自鳴扵文之岐矣又何祥瑞之足羡哉臣伏讀聖䇿曰今天下雖久寧謐戸口雖甚蕃滋而稼穡或傷於水旱細民或致於阻飢未能家給人足時猶仰濟縣官豈行仁義猶未盡效耶臣愚以謂此天以堅陛下之志也古人有言曰天心仁愛人君若曰稼穡或傷於水旱則舜之所謂洚水驚予者猶有甚於今之傷稼者也若曰黎民或致於阻飢則文王所謂小人怨汝詈汝者猶有危於今日之阻飢者也顧二聖人之所以弭灾恤患者罔㳺罔滛皇自敬徳之外無聞焉陛下既法舜文詎知天之所以唘舜文者不以唘今日耶陛下以敬天為志則水旱可變為豐穰陛下以恤民為志則阻飢可變為足食在方寸一轉移之間耳若諉之曰豈行仁義而未盡效耶臣愚竊以為未然夫仁義之效如炊之必熟種之必生行仁義而未至者有矣未有行仁義不效者也陛下如以悠久待之或曰聖問如此而臣輙以為可以四三王可以六五帝者何自而知之盖因其已行者知之也其未行者擴而充之斯無難葢仁義之積禮樂必興彼漢唐之治如身衣弋綈一臺惜費以致海内殷富與夫斗米三錢外戸不閉自三代而下亦可謂盛矣然賈生勸漢文以禮樂而辭曰未遑祖孝孫杜淹勸太宗以禮樂而曰治之隆替不繫於此臣以是知二君於仁義之效若有所不知也今陛下銳情儒科日議禮樂而拳拳於仁義之二字視漢唐何啻相千萬耶此志所充宜其儷美於五三盛時也大槩國家之治當先論其根本不可責效扵目前古之聖賢之君未嘗不憂勤於其始逸樂於其終灾異於其先祥瑞於其後今日之不遑暇食力於為善他日之恭己無為恭儉寛仁也今日之水旱傷稼黎民阻飢他日之麟鳳龜龍嘉禾朱草也若夫備禦之不可無術救荒之不可無政求芻之不可不擇一賢相事耳奚以多言為臣伏讀聖䇿曰子大夫明古以識今知常而通變毋迂闊於事情毋乖戾於典則明以對朕朕将親覽焉臣愚以謂事有古今志無古今事有通變志無通變聖人之志與天地之正氣相通志定於此氣應於彼有理之必然者倘論水旱而牽合於夏侯生輩洪範五事之說則鄰於迂闊矣論民飢用乏而附㑹於權萬紀等建利之謀則流於乖戾矣臣非不知實所不敢臣之拳拳者惟曰有志者事竟成陛下留意焉國家幸甚天下幸甚臣謹對圭齋文集卷十二欽定四庫全書圭齋文集卷十三元歐陽𤣥撰詔表命相出師詔惟天惟祖宗混一函夏全付𦕈躬朕承丕基兢兢圖治罔敢逸豫不謂邇者河南反賊乘此承平之乆負固弄兵流毒黎庻己嘗命將討捕屢獲渠魁戮以徇衆餘黨狂猘尚逋嚴誅亦嘗肆宥開以自新怙終不悛致煩師旅太傅中書右丞相托克托爰自賊發迄今屢請董師致討朕以心膂之親應難其請而期於自効誠懇益堅朕惟事體之大付託實難匪資巨濟之才孰勝戡定之任今命托克托以達爾罕太傅中書右氶相分省於外總督諸道軍馬水陸並進其樞密院御史臺各分官屬從行禀受節制無或有違務要廊清妖沴永底隆平於戯太傅實左右朕躬其行在安靖天下故分總揆之重屬以討賊之勞尚克欽承懋建丕績故兹詔示應宜知悉再命出師詔朕承國家隆平之運四方無虞民不識兵士不講武于兹有年矣不謂邇者河南反賊弄兵構難荼毒蒸黎用是前嵗大丞相托克托請自出征一戰平徐朕惟股肱大臣宜朝夕在朕左右亟命召還分將致討豈謂因循遷玩倐經二年湖廣荆㐮雖嘗克復餘賊逋誅負固恣睢致使軍士暴露日乆吾民供給困繁愁歎怨嗟徹于朕聼朕不遑寧處乃命托克托以達爾罕太師中書右丞相分省於外總督諸隊軍馬振其威武刻日進兵殄賊安民以釋朕慮凡將士用命者賞不用命者誅賊衆來降者赦旅拒者戮於戯朕與丞相共理天下者也天下多故朕軫其憂相任其勞理所必致汝往欽哉慎厥事事乃有濟圖厥功功乃有成往㦲汝諧布朕威徳措安吾民朕惟汝賴汝往欽哉進遼史表代右丞相托克托撰開府儀同三司上柱國録軍國重事中書右丞相監修國史領經筵事臣托克托言竊惟天文莫騐於機衡人文莫證於簡䇿人主鑒天象之休咎則必察乎機衡之精鑒人事之得失則必考乎簡䇿之信是以二者所掌俱有太史之稱然而天道幽而難知人情顯而易見動静者吉㐫之兆敬怠者興亡之機史臣雖迷前代之設施大意有助時君之鑒戒遼自唐季基於朔方造邦本席於干戈致治能資於黼黻敬天尊祖而出入必祭親仁善隣而和戰以宜南府治民北府治兵春狩省耕秋狩省歛吏課每嚴於芻牧嵗飢屢賜乎田租至若觀市赦罪則脗合六典之䂓臨軒䇿士則恪尊三嵗之制君慕漢髙之為帝托耶律於劉宗相儗鄼侯之為臣更舒嚕以蕭姓享國二百一十有七載政刑日舉品式偹具盖有足尚者焉迨夫子孫失御上下離心驕盈盛而釁隙生殘賊興而根本蹙變强為弱易於反掌吁可畏㦲天祚自絶大祐苟延國既丘墟史亦蕪茀耶律儼語多避忌陳大任辭乏精詳五代史係之終篇宋舊史埒諸載記予奪各循其主傳聞况失其真我世祖皇帝一視同仁深加憫惻嘗勑詞臣撰次三史首及於遼六十餘年嵗月因循造物有待臣托克托誠歡誠愳頓首頓首欽惟皇帝陛下如堯稽古而簡寛容衆若舜好問而濬哲冠倫講經兼誦乎祖謨訪治旁求于往牒兹循史事斷自宸衷睿㫖下而徴聘行朝士賀而遺逸起于是命臣以右揆領都總裁中書平章政事臣特穆爾逹實臣賀惟一翰林學士承㫖臣張起巖翰林學士承㫖臣歐陽𤣥翰林侍講學士臣掲傒斯侍御史今集賢侍講學士臣吕思誠為總裁官中書遴選儒臣崇文大監今兵部尚書臣亷惠山凱雅翰林直學士臣王沂秘書著作佐郎臣徐昺翰林監修臣陳繹曽為修史官分選遼史起至正三年四月迄四年二月發故府之櫝藏輯遐方之匭獻捜羅剔抉删潤研磨紀志表傳偹成一代之書臧否是非不迷千載之實臣托克托等叨承隆寄幸睹成功載宣日月之光華願効㳙埃之補報我朝之論議歸正氣之直則詞之昌遼國之君臣有知善者喜而惡者懼所撰夲紀三十卷志三十一卷表若干卷列傳四十五卷各著論賛具存體式隨表以聞上塵天覽無任激切屏營之至謹言進金史表竊惟漢髙帝入闗任蕭何而收秦籍唐太宗即祚命魏徴以作隋書盖厯數歸真主之朝而簡編載前代之事國可㓕史不可㓕善吾師惡亦吾師矧夫典故之源流章程之㳂革弗披往牒曷蓄前聞惟此金源起於海裔以滿萬之衆横行天下不十年之乆專制域中其用兵也如縱燎而乘風其立國也若置郵而傳命及煟興於禮樂乃煥有乎名聲嘗循初而迄終因考功而論徳非武元之英畧不足以開九帝之業非大定之仁政不足以固百年之基天㑹有吞四海之志而未有一四海之䂓明昌能成一代之制而亦能壊一代之法海陵無道自取覆敗宣宗輕動曷濟中興迨夫浚郊多壘之秋汝水飛烟之日天人屬望乆有在矣君臣守義蓋足取焉我太祖法天啟運聖武皇帝以有名之師而釋奕世之愾以無敵之仁而收兆民之心勁兵擣居庸関北拊其背大軍出紫荆口南扼其吭指顧可成於儁功操縱莫窺於廟筭懲彼取遼之暴容其渉河以遷太宗英文皇帝席卷河朔而徇地并營囊括趙代而傳檄齊魯㓕夏國而蹴秦鞏通宋人以逼河淮睿宗仁聖景㐮皇帝冐萬死出饒風長驅平陸戰三峰乘大雪遂定中原大陽出而爝火熸正音作而衆樂廢及我世祖聖徳神功文武皇帝恢宏至化勞徠遺黎燕地定都徹武靈之舊趾遼陽建省撫肅慎之故墟于時張柔歸金史於其先王鶚集金事於其後是以纂修之事見諸敷遺之謀延祐申舉而未遑天厯推行而弗竟恭惟皇帝陛下緝熈聖學紹述先猷當邦家閒暇之時治經史討論之務念彼㤗和以來之事迹接我聖代初興之嵗年太祖受帝號於丙寅先五載而朱鳯應世祖毓聖質於乙亥纔一嵗而黄河清若此真符昭然成命第以變故多而舊史闕耆艾没而新説譌弗折衷於大朝恐失真於他日於是聖心獨斷盛事力行申命臣等集衆技以責成書佇奏篇以覽近鑒臣等仰承隆委俯竭微勞紬石室之書誠乏司馬遷之作獻金鏡之録願攄張相國之忠謹撰述夲紀十九卷志三十九卷表四卷列傳七十三卷目録二卷装潢成一百三十七帙随表以聞進宋史表代丞相阿嚕圖譔開府儀同三司上柱國録軍國重事中書右丞相監修國史領經筵事提調太醫院襲封廣平王阿嚕圖言竊惟周公念先業之艱難七月之詩是作孔子論前王之文獻二代之禮可言故觀趙氏隆替之由足見皇元混一之績欽惟世祖聖徳神功文武皇帝初由宗邸親總大軍龍旂出指於離方羽葆歸登於乾馭櫛風沐雨詎辭䟦履之勞略地攻城咸遵禀授之筭揚舲而平江漢卷甲而克㐮樊恭行弔伐之師昭受寵綏之寄及夫收圖書於勝國輯甫哻於神京㧞宋臣而列政塗載宋史而歸秘府然後告成郊廟錫慶臣民推大賚以惟均視一統之無外樞庭偃武既編戡定之勲翰苑摛文尋奉纂修之㫖事㡬有待嵗月易遷累朝每切於繼承多務未遑於制作臣阿嚕圖等誠惶誠恐稽首頓首欽惟皇帝陛下恢宏至道紹述丕謨往行前言樂討論于古訓祖宗功徳思揚厲於耿光惟我朝大啟基圖彼呉㑹後歸版籍視金源其未逺紬石室以具存及兹累洽之時成此彌文之典命臣阿嚕圖左丞相臣伯勒齊爾布哈領事前右丞相臣托克托為都總裁平章政事臣特穆爾逹實御史大夫臣惟一翰林學士承㫖臣起巗臣𤣥治書御史臣好文禮部尚書臣沂崇文太監臣宗瑞為總裁官平章政事臣納琳臣巴延翰林學士承㫖臣逹實特穆爾左丞臣守簡叅議臣岳柱臣拜臣陳思謙郎中臣鄂掄臣孔思立等協恭董治史官工部侍郎臣烏葉爾圗秘書􅀸臣台哈布哈太常簽院臣杜秉彛翰林直學士臣宋褧國子司業臣王思誠臣汪澤民集賢待制臣干文博翰林待制臣張瑾臣貢師道宣文閣鍳書博士臣麥文貴監察御史臣余闕太常博士臣李齊翰林修撰臣鐂文太醫院都事臣賈魯國子助教臣馮福可太廟署令臣陳祖仁西䑓御史臣趙中翰林應奉臣王儀臣余貞秘書著作佐郎臣譚慥翰林編修臣張翥國子助教臣呉當經筵檢討臣危素編劘分局彚萃為書起自東都迄於南渡紀載餘三百載始終纔一再期考夫建隆淳化之經營景定咸淳之潤色慶厯皇祐以忠厚羙風化元豐熈寧以聰明紊憲章馴致紹聖紛紜崇寧荒亂治忽昭陳於方册操存實本于宫庭若乃建炎紹興之圖回乾道淳熈之保乂正直用則人存政舉邪佞進則臣辱主憂光寧之朝僅守宗社理度之世日蹙封疆顧乃拘信使以渝盟納畔臣而侵境由權奸之擅命啓事釁以召兵厥後瀛國歸朝吉王航海齊亡而謗王蠋乃存秉莭之臣楚滅而諭魯公堪矜守禮之國載惟貞元之㑹合屬當㤗道之熈明衆言淆亂於當時大義昭宣於今日矧先儒性命之説資聖代表章之功先理致而後文辭崇道徳而黜功利書法以之而矜式彛倫賴是以匡扶雖微董狐直筆之可稱庻逃司馬寡識而輕信至若論其有弊亦惟斷以至公大槩聲容盛而實徳衰論建多而成效少且辭之繁簡以事而文之古今以時舊史之傳述既多襍記之蒐羅又廣於是叅是非而去取權豐約以損増事嚴敢計於疾徐日積亦虞於玩愒臣阿嚕圖等忝司當揆實預提綱周詢在局之言靡不䆒心乃職第述作之才有限而報効之志無窮倘垂清燕之觀尚助緝熈之益曰若帝堯曰若帝舜惟聖心稽古之功監於有夏監于有殷乃臣子告君之道謹撰述夲紀四十七卷志一百六十二卷表三十二卷列傳世家二百二十五卷装潢成四百九十二帙随表塵獻以聞進經世大典表至順三年三月進堯舜之道載諸典謨文武之政布在方䇿道雖形於上下政無間於精粗特於紀録之間足見彌綸之具是以秦漢有掌故之職唐宋有㑹要之書于以著當代之設施于以備將來之考索我國家受命龍朔纉休鴻基發政施仁行葦之忠厚世積制禮作樂關雎之風化日興紀綱具舉於朝廷統㑹未歸於簡牘欽惟欽天統聖至徳誠功大文孝皇帝陛下總攬羣䇿躬親萬幾思祖宗創業之艱難與天地同功於經緯必有鋪張以掲皦日必有術作以藏名山爰命文臣體㑹要之遺意徧勑宫寺發掌故之舊章倣周禮之六官作皇朝之大典臣某叨承㫖喻俾綜纂修物有象而事有源質為本而文為輔百數十年之治蹟固大略之僅存千萬億世之宏䂓在鴻儒之繼作謹繕冩皇朝經世大典八百八十卷目録十二卷公牘一卷纂修通議一卷装潢成帙随表以聞伏取裁㫖明宗皇帝尊號册文伏以得名得位大君之盛徳必兼事亡事存孝子之至誠如一爰徴古訓追上徽稱欽惟皇考皇帝陛下禀純乾之剛居洊震之長當世祖之丕構接武皇之正傳歴試諸難侔蹤虞舜舊勞於外儷跡商髙當龍躍以在淵變化莫測其量及雷行而育物動静不違乎時兹豈非順天乎若夫綸言未頒而仁聞之馳滿天下寳璽初受而皇極之建繋人心兹豈非立道乎至於親儒生於汗馬之塲輯宗盟於櫜弓之頃茲豈非叡文之教知武之功乎聖莫大於無為孝莫大於善繼元造固難乎擬議鴻名宜罄乎宣昭矧往事之艱貞増𦕈躬之􅇶惕欲旌永慕庻享多儀謹遣攝太尉臣某奉玉册玉寳追上尊號曰明宗順天立道叡文知武大聖皇帝銘友吾銘吾友號吾仁我以友我是湏輔雖資友取友在吾人肯友吾視吾可否善不吾若友吾何取尊者友卑貴不吾見乃忘勢分乃友貧賤賤者友貴所貴吾立傲固不可佞豈可習有人於此如澤相麗吾友友吾交盡友誼曾子之學省先吾身吾友為誰必顔其人惟顔與曾尚友千載讀詩讀書吾志吾在敬心齋銘人之有學治心為先心得其理乃聖乃賢賢聖之為其要曰敬清明在躬齋荘中正敬不于貎敬于其心思而儼若上帝汝臨無貳無虞惟精惟一飭我天君守而勿失學之終始惟敬靡他身之主宰非心而何克敬在心亦敬亦聖聰明為堯温恭者舜湯曰日躋姬文緝熈孔嚴三畏顔謹四非孟子養身尤善養氣彼何人哉希之則是朂爾敬心心以銘鐫為此銘者太史氏𤣥戚友劉君思清以其猶子尚敬謁予瀏上予嘉其好古將掖而進道乃為之銘其敬心齋請事斯語余日望之字説散説附楊鑑瑩之字説工製噐皆有隂陽其陽文其隂質古者物善技精故表裏一文質均後世物多窳技售觕故金有滓玉有瑕絲有纇則為文以盖之若質之素乃為貴耳惟鑑不然其質之羙見於靣其文之羙見於背盖鑑主於瑩故也瑩自外徹内用能以内燭外鑑之瑩未嘗為文而天下之文無不入焉吾故謂鑑有君子之道以其先質而後文也雖然百煉而金精金精而鑑瑩豈一日之功哉人質亦然所資於學也大矣安成學者楊其姓鑑其名瑩之其字者誠齋文節公諸孫也質羙近道蔚然有文通春秋三傳學用薦為國子四門館生圭齋歐陽𤣥書是説以贈之劉叔耔字説安成鐂生名士疇字叔耔從余謁字説夫疇者易治之田之名也耔者既立之苖又壅其根使之梗有㨿以禦水旱者也子名疇字叔耔尊公為子計者周矣農在四民能衣食其三者工之技商之利或足以病之先王有厲禁矣惟士與農同體故畊學往往並稱於經士生斯世筋力不匱才智有餘退恃可治之田進挾可用之學傲然無求於穹壌間以聼命於司造世之偉丈夫也然古今則㡬人焉進為鹵莾之學以倖一時之遇退為㓕裂之畊以倖一嵗之秋㴞㴞者不乏也然豈願吾友効之哉嘗耕學於一貫堅智力於一勤疇有其地耔有其夲國之良士又良農也余為大司成時生之尊公常愽為國子􅂇教生以胄子入學日升堂講論余愛生之聲琅琅而論纚纚也今别又數年矣生勉乎哉族子章晦字説宗兄議翁子耀既冠當字謁余字之余字之以章晦又申其説以朂之今天下之有光而能燭者水也火也而二者不同焉水内明外暗火内暗外明然世以水鑑者什一以火照者什九豈非外闇内明者晦養其明假物而明始見外明内闇者明出乎物遇物而明自生君子則之内外交養明晦相資猶水火日用於世而明不匱豈不以是與或曰朱晦翁初授教於屏山鐂氏有木晦於根春華􅂱敷之言由是號晦菴今子以水火言明晦何居余曰木受氣水而傳氣火者也晦明明晦豈二本哉余生平喜吾歐陽氏之業為儒者甚多章晦聰明好學尤多藝能年則弱冠已見館榖於大家余字以晦盖望其顯融者奚止如今日所觀者云李觀尚賔字説鈐邑大姓曰西溪之李有名觀而字尚賔者吾宗用綱之甥也聞余訪族至其外舅家逺來即余求尚賔説夫觀一字而有二義以觀示言者九五之主一卦也以觀曕言者一卦之宗九五也六四一爻去九五最近故其繇曰觀國之光利用賔于王謂其以隂柔而近陽剛有仕而覲于上之象今子名觀而字尚賔可謂知所尚也已然亦何道而臻兹乎故愚嘗謂觀示觀瞻之義猶未足以盡乎觀九五之觀我生上九之觀其生二爻皆有觀省其己之義為六四之君子者盍亦退而觀諸已乎利用賔于王實在我之所自致也周官之法三嵗大比考其徳行道藝而興其賢者能者鄉老及鄉大夫帥其羣吏與其衆以禮賔之獻其書于王則再拜而受之夫徳行道藝之三物者士之可自勉者也今科目復矣子勉于學由是而觀國之光利用賔于王孰禦子哉余聞尚賔家多書又多山水之勝嘗作亭名兩山間予既扁之矣用功於幽閴深靚之鄉䇿勲於昭明正大之地六四之觀之占屬之子矣彭以恭説學者以字從名有内外之辨斯不瀆也安成劉仰更致其表弟彭尚謙字以恭者之請求予為字説以贈夫謙者恭也皆見乎外者也謙之中有物恭之中亦有所主何為有物謙之象曰地中有山卑者藴髙者於其中中有屹然不可犯之意特有之而不居則見乎外者自然而謙也何為有所主主者一而已矣主一之謂敬有確乎不可㧞之意能出乎無偽則見乎外者自然而恭也謙也恭也曽為色取而可乎善乎君之為字也能求諸乎中則容之著乎外者無以尚也謙之失曰輕恭之失曰足祛二者之失求諸中斯可彭氏多文人吾以恭好學不倦故樂以内外之説告之琅溪説吾家自鈐南之防里徙長沙之瀏陽族屬之近者亦徙安成北境上是為早禾田號曰早歐有名俊字用綱者早歐之秀者也嘗扁其讀書之室曰琅溪頃過余上謁余為之説夫玉瑩然而澤者琅玕也溪之色幽幽其似之乎琅然而清者珩璜也溪之聲淙淙葢又近之然君子之比於玉以有徳也取於水以有夲也豈徒以聲色為尚㦲玉有徳故用於宗廟朝廷水有夲故逹於江河淮海善推其所為而已吾用綱中有外著聲與實流琅溪云乎哉彬彬説吾宗歐陽氏之甥新澤胡君復字曰於信而名其讀書處曰彬彬因宗人宜翁兄謁余為説夫彬彬之言昔我夫子嘗兩言之其一曰文質彬彬然後君子其一曰假我數年若是我於易則彬彬矣釋者謂彬彬猶班班物相雜而適均之貎大槩質不勝文文不勝質二者適均彬彬可想見也獨易之彬彬義安取乎豈非中古之言易者象或過乎質理或過乎文必經聖人之手而後彬彬與雖然愚嘗竊以謂彬彬固貴乎二者之適均特物相雜而易見青黄赤白是為文章則彬彬即文矣君子之論終不以彼而易此也禮噐曰甘受和白受采忠信之人可以學禮君子先質而後文之意豈待文勝而後捄之與損其有餘而補其不足在夫善學君子者矣於信妙齡老蒼為學近裏以孝弟貢試于鄉故余樂有以進之齊吾説族弟巽翁號齊吾因字以為號者也兄原功甫為之説曰後天之易巽東南之卦也萬物至是而潔齊焉然東南之為位以一嵗言之則孟夏建巳之月也以一日言之則日至禺中之時也以人之一生言之則二十以至三十之年也物生齊於孟夏之月人事齊於禺中之時大抵然也士為學弱冠以至壯嵗就厥條理則成人之功過半矣宫庭有儀衛焉排比而不亂軍旅有行伍焉整娖而不淆府庫有委積焉屏當而不煩然後為齊也齊之功豈易集哉昔者聖人自序為學之功每十嵗一進唯十有五志于學至三十而立獨多其年豈非為學求齊於斯時亦難矣然則齊之道當何先乎曰齊與齋同義又訓一齋主乎敬敬主乎一求之之要無踰敬者或曰巽東南之卦其氣温厚敬非肅不能何事於巽乎曰不然巽之為言順也順莫大乎禮禮莫大乎敬敬則有序而順有序而順則和生焉巽在其中矣巽翁謝曰吾今而後知齊吾之綱領矣請書其説以贈巽翁一名巽享愽洽而聰敏吾宗之英也竒峯説天地間氣形惟正與竒受其正者為正受其竒者為竒山之有五岳水之有四瀆正也然五岳有㤗華崚嶒而峭㧞四瀆有清濟潜洑而趵躍是正之中有竒者焉人亦然端莊静重之士偶遇事變未嘗無超邁卓絶之行也特水之竒以衝激而見人之竒以感發而見皆因動而見竒者也惟山之竒在峯雖静亦竒孤夐之姿騰踔之勢有自然之竒不可以言喻者故士之静獨隱居而有竒節者往往則之安成鐂君世良著竒峯以為號吾既以静而竒者况之然劉氏數世皆名儒竊意斯文之福澤將鍾於世良之身所謂因動以見其竒未必見舍於當世竒之體用於是乎備歟明軒説族兄晋翁號曰明軒夫晋之明有離象也説卦離為日為火晋之象君子以自昭明徳晋之明以離離之明為日為火君子之自明心乎性乎愚嘗謂日者火之精是日以火為明也然火自日出者也心者性之郛是心之明有性在其中也而性實自心出者也故曰盡其心者知其性也日與火之明心與性之明固無二也雖然日以屢入養其明火以屢改養其明心之養其明也以虚性之養其明也以静明有所養自不息也明而誠其道在斯乎晋翁兄博學之士也其渉歴世故又乆所以養其明而日進者俟余言哉姑以是為明軒説以應其命爾劉恭安説并銘安成鐂君彦恭才氣敏逹學問充裕因其有彦恭之字朋友號之曰恭安彦恭不能辭求一言以自朂予昔受讀論語子温而厲一章嘗謂温而厲一辭若總下兩句所謂威而不猛恭而安者威自厲出不温有温在其中此易曉也威而不猛可總於温厲恭而安何所附屬曰書言恭作肅又有所謂嚴恭嚴也肅也非厲而何且二者非可乆之道也持之而安惟温而厲者能之豈非互有所發明乎恨𤣥生晚不獲質正於前修彦恭之請姑志臆説于此願與識者商確之銘曰人生徳性本無不備氣質或偏動鮮無媿聖人所養全體渾然貎恭而安語黙皆天希聖力行持乆持敬澄其氣質懿哉徳性恭非勉强安亦從容聖功既熟無適非中大舜命䕫臯陳九徳變化攸宜君子斯則千五年後横渠猶疑劉氏之子其殆庻乎圭齋文集卷十三欽定四庫全書圭齋文集卷十四元歐陽𤣥撰題䟦北行録士生休明之代區宇混一意之所之踪跡皆可以逹即其耳目之所覩記搴英攬華託諸翰墨論議之間異時竒聞偉績因是以有徴於來世也廬陵季元凱挾其吟詠之學卓犖之才其至京師與當代名縉紳􅇵談雄辯周諮國家之巨麗而升平諸福之物舉集一時於是黄鵠朱雁之什人争誦之至於登髙眺逺追懐往哲風晨月夕排遣覉思佳句尤富使之得展所藴於承明著作之地以任揚厲鋪張之風豈不大强人意乎三復降嘆題而歸之安成劉氏家譜往年宗人南記自吉州刺史琮遡歐陽亭侯上及神禹下逮安福府君萬不以地之遐僻族之蕃廣必旁蒐逺羅不少遺譜成且欲合祠吉州刺史安福府君為不祧之祖集宗人之近者節春秋展敬祠下其䂓措不凢用志亦仁矣嘗因堯賔兄序之惜哉南記已矣安成鐂君思清携先世告身六七通求予識其後且眡余家譜上推其祖之所自出下列各𣲖之所同出徴兩漢南宋以上至陶唐氏得姓以來之祖其意亦由南記也余嘉其其敦睦之誼圖分𣲖别得别生分類遺意故為之書且告之曰子歸為我訪黄石宗人之賢者謝曰其母廢譜學母廢祠事庻㡬余猶有望焉思清字清隐於予先世通家又同生癸未今為湘鄉校官家譜則其從弟思復之所圖也西平李氏族譜桓桓西平為唐中興功著鼎彛徳被黎蒸當時賢良風雲依乗如渾侍中如馬北平曽㡬何世系冷如氷惟西平裔趾羙相仍更唐歴宋我元是承設科曰雋試吏曰能守令之選㙜閣之登表表愈偉為時名稱子孫千億蟄蟄繩繩天道之報信哉可凴予書其槩寓勸以懲後之來者於焉斯徴衆芳所存安成劉伯仁號芳所後以扁其齋嗟衆芳之所在宜君子之盤桓巖班璘兮有菊畹紛披兮有蘭朝菲菲兮紉佩文采采兮為餐通神明於鼻觀納上清於泥丸却氛穢而益夀志無昬而氣完襲馨徳乎先哲託髙風乎嵗寒彭功逺先世手澤先叅政冀公曩善廬陵彭君士楚先公上庠髙選雖治春秋能通諸經忍見前代時文散逸每屬士楚收拾士楚至則稇載充牣先公暇日亂紬而泛閲之擇其尤者别彚為帙士楚亦能朗誦先世詩義賔至迭論𤣥兄弟澷不及省先公朂之曰黄册子㑹有行世時兒曹母忽也先公薨之七年科舉興𤣥首擢第追憶先訓㤗定甲子彭公冲所以詩經擢進士為士楚從弟於是其家學益振他日冲所子功逺來京師䄂其曽祖坦軒祖碧野二先生及一門諸父舊業程文盖冲所題識手澤謁余求一言是盖吾先公平日之所購求而士楚之所樂誦者彭氏世科之左劵不在兹乎俯仰四十餘年科目廢而煟興興而歘廢今明詔復飭中書舉行𤣥叨塵從臣初議闕下力賛其成又適秉筆代言播告海内矣會將見程文復盛當世喜而志於斯南谷居士自賛像後士大夫自賛其真例多自抑之辭而生平自知之明往往見於言表如善冩真者引鏡自照以圖其形宜無遺巧𤣥嘗銘南谷翁墓今觀其寫真自賛表裏純誠殆非丹青之所能狀尤非發潛者之所可模冩也至正二年三月余客瀏東厚田湯氏家齊吾弟携此見過因贅數語于後五馬圖卷中五馬龍者其誰如隔腦脂如行烟外如辨九疑而况南山四十萬匹中欲求流雲飛電之姿嗚呼世無伯樂龍者其誰草蟲圖蜂戀其房兮不可以逰蛛待以網兮為有所求曽不知蛺蝶與草蟲兮飛躍之自由娱拙集娱拙集者吾宗歐陽存中甫之作也其中古樂府諸篇情景俱至追議當時近體詩清新俊逸佳句層見是何吾宗人之多才也題曰娱拙雖謙辭實出見觧六朝劣於漢魏得其巧未得其拙也晚唐媿於盛唐亦得其巧未得其拙也繼自今拙日進則詩日進矣何當見存中甫重揚確之白麟溪三大字後右白麟溪三大字前中書右丞相脱脱為浦江鄭大和書溪舊號香嚴在縣東二十八里白麟則大和二十六世祖之名也有惠淮者字季淵實白麟十九世孫由遂安遷溪上易以今名示有先也淮之孫綺至大和凡六世大和從子鑑至某又三世皆同居共財一門雍睦海内稱孝弟者首推浦江鄭氏朝廷表其門曰孝義嗚呼源之逺者其流長鄭氏自白麟至今二十餘世矣其遺澤之逺不啻溪流之無有終時公特書是以寵之者蓋將朂其門相為悠乆哉字畫方毅酷類顔真卿觀者孰不改容不待賛也歐陽文忠公墨跡䟦𤣥生平所見兖國文忠公真蹟甚多其篇帙大者於同年許安陽家見昆陵胡文恭公墓銘藁百丈輝上人所見州郡名急就章胡氏碑行草急就章皆微渉行楷余家所藏佳者曰與杜祁公蘇明允書及晚年三乞致仕表草皆筆法如一獨祁公書端謹結體頗若蘓氏父子豈非蘇氏感公之至初年倣公之書後充拓自為一家體邪兹來叙族至早禾田歐氏見集古題名碑䟦而歐氏在楓樹下者又出與留守學士書見示皆名墨也第書中貺字兩用雖貺况古文通然意若有所謂留守學士者得非田元均乎旅寓乏文字考訂姑識此説以竢博古之君子眉夀二大字䟦至正丁酉九月浦陽鄭深浚常由吏部員外郎除浙西憲僉將行自念先為授經郎學在内府宻邇青坊常獲侍皇太子硯席今日逺役誼當入辭乃因宫臣以見既詢其南歸之由對曰老母年近八十思便侍養是以逺渉鯨波不敢憚勞也儲君惻然顧左右取近日所書眉夀二大字賜之盖以髙其親之年庻以永其子之養也敬惟皇太子天廸仁孝之性於兹一事二羙備焉仁事親之實孝為仁之本皇太子平日視膳問安盡其愛敬之道於三宫冀以寧君親之心説君親之志以蘄君之夀也一旦推其錫類之盛心成已成物之功仁與孝不可勝用矣眉夀始見於豳風之七月老人眉有毫夀之徴也後屢見於魯頌之閟宫今鄭氏在淛東九世同㸑旌表孝義之家也部使者興化羙俗之官深知斯行奉元良心畫以歸心法之正大筆法之端嚴焜燿山川新民觀瞻於是稱豳雅之兕觥効豳人夀君之敬而竭其忠賦魯頌之鮐背保魯侯夀母之樂而遂其孝繼今鄭氏忠孝之祚日熾而日昌其兆在此也深屬𤣥述其實謹書之下方云沁園春𤣥誕日先君冀郡公作此示勉敬䟦于後𤣥子來前還憶汝今朝初度時是吾家㡬世書香閥閲我翁疇昔心地坦夷宅相伊何泛紅老子汝母慈仁有兒如今恨倚門人去和膽為誰丈夫七十何為算三十功名已是遲要經天緯地拓開實用嘲風弄月省可虚詞我亦平生巵言徒費猶酌檐花向九疑團欒好待老吾泉石留汝鐘彛大徳丁未𤣥賤生之日先公祝之以沁園春𤣥受而藏之第年少家貧性亦踈散房中惟有一敗篋以繩約之篋中無所有又以紙外䕶之甚嚴暇日時復展玩明年戊申不幸先公棄捐自是見輙嗚咽殆不忍觀皇慶壬子𤣥免先公喪又二年矣先公在時所定謝氏嵗乆不克成婚繼妣長沙郡君謀為𤣥畢婚姻而𤣥方游湘中繼妣老妮啓𤣥篋取故衣浣濯補紉以俟新婚老妮目不知書篋中文字亦為所持去此詞亦在焉𤣥歸而求之竟失其所遍索十數日無得深自刻責以為不能寳藏先人之訓遂為此生抱恨之大端每至劬勞之日則泣而識之如是二十五年屢嘗籲之先公冀隂相之庻㡬復見此詞以無負付囑之意延祐乙邜以來𤣥僥倖科第歴官中外至元元年乙亥叨恩翰林直學士國子祭酒先公贈翰林直學士亞中大夫輕車都尉追封渤海郡侯尋蒙奎章近臣奏請有㫖申勑詞臣製碑以賜𤣥感激之餘付書還家囑舍弟信翁先白於禰告祭之日諸昆弟子姪咸集中堂姪進老􅃍前曰昨日偶治故書得先祖手澤一紙蟫食殆半乃夀八翁沁園春也兄弟相視大驚曰此汝叔平時徧求而不得者汝何得此衆取視之果然即付書報𤣥京師二年丙子夏謁告南歸立碑甫抵舍姪即以詞見遺𤣥奉詞涕泣如隋珠和璧去而復還自計生平可喜之事未有過此嗚呼異哉詞所謂宅相伊何泛紅老子者謂外大父臨賀府判理齋李公也倚門人去和膽為誰者是嵗免先夫人䘮也嘲風弄月省可虚詞者𤣥少作頗患多故先公以實學朂之也猶酌檐花向九疑者先公分教舂陵時將之官也雖然𤣥之至喜者以此詞之失而驟得則先公若有隂相之也他日或可逭伯魯授簡之責也其至懼者則以先公期待之意如彼而𤣥之踈文謭學所成就若此其何以逭伯符不克負荷之譏乎装既完踪跡所至必携以自随三年丁丑以侍講學士召入京戊寅春以二品恩例申請夏五月進贈中奉大夫湖廣等處行中書省叅知政事護軍追封冀郡公先妣追封冀郡夫人六月甲申祭禮畢因出此卷再寫善本并致所感云男𤣥泣血書于賢良坊寓舍䟦先公與南谷先生書先冀公與南谷居士未及一識族中宜翁為之求書於安福同知王君習齋未幾習齋去官故未及投留之篋笥考其嵗月盖大徳丙午丁未間書則𤣥為子弟時代先公作者也至正壬午十一月𤣥叙族至防里俯仰將四十年南谷先公即世皆乆兩家子弟覽之愴然圭齋文集卷十四欽定四庫全書圭齋文集卷十五元歐陽𤣥撰賛御書九霄賛聖人居潜如日未旦待其將出光景於粲若木蟠桃實生海濵天光首被先萬物春離麗正中烜赫八表物物容光莫獲私照上在桂林臣有震宧躬荷寵顧染翰賜之作其踐祚億兆悉臣欲攬天章幾千萬人向所蒙恩曠遇希世隋珠和璧曷足言異今雖近臣孰敢奏請仰瞻雲漢惟有引領日邉之氣其名曰霄陽數用九乾德孔昭龍飛之徴有開必先形諸翰墨夫豈偶然天啟淵衷神􅂇筆力震畫乾初洞見天則猗嗟震宧世世寳藏億載萬年為龍為光麟鳯二大字賛皇太子習大書端本堂上命庋其所書記之於籍或以賜近侍宫臣則録所賜人姓名而登載之慎重之至也宣文閣授經郎浦江鄭深其官署既在内府與青坊宻邇深家又以九世同居聞自諭徳以下咸樂與之逰因得侍硯席被寵顧故有是賜焉所賜為麟鳯二大字若曰同居為國家之瑞有若麟鳯云爾筆法方嚴意度閒暇天縱不凡深得之允為慶幸屬𤣥記其事於下方謹拜手作賛辭曰春宫臨池神助腕力結體楷嚴運筆端直上命宫臣以時貯儲遇有賜予籍而記諸深仕延閣授徒宫庠獲陪燕翼膺是寵光維麟與鳯肇錫孔嘉有之似之瑞我國家潘雲谷墨賛徂徠松雲貯𤣥谷道人居中抱其獨琅琅空山萬杵熟道人曄然開電目松雲化石石化玉峥嶸寳氣霄漢燭貢之奎章月在櫝龍光淋漓九宇福十八羅漢畫像賛我觀應真玲瓏八牎具妙用故示諸愚蠢世言神通自墮㓜哤匪梵匪漢匪竒匪厖見師即呵孰前摶控千花㝠㝠百泉淙淙猿吟鶴飛白雲空谾龍伯山君巴滇蜀駹爪剛力獰冠詭服厖或象瑜來或於菟降信攝平等詎分珉玒如來在時慧日萬邦既入湼境俄然膏釭固修第二有二無䨇矧此苦海實資徒杠南浮諸方金鼓肆摐建論性相樹兹疑幢彼不見月􅃌月在江渟為泓洄激為湍瀧我無成虧喧寂一腔此歐陽先生閒暇時著意為鐂仲賔題此廿韻仲賔避亂客固江黄氏子魯所因以遺之識者當因文以重其畫不可因畫而汎觀其文也馮翼翁子羽觀䟦為防里族姪題兖文忠公像歐陽永叔文在兩間與世推移道之將興文必先知八代萎蘼韓歐繼作讀者贍之實啓濓洛五季鉅筆素王微權本論拳拳慶厯七篇人心既正士習斯淳黄河㤗華我公其人自賛不古不恠不清不竒置之竹籬茅舍似無不可貢之玉堂金馬亦無不宜噫百年三萬六千日與吾相對吾亦不知其為誰族兄山村先生像賛實踐真修洙泗之學濶視雅撡箕頴之風節用謹身充而逹乎曽閔之行存心養性悟而超乎松喬之宗子孫極髙年之養而志存舊日之儉素鄉䣊推丈人之行而身教後生以謙冲郡侯賜帛重於鄉飲朝廷表門侈於素封是宜濟南諸生追懐九十之伏勝㐮陽過客想見百代之龐公族子秉彛像賛山村子也以治官之能治家以應世之智應族不遺履舄任用咸當不勞鞭筭資具自足心平而直何事城府行簡而易豈資邉幅有子孫之賢可恱情性有山林之勝可娱心目人見其康徤而期為山村向上之夀我觀其忠厚而知為歐門鼎盛之福與静修先生畫像賛先生姓劉名因字夢吉容城人至元中䝉裕宗召為賛善辟集賢學士皆不拜微㸃之狂而有沂上風雩之樂資由之勇而無北鄙鼓瑟之聲於裕皇之仁而見不可留之四皓以世祖之畧而遇不能致之兩生嗚呼麒麟鳯凰固宇内之不常有也然一鳴而六典作一出而春秋成則其志不欲遺世而獨往也明矣亦將從周公孔子之後為往聖繼絶學為萬世開太平者耶黙庵先生畫像賛東平安民寤寐乎明善誠身之書歩趋乎格物致知之學闗西三鱣未必榮於教授之四世荀陵八龍奚以過於伯仲之一壑豈非白茅藉而忠信著元酒淳而嗜慾薄者乎鍾期伯牙有同世而不相遇者吾胡於黙庵之神交而益以重容城之先覺也威如蘇先生畫像賛英英紫芝皎皎素絲冥捜逺討黙識近思子雲精深季海孝友徳人之容君子之守郎中蘇公畫像賛維子寧父為名􅀸士其心塞淵如古君子既合於古誰諧於時職是正直弗究厥施居家嗃嗃在國諤諤屹如長松矯如一鶚蚤以讜言屢忤權相晚著惠愛足食邉鑲剛者必仁仁必有後宜爾有子簡自造秀遺像儼然不亡者存九京可作孰敢吏雲曽文辿像賛先生之學吾誰與稽吾有源委澗瀍東西先生之書吾讀未遑吾有徴信季通紫陽大道無形公獨有像神仙不死公獨有塟塟留仙訣像馭仙風止乎觀丘池水澄融魂月魄水息慮艮止鶴鳴長空騰化震起遺鈐記傳嚴宻謹言感發人心何日已焉防里族姪友人劉伯常名彛贊鐂氏奕世以更著號何事於更一變至道不變者存于其保之字子以常名子以彛陽明軒太𤣥子龍閶闔開蜿蜒回寳劒出天馬來䟽寳雲禪寺題䟽唐會仰小釋迦上彤禪師作䨇峰禪寺於石鎻峰下迄今稱名刹座席多叢林望士至則咸有所樹建舊殿僧堂作者為别傳泓法堂為晦谷輝鐘樓為夢作滿南廡丈室為近年謙山福今堂頭一清徹公克武前修仰瞻佛殿屋老思撤之揣力弗贍以余舊家宜陽寺迩吾族求作儷語發端鉅家冀獲資􅂇圖維厥新詞曰唐刹占山水之竒舊多勝迹瞿曇備天人之福必有廣居維兹寳雲雄我鈴邑翬飛傍峙已聳巗瞻象馭中臨未崇殿制兹欲裒多益寡舍舊圖新即蕪陋以徴辭謁華腴而求助於是講遺䂓於娑馺證妙境於率陀長者布金祇園咄嗟集事老人懸車故里讃詠成功故䟽書與所性姪書自夏謁告詞垣道假江左取便欲經祖郡省墓譜亭之行途中暑􅇵心與迹違抵家以來且人事蚕叢文債日生逺辱慰問但卑叔在朝忝自從臣未罄黼黻之報恩及二代兼蒙賜碑榮幸不勝今遣僕老李特賫勑賜碑一本相奉别致薄贐贈諸族屬煩吾姪分潤勿患其寡而患其有未至也邇者賤疾百病交攻使者復促上道起居未可自必老僕即使之歸似難稽召命舟中欲使任其扶持之勞故暫留也不宣答意山先生意山聘君老兄文侍𤣥去冬防里彌月之留涵濡道徳之味於骨肉之情得於兄所教良多迨今銘感未已令郎來辱惠問勤懇第恨溢羙辭多令人讀之赧然賤跡自正月中旬以來右膝腫其痛如剜始者護痛不敢屈信乆之兩足筋攣即日行立俱廢稽延召命恐違官箴遂援年雖未及身委有病自願致仕者聽之例移文有司行逹朝省冀此庻得藥褁專心然亦沉痼如舊書來所謂促装上道那得許事耶令郎初至適值病體服宣利之藥遂致泄㵼不已困憊不能見客數日稍復當圖報深媿莫能效毫髪之助聞張毅甫尚書除江右憲使其人相知力疾作一書干之或能相汲引一試也側聞兹嵗垂帳仍在舊館郡泮必時至彼諸生常得親炙老成亦幸事也餘惟萬萬自愛占荅崖畧不敵先施統希尊照不宣又與意山先生書𤣥壬午譜亭之别于今六年都下蒙恵書但送書人乗便即行往往不别而去不及報書為歉方馳仰間令郎至荐辱佳翰承寓居春㙜夀履康裕殊慰殊慰文集舊序如戒更冩令郎所著易問辨甚佳己為作序第媿病餘意緒不佳乏好語也令郎氣宇明爽因推其八字非常發逹行當擢科吾兄收義方之效享榮養之禄計日可待也劣弟蹣跚如昨右臂時苦風氣流注大為所窘最是文債日生無少休息令人悶悶未卜㑹期惟以道珍嗇草草伏希尊照不偹回所中書猶是癸卯年叙譜以來今三十有五年矣是時不肖與所中俱在子弟之列每思㓜從兄弟之樂今復欲爾尚可得耶去夏謁告祠垣假道江淛初意徑趍洪袁一訪故耳中途􅇵暑遂與願違老僕還聞族中諸公相候甚乆令人漸恧無已兹逺席宗庇自忝從臣恩及二代兼蒙賜碑尤出望外受寵驚懼蒙書乃以賀言惟重􅇶惕祖塋題表之喻僕何敢當第曩嵗侍親舂陵見元公家數世之墓皆太守方孚若為題之他日援此故事或得一名筆表識亦未晚也賤迹近叨兩君貧病交窘居行未知攸措吾姪何以告之儀翁還專此占復潦畧等㡬孚照回所立書相詎五百里相别十五年逆旅倚伏靡不更常起居動静邈焉無從忽宜翁兄携所恵書得之驚喜相半追憶曩侍先君子琴册適執事自綵侍來以拜見退相從齋閣是時僕與執事俱為人子弟一門自為師友之樂有不容喻今日此况此味惟屬之所立仰為名門雍熈之􅁤翁季道徳之盛異時秋蟬賦側耳獨領畧吾知叔弼乆矣兩科士論殊以魯生不來為恨六月之息三年之鳴端有所待他日榜中龍虎第一相承舍君其誰政當堅坐冲宻守庚申耳區區遭時承乏何足置牙頰來書諄諄然及之令人卷舒媿瀋可拾甚者以六一為是何以羙疢强加我耶此公事業未論其他只蘆荻畫地我軰曽受此苦曽下此工夫否此則斷斷然不夢見脚板者也廬陵長沙之議不謂兹事亦徹聼聞僕在二郡不翅滄海一稊或者之語僕亦不辨惟應之曰僕為崇韜不敢藉談尤不敢也不敢布素一語亦告者過畨氊瘦馬自是鄼億家風且先軰三尺森嚴在前何敢猖獗一歩寄示畵軸皆米家虹月惜蕪穢不足發揮嵗晏百冗填委宜翁行又􅃍尊翁朝奉令叔意山學士令弟芳茂暨族黨諸先逹皆不及顓狀敢告申敬何時譜亭叙拜以罄鄙懐家兄面次附致謝臆伏希鈞照不宣囬鐂申齋先生書𤣥頓首再拜復書提舉聘君申齋先生丈席𤣥即辰清和承體候佳勝濟南耆年有相之道不勝願見之禱吾宗振先來辱書且知姪孫宗任客臘叅謁座下第緘寄雄文迨今未至不審何故亟稱督索端便復命隴阡樵採之禁事出當然流言之惑實無是也區區抱病三載始獲一歸心志凋殘舊學如失其不能為先正大夫役也審矣適候卜氏女病振先就之相見借紙占酧凡百潦畧惟鼎茵加毖以夀斯文謹奉状不宣答劉桂隱書𤣥頓首再拜復書桂隱先生執事𤣥視廬陵江鄉乃未獲一寓桑梓之敬諸鄉先生亦未嘗一望履絇虚名誤人僕僕南北抱兹二欠負負奚文先生道徳之重藻鑑之明今先之以書且有文集叙之喻僕何足以叙髙文之後此亦虚名誤聼聞耳踵襲訛謬如是不已豈不甚可畏哉僕自去春痺疾盛作一嵗之中謁告十九今者又有哭子之戚倀倀南歸予環之使要諸潞上夏初誤恩落侍講升學士俯僂循墻迨今未敢拜命心常怔忡舊學廢忘仲賔還姑爾塞責滓穢髙明知罪知愧盛暑力疾治答不敵先施切希照亮答孫春洲書𤣥頓首再拜上記春洲聘君先生𤣥讀天台賦金聲嫋嫋吾耳將二十年識公於此盖乆昔人識心在識靣之前斯謂知己族弟志行家人至辱佳翰勞問勤懇殊慰瞻馳第玉署再遷之言此傳説者之謬幸勿過聼區區抱痾三年朝廷熟察而深憐之譬之病駒不任銜勒置之茂林豐草之地使之姑遂其本性豈有復可驅䇿者哉令郎才俊自當不乏知遇萬一邂逅在他人尚能推轂豈敢愛一援手之力於秦晋之戚哉价旋力疾占荅秋杪冬初必到防里胥晤有日餘儲靣賦草略切希照察不宣又𤣥頓首再拜春洲先生契友𤣥曏在史舘與曼碩掲公談江右人物掲稱譽足下才羙在臨川孫履常何太虚間㑹見咄咄逼人他日相知翰墨中益見故人藻鑑之髙日者敝族諸子弟見過又知結習斯文固有𤓰葛第恨才薄資淺仰慕前修薦士不得彷彿其萬一耳所求春洲詩及大字草草塞責報章逺勝作者子昻墨蘭自是佳品感媿無斁區區􅇵暑抱病趂便裁荅不敵先施尚㡬照察不宣與張憲使書都門别後賤跡尋亦謁告還湘相距地逺乏便致書惟深馳仰近傳全除目共諗移軺左浙弭節西江西江之民蘇息之期實在此矣僕先世西江人也里中長老時相徃來語及公來相與喜抃少白僕近訪族里中少俊甚多有姪原春者其才足以應舉然得失未可必袁州路學薦為直學例必經憲司試驗欲望相公賜一援手之力他日寸進實出陶鎔何敢忘也賤體入春以來痺疾愈甚兩足筋攣行立俱廢雖被召命自度病勢如此未見即愈自願休致之章已逹有司每日從事藥褁而已為况無足為知己道者舍姪行顓此起居未中冀順序珎嗇行膺柄用不具偹慰國博䘮母書𤣥頓首奉慰文廷博士至孝𤣥不意慶門倚伏之㑹先太夫人奄棄榮養緬惟哀痛奈何𤣥聞變不勝慘怛已僦小車詣行府申唁昨暮適苦痰嗽欝眩之證又聞車行甚亟勢未獲靣㑹中統若干聊為雇車之資道逺冀節哀順變以㐮大事手䟽潦略不具與劉文廷書𤣥頓首再拜上文廷博士提學相公仁友𤣥往夏去國同列中以不獲一言以别為恨客冬還鄉乆之又以不蒙一紙之寄為欠今夏忽睹除目承有儒㙜之擢既喜且駭其喜則以國初甚重此職覃懐許公由是拜左轄亦愚葉公由是拜右轄大徳中呉興趙公由是入為侍講吾文廷居之允愜士論其駭則以賤跡離翰苑時當揆力勉其留其言以為斯文漸覺人少僕抗言薦數士為代如文廷皆其列也當揆盖嘗諾之今忽外補非文廷求出必不爾也已而果傳有子夏之戚聞之胸次作惡者數日昔有三人聞客言虎患一人蹙額特甚僕其人也才不才亦各言其子往年嘗以此致心疾後來熟思之理數自然皆有乗除修短存乎其間莫年盡傷亦復何濟不如姑聼造物所以處我者何如耳劉仲賔行亟此代靣外有一啓極知剰出或可􅂇發一莞聊以寛君之憂也僕態勝舊近又苦痰暈之疾但夙縁無涯竟日為人造綺語業殊可厭也毫楮草草希照亮啓兹諗輟班學省進秩文臺晨入都堂陳𠂻懐而求去晝歸六舘别同舍以治行綸綍及門輶軒在路既許即家而為府又客需次以申情仕宦以稱職為稱心宜無内外重輕之辨賢逹唯知義故知命自明禍福倚伏之機故於趍賀之緘輒為譬解之語孔文舉楊徳祖古人所親即兒羡門子浮丘公今世未聞有後首尾不嫌於衡次肺肝所托於深知毣毣馳忱怱怱闖便回有壬許叅政啓辱示謙鳴喜新賁治包胥感無衣之賦竟償復楚之言相如獲全璧之歸始著却秦之勇盖人之秉忠者必遂而物之拂性者終還追惟往事之堪驚益懐髙位之難處文塲有議豈容居西掖而弗知丹詔驟頒乃獨使東㕔而恭聼此挾姦回之秘䇿欲摧俊乂之前茅尋移疾以去官姑待時而俟命生意已存於碩果大材寧繫於匏𤓰皇天實鑒乎臣衷聖主自定乎國是予環鶴渚公曰盍歸乎來哉授柄鳯池衆謂兆足以行矣屬開端於更化嘗効力於代言然非烏獲莫勝曷免絳侯見沮急迓輶軒而傾盖真同韋布以彈冠洎僉黄髪之謀親預緑章之寫於是退前日掩奎之宿即當時押角之人嘉與賢能洊行周家選舉之法至詒朋友共播虞廷賡歌之音第媿踈庸莫陪揚厲王通受罔極之賜惟乞閒身孟明收再効之功當書逸史亟酬先施倍切懽悰祝告文天畀寳命列聖相承貽萬世之丕基輯九圍之至治顧兹菲徳嗣守基圖念皇考之上賔結孝思之罔極爰舉徽稱之典躬陳時祝之儀尚冀垂歆敷錫祚𦙍明宗皇帝附廟祝文於穆皇考聖徳配天何臨御之弗遐儼威靈之如在顧兹冲𦕈嗣守皇圖惕惟丕訓之承祗奉鴻名之舉是用躬執圭瓉薦其苾芬仰惟願懷來格來貺焚黄祝版維至元三年嵗在丁丑二月朔壬申越十三日甲申孝孫翰林直學士國子祭酒𤣥敢昭告於祖考贈中順大夫中書禮部侍郎上騎都尉追封渤海郡伯澹軒先生歐陽公𤣥奉元統三年甲戌三月制書以𤣥忝列藝文大監偹位三品推恩二代贈封祖考官職勲爵如右是年九月以書到家告廟改題且遵彛式為𤣥尋遷太常翰苑等官限以職守今者謁假來歸告墓之典始克成禮惟我祖考懿行粹文師表湘楚惟誠淑人惠利後學儒者之徳莫盛於兹餘慶所被施於諸孫獲承國恩致有褒贈思昔咸淳甲戌鼓篋上庠在其當時六舘諸生為厥父母咸得推恩世運遷移先考齎志六十年間嵗運一周積善之報乆而罙彰有若此者侍郎法從之官貴列八座渤海大郡之壌崇視徹侯載燔宻章昭侈上賜伏惟膺此寵光濬厥福澤庇頼我後益熾以昌謹以牲齊殽饌式伸䖍告焚黄告后土維至元三年嵗次丁丑二月壬申朔越十有三日甲申翰林直學士中順大夫知制誥同修國史國子祭酒歐陽𤣥敢昭告於官榮橋白雲菴后土之神𤣥欽奉制書贈封祖考中順大夫中書禮部侍郎上騎都尉追封渤海郡伯爰擇榖旦燎黄於塋惟神苞流崇深頴擢明秀相我先祖妥靈于茲芘厥後人夲固枝茂實惟神庥惠徼方増報祝敢後自今以始恩休數至維爾明神亶有榮耀尚圖利之謹以酒殽庻羞式伸䖍告防里祭祖祝文二大元至正二年嵗次壬午十一月己巳朔十有三日辛巳曽孫翰林學士資善大夫知制誥同修國史𤣥謹以牲酒之奠致祭于防里第十一代祖七承事府君歐陽公墓前而言曰禮去鄉國省墓而行重違逺也先世遷瀏動踰十紀井邑既殊嵗月既乆踈逖松檟事勢使然餘慶所覃靡間彼此𤣥自竊科第登進公朝偹列法從推厥夲原敢昧所自謁告來歸展省墓下追懐雨露怵惕深増惟我先祖流慶後昆願自今始無曠彛禮尚享防里歐陽氏始遷第一代祖府君墓前人夲乎祖百世匪遥精神旁通體魄如在逺孫席庇展省還鄉萬木一春萬水一清豐本濬源用永有譽惟我先祖實克相之祭后土文二防里第十一代祖墓后土氏之神先世遷瀏違逺墳墓曽孫展禮宅靚以固祖考來歆神亦恵顧濬靈鍾竒錫我蕃􅍈我族既惇百世無斁尚享防里歐陽氏始遷第一代祖墓后土氏之神自吉之袁我祖始遷妥靈兹阡今三百年髙山蜿蜒其上隆然神相我后慶流如川翰林國史院祭掲侍講文嗚呼公之道徳忠厚篤實洞徹内外公之文章純深爾雅警發憒憒方舘閣之踐敭實昌期之際㑹宻勿論思從容進退當譽望之日隆惟恪恭之弗戒掌斯文於玉堂賛皇猷之光大侍講讀之經幄知啓沃之切闓待引年而挂冠戒舟楫而南邁帝錫命而來還冀黄髪之未艾遹聞詔之方􅇻思竟考夫前代詔總裁於三史庻緝熈於帝載天不憗遺慨其殄惟我同僚思其莫再望望喪車悠悠丹斾尚期英爽歆此薄酹圭齋文集卷十五欽定四庫全書圭齋文集卷十六附録元勑賜翰林直學士亞中大夫輕車都尉追封渤海郡侯歐陽公神道碑銘有序翰林侍講學士通奉大夫知制誥同修國史知經筵事臣張起巖奉勑譔奎章閣學士院侍書學士中奉大夫同知經筵事臣庫庫奉勑書奎章閣學士院承制學士中奉大夫兼經筵官臣尚師簡奉勑篆額今皇上即位之三年至元改元冬十一月三十日奎章閣大學士臣錫喇卜奏翰林直學士臣𤣥職翰林論思有勞制贈其考官三品爵列侯欲著之碑銘光移上恩其勑翰林臣起巖撰文奎章臣庫庫書丹臣師簡篆額上曰可臣起巖承詔伏惟延祐初年仁宗聖文欽孝皇帝繼述祖訓建立科舉大廷䇿士臣𤣥臣起巖賜第拜官為同年皇上御極簡擢侍從臣𤣥臣起巖代言紬史為同官明詔諭臣俾揚其先烈發其潜徳求之臣職揆之友誼皆不敢辭謹按公諱龍生字成叔歐陽氏其先冀之渤海人從晋南渡徙長沙率更令詢以文學顯名隋唐四世孫琮為吉州刺史因家廬陵琮八世孫萬為安福令故又有居安福者安福府君而下四世曰效三子謨託逺託徙吉水後吉水析置永豐傳二世是為宋太師兖國文忠公之考崇國公其他子孫散處安福邑境雍熈初割安福置分宜縣𨽻宜春郡故居安福永豐者籍廬陵居分宜防里者籍宜春而安福分宜地相去不滿五十里公防里族也别號防里歐陽氏曽祖安時及祖新皆漕試湖南愛瀏陽山水之勝又徙居焉新字仲齊以經學著稱淳祐末荆溪呉公子良漕湖南辟廬陵歐陽巽齋守道為岳麓書院山長又以禮聘仲齊為講書因寓長沙巽齋聆其講説嘆曰長沙自有仲齊吾何為至於此考逄㤗字忠叟經術行業師表一方學者常數百人擢科登第相屬也用薦為潭學録安撫司檄與湘潭譚景衡履學田埋沒者登故額士廪以羡廬陵羅子逺在教授席頼其佐助為多今贈中順大夫禮部侍郎上騎都尉追封渤海郡伯妣何氏渤海郡君公年十六入潭學已負俊譽月試占髙第相國古心江公判潭州帖為崇禮齋長又二年從醴陵田氏受春秋三傳甲戌混試國學生湖南終塲萬三千人有竒㧞士二十八人公以春秋中第二肄業存心齋時羅教授為朝官以書賀云曏潭學經界忠叟景衡盡心焉去嵗景衡子魁鄉薦今年忠叟子入上庠造物報人不爽如此至元丙子内附侍禮部還瀏陽居霞陽山之白雲荘禮部晚嵗究心太𤣥作律厯統元圖書數千卷因耗心得渇疾公泣諫不為止未脱藁卒公抱其遺書每慟哭至絶左丞崔公斌行省于潭召之以親老辭居山十有七年部使者李淇至瀏瀏有文靖書院祠龜山楊先生淪廢於隣使者考郡志謀復其舊詢衆求才望士任斯責衆以公對乃專縣尹杜元忠即山中延至㑹有司例試儒户中選者復其身使者命公考士湘隂瀏陽去取公當人至今稱之憲部薦其才牒宣閫逹之省府授文靖書院山長郡人强之起始受命改築書院猿山之陽踰年禮殿講堂門廡齋舍及龜山先生祠事内外具舉學者雲集書院廪稍不贍佐以己資夫人亦徹奩具助其經費落成之日升堂講孟子承三聖章言龜山先生傳周程學而及豫章延平紫陽朱子實承道統斥王安石配享孔廟功亦可配孟子山林老儒聞書院之復筵講至為出涕秩滿㳂牒之京師贈太傅魯國康里文貞公野齋翰林李文正公抑庵集賢宋公交薦為校書郎行就職矣㑹集賢言歐陽山長有功文靖書院今瀏陽陞中州例設教授師席初筵湏宿儒碩望啟廸來學宜移教其邦人便朝論是之改瀏陽州儒學教授至則㑹學廪可贍二十人月約一十五日選俊秀補員會食躬親教督諸生皆勤勉自力科塲既闢進士軰出實公權輿之遷道州路教授道介兩廣或以為逺公曰兹為周夫子之鄉何逺之有至官郡庠隣濓溪書院公定䂓約朔望謁宣聖畢教授率諸生謁濓溪祠一日過祠東見老屋數間詢知為西山精舍勝國時祠蔡季通蕪廢乆矣祠舊𨽻郡庠有田百五十畆或利其入欲兼并之故以屋僦軍官去遂不治幸其速壊公立召僕夫拚除按籍得田修其祠郡學田多為豪民㨿有公請諸憲司被檄往括暑行山間得租三百餘石因感疾歸卒官舍至大元年八月五日也年五十有七諸姑奉柩歸以三年十月三十日塟郡東羅田之木𤓰埭公既歿之七年當延佑甲寅𤣥舉進士魁湖廣省貢明年乙邜以第三人賜第同知平江州遷蕪湖尹初贈公承事郎同知湘隂州事再贈朝列大夫同簽太常禮儀院事上騎都尉追封渤海郡伯今贈翰林直學士亞中大夫輕車都尉追封渤海郡侯初娶譚氏一年卒再娶李氏金陵仕族有婦徳知書前公四年卒初追封宜人進封渤海郡君今封渤海郡夫人繼室李追封長沙郡君譚夫人有子曰浩龍川書院山長娶唐渤海郡夫人有子五長貞孫石林書院山長娶王次定孫曲阜林廟學録娶李次𤣥也今中大夫國子祭酒依前翰林直學士知制誥同修國史娶謝封渤海郡夫人次憲孫㓜鞠外氏李沅陵縣學教諭娶湯季彭年舉明經娶周女二長適武岡路教授卜天佑次適瑞州雲石務税使湯居恭孫男八長慶以教授借住建昌路樂口砦廵檢次暹遹遜逹皆業儒女孫六曽孫男四曽孫女四公儀表峻清瑩晳如玉有膽略幹局性孝友㓜嵗嘗刲股肉以己母疾兄士卨蚤世撫其遺孤皆有成婚嫁必先兄子而後及己子先疇悉推與之讀書目五行下八嵗屬文十五下筆萬言文雄渾有體裁學精敏有識趣尤長於講説義理每講篇出士傳誦之晚號雲莊有經學理窟雲莊講義及所著文集傳於家歐陽氏世以文學名廬陵之族大顯于宋矣宜春防里清門素業文行有傳至於禮部倡鳴經學師道尊嚴表率多士公學為通儒行為士榘宣勞庠序位不滿德維持斯文克肩其任再世如一遺善後人是有良嗣首擢巍科聲華曄然演論玊署黼藻帝猷追封二代有位有土大書表隧恩賁歿存則公父子平昔纉學衛道之報昭然四逹而防里之族克昌以大將嫓美於廬陵矣於乎盛哉銘曰惟歐陽氏廬陵别族有家瀏陽同出安福文忠相宋魁然大儒防里清門世德不孤操義風烈堅持允蹈服膺克繩義方之教三代之英士生其時世其道德以恬以熈至行應古鄉邦攸重士子景從如鳥歸鳯衛道育才再世一心播耰百年有穫斯今綸章載頒秩登侯伯霈恩所覃於渥其澤大君賜命詞臣敬承撰銘登潜匹休廬陵宣昭幽顯帝仁若天垂示無垠何干萬年防里歐陽氏家藏亞中大夫碑䟦右元楚國文公𤣥為翰林直學士時制贈其考成叔為亞中大夫追封渤海郡侯復命侍講學士張起巖為文以表其濳徳此碑所由刻也按元史稱楚國文公歴官四十餘年在朝之日殆四之三三任成均兩為祭酒六入翰林三拜承㫖此碑作於至元元年之冬正順帝即位之三年公為翰林承㫖所給以贈封其二代之日也按公瀏陽人瀏陽之族原於防里防里之族夲乎安福與宋文忠公同祖故此碑述防里為詳今防里之系有上舍歐陽鏞家藏是夲出以見示予因竊歎曰盛哉歐陽氏文獻之足徴也前有文忠公以文鳴于宋後有楚國公以文闡于元然二公之所以廓大顯庸者皆先世之積累仁厚所致也按文忠公之考崇公為綿州推官每夜治官書必秉燭而歎凡囚有可矜者必為之求生此明刑慎罰之心也楚國之考亞中公為文靖書院山長進職教授能羽翼道學修濓溪龜山二書院經理學田以膳養士類此崇文衛道之功也其積累仁厚皆如此宜乎生二大儒以清忠懿徳輔佐宋元昭一代之文明流百世之事業非偶然也其所以恩延先世歿贈名爵追封公侯者非人之榮盖天報之也予獲拜觀為追原夲始綴一言于碑末俾繼是而觀者知二公之所以顯揚盛大者有先徳為之權輿非淺淺之所能及也詩曰母念爾祖聿修厥徳為歐陽氏之後者朂之圭齋文集卷十六
