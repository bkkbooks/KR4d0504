body:
  text: 圭齋文集卷二元歐陽𤣥撰五言古詩舟次諸牐寄詩奉謝都水分監瑞卿監丞抱疴辭承明買舟㴑官牐袢襟正無悰蓬底可容納舳艫尾相衘宻次若鱗甲憶初離神京餘暑尚揮箑淹留近秋杪朝爽欲添裌紆傳進元䇿走介奉一札使君適分監嬴縮制有法得書即欣然愛我踰素狎遣騶䕶輕舟快若厯三峽鄉心鷹脫鞲野性兕出柙昔憂阻殽澠今喜泛苕霅黄蘆間蒲稗綠藻唼鳬鴨舒懷對幽景寓目成畫夾公堂為展席觴客禮意洽病予難却酒亦復飲盈呷吁嗟逆旅途知己元不乏相期逺大器留詩當盟歃感篆辭則長欲賦慚韻狹送振先宗丈歸祖庭并列小序于左歐公孫子多擘𣲖以為四暮年歸頴陰非無首丘志乞洪不得請由是懈歸計攷公生平言亦頗憾先世先世多才賢生適逢五季輻員政分裂盡瘁於所事竟乏垂世名盖亦限地勢况復公少孤坎􅇄蜀漢裔身當混一秋代逢承平際擇里審所安實邇輦轂地子孫托畿内宦轍亦云易人情曷免爾公豈溺聲利詎知汳􅒶移南北尋暌異一枝先南邁司造有深意沙溪標徳里瀧岡重塋祭至今青原家十世祀不替振先吾宗英守正恥骫骳誾誾保家法處約不少懟嘉樹無由枝嘉穀無穗滯原本既不凡時需諒無棄矧今掄俊髦往往論根器老夫辭冊府多病乆憔悴徒懷薦士心言莫士軒輊賦詩當推轂自愧辭已費憧憧青雲友誰如古人誼歐陽公晚年乞守洪州累表不得請於是歸江右之志遂不果余詩所謂其居偏方熟於歐文者能知之盖公之不歸廬陵其志深有可諒者矣南渡以後宋人多議公此事洪景盧楊廷秀之賢亦未免有此意甚者謂公子孫居頴為金人所戕而遂絶是大不然近年奉詔修三史一日於翰林故府中攟金人遺書得元遺山裕之手寫壬辰襍編一帙中言安平都尉完顔色埓漢名鼎字國器嘗鎮商州偶搜伏於竹林中得歐公子孫甚多以歐公之故并其族屬鄉里三千餘人悉縱遣之則知未嘗殱于金兵也此好事者為之辭明矣元遺山金士領袖生平極重歐公嘗有詩云九原如可作吾願從歐陽北人至今佩服其言振先歸以似鄉先生桂隠劉公一觀為所性姪題小景三首林廬澹踈煙歸帆泊沙渚披圖得空闊總是經行處寒屋茒簷古踈煙野樹春遙遙濟川者應是此中人浦口歸帆落沙頭行客回林間酒旗出快著一篙來東坡恠石我懷赤壁仙此心已穿透憶曾據虎豹今與鶴俱瘦七言律詩大明殿早朝扶搖萬里上青霄鳳闕龍池步步瑤駞背負琛金絡索象身備駕玉逍遙衣冠俯伏傳呼嶽干羽低回看舞韶湖海布衣瞻盛事他時田野夢天朝試院倡和仁皇下詔急求賢糠粃當時偶在前兩榜復科新大比三人聯事舊同年闗山道路尋常夢臺閣風雲尺五天但使得材今勝昔吾儕寧復嘆華顛張子能詩擅士林無時無地輙披尋文章咫尺不相見春興幾多應自吟鍊字直疑成白首知音有待鑄黄金何時尊酒論真訣要自康謠說到今進講金華集衆賢禮闈啣命拜君前花摧蠟炬仝清夜餅餤紅綾憶昔年龍尾步隨黄閣老鵠頭書下紫㣲天南宫群彦時相問何似官街有米顛至正羣興郡國賢威儀重見甲寅前杏園花發當三月桂苑香銷又七年豹隠山中文澤霧鵬摶海上翼垂天明時禮樂須竒俊莫道儒生自聖顛相臺負郭東南裴相臺縁溪一徑踏蒼苔此日城闉少人到當時公府棄官來禪床象屋留光雨書沼蛙聲噤鞠灰泉石至今有貴炁山靈應解識三台至正壬午十一月十三日祭初祖墓早仰更秘書有佳句見勞匆匆奉酧嚴押白髪甘泉沗從官歸來曳履上吟壇故山虎豹多文采白水蛟螭有屈蟠謁客及門容履滿贄文盈篋借燈看百年省墓償初志心憶先親痛苦剜青春萬木一根荄一一春工妙剪裁顧我乞歸懷頴水羨君訪隠到天台題橋肯學相如志誓墓慚無逸少才但喜陽剛將彚進明朝緹室動葭灰至正壬午十一月十三日祭始遷祖墓于防里村心是日春洲先生有古律四首紀其事𤣥用韻奉答道左遺墟三百載曾孫疊石作階基儒家冬至祭初祖客子異鄉來逺支白髪始修桑梓敬青編乆廢蓼莪詩無由作吏守墳墓願訪故山耘紫芝與公俱乏濟時具舊日相思不得過南國寄書川路永西樓剪燭雨聲多池邊黄鵠有人賦門外驪駒先客歌但得茒齋相伴處臨風遙想玉為珂陶令歸來誰作室孟郊老去乏應門政縁踈懶動遐思無奈過從求贈言平江曲澗助盩厔複嶺層巒如浩亹嵗晚胡為滯空谷萋萋芳草怨王孫十年玉署絲綸手新把漁竿傍釣磯平生亦愛蒔蘭蕙歸日惟知求蕨薇干禄郎君離綵侍投閑老子賦緇衣山中薦士書長寫弱翰猶能為客揮送白芒李宜忠之寧州教授廣文家住白芒原唐世忠臣閥閱存寧郡喜迎新博士䢴人特重舊王孫楊花絳帳春雲陣苔蘚丹書暮雨痕向使汾陽晞曖在應慚詩禮在名門竹澗圖青林翠巘俯江郊谷口湍流巨石㘭戞玉萬竿鳴水樂垂紳雙瀑盪雲旓風漪静浸蒼龍影月瀬光搖紫鳳巢歌罷商巖採芝曲兩翁翰墨定神交敗筆秋拈禿筆似愚慵曾為雲煙掃墨松脫頴荒涼空憶兎舊腰消瘦乆如蜂小臣奏事冠初免敗將摩旗甲不重老矣此心無可用少年豪氣為誰雄郊天禮成應制紫壇黄幄夜無風牲璧初陳月正中瑞靄霏㣲成五色神光烜赫暎重瞳千官屏息瞻天表萬國關心在聖躬清曉慶雲髙捧日簫韶前導駕還宫謝恩日呈同年把劒風簷日欲曛偶從甲舍得髙文煙雲過目猶能記花栁逢春各自欣竒字擬從楊執㦸俊才端屬鮑㕘軍客來為我傳新作筆硯無忘舊筞勲比干墓獨夫臺上醉紅裙七竅丹心豈忍聞白日已隨流水沒青山猶䕶太師墳忠肝一片埋秋草直氣千年起暮雲我亦停驂薦蘋藻太行落木正紛紛接花木園丁妙手即花神換葉移枝偽脫真刀剪豈能傷化力色香無復記前身春深自有鸞膠續嵗乆行看鶴膝伸堪笑㣲生亦如此牛為馬後吕為秦壺清朝飲層氷瀹性靈夕飡秋露引修齡江湖大瓠中無物海嶠方壺外有情貌示神巫機闔闢醉邀市掾酒芳馨何人欲作先生傳長憶寒葅月滿庭過洞庭二首白沙隠隠見金鰲殿閣憑虚結構牢天水渾融浮大極神人幽顯隔秋毫龍堂深閟靈栖冷象緯低垂客枕髙欲作廟堂迎送曲杜紅蘅碧盡離騷媧皇摶土擲虚空屹立君山面勢雄一畫犠圖天地骨九江鯨觀鬼神功裾飄帝子蒼茫外樂奏鈞天澒洞中頗幸當年鄒魯客觀瀾未到楚諸熊侍宴北省臣本江南一布衣恩榮今日及寒㣲台纏列宿光相射湛露迎陽晝未晞仙醖飲來生羽翼宫花留得奉庭闈酒闌車馬如流水回望紅雲遶闕飛孫春洲壽慶堂孫母歐陽九袠登外家譜諜自廬陵髙年備養人俱羨同姓升堂我未能好客郎君深巷轍讀書稚子小窓燈朝廷屢賜尚方帛更待迴鸞織誥綾寄有壬許㕘政京華白髪染塵埃喜見文場閉復開自是曹㕘當繼相不然王式肻輕來上躬藻火慙無補衆口鹽梅屬有材素志已酬歸欲早相期濁酒坐莓苔澧州謝家建通濟橋慶雲籠日䕶雲根玉樹薰薌接澧沅太傅功留召伯埭相君心競謝公墩已誇螮蝀綿今古猶羨封胡偉弟昆珍重盧溝溝上月隨時車駟勞于門夜宿寺前農家漢南旅店已星稀倦宿田家帶落暉蕭寺依山聊復爾鄴侯送酒是耶非風餐并覺凉生飯露坐俄驚月在衣老子漫遊吾漫送登山臨水澹忘歸西明道人武昌堤上水雲身三十年來識道人只為漫遊相見少故知臨别贈言頻憧憧車馬紅塵老靡靡江山白髪新邂逅一回詩一首錦囊千首未為貧瀏江瀏江江水色幽幽兩岸青山雲木稠一自桑欽載源委曾留孫盛作春秋猿岫風來起波浪龍湫月出見汀洲下流兩度翠華過光氣至今浮斗牛昌山昌山峽口日西斜蘭渚維舟近酒家水潄樹根龍露爪石排江㟁虎交牙路迴佛寺藏深塢風動漁舟掃落花再拜靈均獻蘋藻月明環珮下汀沙讀鎦養吾虞青城書季子胡為葬嬴博太公復欲返營邱匆匆塵事半萍梗往往異土迷松楸誰能樊澤為表識頼有杜羔勤訪求但當作吏守墳宅莫待暮年思逺遊早飲聽秋居士園池碧池流水緑潺潺髙下樓臺紫翠間阮籍才華勝南族謝安清致滿東山標名花塢鶯争道集句桃符鹿守闗灑掃園丁今白髪秋翁化鶴幾時還鎦草亭詩冡朝廷采詩廢已乆公卿薦士亦罕聞坐令劉氏伯倫鍤生作唐人賈島墳光如黄壤翳明月副在青山藏白雲米家骨朽怪事息又見廬陵老隠君排律賜經筵官酒次蘇伯修韻鼇極天初補娥池月已修鮮颷生廣厦清旭暎垂旒三漏聰無壅黄瞳視不流凝神思燕翼虚已納鴻猷章撤金爐灺筵收玉斚浮甘泉歸步逺太液便程優鸚鵡棲宫樹鵁鶄避客舟商耆戔漢幣瀛儁膳唐名輩應相語明時豈易醻徘徊西掖晚鴈影度延秋謝徳盛奉蘐堂種得忘憂草母安憂可忘葉滋金水潤花帶石雲香淑景盈東閣春暉盎北堂靈苗仁壽域晚節治平鄉世澤深培植先聲續顯揚才華昌後裔事業富孤孀沃壤根株茂慈闈鬂髪蒼詠歌傳翰苑雨露溢恩光圭齋文集卷二
