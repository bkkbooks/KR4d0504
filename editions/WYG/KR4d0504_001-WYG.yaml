front:
  text: 圭齋文集卷一元歐陽𤣥撰
  hash: sha256:309ba39f33932945cd6ec7785f80668dcaf690b465d8d24c8d8d4e548309b325
body:
  text: 賦天馬賦翳房星之委精鍾天馬之權竒澡神質於渥洼砥勁氣於月氐貞非坤牝健本乾為上分扶輿之秀下孕蜿蟺之漦風雲資其格力雨露澤其光儀膺廣鳳臆鬛秀龍鬐首昂渴烏之勢影捷杜矢之馳於是陋騊駼之産邁麒麟之姿驂六飛於廣漠舞九奏於希夷若乃朝刷崑崙夕秣𤣥圃駕緱笙之子晉道霞觴於王母風冉冉兮斯征靈繽繽兮來宁覽熙世之徳輝屬萬物之欣覩願陪禁衛自獻西土乃命栘中戒造父釋雲幕於金鞍暎孚尹於瓊户出則鏘和鸞驂輿組媚日馭之光華展天衢之步武然其氣質不可求之驪黄之餘其芻秣不可畀之皁櫪之伍峙玉山之殖未足供其齕委金臺之貲未足議其估是知天馬固難得而不易畜也所以罕見於盛時僅聞於前古時則有倣鄒枚請賡樂府而客或難之曰時方歌鹿鳴之章子乃為天馬之賦得無馳駕鼓車者寧不與此而迥殊也哉嗟夫寶不自貴以人而貴物不自異以人而異方神駒絢綵於水涯固期駑劣之同滯至其裂砮矢而庭實竟乃自齒於天駟信物美而無所遺兮亦竒才之能自致負鹽車而上太行者慨未遇夫伯樂伏皁櫪而志千里者又何慙乎老驥振長鬛而一嘶兮冀識余之所意􅅽埃風而上征兮願借翠雲以為鞁隨飛龍而上下兮羗先路其焉避彼豈乘虚而騰踏兮追雲逐電之可冀也庶幾求之𤣥黄之外兮則亦駿骨之可市也辟雍賦皇風清寧人文盛開京師崇天下之本國學萃天下之才粤若稽古爰自蒼姬始號辟雍昉厯代聲名之盛本大射行禮之宫其規剏於文武其度講於周公節觀者於四面壅流水以環中若乃道閫邃嚴義闥軒朗澄源止而不泥文瀾溢而不蕩肉好適半如璧之象兹乃辟雍之初所以名狀也或在靈臺或在鎬京靈臺者為文王所建鎬京者為武王所營兹乃辟雍之初非一地而同一名也或習射兮觀徳或養老兮興孝滙九有之俊髦軌萬方之則效兹乃辟雍之初非一事而同一教也迹其建侯設鵠矩袷圓冠襄尺講事君之敬剡注視立已之端斯則辟雍之習射天下之盛觀鮐背鶴髪尊傅隆師祝噎以膳授几以咨斯則辟雍之養老天下之盛儀誾誾啾啾泮奐夷猶覽上國之光華踵賢關之雋游斯則辟雍之養士天下之名流有客聞之曰子於成周之制講之詳矣於異代亦有所徵乎泝觀炎劉治盛中世臨雍再拜化及四裔要荒萬里就學遣質鼓篋圜橋以億萬計于斯時也辟雍亦可謂盛矣愚曰未然子徒慕先漢之遺風若未覩今日之文治我國家聲教之所暨也東踰若木之日津西探崦嵫之月竁南窮火維之陬北際氷天之澨文軌之治既同弦誦之風四被視寰海為一辟雍陶同宇為一庠序於是在天則應璧府圖書之祥在地則產孔廟金芝之瑞藏曲阜之特祠實飛龍之首嵗乃擇成均之師申胄監之制三年而科詔頒文治煟日星乎曠世之條風霆乎多士之氣將見自今以始彼漢之億萬尚敢與今日同年而語哉大抵惟聖人能盡君師之職惟吾道能並天地而存惟養賢為籲俊尊帝之大務惟建學為化民成俗之大原睠此辟雍屹乎本根固願為今日之賦者續古之頌被之和聲叶之永言前以光八百年之成周後以開萬億載之皇元義門賦并序宣文閣授經郎鄭君浚常以其家乘示余曰浦江鄭氏義門文録歴覽諸作盖彬彬焉他日謁予一言為作義門賦辭曰翳伯僑之裔孫兮紛振振其好修承世媺之蟬嫣兮寧隠耀而發幽循義路以允蹈兮擇仁里而相攸被芳潔以為服兮襲温良以為裘將孝弟以為車兮方敬讓以為舟厯九世而共㸑兮壹乃心之休休曰五倫之於日用兮實有生之大猷父慈愛之恂恂兮子色養之油油若君臣朋友之際兮必忠信之與謀於睦婣其有惠兮在任䘏其有賙閫儀雍雍以賔退兮家政凛凛其陽秋長者施其令則兮少者孝乎順柔珪赴弟以瘐死兮綺代親而自囚史何感乎緹縈兮詩何嘆乎原隰之裒嗟髙風之卓絶兮履艱貞乎何尤爰孜孜於稽古兮悉聖訓之是蒐陳時祀之秩秩兮戴首弁之俅俅述五禮以為儀兮樂至和而不流以予觀於往昔兮將公藝之可儔我歐公之史五季兮書旌表之法周門築壝以綽楔兮柱雙立而烏頭雪霜貿貿於當世兮松栢岑蔚乎故丘矧皇元巍巍乎有天下兮化丕冒於海陬敦懿行於四國兮播令聞其若郵聞孫起家而交辟兮列相第之前籌尋重席於官庠兮徹聲華於冕旒信積善之有報兮宻邇寵光之綢繆也墨梅賦伊江梅之受命泊與澹其相遭灼天地之太素亂水雲兮齊髙方三冬之搖落索群木於秋毫怳迴溪與轉嶺發孤暎於蓬蒿枝苔封以瑩寒蕋玉切而華膏表萬有以獨聖誰與子兮同袍何佳人兮黯然阻煙霧於林皋豈皎潔之冒汙抑輝光之在韜彼翰墨之託寄亦何異乎風騷撫尺素而太息心臨逺而忉忉何以慰兮空谷瀉樽中之濁醪感外物之變化謹内志之持操物交物以不染我與我而焉勞世不辨兮奚尤已或戾兮焉逃與昭質之自虧從見笑於繁桃於兹花其何有懼天下之滔滔奚附意於守墨以傳誨於兒曹頌至正二年壬午七月十八日丁亥皇帝御慈仁殿拂郎國進天馬二十一日庚寅自龍光殿勅周郎貌以為圖二十三日壬辰以圖進翰林學士承㫖庫庫傳㫖命傒斯為之賛臣惟漢武帝發兵二十萬僅得大宛馬數匹今不煩一兵而天馬至皆皇上文治之化所及臣雖駑劣敢不拜手稽首而獻頌曰天子仁聖萬國歸天馬來自西方西𤣥雲被身兩玉蹄髙踰五尺修倍之七渡海洋身若飛海若左右雷霆隨天子曉御慈仁殿西風忽來天馬見龍首鳳臆目飛電不用漢兵二十萬有徳自歸四海羨天馬來時庶昇平天子仁壽萬國清臣願作詩萬國聽圭齋文集卷一
