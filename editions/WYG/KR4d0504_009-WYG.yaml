body:
  text: 圭齋文集卷九元歐陽𤣥撰神道碑元中書左丞集賢大學士國子祭酒贈正學垂憲佐理功臣太傅開府儀同三司上柱國追封魏國公諡文正許先生神道碑洪惟聖元度越千古世祖皇帝以天縱之資得帝王不傳之學上接伏羲神農黄帝堯舜不傳之統而為不世之君若魯齋許先生以純正之學下接周公孔子曾思孟軻以來不傳之道而為不世之臣君臣遇合之契堂陛都俞之言所以建皇極立民命繼絶學開太平者萬世猶一日也猗歟盛哉先生既没之三十三年為皇慶二年仁宗皇帝詔暨宋九儒從祀宣聖廟庭明斯道之所自傳矣又二十三年為元統三年今上皇帝勑賜臣𤣥文其神道之碑以賜其子師敬使刻之於是臣𤣥再拜稽首以復明詔曰論世祖之為君則見我元國家之初當真元會合之氣運故善言先生必以道統為先而後及功業則上可以稱塞聖天子命臣作碑之初意下可以厭服天下後世學者景慕之盛心也臣謹按先生家乗及嘗私淑父師者序而銘之以金泰和九年己巳九月丙寅生於新鄭邑中㓜有異質八歲入學從師問讀書欲何為師曰應舉取第耳曰如是而已乎師大竒之謂其識趣非常他日必有大過人者自顧章句儒非其師遂辭去年十餘有道士過見之驚曰骨清神完目光射人如箭苟非命世大賢即當神超八表人間富貴不足道也稍長嗜學如渴飢而精强絶人世亂家貧無從得書聞有善本冐險數百里就而錄之讀之有疑即能有所折𠂻歲壬辰天兵渡河為游騎所得其萬夫長酗酒殺人為嬉先生從容曲譬卒革其暴久乃信其言如蓍龜人賴全活者無筭萬夫長南征乃東去隱徂徠山遷泰安之舘鎮尋遷大名扁其齋曰魯世因號日魯齋先生國家既有河朔遣官分道以試選士中者得占籍為儒魏人力勸應試既中選留魏三年自挽鹿車載書還河内魏人致僕馬不聽入洛求第果得之自洛適魏聞河内政虐還止蘇門十餘年間雖顛沛流離行不愧影其與人交中剛外和一介取予必揆於義人與之居雖有忮求馴致俱化所至學者翕然歸之察其誠至乃留舘下既留誘掖忘倦身教屬屬言教循循於是師道尊嚴親友日至在魏友竇黙蘇門友姚樞相與論辨探幽析微詣者慴伏凡伊洛性理之書及程子易傳朱子語孟集註中庸大學或問小學等書言與心㑹於所從㳺教以進徳之基慨然思復三代庠序之法甲寅世祖受地秦中聞先生名遣使者徴赴京兆教授先生避之魏使者物色偕行亷希憲宣撫陜右傳教令授以京兆提學卜居鴈塔之東與同志講井田之制買園為義桑㑹得請還世祖即祚建元中統召先生為家教既至謁歸復召至上京入見上問所學以學孔子對留上所無㡬以疾還燕明年自上京兆數有敷對時相王文統用事而先生及姚樞竇黙日被顧問黙在上前屢斥其學術不正樞以才見嫉蓋竇言本出於先生文統亦頗疑之乃奏姚為太子太保外示尊禮内欲擯使疏逺竇姚拜命将入謝先生獨毅然辭謂二公曰禮師傅見太子位東西向師傅坐太子乃坐今能遽復此乎否則此禮自我廢也二公懐制闕下辭文統聞斯言遂寢其命改授先生為國子祭酒竇為翰林侍講學士姚為大司農先生亟辭以疾久乃予告還内既而上京使狎至應命至燕病弗能往至元元年自燕復還先是有詔即家為校以業來學乃躬耕里中未嘗以詔示人至是召入省議事旋踵求去丞相安圗來謁欲留之退謂人曰時流欲軰行許先生吾見相去千百尋有詔趣赴省遂北行見上檀州諭之曰安圗少不更事卿無負所學悉以傳之有嘉謀嘉猷語使入告對曰聖人道極髙逺學者所得有淺深然當罄所知如聖詔其所不知不敢强也安圗明敏有操守告以古人格言往􅉨領悟第恐有間之者則難行耳自是預大議時至都堂扈行上京咨訪日廣宿衞之士見先生入對舉手加額相慶曰是欲澤被生民者上疏陳五事曰立國規模曰中書大要曰為君難曰農桑學校曰慎徽典禮累數千言讀奏未徹上久聽微有倦色先生即斂袵求退上肅然正襟危坐先生乃再讀讀訖上嘉納之其餘論諫多削其藁世罕得聞有頃辭疾聽五日一詣省賜西域名藥善酒俄許其還繼召與太保鎦秉忠左丞相張文謙議朝儀官制多所詳定阿哈瑪特請建尚書省總六部與中書省角立特用先生為中書右丞先生求面辭不得見者再越數日奏所議事畢自陳曰臣有三宜辭一非舊勲二蔑文徳三所學迂恐於聖模神筭未能盡合上曰用卿出朕意毋事多讓先生辭不已上命從官掖之起有㫖曰出既出及閾還奏曰陛下令臣出省耶上改容曰出殿門耳明日又辭遣近臣哈扎爾孫先諭止之强出視事至上京奏論阿哈瑪特罔上不道事不服因病謝㡬務丞相難之御史中丞博囉為之請上惻然曰召子師可諭使舉代對曰用人宜出上意臣下舉代恐開市恩覬覦之漸有㫖以國人世胄子弟就學遂篤意教事奏門生王梓劉季偉韓思永耶律有尚吕端善姚燧髙凝白棟蘇郁姚燉孫安鎦安中十二人為伴讀被㫖咸驛致之以先生為集賢大學士兼國子祭酒先生之為教精粗有序張弛有宜而必本諸聖賢啟後學之方踰年諸生涵養薰陶周旋中禮講貫通適上喜其業成時自程之越三歲以改塟親䘮謁歸屬召赴行在遂請朝辭以行上命諸老議其去留姚樞謂先生出處有闗世運宜成其志更命張文謙問所以告歸之意其對如初始允十四年召議改厯法仍拜集賢大學士兼國子祭酒教領太史院事十七年授時厯成以疾屢告上禮貌隆至路朝錫杖内殿賜坐疾劇裕宗在東宫聞之為言於上以驛送還師可以河東按察副使改懷孟路總管以便養皆東宫請也且使宫臣諭曰先生幸醫藥自輔無以道不行為憂十八年三月戊戌薨於私第之正寢易簀不變年七十三是日大雷電風㧞木城中無貴賤少長哭於門商唁於塗農弔於野天下識與不識聞訃慨嘆四月乙酉塟李封村先塋之南既塟四方學者來會為位哭墓而去先生真知力行實見允蹈齋居終日肅如神明嘗遇迅雷起前泰宇凝定不䘮執守其為學也以明體逹用為主其脩已也以存心養性為要其事君也以責難陳善為務其教人也以灑掃應對進退為始精義入神為終雖時尚枘鑿不少變其規矩也故君召輙往進輙思退方世祖急於親賢而先生篤於信已以是終無枉尺直尋之意及夫仕不受祿人以為髙則喟然嘆曰甚矣余之不幸而有是名也仕豈不有食君禄者哉食無忝而已伐宋之舉一時名公卿人受攻取之畧先生言惟當脩徳以致賔服若以力取必戕兩國之生靈以决萬一之勝負及宋既平未嘗以失慊世祖亦未嘗以是少之臣觀三代而下漢唐君臣未聞以道統係之者當時儒宗或知足與知仁未足與居也宋濓洛數公克續斯道然未嘗有得君者世祖龍潛諸儒請尚其號曰儒教大宗師嗚呼漢唐宋創業之主烏得而有是號哉此天以道統而屬之世祖也先生出際斯運一時君臣心以堯舜為心學以孔孟為學中外如一喙號公魯齋先生嗚呼魯者曽子傳道之器歴代佐命之臣雖欲為此號豈可得也非天以道統屬之先生乎先生之謀國譬工師受命作室既得大木不肯斵而小之是以寜不受工師之命而必使學焉後臣之道無愧於伊尹寜不預平宋之功而必使以徳行仁之言無負於孟軻中統至元之治上有不世出之君能表章其臣繼述往聖之志下有不世出之臣能贊襄其君憲章往聖之心於是我元之宏規有非三代以下有家國者之所可及矣及夫元貞大徳髙第弟子彬彬軰出致位卿相為代名臣皇慶延祐之設科子師敬叅預大政以通經學古之制一洗隋唐以來聲律之陋致海内之士非程朱之書不讀又豈非其家學之效見諸已試者歟先生平時頗病文籍之繁嘗曰聖人復出必大芟而治之則周衰以來文勝之弊尤将有以正救於其間是豈淺之為知者乎先生諱衡字仲平其先河内人父通避地河南隱徳弗耀今贈銀青榮祿大夫大司徒追封魏國公諡恵和妣李氏追封魏國夫人子男四師可師遜師孚追封魏國夫人敬氏子師敬封魏國太夫人賀氏子公於閨門有禮中饋皆賢事公甚敬師可由河東按察副使歴襄陽路總管贈禮部尚書諡文簡博學敏思工於辭章有文集貽後師遜師孚未仕卒師敬由監察御史踐敭中外歴治書侍御史吏部尚書中書參知政事國子祭酒太子詹事中書左右丞兩為翰林學士承㫖知經筵事今由兩臺中丞拜御史中丞階光祿大夫明經務誠學尚節槩肖父風女三長適于章儒者餘早世孫男六長從憲以蔭累遷湖廣行省理問以歸徳知府政事次東孫夭次從宸積官監察御史山南憲僉終河東副使志趣端正惜未究用次從宜太史院經歴中書省照磨今翰林院國史經歴次從宣太保府長史中書右三部照磨官次從宗章佩監異珎庫提㸃孫女五長適廣東宣慰司都元帥寗居仁次適大禧院管勾覃質次適翰林應奉蕭璘次適寜陵簿張構次適阜城尉陳恕曾孫六長崇祖次紹祖秘書著作佐郎武進縣尹次書童文童禮童武童曾孫女某大徳元年贈大司徒諡文正制詞有曰聖學方湮惟洙泗之源是泝嘉謀日告非堯舜之道不陳至大三年加贈太傅追封魏國公制詞有曰天非繼聖學之墜緒則不生命世之大賢國欲與王道以比隆肆命為蒸民之先覺姚文公燧作詞堂記則謂五百年必有王者興其間必有名世者出惟公足以當之蓋太祖皇帝建國丙寅而先生生於己巳上距宋慶元庚申朱子之卒才十年當興王之㑹續傳道之業必有數存焉世祖嘗稱其論事多與太祖之言合至取祖訓示之𤣥生晚學陋何以知先生然誦諸儒之説而想望其餘光焉先生之道統非徒托諸言語文字而已蓋自謹獨之功充而至於天徳王道之藴故告世祖治天下之要惟曰王道及問其功則曰三十年有成矣是以啟沃之際務以堯舜其君堯舜其民為已任由其真積力久至誠交孚言雖剴切終無以忤至於其身之進退則凜若萬夫之勇何可以利祿誘而威武屈也晚年義精仁熟躬萃四時之和道出萬物之表無事而靜則大空晴雲卷舒自如遇物而動則雷雨滿盈草木甲拆事至而不疑事過而無迹四方之人聞之而知敬望之而知畏親之而知愛逺之而知慕求其所以然則惟見其胸中磅礴浩大人欲淨盡天理流行動靜語黙何往而非斯道之著形也又嘗切論之先生天資髙出固得不傳之妙於聖賢之遺經然純篤似司馬君實剛果似張子厚光齊似周茂叔英邁似邵堯夫窮理致知擇善固執似程叔子朱元晦至於體用兼該表裏洞徹超然自得於不動而敬不言而信之域又有濓洛數君子所未發者宜夫抗萬鈞之勢而道不危擅四海之名而行無毁近代元豐之異論熈寧之紛争先生處之豈有是哉拜手稽首銘曰世降邃古大樸日雕天吏不作治教寂寥帝恫我民眷求有徳世祖齊聖作其建極臣有許公身任斯道為仁肫肫制作慥慥昔公在野世難薦臻精義致用屈蠖之信心樂則顔志任則伊朝思夕維天将啟之朋來逺方以辨以問㑹融一貫氷釋理順世祖居潛時號儒宗多士既歸功徳日崇召公起家斯世将泰灼之俊心天地正大既握乾符尊履五位利見大人乃在九二覃懷之居輅車實來屢進亟退求福不回論議上所容徳休休獻可替否言直以遒上曰仲平汝左朕丞其悉爾學資朕股肱惟誠惟一以結主知惟明惟哲其止也時初問伐國對不以兵上逹公猷不在宋平官盛既稟公恥素餐敬事後食匪為苟難近臣貴胄世荷國寵我淑以道國收其用小學功隳大學陵節我教多術循循無越雖聖有模載範其驅以歩以趨疇敢侮予自古在昔氣化推移仁人之興惟世盛衰凡今有生就司榮瘁惟道為大與天罔墜世祖繼天惟天生賢道統有任民彛賴焉有徳有言有子有孫皇命作誄貽厥永存元翰林學士承㫖榮禄大夫知制誥兼修國史贈江淛等處行中書省平章政事魏國趙文敏公神道碑至元二十三年世祖皇帝遣使求賢江南得趙宋昌陵十一世孫孟頫入見奏對稱㫖起家為郎由是被遇累朝敭歴中外仁宗皇帝聖眷優渥擢掌詞垣致位一品文宗之世有司舉行贈典進秩辨章馳爵上公仍議節恵至正五年春三月今上皇帝以集賢大學士塔爾哈等特賜墓道之碑勑翰林學士歐陽𤣥為文集賢侍講學士蘇天爵書丹翰林學士氶㫖張起巖篆額臣𤣥奉命謹考行狀次第而銘之叙曰公諱孟頫字子昂姓趙氏系出秦王德芳五世祖為秀安僖王實生阜陵賜第湖州曾祖考師垂故宋定江軍節度使開府儀同三司萬壽觀使累贈太師追封新興郡王諡忠襄妣莊氏衞國大夫人祖考希承故宋贈朝奉大夫直華文閣致仕累贈通議大夫妣鄭氏封碩人考與訔故宋正議大夫尚書户部侍郎知臨安府浙西安撫使臨安縣開國子累贈銀青光禄大夫妣李氏封碩人及公入仕我元推恩三代曾祖考改贈集賢侍講學士中奉大夫䕶軍追封吳興郡公祖考改贈資善大夫太常禮儀院使上䕶軍追封吳興郡公考改贈集賢大學士榮祿大夫柱國追封魏國公曽祖妣祖妣並吳興郡夫人妣及生母並魏國夫人初太常公蚤世無子鄭夫人選同宗子為之後集賢公本蘭溪房侍兄與譍通判湖州鄭夫人一見竒之遂請以為嗣内降許之初娶李氏續娶丘氏公丘出行蓋集賢公之第七子也生十有一歲集賢卒丘夫人賢能朂其子學公資禀俊邁讀書一目五行俱下弱冠中胄監試調真州司户叅軍皇元混一後浮沉鄉社間丘夫人嘗語之曰天下既定聖朝必偃武脩文收四方才士用之汝非多讀書何以自異齊民公聞益加講貫毎從里中老儒敖繼公質正數歲大進尚書夾谷竒之以翰林編脩薦不就江南侍御史程公鉅夫出訪江南遺逸得二十餘人以應詔公在首選初授奉訓大夫兵部郎中轉集賢直學士奉議大夫遷朝列大夫同知濟南路總管府事兼管諸軍奥魯以脩世祖實録召入書成謁歸改知汾州未上以集賢直學士行江浙等處儒學提舉除揚州路泰州尹進階中順大夫需次於家仁廟在東宫聞公名召入拜翰林侍讀學士知制誥同脩國史改集賢侍講學士中奉大夫復入翰林為侍講學士知制誥同脩國史俄遷集賢侍讀學士正奉大夫進集賢學士資徳大夫拜翰林學士承㫖榮祿大夫知制誥兼脩國史延祐六年五月告老還湖州是冬召入朝以疾不果行至元元年上章乞致仕不報二年春遣使存問夏六月辛已薨於私第至順三年贈榮禄大夫江浙等處行中書省平章政事柱國追封魏國公諡曰文敏公初見世祖風神散朗容止閒暇上以為有神仙風會尚書省立命草詔公援筆立成上聞大㫖召近臣譯以對喜謂公曰卿言皆朕所欲言者自是國有大議必與咨詢一日侍側有詔羣臣議政上顧公曰卿往共議至則衆議贓以至元鈔二百貫為滿論死公曰鈔法初行以銀為則歲入厥直輕重相去至數十倍今雖改法比及虗實政未可知古律以米絹論贓二物民生所須謂之二實最為適中况鈔乃宋人所造其初止行逺方今襲用之以鈔論死恐非良法刑部楊郎中起而作色曰朝廷初行至元鈔故以計贓公詆其非欲阻其法乎吾意今日議法必集儒臣又豈無一士如公者乎公曰人命至重議法失當人将不得其死奉詔與議偶有所見不敢不言且中統鈔虗故改至元鈔君謂至元鈔終無虗時有是理哉楊為之赧然議罷出謝曰某失在不學細思公之言是也洎入夏官會天下驛置凡使客委積之費至元十三年以來毎歲僅支中統鈔二千錠物價騰踊使客曰增吏無以自給物倍於民不勝其擾請増至二萬錠用乃舒㑹濟南總管闕公獨判府事聽斷明恕訟牒以稀或經月獄空有元掀兒役于鹽官逃之他郡其父疑同役者殺之得遺骼之半於澤中以為子骸同役不勝榜掠誣服公疑有寃緩其獄掀兒果歸誣服者釋城東有上腴田二頃兩家兵後互爭而皆亡其劵有司不能决公斷以養士夜出邏聞有讀書之聲使人私削其柱為識明日饋酒為勞得一能文之士必加奨異自教以文法郡儒風以盛歲旱禱雨龍洞有雲如車蓋隨馬至城中大雨旬餘城東有龍湫自為文責之雨洊至歲大熟白直數人者盗米其徒自首吏請加詰公郤之曰加詰累人必多及去官有數人送之至京號泣不忍去問之即向盗米者盗當墨必自臨視語吏曰是中豈無廹於飢寒及詿誤者戒之細書盗聞轉相告曰趙公仁人也吾徒何忍數犯其在朝廷多所匡正圻甸地震北京尤甚死傷數十萬上憂之自灤京還先遣平章諤爾根薩里馳至都召集賢翰林兩院老臣問故密㫖勿令丞相僧格知之時僧格遣錫都王濟等理筭天下錢糧已徴數百萬未徴猶數千萬名曰理筭其實暴斂無藝州縣置獄株逮故家破産十九逃亡入山吏發兵蒐捕因相挺拒命兩河間盗有衆數萬公顧諸老無敢詆時政者素善諤爾根薩里密謂之曰今理筭苛虐民不堪命事變且起地震之由實在於此宜請於上援貞觀故事大赦天下蠲除逋負則和氣可回災異可弭諤爾根薩里入奏如公言上大説從之詔草具會兩院諸老都堂僧格瞠視諸老見公進讀詔草至蠲除一條怒摇手曰此事必不可行汝曹所擬必非上意公徐進曰今理筭錢糧其不可徴者皆死亡之數不及今放散免之他日有言中書省累失陷錢糧數千萬者丞相何以自解僧格訹曰吾慮不及是詔書既下兆姓舉手相慶始有蘇息之望上問李尚書葉右丞二人優劣何如對曰夢炎昔與臣父事宋時臣方㓜忠佞不能周知臣與夢炎同事陛下見其為人重厚篤於自信思慮深長善斷國事有大臣風若李之所學在臣亦不知亦不能言言未既上遽曰卿意豈非謂夢炎優於李也賈似道罔上誤國夢炎在中書時無一言李布衣伏闕上書乞斬似道是賢於夢炎明矣李論事厲聲色盛氣凌人若好已勝者故剛直太過人多怨之今朕得卿之情卿父與夢炎同朝不欲斥其非耳可為朕賦詩諷夢炎公立進詩曰状元昔受宋家恩國困臣强不盡言往事已非那可説且将忠直報皇元上深善卒章之意出見奉御薩里於幄殿側告之曰上論賈似道誤國之罪青葉夢炎不能言今僧格誤國甚於似道我軰緘黙他日何以逭此責乎近臣中讀書知道理慷慨有大節上所親信無踰公者誠能捐一旦之命為天下除此賊仁人之事也薩里曰今災異數見盗賊蜂起皆僧格聚斂所致吾所以為日夜切齒腐心者公實啟我以機殆天誘之徑造榻前歴數僧格之罪百倍似道不亟誅必亂天下上初大怒叱衞士批其頬口鼻流血仆地少間復呼而問之對如初既而大臣有助其言上大悟遂按誅僧格後薩里語及斯事歎曰使我有萬世名者子昂之力也平江守趙全不法前守王虎臣訟之詔遣虎臣就問右丞葉李執奏以為不可上不允公曰全在平江為政貪酷固當治虎臣在官亦嘗犯法全嘗持之今虎臣罪幸在赦前故得攟摭全罪若使就訊必挟公濟私别遣官為當上從其言其在館閣尤多裨益因有事南郊他學士撰祝册有云章亥復生不足以歩皇元之幅員又云太祖皇帝正東向之位公曰天子父事天子誇疆理於其父可乎不可且公不為禮乎禮大祫太祖東向居中子孫在左者南向故稱昭在右者北向故稱穆若南郊之位上帝南面太祖自宜西向故事第稱配天作主公不用何也其人謝服從所刋定皇太后命學士擬改隆福宫名同列擬光被公擬光天或曰光天陳後主詩不祥公曰帝光天之下出虞書何謂不祥各書所擬以進後竟用光天以逺臣遭遇累朝特見優禮世祖戒宿衞公入内庭毋禁賜坐葉右丞相毎見與語或至夜分公於天下事當言者無所不及嘗稱公聰明剛正敢為直言公聞之益自斂退一日問公曰卿太祖子孫乎太宗子孫乎對曰臣太祖子孫上曰趙太祖真英主也其行事卿知之乎對曰臣蚤失父故老不以語臣故臣粗知其畧耳上曰太祖行事多可法者朕皆知之暇日當以語卿又嘗面諭之曰大臣奏事卿可與俱人有過差意渉欺罔悉為朕言之公謝不對自爾數求補外後聞其家貧賜鈔二千五百緡仁廟字公而不名詔近臣曰文人世所難得唐李太白宋蘇子瞻姓名至今在人耳目朕有子昂與古人何别時有譔述輙傳㫖屬筆與侍臣論公他臣不能及者數事苗裔一也姿表二也博學三也操履純正四也文詞古雅五也書畫絶倫六也旁通釋老書七也他日賜鈔五百錠恐中書留難以普度别貯賜之慮其畏寒勑内府賜銀䑕翻披英廟命公書孝經亦遣使以上尊酒衣二襲即家賜公公為兵部早入官署過東苑墻外道隘馬遇滑即堕牐河水中僧格言於上因移墻近裏者二丈許僧格下令曙鐘鳴治事部官後至者笞公至遇晚獨得釋自是笞止曹吏公雖忠結主知亦致衆忌性簡易䟽伉發言切中時病屢在上左右上察其無他獲全晚節程鉅夫方薦公有臺中丞言趙某故宋宗室不宜薦進使近左右鉅夫奏曰陛下盛徳立賢無方臺臣以是劾臣將陷臣不測上曰彼竪子何知顧侍臣傳㫖不越今日逐其人出臺仁廟眷公方隆不悦公者言公趙太祖子孫上初若不聞已而㳺辭不已乃厲聲視之曰汝言趙子昂趙宋子孫豈謂家世不汝若耶始惶􅘨趨出又言國史不宜使公與聞上大怒曰趙子昂乃先朝簡㧞以為帷幄臣者朕使討論古義典司著作此曹呶呶不懲一二無以戒後言者乃息世皇屢欲用公公自知直道不容於人居正路弗便往往力辭初授官廷論欲以為吏部侍郎髙參議持不可尚書省罷賀巴延入辭參知政事公適侍立上目公進曰卿亟往中書叅决庶政以分朕憂公堅辭不拜上問閻復宋渤二人如何對曰相才實難是日京師盛傳公已入省暮歸賀客候門者填塞公笑而遣之至元鈔法澁滯公與尚書劉伯宣同被命往江南按問行省丞相慢令之罪左右司路府官許就笞公深以為衣冠之辱比還一無所决罰僧格欲加譴責公不為動初受程鉅夫薦晚進翰長與程交代必先往拜其門而後入院公所為務崇亷恥先禮遜縉紳相傳以為厚徳平居嗜好冲澹家世紈綺况味埓布韋貴及崇階不見矜色客求文字與之周旋终日雖極勞甚憊未嘗拒人獨人有過失必面致諷諫無隱然直而不訐人亦易從病劇將终援簡濡毫如常時有頃翛然而逝娶管氏諱道昇字仲姬工詞翰善畫治内有才具累封魏國夫人先四年薨子男三人亮早夭雍夙慧有父風以蔭歴守昌國海寜二州奕舉茂才女六人長適强文實次適海道運糧萬户費雄次適李元孟次適王國器次適劉某孫男二人曰鳳曰麟薨之年九月塟徳清縣千秋鄉東衡山之陽管氏附公治尚書有書註於禮樂度數甚明知音律幽𦕈有琴原樂原各一篇號松雪道人有松雪齋文集若干卷談錄一卷為文清約典要諸體詩造次天成不為竒崛格律髙古不可及尺牘能以數語曲暢事情鑒定古器物名書畫望而知之百不失一精篆𨽻小楷行草書惟其意所欲為皆能伯仲古人畫入逸品髙者詣神四方貴游及方外士逺而天竺日本諸外國咸知寳藏公翰墨為貴故世知之淺者好稱公書畫識者論公則其該洽之學經濟之才與夫妙解絶藝自當並附古人人多有之何至相掩也仁廟彚公及管夫人及子雍所書藏中祕書曰使後人知今朝人臣中一家書學有如此者適新太廟成君相欲講禘祫定廟樂求習禮樂者如公已鮮今上脩宋史思士大夫熟宋事者亦何可得哉𤣥初以禮部奏名召奉大對公為讀卷官擢寘前列及公薨状公之行乃同年進士寜國路推官楊載距二紀𤣥備列北門公有賜誄之命誼不敢辭請系以銘曰有白其馬惟周之客周人尚騂客世􅇻白我元忠厚軼彼成周宋有近屬遇之加優侃侃魏公徴自炎方入見殿廷美如圭璋昔客在周但聞助祭未聞侍側命以獻替維此魏公進為親臣詢厥世系念其前人魏公在列玊立陛前上有顧問其言便便羣臣議法命往咨度援古例今論政以確法司在坐盛氣見侵理到之告折服其心上命代言對御操筆宸𠂻未宣已布尺一上遇災變詔問其由公言暴斂時政是尤委曲獻忠請釋逋負公進詔草時相震怒相怒未已公言徐徐相莫之沮乃下寛書萬方懽呼涵泳聖恩公啟近臣力㧞惡根近臣感激碎首强諍權奸既摧乃息稗政宣室夜問言不及他吏蠧民瘼直言無阿弱弗勝衣食弗盡器臨事論建奮無畏避世祖援公俾入政府聞命而僂懇求外補仁皇踐祚首召入覲皓首未歸寵冠禁近乃登瀛洲載頂鼇岫丕煥皇猷黼黻在手琨牒瑶編藏在宗廟屈玉垂金分鎮山澤逺方裔夷偶獲簡櫝雖未識公想見眉目嗟乾之資唯一清氣人稟至清乃精道藝天朗日晶一清所為星月明穊雲章陸離圗書以陳文字以立頡始造書鬼神為泣宇宙精英發决在兹清氣所萃乃臻瑰竒允矣魏公玉壺秋氷巧出天智智窺神能鳳翽其羽止於阿閣朱鴈天馬播之廟樂彌文日増制作日淑國於老臣百不一贖皇上稽古訪問舊儒豐碑為賜螭首龜趺敬告後人毋忘帝力世祖深仁仁皇至徳黼􅒐祼周孰擬我朝詞翰揚休百世孔昭元故翰林學士中奉大夫知制誥同脩國史貫公神道碑至治三年歲癸亥秋𤣥校藝浙省既竣事出而徜徉湖山之間故人内翰貫公與𤣥周旋者半月餘及將去杭薄暮携酒來别謂𤣥曰少年於朋友知契毎别輙繾綣數日近年讀釋氏書乃知釋子諅有是心謂之記生根焉吾因以是為戒今於君之别獨不能禁且奈何哉言已悽然而别明年甲子夏公捐館於杭數月訃至哭之盡哀自是凡至杭遇公舊逰追憶臨别之後未嘗不為之愴然出涕呼酒相酹也公薨廿又五年子阿爾斯蘭哈雅展省于燕顧公神道未銘願屬筆焉其忍銘乎公家世北庭裕實其名酸齋其號也故湖廣行省右丞相贈宣威服逺輔德翊運功臣大師開府儀同三司上柱國追封江陵王諡武定阿爾哈雅之孫故浙江行省平章政事贈光禄大夫河南行省平章政事柱國追封楚國公諡忠恵格濟格之子母趙國夫人廉氏故平章政事希閔之女公之初生趙國夜夢神人取天星為明珠以授趙國掌玩而吞之已而有身公生神采逈異年十二三膂力絶人善騎射工馬槊嘗使壮士驅三惡馬疾馳公持矟前立而逆之馬至騰上越而跨之運矟風生觀者辟易挽强射生逐猛獸上下初襲父爵為兩淮萬户府逹嚕噶齊鎮永州在軍氣候分明賞罰必信初忠恵公寛仁麾下玩之公至嚴令行伍肅然軍務整暇雅歌投壺意欲自適不為形勢禁格然其超擢塵外之志夙定於斯時一日呼弟呼圗克哈雅語之曰吾生宦情素薄然祖父之爵不敢不襲今已數年法當讓汝即日以書告于忠恵公署公牘移有司解所綰黄金虎符欣然授之退與文士徜徉佳山水處倡和終日浩然忘歸北從承㫖姚文公學公見其古文峭厲有法及歌行古樂府慷慨激烈大竒其才仁宗皇帝在春坊聞其以爵位讓弟謂其宫臣曰將相家子弟有如是賢者誠不易得姚公入侍又數薦之未㡬進直解孝經稱㫖進為英宗潛邸説書秀才宿衞御位下仁宗正位宸極特㫖拜翰林學士中奉大夫知制誥同脩國史一時館閣之士素聞公名為之爭先快覩會國家議行科舉姚公已去國與承㫖程文憲公侍講元文敏公數人定條格贊助居多今著於令未㡬公上書條六事一曰釋邊戌以脩文徳二曰教太子以正國本三曰立諫官以輔聖徳四曰表姓氏以旌勲冑五曰定服色以變風俗六曰舉賢才以恢至道凡萬餘言往往切中時弊上覽嘉歎未報公自籌曰昔賢辭尊居卑今翰􅁐侍從之職髙於所讓軍資人將謂我沽美譽而貪美官也是可去矣移疾辭歸江南十餘年間歴覽勝概著述滿家所至縉紳之士逢掖之子方外竒人從之若雲得其詞翰片言尺牘如獲拱璧公曰我志逃名而名隨我是將見害江浙物繁地大可以晦迹乃東逰錢塘賣藥市肆詭姓名易冠服混於居人嘗過梁山濼見漁父織蘆花絮為被愛之以紬易被漁父見其貴易賤異其為人佯曰君欲吾被當更賦詩公援筆立成竟持被往詩傳人間號蘆花道人公至錢塘因以自號入天目山見本中峯禪師劇談大道箭鋒相當毎夏坐禪包山暑退始入城自是為學日博為文日邃詩亦冲澹簡逺書法稍取法古人而變化自成一家其論世務精覈平實識者喜公謂將復為世用而公之踪跡與世接漸疎日過午擁被堅卧賔客多不得見僮僕化之以晝為夜道味日濃世味日淡去而違之不翅解帶泰定改元五月八日薨於錢塘寓舎年三十有九自士大夫至兒童賤𨽻莫不悼惜某年月日諸孤奉柩塟於析津之祖塋娶石氏北京名家江陵總管天麟之女有婦徳追封京兆郡夫人子二人長阿爾斯蘭哈雅歴蘭溪州逹嚕噶齊榷茶提舉慈利州逹嚕噶齊所至以清白吏著聞次博索哈雅孫四人長南山次寜山次葆山皆業進士應舉女一人適懷慶路總管叚謙有學識能文章𤣥嘗評公武有戡定之筞文有經濟之才以武易文職掌帝制固為斯世難得然承平之代世禄之家勢宜有之至如銖視軒冕髙蹈物表居之弗疑行之若素泊然以终身此山林之士所難能斯其人品之髙豈可淺近量哉有碑銘記叙雜著詩詞若干卷及所進孝經行於世銘曰嗚呼貫公麒麟鳳凰其往不可詰其來不可期者乎嗚呼貫公神龍天馬其變不可測其常不可窺者乎抑宇宙英氣合袪為雲流布為霆感物神化文武動靜無施而不宜者乎將飛僊應真出入機用渉世為􅃧一旦解悟翛然而聚散砉然而合離者乎死生幽明之際焉知公之所甚樂乃世之所為悲者乎嗚呼噫嘻事有可知有不可知所可知者燕塋之藏體魄在兹我為銘詩詎能為公之輕重姑以慰公後人之思元故奎章閣侍書學士翰林侍講學士通奉大夫虞雍公神道碑自漢魏六朝以來經生文士判為兩塗唐昌黎韓公宋廬陵歐陽公力能一之而故習未盡變也濓洛諸君子出其所著作表裏六經言或似之於是文極文之典奥道極道之精微一趨於至善而後止其殁也門人錄其語以相授受其為書雖出一時之紀聞然概之聖人脩辭立誠之㫖未盡合也昧者凖之以立言世之文士共起而病之然文士知病其為文而未必知文外非别有道道外非别有文也二者胥失焉宋末病滋甚皇元混一天下三十餘年虞雍公赫然以文鳴於朝著之間天下之士翕然謂公之文當代之巨擘也而不知公之立言無一不本於道也既而退居山林垂二十載乃得昌言於斯道一志於斯文而遂老矣惜哉易簀之再朞子安民奉状踵門謁𤣥銘其麗牲之石𤣥辭不獲則先發其所深慨而請繼以言焉叙曰公諱集字伯生姓虞氏系出虞仲世家會稽唐永興文懿公世南為唐初名臣子孫始遷雍永興生戸部侍郎昭昭生江陰令陟陟生旴􅇇丞智長城令禮金吾衞長史明傳五世至仁壽太守敦人從僖宗幸蜀子孫為蜀人仁壽九子伯曰賞五子次曰琚琚生庾庾生承承生詢詢生繼繼生崇崇三子季曰昭白宋銀青光禄大夫國子祭酒贈太師周國公五子季曰軒贈太師魏國公三子季曰祺進士及第歴官左中大夫贈太師秦國公生左丞相雍國公允文贈太師諡忠肅三子伯曰公亮早年髙尚不仕晚以奉議郎直秘閣贈開府儀同三司仲曰公著知渠州官至中奉大夫仁壽縣開國男累贈光禄大夫季曰抗孫大理寺丞官至中奉大夫開府六子次曰剛簡是為蒼江先生官至朝請大夫利州路提㸃刑獄二子伯圭官至奉直大夫歴知永連兩州自永移連道臨川其女弟適邕管安撫陳公元普先寓屬邑崇仁聞其至使人迎之得前郡守江陵項公别第於南門外以居之自是家崇仁皇贈中奉大夫禮部尚書追封雍郡侯妣張氏雍郡夫人無子而從祖渠州有子六人長兵部直寳文閣晉三子仲子朝請郎通判恵州從龍子汲長而賢乃以為後是為井齋先生公之先考也皇贈通奉大夫四川等處行中書省叅知政事上䕶軍追封雍國公妣眉山楊氏追封雍郡夫人夫人給事中工部侍郎國子祭酒見山先生文仲之子叅知政事平州先生棟之猶子也所出三子長即公次槃進士及第卒官嘉魚縣尹次葉叅政公初授承直郎黄岡縣尉見山守衡州夫人從叅政方需次與偕時未有子見山禱於南嶽己而有娠及將蓐見山一日晨興出治事眎時尚蚤公服坐中堂以坐久假寐夢一牙兵刺持劍入白南嶽主者來謁起肅之而寤聞兒啼聲公生焉故命公小字衡公對客嘗自言未昬宦時屢夢逰南嶽能言其勝處乙亥見山移守漳州叅政伉儷同行丙子宋亡公五齡夙慧避地無書籍楊夫人能倍誦論孟及春秋左傳歐蘇文之常誦者口授輙成誦九嵗還長沙始得墨本而公已悉通大義又五年居崇仁故寓已善屬文草廬先生吳公請見其所作謂叅政公曰賢郎他日當有文名於當世邑庠循舊式月出詞賦經義題課士公與嘉魚令以書義試皆中前列老儒為之歎服兵後勝國名公卿家多流寓是邦公㳺諸公間備聞前脩格言考覈前代典故舊家世系源委言若指掌楊夫人素髙呉公伯清之學贊叅政公遣二子從之㳺吳公方著書有所論辨公能推類逹意吳公毎獲助焉大徳六年用大臣薦授大都路儒學教授平陽王文憲公尹京待以客禮十一年擢國子助教丁内艱至大二年服闋以舊官復用四年轉將仕郎國子博士延祐元年改從仕郎太常博士奉詔西祠岳瀆四年遷承事郎集賢脩譔考大都鄉試五年被㫖召集賢直學士吳公伯清於家尋除翰林待制儒林郎兼國史院編脩官丁外艱服闋以舊官召還泰定元年考試禮部陞承徳郎國子司業三年進奉訓大夫秘書少監四年再考試禮部拜翰林直學士奉議大夫知制誥同脩國史俄以前職兼經筵官進階奉政大夫明年又兼國子祭酒天厯三年特授中順大夫未㡬拜奎章閣侍書學士陞亞中大夫依前翰林直學士知制誥同脩國史兼經筵官國子祭酒會有令諸兼職不過三辭祭酒得請兩月進階中奉大夫餘如故至順元年御試選讀卷官被㫖脩皇朝經世大典為總裁官三年拜翰林侍講學士通奉大夫餘如故今上皇帝入正大統用至大故事召諸老赴上京議事公在召列及還大都以病謁告歸家元統二年遣使賜上尊酒金帛召還朝使者至郡疾作不能行而歸至正三年勑修遼金宋三史欲用公總裁或陳其病状毋苦其逺行奏牘將上而止朝使有自江右來者廷中大臣趨詢起居八年五月二十三日以疾薨於私第年七十又七大風飄瓦㧞屋前後巨木數十株治命以深衣斂毋用浮屠明年己丑八月二十一日乙酉塟邑之長安鄉道徳里天寳山西之潭源娶浚儀趙氏系出宋秦邸前公四十二年卒累封雍郡夫人子安民趙夫人出也蔭奉訓大夫廣州路東莞縣尹轉奉直大夫恵州路總管府判官陞奉議大夫吉安路安福州知州徐氏生男二人維摩努七十女一人俱早夭劉氏生男一人憲孫女一人欒欒適譚紱郭氏生男二人長延年以廣東帥府奏差授武縁縣博合砦廵檢次翁歸業進士馬氏生男一人髙門甫弱冠孫男五人某蓋嘗論公家世勲績文懿事唐文皇博學洽聞偉節讜論忠眂魏徴而始終無疵塟陪昭陵像圗凌烟忠肅當今海陵南侵至江以儒者一戰而却之思陵在江上歸禪位阜陵金易其國書南北勢始定阜陵遂相之功烈不卑矣及公之身遇聖代事九朝鋪張皇猷位列法從與文懿忠肅後先七百年照暎史册嗚呼盛哉又嘗論公家學禮部公與臨卭魏華甫成都范文敬李微之講學蜀東門外為西南道學之倡他日以學為政叅蜀制閫自請行邊却敵兵數十萬人守簡州憲䕫路立保置屯田得流民三十九萬餘以實邊鄙敵不敢犯叅政公克振滄江先生之文學吳公稱其為文清醇典教江右湖南簡㧞俊又如南陽富珠哩翀子翬後多顯融號稱知人吳氏學未盛行首與藳城董公表章之使大有名於時時楊夫人早得見山先生春秋之㫖從父平舟先生以道學自任當時夫人未笄盡聞其説景定甲子彗出平州草封事於家夫人侍側進曰從父當辭位久矣平舟嘆曰汝曷不為男子生我家耶及歸虞氏以家庭所親得者教其子公資質之粹學識之正豈獨得之父兄師友而已公在成均思正化本以媺士習上丁監禮殿上伴讀劉生被酒失儀公命扶之出明日聲其罪削之貴近有為生謝過者公持不可蒙古生欵者傳仁皇東宫諭㫖姑薄其罰公以吏牘列生罪状咨詹事院以啟仁皇更是公所為由是益知公賢踐祚後以中書平章李道復領胄監事公與李公議歲貢法謂舊法以制禄立程誘諸生以進學如是則雖勉弗善請於衆中擇靜重有識嘗試以事者歳薦二人上親擢而用之以為勸李公亟言於上行之會李公去位不果已而拜臺臣為祭酒召四方名儒為司業銳然有責成之志公與同列講求以副上意有好為異同者撓之司業投劾去公亦以病免諸生之賢者卒業私塾居數歲不絶其在集賢上議極陳學校之弊其畧曰師道立則善人多學校者士所受教以至於成徳逹才者也今天下學官猥以資叙强加諸生之上名之曰師有司弗信之諸生亦弗信之於學校無益也如此而望斯道之立可乎偏州下邑之士無所見聞父兄遣子弟入學初無必為學問之意師友之從㳺亦莫辨其邪正然則所謂賢才者非天降地出有可望之理哉今既莫若求經明行修之成徳者身師尊之求以至誠庶㡬徳化之及斯民有所觀感其次則求操履之近古而不為詭異者經義守正説而不尚竒論者為衆推服而非鄉愿者延致之使教學者他日當有所發也又其次則取鄉貢之退者其議論文藝猶賢於汎汎莫知根柢者也朝廷韙其論而憚改作初考㑹試議曰國家科目之法諸經傳註合有所主將以一道徳同風俗者非使學者専門擅業如近代五經學究之固陋也聖經深逺恐非一人之見可盡試藝之人惟其髙者取之不必先有主意使求賢之意狹而差自此始也又嘗經筵講罷上言東南海運勞險因謂京師瀕海以東至於遼碣皆萑葦之地潮汐日至淤為沃壤宜用吳人圩田法築隄捍水為田募富民欲得官者合其衆請耕官授以地而定其畔能以萬夫耕者授以萬夫之田版萬夫長千夫百夫亦如之三年而視成惰者易之勤者物地力之髙下定額於有司以漸而征之五年有積蓄真授以命就其儲給之禄十年然後佩以符信如軍官法世襲之庶可寛東南歲餉之役可得民丁數萬衞京師制島夷又因使富民役仕之志遂而江海求食民有所歸凶歲不至為盗今海口萬户之立頗宗其説而未盡用其法云闗中大饑公建言大災之後土曠民稀可因之以行田制擇一二有仁術知民事者為牧守寛其禁令使得有為因舊民所在定城郭閭里治溝洫畎畝之法招其流亡勸以樹藝數年之間復其田租力役春耕秋斂量有所助久之逺者漸歸封域漸正友望相濟風俗日成法度日備則三代遺規將復見於虗空之野矣天子稱善羣臣未有相其謀者太史院教授雒陽楊茂先知造律候氣之法試用於郭太史有徴晚合律厯為一書謀以進而患其辭煩簡失當知公研究是學屬潤色之公慨然整治其書且告當道冀其見用茂先病死不見進今藏太史齊伯髙家皇朝經世大典之為書公任其勞居多其目則周禮之六典其制則近代之會要其事則今樞密院御史臺六部總治中外百有司之事務而其牘藏於故府者不足則采四方之來上者叅之祖宗之成憲功臣之閥閲具存凡八百帙既進謂同列曰他日國史諸志表傳舉此措彼耳考公制作之志使究所長其為聖治裨益能使一代之風軌藹然先王之遺烈焉則其事業豈下於先世兩公之在唐宋哉仁皇末年謂近臣曰今儒者盡用惟虞伯生未顯擢耳俄晏駕而止英皇既居儲宫議寳册禮有司講前代典故無所於考鄆忠憲王拜住在太常雅器重公亟召公入議公曰世祖初年即命裕皇東宫後授玉册金寳詔告萬方此我朝典章也何以前代為王以公言入奏上大説輙行之及相英皇力薦公可大用時居憂方省墓姑蘇遣使求之江西不得求之蜀又不得比返命而事變作晉邸御講筵見公氣貌溫和敷對剴切賜中統楮幣五十錠今上皇帝召公不至時賜臣下碑銘則諭㫖於家撰述公侍延英閣求去者屢因言陜西田制得俞㫖徐進曰願假臣一郡試以此法行之左右曰虞伯生託此為歸計耳曲阜新廟成求使代祀允而復寝面請補外則諭㫖若曰卿才何所不堪顧今未可去耳中丞趙伯寜乗間為之請怒曰一虞伯生汝軰不能容耶閣中日承顧問或應制作文皆寓規諫或遇事諫止出不語人諫弗能止歸家悒悒數日家人察知之不能詰其故也為讀卷官擬進士䇿問二篇倣中庸九經之目問所以宜於今之道次篇問九聖之學上覽嘉歎用其次篇一日受命草一勲舊封王制詞於内庭同列二人嘗為上所親信者密謂公曰上意姑與國公公如其言有頃丞相來自榻前趣進草甚遽公以草視之愕然公悟同列紿已亟易其詞以進终無所言又一日受命記一古寺稍陳前代遺蹟有構飾於上者謂公前代相臣子孫適美前事爾他日入見上以是語之對曰前代已逺臣庶子孫思其父祖固不忘其所事此可為忠孝臣愚不足以及此但臣以疎庸遭遇聖代致位通顯他日臣之子孫以臣遭遇世世毋忘本朝厚恩亦忠孝之勸也故臣謂能為此言於上前者亦必忠孝之人也上目近臣歎異之公坦易質直揚㩁人品質正文字臧否惟是之從無所顧忌故朝論屢以御史才薦之然亦以是賈怨動以危事中之賴人主察其無他以免惟篤孝友少與嘉魚令共學於家父子兄弟自為知已人以儗眉山三蘇嘉魚殁撫其孤遺如已子孟兄秉以莞庫解送官物至京道途折閲直數千緡公悉代償無難色遇庶弟棐及其孤妹皆盡恩禮常以禄養不及其親遇珎膳不敢盡器盛暑不命童子揮扇曰勞人以佚已君子不為也生平知已大臣藁城董宣公保定張蔡公隴西趙魯公皆國元老趙之復相嘗面請召栁城姚公涿郡盧公廣平程公吳興趙公毎與公論文輙以方來文柄屬之當世文士嘗經論薦後皆知名諸公受業為所推許今多公輔之器不可悉數公之為學非託空言毎言先王建事立功必本於天理民情之實故教學者務欲貫事理於一致同雅俗於至情以是為圗治之本其於經則曰易之為書首尾完具於三聖人之手生乎千載之下仰觀千載之上以凡下之資而欲窺見天與聖人之道不可下此而他求也得江東謝君直之説以先天八卦圗為河圗九數而九位者為洛書十數而五位者為五位相得之圗心雅善之或請著説則辭曰易道廣大苟得其自然之數何往不合先儒有成言焉存以俟知者於禮則曰學知先務莫切是經惟二戴雜以後人所記變禮不可盡信其餘則二帝三王之遺文天子諸侯大夫士之成制粲然可考不可以淺近言也屢欲通古今為一書以為後來考禮之助以宦業不克就濓洛新安諸君子之書就其所存以極其至而慨夫吾黨之士知之者微矣於吳氏書亦然二氏之學往往窮其指歸即其徒叩其負挾有所見則為之太息曰學者不能潛心聖人之微言以明下學上逹之要而欲切究性命之源死生之説其能不引而歸之者難矣其為文自其外而觀之汪洋澹泊不見涯涘􅺶乎其中深靚簡㓗亷劌俱泯造乎混成與四明袁公伯長清河元公復初友厚二人有著作必即公論之元初謂公文無雷霆之震驚鬼神之靈異將何以稱於世公謝曰誠不能也晚乃大服其言至大延祐以來詔告册文四方碑板多出乎手其撰次論建與其陶冶性情黼藻庶品之作襍之古名賢之編卓然自成一家言客未嘗見其學書篆𨽻行楷題榜下筆便覺超詣以書名於世者憚之少讀邵子書領悟其妙題其室曰邵菴學者因號之曰邵菴先生然廷陛都俞朝野稱謂率多以字行其存藁自題曰道園學古錄門人彚而鋟之得應制十二卷在朝二十四卷歸田三十六卷方外八卷其散逸尚多閒居雖久歸美報上之心仁民澤物之志未嘗一日忘之邑有平糶倉田淪於方外力言於當道復之邑大夫陳有容率同志作邵菴書院迎公講道其中以恵學子公欣然諾之落成而公薨在法公當進爵賜諡既塟而命未下𤣥於公有奕世之契最先受知叅政公博士之召公實薦之朝同朝十年奨借非一故於是銘雖重於作而不敢辭銘曰吁嗟先生衡山之髙岷江之長磅礴深廣何可量也山英川靈合為天章變化倐忽何可常也君子用世斯文耿光鳯凰鳴矣于朝陽也善人云亡士氣弗昌鶗鴂先鳴百草為之不芳也王良善御騏驥上驤孰能寘之周行也范冠蟬緌蠶績蟹筐孰能措之範防也載彼營魄返乎混茫朱鳥之舎離明之鄉也於粲遺文布濩四方琬琰之刻名山之藏也吁嗟先生古有先哲兮知徳知言知徳不易知言尤囏先生繼作兮誰謂九京九京可作兮百世弗諼大化幽黙兮孰控孰搏芝草三秀醴泉有源天將以斯文兮厚公之子孫碑文曲阜重脩宣聖廟碑今上皇帝臨御之七年歲在己夘春三月戊辰御史大夫臣伯勒濟爾布哈臣托克托御史中丞臣達實特穆爾臣約治書侍御史臣鏞等奏監察御史言天厯二年十月文宗皇帝在御奎章閣學士院臣奏曲阜宣聖廟自漢唐宋金凡有隳廢必奉勑繕脩功成則勒之石衍聖公以舊廟將壞飾書奉圗屬學士院以聞時文宗覽圗諭㫖省臣趣脩之事竣則立碑以詔方來今新廟既落而成績未紀懼無以稱塞先詔御史章上臣等僉議請勑翰林侍講學士臣𤣥為文奎章閣學士院臣庫庫為書侍御史臣起巖為篆以臺儲中統楮幣二萬五千緡為立石之貲制皆允傳勑臣𤣥俾序其事𤣥拜手稽首言曰天佑下民作之君作之師昔者伏羲神農黄帝堯舜禹湯文武數聖人者作君師之道備於一人用能左右上帝克綏厥猷吾夫子出天獨俾以斯道凡天叙天秩天命天討之事夫子明禮樂刪詩書贊易道脩春秋而品節之以為百王法於後世儀封人曰天將以夫子為木鐸子貢曰固天縱之將聖夫子自論斯文之任上以屬於天下以屬於已使得位設教即前數聖人所為繼天立極者也是故天欲興一代之治則吾夫子之道必大昭明於時歴千萬世如出一轍皇元龍興朔方太祖皇帝聖知天授經營四方太宗皇帝平金初年歲在丁酉首詔孔元措襲封衍聖公復孔顔孟三世子孫世世無所與増給廟户皆復其家是歲厯日銀諸路以其半東平以其全給脩宣聖廟尋詔括金之禮樂官師及前代典冊辭章鐘磬等器遣官分道程試儒業世祖皇帝初在藩邸多士景從比其即位大召名儒闢廣庠序命御史臺勉勵校官大司農興舉社學建國子監學以訓誨胄子興文署以板行海内書籍立提學教授以主領外路儒生宿衞子弟咸遣入學弼輔大臣居多俊乂内廷獻納能明夫子之道者言必稱㫖在位三十五年之間取士之法興學之條討論之規裨益逺矣裕宗皇帝時在東宫贊成崇儒之美成宗皇帝克繩祖武鋭意文治詔曰夫子之道垂憲萬世有國家者所當崇奉既而作新國學増廣學宫數百區胄監教養之法始備武宗皇帝煟興制作加號孔子為大成至聖文宣王遣使祠以太牢仁宗皇帝述世祖之事𢎞列聖之規尊五經黜百家以造天下士我朝用儒於斯為盛英宗皇帝鋪張鉅麗廓開彌文明宗皇帝凝情經史愛禮儒士文宗皇帝緝熈聖學加號宣聖皇考為啟聖王皇妣為啟聖王夫人改衍聖公三品印章歸山東鹽運司歲課及江西江浙兩省學田歲入中統楮幣三十一萬四千緡俾濟寜路以脩曲阜廟庭文宗賔天太皇太后有㫖董其成功今上皇帝入纂丕圗儒學之詔方頒闕里之役鼎盛山東憲司洎濟南總管蒞事共恪以元統二年四月十一日鳩工至元二年十月初吉落成宫室之壮以寜神棲樓閣之崇以庋寳訓周垣繚廡重門層觀丹碧黝琧制侔王居申命詞臣揚厲丕績於是内聖外王之道君治師教之誼大備於今時猗歟盛哉皇元有國百餘年以來繕脩宣聖廟再丁酉之初以開同文之運天厯之際以彰承平之風東冐扶桑西踰崑崙南盡火維北際氷天聖道王化廣大悠久相為無窮治本實在兹矣有詔御史臣思立奉祝幣牲齊馳驛往祭臣𤣥既叙顛末請系以詩詞曰厥初生民倥侗顓蒙三五既作大道為公風氣日開民俗日漓道統絶續孰綱孰維少昊之􅇕東魯之土誕生聖人以淑萬古聖人以生代天以言立我民極與天並存維皇建極尊用其道百王軌範於以順考三光以全寒暑以平俊民用彰時乃迓衡天子垂拱大臣承弼體信逹順鳳麟時出皇元之興厚集大命太宗興文首法孔聖世祖龍飛多士屬心恢𢎞文治濬發徳音世及三紀仁漸義摩建學立師善人用多裕宗溫文祗荷詒燕成廟崇儒廸若天顯武皇英毅入繼離明載崇徽號玉振金聲濬哲仁皇文徳繼世誕揚祖訓籲俊尊帝爰及英宗禮樂孔殷穆穆明考蓄徳懿文文宗纘緒聖聖克肖乃開奎府廼飾孔廟今上嗣位丕式大猷勒石新廟宏賁洪庥新廟奕奕泰山具瞻衡紞紘綖衮裳衣䄡維宋維金遺刻具在於赫我元冠冕百代我元聲教極被堪輿黌舎萬里誦詩讀書維兹曲阜斯道之壼如水有源如木有本皇鑒在上執我道樞相我熈朝躋民唐虞睠言臺臣職是風紀昭宣獻謨實用歸美聖道王化如日麗天儒臣詠歌億載萬年江陵王新廟碑大元至正七年某月制故湖廣等處行中書省左丞相贈佐平南紀宣力功臣太師開府儀同三司上柱國追封楚國公諡武定阿爾哈雅改贈宣威服逺輔徳翊運功臣進爵江陵王官職勲諡如初制下王之諸孫以舊廟在天臨郡治之義和坊者襍於闤闠廟貌弗肅徙於故第之側作正廟七間中肖王像後堂稱是别作神主父祖子孫咸列於位歲遇王之忌日祭像前廟時祭嘗烝設主後室罇爼籩豆壹遵古遺廟之門廡垣墻崇大厥制克稱封爵享祀之庖齋宿之舎祭畢飲福之所各有序置經始於六年之秋落成於是年之冬曽孫慈利監郡阿爾斯蘭哈雅至瀏上謁𤣥記之惟王建國為國家表功之極榮子孫旌徳之盛典具載國史𤣥請舉其犖犖大者掲而書之麗牲之石庶㡬觀者知王之功在社稷徳在人心所為不朽者實在於兹𤣥博觀天下大勢古今以江陵平江南者四代焉未有不先得荆州而能得天下者晉以王濬益州舟師下江陵而吳降隋因宇文氏先取蕭詧江陵之北用以圗陳而陳亡趙藝祖即位之初即命慕容釗將兵假道以伐湖南延釗至江陵襲降髙繼冲由岳趨湖南周保權平然後東舉閩越西舉巴蜀南唐稱臣我世祖皇帝征宋既渡江阿爾哈雅以偏師搗江陵既而㧞之由是進兵遡洞庭薄長河遂平湖湘聲震南海丞相巴延以大兵順流而東徇吳越傅臨安宋主納欵故今之善言兵者謂王先取江陵其功不在巴延下向使江陵未附是時東蜀猶宋地也萬一宋人合荆蜀之兵以闚江漢雖勝負素定然豈萬全之䇿哉王下江陵降髙逵㨗書至上為之大燕三日手書以勞王誠以荆州定則東南之勢定矣厥後王建省湖湘分兵嶺嶠恩威並翔悉有其地宋太師既􅑒其孤臣謀立兩孱王於閩海文天祥亦舉兵江西湖南廣右王承制署吏勞來既久人心已安勢難動摇尋自覆敗故今善論功者謂王於斯時綏定湖廣視先取江陵之功亦未易以髙下論也抑𤣥嘗聞長沙先軰縉紳大夫言王初圍潭州守臣李芾嬰城固守者三月餘芾死力盡諸將乃開門入我師同列兩叅政怒其後降欲屠其城王持不可兩叅政不從遣使入奏王亦遣使附奏於上皇曰臣初徂征受命陛下首以曹彬下江南不殺人為訓今潭州城已降同列疾其拒命之久欲獮其民臣誠不敢負陛下先詔昧死為民請命叅政使偶先至京半月上詢知不自王所來疑之未即召見有頃王使至亟召入内得王奏大喜曰阿爾哈雅言與朕志正合乃召叅政使入切責之若曰國家征南非貪其國欲使吾徳化均及其民人爾今得土地而空其城政復何為汝不稟命主將輙為異同當正汝罪以汝薄勞今姑貰汝後復敢爾必寘汝法其從阿爾哈雅慰安吾民毋或異議使者往復十有四日奏下王布宣徳音城中官民士庶道俗男女貴賤長穉亡慮百萬㳺魚在釜寄命頃刻賴王一言易骨而肉由是列城聞風歸附相望未及朞年南盡八桂冐于南隅悉歸職方王之威恵其盛矣哉夫天之為徳莫大於好生聖人一天下之道莫先於不嗜殺用兵之不祥莫大於殺降殺降之慘尤莫盛於屠城將家一念之烈流毒數世其後嗣盛衰之報百不失一豈獨曹彬曹翰為有徴也王之子孫多賢文武才器代有聞人天之報亦昭昭矣雖然國家先定臨安後平淮東今追爵巴延淮安王表武功之所終先定江陵次平臨安追封王以江陵之地表武功之所始歟二王之論定天下混一七十餘年矣王家世北庭阿爾哈雅其小字也及貴以小字行其世系之詳見故翰林學士承㫖姚文公燧神道碑銘𤣥既述功徳之大者以遺後人復作迎送神詞曰出師四方訓以不殺惟江陵王受命徂征卷甲西南荆州底平揚旗洞庭和風鳴條駐軍長沙以逸制勞湘人籲降王實活之三軍不刃王實遏之土田第宅賜在湘野僮客千億是畊是稼奕奕新廟于湘之堧犧牲粢盛歲取湘沅朱弓金鎧新廟是藏鐘皷鞺鞳牲肥酒香王徠徐徐旗旄獵獵湘靈嶽祇惟是震疉王降庭止有蕃𦙍祉繩繩曽孫以享以祀曽孫繩繩自雲徂仍江漢同流汝功匹休皇家百世吾王不留言從世皇世皇遐征曠曯八荒乃睠南顧維此荆州曰汝之功荆州汝功朕世服膺今我嗣皇王汝江陵王拜稽首曰憑天威神筭天授荆人來歸洞庭泱泱湘水是滙王有曽孫廟祭來會國利利忠家利利孝忠有旂常孝有廟貌王來風雨王去日星焄蒿昭明曽孫以寜廟貌𢎞敞曽孫衆多挽留莫從屢舞以歌有朱斯扉有雕斯爼工歌渢渢福禄來祜載奉雕爼載闔朱扉萬有千祀王無我遺洞淵閣碑太極判二氣分陰陽各究其變後天設六子陳雷風獨彰其烈陰陽究其變而數行理氣之中雷風彰其烈而神寓造化之表迨夫世别醇醨位殊幽顯札瘥水旱若有握其柄者矣生殺予奪若有尸其職者矣道也者範圍乎兩儀法也者檢押乎品彚由是保制阨運道稱主宰攘除凶妖法入機用考夫漢儒列五畤之名而祠禱盛周官書十日之號而符呪興司厲有秩而祭于國袪疫有典而儺於鄉其所由來不既逺乎斯則洞淵之閣作於石晉之年端有自矣夫惟五季否塞羣黎憔悴時有神人拯世者出是殆旻天覆下之仁維伏魔三昧之尊實神宵九帝之一以無為制動以不怒示威觀厥圗回漠然兆朕爰自黄冠道士肇跡天成青衣道童接武淳化歲歴四百功施億兆稽諸郡誌酌以輿誦禦民大陵之患已民雩壇之嗟感應㨗於皷桴枉直明於槐棘至若樹降魔之幢于雲間得斬鬼之符于地下沴氣以之而屏息靈文由是而宣朗繼道童而神效者有大夫曰章氏焉剏三層之神居表一郡之傑觀雖焮隣冦具存遺規里人評事彭梅叟獨割已貲追還舊貫驅五丁之力以鑿石掄百尺之材以荷棟揭洞淵於絶頂用縱凡目顔寥陽於上層繼曰聖境中標諸天冠寳閣之稱下扁朝元著璇題之會寥陽肖像七御儼如天宫伏魔専俟諸天列叙帝馭朝元距地而稍邇飛仙齊班而上趍直北面勢題極髙明綺䟽透乎初日藻繪留乎行雲閣後崇壝其名虗皇贊府歐陽確旌表彭知微裒衆力之所作也壝後累榭以奉三寳居士周繼祖李必興踵義士之所為也三棟中逹兩廂傍峙左挾之屋重上懸鐘千斤右挾之屋如之鳴皷百里左廡則薰南鎦崇勛作天師閣右廡則潭東劉龍祥作三官閣東為延真觀舊主洞淵新侑𤣥帝北坡彭仁叟之所剏其神遷自壬癸福地者也北為鳳林橋上引鈐岡下通青原茂林楊學周之所建其意比擬河漢閣道者也神幣燎而不炊其爐曰光明藏神泉引而無害其井曰清淨源毎嵗上元設齋半月金碧炫轉於西東琉璃晃耀乎表裏張燈如漢太乙蹤跡通宵而可行題榜若魏凌雲鬚髪望空而欲白刼利兜率彼皆鋪張華林鬱羅孰得逰覽故夫地位之髙有若兹閣神人之好信在於樓乎而况發武功過孤川山脉鍾其秀矣導攸輿匯盧洞江流蓄其靈矣城濠通龍湫之穴郡市布蜂房之居要之地固以仙而名境亦資人而勝鍊師雲牕周孔鼎靜嘿蕭宣徳西叟李應康𤣥門之梁梠羽帔之冠弁品登真錄功播珠庭者也守約曽從龍省齋歐陽慶祥翠峰彭大同坦菴施端履斯立曽廷暉靜學劉孔彰矮牕蕭恵通無為王雷發洎夫桂林可心之劉曰元亨曰道𢎞環中澂川之彭曰克恭曰道明塵外之曾曰貴寛適吾之劉曰益新皆宗證之幹蠱冲侣之裒謙能使丹芝之茹有圃青精之飯有田扇離坎而液祥金起般輸而獻神伎然後聲鏗律吕之和器備天人之供者也貴寛㓜從先人來斆真館及長離俗之志勇褆身之律嚴佩混元之祕章茹抱黄之梵炁撝訶而百靈集禜禬而諸福臻為兹山而徴辭壽斯道於來裔真其人也與嗟夫赤明延康坐更歴刼勾芒𤣥㝠迭御四時洪惟皇元昭授神筞歲宗羣望代闡釐事切意洞淵之於明時正猶希夷之於衆物人見主張之功若無事者孰知輔翼之恵又振徳之乎雖然商顔邇徳人之居當疵癘之年亦獲免是華封居放勛之世舎富壽之祝則何以哉載揚洪庥請志善頌銘曰粤若邃古太和磅礴柔剛相乘饒乏紛錯情滋偽生氣嬴沴作道惟虗集庶物槖龠神繇精聚九圍郛郭閏晉非据烝黎罔託煜處江沱晝火其爝軫野遘災帝𠂻是愕維時洞淵受命碧落相爾黄冠抽我𤣥鑰茢氛彗歊禊穢哲惡道心刳螟善氣辟蠚三樟巢鳳孤笛舞鶴爰欵冲逰誕矗穹閣琪樹層柯金枝重蕚翾升華拱疊欆朱欂飛亷霄騫天祿雲躇赫曦雕櫳鮮猋虗箔帝真燕娭營衞揮攉匽旌吳囬函琛海若祝融灌烽蓐收噤􅈀年降屢康歲興長樂士勤竹素農力錢鏄商通車輦工世榘矱征行靡占疾疢勿藥皇風載熈大道斯廓罔俾仁聖職憂民瘼神之格思萬壽攸酢曾塵外鍊師來求洞淵閣碑惜予久病不能親書煩致意青城楊奉禮為余䨇樞筆作漢𨽻書之歲久當與韓擇木桐柏觀記爭先進而方駕漢魏可也如字多碑窄可倣張長史郎官石用小楷書之青城皆足辦此故以相屬也元封祕書少監累贈中奉大夫河南江北等處行省參知政事䕶軍追封齊郡公張公先世碑皇元勑有中原樹建侯伯經營四方濟南張氏得國於齊在東諸侯中脩臣職甚謹權府歴城張公受命我元為齊陪臣父子相承屢攝齊政内治新政外禦强隣彌縫周旋使齊事我元甚忠故張公有功齊人甚大世祖罷侯歴城子孫仕於天朝仁宗繼述祖訓開科取士延祐甲寅有臣起巖首貢於齊明年乙夘大廷䇿士擢第一人實歴城張公曾孫多士偉之父中祕書齊公範碩德髙年生受顯爵及其即世子仕日崇贈典日厚今皇上纉緒起巖列官中書參崇國議尋進二品父範贈河南江北等處行中書省參知政事追封齊郡公推及大父贈封有差至元二年三月十日上御厚載門奎章大學士臣錫喇卜從言於上曰侍講學士起巖服勞累朝恩賚先世将為碑銘垂諸久逺其勑翰林直學士臣𤣥製文奎章閣學士庫庫書丹奎章閣承制學士師簡篆其碑首以賜上允其言於是臣𤣥承詔討論張氏本章丘人逺祖逸避兵難贅禹城吳氏家生三子曰某季曰寅娶髙寅二子長曰敬宗娶燕三子長曰道娶李一子曰廸字吉甫是為懷逺公實權府府君之父中秘書齊公之曾大父也姿貌偉傑膂力絶倫臂擐石獅子起行戲與里中少年角無敢嬰者狂虣無賴遇輙以力伏而拱之善騎射能兼控二强弩綰弦著指連彀俱滿軀榦才力中募版本軍三翼都總領金人南遷寓迹農業齊國張忠襄公行尚書省濟南招致帳下用戰功遷濟南兵馬鈐轄城中更兵燹公私廨舎盡焮忠襄命權府事公繕郭郛建府治畫閭里招流亡駸復舊觀時有隣冦晝旂夕柝斥堠明肅衆賴無恐行省自水砦還治拜懷逺大将軍元帥右監軍濟南府推官佩黄金虎符仍提領歴城縣事忠襄南征荐命留後公蒞政亷平號稱良吏兵後民稀城内外多間田召民占射墾為水業已獨無取事平從民買田城北浹河生平治産不求豐腴纔足即已嘗曰吾祿足以給衣食居足以避風雨安用怙勢殖私以為子孫累為吾志玷耶娶李追封齊郡夫人一子福字顯祖是為權府君府君雄健有父之風尤孝敬好學讀春秋左氏傳貞觀政要能背誦年十九嘗重午日與諸将馳射栁閱武堂下一發命中身手驍㨗忠襄賞補列校歲庚寅從朝和琳預議伐金從取邳圍沛食盡其将率敢死士夜斫營謀突圍出府君力戰却之退擊劘其壘而還詰朝沛陷給白金符為中書奏差從攻宋蘄黄有功縣官増諸路兵濟南調二千三百人齊人繹騷奉省命謁於上曰兵興民疲役無虗歲今又増兵物情易駭盍寢其命以安危疑敷對詳懇上大恱從之准舊制丁二十人調一餘罷不行得㫖馹還所過宣上徳懽聲如雷擢濟南軍民鎮撫都彈壓行中書省伊囉斡齊建議常征外増銀六兩視絲綿中分折輸嗣侯宣恵公将遣使入奏而難其人府君請行至白藩王曰新邑民已定正賦今又增額将不堪命王以聞命遂罷遷兵馬鈐轄府事從宣恵私覲面陳上前乞休兵息民以養其力上嘉納之侯解𤣥貂玉帶以旌其忠侯薨即藩王所奉子宏朝和琳宏嗣國是為武靖公府君歸力請致仕進諸子曰吾輔齊國三世朝㑹征伐未嘗不從今五十有六其歸休之時乎年七十一終居家處官教子人取以為法娶楊氏鎮國上将軍左副元帥通女弟有淑徳孝行追封齊郡夫人五子中子鑄山字宣卿一字仲宣號黄臺野客是為天官齊侯英邁豪爽㓜負竒節讀書通大義交友重然諾布衣以大任自期古人自朂出中庸大學授諸子曰爾曹熟此宰相可能也天官嘗宰歴城讓其丞叚而已丞之祿入均恵族䣊而日與賔客擊鮮為髙㑹每傾已賑人已匱不悔人負不尤至元官制行遷官臺監塲管勾辭不赴改愽州錄事判官轉陞東昌仍其任居官介然官滿赴調常鬻産治装逆旅雖至乏絶人或周之非義不取能工書得黄豫章米襄陽筆法至元癸未十月十八日卒薊南城年四十九以孫貴初贈中順大夫禮部侍郎上騎都尉追封齊郡侯娶安氏山東行省左右司郎中圭之女累封齊郡夫人二子長範次髙蚤卒三女長適翟氏夫亡貞節次適宋某次適侯瓚範字議甫號孟齋是為中祕書蚤穎悟長博學强記先侯守官清約家無宿儲公深自貶損贏以為養及厝塟如禮嘗寓平原徳平鎮因古堤架屋為童蒙師或踰旬時不出門人號不下堤先生性不事華靡篤學信道尊聞行知善善不倦惡惡不避學者擬諸古人厯仕維州學正寜海左翊侍衞教授除四川等處副提舉子貴封集賢待制奉議大夫驍騎尉厯城縣子加封朝列大夫祕書少監驍騎都尉齊郡伯天厯戊辰正月二十七日就養京師卒年七十有七贈翰林直學士亞中大夫輕車都尉追封齊郡侯加贈中大夫河南江西等處行中書省叅知政事䕶軍追封齊郡公公善吟詠富著述有蓬牕藁益齋旅齋二集能大小篆𨽻行楷皆遒勁有體娶丘氏先卒再娶薛並封齊郡夫人二子長起巖薛氏所出初授集賢脩撰遷國子博士監丞司業歴翰林待制監察御史中書右司貟外郎郎中兼經筵官轉太子左贊善燕王司馬拜禮部尚書參議中書省事陞翰林侍講學士中奉大夫知制誥同脩國史尋以本官知經筵事出為江南淛西道肅政亷訪使未行奏留侍講進知經筵俄除陜西諸道行御史臺侍御史娶某氏封齊郡夫人次如古國子伴讀大司晨掾娶某氏孫男二順孫堅孫女一初𤣥登第出起巖榜下同朝十年入翰林為僚友齊公之墓𤣥為之誌先𤣥父渤海侯蒙恩賜碑上勑起巖故𤣥聞命不敢以固陋辭惟張姓之始軒轅子青陽之子揮觀乾文制弓矢因得姓濟南忠襄爰聚厯城姓同一初始奮以武終顯以文君臣相須蕃屏王室後先封齊豈偶然者懷逺公賁育之勇至於治國仁如鄭僑亷如晏嬰撫民乳雛如療飢渴權府府君生而忠孝資備文武盡瘁所事勤施於民旂常司勲伏臘里社殆未為過齊侯志崇心庳尚友往哲齊公真脩實踐蔚為醇儒四世功徳積久發閎宜厥後人出際熈世褎然掄魁為國羽儀迨其立朝凜有風節舒徐進退求福不回豈非先世嘗有豪傑偉人稟賦敦龎未究厥藴氣鍾子孫才器深茂福澤與俱我國家因以得名世之士哉抑功及民者未食其報造物以遺其子孫哉推其所自是宜為銘銘曰自古有國文武迭張顯允厯城齊姓之将代有鼎士奮於齊疆經緯文武與世相當國初戡定厯城父子有力如虎世為齊卿攝治其府區宅畷田民奠環堵既輯其民又禦其侮夫優維何民訖可休有増乗賦是克是掊夕馳我馬朝告厥猷天子曰嘻予嘉汝謀為是暴斂我民何郵欽哉爾往獻納是籌命爾朂爾侯度是脩爾田勿萊爾政勿苛農弛勞於野士畜銳於家時維張公恵齊孔多齊轄日膏齊廩日盈張氏獨貧三世筆耕豈善治國而不知治兵有遯黄臺有斆徳平蓄德陳陳發聲訇訇宜侯宜公庶其哀榮累洽重熈時尚維文有偉國彦積文䇿勲奏篇大廷上曰不羣繩武乃祖藎忠我君出敷王言入贊聖謨踐敭政塗匪臺伊閣徳容溫溫良玉善琢維仁騶虞惟瑞鸑鷟上勑詞臣考徳諏義錫朕寵命誄其先世有貞斯珉有亢斯竁亶其揚休式勸有位元贈效忠宣力功臣太傅開府儀同三司上柱國追封趙國公謚忠靖瑪哈穆特實克碑國家彌文百度惟貞納民軌範垂則永世於是羣公先正先朝臣隣敷陳申命賜誄昭天漏泉罔不承休元統二年九月壬子中書平章政事臣薩廸臣克埒濟蘇等言於上曰户部尚書臣和塔拉實克乃祖伊克徳勒乃父瑪哈穆特實克事我世祖皇帝懋建嘉績仁廟在御並贈太傅封趙國公今将為碑其勑翰林直學士臣𤣥製文侍講學士臣起巖篆額戸部員外郎臣楊益為書以賜制可臣𤣥受命退閲故府得故學士桷行詞及和塔拉實克具事狀來乃叙而銘之思昔先王辨方正位體國經野必有多才藝之臣共成厥功爰及後主繼體守文亦必有世爵祿之臣共享其利有虞共工之官成周宫闈之守後世子孫著以為氏其可徴也考功記曰國有六職百工居其一國詩定之方中之傳大夫有九能第一曰建邦命龜夫六職者王公論道大夫立政在焉九能者使臣造命師旅􅊎衆次焉以是知審曲面勢之為職揆日作室之為能方是數者厥用大矣我元造邦臣伊克徳勒瑪哈穆特實克功居六職之一才擅九能之先贊體國之謀濟世官之美是碑為宜按伊克徳勒系出西域唐為大食國人世祖居潛已見親任己未南征還幸其第伊克徳勒聞乗輿至衣地金以藉馬蹄尋裂金分恵從官上深納其勤欵庚申即祚命董察卜達爾局凢潛邸民匠𨽻是局者悉以屬之察卜達爾云者國言廬帳之名也是年九月錫金虎符䕶以璽書至元三年定都於燕八月授嘉議大夫佩已賜虎符領察卜達爾局諸色人匠總管府逹嚕噶齊兼領監宫殿時方用兵江南金甲未息土木嗣興屬以大業甫定國勢方張宫室城邑非鉅麗宏深無以雄視八表伊克徳勒受任勞夙夜不遑心講目算指授肱麾咸有成畫太史練日圭臬斯陳少府命匠冬卿掄材取貲地官賦力車騎教䕶屬功其麗不億魏闕端門正朝路寢便殿掖庭承明之署受釐之祠宿衞之舎衣食器御百執事臣之居以及池塘苑囿游觀之所崇樓阿閣縵廡飛簷具以法故役不厲民財不靡國慈足使衆恵足勞人功成落之貤賞稱首歲十二月有㫖命光祿大夫安肅張公柔工部尚書叚天祐暨伊克徳勒同行工部脩築宫城乃具畚鍤乃樹楨榦伐石運甓縮版覆簣兆人子來厥基阜崇厥址矩方其直引繩其堅凝金又大稱㫖自是寵遇日隆而筯力老矣紀功太常攸效欽崇部人鑿石作像髭髯咸肖沒置墓舎族屬見之謂其非法謀棄隱處世祖夜夢伊克徳勒若有愬事狀如生平明發召詰其家以像事告亟命止之賜楮幣萬緡作祭事子瑪哈穆特實克實世其任大駕時廵上京出狩近郊入門甫植幄帳預存風雨攸除燥濕具宜齊祭張次燕享設帟制作疊出等威以張物絶濫惡工極縝緻亦既厯年小心匪解數被殊眷積階正議大夫遥授工部尚書領察卜達爾局諸色人匠總管府逹嚕噶齊以終四子長曰穆爾薩蚤世次曰茂巴爾斯以正議大夫領察卜達爾局仕至元貞授工部尚書次曰和塔拉實克由餘杭浦江監縣厯江南陜西兩臺監察御史轉漢中僉憲雲南行省都司入為户部員外郎内臺御史大都路同知出為南山淮泗兩憲副杭州為總管復入為大都路逹嚕噶齊再出為濟南總管三入為大興府尹十五遷為正議大夫戸部尚書次曰阿哩衮實克不仕孫烏瑪喇寔穆爾薩子當襲是官以㓜乃用阿哩衮實克子穆爾薩繼領察卜達爾總管府逹嚕噶齊烏瑪喇既長授揚州織染局同提舉先世茂巴爾斯請于朝制贈伊克徳勒效忠宣力功臣太傅開府儀同三司上柱國追封趙國公謚忠敏娶和塔拉額實封趙國夫人贈瑪哈特穆實克推誠贊治功臣太傅開府儀同三司上柱國追封趙國公謚忠靖娶烏喇特呼圖克封趙國夫人至是和塔拉實克中外踐敭不失令譽有司厚往飾終施及祖襧厥有繇焉人臣盡忠所事信必有後𤣥惟考周官之法誦楚宫之詩執太史之簡為小史之誄有君命焉不辭卒塟歲月事在壙石不書二代共為一碑用漢薛君劉君故事銘曰西域有國大食故壤地産異珎户饒良匠匠給将作以實内帑人用才諝邦周攸維忠敏公外譓中朗機警赴功敬慎事上私第翼翼南還駐仗軾我路馬地布美璗左右世祖羽翼雄創受命繕營廓智𢎞敞楗梯設梁九軌夷曠木槤陶萬夫于往取鍜取厲于剗于磢有盈斯覺有閎斯抗皇皇紫宫民極環仰軒轅綴列鈎陳聨象黄龍負柱金爵栖榜六寢儷美百雉侔狀心諦間架目諧尋丈手胼屏翰心瘁保障詒彼忠靖世筦廬帳氈施重霤駞挽百兩秦蓋封樹唐衣愧瓬曷覩國制麗宻無讓榘矱相尋雲來是倣熈庸帝縡佩寵天奨業盛曷奕光流􅆄蠁穹碑啟道貞石詔像夢徴辰告秩冠寅亮賵文膴原襚貺謚壙雍都疇俶洛宅敦昉企蹤保奭嫓績蕭相圭齋文集卷九
