body:
  text: 圭齋文集卷三元歐陽𤣥撰七言絶句喜門生中狀元泰定丁卯八月十二日崇天門傳臚賜進士右榜第一人阿恰齊左榜第一人李黼皆肄業國學日新齋余西㕔授業生也是日京尹備皷樂旗旘麾盖甚都導二狀元入學謝師拜余明倫堂榜眼鎦思誠探花郎徐容嘗因同年黄晉卿彭幼元從予遊亦拜其側其餘進士以門生禮來拜謝雜還不記姓名圜橋門而觀者萬計都人以為斯文盛事昔未有也同寅舉酒相屬偶成四絶以紀其事昔被仁皇雨露恩三朝五度筞臨軒小臣報國無他伎舘下新添兩狀元禁院層層桃李開天街繡轂轉晴雷銀袍飛盖人爭看兩兩龍頭入學來淡墨題名二十年一官獨自擁寒氊居然國子先生舘三五魁躔拜座前都人舉手賀昇平不羨黄金遺子籝進士從今成典故唱名纔罷拜先生出試院有作寄諸弟天厯庚午會試院中馬伯庸尚書楊廷鎮司業及𤣥皆乙夘榜進士偶成絶句紀其事出院明日有敕督修經世大典又成小詩寄諸弟省垣東畔至公堂十五年前戰藝場飽食大官無補報兩科來此校文章御史承差鎖院門侍臣傳詔出天閽試官被命聯鑣至同榜三人出謝恩長樂鍾鳴拆號時三台八座列參差自憐手把天瓢水一滴鄉闗不得私聖主宫中遊幸疎日臨祕閣玩芸儲昨朝蘭省纔開試清曉玉音催著書别駕祠前雪水渾弟兄沙上舉離樽三年不洗來時褐要看淋漓别酒痕薊門城頭過階塔一一行人通竇間今朝送客又還入那忍更投名利閑香山山頭新月彎一似家里看西山去家五十度强望圓璧何時照我還仁廟初科射䇿郎如今斑白玷朝行東風昨夜聞歸鴈夢繞江南烟水長夜開金鑰詔詞臣對御抽毫草帝綸始信朝家重儒術一時同榜拜三人試院偶題贈巽齋蓮燭通宵擬御題槐龍風急漏聲遲玉堂冷透青綾被憶佀灤京五月時小雨陰風夏夜闌穿窓撲面雪成團平明笑與長官說天上玉京如此寒聖徳文明鼎運開相君承詔謹掄材誰言慶厯科無補中有韓歐富范來百鵠充庭氣若虹千蠶食葉響春空東風一夜吹嘘力明日紛紛緑又紅鯤鵬一化徙天池白日青雲在頃時我以世科慚克紹那能妬喘更笞兒陳編矻矻老無聞寂寞箕裘幾許存方寸留耕猶有望擬尋手澤訓諸孫所貴姪梅老樹縱横出氣條一枝還又亞牆腰西湖湖上掀蓬看一夜吹香滿六橋為所性姪題小景緑樹清江遶舍邊門前長泊往來船休官亦欲來林下只恐人嗤我學仙所性姪家藏東坡看竹圖銀燭髙燒照艷粧繁華過眼已相忘敲門自愛看修竹未必殷勤為海棠所性姪藏所翁全身戲珠龍萬户千門夜半雷明朝日出五雲堆老龍引領春消息玩弄明珠未肯來漫題四絶鈴索無聲玉漏稀青綾夜直月侵扉五更一覺梅花夢催得江南學士歸屬官分住省郎曹省樹年深過屋髙翰長晝閑來啜茗下簾危坐聽松濤鼇山六月少蚊蠅四壁松風動畫繒長貳聚㕔清澈骨一人人繫一銜氷翰林老屋勢深雄猶是金家兀术宫定鼎初年曾作省至今門徑鳳池通為琅溪題折枝海棠㸃綴春風只一枝此花猶是半開時更令老杜如今見便是無情也賦詩萬竿煙雨圖森森萬木種清和奈此霏㣲煙雨何千古首陽宗二墨清風又佀不須多墨竹疎枝淡淡與濃濃垂葉應無靃靡容玉立滿身都是雨何人能識葛陂龍驢上曉寒圖水聲山色畫屏中衛子凌兢兩袖風曾向天津橋上否誰從驢背覔三公灞橋風雪圖漢樹秦雲一色黄新詩拍塞小奚囊藍闗尚有潮陽債不識先生有底忙玉林琪樹路漫漫驢上凌兢兩袖寒一叚乾坤清意思又駈老子出長闗學士烹茶掃雪時當時已被侍兒嗤灞橋驢背何為者直要衝寒去覔詩驢上凌兢兩手龜南來客子為尋詩而今十倍瀘溝冷偏許青雲熱士知宣和梅雀嵗晚孤根獨發時飛飛凍雀苦相依鶯花世界春三月會有名園照夕暉題明皇葉法善一行禪師講經廣陵玉笛夜何如明日宫中看佛書兩界山河當指似盧龍塞上有龍猪題顧子虎松風謖謖茒葉低於菟顧子行欲遲從今慎勿殘乳麛心亦可學秦巴西再題臨川别卷西蜀橋邊薛校書風流自是女相如平生不受梅花聘只為清才自有餘三牛圖兩竪騎牛過逺村一童横笛弄黄昏老僧正解荆舒字坐愛三牛了不犇萬竹圖露壓煙稍整復斜有時風定翠交加閒身幸老清平世喜見鵷雛待竹花宋徽宗菌圖地上層雲起玉柯依稀遺墨認宣和莆陽相國君知否好作齋房芝草歌髙宗御書君王不受辟寒釵永巷泥金進損齋欲上大清樓下石啼鴉落日滿宫槐陳摶睡圖陳橋一夜柘袍黄天下都無鼾睡床贏得墜驢閑老子為君眠斷白雲鄉雪夜訪戴圖雪夜操舟童僕勞偶然歸去便稱豪若為返棹成佳趣轉憶當時不出髙吳西村雪霽圖鄭虔能畫又能詩獨立經營雪霽時曽向湘江挐釣艇賣鮮沽酒鬂如絲老蒲萄半蝕秋虫老葉皴祖藤孫蔓淡濃勻何人偶值髯君睡奪得驪珠足眩人蒲萄院落陰陰一架秋新鴻聲裏月如鈎老龍偃蹇垂無力戲吐𤣥珠不肯收子昂雪鵠水晶宫裏文章伯當世誰知翰墨名頼有瀛洲光價在不曽承詔寫鵁鶄墨荔枝向來千里騎塵紅生色羅襦濕翠濃顔色似嫌妃子涴蕭然猶有墨君風鎦山立梅圖山澤癯儒面目真見梅往往見先人屋梁月色新湔拂茅舍玉堂同一春天師月梅圖隴頭誰寄一枝來多謝天公巧剪裁猶自壽陽粧額後到今玉蕋忍全開寒雀梅斗柄初開第一枝遊蜂寒雀已先知相逢不忍輕飛去直與梅花了嵗時榮碧潭全身龍巨壑深溪萬水潨四時濃黛浸千峰天衢邂逅全身露還信碧潭盤老龍榮朝瑞正面龍天光烜赫五雲間千仞丹梯不可攀鰲禁侍臣今白首幾回正面見龍顔榮建翁家藏陳所翁龍畫龍居士舊憑熊能寫青雲隠見蹤阿堵神光留意處肯教飛去葉公龍壽卿龍頭聖朝龍首六七輩總是知心識面人我亦待渠頭角老不知誰命繪麒麟吾友龍頭少年不學躍天衢便被良工寫入圖老去全身何所隠會當謁帝乞江湖閒展山水手卷十年京國看圖畫半幅雲煙亦惱儂今日身行屏障裏却思移住最髙峯又動靜之間毫髪㣲要於㣲處動天機此中消息君知否玉琯葭灰夜半飛醉翁亭障為南翁作長史琵琶皮作弦使君眉宇飲中仙滁山滁水渾堪畫獨有風流意不傳武三思雙陸上陽無子局方闌又到乘龍第一盤餅餤未來聊樂耳郎君好好㸃籌看贈翠璧玸講主上人官寺講華嚴聞説心華日日添晚嵗結茅依翠壁龍嵐虎氣滿晴簷贈彭漢節君家已有笏堆床惟勿筌蹄書傳香昨宿山堂中夜起西窓燈火誦琅琅贈彭雲溪真少年書劒出鄉闗晚嵗雙旌五馬還辛苦一生清白吏秖留松菊應蒼顔過髙郵髙郵海上水雲空曾說明珠夜吐虹底事年來光恠息阿誰身到廣寒宫題永清觀天瀾黄木扶胥日出時泊天波浪渺無涯濁河上接銀灣處只許乘槎博望知題栢庭和尚香葉曾經宿鳳鸞苦心容蟻量應難明堂自有擎天柱且喜山中耐嵗寒偶題溪水清漣樹老蒼行穿溪樹踏春陽溪深樹宻無人到時有幽花度水香寄山村兄季子京塵滿黑貂兄年九袠鬂蕭蕭何時約我山村路傍栁隨花過野橋贈歐陽震逺震驚百里未為遙巖谷回春只一朝要見禹門頭角異乘時一躍上青霄京城雜詠玉堂集日列金羈學士新兼祭酒時五百書生簽講遍八甎花影最來遲麗正門當千步街九重深處五雲開雞人三唱萬官集應制須迎學士來白玉堂前夜合花髙髙緑樹散朱霞朝來如見唐人畫繫着誰家白鼻騧龍笙鳳管舞輕盈步障遊看花滿城行到瓊林春更好新來進士唱名聲鰲山宴罷月溶溶太液池邊湛露濃不用金蓮送歸院水晶宫出玉芙蓉京城走馬聽晨鐘我欲宵征僕興慵却憶江南春睡美小樓欹枕聽村舂奉詔修書白玉堂朝朝騎馬倚宫墻牐河東畔垂楊栁時有鶯聲似故鄉題永清寺白巖清暉方池古松四韻上人燕坐白巗阿巖上皚皚白石多曾到補陀南海岸白花無數擁盤陀巗前髙閣扁清輝碧瓦朱甍映翠㣲老子懸車還故里倚闌何日看雲飛白巗山下俯清池花有清香水有漪幾度收經看月上分明水底見摩尼古寺長松倚半空問渠年臘祖師同應知方外輪囷器多謝清時雨露功題昭文擕琴圖孺子擕琴未去弢兩翁山水偶相遭知音已置虧成外到底昭文不鼔髙和寶雲長老澈一清二絶禪板蒲團百念空坐聞宿鳥起霜風巡堂首坐三更過師在雲山第幾峰虎溪一笑瓓珊了不似當時剡棹回髙興莫教容易盡青鞋布襪約重來逢江易藝芳干賦芳洲楊栁垂垂拂釣磯平沙雨過緑生衣王孫闘草歸來晚撲漉鴛鴦帶水飛東山春景春光澹澹日遲遲正是名園撲蝶時却憶小橋流水過東山春色在桃枝題蒲萄宛馬西來貢帝鄉驪珠顆顆露凝光只今移植江南地蔓引龍鬚百尺長題分宜趙尹所藏子昂竹石圖有客有客白其馬汶篁移植燕山下嵗寒心事木石知雨露恩深詎能寫圭齋文集卷三
