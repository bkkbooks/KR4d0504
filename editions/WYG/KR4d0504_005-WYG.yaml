body:
  text: 圭齋文集卷五元歐陽𤣥撰記道州路重修濓溪書院記道州路濓溪書院是為子周子專祠其址在郡城西偏與郡學為隣郡學有先聖廟毎歲春秋二仲上丁郡侯率教授山長各以其職事命生徒祀先聖於郡學次丁則合祀子周子於書院之専祀毎月朔望欵謁皆然原其初建雖由時君有獨祠濓溪之命亦其地勢適然故祠事之専無間言者焉歲久祠宇寖壞至正壬午山長張某議撤而新之郡士李某樂助以相其志工未訖去代者歐誠能繼其事於是祠宇一新歲乙酉番陽吳侯肯來為郡判官仰瞻新祠而門廡弗稱謀諸郡長復加繕修適山長戴世榮又來代歐而郡士蒋通復請出貲改作應門四楹兩橅稱是祠之後舊為誠源堂堂之後為故守髙峯楊公之祠左有愛蓮亭及清逺樓後有光風霽月之堂至是斥故易新丹雘輝映世榮割已俸作石臺於應門之南縱廣二丈横倍之又率郡士文某作瞻德亭亭下甃石為街繩直砥平中外改觀前此未嘗有也先是周子有子二人長司封郎中壽次直徽猷閣燾壽之後遷居江州燾之後居道州吳侯求得其八世孫善溥薦之當道請援顔孟例世以其後人之賢者為書院山長以奉専祠憲府是其議移有司逹之行省焉明年丙戌冬吳以漕事至瀏偕世榮奉事狀謁於歐陽𤣥請記以文𤣥惟周子祠事若㫪陵若九江豫章邵陽諸郡皆有碑刻作者多世大儒𤣥於是記叙勞績紀歲月斯可已矣然而紬繹父師之言亦有可贊一辭者不敢以勦説辭也昔者子貢曰夫子之文章可得而聞也其言性與天道不可得而聞也孔子言性與天道莫著於易所謂乾道變化各正性命所謂一陰一陽之謂道繼之者善也成之者性也皆言性與天道當時門人可以與於斯言者鮮其人焉子貢晚年始獲有聞故以嘆美之及孔子沒知此者子思孟子西漢以下諸儒見其彷彿焉子周子生乎千有餘載之下得孔孟之緒言著太極圗通書泄造化之蘊發聖賢之祕如指諸掌故孔孟之後首言性與天道者周子一人焉世儒或疑周程授受不及圗書殊不考程子之言有曰天地儲精得五行之秀者為人其本也真而靜其未發也五性具焉曰仁義禮智信形既生矣外物觸其形而動於中矣其中動而七情出焉曰喜怒哀懼愛惡欲謂斯言不出於太極圗説通書可乎孟子言天地之性程子兼言氣質之性然後荀楊韓子之説俱廢氣質之論原於周子灼然無疑者也且自太極圗説通書行世世之為儒者苟知讀濓溪之書無不獲聞性與天道之言焉假令子貢復生當歎今之學者得聞斯言為幸而諸儒有横議於當時者果二書之為異乎抑立論者之好異歟皇元定宋九儒從祀周子居其首尋又有制進汝南伯為道國公蓋乾淳以來新安朱子最先尊信其書聖朝重朱子之學以程式天下之士則周子之書益表章於世宜哉雖然國家興學之地可謂至矣周子曰師道立則善人多善人多則朝廷正而天下治矣繼自今教者以師道自樹學者以善人自期将見真儒之効施於朝廷四方未有紀極如是則書院之修豈徒侈専祠示觀美而已𤣥㓜年侍先君子職教是邦讀書濓塾之側追憶往時來㳺來歌之地因吳侯之請輙以舊所聞於家庭者附著於斯焉吳侯肯字肯堂以教官入流選為憲掾進行省掾厯南海武昌兩縣尹皆以善最為政亷明且知大體云是役也逹嚕噶齊塔海大中同知某實綱維之其始終恊恭則經厯李時知事李信也貞文書院記昔在仁宗皇帝之世集賢大學士陳顥翰林學士承㫖和塔拉都哩黙色等言翰林揭傒斯之父來成學行師表一方宜特賜諡以示聖朝尚徳之意於是有㫖賜其諡曰貞文先生至正三年夏四月中書平章政事特穆爾達實右丞太平賀等又請於今上皇帝建立書院遂以貞文之號賜為額其址在富州之長寜鄉舊山之陽前挹遥岫後倚崇岡平疇曲谿映帶林麓蓋揭氏先世故居之地也其制為大成殿四楹於中殿之北為明倫堂四楹殿之南為門四楹上為重屋門之南為靈星門四楹别為貞文祠置明倫堂之後左為山長之署四楹其兩廡為諸生齋居左右皆四楹齋之南又為屋各五楹庾庫庖湢咸以次置其工始于至正三年之九月訖於九年之七月其後從子範經始之而元貞等僧智辨相之山長湯盤繼成之其山長則行省以儒士之嘗歴學官為之其門之東屋則從孫徳懋萃舊岡書院之材所建也其靈星門則僧智辨之所立也其祭祀教育經久之貲則里人之好義者割上腴田以相其事書院垂成文安公與𤣥以同在史館一日詣𤣥以記書院為請𤣥敬諾之喜而歸以語其子汯曰今日吾書院事畢矣歐陽君已諾吾記矣越數日文安疾作又數日卒三年汯申是請𤣥乃記之又告其徒曰古之學校為教事設而政事出焉辟雍泮宫習射養老出師受成皆在其地何莫非政事也後世學校雖治教事而特以祀事重焉攷其所始古之入學者舎菜先師未嘗専有所指而舎菜之禮亦祭之至簡者也今州縣學校則必専祠先聖先師於是國家秩諸祀典若夫書院則又多為先賢之祠或其過化之邦或其講道之地如是者不一也亦嘗攷其所始焉周禮大司樂有道有徳者使教焉死則以為樂祖祭於瞽宗瞽宗者學之名也古者教之以徳為先涵養徳性莫先於樂故有道徳而為師者其生也以教人其死也人推本其教以樂祖祀之非必洙泗而下若漢董子若隋唐王通韓愈氏若宋周程張朱數君子之為先儒而後為可也矧夫書院與學校之制其始又自不同東漢以來大夫士往往作精舎於郊外晉魏所謂春夏讀書秋冬射獵者即其所也唐宋之世或因朝廷賜名士之書或以故家積書之多學者就其書之所在而讀之因號為書院及有司設官以治之其制遂眡學校故祀事有不容闕者於是或求名世之君子以祠焉𤣥嘗循流而遡源蓋自入學舎菜先師一變而為通祀自學有樂祖之祭一變而為先賢之祠自春誦夏弦一變而為呻畢再變而為詞章又且黨庠術序一變而為精舎再變而為書院學者苟不能知建學之初意又豈能知為學之大功學校所重在祀事而宫室象設之制日趍為觀美所任在教事而禮樂律厯之學或諉諸専門遑議所謂政事之行於學校者哉皇元超軼百王務以崇雅黜浮為教以去華就實為學復古之機其在於是貞文先生以道徳教一鄉之人死而祠於其鄉稽諸樂祖瞽宗之祭真無愧乎古人者也𤣥故著其所始願以求正於好古博雅之君子焉至於揭氏父子以稽古之功修身之效被遇兩朝垂耀百世可謂儒者之至榮猶有待乎論述也夫貞文先生諱來成字哲夫以子貴累贈通奉大夫江西等處行中書省叅知政事䕶軍先謚貞文國朝處士易名之典自公始文安公諱傒斯字曼碩卒官翰林侍講學士中奉大夫知制誥同修國史贈䕶軍諡文安父子並爵豫章郡公二公懿行偉節各有列諸别碑云袁州路繕修記宜春為郡介江湖間山水清隩風氣厚密其神能靈其民能淳為厥長吏固俗易使導以身教利建事功至順二年冬十二月通議大夫濟勒布哈擢由容臺來刺名郡私未黔突畢飭在公乃睇府治東拄西搘徂厥門廡上漏傍穿部使之館賔幕之次以及燕休之堂登眺之樓㳺息之囿觴詠之亭府史胥徒脆閽廐厮舊有位置今穢不治或傾欲隳或危欲壓維時錦侯乃諏寮寀乃咨賔屬宿戒父老斯徴富民進而爵之侯乃言曰治官猶家家之隆替觀所恒居垣墉虧疏廡陛夷削凡百廢墜推是知之視彼富潤有覺斯楹勢固不侔亦所自致矧今牧守視古侯伯維今富民其道視子其分視臣爾退而處服御華好側睨長上居懷阽危從我遑䘏寜汝獨安吾嘗觀風考察部屬有司興繕弊有二焉民賦力産吏容奸欺官督期程工售濫惡苟完未㡬馴致朽撓粤有文吏拘牽故常事在得已輙持兩端媮容目前遺患厥後迄夫淪胥滋以病衆斯二弊者吾實恥之今及汝約恒産髙下推次惟女工稍多寡陳力惟汝官不督廹吏無徴呼汝某治甲汝某治乙我惟示成有不樂者疇抑汝配於是父老曰便富民曰宜言訖飲酒罷而與期及期子來並手角能植者用壯承者用隆幂者無窳者無壚裓者砥平磨而甓之丹者黝者藻者繪者無或漫漶後先工訖完美如一窔從衡楹數百計悉前所陳煥若新作侯乃練日共具牢醴合樂落之又進父老及諸富民爵如初儀為之言曰維此宜春郡治奕奕山川發靈神降純嘏暘雨時若有年穰穰民富以教士秀而文吾幸處此與爾同休去即傳舎凡厥洵美汝世享之守何與兹父老富民咸下其手合辭報公且矢於福願錫蕃祉與治俱新天子萬壽百度斯甄公敏且㓗宜為藎臣居匪奉已示我等倫我民於變不戒以信受命於上服勞其親筮占在兹施我子孫無遺公憂以愧我民叅軍楊撝奉圗走書來求予文予核其事辭以繹之且告來者嗣而續之有廢不理衆手撠之撝從予逰為我石之是役初作郡牧之長巴延特穆爾相與佽之用迄于成是皆宜書尉韋元輔實董其事吏宋必逹又宣力焉侯至之明年壬申九月僝工又明年癸酉七月竣事記以是年之八月土木金石埏埴壟斷工費若干鳩集衆力不會於公無從稽云安成李氏重脩安賢義塾記安成李君辛翁初作安賢義塾於州西郊一倣書院精舎之制禮殿廡門講堂齋舎各有其所未㡬即世規模有未備者子剛慨然念先世美績無加於此乃割上腴田若干定為教養恒式出納恒度凡可以經久而不廢者一一講求而完美之於是塾師劉君權具事實謁予記之予嘉李氏有子之能繼承也又感義塾之作是蓋君子至公之心而古道可復之機也為之記曰昔者先王為井田以養民為鄉校以教民周衰井田法壞斯民貧富至於相懸鄉校法壞斯民賢愚至於相絶而君子小人之事判然兩途賤日益多貴日益少法日益密禮日益踈後世興者雖汲汲然設為教官之任而井田經界勢不可復郡邑教養豈能徧及齊民也哉有富而好禮之士出而建義塾焉義塾既作一鄉之士患不志於學不患無從師之資一塾之師患學者之不勤不患供億之不繼推此至公之心求復世道之古其機不在兹心乎師道由是而立善人由是而多風俗由是而美義不可勝用矣禮門左之堂曰塾塾之為言熟也吾固願義塾師友之至斯也教者熟於其教母致扞格而無序學者熟於其業母致寒暴之罔功如是則無負李氏建塾之美意矣李氏安成大族宋末累以著述獻於朝其貢名天府者接武辛翁號一峯剛字立中世以文行稱於州里云趙忠簡公祠堂記臨川王安石以新學誤宋致天下騷然河南程氏兩夫子出而救之卒不勝其説既而蔡京為相宗王氏説黜程氏學宋遂大壞京客張觷教京亟召程氏門人楊中立用之庶㡬救其半及宋中興解人趙忠簡公鼎為相首罷王安石孔廟配享尊尚二程子書凡其門人之僅存者悉見召用江左乃復振不幸秦檜相忠簡公斥程氏門人散亡洎中興業衰又不幸韓侂胄相禁建安朱文公熹之徒之為程氏學者其後禁稍弛宋已日削皇元煟興江漢趙氏復能倍誦程朱書北渡江私筆以授學者許文正公衡衡神明其書進以所得相世祖興禮樂文太平後是四十年貢舉法行非程朱學不試於有司於是天下學術凛然一趍於正時相尋定濓洛以下九儒及衡十人祀孔子廟庭天子從之至順二年春趙忠簡公六世孫篔翁請即解之聞喜縣學為忠簡祠其辭曰公當宋南渡排王氏邪説崇程子正學以至於今有功於斯世甚大宜祠其鄉胄監集賢是其議中書禮部告晉寜路以符屬其同年歐陽𤣥記之𤣥平居讀孟子至承三聖一章未嘗不掩卷汗下以為何致是烈也及畧考近世儒學之邪正有闗於國家之隆替氣化之盛衰民物之榮悴其可徴者蓋如是嗚呼是祠豈細故哉公師邵伯溫友胡寅其問學原委措諸行事詳見宋史篔翁延祐二年進士卓然有志先正亦可概見於斯保靚祠堂記保靚祠堂者安成劉君尚節祠其七世祖考保靚先生者也先生諱作字賢礪保靚其號居袁吉間地曰秀源在宋乾淳一時聲光􅂱然起於郡邑初用世賞授将仕郎辟贑之安逺尉母老不赴中歲韞徳抱才不屑世用友當時搢紳清江兩尚書謝公昌國章公茂獻廬陵楊文節公廷秀皆定交筆硯骨鯁如胡忠簡公邦衡亦深見結納其他名賢不可悉數百餘年以來世代變遷遺韻日逺諸孫尚節㓜負志氣讀其遺書慨然慕其生平懼其親盡既久後人無所瞻仰謀即故居建祠堂以致専祀而諸賢翰墨存諸碑版者亦復散逸尋得忠簡公保靚記䟦及謝公諸書又漁父來告某潭有石状如碑以手切之有字尚節使沒者羣入助漁舉石出果左宣郎劉君廷直所為保靚祠堂銘也他日營父塟於白石岡掘地三尺得碑䘏勿音窣沒讀之又永州通判董徳中所為保靚先生祠記也於是尚節益喜繕祠益勤至元後庚辰春祠成置龕奉保靚主列碑其前議割上腴田若干以給常祀擇日率族屬子姓祭以告成竣事而飲族屬舉杯勞尚節曰保靚徃矣非君之賢祠事曷興造物者出二碑以相君志也余至鈐南族中族與劉氏世為婚姻尚節謁予文為記予惟瞽宗祠於學鄉先生祠於社尊有道尚有徳也此禮廢已久保靚祠堂雖成於其後人異時郡國因餼羊以復告朔古道其庶㡬乎乃為迎送神詩遺劉氏子孫使歌以祀先生詞曰吉之檜兮袁之裔介兩郡兮大容礪昔賢居此兮物無厲物無厲兮民有歲道之耕兮徳之刈刈徳兮耕道深資兮靚保保靚兮何為山有碣兮水有碑碑無沉兮碣無瘞曽孫有祠兮傳千世世世幅巾兮深衣先生來歸兮無我違違我兮焉往從諸賢兮詠歸尊有冽兮爼有肥芳菲兮闔兩扉石韞玉兮山有輝微先生兮後人疇依安先生祠堂記所貴乎處士者能以一已之所守為一國之所慕雖當世英君誼辟操其總攬豪傑包舉宇内之柄一旦遇夫爵禄慶賞所不可致之人於是怡然企乎先王道徳之懿真有貴於已之所負挾者而後上之趣向定下之習俗成斯人者功下韓孟哉元有國以來學者言處士必宗容城劉靜修先生方是時聞其風而起者曰真定安氏敬仲焉敬仲未嘗一造劉也顧得其傳於濓洛考亭者知之為甚篤行之為甚堅由是推宗以合於祖一也劉氏髙亢明爽梯級峻絶士親炙者寡安氏簡靚和靜襟韻敞夷士樂附者衆異時有祠宜乎抑自先民石峯恕齋兩先生以學淑其鄉蓋三世百餘年於兹矣此又祠之所由作歟敬仲既殁門人蘇君伯修貽書同舎槀城西管鎮李君士興請祠為鄉先生士興議克合乃築于鎮作三室而奉之自敬仲上而至於石峯恕齋咸有位焉明世美也落成率里塾子舎節歲時具蠲所事至是伯修請予記之然予記安氏祠而本以容城者亦猶論東漢名節而始嚴光乎漢至孔張末之儒也矣微光東都士何自作新哉光未必知道也而且如彼而况吾濓洛考亭乎而况吾容城乎夫瞽宗祠於學鄉先生祠於社古典也瞽宗久無聞鄉先生有祭自伯修士興始以是知古道無難復人患不為爾繼自今西管鎮之俗日益以厚其民敬學而賤利其士樂學而逺勢安氏之澤其有既乎讀是文者尚知所始石峯諱滔恕齋諱松敬仲諱熈出處詳見家集云秀川羅氏祠堂記先尚書公逰鄉校時善校官羅子逺子逺廬陵秀川世族篤學力行有詩文傳於世後為朝請大夫主榷貨務言賈丞相専權誤國棄官去予家藏其遺墨思欲見其子孫今其族孫仁逹過予為人英敏有為為文雄暢有氣予於是喜先友文獻之有傳焉仁逹徴予記其秀川祠堂其言曰吾祖大時府君著籍秀川四傳至南塘府君家日以大府君之子若孫始割烏石陂腴田若干畝為祀田時宋嘉祐二年也其後乃貢於舎貢於鄉登第於禮部凡百數十人於是蓬山先生溪園先生與其子蒼崖公磵谷公推廣祀田遺意追逺則有拜墓有合祭合族則有族譜有聚拜迄今三百餘年祀田世守如初族雖散居昭穆秩然必不可亂邈在萬里相見相問外有骨肉愛不相視如途人是皆吾祖貽謀之徳與前聞人善述之功也惟祠堂未立合祭聚拜無定所議者咸病焉按家禮祠堂在正寝之東貞之居㕔事之東有堂曰遜緜凡十有八楹其深二丈有竒其袤稱之堂之前有軒軒之外有亭髙明深靚宜祠乃請掌記務本翁以為祠堂祠大時府君而下八世至十二世各圗分𣲖之祖止其有行誼有文學有爵位者特祠焉於是禹圭與翁之子繩祖第一圗孫瑛第十圗孫蘭復買田為洒掃修治薰燎之費自是合祭於斯聚拜於斯與祠田相為永久以卒前人之志先生幸一言以詔來者予既嘉仁逹之能世其學又嘉其宗之能念其祖竊喜載名姓其間自附通家之後有榮耀焉乃諗於衆曰惟大姓其祖必有隱徳非徳無以蕃無以著無以久久則我後人念之宜也念之念之奉其烝嘗云乎哉行其揖讓云乎哉思其人必繩其武食其徳必篤其慶父詔其子兄詔其弟以詩書禮樂為教以孝弟忠信為行逹則澤其民窮則善其身使國人稱願之曰幸哉有子孫若此祠堂之作為不虗矣詩云無念爾祖聿修厥徳秀川子孫其勉之哉時予宗方作祠堂於故鄉以書來告成秀川去予故鄉百里而近而祠堂之成適相先後於是喜徳之不孤也乃以斯言為吾氏告亦以告之秀川焉是乃通家之道也仰更齋記臨川先生扁安成劉氏讀書之齋曰仰更劉君方升屬余客彭斯文來求予記初方升之大父號更齋先軰鎦君耘廬記之故臨川先生之命齋名也寓其大父之號焉夫仰更之義始於子貢之言嘗意其當時必有所謂然日月之明未嘗息者也故人仰之於既更之後初不改於未食之前譬諸君子能存其心於衆人之中其或違而去之亦暫焉而已耳若夫本體之明則固未嘗息也余㓜讀孟子至庶民去之君子存之等章見其厯序列聖所為憂勤惕厲之事至於孟氏自託孔子之意上下四章脉絡相屬而其卒章乃言君子小人之澤皆五世而盡初若甚無謂也已而思之蓋以明親有盡而理無窮耳夫日月之不息其明君子之不失其初斯固天理之所以長存人心之所以不死者也更齋之取號於更臨川之益之以仰其㫖不如是與在禮有之先祖有善不知不明知而不傳不仁是責在吾方升矣知乎此更之流風餘韻五世而已乎劉氏自皆山翁友吾宗巽齋先生一時如西磵葉氏槐城李氏及清江之蕭氏皆山皆善之至方升克世其學殖亦為臨川所期待云吳氏觀樂齋記石橋介攸輿天水間有二郡文獻焉吳君明父之季曰禮遜堂而藻播而嘉禾者也弱冠捧檄司直鳳臺予漫㳺至斯邀予至其家見其翁季唯諾伯仲塤箎信乎其名下無虗矣所居西偏因山以為讀書之齋謁余銘之将以號焉乃命之曰觀樂其事則竊延陵季子之於魯也其義則以明君子之立禮所樂乎成於樂也記曰禮者天理之序樂者天理之和然聖人之於禮必繼之以樂者蓋禮有所不逹樂也禮有所不行樂也何謂所不逹何謂所不行位也者人不厭髙而禮辭髙不辭卑財也者人不厭多而禮讓多不讓寡渴也而禮掣之肘也不敢先長而爵也飢也而禮扼之咽也不敢先長而飡也如是則辭讓之不可長也勉强之不可久也廼為之樂焉融液其交際而辭讓出於欣然導宣其湮欝而勉强至於安然矣昔者吳之公子其有見於此乎季子之遜有禮烏可以勉强言也而吾知季子之觀樂所謂樂其樂者也遜行於其家而風動乎列國之觀聽遜得於所性而脗合於先王之聲容其南也某雅也某韶也某夏也是皆以雍容登降為樂而非以乖爭扞格為樂者也孟子曰樂之實樂斯二者仁義是也吾亦曰季子之於樂樂其禮也樂其遜也其樂斯二者而已或曰謂之觀樂可也遜如季子未易言也余應曰人能充無放飯流啜之心禮不可勝用也人能充無疾行先長之心遜不可勝用也而獨季子乎哉禮遜事親也恭從兄也敬務學也敏遇人也溫是殆甘受和白受采苟觀樂焉則豆籩於辟雍則冔弁於曲臺矣小之不有得於美哉渢渢之魏乎大之不有得於美哉泱泱之齊乎則余之名齋也而豈徒哉而豈徒哉芳林記宜春郭廷秀世儒家子也因其所居之地名著號曰芳林屬予族兄宜翁求予為之記予復之曰蘭生深林之中未嘗不自閟其芳也人以為有國香而服媚之蘭欲自逺於當時其可得乎君子修其身於暗室屋漏之地而聲流於四方萬里之外亦豈所願哉且夫芳林者君之所以自况也余雖乏一日之雅而樂為君記之良有以也夫殆猶蘭處於僻而芳播於逺也雖然蘭或握以事上或佩以修禊而其芳烈之氣不改於深林豈非其性然與草木無情能一其性人惟有情鮮不汨性君子存之蘭荃同畦不混於植蘭鮑同室不移於染斯以異乎衆人也吾聞廷秀之風清白之操使一日而進諸市朝吾知其無愧於芳林也卓矣請以是為記
