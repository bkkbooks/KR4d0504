body:
  text: 圭齋文集卷六欽定四庫全書圭齋文集卷七元歐陽𤣥撰序防里歐陽氏族譜序歐陽氏之初望出兩郡千乘中絶今存者皆渤海裔也其譜牒視他姓氏宜為易考又自唐以後譜學乆廢我文忠公最先倡之其譜牒視他姓氏宜為先備今或不能然則以子孫衆多轉徙不常也吾家自趙宋淳熈丁酉髙祖八府君自防里遷瀏之馬渡曾大父宜軒先生自馬渡遷長沙大父澹軒先生及先太常渤海伯復居于瀏聞八府君在時間嵗一至防里由曾大父而下仕學四方至者盖鮮獨幸我族屬不可鄙夷而得叙其世次焉頃予在朝防里族兄竒翁先生遣姪勞予京師去年謁告南歸又勞予于家且囑叙其譜焉余方約為譜亭之行當得備詢而悉載之未幾予環之使至是以不果來也因念吾宗之盛儒者又多譜或不一致貽先正巽齋公之恨然以予今日之事觀之又何恨乎昔人耶雖然族譜之作將以重倫紀厚風俗使其子孫知源委之所自足矣必求如唐人之譜學自受姓以來皆有可考則固有難者矣無已則用吾文忠公之法姑叙防里之近者焉則庶乎其可訪求也譜留予所半載迨將北行乃叙而歸之竒翁以俟他日彭氏族譜序分宜彭氏其先東漢長平侯宣居淮陽傳九世至北齊陳留王樂居安定又八世唐禮部侍郎景直居瀛州子構雲避天寶之難遷江右傳四世為安定王玗居廬陵玗兄弟五人為太尉者四子十一人人皆檢校太傅太保六曹尚書諸鎮刺史孫二十七人相繼登進士第為顯宦五世孫嗣慶復遷分宜縣南之珠溪今珠溪族甚盛或隠于林麓或顯于王門卓犖豪傑世不乏人或明經而修進士之業者殆不可量予嘗讀彭氏家傳王雄據一方士馬精銳數與淮陽爭衡湖南馬楚為之請于後唐錫爵崇貴迹其材智英毅豈下五季諸雄哉惟能自處冲抑不竊位號故其子孫衆多美譽不墜此殆鬼神之福謙者歟傳又言王享年九十有八繼學不衰子弟從授二戴禮及春秋者千餘人非有絶人之資不至是也抑彭氏世有聞人爵為侯王長平侯以文學陳留王以武功安定王資兼文武繼自今為子孫榘矱先訓箕裘先業文武以應國家之需則是顯融者豈有既哉珠溪之彭吾防里之歐陽族望相同婚姻相繼故叙是譜不辭白石周氏族譜序六朝以來家有譜系之學又有譜系之書隋經籍志載天下郡國族譜若干卷吉州譜八卷洪都袁州稱是江右諸郡詳他郡也唐世此學此書盛行五季淆亂四方割據馬殷在湖南獨能輕徭薄賦又招納賢者故中州名家士多歸之後以希聲兄弟争國士稍稍散去今觀廬陵周氏族譜言其先世避地江淮丁馬氏亂復徙金陵盖唐末自中州依馬氏及亂而遷此亦當時之一族也但譜云江淮當作江湖殷境土未嘗及淮考之馬氏失國既乆南唐始亡周氏府君羨仕唐至僕射理宜然也由僕射迄今冠盖不絶屢遷而不替則周氏之徳其盛可知矣孫名師韓者有志於譜乆備録而刻之猶子諒以刻本至京眡余求志其帙夫譜學廢譜書亡已乆余何幸見古道於周氏然余嘗以杜君卿作通典時譜書具存而杜不紀録為可恨今則無所於購矣適承勅修經世大典偶見周譜因附著予感於斯且志吾廬陵之人尊尚氏族其來甚逺也後林周氏譜序廬陵周叔量以其族譜謁余序其端予序南北大姓多矣求其自受姓以來世系不絶厯厯然可考者鮮盖由世變相承或斷續於南北六朝之離合或散逸於五季列國之紛争往往而是也唯代有聞人出而振起之及有卓識之士當世變之來善擇地以處則族可至不絶譜可至不隳也予觀周氏始遷周原迨漢之爵徹侯者有其人又降而為魏博士厯晉至北周為長安之周其盛涉隋至唐中葉府君璟顯融于時至四世威遭世有難避地金陵五世矩事南唐為御史晚愛廬陵山水之秀可居遂依郡公楊竦而家焉即今之西昌宋初有曰史館學士有曰光祿僕射皆傑然表於其族淳化而下宦業日盛朝廷賜其所居里曰爵譽六世倩又嘉安成泉石之勝曰後林而徙居之内附後子孫亦能輯其前聞由是詩書之澤與爵譽相輝暎盖九世于兹矣叔量受知當揆被選為公府掾會有特㫖省臺通用南北士遂應令首為御史臺掾遷臺照磨進中書檢校官因思近代名公卿有自以先世或閾於偏方不獲有聲於中國及貴徙居中州頗為士論所少今觀叔量之際遇則為子孫相攸唯當以山水風俗之美若地里之僻左自當遇大同之世推一世之公也雖然居者種徳以芘其後行者畜學以發其身亢宗之道在是而已爾叔量名浩學行偉然時譽歸之後林周氏之復盛其昉於斯乎廬陵中州劉氏族譜序前代藝文志載郡縣氏族書甚多士君子若唐路氏宋吕氏明譜牒之學學者亦不乏人近世氏族書散失士於譜學無聞中州故家屢更兵燹仕者投牒天官曾大父大父或犯其諱其族譜可知矣江南内附多不煩干戈承平既乆冠盖之族幸遭明時涵濡深仁往往治其家譜不知者以為一家之私事知者則以昇平之氣象可觀於此至正壬午十月余訪族就醫於宜陽道經南泉與中州劉君西巖及宗海會于山中出其所修族譜眎余徵余叙其事廬陵劉氏之顯者獨多於郡中州族自廣平來始祖紹聞府君傳至今厯十有七世詩禮相仍簮紱相踵試閱其編支分𣲖别昭然在目西巖宗海二君之用心可謂勤矣予族宜陽而家瀏居間屢欲訪族而阻疾聞族有善醫往即之中途見劉氏族譜私竊自喜知吾族之必可訪疾已者幾半故因其請而樂叙其帙端紹聞歸宋積官運使其子有與金陵李氏姻戚者盖大姓也其詳見王城山先生及宗海自叙云國朝名臣事略序應奉翰林文字趙郡蘇伯修年弱冠即有志著書初為胄子時科目未行舘下士諅言詞章講誦既有餘暇且筆札又富君獨博取中朝鉅公文集而日録之凡有元臣世卿墓表家傳往往見諸編帙中及夫閒居紀録師友誦說於國初以來文獻有足徴者彚而輯之始疏其人若干屬以其事中更校讐櫛去而導存抉隠而蒐逸乆而成書命曰國朝名臣事略他日余與伯修同預史屬從借讀之作而歎曰壯哉元之有國也無競由人乎若太師魯國淮安河南楚諸王公之勲伐中書令丞相耶律楊史之器業宋商姚張之謀猷保定藁城東平鞏昌之方畧二王楊徐之詞章劉李賈趙之政事興元順徳之有古良相風㢘恒山康軍國之有士君子操其他臺府忠藎之臣帷幄文武之士内之樞機外之藩翰班班可紀也太保少師三太史天人之學陵川容城名節之特異代豈多見哉至於司徒文正公尊主庇民之術所謂九京可作我則隨武子乎乾坤如許大人才當輩出伯修是編未渠央也姑志余所見如是云廬陵鎦氏通鑑綱目書法後序昔司馬文正公變紀傳為編年作資治通鑑朱文公稍變其法且寓所去取焉是謂綱目讀是書者夫人以為春秋三傳之遺意也夷攷文公生平於易詩書禮或自傳註或屬門人皆有成書獨春秋缺焉至胡氏傳又􅉨􅉨信未之確然則綱目何為而作耶盖嘗求之春秋者魯史舊文說者謂直書其事美惡自見初未嘗拘拘於義例者愚盖不敢必以其言為非也若司馬公則志存鑒戒已見於著書之名而予奪權衡時有所憾文公患之故有是作焉初意固有間矣書王宗周天下是時有與周同稱號者乎黜魏帝漢有說也乾侯之公在是也房陵之帝王乎帝乎故知是書於春秋所以異之跡則知所以同之㫖矣推二大節引而申之書法斷不誣矣近時儒者疑為文公未脫藁之書或疑為門人之作皆未究所以作綱目之志云爾廬陵鎦先生研覃於是三十餘載比辭而覈研推事以求度綱舉目張如指諸掌曰通鑑綱目書法亶其嚴乎余從友人鄂省宰屬馮君子羽得而讀之三復歎之曰春秋微公穀啖趙諸說猶可綱目㣲鎦氏書誠不可也何時歸青原故鄉願即先生一二而揚確之姑志余說于帙末忠史序忠者盡己之名也天以事物當然之理賦於人人盡其所當然者而無憾焉是之謂忠今語人曰臣事君以忠與忠恕之忠同則莫不駭然以為非而實然也或曰臣盡臣道於君忠矣子盡子道於父何獨曰孝乎曰不然也禮記所謂内盡於已而外順於道忠臣以事其君孝子以事其親其本一也此即吾說也然則上盡其所當然於其下其名曰何曰盡有不敢不勉之義上下之間必有别也故盡之對為推即恕矣程子嘗謂忠恕一也事上之道莫若忠使下之道莫若恕後儒疑之未喻此也人生而静動與物接即有盡已推已二者出乎其間識者知其然固無一息而非吾效忠之時也是道也所以事君所以事天詩曰昊天曰明及爾出王昊天曰旦及爾游衍亶其嚴乎番易楊𤣥翁有見於此矣大父通守左軒先生當宋季官守以正直聞臨難以死節著𤣥翁慨慕先志作忠史十餘年成書於是上下數千年臣子大義粲然畢具㣲而一言一行苟無愧於盡已者悉録之又微而裔夷小邦婦人女子之操不遺也又極而心跡形似之間皆有以覈其實是非瞭然不繆於古人何其至公而當也嗚呼自忠之說不明士大夫平居無涵養省察之功蒞事無鞠躬盡瘁之志立朝無直言極諫之風至於臨難死節能保其必然也耶嗚呼宇宙間此道明即天地變化草木蕃不明即天地閉塞賢人隠甚可畏也余為國子博士時職當校獻書既表章之猶恐𤣥翁著書之志未白也故述忠說於斯嗚呼是書果行於世也夫書之幸也夫世之幸也夫虚籟集序古人之詩被之絃歌其入人之深猶有待於聲今人之詩簡牘而已或一字之工一言之妙真能使人心存而不忘以是往往知音於千里之外會心於百世之下求其所以然而莫知孰使然非天乎愚讀秀江縣春洲詩清曠簡逺擬古精到有韋栁風而自名其集曰虚籟嗟乎瓠者吾知其為匏筩者吾知其為管今吾與春洲神交㝠漠於不識不知之鄉讀其詩愛其人吾不自知吾為何心此盖南郭子綦之所為隠几者耶抑又聞達人之詩猶治世之音人未達世將治有識者察焉天地間有無相推虚實相感聲之妙萬物者其在乎此孫君勉乎哉吾有以知君矣題而歸其詩至正條格序至元四年戊寅三月二十六日中書省臣言大元通制為書纉集於延祐之乙卯頒行於至治之癸未距今二十餘年朝廷續降詔條法司續議格例嵗月既乆簡牘滋繁因革靡常前後衡决有司無所質正往復稽留奸吏舞文臺臣屢以為言請擇老臣耆舊文學法理之臣重新刪定為宜上乃勅中書專官典治其事遴選樞府憲臺大宗正翰林集賢等官明章程習典故者遍閱故府所藏新舊條格襍議而圜聽之參酌比校增損去存務當其可書成為制詔百有五十條格千有七百斷例千五十有九至正五年冬十一月十有四日右丞相阿嚕圗左丞相伯勒濟爾布哈平章政事特穆爾達實恭布巴勒納琳巴延右丞相吹斯絅參知政事多爾濟巴勒等奏請賜其名曰至正條格上曰可既而群臣復議曰制詔國之典常尊而閣之禮也昔者周官正月之吉始和太宰而下各以政教治刑之法懸之象魏挾日而歛之示不敢䙝也條格斷例有司奉行之事也甫刑云明啓刑書胥占其所從來逺矣我元以忠質治天下寛厚得民心簡易定國政臨事制宜晉叔向所謂古人議事以制之意斯謂得之請以制詔三本一置宣文閣以備聖覽一留中書藏國史院條格斷例申命鋟梓示萬方上是其議於是屬𤣥叙其首篇𤣥乃拜手稽首揚言曰人君制法奉天而行臣知事君即知事天敬君敬天敢不敬法書曰天命有徳五服五章哉天討有罪五刑五用哉易曰雷電噬嗑先王以明罰勅法又曰雷電皆至豐君子以折獄致刑二卦之象為電為雷所以明天威也繼自今司平之官執法之士當官蒞政有徴是書毋瀆國憲毋干天常刑期無刑實自此始亦曰懋敬之哉奕序古者人生入小學比及弱冠而禮樂射御書數六藝之事已徧習矣他日因射之餘意為投壺且寓禮焉因數之意為奕且寓智焉其初皆足以養其良心而合乎張弛之道者也投壺之說見禮記奕之說孔孟嘗及之世傳堯以丹朱少智教之以奕雖未必然然奕有算法存焉足以導智容有是也今小學之教乆廢而二事以為伎精之者往往名世焉廬陵嚴徳甫善奕初集奕法為書晏文可故家子也乃以家藏諸譜又増益之奉禮青城楊君以書來為之求叙將鋟諸梓以廣其傳予性狷且拙少賤力學乏暇於琴於奕皆懵然每為大夫士所哂楊君之請愧不能言奕之幽眇以答之姑叙其所知者如是考古臆說序昔誠齋先生解易取史事以證爻辭安成李廷傑上書取史事以言時務皆能極事變而盡物情非特足以垂來世之戒推而行之有足以救當時之弊然非學博而義明焉能援據如是之精覈論著如是之詳切耶舉子學䇿套於燈窓求籠主司之問立志已在於進取為論何恠於迂疎廷傑此作志在祛時蠧而起民瘼豈切切為功名計耶宜其剴直而無諱明白而可行也閑中閱此知山林中有識時之俊憂世之士如廷傑者第未用爾用則於斯民豈無所裨益乎鈐岡續志序郡縣之圖志何為而作也國有賢守令猶家有賢子孫守令保圖志以治分地子孫保闗劵以治分業能治其所有即為賢矣因田野之有定界也而考其有汚萊者乎因户口之有定數也而考其有流亡者乎因賦役之有定制也考其在公者有湮沒乎在私者有暴横乎因士習之有舊俗也考其有可匡直而振徳者乎有可濯磨而作新者乎治之而無倦則田野可闢户口可増賦役可均風化可以日美人材可以日盛矣然則圖志可一日而闕乎分宜有縣起宋雍熈至南渡嘉定間謝令謀作縣志尋復不果淳祐黄尉始克成之混一以來更六十有七載浚儀趙侯尚之為尹百廢具舉乃作鈐岡新志以續前編書成適予叙族至邑南之防里侯以予於是邦寔多桑梓之誼以序見屬辭不獲則願以昔人治官如家之責告夫求芻於吾邑者庶知前人作圖志之意非徒以廣紀載備考訂而已將以為勤政之一大助也推本作者之意黽勉述者之事吾邑吾民其多幸矣乎風雅類編序風雅之道先王治天下一要務也風即風以動之之風雅即雅烏之雅以其聲能動物也本於邦國播於樂府薦於郊廟以考風俗以觀世道尚矣然惟其聲不必惟其辭故有聲而無辭者有之無聲而有辭者無有也孔子論韶舞本惟其聲武王所遭遇與舜不同世儒因其不同而優劣之未必聖人意也周衰風雅道熄既而聲音之學寖廢無已而求言辭之間則後世詩為近盖其志氣之盛衰意趣之髙下音節之淳漓於風俗世道猶有可考者是以君子有取也袁君懋昭作風雅類編介予宗姪貞為之求序見其凡例强人意甚多以世代次序此得詩譜遺法起四言至樂府止五言七言絶句論建精詳去取簡當他日書成於風雅豈小補哉余嘗典司太常又嘗出為觀風使者留意兹事而弗克遂偉哉袁君是編其為我趣成之梅邉先生吾汶藁序論人行事枚舉而稱之者其善為可數論人文章舉一以蔽之者其善為不可勝數也廬陵梅邉先生與先君渤海侯為太學存心齋同舍咸淳甲戌隨路混補入學又同生淳祐之壬子先君嘗稱其才器卓犖有往哲風運改世遷篤志稽古蘄為文章以見志予恨未及一識他日從其門人鎦君省吾得吾汶藁讀之至生祭文丞相文作而嘆曰嗚呼王鼎翁宇宙竒士也士之趣人以自裁者惟朱雲於其師蕭望之然望之特一身計耳鼎翁之為言為天下萬世之為人臣者計也嗚呼雄哉蓋嘗論之斯文者宇宙之元氣也幸而治平措諸事業則為典謨為雅頌不幸而反是則為春秋為變風雅為離騷然正人心扶世教之功難見於治平無事之時而屹然可仗於流離顛沛之日然後知斯文之所繫如是其重歟詩曰徳輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之夫天人維持之際惟是心耳何其深厚悠長之味溢出言表耶文武之澤在人其未泯歟鼎翁是篇與是詩辭氣雖若不同實相表裏愚故表而出之他詩文竒氣壯節類是環山詩藁序前年與族弟齊吾同客京華暇日相聚齊吾口誦近作予傾聽移日旅懷為之豁然今年予謁告還家復相遇於瀏東之沙江出詩藁示予佳句疊見私竊自喜吾宗之多文人也齊吾盛年子長之遊方壯涉歴日逺覩記日廣吟詠日富大編巨帙當自此始老兄退處畎畆凉竹簟之風曝茅簷之日思草池之句得新集讀之亦足以怡暮景矣三復玩味題而歸其帙
