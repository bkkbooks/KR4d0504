body:
  text: 圭齋文集卷八元歐陽𤣥撰序玉振詩序安成鎦君玉振示予以舊詩藁佳句疊見而名其集曰進修余見而歎曰異乎鎦君之名斯集也夫進修之於詩岐而為二也乆矣殊不知詩固一技技進於道莫驗於詩修辭立誠詩非修辭之要乎胡五峯見朱文公萬古青山只麽青之句改賦之曰山中出雲雨大虚一洗塵埃山更好文公之學専務體用其教學者亦然豈必五峯而以此詩發之也如是則知詩為進修之助豈小補也哉玉振諸體詩能為麗則不涉輕儇求去陳腐不至峭刻吾又將於詩而得其人焉梅南詩序詩得於性情者為上得之於學問者次之不期工者為工求工而得工者次之離騷不及三百篇漢魏六朝不及離騷唐人不及漢魏六朝宋人不及唐人皆此之以而習詩者不察也髙安儒者曰易君南友恬愉清白之士也富貴利達不動於其中游行江湖以得句為樂故其為樂府為諸體詩往往出於性情之所感觸咸臻其妙然其學問亦足以副之二者雖未能定其優劣而集中之詩偉然固佳作也京師近年詩體一變而趨古奎章虞先生實為諸賢倡南友從虞公遊昔人云既見異人當見異書吾有以知其詩日進而未已也李宏謨詩序宋訖科舉廢士多學詩而前五十年所傳士大夫詩多未脫時文故習聖元科詔頒士亦未嘗廢詩學而詩皆趨於雅正舊謂舉子詩易似時文正未然也安成李宏謨彚所作詩以求序讀之終篇語多清新逈出時文舊窠誠可尚也抑國朝取士之文先尚雅與不知舊習浮靡故他所作亦然與抑亦治世之音流布樂府自是始與因序以志予喜李希說詩序予訪族安成多見佳士又多見佳作將歸得秀才李希說山中小藁玩之幾不能去手盖作詩甚難多作不可少作亦不可多作易强少作易艱二者皆不得佳句非句不能佳興乏佳耳境趣之生如不欲詩而不能不詩古今絶唱率由是得也希說此藁開卷第一首襍賦有我欲近自然物物由天成以是求句何患無佳句也予兹行喜見佳士佳句之多雖未見希說已見其人於詩何時當握手與共論詩之㫖鎦執中詩序鳴臯集者安成劉君執中集其所作之詩之編也集成屬予序其端予見其集中樂府精深諸體詩壮麗閒適信能以詩鳴者今人往往因人已然之窮達而求之於詩謂達者之詩從容而有餘窮者之詩戚促而不足殊不知豫之為卦逸樂而有餘者也鳴不當則凶謙之為卦卑下如不足也鳴而當則吉何有於窮達乎執中之鳴據其境趣之實發乎性情之真吾見其鳴之昌也中孚鶴鳴子和我爵爾縻之象上下感應同出一誠耳異時執中以詩鳴而名實相賔一鳴而聞于野再鳴而聞于天何患九臯之逺乎執中號後梅吉士之老成者云蕭同可詩序詩自漢魏以下莫盛於唐宋東都南渡名家可數而可恨者亦多金人疏越跌宕之音自謂吳人萎靡然槩之大雅鈞未為得也至元間山林遺老閒暇抒思之詠一二縉紳大夫以其和平之氣弄翰自娛於是著論源委益陋舊尚近時學者於詩無作則已作則五言必歸黄初歌行樂府七言蘄至盛唐雖才趣髙下造語不同而向時二家所守矩矱則有不施用於今者矣是雖辭章一變世道固可觀矣廬陵蕭君同可集所作詩成巨編屬予序之予嘗及同可論詩矣凡於晚宋氣格之近卑曲江製作之傷巧同可禁足而不渉是境也矧夫馳騖南北之餘攬燕代之雄傑睹京闕之美富亦既囊括神竒而用之宜其詩日造夫髙逺而未艾也雖然人之榮遇往往於是占之同可其自此升矣夫羅舜美詩序江西詩在宋東都時宗黄太史號江西詩派然不皆江西人也南渡後楊廷秀好為新體詩學者亦宗之雖楊宗少於黄然詩亦小變宋末須溪劉會孟出於廬陵適科目廢士子專意學詩㑹孟㸃校諸家甚精而自作多竒崛衆翕然宗之於是詩又一變矣我元延祐以來彌文日盛京師諸名公咸宗魏晉唐一去金宋季世之弊而趨於雅正詩丕變而近於古江西士之京師者其詩亦盡棄其舊習焉廬陵羅舜美以詩一帙屬予題其端讀之佳句疊出詩不輕儇則日進於雅不鍥薄則日造於正詩雅且正治世之音也太平之符也鄭箋言詩可以觀治道之盛衰豈不信哉楚與吳之詩不列國風而近世江表詩甚多他日寘諸樂府者矣月樓上人詩序余頃得月樓上人投摯五言長律一首思致清醇氣格深妥知其為能詩者及觀全集大篇短章亹亹佳作然則唐之九僧不專美於前矣士大夫非無能賦之才進有嘆老嗟卑之心退有啼飢號寒之累其不爾又有懷禄固寵之思憂䜛畏譏之慮昏濁其神志凋落其精華求其嗜欲淺而天機深與山間林下之髙士角一日之長則亦難矣是宜上人之精於詩也太息而題其帙端鄭以道文集序往年鄭君以道為廣右憲史請于部使者以一檄諭猺人數千出降列郡征戍一日而撤其民歡忻鼓舞沴氣頓息使者由是論功進爵後使者至復質往事知功由一檄謂以道曰兩江岑黄拒命兵乆不解始以舉措弗當貽畔至今若復馳一檄紓其抑鬱之氣示以禍福之機蠻亦人耳烏得不從使者又說命以道立草檄文遣辯士馳入岑黄洞中二䝤得檄感泣曰今日下情得上達矣乃問草檄者誰斯人得吾逺人情實如見肺肝請悔罪納土各遣子弟奉貢既達朝廷矜之為之賞賚有差後使者又以是峻遷於是言者謂賞不及以道不可代陳其勞天官為減一資厯而已余為大司成以道調官京師欲見其檄得其古文數篇甚佳而檄終不以自暴後自粤中見寄近制往往可愛今過宜陽以道司讞府中眡以行餘全集見其大小詩文雜著等作如師中丈人指撝集定士卒禀令退就行伍無不整娖又如瞽矇眡瞭逓其能堂上堂下之樂各得其正何其能官也世間不善遣文如不解事人作事位置失次令人悶悶以道諸作一一令人意强宜其能官也夫以道所至著稱㢘幹在宜春淑慝分明民有郛郭可謂賢矣三復詠嘆叙而題諸劉桂隠先生文集序廬陵劉桂隠先生以文集寄余京師余為之言曰士生數千載後言性命道徳如面質古人言成敗是非如目擊古人其間命意措辭則欲求古人之所未道而又欲不背馳古人其事可謂難矣或曰難可但已乎曰不然有一定之法而蔑一定之用者聖人之於䂓矩也有無窮之言而懷無窮之巧者造物之於文章也是故巧能為文章不能為䂓矩偭故常而為規矩者狂之於巧者也法能為規矩而不能為文章守故常而為文章者狷之於法者也今余讀劉先生之文温柔敦厚歐也明辯疎雋蘇也至論其妙初豈相師也哉又豈不相師也哉或曰妙可聞乎曰妙可意悟耳試從鎦先生求之盖有不可得以言傳者矣而况余乎雖然余所謂規矩蔑一定之用文章懷無窮之巧者庶乎近之劉先生文傳世可必尤長於詩詩五言古體短章尤佳因書以為之序族兄南翁文集序族兄南翁過余瀏上示予以文藁讀其文㢘靜而深醇是四辭者昔人嘗以稱人之有徳者矣今予以稱兄之文必有所見也兄抱道自足無求于時故形諸外者亦有徳之言乎吾江右文章名四方也乆矣以吾六一公倡為古也竊恠近年江右士為文間使四方學者讀之輒愕相視曰歐鄉之文乃險勁峭厲如此何不舒徐和易以宗吾六一公乎盖嘗究其源焉吾鄉山水竒崛士多負英氣然不免尚人之心足為累焉耳夫文上者載道其次記事其次達言烏以尚人為哉歐陽公生平於平心兩字用力甚多晚始有得前輩論讀書之法亦曰平心定氣人能平其心文有不近道者乎兄文㢘則不誇靜則不躁深則不膚醇則不靡尚願羽翼吾歐陽公之學以模楷後進之士將見江右之文章粹然為四方師表矣贈李敏求序昔者聖人之教學者不貴資質尚學問往往引已以喻人故嘗曰我非生而知之者好古敏以求之者也今世學者率以為聖人謙辭殊不知問禮問官入太廟之問孜孜焉實用其力又非特禮樂名物古今事變為然其曰吾嘗終日不食终夜不寝以思無益不如學也學何事乎禮義而已矣斯言豈吾欺也廬陵朋川李氏唐西平王之後也族多文人有字敏求者屢以詩義貢于有司聞余至安成族中介予族姪用賔以來見愧無以益也因即其字為序以贈之敏求將去復問曰敏何先曰君子欲訥於言而敏於行吾江鄉能訥言者恒少子敏於内請自訥於外始送虞徳修序天厯二年夏洪省馹使虞君徳修䕶送公賦來京師冬十月竣事復乘傳歸縉紳士夫賦詩以餞授余以首簡焉嚮余以諸生幸獲侍徳修之先君子蜀郡公於長沙今以文翰屬吏又幸獲從其仲氏奎章閣學士于朝寔有世契誼不得辭夫君子之從王事國爾忘家義也故天倫之樂與夫人爵之貴二者之輕重雖較然易知然求其合并亦人世之所難而造物之所靳也奎章公被天子眷遇待問宻勿其雅尚髙致固未嘗食息不志於江湖之上思從諸昆於山水之間以暢其平生達觀之懷而勢有不可能公亦豈得直情而徑行哉徳修乃能因王事之便以勞仲氏於數千里之外其樂之叵量此非可以言喻而増秩之華錫予之寵又適合并於斯時可謂盛矣夫奎章公辨色入直日未入三刻始退就舍然如司馬君實時其寒燠飢飽於其兄蚤暮不懈也今翩然以南意其出郭而送别登髙而望行遙見夫烏帽出沒於黄塵之郊此境此况昔人之見於歌詩者豈非若為今日賦者耶倌人趣行祖道有作請以是為序送鎦文廷之清江録事序安成士登第自鎦文廷始調清江録事得視牧守縣大夫為親民長官自重宜矣其行歐陽𤣥重告之曰周官司市掌市之治教政刑量度禁令今之録事治城市闗廂大畧相同而古今之制則不侔矣古者都邑如井田畫為九區前二區為君之宫之廟社之㕔治後一區為市左右三區為民居市别為四門日出而啓惟民得入焉盖二畆半在邑之農也其餘大夫七凡有爵禄者入市有罰所謂出一幙一帟一一帷之類是也内而天子之都外而諸侯之國同一法其君過市則有刑者赦所以别尊卑也古法簡古俗淳惡囂而抑末尚爾今夫録事所治則市人居民出入同其門綜理同其官而况百族之寓公四方之游士官府之府史胥徒兵戎之游徼以逮卜祝老釋之流又下而百技工巧駔儈負販奴客倡優淆處而襍由之如是而望其布治教平政刑一其量度禁令如古司市法不既難矣乎雖然儒者將為政必使沈猶氏不敢朝飲其羊公慎氏出其妻慎潰氏踰境而徙此亦其有道者乎或聞𤣥之言而笑之曰迂儒者欲驅市人而讀周公之法欲進録事而行孔子之政其可駴也特甚嗟夫文廷儒者也進士也𤣥語儒者語市人哉送翰林應奉李一初南歸序國家有科舉以來凡七科二十有一年第一甲寘三人三人者皆賜進士及第自元統初元之癸酉嵗始南士居第二人而膺是寵者自雲陽李君一初始以第二人南士初登第入官即得供奉天子詞林預典制誥修史事又自一初始是皆儒者之所難遇也故衆人之言曰天以斯文之澤鍾於一初者何其厚耶余之言則曰儒者積學發身可幾其或然也一初四親髙年居此重責而榮遇若此然後知天之以斯文之澤厚吾一初者又何其至也夫世之人有子若孫莫不願之賢賢莫不願之成至於希有之遇可必於天耶雖然一初得闕内補而需次再期將使之居則致庭闈之歡出則盡鄉里之情退而休焉又得以繹其所舊聞増其所新習廣其所積博其所施異時登進王朝將以究其所學於其所事是豈獨為四親之榮而已哉此固吾鄉之人吾黨之士喜稱樂道以致其勸相之辭者也送鎦仲宣歸隠東山序予甲寅乙卯間與計偕至京師時安成鎦仲宣為尚方太醫數被恩寵奏之輙効獲金繒之賜又嘗奉命乘傳至於大漠療疾藩邸有竒功受厚賞於是服餙鞍馬皆華好如素富貴人第見其負氣岸不詭隨又好摭難經素問幻眇辯詰同列以故同列往往病之後是三十年再會仲宣於輦下顔色蒼古而議論不衰袖中出東陽詩卷謁予贈言且謂予東陽者吾鄉之山名也山有林泉之勝吾雖居此將及三紀而逺引之志未嘗一日不在此山也先生盍為識之予復仲宣曰漢東方朔言金馬門可避豈必深山之中蒿廬之下予愛朔言大似有理士君子涉世以跡不以心故能無累於斯世朔譏猾傲睨處公卿間無所避忌雖待詔公車彼山林士孰能尚之哉仲宣躍然曰吾榮吾東陽歸有日矣聞先生言其能以留乎請書以為贈送鎦仲賔歸安成詩序延祐乙夘予初擢第國醫鎦仲宣訪余旅邸時醫道甚行方被恩寵但見論議辯說予􅐁無少貸心恐其不見容於同列也泰定丙寅余召入朝詢其近况衆醫曰仲宣謁告歸矣至正甲申余以總裁三史之命晚嵗復入詞林中仲宣亦至自南中比初鬚髪蒼白而不少衰後輩亦嚴憚之未幾從余求東山序浩然有歸隠之志公卿貴人偶有難已之病衆醫相視縮手思吾仲宣而不可得矣去冬予以病告老歸瀏上客有薦鎦君仲賔為予診候問之仲宣乃伯氏也其取藥服之無疑知其世醫為可托既獲其效尤敬其為人仲賔身居市肆而無商賈計利之心口誦醫書而有儒者救世之志是可尚也嵗莫别予還安成予賦詩贈之曰老病侵尋蚤引年命車先向里門懸獻方謾有求文客市藥應無買賦錢顧我燕毛慚晚進感君鴻寳試家傳青原舊友如相問雪夜時乘訪戴船顧不足以盡予托交之意也因為叙以送其行送伍成均南歸序昔子路言志聖門願車馬衣輕裘與朋友共敝之而無憾他日夫子稱子路衣敝緼袍與衣狐貉者立而能不以貧富動乎其中誦詩之不忮不求以美之二事正相表裏子路之所志即夫子之所稱也今世布衣之士好以惡衣羸服傲視簮紱往往援子路以為依據殊不知子路所言車馬輕裘則其平生服御未嘗不至於華且好也惟已之華好猶思與人共之雖敝無憾則人之華好在此無羨在彼無媢非所謂不忮不求者乎自世以科目取士士子得失之相形有大於衣敝緼袍與衣狐貉者矣安成伍成均奮起世科之後領薦於鄉試預貢于春官而以額溢小却乃能泊然不以得失入於其心是可嘉也矣嗟乎成均今日之偶失利不以人遺已為憂他日而遂得雋其思與人同其樂也必矣故以子路之言志亞於曾㸃之浴沂者告之且使其駸駸於聖賢之事當自此始也慶鎦一山八十序廬陵鎦公一山先生明年八十鄉俗於其初度之日豫致耄耋之慶子松州判官省吾適留京師將謁朝之縉紳士為歌詩歸以娱其親謁予為之序余謂省吾曰水陸之竒南北之産籩豆之珍脆筐篚之麗宻咸萃輦下君幸至於斯思所以為尊公壽者捨彼而取此何歟省吾曰不然吾聞君子致其愛敬於親養志為大口體次焉君何責我以口體之奉乎且口體固不廢也親志之所樂為之子者豈不知其所在乎此吾之所以有請於縉紳士也余謝前言戲君耳雖然當廣君之意以告同志昔者衛武公年九十有五猶諷其大夫官師日誦雅以相告戒夫衛公固以是為進徳之助然而音節之和有以宣其湮鬱聲文之美有以導其愉悅衛生延年之道其有以加於是乎詩曰為此春酒以介眉壽介之為言助也介必有祝頌之辭辭意而已矧歌詩者又有益於壽乎願以是為作者之倡云
