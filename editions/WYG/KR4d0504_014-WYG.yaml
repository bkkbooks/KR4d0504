body:
  text: 圭齋文集卷十四元歐陽𤣥撰題䟦北行録士生休明之代區宇混一意之所之踪跡皆可以逹即其耳目之所覩記搴英攬華託諸翰墨論議之間異時竒聞偉績因是以有徴於來世也廬陵季元凱挾其吟詠之學卓犖之才其至京師與當代名縉紳􅇵談雄辯周諮國家之巨麗而升平諸福之物舉集一時於是黄鵠朱雁之什人争誦之至於登髙眺逺追懐往哲風晨月夕排遣覉思佳句尤富使之得展所藴於承明著作之地以任揚厲鋪張之風豈不大强人意乎三復降嘆題而歸之安成劉氏家譜往年宗人南記自吉州刺史琮遡歐陽亭侯上及神禹下逮安福府君萬不以地之遐僻族之蕃廣必旁蒐逺羅不少遺譜成且欲合祠吉州刺史安福府君為不祧之祖集宗人之近者節春秋展敬祠下其䂓措不凢用志亦仁矣嘗因堯賔兄序之惜哉南記已矣安成鐂君思清携先世告身六七通求予識其後且眡余家譜上推其祖之所自出下列各𣲖之所同出徴兩漢南宋以上至陶唐氏得姓以來之祖其意亦由南記也余嘉其其敦睦之誼圖分𣲖别得别生分類遺意故為之書且告之曰子歸為我訪黄石宗人之賢者謝曰其母廢譜學母廢祠事庻㡬余猶有望焉思清字清隐於予先世通家又同生癸未今為湘鄉校官家譜則其從弟思復之所圖也西平李氏族譜桓桓西平為唐中興功著鼎彛徳被黎蒸當時賢良風雲依乗如渾侍中如馬北平曽㡬何世系冷如氷惟西平裔趾羙相仍更唐歴宋我元是承設科曰雋試吏曰能守令之選㙜閣之登表表愈偉為時名稱子孫千億蟄蟄繩繩天道之報信哉可凴予書其槩寓勸以懲後之來者於焉斯徴衆芳所存安成劉伯仁號芳所後以扁其齋嗟衆芳之所在宜君子之盤桓巖班璘兮有菊畹紛披兮有蘭朝菲菲兮紉佩文采采兮為餐通神明於鼻觀納上清於泥丸却氛穢而益夀志無昬而氣完襲馨徳乎先哲託髙風乎嵗寒彭功逺先世手澤先叅政冀公曩善廬陵彭君士楚先公上庠髙選雖治春秋能通諸經忍見前代時文散逸每屬士楚收拾士楚至則稇載充牣先公暇日亂紬而泛閲之擇其尤者别彚為帙士楚亦能朗誦先世詩義賔至迭論𤣥兄弟澷不及省先公朂之曰黄册子㑹有行世時兒曹母忽也先公薨之七年科舉興𤣥首擢第追憶先訓㤗定甲子彭公冲所以詩經擢進士為士楚從弟於是其家學益振他日冲所子功逺來京師䄂其曽祖坦軒祖碧野二先生及一門諸父舊業程文盖冲所題識手澤謁余求一言是盖吾先公平日之所購求而士楚之所樂誦者彭氏世科之左劵不在兹乎俯仰四十餘年科目廢而煟興興而歘廢今明詔復飭中書舉行𤣥叨塵從臣初議闕下力賛其成又適秉筆代言播告海内矣會將見程文復盛當世喜而志於斯南谷居士自賛像後士大夫自賛其真例多自抑之辭而生平自知之明往往見於言表如善冩真者引鏡自照以圖其形宜無遺巧𤣥嘗銘南谷翁墓今觀其寫真自賛表裏純誠殆非丹青之所能狀尤非發潛者之所可模冩也至正二年三月余客瀏東厚田湯氏家齊吾弟携此見過因贅數語于後五馬圖卷中五馬龍者其誰如隔腦脂如行烟外如辨九疑而况南山四十萬匹中欲求流雲飛電之姿嗚呼世無伯樂龍者其誰草蟲圖蜂戀其房兮不可以逰蛛待以網兮為有所求曽不知蛺蝶與草蟲兮飛躍之自由娱拙集娱拙集者吾宗歐陽存中甫之作也其中古樂府諸篇情景俱至追議當時近體詩清新俊逸佳句層見是何吾宗人之多才也題曰娱拙雖謙辭實出見觧六朝劣於漢魏得其巧未得其拙也晚唐媿於盛唐亦得其巧未得其拙也繼自今拙日進則詩日進矣何當見存中甫重揚確之白麟溪三大字後右白麟溪三大字前中書右丞相脱脱為浦江鄭大和書溪舊號香嚴在縣東二十八里白麟則大和二十六世祖之名也有惠淮者字季淵實白麟十九世孫由遂安遷溪上易以今名示有先也淮之孫綺至大和凡六世大和從子鑑至某又三世皆同居共財一門雍睦海内稱孝弟者首推浦江鄭氏朝廷表其門曰孝義嗚呼源之逺者其流長鄭氏自白麟至今二十餘世矣其遺澤之逺不啻溪流之無有終時公特書是以寵之者蓋將朂其門相為悠乆哉字畫方毅酷類顔真卿觀者孰不改容不待賛也歐陽文忠公墨跡䟦𤣥生平所見兖國文忠公真蹟甚多其篇帙大者於同年許安陽家見昆陵胡文恭公墓銘藁百丈輝上人所見州郡名急就章胡氏碑行草急就章皆微渉行楷余家所藏佳者曰與杜祁公蘇明允書及晚年三乞致仕表草皆筆法如一獨祁公書端謹結體頗若蘓氏父子豈非蘇氏感公之至初年倣公之書後充拓自為一家體邪兹來叙族至早禾田歐氏見集古題名碑䟦而歐氏在楓樹下者又出與留守學士書見示皆名墨也第書中貺字兩用雖貺况古文通然意若有所謂留守學士者得非田元均乎旅寓乏文字考訂姑識此説以竢博古之君子眉夀二大字䟦至正丁酉九月浦陽鄭深浚常由吏部員外郎除浙西憲僉將行自念先為授經郎學在内府宻邇青坊常獲侍皇太子硯席今日逺役誼當入辭乃因宫臣以見既詢其南歸之由對曰老母年近八十思便侍養是以逺渉鯨波不敢憚勞也儲君惻然顧左右取近日所書眉夀二大字賜之盖以髙其親之年庻以永其子之養也敬惟皇太子天廸仁孝之性於兹一事二羙備焉仁事親之實孝為仁之本皇太子平日視膳問安盡其愛敬之道於三宫冀以寧君親之心説君親之志以蘄君之夀也一旦推其錫類之盛心成已成物之功仁與孝不可勝用矣眉夀始見於豳風之七月老人眉有毫夀之徴也後屢見於魯頌之閟宫今鄭氏在淛東九世同㸑旌表孝義之家也部使者興化羙俗之官深知斯行奉元良心畫以歸心法之正大筆法之端嚴焜燿山川新民觀瞻於是稱豳雅之兕觥効豳人夀君之敬而竭其忠賦魯頌之鮐背保魯侯夀母之樂而遂其孝繼今鄭氏忠孝之祚日熾而日昌其兆在此也深屬𤣥述其實謹書之下方云沁園春𤣥誕日先君冀郡公作此示勉敬䟦于後𤣥子來前還憶汝今朝初度時是吾家㡬世書香閥閲我翁疇昔心地坦夷宅相伊何泛紅老子汝母慈仁有兒如今恨倚門人去和膽為誰丈夫七十何為算三十功名已是遲要經天緯地拓開實用嘲風弄月省可虚詞我亦平生巵言徒費猶酌檐花向九疑團欒好待老吾泉石留汝鐘彛大徳丁未𤣥賤生之日先公祝之以沁園春𤣥受而藏之第年少家貧性亦踈散房中惟有一敗篋以繩約之篋中無所有又以紙外䕶之甚嚴暇日時復展玩明年戊申不幸先公棄捐自是見輙嗚咽殆不忍觀皇慶壬子𤣥免先公喪又二年矣先公在時所定謝氏嵗乆不克成婚繼妣長沙郡君謀為𤣥畢婚姻而𤣥方游湘中繼妣老妮啓𤣥篋取故衣浣濯補紉以俟新婚老妮目不知書篋中文字亦為所持去此詞亦在焉𤣥歸而求之竟失其所遍索十數日無得深自刻責以為不能寳藏先人之訓遂為此生抱恨之大端每至劬勞之日則泣而識之如是二十五年屢嘗籲之先公冀隂相之庻㡬復見此詞以無負付囑之意延祐乙邜以來𤣥僥倖科第歴官中外至元元年乙亥叨恩翰林直學士國子祭酒先公贈翰林直學士亞中大夫輕車都尉追封渤海郡侯尋蒙奎章近臣奏請有㫖申勑詞臣製碑以賜𤣥感激之餘付書還家囑舍弟信翁先白於禰告祭之日諸昆弟子姪咸集中堂姪進老􅃍前曰昨日偶治故書得先祖手澤一紙蟫食殆半乃夀八翁沁園春也兄弟相視大驚曰此汝叔平時徧求而不得者汝何得此衆取視之果然即付書報𤣥京師二年丙子夏謁告南歸立碑甫抵舍姪即以詞見遺𤣥奉詞涕泣如隋珠和璧去而復還自計生平可喜之事未有過此嗚呼異哉詞所謂宅相伊何泛紅老子者謂外大父臨賀府判理齋李公也倚門人去和膽為誰者是嵗免先夫人䘮也嘲風弄月省可虚詞者𤣥少作頗患多故先公以實學朂之也猶酌檐花向九疑者先公分教舂陵時將之官也雖然𤣥之至喜者以此詞之失而驟得則先公若有隂相之也他日或可逭伯魯授簡之責也其至懼者則以先公期待之意如彼而𤣥之踈文謭學所成就若此其何以逭伯符不克負荷之譏乎装既完踪跡所至必携以自随三年丁丑以侍講學士召入京戊寅春以二品恩例申請夏五月進贈中奉大夫湖廣等處行中書省叅知政事護軍追封冀郡公先妣追封冀郡夫人六月甲申祭禮畢因出此卷再寫善本并致所感云男𤣥泣血書于賢良坊寓舍䟦先公與南谷先生書先冀公與南谷居士未及一識族中宜翁為之求書於安福同知王君習齋未幾習齋去官故未及投留之篋笥考其嵗月盖大徳丙午丁未間書則𤣥為子弟時代先公作者也至正壬午十一月𤣥叙族至防里俯仰將四十年南谷先公即世皆乆兩家子弟覽之愴然圭齋文集卷十四
