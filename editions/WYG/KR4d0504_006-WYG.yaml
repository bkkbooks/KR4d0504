body:
  text: 圭齋文集卷六元歐陽𤣥撰記分宜縣官題名記分宜縣袁上邑置逹嚕噶齊縣尹丞主簿尉各一員尹以上省選丞以下部選起至元十三年丙子迄今至正二年壬午六十又七載仕於斯者接踵而邑未有題名浚儀趙君思順以世家文獻來宰斯邑二年官政修舉乃考索故府得前尹名氏到罷歲月悉登載諸石𤣥適訪族邑鈐南防里屬題其端以告來者𤣥嘗謂題石之設官署皆有之本非以為勸善也而其道寓焉士歴官服采人品不齊上焉者不恒有下焉者無庸言中人苟且之政十居八九其志皆為三歳終更身去是即已殊不知身去而名留臧否何可泯也使能以是而存諸心則知官之為恫瘝也久矣雖然謂其身去而不之䘏者非才而闇於事者也求為有名至於生事以厲民者有才而過乎中者也𤣥既為題名有勸善之道則不敢不著近名之弊以為戒趙君為我刻之後之覽者有以自省則吾鈐岡之人繼自今受亷勤之賜而被愷悌之福於無窮也分宜縣學復田記昔前宋咸淳癸酉分宜民曰宋應槐訟其鄉有田稱梁子思所置立户為萬壽菴長明庄者崇法院僧正冲之所作偽也宋田令寺已有常住田不得買民業冲違法私買妄稱梁氏所置故應槐發之漕使鍾某閲實據法罪冲等而沒其田以畀分宜縣學養士士刻石為記其文載縣志甚明越三年宋亡分宜内附其田租歳入學廩前後凡二十有八載大徳己亥庚子縣學直學鎦應丑死其子自昭受崇法寺僧錢盗以本學砧基簿賣之由是僧恃力奪田學雖有文移在官求與僧論直而儒多寒酸學官滿三歲率去力莫能競僧挾其有餘之資又歳收所奪田租以助其力故訟連年不决延祐間江西僉憲薩勒迪黙色按問至邑攷覈始末以田歸學僧又爭之既而奉使宣撫及江西行省理直如前田復歸學僧徳旻者往愬宣政院院逹之都省省循例移行省體勘其是否行省檄下袁州路路以其事付錄事判官克哷决之克哷惟僧言是聽僧又誘刑餘之人冐儒名者曰宋應祥赴官誣伏怯烈輙以學田歸僧公論咸不直之學乃有詞展轉歲久本路専委縣尹趙侯思順研究尹詣田所集耆老佃人詢知固學田也會宋應槐子從吾出前主學徐祺印信徴租之文以為左驗先是自昭盗賣學籍於僧學無其副田之條叚四至無所於考至是得從吾之文疆界瞭然尹乃周諏密訪備實上於路議以田歸學路質於憲僉憲巴延適按部力主其議憲掾某相之路推官鄭時中又屢言之尋得行省儒學提舉范君匯悉以其實告藩垣大臣咸直趙言遂以田歸學如初寺主大有坐是爭亦敝罷歸咎始謀赴官入凖伏状願遵分宜縣所斷以田復分宜縣學為業第數内有水田四十畝及山園地大有舊所佃者乞减輕租額仍付耕種歲輸學租尹再三審之以其親書入案而徐議其所陳乞於是四十餘年之訟一日而絶諸儒礱石請文以記予乃大息而言曰天地間物人各得主其所有者以時王之法為可恃也在法可則物已物也在法不可則非己物也僧違法而田歸官則田非僧物矣官以田與學學受田於官非受田於僧也神聖受命易世凡前代之所予欲亦惟其是之從耳世祖皇帝在位崇儒之詔累下其以膳學錢糧為養士之資者既久則分宜之學田實在其中矣成廟即阼又明有諸人母得侵占學田之㫖由是考之分宜縣學之主是田也在宋之日甚淺在皇元之日甚深由丙子内附至於庚子二十五年間田固學有也僧於斯時未嘗起而爭之也直至劉自昭盗賣砧基之後始生詭謀則其枉直較然易知也已國家近年田令民間田宅僧道不得為隣不為隣者不使買民産也後至元以來又著僧道買田之禁使正冲私買在今日之法亦豈得為寺業乎嗟夫士四民之一僧亦自民出者也王官奉命以司王民之直於斯二者豈容心於其間哉事枉則必復事直則易斷趙侯之明能信其直故無疑也田在儒林鄉土名良歩等處計一頃二十三畝三分六釐歲入租七十三石二斗一升又有一山園地計五頃四十三畝一角亦在其處云是役也儒之宣力者曰某特附著於斯求志堂記安成彭君自堂名其讀書之所曰求志二季㓜學尊聞以文來贄而謂予曰先君子作求志堂而有齎志於斯者以未有記也願為我成之予乃記之曰隱居以求其志行義以逹其道吾聞其語未見其人先儒釋之曰求其志者守其所逹之道逹其道者行其所求之志唯伊尹太公足以當之其次則顔子庶乎此而未及有所行故夫子為是嘆也以是言之大哉翁季之名斯堂也夫雖然昔人名斯堂也非不知人之以㤗議我也王子墊問士何事孟子曰士尚志及問所為志則曰仁義而已矣伊尹太公顔子之三聖賢亦豈能外仁義以為志乎故士志三聖賢識者猶不可謂泰未聞志仁義而議其為泰者也予嘗憫夫世之人求在外者求不必得而鮮有憚於求者何其多也今賢翁季能求在我者而已又何泰堂俯廬江揖孤山偭安成郛前有樓扁清髙有亭扁會文又有楹臨池曰知樂足領一郡之勝斯則自堂所以遺其後人為藏修㳺息之地者也世綵堂記渌江廖氏自其先代積善於家施恵於鄉世保醇徳居多耆年至宜山府君子孫衆多茀禄豐腆晚歲康健身享榮養歲時上壽綵衣成行才俊疊見里人榮之因取宋名臣廖剛用中甫家世綵舊號為其堂扁余家距渌江數舎雖未獲升世綵之堂而先内翰於宜山公友契兩家子弟往來稔甚有名士元字泰福者廖氏之令器也謁余以斯堂之記余惟世綵之得名自老萊子為嬰兒之狀以娛其親始余嘗評之老萊子愛親之心純一無偽一時感觸發不容遏故忘耄耋之齒服斒斕之衣追童乳之態以冀其親萬一之歡在其當時已非不知親非不悟二者之天相契深愛其所為喜蓋有不期然者不然一時嘻咲之適何能使人千載之下想像而稱道如是其盛耶在禮子事父母之飾剪髪夾鬢親在子雖老不敢去之不敢忘赤子之初也深衣之制具大父母父母衣純以繢然則老萊子之綵容或上古之世有父母者之常服歟戲之為言将以取鷇等事而云耳雖然吾於此有以語廖氏子弟矣孟子曰令聞廣譽施於身不願人之文繡也君家用中甫之為中執法也守正不阿名震逺邇當紹興時其曾大父母年九十竊意髙堂垂白之親見其曽孫負一世之名公退委蛇偉然羔羊素絲之風志夫南陔白華之養其為世綵也斯亦大矣古之孝子出而治官入而治家周旋進退于夫婦昆弟朋友宗族鄉黨之間如執玉捧盈惴然自持者無往而不為事親之地也親之可悦與否非敢計也求無怍於已庶無怍於其親矣吾願廖氏世世子孫之升斯堂者推是心以為立身顯親之道焉雖中執法之事業可能也豈獨踵其美名而已哉國家混一初年宜山公以薦受宜山縣簿尉壯歲勇退不仕近年賑饑募民入粟補官公發數萬貤爵不受朝省旌表其門又為義廪凡宗族親戚及里之貧者婚姻䘮塟輙助其不及殣無殯者為棺以給之割田數百畝為義舎百區以館從學之子弟禮聘名士以教之余嘗為之記平居奉已清約遇人謙撝獨好施予如此子膺福號玉峯泰福號納菴伯仲皆肖其父生長華腴而能被服詩書殊無膏粱之習故所友多名士大夫其他子姓之賢者未能悉數云坦明堂記古杭山水之秀莫秀於屬邑之臨安蓋錢武穆王之鄉也其民多豪爽而俊邁章君子明居是鄉鷄山之陽胸次磊落所向通敏壯逰四方名士大夫樂與之交余近年因侍講楊廷鎮識其人於京師余老告歸瀏上逺來訪余曰昔也冠而字父兄命之曰子明拜而受之自是服行平生凡澷漶淟涊之事秋毫不敢匿於厥心以求無負於父兄命我以明之意今作堂於其家因扁之曰坦明願聞一言以自警余進而告之曰易有之乾以易知説易者曰人之所為如乾之易則其心明白而易知夫天之為道幽且逺也究其所以然亦惟坦明而已爾語曰君子坦蕩蕩君子之異於衆人能存乎天也故其類為陽小人不能存乎天也所以回互紏結闇昧嶮巇人莫得而測之故其類為陰豈獨使人易知哉在已亦易行也人已無忤焉往而不坦蕩蕩乎今子明志趍於明而心措於坦知先務矣守之以不欺行之以不息他日為君子之歸孰能禦之其别授之以辭辭歸而列之於坦明之堂以為記繼善堂記鎦性存者安成人也居鄉以孝弟聞客醴泉十餘年士君子咸尚其信義頃因其友浙人章子性明來求余繼善堂三字既而求予文甚勤予得無言乎夫孟子言性善至矣盡矣易大傳言繼之者善也成之者性也詳其㫖意性未賦予以前善已具於是乎蓋易言一陰一陽之謂道具於陰行於陽繼言行也陽之所施凡見諸萬物發育之功者無非善也萬物生而是理賦焉受是理以生者斯之謂性成言具也道具於陰行於陽知斯二者之蘊則造化之能事畢矣是故善即性性即善繼之者此善成之者亦此善也人能明其善以復其性則抱負二氣以為人可以無愧於兩間矣乎吾聞安成醴泉皆多明經之士而性存儒家子其以斯言講求之精道堂記吾宗性翁居安成郡北之鳳林實安福府君之五世孫逹明處士之裔世次於兖文忠公擘𣲖為近十有一世府君號精道居士父子祖孫相繼科目一門凡五六贊府嘗即舎傍别作新居以處伯子攸縣丞季子平陽縣丞自於故居作一書院名曰精道堂與仲子光叔子幹居之世代變遷子孫榮悴不齊幹之後有委棄其先業者於是堂之基址兼并豪家鞠為榛莽性翁於是又八世孫奮自樹立慨然復之尋得尚書謝公艮齋故題堂扁乃除故址作㕔事一重樓一重堂一堂之北楣揭精道堂故扁既而具始末謁文宗盟以訓後裔余辭不獲乃記之曰在易有之日往則月來月往則日來寒往則暑來暑往則寒來陰陽屈信以成萬事萬物之變何有紀極也尺蠖之屈以求信也龍蛇之蟄以存身也精義入神以致用也利用安身以崇徳也斯又吾身之所為屈信也堂在居士之身信也久矣屈於中葉性翁信之繼自今居斯堂者亦惟修人事之有恒以制氣化之靡定可也惟能内外交養則精義崇徳之為屈屈可進取致用利用之為信信可長守矣嗟夫精之為言察乎理欲之㡬順理者無不裕從欲者無不危裕則堂日以興求去夫從欲之危耳為吾精道子孫尚勉之哉堂作於至元後戊寅之十二月壬子成於己卯之正月辛未遂遷居焉至於庚辰子舎連舉二雄陽類之信自此乎始故特記之讀書堂記廬陵永和蕭尚賔為醫十有一世能根柢儒業非但縁飾表襮而已也六世祖子信能屬文善胡忠簡公公予田贈金辭薦以官又辭問所欲則曰富貴非所願但得世世子孫讀書立身以廣活人之功則亦足矣忠簡笑曰君所謂薄於利而厚於徳者乎書讀書堂三大字以遺之使以朂其後人焉至其大父震甫號竹軒又繹其説曰醫道由儒書而出非精於義理者不能舎儒而言醫世俗之醫耳尚賔之父徳祥乃拓室之東偏作讀書堂揭忠簡公之扁以志其先訓焉尚賔㳺京師具顛未謁余為之記夫儒者讀書以正心術為務醫者讀書尤以正心術為急心術正則學術亦正心術偏則學術亦偏正則人受其賜偏則人與已皆為所累矣近世儒家子孫往往擢科第人以為有陰徳行斯陰徳自心術始故為蕭氏願之聽雨堂記人生俯仰穹壤間耳目之所觸心志之由生士君子仕而慕君則見日而思長安出仕而思親則見雲飛而思親舎索居而思朋友則見明月而思故人兄弟友愛一日而逺别則聽夜雨而思同氣近代眉山蘇長公送弟子由之官有夜雨何時聽蕭瑟之句後世弟昆之在宦逰者往往諷詠而致思焉安成大姓周君士能生以遺腹其兄士𢎞亦六周星而孤㓜同艱貞今也競爽皆以儒弁服綵明時士𢎞今龍南縣大夫士能今南豐州幕官子叔量又辟為公府掾一門宦業鼎盛而南北相望道逺時時追懷少年之况味真有蘇公之所深思者乃作堂於家扁曰聽雨以志毣毣焉先是士𢎞有樓曰歸雲余嘗記之至是叔量致尊公之辭請記斯堂以文嗟夫君也親也弟兄也朋友也人之於綱常一也日也雲也月也雨也人之於見聞一也其感於外而動於中有淺深焉此士君子之所存異乎常人者也雨注於霤其聲鞺鞈滴於階其聲淅瀝馳於竹松其聲屑窣春而聽之有發生之意兄弟之和氣怡愉以之秋而聽之有寂靜之容兄弟之神凝慮逺以之所以然者豈有外至哉予同母兄弟五人今皆黄髪之叟予晚廹召命力疾而至京師因叔量之請蓋諗知聽雨之状而能述以言者焉遂以是記霞外菴記宇宙間雲霞雨露同一氣也而有别焉雲陰霞陽雨露生物為陰中之陽霜雪反是以能肅物也今夫朝霞雨徴陽亢盛足以變陰陰則雨矣暮霞日徴陰盛猶不足以勝陽詰朝其出日乎道家有大霞之號即純陽之異名也是故其珮曰飛霞陽精騰上佩之可歩景矣其食曰飱霞陽氣充實食之可却粒矣道士亟取於霞蓋如是與壽昌觀周允中鍊師作菴名曰霞外謁余文記之因與論陰陽之妙且慨夫田野作勞之人朝夕而候雲霞詎知陰陽之理有如是哉若允中之謂外意其别有超然之識離於二氣之表者斯則方内之士何足以知之永思菴記永思菴者安成王君宜逺廬其親之墓而作者也宜逺之先君子是為梅邊先生梅邊初入太學尋丁外艱自以不得與大人永訣終其身不願仕奉大夫人至孝三十年不懈大夫人亡廬墓者三年孝感昭著宜逺天性純篤才氣超邁被先生身教世以孝行聞鄉里先生疾晝夜扶持衣不解帶者二年先生殁慟至嘔血㡬絶乃蘇既塟結草如繭寢處墓左哀至悲泣苫草為腐風雪豺虎不避久之母命再三乃歸服闋猶不食醯醬蔬果今宰木已拱言及其父哀如初䘮毎食稍甘必遣人馳奉墓所歸乃就食里人表其阡曰白華所居曰永思然皆非宜逺意也其友劉君省吾來京師具言永思菴之所始謁余記之予之在京師也四方之士來謁為其父兄求記其樓居齋室者蓋多若永思菴者則友人懼其行之無聞於世而記之者也孟子言五十而慕者於舜見之曠千百世而見一五十慕親之人至終身之慕猶推而知之則孝子之永思不既難乎梅邊於先君渤海侯為同舎而又同甲有通家之好感良友之誼記不得辭宜逺名留孫弟初逺名壽孫孚逺名敏孫來逺名州孫學行皆能肖其父兄云臨溪亭記安成李君鼎翁好賢而篤義里大夫士樂其善而親其賢而鼎翁又能同其物外之樂固自樂之存諸中者沛乎其有餘裕也家居枕溪水上作亭並溪以醉翁滁亭記語名亭書來暨圗屬予記余少年有山水癖壯乃為禄仕今老矣未能去壯之累而時有少之趣聞客談幽居之勝恨不欣然舎已而從之况見吾鼎翁之圗乎何時與臨溪分坐俯闞清流毛髪可鑒潛鱗游泳不避人影清風舒徐漪漣回旋悟溪之有文也霜瀨激湍石齒玉雪喜溪之能聲也摇琴而歌曰溪之水深且清兮我濯我纓溪之水清且深兮我濯我心纓有塵兮尚可心有累兮溪將無以澣我外潔靜兮中明娟我與溪兮各全其天歐公為此文時余扈從上都歸則公已謝疾去明年十月鼎翁之子本禹求予書歐公年未六十欲分臨溪之樂予垂七十而書此可愧矣揭傒斯識竹西亭記安成郡南劉君定宇强仕之年蔚有雅操即所居西偏闢圃作亭圃有林竹内翰揭公因名其亭曰竹西定宇又因以為號聞予至其里中遣子仲炯謁予為斯堂記因思昔人之名宫室往往指實而已爾或識其耳目之所接或識其時序之所遇或識其面勢之所居魯之壇曰杏齊之宫曰雪東觀曰東南門曰南比比皆是後世務加美名古意泯矣善哉揭公之名亭亭在竹西據實而已爾且詩六義興多於比記竹西亭類曰主人清脩盖取諸竹主人疎直亦竹是取竹與主人雖或不辭譬如燕相得韓相書言舉賢治國治則治矣如本指何衞淇澳之詩固美武公其言菉竹不過興爾所謂猗猗青青果何預於瑟僴赫喧者乎説詩者不以淇澳菉竹為比吾記定宇竹西求詳於竹殆不可也定宇盛年進懷用世之志則有幹蠱之子可任以事務退為山林之趣則有嘉遯之地可怡其性情斯則作亭之意不可不記也是為竹西亭記其樂亭記宜春士駱秉哲名其燕憇之亭曰其樂吾兄南翁嘗館穀於其家以秉哲之意來求文記之予謂昔之君子於其藏修游息之所有所懲則名有所慕則名惟有所得以名斯志喜也其樂云者孔子以稱顔子者也近代周茂叔教程伯淳兄弟尋仲尼顔子樂處所樂何事聖賢言樂率皆引而不發欲使學者自有所得爾未得而尋必有其方也已得而居必有其處也樂不可以言喻而可以學求處不可以力到而可以學致故非學無以知方非得無以知處秉哲從事於斯久矣今以著名其亭從可知矣乎予謁告來歸亦思從容名教之樂何時徑造其樂之亭從主人問其樂之處也
