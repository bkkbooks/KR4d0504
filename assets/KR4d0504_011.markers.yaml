  - {type: variant, offset: 1052, length: 4594, content: 髙昌偰氏家傳偰氏偉兀人也其先世曰暾欲谷本中國人隋亂突厥入中國人多歸之突厥部以女婆匐妻黙棘速可汗為可敦乃與謀其國政唐史突厥傳載其事甚詳黙棘速卒國亂婆匐可敦率衆歸唐唐封為賔國夫人而黙棘速故地盡為囬紇所有暾欲谷子孫遂相回紇囬紇即今偉兀也回紇甞自以其鷙捷如鶻請扵唐更以囬鶻為號偉兀者囘鶻之轉聱也其地本在哈刺和林即今之和寧路也有三水焉一並城南山東北流曰斡耳汗一經城西北流曰和林河一發西北東流曰忽爾斑逹彌爾三水距城北三十里合流曰偰輦傑河回紇有普鞠可汗者實始居之後徙居北庭北庭者今之别失八里城也㑹髙昌國㣲乃併取髙昌而有之髙昌者今哈刺和綽也和綽本漢言髙昌髙之音近和昌之音近綽遂為和綽也哈刺黒也其地有黒山也今偉兀稱髙昌地則髙昌人則回鶻也髙昌王有印曰諸天敬護護國第四王印即唐所賜囘鶻印也言諸天敬護者其國俗素重佛氏因為𣑽言以祝之也暾欲谷子孫既世為偉兀貴臣因為偉兀人又甞從其主居偰輦河上子孫宗暾欲谷為始祖因以偰為氏焉以河名也相傳暾欲谷初為國相適當唐天寳之際唐以安氏之亂求回鶻援兵暾欲谷與太子闕特勒帥師與討安禄山有功封太傅忠武王進位司空年百二十而終傳數世至克直普爾襲為本國相答刺罕錫號阿大都督遼王授以太師大丞相總管内外蔵事故國人稱之曰蔵赤立属㓕里棘脫脫伯吉叛合刺山王三召克直普爾至則言扵王曰脫脫驍勇未易力攻臣少與親善彼不忌臣可以計取今與王期以七日當斬其首以報乃先遣家僮徃取㓕里棘馬百疋脫脫使追之則紿追者曰丞相取馬載葡萄酒見汝主爾追者返以告脫脫喜迎之扵郊握手歡甚饗公畢謂曰今日易營初脫脫置七行營三日一易各以嬖夫人攝之謂克直普尔曰公其少需我先徃遅公至既行乗日從後大呼止之脫脫止陽曰有宻語請屏左右脫脫如其言乃奮曰私㤙公義有難兩全者吾奉王命取爾首耳亟㧞劒斬之左右股慄不敢動持首白王王恱賜玉深郡地暨牙里于斯博和思于斯二山狐白裘一初兵出阿忽爾河河水素湍急俄而水止國俗以為水寐占者曰禱之必有應公以裳盛水祝曰願子子孫孫勤勞王家其熾如火其續如䋲以忠以孝永保令名言訖以水灑河河水湍流如初又甞盛暑袒跣卧大樹下鴞鳴樹上心惡之攬衣起且鞾鴞下爪鞾者三方怒提之毒蛇自上堕地頼鴞免扵螫戒世世子孫勿殺鴞及死之日有神人跪請曰帝召丞相以劍擊柱斥之神㓕公以是年卒葬玉深郡西五里曰闊尓禄名之曰辛子岳弼龍國相為答棘罕阿天都督太師大丞相仍兼通管内外蔵事七子長曰逹林次曰亞思弼曰衢仙曰博哥曰博禮曰合刺脫因曰多和思亞思弼二子長曰仳俚伽帖穆尓次曰岳璘帖穆尔仳俚伽生而敏慧年十六襲國相答刺罕時西契丹方强威料髙昌命太師僧少監来圍其國恣睢用權奢淫自奉王患之謀扵仳俚伽曰計将安出仳俚伽對曰䏻殺少監挈吾衆㱕大蒙古國彼且震駭矣遂率衆圍少監少監避兵于樓升樓斬之擲首樓下以功加號仳俚傑忽底進授明别吉妻號赫思迭林子第以暾欲谷之後世為其國大臣號之曰設又曰沙爾猶漢言戚畹也未㡬左右有疾其功者譛扵王曰少監珥珠先王寳也仳俚伽匿之盍急索勿失王怒索珠寳甚急仳俚伽度無以自明乃亡附國朝我太祖皇帝賜以金虎符獅鈕銀印金螭椅各一衣金直孫校尉四人飲食供帳殆擬王者仍食二十三郡㝷賞銀五萬兩以弟岳璘為質仳俚伽殁髙昌諸部塗哭巷吊歲時祠之岳璘精偉兀書慷慨以功名自許貲算悉以卑兄子身無私焉年十五以質子從太祖征討多戦功皇弟幹真奏求師傳上命公公訓導諸王子以孝弟敦睦仁厚不殺為第一義上聞嘉之中原諸路悉命統治既而從平河南徙鄼縣民萬餘戸入樂安以便摳拊㝷授河南等䖏軍民都逹魯花赤佩金虎符并賜宫女四人所得賞賚悉㱕故郡以散親舊且盛陳漢官儀衛以激礪之國人聚觀咋咋豔慕道出河西所過榛莾或時乏水公為鑿井置堠居民使客相慶稱便太祖皇帝即位以中原多盗選公充大斷事官從斡真出殿順天等路公布徳化寛征徭盗遁姦革州部清整㝷復監河南等䖏軍民年六十七卒扵保㝎今贈宣力保徳功臣山東宣慰使謚曰荘簡多和思二子次曰撒吉思風儀魁岸識度宏廓蒞事寛猛適宜𥘉為諸王斡真必闍赤領王傳事王薨長子質卜早世嫡孫塔察㓜庶兄脫忒狂恣欲廢嫡自立撒吉思與火魯和孫馳白皇后帖列聶氏乃授塔察以皇太弟寳襲爵為王撒吉思以功與火魯和孫分陜黒山以南撒吉思理之以北火魯和孫理之從憲宗攻釣魚山建言乗勢㝎江南必有駿功上嘉納之命世祖取武昌王取淮安東西並進未㡬上崩斑師集闕阿里博哥睥睨神噐諸王多附之王亦首䑕進退撒吉思聞之馳見王力言世祖寛仁神武中外属心宜専意推戴若猶豫不决則失機非計也王從之世祖即位授撒吉思北亰宣撫賜宫人甕吉刺真氏及金帛章服洎至鎮鋤齦姦革邪除穢遼東以寧㑹髙麗有異意上遣使究切則委罪扵弼臣洪察忽械送京師道遼東撒吉思訪知洪以直諌忤意故即奏䟽為直前謾上命釋洪俾討叛黨平之山東李璮反奉詔偕諸王哈必赤等東征應㑹决機轉戰數十合生得璮戮于市復濟南益都等五十餘城哈必赤欲屠之力争曰王者之師誅止元惡罔治脅從扵是釋囚繫返流逋歸剽掠吹枯蘇僵簡節踈目傳檄四封輿情大恱授資徳大夫山東行省大都督遷經畧統軍二使兼益都路逹魯花赤辭不拜上言山東重鎮宜别選貴戚臨之上不許因賜京城宅一區益都田千頃及李璮馬群園林水磑海青銀䑕裘等甞慕古人舉親舉讐之節惟才是用或以子姪為幕僚或以里閈知舊為文學官或以叛帥舊卒為部曲将不頋身嫌專為國計公論多之兵後民有田乏牛具為之上聞驗民丁力官給以牛人得肆耕李璮故将毛璋率諸部謀執之以附江南璋黨秃鐂懐其恩以璋謀上變乃襲璋斬之統軍抄不花畋逰無度害稼病民元帥野速荅爾等豪㩀民田以為草地随事表聞得㫖執抄不花减死杖之勒野速等還故土山東諸郡與宋人接境時見侵掠乃㧞膠莱與宻等州丁壮屯沂莒以逼連海宋邉帥丁某懼以所統来降其為民捍患為國拓土類如此推賢譲能知人善任名臣宿将多出其門碩望雄才餘五十載忽一夕星殞于舎年六十四卒于京師之南城山東父老相與刻石紀勲徳焉今贈安邉經逺宣恵功臣資徳大夫河南江北等䖏行中書省右丞上護軍追封雲中郡公謚曰㐮恵岳璘十子長曰益弥勢普華次曰都督彌勢普華曰懷来普華曰都爾彌勢曰八撒普華曰旭烈普華曰和尚曰合刺普華曰獨可理普華曰脫烈普華都爾彌勢初從撒吉思討李璮以功奏為行省郎中繼除愽興沂州監都㑹丞相伯顔督諸軍取宋慨然曰吾世受上恩此立功報國之秋也吾其從戎乎撒吉思嘉其忠謁丞相舉以自代乃與從子撒里蠻俱隷丞相麾下與攻襄樊進兵陽邏堡順流至丁家洲宋相賈似道出視師迎戦奔潰都爾彌勢為前鋒引大軍乗勢逐北與宋殿帥孫虎臣戦于焦山破之陞蔣安撫翼監戦復攻常州得雋陞斷事官江南既平擢安豐路逹魯花赤行省以其㢘能署䖏州路逹魯花赤時新附之民懷携阻兵每單騎招降兵不血刃人以四哥佛子稱之後見平章阿合馬竊柄張甚耻為詭随居閑養晦五年日本之役以為征東都元帥又與丞相阿塔海李牢山等異議辭行巳而阿塔海等果敗運使盧懋以言利擢中書右丞欲引為叅知政事知懋不可與共事亦辤不拜後懋果以罪誅遷同知浙東宣慰使司事東陽賊楊震龍作亂郷民或為賊應卒討平之朝廷以江浙財計至重命為行省郎中及桑葛當國屢欲援為助固謝不就遷太平路逹魯花赤同時平南大臣如丞相蒙古臺髙興國公史弼河南王卜隆吉台皆以兄禮事之一時善辭命都爾彌勢與阿里齊名行省凢有入奏必命之徃每至上前開陳是非得失披析解駮如指諸掌上嘉賞曰惟卿及阿里言事能稱朕意爾阿里後秉鈞衡而都爾彌勢官止廣西憲使卒哈刺普華倜黨有節㮣好義如嗜欲恤窮若姻戚臨危蹈難徇國忘身兒時父以斷事官治保㝎㽞之侍母奥敦氏居益都一日忽作而嘆曰㓜而不學有不堕吾宗乎即趍父所自白父竒之俾習偉兀書及授語孟史鑑文字記誦精敏出扵天性李璮之亂奥敦氏挈季子脫烈普華避地登萊間音問隔絶號泣徹晝夜㝷從撒吉思平亂山東卒購獲奉以歸人以為孝感所致撒吉思深加噐重自謂才具不及言扵世祖召給宿衛甞以王事至益都扵四脚山中置廣興啇山二冶以勞授今符商山鐡冶都提舉未及代以職譲厥弟天兵南向饋運繁興𬒳選為行都漕運使帥諸翼兵萬五千人從事飛芻輓粟夜警晨嚴軍資以濟南北混一與有功焉事平上封事大要言親肺腑禮大臣以存國家之體興學校奨名節以勵天下之士正名分嚴考課以㝎百官之法通泉幣却貢獻以厚生民之本又言江南新附宜昭舊族振滯賞懋力穡通啇弛征薄入以撫馴其民不然恐尚煩宵旰之慮廟堂多采用其言属漕米二十萬石由邦溝逹于河舟覆損十之一而又每斛視都斛為虧五十分斛之三時阿合馬秉政責償舟人合刺普華伏闕抗言量之踦贏出扵原降而水道之虞非人力有弗戒彼雖罄其家不足以償若朝廷必不任虧損臣獨當其辜而巳上命勿治執政柄者憤無所泄則詘公監寧海路後遷江西宣慰使未之官改除廣東轉運塩使兼領蕃市舶時盗梗塩法陳良臣等扇東莞香山東州負販之徒萬人撞搪相和江西行省命與招討使荅失蠻討捕之先驅斬渠魁以訊馘告躬抵賊巢招誘餘黨復業仍條言塩法之不便者悉祛其害按察使脫歡大爲姦利劾奏罷之群盗歐南喜僣王號僞署丞相招討衆號十萬因圖上其山川形勢及攻取之䇿三十餘條建言揃刈弗亟其勢長聲生蔓延未已遂與都元帥課兒伯牙宣慰都元帥白佐萬户王守信等分兵搤之功最諸将無何右丞唆都督兵征占城交趾素多其智勇属護餉道比至東莞博羅二界中遇劇賊歐鍾等横絶石灣其鋒銳甚扵是慷慨語其下曰軍饟重事也望風退縮以誤國計吾弗為也即身先士卒且戦且行矢竭馬傷徒歩格闘踣數十人勇氣益厲以衆寡不敵為所執賊欲奉之為主罵曰吾方岳重臣肯從汝為逆耶正有死耳遂遇害扵中心岡時至元甲申二月之十九日也年三十有九是夕夢夫人希台特勒氏曰廣㓂之亂吾死矣言已乗雲而升夭矯如龍徑西北而去知事鐂閏張徳亦夣城門有金榜合刺普華衣金甲指麾其中謂曰吾今治此煩若二人為功曹翌日凶訃至俄而閏徳相繼死時群寇未息官軍追捕邦人徃徃見其乗騅督戦或聞空中隱隠金皷聲咸驚異以為神繪像祠之生平将兵理財部伍分明禁令嚴肅凢所施置後為法程敭厯中外以才幹稱以死節著中朝罕儔也贈通議大夫戸部尚書上輕車都尉賜號守忠全節功臣謚曰忠愍希台特勒封髙郡太夫人盛年寡居貞操凛凛義方有嚴二子長曰偰文質次曰越倫質文質甫十歲刲股以愈母疾粤之人士謂忠貞孝三節備扵一家故相與繪為圖傳觀之既長名迹獵獵稱其家延祐初守廣徳治法風聲為諸郡最㑹朝廷經理江浙田粮行有以番陽官吏不稱職委訊其事至則用法外意治貪猾吏為民害者闔郡稱快改授通議大夫潭州路總管潭為大郡既至興利除害執法不阿當道嫉其軋已者搆誣以罪事既白遷贑州路總管㝷佩金虎符同知廣西宣慰司事副都元帥㑹桞州慶逺賔州徭民叛領兵數千進以榮誘賊黨擒其渠魁侯十九龍半天等一十三人以歸賊衆望風奔潰降者㡬萬人復置屯田為守備計開通故道以絶其負固之念省垣憲府交章論薦謂其有文武才畧如古良将遷正議大夫吉安路逹魯花赤中書甞檄徃廣西海北審断所至明决既而引年休致家于豫章東湖之上子五人曰偰玉立登延祐戊午第今翰林待制朝請大夫兼國史院編脩官曰偰直堅登泰㝎甲子第今承務郎宿松縣逹魯花赤曰偰哲篤登延祐乙夘第今中順大夫僉廣東道肅政㢘訪司事曰偰朝吾登至治辛酉第今承務郎同知濟州事曰偰列箎登至治庚午第今從仕郎河南府經厯越倫質蚤歲警敏篤學無子弟之過未仕而殁贈從仕郎山東東西道宣慰使司都事一子曰善著登泰㝎丁卯第今承務郎天臨路同知湘潭州事文質甞謂玄曰吾宗肇基偰輦今因以偰爲氏盖木本水源之意也且髙曽以来勤瘁王家翊興大業而俛仰陳非托之文家大懼湮没無以示来者謹具世次履厯以清玄惟太史公論賛夷齊顔跖反覆致意扵天道報施盖甚惑焉每讀之輙廢書而歎以為古今同一轍也及觀偰氏世磊砢相望勲節在國利澤在民雖汗簡所書何以尚此諸季起家擢科如射命中異時泓涵演迤碩大顯融無落扵其世識者巳有以覘之則是溉根而食實售物而取償天之扵偰氏獨昭昭不忒如是異乎前所聞矣使造物報施每率是道天下有不樂為善者㦲又惟别生分類古之道也偰氏逺稽前聞遡厥本始以垂方来綿延百世遂為中州著姓實自今啓之厚之至也凢此皆余所嘉稱而樂道者敬撮其實為作家傳後之秉筆紬金匱石室之書者則或有徵扵斯文, WYG: ''}
