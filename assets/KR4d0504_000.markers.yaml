  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書集部五圭齋集别集類四元提要臣等謹按圭齋集十五卷元歐陽元撰元有拯荒事畧已著録元早以文名平生三任成均兩為祭酒六入翰林三拜承㫖凡朝廷髙文典冊多出於其手掲傒斯作元集序稱有曰詩流者三卷曰鈆中者十卷曰驅烟者十五卷曰強學者十卷曰述直者三卷其門人王師模所編明宋濓序則謂原集一百餘冊皆燬於兵惟存辛夘至丁酉七年之作二十四卷其孫祐持編錄之此本詩賦四卷文十一卷附録一卷題宗孫銘鏞編集又非祐持之舊矣孔齊至正直記曰歐陽元作文必詢其實事而書未嘗代世俗誇誕時人謂文法不及虞集掲傒斯黄溍而事實不妄則過之然宋濓稱其文如雷電恍惚雨雹交下可怖可愕及乎雲散雨止長空萬里一碧如洗實亦未減于三人也虞集道園學古錄有送元謁告還瀏陽詩曰憶昔先君早識賢手封製作動成編交游有道真三益翰墨同朝又十年葢集父教授于潭州見元文大驚手封一帙寄集曰他日當與汝並駕齊驅故集詩云然然則元發軔之初聲價已與集相亞矣乾隆四十三年五月恭校上總纂官臣紀昀臣陸鍚熊臣孫士毅總校官臣陸費墀欽定四庫全書集部五圭齋文集目録别集類四元卷一賦頌卷二五言古詩七言律詩排律卷三七言絶句卷四歌雜體卷五記卷六記卷七序卷八序卷九神道碑碑文卷十墓碑銘卷十一阡表哀詞卷十二經疑書義策卷十三詔表冊文銘説卷十四題跋卷十五贊疏書啟祝告文卷十六附録}
