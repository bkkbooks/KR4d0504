  - {type: variant, offset: 5106, length: 232, content: 明年正月十有一日諸孤用治命奉公柩葬于故廬之隂曽大父方勞問繈屬公内給大夫人甘膬之需外脩諸士友綢繆之好晚况殊適環堵蕭然戸屨常滿興至觴詠賔主盡歡髙談善謔傾倒四座酒酣取古人詩文擊節而歌聲沮金石踈髯古貌臞如列仙睥睨世故無足芥其胸次者一日飲傍舍莫歸沾醉就寝丙夜家人聞呻吟起問安公曰吾舊疾痛亘心膂歲常殆今二十年復作其不瘳乎詰朝更數醫皆郤其藥不飲七日忽宵興正冠而坐召諸子語不及他唯以不得終養大夫人為恨言訖而瞑皇慶壬子十二月二十有九日也年五十有三疾𥘉作周夫人已卧病公卒七日周夫人亡明, WYG: 眀}
