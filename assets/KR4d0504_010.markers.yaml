  - {type: variant, offset: 15903, length: 366, content: 詞章及科詔頒悉如公所爲教故髙第冡嗣以取科名校文鄊閭門生多擢髙甲在衡山時部使者涿郡盧公摯廣平趙公厲皆時名公一見輒遇以老成在岳陽行中書省平章魏髙公昉㧞自筦庫舘之幕下屢以行省提舉薦不報迨其爲政勤扵治民而䟽扵奉上故當時惟賢者知公玄與中丞浚儀馬公祖常侍御濟南張公起巗叅知政事相臺許公有壬同朝暇日論及同年士五十有六人二十餘年聚散不常井沉不齊其間存亡疑信㡬不忍詰至扵鐂公則徃􅉨相視有荀慈明愧陳太丘之色適翰林編脩和逹来自淳安䏻言公幅中深衣每月𥘉吉陞座講書淳安士庶聴講無倦致邑中風俗丕變玄明日白諸公曰方今宇内州路縣大夫皆有師帥之責扵其民其能服先王之服誦先王之言卓然以承流宣化爲己任者甞屢見其人乎諸公方懐論薦公遽不起噫命也夫公葬象環先生衡山先塋之原名其阡曰岷衡因號我山銘曰誰謂岷逹百川其攴誰謂衡髙景行斯齊誰謂公死遺書在兹遺書在兹使我悲之銘者是用不費于辭, WYG: 裔}
