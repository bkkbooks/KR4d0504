  - {type: indent, offset: 5032, content: 　　　, id: KR4d0504_krp_007-bkkind17}
  - {type: variant, offset: 5032, length: 996, content: 潛溪後集序經筵檢討鄭君濤以金華宋濂先生所著文集徵予序予為之言曰三代而下文章唯西亰為盛逮及東都其氣寖衰至李唐復盛盛極又衰宋有天下百年始漸復于古南渡以還為士者以從焉無根之學而荒思扵科試間有稍自振拔者亦多誕幻卑冗不足以名家其衰又益甚矣我元龍興以渾厚之氣變之而至文生焉中統至元之文龎以蔚元貞大徳之文暢而腴至大延祐之文麗而貞秦定天曆之文贍以雄涵育既夕日富月繁上而日星之昭晣下而山川之流峙皆歸諸粲然之文意将超宋唐而至西京矣宋君雖近出其天分至髙極天下之書無不盡讀大江以南最號傅學者也以其所藴大肆厥辭其氣韻沉䧺如淮隂出師百戰百勝志不少懾其神思飄逸如列子御風翩然褰舉不沾塵土其辭調爾雅如殷鼎周彛龍紋漫㓕古意獨存其態度多變如晴躋終南衆皺前陳應接不暇非才具衆長識邁千古安能與扵斯雜扵古人篇章中盖甚難辨唯真知文者始信予言之弗謬予在翰林也乆海内之文無不得寓目焉求如宋君何其鮮也苟置之承明奉常之署使掌制作豈不能黼黻一代乎先民有言曰知言聖賢之能事立言學問之極功不學知言不能明理不學立言不能成文有若宋君其殆理明而文成者歟因書以為序宋君字景濂濂其名也嘗著人物記二卷余為序之鄭君謂其可擬五代史記亦公論云易問辯易之為書上通神明之藴下該事物之理以變易為用以㑹通為方其初立名起義如是其為說宜無窮焉漢以來易專門師多於五經而其疑尤多千有餘年未有紀極族子貞歴考諸家之異同質正先儒之論議𥘉名易疑後改曰問辯凡三十卷用功精深可尚也吾宗巽齋先生為曽大父冀郡公作經訓堂記言歐陽氏經學司馬氏史學由三代而下伐有其人盖六經甫出孔氏之壁歐陽氏即以八世博士世其學其來豈一日哉司馬氏史學至宋君實復振歐陽氏經學我六一公易有童子問詩有本義凡宋儒以通經學古為髙寔公倡之故余見貞是編喜吾歐陽氏經學亹亹其不絶乎抑是編豈獨便埸屋之習山林窮經皓首之士見之未必無助我之歎也貞為我勉成之鈐南道士歐陽賔實詩集序嘗有客論詩言古今僧之能詩者甚多道之能詩者絶少予曰軒轅彌明柰何客曰或以爲崆峒道士鄒訢類也余曰嵇叔夜陳子昻李太白爲詩識者謂其辭有飄颻凌雲之氣盖道家者流之餘風焉道士學之其爲詩何以加吾宗歐陽賔實寄興老子法他日以所作詩帙遂來求序於余余讀之愛其清緻而有體其間幽間之容冲抑之氣又有因詩而足以知其人者以是知嚮之論詩之言之未信也雖然余扵賔實猶有甚可喜者焉近日龍翔首座海東淖以能詩深爲蜀郡虞先生所賞識亦歐陽氏也今賔實詩聲日起豈非吾宗多文人秀士寓跡方外尤能以所學知名四方歟東淖白水族賔實防里族云, WYG: ''}
