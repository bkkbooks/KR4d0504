  - {type: variant, offset: 2654, length: 0, content: '', WYG: 患厥後迄夫淪胥滋以病衆斯二弊者吾實恥之今及汝約恒産髙下推次惟女工稍多寡陳力惟汝官不督廹吏無徴呼汝某治甲汝某治乙我惟示成有不樂者疇抑汝配於是父老曰便富民曰宜言訖飲酒罷而與期及期子來並手角能植者用壯承者用隆幂者無窳者無壚裓者砥平磨而甓之丹者黝者藻者繪者無或漫漶後先工訖完美如一窔從衡楹數百計悉前所陳煥若新作侯乃練日共具牢醴合樂落之又進父老及諸富民爵如初儀為之言曰維此宜春郡治奕奕山川發靈神降純嘏暘雨時若有年穰穰民富以教士秀而文吾幸處此與爾同休去即傳舎凡厥洵美汝世}
