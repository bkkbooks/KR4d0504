  - {type: variant, offset: 6559, length: 834, content: 髙山仰止自予言始則幸甚遜齋記有一言而可終身行之者乎聖門髙弟固嘗有如是之問矣近代有行之者司馬君實之類是也盖人之一生苟有得扵一言而合於道則其生平精神心術凢見諸行事者莫不扵此取則焉故雖言也而可勝用哉君實之扵實自為兒時至扵相天下終始惟一言也然則守約之道顧不至當歟呉君禮遜佳子弟也學殖之務尤孜孜焉嘗請於予曰吾於遜一字也深有慕而未能願仍遜以自號何如余曰㫖哉言乎非所謂一言而可終身行之者乎夫遜也者吾黨之士入門第一義出門第一程也在禮入學鼓篋即以遜為先說命亦曰惟學遜志盖吾之扵道慊然如有所不知而後人告我以知退然如有所不能而後人告我以能謙以受道抑以從人兹非入門之第一義乎夫子曰義以為質而遜以出之義之在人猶物之有幹也然辭焉而弗婉色焉而弗愉則嚴者愈嚴而義有不可直遂者矣婉辤足以逹意愉色足以致和兹非出門之第一程乎今吾禮遜學道則猶升堂而望入室者也渉世則積跬歩而至千里者也舎遜何所偱而進何所齎而行哉雖然遜以出之又不可不信以成之也信以成之則如君實之守其實而後可也孟子曰孟施舍之守氣又不如曽子之守約吾扵是亦云譚氏肖山記民生扵三事之如一人言師有父道不知父亦有師道也父有師道則取之近而見之的信之確而慕之深故能用心專成效速也然則人之有賢父兄天下之樂孰加此哉余從攸士聞譚君古山之賢二十年盖嘗周旋群公先正間猶能衣𬒳乾淳以來之風裁者也今年至是邦雖不及識古山幸友其子天球中剛外和之麗行則攸學無少長䟽戚咸謂余曰天球今之古山也故自號肖山以著其志而天球亦出璜溪丁魁所書肖山二大字且言吾有丁字寳之有年君其為我發揮俾不至湮欝幸甚余扵是有復扵天球曰古之師其親者周公伯禽晋文㐮師功業者也茂羅良辟強師才智者也太史氏談遷鐂氏歆向師文章者也然皆君子所務者也君子之所師惟其道相似而已昔者顔氏子之扵夫子也歩亦歩趍亦趍亦扵其道而已故夫子有視予猶父之言然孔顔非真父子也矧其真乎且道一也古山之學學孔子者肖山之學亦學孔子者也苟䏻速肖其道焉豈獨肖其親而已㢤儒者自孔氏言必稱聖賢不得以為僣古山諱用顔氏子字而字曰希聖豈非希顔而學孔子者乎故用是以相肖山之志, WYG: ''}
