  - {type: variant, offset: 4205, length: 0, content: '', WYG: 延祐乙夘予初擢第國醫鎦仲宣訪余旅邸時醫道甚行方被恩寵但見論議辯說予􅐁無少貸心恐其不見容於同列也泰定丙寅余召入朝詢其近况衆醫曰仲宣謁告歸矣至正甲申余以總裁三史之命晚嵗復入詞林中仲宣亦至自南中比初鬚髪蒼白而不少衰後輩亦嚴憚之未幾從余求東山序浩然有歸隠之志公卿貴人偶有難已之病衆醫相視縮手思吾仲宣而不可得矣去冬予以病告老歸瀏上客有薦鎦君仲賔為予診候問之仲宣乃伯氏也其取藥服之無疑知其世醫為可托既獲其效尤敬其為人仲賔身居市肆而無商賈計利之心口誦醫書而有儒者救世之志是可尚也嵗莫别予還安成予賦詩贈之曰}
