  - {type: indent, offset: 1418, content: 　　　, id: KR4d0504_krp_014-bkkind14}
  - {type: variant, offset: 1418, length: 916, content: 大師右丞相畫墨竹右墨竹一枝大師右丞相所畫以遺其舘客授經郎鄭浚常者也丞相天資明叡知識過人一日得文與可竹譜學之即臻其妙觀其枝葉面嚮柯幹節脉皆與可法而筆意老蒼與近代李薊丘諸人所作逈然不同浚常在相府直言不阿又多引拔善類為長史甚得體相君雅愛重之故受以心畫云御賜石刻千文搨本後題今上皇帝得智永千文命近臣摹勒刻置宣文閣中所拓墨本從官之有文學者則識以宣文閣寳而賜之授經郎浦陽鄭深浚常嘗侍上經筵故預是賜可謂稽古之榮也夫金璧珠寳天下貴賤之所同尚者也國家以旌有德賞有功扵所同尚者而不靳焉所以示恩也至扵法書名書遇彌文之代時君聖性好古則其所尚有重扵金璧珠寳矣於其文學侍從之臣不靳其所獨尚者而賜之所以示異恩也鄭氏浦陽義門九世同㸑朝廷嘗旌之今浚常以斯文又膺是賜愚故願義門之子孫世世寳之上以無忘聖天子好古博雅之志下無以忘乃祖父漕遇之由足以垂乆逺矣䟦逺林鐂君墓銘後前代士大夫非居憂人不敢以銘墓情非此則奉勑或契友族属尊行與座主舉主也今常愽鐂君文廷制中作逺林劉君墓銘文字簡古又得古式故特表而出之䟦王大年詩帙余從王實初先生得其族孫徳生詩賦一帙讀之翩翩然渥洼竒駿筯骨甫壯肆其馳騁未有紀極也他日範以王良造父之法納之和鸞大輅之下則才氣老矣三復題而歸其帙䟦劉士行墓誌銘廬陵䖏士劉士行父以經學名家曩予在京師國學進士解子元甞請序其詩文矣今其弟解觀又以邵菴虞公所為墓銘求予跋失廬陵九老以忠節文章顯國史書之天下宗之士行讀其書誦其詩論世尚友顧非斯人之徒與抑卲菴之銘至矣予奚庸贅族祖澗谷先生留藁䟦至正壬午十一月予訪族至鈐岡之防里縣大夫浚儀趙侯尚之因休日時來勞既而又專其舘賔羅君孺文與其子璉求鈐岡題名記等作時予又之別族之安成孺文踪跡余所至暇日敬問其先世則先軰澗谷先生之從諸孫也先生分教長沙時先尚書澹軒先生居郡泮前廡道同志合友誼彌篤既去官書問不絶咸淳甲戌先冀公以混𥙷入國學先生時為權院留臨安貽書相慶以為先尚書宣力學校之報内附後猶數有書於是予與孺文叙先世通家之好聚首數日驩甚将別出先生長沙藁一帙視予帙中或手自抄或筆更録朱墨如新皆所點校歛袵讀之如從先世與先生㳺詠碧湘翠麓間也獨詢其適傳則有如徃時湘中之所傳者使人不能不係之以感慨士大夫寓形天地可託者二一曰有文二曰有後二者未必得兼不得巳而去則有文庶無憾也, WYG: ''}
