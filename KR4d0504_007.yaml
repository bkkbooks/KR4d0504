  text: 圭齋文集卷之七宗孫銘鏞編集
  hash: sha256:d762f9eff19d5f833ff0f67a996d024dbb5b5b5ade773e5ca474e8cbe5366450
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_007-1a}
body:
  text: 安成後學劉釪校正序防里歐陽氏族譜序歐陽氏之初望出兩郡千乘中絶今存者皆渤海裔也其譜牒視他姓氏宜為易考又自唐以後譜學久廢我文忠公最先倡之其譜牒視他姓氏宜為先備今或不能然則以子孫衆多轉徙不常也吾家自趙宋淳熙丁酉髙祖八府君自防里遷瀏之馬渡曽大父宜軒先生自馬渡遷長沙大父淡軒先生及先太常渤海伯復居于瀏聞八府君在時間歲一至防里由曽大父而下仕學四方至者蓋鮮獨幸我族屬不可鄙夷而得敘其世次焉頃豫在朝防里族兄竒翁先生遣姪勞豫京師去年謁告南歸又勞豫于家且囑敘其譜焉余方約為譜亭之行當得備詢而悉載之未幾豫環之使至是以不果來也因念吾宗之盛儒者又多譜或不一致貽先正巽齋公之恨然以豫今日之事觀之又何恨乎昔人耶雖然族譜之作將以重倫紀厚風俗使其子孫知源委之所自足矣必求如唐人之譜學自受姓以來皆有可考則固有難者矣無已則用吾文忠公之法姑敘防里之近者焉則庶乎其可訪求也譜留豫所半載逮將北行乃敘而歸之竒翁以俟他日彭氏族譜序分宜彭氏其先東漢長平侯宣居淮陽傳九世至北齊陳留王樂居安㝎又八世唐禮部侍郎景直居瀛州子搆雲避天寶之難遷江右傳四世為安㝎王玗居廬陵玗兄弟五人為太尉者四子十一人人皆檢校大傳大保六曹尚書諸鎮刺史孫二十七人相繼登進士第為顯宦五世孫嗣慶復遷分宜縣南之珠溪今珠溪族甚盛或隱于林麓或顯于王門卓犖豪傑世不乏人或明經而修進士之業者殆不可量豫嘗讀彭氏家傳王雄據一方士馬精鋭數與淮陽爭衡湖南馬楚為之請于後唐錫爵崇貴迹其材智英毅豈下五季諸雄哉惟能自處沖抑不竊位號故其子孫衆多美譽不墜此殆鬼神之福謙者歟傳又言王亨年九十有八繼學不衰子弟從授二戴禮及春秋者千餘人非有絶人之資不至是也抑彭氏世有聞人爵為侯王長平侯以文學陳留王以武功安㝎王資兼文武繼自今為子孫矩矱先訓箕裘先業文武以應國家之需則是顯融者豈有既哉珠溪之彭吾防里之歐陽族望相同婚􅊚相繼故敘是譜不辭白石周氏族譜序六朝以來家有譜系之學又有譜系之書隋經籍志載天下郡國族譜若干卷吉州譜八卷洪都袁州稱是江右諸郡詳他郡也唐世此學此書盛行五季淆亂四方割據馬􅎋在湖南獨能輕徭薄賦又招納賢者故中州名家士多歸之後以希聲兄弟爭國士稍稍散去今觀廬陵周氏族譜言其先世避地江淮丁馬氏亂復徙金陵蓋唐末自中州依馬氏及亂而遷此亦當時之一族也但譜云江淮當作江湖殷境土未嘗及淮考之馬氏失國既久南唐始亡周氏府君羡仕唐至僕射理宜然也由僕射迄今冠蓋不絶屢遷而不替則周氏之德其盛可知矣孫名師韓者有志于譜久備録而刻之猶子諒以刻本至京視余求志其帙夫譜學廢譜書亡巳久余何幸見古道于周氏然余嘗以杜君卿作通典詩譜書具存而杜不紀録為可恨今則無所於購矣適承敕修經世大典偶見周譜因附著豫感于斯且志吾廬陵之人尊尚氏族其來甚逺也後林周氏譜序廬陵周叔量以其族譜謁余序其端豫序南北大姓多矣求其自受姓以來世系不絶厯厯然可考者鮮蓋由世變相承或斷續于南北六朝之離合或散逸于五季列國之紛爭往往而是也唯代有聞人出而振起之及有卓識之士當世變之來善擇地以處則族可至不絶譜可至不墮也豫觀周氏始遷周原逮漢之爵徹侯者有其人又降而為魏慱士厯晉至北周為長安之周甚盛涉陏至唐中葉府君璟顯融于時至四世威遭世有難避地金陵五世矩事南唐為御史晚愛廬陵山水之秀可居遂依郡公楊竦而家焉即今之西昌宋𥘉有曰史館學士有曰光祿僕射皆傑然表于其族淳化而下宦業日盛朝廷賜其所居里曰爵譽六世倩又嘉安成泉石之勝曰後林而徙居之內附後子孫亦能輯其前聞由是詩書之澤與爵譽相輝映蓋九世于兹矣叔量受知當揆𬒳選為公府掾會有特旨省臺通用南北士遂應令首為御史臺掾遷臺照磨進中書檢校官因思近代名公卿有自以先世或閾于偏方不獲有聲于中國及貴徙居中州頗為士論所少今觀叔量之際遇則為子孫相攸唯當以山水風俗之美若地里之僻左自當遇大同之世推一世之公也雖然居者種德以芘其後行者畜學以發其身亢宗之道在是而已爾叔量名浩學行偉然時譽歸之後林周氏之復盛其昉于斯乎廬陵中州劉氏族譜序前代藝文志載郡縣氏族書甚多士君子若唐路氏宋吕氏明譜牒之學學者亦不乏人近世氏族書散失士于譜學無聞中州故家屢更兵燹仕者投牒天官曽大父大父或犯其諱其族譜可知矣江南內附多不煩干戈承平既久冠蓋之族幸遭明時涵濡深仁往往治其家譜不知者以為一家之私事知者則以升平之氣象可觀于此至正壬午十月余訪族就醫于宜陽道經南泉與中州劉君西巖及宗海會于山中出其所修族譜視余徵余敘其事廬陵劉氏之顯者獨多于郡中州族自廣平來始祖紹聞府君傳至今厯十有七世詩禮相仍簮紱相踵試閲其編支分派别昭然在目西巖宗海二君之用心可謂勤矣豫族宜陽而家瀏居間屢欲訪族而阻疾聞族有善醫往即之中途見劉氏族譜私竊自喜知吾族之必可訪疾巳者幾半故因其請而樂敘其帙端紹聞歸宋積官運使其子有與金陵李氏姻戚者蓋大姓也其詳見王城山先生及宗海自敘云國朝名臣事略序應奉翰林文字趙郡蘇伯修年弱冠即有志著書初為胄子時科目未行館下士諅言詞章講誦既有餘暇月筆札又富君獨博取中朝巨公文集而日録之凡有元臣世卿墓表家傳往往見諸編帙中及夫間居紀録師友誦説于國𥘉以來文獻有足徵者彚而稡之始疏其人若干屬以其事中更校讐􅌨去而導存抉隱而搜逸久而成書命曰國朝名臣事略他日余與伯修同預史屬從借讀之作而歎曰壯哉元之有國也無競由人乎若太師魯國淮安河南楚諸王公之勳伐中書令丞相耶律楊史之器業宋啇姚張之謀猷保㝎藁城東平鞏昌之方略二主楊徐之詞章劉李賈趙之政事興元順德之有古良相風廉恆山康軍國之有士君子操其他臺府忠藎之臣帷幄文武之士內之樞機外之藩朝班班可紀也太保少師三太史天人之學陵川容城名節之特異代豈多見哉至于司徒文正公尊主疪民之術所謂九京可作我則隨武子乎乾坤如許大人才當輩出伯修是編未渠央也姑志余所見如是云廬陵鐂氏通鑑綱目書法後序昔司馬文正公變紀傳為編年作資治通鑑朱文公稍變其法且寓所去取焉是謂綱目讀是書者夫人以為春秋三傳之遺意也夷考文公生平於易詩書禮或自傳注或寓門人皆有成書獨春秋缺焉至胡氏傳又􅉨􅉨信未之確然則綱目何為而作耶蓋嘗求之春秋者魯史舊文説者謂直書其事美惡自見初未嘗拘拘于義例者愚蓋不敢必以其言為非也若司馬公則志存鑒戒巳見于著書之名而豫奪權衡時有所憾文公患之故有是作焉𥘉意固有間矣書王宗周天下是時有與周同稱號者乎黜魏帝漢有説也乾侯之公在是也房陵之帝王乎帝乎故知是書于春秋所以異之迹則知所以同之旨矣推二大節引而申之書法斷不誣矣近時儒者疑為文公未脫藁之書或疑為門人之作皆未究所以作綱目之志云爾廬陵鐂先生研覃於是三十餘載比辭而核研推事以求度綱舉目張如指諸掌曰通鑑綱目書法亶其嚴乎余從友人鄂省宰屬馮君子羽得而讀之三復歎之曰春秋微公榖啖趙諸説猶可綱目微鐂氏書誠不可也何時歸青原故鄊願即先生一二而揚確之姑志余説于帙末忠史序忠者盡己之名也天以事物當然之理賦于人人盡其所當然者而無憾焉是之謂忠今語人曰臣事君以忠與忠恕之忠同則莫不駭然以為非而實然也或曰臣盡臣道于君忠矣子盡子道于父何獨曰孝乎曰不然也禮記所謂內盡于已而外順于道忠臣以事其君孝子以事其親其本一也此即吾説也然則上盡其所當然于其下其名曰何曰盡有不敢不勉之義上下之間必有别也故盡之對為推即恕矣程子嘗謂忠恕一也事上之道莫若忠使下之道莫若恕後儒疑之未喻此也人生而靜動與物接即有盡已推己二者出乎其間識者知其然固無一息而非吾效忠之時也是道也所以事君所以事天詩曰昊天曰明及爾出王昊天曰旦及爾遊衍亶其嚴乎番易楊玄翁有見于此矣大父通守左軒先生當宋季官守以正直聞臨難以死節著玄翁慨慕先志作忠史十餘年成書于是上下數千年臣子大義粲然畢具微而一言一行苟無愧于盡已者悉録之又微而裔夷小邦婦人女子之操不遺也又極而心迹形似之間皆有以核其實是非瞭然不繆于古人何其至公而當也嗚呼自忠之説不明士大夫平居無涵養省察之功蒞事無鞠躬盡瘁之志立朝無直言極諌之風至于臨難死節能保其必然也耶嗚呼宇宙間此道明即天地變化草木蕃不明即天地閉塞賢人隱甚可畏也余為國子博士時職當校獻書既表章之猶恐玄翁著書之志未白也故述忠説于斯嗚呼是書果行于世也夫書之幸也夫世之幸也夫虗籟集序古人之詩𬒳之絃歌其入人之深猶有待于聲今人之詩簡牘而已或一字之工一言之妙真能使人心存而不忘以是往往知音于千里之外會心于百世之下求其所以然而莫知孰使然非天乎愚讀秀江縣春洲詩清曠簡逺擬古精到有韋栁風而自名其集曰虗籟嗟乎瓠者吾知其為匏筒者吾知其為管今吾與春洲神交冥漠于不識不知之鄊讀其詩愛其人吾不自知吾為何心此蓋南郭子綦之所為隱几者耶抑又聞逹人之詩猶治世之音人未逹世將治有識者察焉天地間有無相推虗實相感聲之妙萬物者其在乎此孫君勉乎哉吾有以知君矣題而歸其詩至正條格序至元四年戊寅三月二十六日中書省臣言大元通制為書纘集于延祐之乙卯頒行于至治之癸未距今二十餘年朝廷續降詔條法司續議格例歲月既久簡牘滋繁因革靡常前後衡決有司無所質正往復稽留姦吏舞文臺臣屢以為言請擇老成耆舊文學法理之臣重新刪㝎為宜上乃敕中書專官典治其事遴選樞府憲臺大宗正翰林集賢等官明章程習典故者遍閲故府所藏新舊條格雜議而圜聽之參酌比校增損去存務當其可書成為制詔百有五十條格千有七百斷例千五十有九至正五年冬十一月十有四日右丞相阿魯圖左丞相别里怯不花平章政事鐵穆爾逹識鞏卜班納麟伯顔右丞相搠思監參知政事朵兒職班等入奏請賜其名曰至正條格上曰可既而群臣復議曰制詔國之典常尊而閣之禮也昔者周官正月之吉始和大宰而下各以政教治刑之法懸之象魏挾日而斂之示不敢褻也條格斷例有司奉行之事也甫刑云明啓刑書胥占其所從來逺矣我元以忠質治天下寬厚得民心簡易㝎國政臨事制宜晉叔向所謂古人議事以制之意斯謂得之請以制詔三本一置宣文閣以備聖覽一留中書藏國史院條格斷例申命鋟梓示萬方上是其議于是屬玄敘其首篇玄乃拜手稽首揚言曰人君制法奉天而行臣知事君即知事天敬君敬天敢不敬法書曰天命有德五服五章哉天討有罪五刑五用哉易曰雷電噬嗑先王以明罰勑法又曰雷電皆至豐君子以折獄致刑二卦之象為電為雷所以明天威也繼自今司平之官執法之士當官蒞政有徴是書母瀆國憲母干天常刑期無刑實自此始亦曰懋敬之哉奕序古者人生入小學比及弱冠而禮樂射御書數六㙯之事巳遍習矣他日因射之餘意為投壷且寓禮焉因數之意為奕且寓智焉其初皆足以養其良心而合乎張弛之道者也投壷之説見禮記奕之説孔孟嘗及之世傳堯以丹朱以智教之以奕雖未必然然奕有算法存焉足以導智容有是也今小學之教久廢而二事以為伎精之者往往名世焉廬陵嚴德甫善奕𥘉集奕法為書晏文可故家子也乃以家藏諸譜又增益之奉禮青城楊君以書來為之求敘將鋟諸梓以廣其傳豫性狷且拙以賤力學乏暇于琴于奕皆懵然每為大夫士所哂楊君之請愧不能言奕之幽眇以答之姑敘其所知者如是考古臆説序昔誠齋先生解易取史事以證爻辭安成李廷傑上書取史事以言時務皆能極事變而盡物情非特足以垂來世之戒推而行之有足以救當時之弊然非學博而義明焉能援據如是之精核論訂如是之詳切耶舉子學䇿套于燈窗求籠簟主司之問立志已在于進取為論何怪于迂踈廷傑此作志在祛時蠹而起民瘼豈切切為功名計耶宜其剴直而無諱明白而可行也間中閲此知山林中有識時之俊憂世之士如廷傑者第未用爾用則于斯民豈無所禆益乎鈐岡續忘序郡縣之圖志何為而作也國有賢守令猶家有賢子孫守令保圖志以治分地子孫保關券以治分業能治其所有即為賢矣因田野之有㝎界也而考其有汚萊者乎因户口之有㝎數也而考其有流亡者乎因賦役之有定制也考其在公者有湮沒乎在私者有暴橫乎因士習之有舊俗也考其有可匡直而振德者乎有可濯磨而作新者乎治之而無倦則田野可闢户口可增賦役可均風化可以日美人林可以日盛矣然則圖志可一日而關乎分宜有縣起宋雍熙至南渡嘉㝎間謝令謀作縣志尋復不果淳祐黃尉始克成之混一以來更六十有七載浚儀趙侯尚之為尹百廢具舉乃作鈐岡新志以續前編書成適豫敘族至邑南之防里侯以豫于是邦實多桑梓之誼以序見屬辭不獲則願以昔人治官如家之責告夫求芻于吾邑者庶知前人作圖志之意非徒以廣紀載備考訂而已將以為勤政之一大助也推本作者之意黽勉述者之事吾邑吾民其多幸矣乎風雅類編序風雅之道先王治天下一要務也風即風以動之之風雅即雅烏之雅以其身能動物也本于邦國播于樂府薦于郊廟以考風俗以觀世道尚矣然惟其聲不必惟其辭故有聲而無辭者有之無聲而有辭者無有也孔子論韶舞本惟其聲武王所遭遇與舜不同世儒因其不同而優劣之未必聖人意也周衰風雅道熄既而聲音之學寖廢無已而求言辭之間則後世詩為近蓋其志氣之盛衰意趣之高下音節之淳漓于風俗世道猶有可考者是以君子有取也袁君懋昭作風雅類編介豫宗姪貞為之求序見其凡例強人意甚多以世代次序此得詩譜遺法起四言至樂府止五言七言絶句論建精詳去取簡當他日書成于風雅豈小輔哉余嘗典司太常又嘗出為觀風使者留意兹事而弗克遂偉哉袁君是編其為我趣成之潛溪後集序經筵檢討鄭君濤以金華宋濂先生所著文集徵豫序豫為之言曰三代而下文章唯西亰為盛逮及東都其氣寖衰至李唐復盛盛極又衰宋有天下百年始漸復于古南渡以還為士者以從焉無根之學而荒思于科試間有稍自振拔者亦多誕幻卑冗不足以名家其衰又益甚矣我元龍興以渾厚之氣變之而至文生焉中統至元之文龎以蔚元貞大德之文暢而腴至大延祐之文麗而貞秦定天曆之文贍以雄涵育既夕日富月繁上而日星之昭晣下而山川之流峙皆歸諸粲然之文意將超宋唐而至西京矣宋君雖近出其天分至髙極天下之書無不盡讀大江以南最號傅學者也以其所藴大肆厥辭其氣韻沉雄如淮隂出師百戰百勝志不少懾其神思飄逸如列子御風翩然褰舉不沾塵土其辭調爾雅如殷鼎周彛龍紋漫滅古意獨存其態度多變如晴躋終南衆皺前陳應接不暇非才具衆長識邁千古安能與于斯雜于古人篇章中蓋甚難辨唯真知文者始信豫言之弗謬豫在翰林也久海內之文無不得寓目焉求如宋君何其鮮也苟置之承明奉常之署使掌制作豈不能黼黻一代乎先民有言曰知言聖賢之能事立言學問之極功不學知言不能明理不學立言不能成文有若宋君其殆理明而文成者歟因書以為序宋君字景濂濂其名也嘗著人物記二卷余為序之鄭君謂其可擬五代史記亦公論云易問辨易之為書上通神明之藴下該事物之理以變易為用以會通為方其初立名起義如是其為説宜無窮焉漢以來易專門師多於五經而其疑尤多千有餘年未有紀極族子貞歷考諸家之異同質正先儒之論議𥘉名易疑後改曰問辨凡三十卷用功精深可尚也吾宗巽齋先生為曽大父冀郡公作經訓堂記言歐陽氏經學司馬氏史學由三代而下伐有其人蓋六經甫出孔氏之壁歐陽氏即以八世博士世其學其來豈一日哉司馬氏史學至宋君實復振歐陽氏經學我六一公易有童子問詩有本義凡宋儒以通經學古為髙實公倡之故余見貞是編喜吾歐陽氏經學亹亹其不絶乎抑是編豈獨便埸屋之習山林窮經皓首之士見之未必無助我之歎也貞為我勉成之鈐南道士歐陽賔實詩集序嘗有客論詩言古今僧之能詩者甚多道之能詩者絶少豫曰軒轅彌明奈何客曰或以為崆洞道士鄒欣類也余曰嵇叔夜陳子昻李太白為詩識者謂其辭有飄颻凌雲之氣蓋道家者流之餘風焉道士學之其為詩何以加吾宗歐陽賔實寄興老子法他日以所作詩帙遂來求序於余余讀之愛其清緻而有體其間幽間之容沖抑之氣又有因詩而足以知其人者以是知嚮之論詩之言之未信也雖然余于賔實猶有甚可喜者焉近日龍翔首座海東淖以能詩深為蜀郡虞先生所賞識亦歐陽氏也今賔實詩聲日起豈非吾宗多文人秀士寓迹方外尤能以所學知名四方歟東淖白水族賔實防里族云梅邉先生吾汶藁序論人行事枚舉而稱之者其善為可數論人文章舉一以蔽之者其善為不可勝數也廬陵梅邉先生與先君渤海侯為大學存心齋同舍咸淳甲戌隨路混輔入學又同生淳祐之壬子先君嘗稱其才器卓犖有往哲風運改世遷篤志稽古蘄為文章以見志豫恨未及一識他日從其門人鐂君省吾得吾汶藁讀之至生祭文丞相文作而嘆曰嗚呼王鼎翁宇宙竒士也士之趣人以自裁者惟朱雲于其師蕭望之然望之特一身計耳鼎翁之為言為天下萬世之為人臣者計也嗚呼雄哉蓋嘗論之斯文者宇宙之元氣也幸而治平措諸事業則為典謨為雅頌不幸而反是則為春秋為變風雅為離騷然正人心扶世教之功難見于治平無事之時而屹然可仗于流離顛沛之日然後知斯文之所繫如是其重歟詩曰德輶如毛民鮮克舉之我儀圖之惟仲山甫舉之愛莫助之夫天人維持之際惟是心耳何其深厚悠長之味溢出言表耶文武之澤在人其未泯歟鼎翁是篇與是詩辭氣雖若不同實相表裏愚故表而出之他詩文竒氣壯節類是環山詩藁序前年與族弟齊吾同客京華暇日相聚齊吾口誦近作豫傾聽移日旅懷為之豁然今年豫謁告還家復相遇于瀏東之沙江出詩藁示豫佳句疊見私竊自喜吾宗之多文人也齊吾盛年子長之逰方壯涉厯日逺覩記日廣吟詠日富大編巨帙當自此始老兄退處畎畒涼竹簟之風曝茅􅉉之日思草池之句得新集讀之亦足以怡暮景矣三復玩味題而歸其帙圭齋文集卷之七終
