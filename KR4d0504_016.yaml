front:
  text: 圭齋文集卷之十六宗孫銘鏞編集
  hash: sha256:cc0adefd38571c395ae81be4e839a9b9eadb4b6e12a1326d0c5b4dae50df243d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_016-1a}
body:
  text: 安成後學劉釪校正附録元勑賜翰林直學士亞中大夫輕車都尉追封渤海郡侯歐陽公神道碑銘有序翰林侍講學士通奉大夫知制誥同修國史知經筵事臣張起巖奉敕撰奎章閣學士院侍書學士中奉大夫同知經筵事臣巙巙奉敕書奎章閣學士院承制學士中奉大夫兼經筵官臣尚師簡奉勑篆額今皇上即位之三年至元改元冬十一月三十日奎章閣大學士臣沙臘班奏翰林直學士臣玄識翰林論思有勞制贈其考官三品爵列侯欲著之碑銘光移上恩其敕翰林臣起巖撰文奎章臣巙巙書丹臣師簡篆額上曰可臣起巖承詔伏惟延祐初年仁宗聖文欽孝皇帝繼述祖訓建立科舉大廷䇿士臣玄臣起巗賜第拜官為同年皇上御極簡擢侍從臣玄臣起巗代言紬史為同官明詔諭臣俾揚其先烈發其潛德求之臣職揆之友誼皆不敢辭謹按公諱龍生字成叔歐陽氏其先冀之渤海人從晉南渡徙長沙率更令詢以文學顯名陏唐四世孫琮為吉州刺史因家廬陵琮八世孫萬為安福令故又有居安福者安福府君而下四世曰效三子謨託逺託徙吉水後吉水析置永豐傳二世是為宋大師兖國文忠公之考崇國公其他子孫散處安福邑境雍熙𥘉割安福置分宜縣隸宜春郡故居安福永豐者籍廬陵居分宜防里者籍宜春而安福分宜地相去不滿五十里公防里族也别號防里歐陽氏曽祖安時及祖新皆漕試湖南愛瀏陽山水之勝又徙居焉新字仲齊以經學著稱淳祐未荆溪吳公子良漕湖南辟廬陵歐陽巽齋守道為嶽麓書院山長又以禮聘仲齊為講書因寓長沙巽齋聆其講説嘆曰長沙自有仲齊吾何為至于此考逢泰字忠叟經術行業師表一方學者常數百人擢科登第相屬也用薦為潭學録安撫司檄與湘潭談景衡履學田堙沒者登故額士廪以羡廬陵羅子逺在教授席賴其佐助為多今贈中順大夫禮部侍郎上騎都尉追封渤海郡伯妣何氏渤海郡君公年十六入潭學巳負俊譽月試占髙第相國古心江公判潭州帖為崇禮齋長又二年從醴陵田氏受春秋三傳甲戌混試國學生湖南終埸萬三千人有竒拔士二十八人公以春秋中第二肄業存心齋時羅教授為朝官以書賀云嚮潭學經界忠叟景衡盡心焉去歲景衡子魁鄊薦今年忠叟子入上庠造物報人不爽如此至元丙子內附侍禮部還瀏陽居霞陽山之白雲莊禮部晚歲究心大玄作律曆統元圖書數十卷因耗心得渴疾公泣諌不為止未脫藁卒公抱其遺書每慟哭至絶左丞崔公斌行省于潭召之以親老辭居山十有七年部使者李淇至瀏瀏有文靖書院祠龜山楊先生淪廢于鄰使者考郡志謀復其舊詢衆求才望士任斯責衆以公對乃􅌹縣尹杜元忠即山中延至會有司例試儒户中選者復其身使者命公考士湘隂瀏陽去取公當人至今稱之憲部薦其才牒宣閫逹之省府授文靖書院山長郡人強之起始受命改築書院猿山之陽踰年禮殿講堂門廡齋舍及龜山先生祠事內外具舉學者雲集書院廪稍不贍佐以巳資夫人亦徹奩具助其經費落成之日升堂講孟子承三聖章言龜山先生傳周程學而及豫章延平𬗋陽朱子實承道統斥王安石配享孔廟功亦可配孟子山林老儒聞書院之復筵講至為出涕秩滿沿牒之亰師贈大傳魯國康里文貞公野齋翰林李文正公抑庵集賢宋公交薦為校書郎行就職矣會集賢言歐陽山長有功文靖書院今瀏陽升中州例設教授師席𥘉筵須宿儒碩望啓迪來學宜移教其邦人便朝論是之改陽州儒學教授至則會學廩可贍二十人月約一十五日選俊秀輔員會食躬親教督諸生皆勤勉自力科場既闢進士輩出實公權輿之遷道州路教授道介兩廣或以為逺公曰兹為周夫子之鄊何逺之有至官郡庠鄰濂溪書院公㝎規約朔望謁宣聖畢教授率諸生謁濂溪祠一日過祠東見老屋數間詢知為西山精舍勝國時祠蔡季通蕪廢久矣祠舊隸郡庠有田百五十畒或利其入欲兼并之故以屋僦軍官去遂不治幸其速壞公立召僕夫拚除按籍得田修其祠郡學田多為豪民據有公請諸憲司被檄往括暑行山間得租三百餘石因感疾歸卒官舍至大元年八月五日也年五十有七諸姑奉柩歸以三年十月三十日葬郡東羅田之木瓜埭公既殁之七年當延佑甲寅玄舉進士魁湖廣省貢明年乙卯以第三人賜第同知平江州遷蕪湖尹𥘉贈公承事郎同知湘隂州事再贈朝列大夫同簽太常禮儀院事上騎都尉追封渤海郡伯今贈翰林直學士亞中大夫輕車都尉追封渤海郡侯初娶談氏一年卒再娶李氏金陵仕族有婦德知書前公四年卒𥘉追封宜人進封渤海郡君今封渤海郡夫人繼室李追封長沙郡君談夫人有子曰浩龍川書院山長娶唐渤海郡夫人有子五長貞孫石林書院山長娶王次㝎孫曲阜林廟學録娶李次玄也今中大夫國子祭酒依前翰林直學士知制誥同修國史娶謝封渤海郡夫人次憲孫幼鞠外氏李沅陵縣學教諭娶湯季彭年舉明經娶周女二長適武岡路教授卜天佑次適瑞州雲石務稅使湯居恭孫男八長慶以教授借住建昌路樂口寨巡檢次暹遹遜逹皆業儒女孫六曽孫男四曽孫女四公儀表峻清瑩晳如玉有膽略幹局性孝友幼歲嘗刲股肉以已母疾兄士卨蚤世撫其遺孤皆有成婚嫁必先兄于而後及已子先疇悉推與之讀書目五行下八歲屬文十五下筆萬言文雄渾有體裁學精敏有識趣尤長于講説義理每講篇出士傳誦之晚號雲莊有經學理窟雲莊講義及所著文集傳于家歐陽氏世以文學名廬陵之族大顯于宋矣宜春防里清門素業文行有傳至于禮部倡鳴經學師道尊嚴表率多士公學為通儒行為士矩宣勞庠序位不滿德維持斯文克肩其任再世如一遺善後人是有良嗣首擢巍科聲華燁然演論玉署黼藻帝猷追封二代有位有土大書表隧恩賁殁存則公父子平昔纘學衛道之報昭然四逹而防里之族克昌以大將嫓美于廬陵矣于乎盛哉銘曰惟歐陽氏廬陵别族有家瀏陽同出安福文忠相宋魁然大儒防里清門世德不孤操義風烈堅持允蹈服膺克繩義方之教三代之英士生其時世其道德以恬以熙至行應古鄊邦攸重士子景從如鳥歸鳯衛道育才再世一心播耰百年有穫斯今綸章載頒秩登侯伯霈恩所覃于渥其澤大君賜命詞臣敬承撰銘發潛匹休廬陵宣昭幽顯帝仁若天垂示無垠何千萬年大元故翰林學士承旨光祿大夫知制誥兼修國史圭齋先生歐陽公行狀曽祖新贈中奉大夫嶺北湖南道宣慰使護軍追封冀郡公祖逢泰贈昭文館大學士資善大夫上護軍追封冀郡公父龍生宋太學上舍生纍贈集賢大學士榮祿大夫上柱國追封冀國公公諱玄字原功姓歐陽氏其先出于夏禹之苗裔漢涿郡太守子孫有居冀州之渤海從晉南渡居長沙唐率更令詢四世孫曰琮為吉州刺史因家廬陵琮八世孫曰萬為安福今故有居安福者安福而下四世曰效三子謨託逺託徙居吉水析置永豐傅三世曰觀是宋大師楚國文忠公之父崇國公逺留安福子孫散處境內宋割安福置分宜縣隸宜春郡故居安福永豐者籍廬陵居分宜防里者籍宜春而安福分宜地相去不滿五十里公為防里族宣慰公試湖南轉運司愛瀏陽山水之勝遂卜居焉淳祐末荆溪吳公子良將漕湖南辟廬陵歐陽公巽齋守道為嶽麓書院山長又聘宣慰公為講書歐陽公聆其講説為之驚嘆昭文公經術行業師表一方若集賢公之行事始終則有今上所賜碑備載云集賢公子四人長貞孫次定孫次即公季彭年公生于至元二十年五月母冀國夫人李氏賀州簽書判官􅈦公事某之女讀書能文親授孝經論語小學諸書公八歲巳能成誦始從鄊先生張貫之授學日記數千言即知屬文十歲有黃冠師至里孰坐㝎周視諸生注目視公久之曰是兒骨格不凡神氣凝逺耳白過面目光射人惜本朝未興科目有則狀元何疑然異日亦當文章冠世聲名滿天下廊廟器也言既而去亟追與語巳失所之集賢公為文靖書院山長部使者某至州謁之書院公與諸生講誦使者異之就坐命賦梅詩立成十首晚歸增至百首使者謂集賢公曰令子竒才也年十四從宋進士方山李公某受業下筆輒千言年十六歲從宋進士吾山鄧公某每試庠序必占髙等老師宿儒讀公詞賦制科之文戒其子弟傳習焉弱冠下惟數年人莫見其面經史百家靡不研究伊洛諸儒源委尤所淹貫間至郡城憲使涿郡盧公摯見公儀表及觀所為文大器重之相與倡和留連不遣去薦為憲史力辭不就大德元年母李氏大夫人卒居喪哀毀致疾十一年公生之日集賢公為詞以夀之期待之意甚逺集賢公遷道州路儒學教授公實侍行道為周元公鄊里儒風尤盛公日從諸先生逰學力鋭進境內勝概題藻殆遍集賢公卒居喪毀瘠扶柩以還築室墓側居廬三年然後歸復還郡城江東憲使蒙古公孫澤省親長沙一見大奇之留居舍館為忘年友薦公文學堪居翰苑牒郡府以達朝廷雍郡虞公井齋汲分教于潭每見公所為文為之擊節時其子集為國子助教繕寫成帙親題以寄于是公蹤迹未至京師而聲名已彰著于朝矣皇慶二年州之霞陽山宣慰公墓在焉前有万池水流清㶁仲春之月西偏有泉觱沸其色正緑初出如線凝結漸大如層雲疊翠浮泛水面日出生于西亭午至池心日入沈于東者三日汲而書于𥿄經久而色不變延祐元年李春之月芝草一莖七葉生于舍東桃樹貓犬樂相乳哺緑衆復見作三瑞堂以志其事會下詔設科取士公以治尚書與貢廬陵龍公仁夫為考試官夢神馬見于雲霄書公姓名于大旗上果以天馬賦中苐一明年賜進士及第授承事郎嶽州路同知平江州事四年丁繼母李氏憂六年調太平路蕪湖縣尹疑獄數起纍年不能決公得其情皆為平反豪右非法虐驅其奴公俾之從良貢賦徴發及時民樂趨事民有所為皆曰縣尹聞之得無不可于意否莫不忖度而後行事飛蝗獨不入境嘉禾生野𧖟熟成繭教化大行道不拾遺父老相率上其狀公立止之乃刻石吉祥僧舍行臺憲司交章薦揚泰定元年改承直郎武岡縣尹縣控制溪洞蠻獠雜居俗尚勇好鬬撫字少乖事釁不測公視事踰月赤水大清兩洞聚衆相攻殺鄰境告變官曹恣睢失色計無從出公曰彼亦人耳欲弭其變惟以德化感之吾將躬行撫諭即日單騎從二人徑抵其地至則死傷盈道戰鬪未巳徭人素知公德望及至皆愕然相視棄兵仗羅拜馬首請罪曰我曹非不畏法而擅興兵緣欣其事于縣縣不為直而吏更需求無已繇役橫斂掊克百端使終歲勞苦無以為生情有不堪發憤就死耳不意煩我清官自來罪不可逃公乃宣布德威明示信義歸理其頌其人感激遂安召為國子博士四年考試進士于禮部升國子監丞致和元年授翰林待制奉議大夫兼國史院編修官會賔興承旨學士或有事役或留上京一二同屬皆稱疾不出公領印攝院事日直內廷參決機務凡逺近調發制詔書檄既而改元天曆郊廟建后立儲肆赦之文皆經撰述且條時政數十事實封以聞多推行之二年考大都鄊試𥘉置奎章閣學士院又置藝文監隸焉選清望之官中書擬翰林修撰某為少監文宗不允郡臣莫測其故久之乃問修撰品級對曰六品又問嚮蕪湖歐陽縣尹有廉聲今安在對曰為翰林待制又問待制品級對曰五品曰何為不擬待制而擬修撰耶即取奏目御書歐陽玄可授藝文少監特命左丞相伯顔參政阿榮傳旨公邦命入謝文宗大恱復問公曰汝為廬陵族長沙族耶應對稱旨閲古今書畫或以宸翰賜群臣必命為敘贊至順元年考試進士於禮部奉詔纂修皇朝經世大典明年春書成奏御夏謁告南歸秋升藝文大監檢校書籍事階朝散大夫是日中書奏遷不愜上意者去其大半既而特筆藝文少監歐陽玄可升大監除目今藏近臣家即遣使召還今上即位改中順大夫僉大常禮儀院事元統二年拜翰林直學士中憲大夫知制誥同修國史奉敕編修四朝實録撰太皇太后玉册文賜白金五十兩詔修先師兖國公廟成奉勑撰碑文明年春兼國子祭酒進階中奉大夫召赴中都議事詔侍講學士張起巖撰公先塋碑至元二年得請還家樹碑三年升侍講學士中奉大夫知制誥同修國史遣編修郭嘉檢校張先後各齎內醖趣召撰太皇太后玉册文四年復兼國子祭酒進通奉大夫撰皇后玉册文賜白金五十兩五年足患風痺乞南歸便醫有旨不允修曲阜宣聖廟成奉敕撰碑文初公有子皆早卒復以弟彭年之子逹老為嗣六年二月卒公哭之過哀舊疾復作乞還鄊里携柩返葬近臣以聞上深念之即日遣奎章閣典籖全普庵撒里賜內醖二尊追至臨清勉諭諄切不克辭復還拜翰林學士資善大夫知制誥同修國史命馬札兒台右丞相草詔懇辭去位降旨不允止免朝賀行禮至正改元更張朝政事有不便者集議廷中極言無隱科目之復沮者尤衆公力爭之命脫脫右丞相草詔九月南歸眀年遣使賜白金五十兩金幣表裏假各一內醖二尊復起為翰林學士以疾未行有勑撰故相和寧忠獻王脫脫神道碑三年詔修遼金宋三史遣使賜內醖二尊召為總裁官使者迫促力疾就道至則廟堂問修史之要公曰是猶作室在于聚材擇匠聚材則先當購書擇匠則必遴選史官于是用公言遣使購書增設史官立三史凡例又為便宜數十條俾論撰者有所遽依史官中有悻悻露才議論不公者公不以口舌爭俟其呈藁援筆竄正其論自㝎至于論贊表奏皆公屬筆南郊禮成册文肆赦賜白金百兩居庸關過街塔成奉勑撰碑賜白金五十兩四年奉敕撰成宗御殿碑賜白金五十兩五年知貢舉進翰林學士承旨榮祿大夫知制誥兼修國史初御史大夫也先帖木兒在宿衛上問在廷儒臣乃以公姓名對上曰斯人厯事纍朝制作甚多朕素知之今修三史尤任勞勳汝其諭旨丞相超授爵秩用勸賢能明日大夫出遭丞相于延春閣下傳旨既畢立具奏牘上大恱稱快者再三命左丞相董守簡賜宴史館明日入謝平章納麟謂曰吾久在省臺未見昨日天顔如是之喜也張公起巖先為承旨位第六公所代第四公曰張公吾榜首又先拜命今位次反居末雖曰君命誼有未安乃固讓之及宋史後進上喜書成賜白金百兩金幣表裏假四乞致仕還鄊不允六年御史臺奏除福建閩海道肅政廉訪使行次浙西疾復作因請致仕九年夏遣使賜白金五十兩內醖二尊敕撰故相冀寧忠宣王帖木逹實神道碑文公自休致作南山隱居優遊山水之間謝絶世務日與昆弟故舊觴詠自適有終焉之志十年秋復授承旨遣使賜內醖二尊以老病力辭不獲湖廣省臣知朝廷注意于公屬養疾武昌道宫日往候問勸公北行控辭之文屢上不允又遣使賜內醖二尊趣行適車駕還自開平迎謁行殿復有旨行禮朝賀聚會皆免冬奉敕撰㝎國律撰選格序河決白苑口大興工役勑公撰河平之碑十二年春宣赴延春閣集議肆赦草詔夏乞致仕陳情誠懇乃特授湖廣等處行中書省石丞相致仕賜楮幣萬貫玉帶一條仍給全俸從子遜老授本省檢校官孫佑持授湖廣道宣慰使司照磨俾得便養將行降旨不允依前承旨進階光祿大夫辭不獲十三年上如開平中途賜楮幣萬五千貫尋奉勑撰金字藏經序新建夀元忠國寺碑文十四年知貢舉又充廷試讀卷官至是始知家罹寇禍二兄一弟相繼去世親屬四百指死已大半配冀國夫人謝氏避難郡城亦沒公聞變哀甚上深閔念賜楮幣萬五千貫傳旨慰勞復命遜老以資成庫副使給驛還鄊收聚所餘骨肉遷寓武陵奉敕撰三皇廟新置雅樂記大赦天下草詔時又以病不能出外命就家具藁秋皇太子遣宫臣齎親書經訓二大字內醖二尊以賜上箋稱謝皇太子命世臣解説藏諸端本堂十五年撰皇太子玉册文賜金帛表裏假楮幣萬五千貫十六年上遣近臣賜楮幣萬五千貫撫諭髙句驟草詔十七年春乞致仕欲由蜀還鄊不允大赦天下宣赴內府草詔時久病不能步履丞相傳旨肩輿至延春閣下上問丞相斯人在朝最久製述益富年夀今幾何丞相悉以對賜楮幣二萬五千貫遣執政存勞皇太子千秋節賜楮幣萬貫十二月戊戌薨于崇教里寓舍中書以聞上賻以楮幣二萬五千貫皇太子賻以楮幣五千貫眀年三月壬寅權葬京西宛平縣香山鄊石井村公既喪其長子逹老後請于朝以長兄之孫佑持為孫今授從仕郎侍儀司通事舍人壻卜士駿靖州安撫司經厯教授李崇志有圭齋文集若干卷惟公學于未有科第之先沉潛經傳所親承多故宋耆碩而性度雍容含弘縝密出宰二縣寬仁恭愛處已儉約為政廉平不苛視民如子舉善以勸未嘗笞辱故厯官四十餘年在朝之日居四之三三任成均兩為祭酒六入翰林而三拜承旨修實録大典三史皆大制作屢主文衡兩知貢舉及讀卷官凡宗廟朝廷雄文大册播告萬方國所用制詔多出公手海內名山大川釋老之宮王宫貴人墓隧碑銘得公文詞為榮片文隻字流傳人間咸知貴重文章道德卓然名世引拔善類贊化衛道黼黻治具與有功焉于是中外莫不敬服及大盜之起相國徂征公嘗陳論事宜謂當請命大廟而後行招捕並行則脅從詿誤者可生六部諸司分官從行縻費供給歲月稍久必致公私匱乏嚴禁州縣科斂不公一軍失利他軍不援罪在主將蒙古漢軍民義一體論賞不可分别輕重徐州既平當順流東下耀武楊州遣將分徑軍一支北助河州軍討平淮西一支南助池州軍討平江州規圖湖廣江西道遣使督南陽圖襄陽四川軍圖湖廣督河南軍急攻汝南約諸軍以十月夷黃州賊巢明立賞格正賊降者蠲其罪仍與相副官職土豪能殺賊來降者亦官之大軍所至傳諭脅從者别置一所則賊勢自孤有殺降俘男女者殺士之通曉軍務立加旌擢至于謹烽燧精間諜皆不可缺其後政府求疏時事公首言京師天下根本車駕行幸宜于侍衛親軍中遴選射藝絶倫方略出衆者教練守禦要害陜西四川宜擇德望重臣素習武備深曉民事令其久任責以保障一方不宜數數遷除併力克復山東以制河南兩淮選猛將擇精兵萬餘人出賊不意以取武昌邉官省掾宜擇公平廉謹之人俾専兵事右司選官一員􅌹一巡檢克復州郡核其無籍戶若干今有若干總兵官與監臨上司結罪申報則公經濟之術即是可窺其萬一矣素宦學京師嘗從公于史館晚辱與進尤至謂可以承斯文之遺緒然素之行不伎無能為役佑持請序述公之世家出仕行實上之大常史官以俟采擇謹狀翰林學士承旨榮祿大夫知制誥兼修國史危素狀圭齋文集卷之十六終防里歐陽氏家藏亞中大夫碑跋右元楚國文公玄為翰林直學士時制贈其考成叔為亞中大夫追封渤海郡侯復命侍講學士張起巖為文以表其濳德此碑所由刻也按元史稱楚國文公􅍓官四十餘年在朝之日殆四之三三任成均兩為祭酒六入翰林三拜承旨此碑作于至元元年之冬正順帝即位之三年公為翰林承旨所給以贈封其二代之日也按公瀏陽人瀏陽之族原于防里防里之族本乎安福與宋文忠公同祖故此碑述防里為詳今防里之系有上舍歐陽鏞家藏是本出以見示豫因竊歎曰盛哉歐陽氏文獻之足徴也前有文忠公以文鳴于宋後有楚國公以文闡于元然二公之所以廓大顯庸者皆先世之積纍仁厚所致也按文忠公之考崇公為綿州推官每夜治官書必秉燭而嘆凡囚有可矜者必為之求生此眀刑慎罰之心也楚國之考亞中公為文靖書院山長進職教授能羽翼道學修濂溪龜山二書院經理學田以膳養士類此崇文衛道之功也其積纍仁厚皆如此宜乎生二大儒以清忠懿德輔佐宋元昭一代之文眀流百世之事業非偶然也其所以恩延先世殁贈名爵追封公侯者非人之榮蓋天報之也豫獲拜觀為追原本始綴一言于碑末俾繼是而觀者知二公之所以先揚盛大者有先德為之權輿非淺淺之所能及也詩曰毋念爾祖聿修厥德為歐陽氏之後者朂之賜進士朝議大夫加授大中大夫南京國子祭酒前翰林侍講同修國史兼經筵官安成吳節與儉跋並書跋歐陽文公集後瀏陽歐陽文公出分宜防里防里之族實出安福安福令萬為歐陽始祖一析歐陽而有兖國文忠公顯于宋再析防里而有楚國文公顯于元皆以古文擅名當代天下後世宗焉文公之文追蹤文忠而多或過之揭公傒斯為序者四十四卷宋公景濂為序者二十四卷悉燬于兵不可見矣防里五世宗孫俊質翁收入散亡得十一于千百欲梓行而未果翁之長子銘季子京衛經厯鏞益增輯之而京衛訪求考釘之功尤多蓋公存日嘗歸省防里訪族安成有眷眷故鄊之意宜京衛父子思仰遺德而輯其文之謹如此情亦厚矣兹所編輯凡十六卷將以屬浙江督學憲副劉君仗和重加校正入􅎚欲時序之時自顧晚生末學何敢僣序公文雖使有言亦何敢希揭宋二公之萬一雖二公所序于今卷目不同而其所以推重公文以為必傳者夫豈有異宜仍冠二公之序于篇端可也亰衛以為然因志其故于此將來公之文與文忠公集並傳于世不朽實于是編有賴若然不惟有光于歐陽族且于安成亦有光焉成化庚寅夏五月安成後學彭時謹志跋歐陽文公集後元翰林承旨歐陽文公圭齋文集十五卷附録一卷其宗孫俊質翁藏于燬軼之餘并其長子銘旁求博訪而類入者豫兄廣東參政實壻其門故豫嘗從一造而獲觀焉心竊慕之暨提學來浙翁之從孫永康司訓汶持所録副本謁豫校正未遑也去年考績天官翁之季子京衛經歷鏞來訪敘間闊外首以此集舛訛為慊且託校正益勤明日復携其帙以示比昔觀于其家者間有增焉卷後又得太子少保可齋彭先生所為跋讀之令人益加景仰誼有不容緩者乃于復任退食之暇或秉燭良夜用心魯魚亥豕之中遂捐俸鍥􅎚以廣其傳惟公之文可傳于天下後世者巳詳見于揭宋二公之序彭先生之跋其德業並駕古之賢哲國史有傳復何贅耶姑述其後人惓惓顯揚公共之意且告之曰公之文多至一百餘册至潛溪作序時止存二十四卷今又闕矣其文在天地間當有鬼神為之訶護未必澌盡幸而得之别為輔遺以附卷末可也銘字光器鏞字光樂去公五世汶字伯魯則為七世皆居防里仕與隱俱賢其一門好禮不忝其先云成化七年􅉝卯八月既望晚學安成劉釪書
