  text: 圭齋文集卷之十三宗孫銘鏞編集
  hash: sha256:d9276ec138215037a8c3c6df0982e6f9286a19fb45d39d7a644e81d6425228a2
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_013-1a}
body:
  text: 安成後學劉釪校正詔表册文命相出師詔惟天惟祖宗混一函夏全付眇躬朕承丕基兢兢圖治罔敢逸豫不謂邇者河南反賊乘此承平之久負固弄兵流毒黎庶巳嘗命將討捕屢獲渠魁戮以徇衆餘黨狂猘尚逋嚴誅亦嘗肆宥開以自新怙終不悛致煩師旅太傅中書右丞相脫脫爰自賊發迄今屢請董師致討朕以心膂之親應難其請而期于自效誠懇益堅朕惟事體之大付託實難匪資巨濟之才孰勝戡㝎之任今命脫脫以答刺罕太傅中書右丞相分省于外總督諸道軍馬水陸並進其樞密院御史臺各分官屬從行稟受節制無或有違務要廓清妖沴永底隆平於戲太傅實左右朕躬其行在安靖天下故分總揆之重屬以討賊之勞尚克欽承懋建丕績故兹詔示想宜知悉再命出師詔朕承國家隆平之運四方無虞民不識兵士不講武于兹有年矣不謂邇者河南反賊弄兵構難荼毒蒸黎用是前歲大丞相脫脫請自出征一戰平徐朕惟股肱大臣宜朝夕在朕左右亟命召還分將致討豈謂因循遷玩倐經二年湖廣荆襄雖嘗克復餘賊逋誅負固恣睢致使軍士暴露日久吾民供給困繁愁歎怨嗟徹于朕聽朕不遑寧處乃命脫脫以答刺罕大師中書右丞相分省于外總督諸該軍馬振其威武刻日進兵殄賊安民以釋朕慮凡將士用命者賞不用命者誅賊衆來降者赦旅拒者戮于戲朕與丞相共理天下者也天下多故朕軫其憂相任其勞理所必致汝往欽哉慎厥事事乃有濟圖厥功功乃有成往哉汝諧布朕威德措安吾民朕惟汝賴汝往欽哉進遼史表代右丞相脫脫撰開府儀同三司上柱國録軍國重事中書右丞相監修國史領經筵事臣脫脫言竊惟天文莫驗于機衡人文莫證于簡䇿人主鑒天象之休咎則必察乎機衡之精鑒人事之得失則必考乎簡䇿之信是以二者所掌俱有大史之稱然而天道幽而難知人情顯而易見動靜者吉凶之兆敬怠者興亡之機史臣雖迷前代之設施大意有助時君之鑒戒遼自唐季基于朔方造邦本席于干戈致治能資于黼黻敬天尊祖而出入必祭親仁善鄰而和戰以宜南府治民北府治兵春狩省耕秋狩省斂吏課每嚴于芻牧歲飢屢賜乎田租至若觀市赦罪則吻合六典之規臨軒䇿士則恪尊三歲之制君慕漢髙之為帝托耶律于劉宗相擬鄼侯之為臣更𫐠律以蕭姓享國二百一十有七載政刑日舉品式備具蓋有足尚者焉逮夫子孫失御上下離心驕盈盛而釁隙生殘賊興而根本蹙變強為弱易于反掌吁可畏哉天祚自絶大祐苟延國既丘墟史亦蕪茀耶律儼語多避忌陳大任辭乏精詳五代史係之終篇宋舊史埓諸載記豫奪各循其主傳聞况失其真我世祖皇帝一視同仁深加憫惻嘗敕詞臣撰次三史首及于遼六十餘年歲月因循造物有待臣脫脫誠歡誠􅘨頓首頓首欽惟皇帝陛下如堯稽古而簡寬容衆若舜好問而濬哲冠倫講經兼誦乎祖謨訪治旁求于往牒兹循史事斷自宸衷睿旨下而徴聘行朝士賀而遺逸起于是命臣以右揆領都總裁中書平章政事臣鐵睦爾逹識臣賀惟一翰林學士承旨臣張起巖翰林學士承旨臣歐陽玄翰林侍講學士臣揭傒斯侍御史今集賢侍講學士臣吕思誠為總裁官中書遴選儒臣崇文大監今兵部尚書臣廉惠山凱雅翰林直學士臣王沂祕書著作佐郎臣徐昺翰林監修臣陳繹曽為修史官分選遼史起至正三年四月迄四年二月發故府之櫝藏輯遐方之匭獻搜羅剔抉刪潤研磨紀志表傳備成一代之書臧否是非不迷千載之實臣脫脫等叨承隆寄幸睹成功載宣日月之光華願效涓埃之輔報我朝之論議歸正氣之直則辭之昌遼國之君臣有知善者喜而惡者懼所撰本紀三十卷志三十一卷表若干卷列傳四十五卷各著論贊具存體式隨表以聞上塵天覽無任激切屏營之至謹言進金史表竊惟漢髙帝入關任蕭何而收秦籍唐太宗即祚命魏徴以作隋書蓋曆數歸真主之朝而簡編載前代之事國可滅史不可滅善吾師惡亦吾師矧夫典故之源流章程之沿革弗披往牒曷蓄前聞惟此金源起于海裔以滿萬之衆橫行天下不十年之久􅌹制域中其用兵也如縱燎而乘風其立國也若置郵而傳命及煟興于禮樂乃煥有乎名聲嘗循初而迄終因考功而論德非武元之英略不足以開九帝之業非大㝎之仁政不足以固百年之基天會有吞四海之志而未有一四海之規明昌能成一代之制而亦能壞一代之法海陵無道自取覆敗宣宗輕動曷濟中興逮夫浚郊多壘之秋汝水飛煙之日天人屬望久有在矣君臣守義蓋足取焉我太祖法天啓運聖武皇帝以有名之師而釋奕世之愾以無敵之仁而收兆民之心徑兵搗居庸關北拊其背大軍出𬗋荆口南扼其吭指顧可成于俊功操縱莫窺于廟算懲彼取遼之暴容其涉河以遷太宗英文皇帝席卷河朔而徇地并營囊括趙代而傳檄齊魯滅夏國而蹴秦鞏通宋人以逼河淮睿宗仁聖景襄皇帝冒萬死出饒風長驅平陸戰三峰乘大雪遂定中原大陽出而爝火􅑒正音作而衆樂廢及我世祖聖德神功文武皇帝恢弘至化勞徠遺黎燕地㝎都徹武靈之舊趾遼陽建省撫肅慎之故墟于時張柔歸金史于其先王鶚集金事于其後是以纂修之事見諸敷遺之謀延祐申舉而未遑天曆推行而弗竟恭惟皇帝陛下緝熙聖學紹述先猷當邦家間暇之時治經史討論之務念彼泰和以來之事迹接我聖代初興之歲年太祖受帝號于丙寅先五載而朱鳯應世祖育聖質于乙亥才一歲而黃河清若此真符昭然成命第以變故多而舊史闕耆艾沒而新説訛弗折衷于大朝恐失真于他日于是聖心獨斷盛事力行申命臣等集衆技以責成書佇奏篇以覽近鑒臣等仰承隆委俯竭微勞紬石室之書誠乏司馬遷之作獻金鏡之録願攄張相國之忠謹撰𫐠本紀十九卷志三十九卷表四卷列傳七十三卷目録二卷裝潢成一百三十七帙隨表以聞進宋史表代丞相阿魯圖撰開府儀同三司上柱國録軍國重事中書右丞相監修國史領經筵事提調太醫院廣惠司事臣阿魯圖言竊惟周公念先業之艱難七月之詩是作孔子論前王之文獻二代之禮可言故觀趙氏隆替之由足見皇元混一之績欽惟世祖聖德神功文武皇帝初由宗邸親總大軍龍旗出指于離方羽葆歸登於乾馭􅌨風沐雨詎辭跋履之勞略地攻城咸遵稟授之算揚舲而平江漢卷甲而克襄樊恭行吊伐之師昭受寵綏之寄及夫收圖書于勝國輯甫􅒐于神京拔宋臣而列政塗載宋史而歸祕府然後告成郊廟錫慶臣民推大賚以惟均視一統之無外樞庭偃武既編戡㝎之勳翰苑摛文尋奉纂修之旨事幾有待歲月易遷纍朝每切于繼承多務未遑于制作臣阿魯圖等誠惶誠恐稽首頻首欽惟皇帝陛下恢弘至道紹述丕謨往行前言樂討論于古訓祖宗功德思揚厲于耿光惟我朝大啓基圖彼吳會後歸板籍視金源其未逺細石室以具存及兹纍洽之時成此彌文之典命臣阿魯圗左丞相臣别兒怯不華領事前右丞相臣脫脫為都總裁平章政事臣帖穆尓逹識御史大夫臣惟一翰林學士承旨臣起巗臣玄治書御史臣好文禮部尚書臣沂崇文大監臣宗瑞為總裁官平章政事臣納麟臣伯顔翰林學士承旨臣逹實帖木爾左丞臣守簡參議臣嶽柱臣拜臣陳思謙郎中臣幹欒臣孔思立等協恭董治史官工部侍郎臣斡玉倫徒祕書卿臣泰不華大常簽院臣杜秉彛翰林直學士臣宋褧國子司業臣王思誠臣汪澤民集賢待制臣干文博翰林待制臣張瑾臣貢師道宣文閣鑒書博士臣麥文貴監察御史臣余闕大常博士臣李齊翰林修撰臣鐂文大醫院都事臣賈魯國子助教臣馮福可大廟署令臣陳祖仁西臺御史臣趙中翰林應奉臣王儀臣余貞祕書著作左郎臣談慥翰林編修臣張翥國子助教臣吳當經筵檢討臣危素編劘分局彚稡為書起自東都迄于南渡紀載餘三百載始終才一再期考夫建隆淳化之經營景㝎咸淳之潤色慶曆皇祐以忠厚美風化元豐熙寧以聰明紊憲章馴致紹聖紛紜崇寧荒亂治忽昭陳于方册操存實本于宮庭若乃建炎紹興之圖回乾道淳熙之保又正直用則人存政舉邪佞進則臣辱主憂光寧之朝僅守宗社理度之世日蹙封疆顧乃拘信使以渝盟納畔臣而侵境由權姦之擅命啓事釁以召兵厥後瀛國歸朝吉王航海齊亡而謗王蠋乃存秉節之臣楚盛而諭魯公堪矜守禮之國載惟貞元之會合屬當秦道之熙明衆言淆亂于當時大義昭宣于今日矧先儒性命之説資聖代表章之功先理致而後文辭崇道德而黜功利書法以之而矜式彛倫賴是以匡扶雖微董狐直筆之可稱庶逃司馬寡識而輕信至若論其有弊亦惟斷以至公大概聲容盛而實德衰論建多而成效少且辭之繁簡以事而文之古今以時舊史之傳述既多雜記之搜羅又廣于是參是非而去取權豐約以損增事嚴敢計于疾徐日積亦虞于玩愒臣阿魯圖等黍司當揆實預提綱周詢在局之言靡不究心乃職第述作之才有限而報效之志無窮倘垂清燕之觀尚助緝熙之益曰若帝堯曰若帝舜惟聖心稽古之功監于有夏監于有殷乃臣子告君之道謹撰𫐠本紀四十七卷志一百六十二卷表三十二卷列傳世家二百二十五卷裝潢成四百九十二帙隨表塵獻以聞進經世大典表至順三年三月進堯舜之道載諸典謨文武之政布在方䇿道雖形于上下政無間于精粗特于紀録之間足見彌綸之具是以秦漢有掌故之職唐宋有會要之書于以著當代之設施于以備將來之考索我國家受命龍朔纘休鴻基發政施仁行葦之忠厚世積制禮作樂關雎之風化日興紀綱具舉于朝廷統會未歸于簡牘欽惟欽天統聖至德誠功大文孝皇帝陛下總攬群䇿躬親萬機思祖宗創業之艱難與天地同功于經緯必有鋪張以揭皎日必有術作以藏名山爰命文臣體會要之遺意遍敕宫寺發掌故之舊章倣周禮之六官作皇朝之大典臣某叨承旨喻俾綜纂修物有象而事有源質為本而文為輔百數十年之治迹固大略之僅存千萬億世之宏規在鴻儒之繼作謹繕寫皇朝經世大典八百八十卷目録十二卷公牘一卷纂修通議一卷裝潢成帙隨表以聞伏取裁旨明宗皇帝尊號册文伏以得名得位大君之盛德必兼事亡事存孝子之至誠如一爰徴古訓追上徽稱欽惟皇考皇帝陛下稟純乾之剛居洊震之長當世祖之丕構接武皇之正傳厯試諸難侔蹤虞舜舊勞于外儷迹啇髙當龍躍以在淵變化莫測其量及雷行而育物動靜不違乎時兹豈非順天乎若夫綸言未頒而仁聞之馳滿天下寶璽初受而皇極之建繫人心兹豈非立道乎至于親儒生于汗馬之場輯宗盟于櫜弓之頃兹豈非睿文之教知武之功乎聖莫大于無為孝莫大于善繼玄造固難乎擬議鴻名宜罄乎宣昭矧往事之艱貞增眇躬之怵惕欲旌永慕庶享多儀謹遣攝大尉臣某奉玉册玉寶追上尊號曰明宗順天立道睿文知武大聖皇帝銘友吾銘吾友號吾仁我以友我是須輔雖資友取友在吾人肯友吾視吾可否善不吾若友吾何取尊者友卑貴不吾見乃忘勢分乃友貧賤賤者友貴所貴吾立傲固不可佞豈可習有人于此如澤相麗吾友友吾交盡友誼曽子之學省先吾身吾友為誰必顔其人惟顔與曽尚友千載讀詩讀書吾志吾在敬心齋銘人之有學治心為先心得其理乃聖乃賢賢聖之為其要曰敬清明在躬齋莊中正敬不于貌敬于其心思而儼若上帝汝臨無二無虞惟精惟一飾我天君守而勿失學之終始惟敬靡他身之主宰非心而何克敬在心亦敬亦聖聰明為堯溫恭者舜湯曰日躋姬文緝熙孔嚴三畏顔謹四非孟子養身尤善養氣彼何人哉希之則是朂爾敬心心以銘鐫為此銘者太史氏玄戚友劉君思清以其猶子尚敬謁豫瀏上豫嘉其好古將掖而進道乃為之銘其敬心齋請事斯語余日望之字説散説附楊鑑瑩之字説劉文廷壻工製器皆有隂陽其陽文其隂質古者物善技精故表裏一文質均後世物多窳技售粗故金有滓玉有瑕絲有纇則為文以蓋之若質之素乃為貴耳惟鑑不然其質之美見于面其文之美見于背蓋鑑主于瑩故也瑩自外徹內用能以內燭外鑑之瑩未嘗為文而天下之文無不入焉吾故謂鑑有君子之道以其先質而後文也雖然百煉而金精金精而鑑瑩豈一日之功哉人質亦然所資于學也大矣安成學者楊其姓鑑其名瑩之其字者誠者文節公諸孫也質美近道蔚然有文通春秋三傳學用薦為國子四門館生圭齋歐陽玄書是説以贈之劉叔耔字説安成鐂生名士疇字叔耔從余謁字説夫疇者易治之田之名也耔者既立之苗又壅其根使之梗有據以禦水旱者也子名疇字叔耔尊公為子計者周矣農在四民能衣食其三者工之技啇之利或足以病之先王有厲禁矣惟士與農同體故耕學往往並稱于經士生斯世筋力不匱才智有餘退恃可治之田進挾可用之學傲然無求于穹壤間以聽命于司造世之偉丈夫也然古今則幾人焉進為鹵莾之學以幸一時之遇退為滅裂之耕以幸一歲之秋滔滔者不乏也然豈願吾友效之哉實耕學于一貫堅智力于一勤疇有其地耔有其本國之良士又良農也余為大司成時生之尊公常博為國子助教生以胄子入學日升堂講論余愛生之聲琅琅而論纚纚也今别又數年矣生勉乎哉族子章晦字説宗兄議翁子耀既冠當字謁余字之余字之以章晦又申其説以朂之今天下之有光而能燭者水也火也而二者不同焉水內明外暗火內暗外明然世以水鑑者什一以火照者什九豈非外暗內明者晦養其明假物而明始見外明內暗者明出乎物遇物而明自生君子則之內外交養明晦相資猶水火日用于世而明不匱豈不以是與或曰朱晦翁𥘉授教于屏山鐂氏有木晦于根春華燁敷之言由是號晦菴今子以水火言明晦何居余曰木受氣水而傳氣火者也晦明明晦豈二本哉余生平喜吾歐陽氏之業為儒者甚多章晦聰明好學尤多藝能年則弱冠已見館榖于大家余字以晦蓋望其顯融者奚止如今日所觀者云李觀尚賔字説鈐邑大姓曰西溪之李有名觀而字尚賔者吾宗用綱之甥也聞余訪族至其外舅家逺來即余求尚賔説夫觀一字而有二義以觀示言者九五之主一卦也以觀瞻言者一卦之宗九五也六四一爻去九五最近故其繇曰觀國之光利用賔于王謂其以隂柔而近陽剛有仕而覲于上之象今子名觀而字尚賔可謂知所尚也已然亦何道而臻兹乎故愚嘗謂觀示觀瞻之義猶未足以盡乎觀九五之觀我生上九之觀其生二爻皆有觀省其已之義為六四之君子者盍亦退而觀諸已乎利用賔于王實在我之所自致也周官之法三歲大比考其德行道藝而興其賢者能者鄊老及鄊大夫帥其群吏與其衆以禮賔之獻其書于王則再拜而受之夫德行道藝之三物者士之可自勉者也今科目復矣子勉于學由是而觀國之光利用賔于王孰禦子哉余聞尚賔家多書又多山水之勝嘗作亭名兩山間子既扁之矣用功于幽閴深靚之鄊䇿勳于昭明正大之地六四之觀之占屬之子矣彭以恭説學者以字從名有內外之辨斯不瀆也安成劉仰更致其表弟彭尚謙字以恭者之請求豫為字説以贈夫謙者恭也皆見乎外者也謙之中有物恭之中亦有所主何為有物謙之象曰地中有山卑者藴髙者于其中中有屹然不可犯之意特有之而不居則見乎外者自然而謙也何為有所主主者一而已矣主一之謂敬有確乎不可拔之意能出乎無偽則見乎外者自然而恭也謙也恭也曽謂色取而可乎善乎君之為字也能求諸乎中則容之著乎外者無以尚也謙之失曰輕恭之失曰足怯二者之失求諸中斯可彭氏多文人吾以恭好學不倦故樂以內外之説告之琅溪説吾家自鈐南之防里徙長沙之瀏陽族屬之近者亦徙安成北境上是為早禾田號曰早歐有名俊字用綱者早歐之秀者也嘗扁其讀書之室曰琅溪頃過余上謁余為之説夫王瑩然而澤者琅玕也溪之色幽幽其似之乎琅然而清者珩璜也溪之聲淙淙蓋又近之然君子之比于玉以有德也取于水以有本也豈徒以聲色為尚哉玉有德故用于宗廟朝廷水有本故逹于江河淮海善推其所為而巳吾用綱中有外著聲與實流琅溪云乎哉彬彬説吾宗歐陽氏之甥新澤胡君復字曰于信而名其讀書處曰彬彬因宗人宜翁兄謁余為説夫彬彬之言昔我夫子嘗兩言之其一曰文質彬彬然後君子其一曰假我數年若是我于易則彬彬矣釋者謂彬彬猶班班物相雜而適均之貌大概質不勝文文不勝質二者適均彬彬可想見也獨易之彬彬義安取乎豈非中古之言易者象或過乎質理或過乎文必經聖人之手而後彬彬與雖然愚嘗竊以謂彬彬固貴乎二者之適均特物相雜而易見青黃赤白是為文章則彬彬即文矣君子之論終不以彼而易此也禮器曰甘受和白受采忠信之人可以學禮君子先質而後文之意豈待文勝而後救之與損其有餘而輔其不足在夫善學君子者矣於信妙齡老蒼為學近裏以孝弟貢試于鄊故余樂有以進之齊吾説族弟巽翁號齊吾因字以為號者也兄原功甫為之説曰後天之易巽東南之卦也萬物至是而潔齊焉然東南之為位以一歲言之則孟夏建已之月也以一日言之則日至禺中之時也以人之一生言之則二十以至三十之年也物生齊于孟夏之月人事齊于禺中之時大抵然也士為學弱冠以至壯歲就厥條理則成人之功過半矣宫庭有儀衛焉排比而不亂軍旅有行伍焉整娖而不淆府庫有委積焉屏當而不煩然後為齊也齊之功豈易集哉昔者聖人自序為學之功每十歲一進唯十有五志于學至三十而立獨多其年豈非為學求齊于斯時亦難矣然則齊之道當何先乎曰齊與齋同義又訓一齋主乎敬敬主乎一求之之要無踰敬者或曰巽東南之卦其氣溫厚敬非肅不能何事于巽乎曰不然巽之為言順也順莫大乎禮禮莫大乎敬敬則有序而順有序而順則和生焉巽在其中矣巽翁謝曰吾今而後知齊吾之綱領矣請書其説以贈巽翁一名巽亨博洽而聰敏吾宗之英也竒峯説天地間氣形惟正與竒受其正者為正受其竒者為竒山之有五嶽水之有四瀆正也然五嶽有泰華崚嶒而峭拔四瀆有清濟潛洑而趵躍是正之中有竒者焉人亦然端莊靜重之士偶遇事變未嘗無超邁卓絶之行也特水之竒以衝激而見人之竒以感發而見皆因動而見竒者也惟山之竒在峰雖靜亦竒孤敻之姿騰踔之勢有自然之竒不可以言喻者故士之靜獨隱居而有竒節者往往則之安成鐂君世良著竒峰以為號吾既以靜而竒者况之然劉氏數世皆名儒竊意斯文之福澤將鍾于世良之身所謂因動以見其竒未必見舍于當世竒之體用于是乎備歟明軒説族兄晉翁號曰明軒夫晉之明有離象也説卦離為日為火晉之象君子以自昭明德晉之明以離離之明為日為火君子之自明心乎性乎愚嘗謂日者火之精是日以火為明也然火自日出者也心者性之郛是心之明有性在其中也而性實自心出者也故曰盡其心者知其性也日與火之明心與性之明固無二也雖然日以屢入養其明火以屢改養其明心之養其明也以虗性之養其明也以靜明有所養自不息也明而誠其道在斯乎晉翁兄博學之士也其涉厯世故又久所以養其明而日進者俟余言哉姑以是為明軒説以應其命爾劉恭安説并銘安成鐂君彥恭才氣敏逹學問充裕因其有彥恭之字朋友號之曰恭安彥恭不能辭求一言以自朂豫昔受讀論語子溫而厲一章嘗謂溫而厲一辭若總下兩句所謂威而不猛恭而安者威自厲出不猛有溫在其中此易曉也威而不猛可總于溫厲恭而安何所附屬曰書言恭作肅又有所謂嚴恭嚴也肅也非厲而何且二者非可久之道也持之而安惟溫而厲者能之豈非互有所發明乎恨玄生晚不獲質正于前修彥恭之請姑志臆説于此願與識者啇確之銘曰人生德性本無不備氣質或偏動鮮無愧聖人所養全體渾然貌恭而安語默皆天希聖力行持久持敬澄其氣質懿哉德性恭非勉強安亦從容聖功既熟無適非中大舜命夔臯陳九德變化攸宜君子斯則千五年後橫渠猶疑劉氏之子其殆庶幾圭齋文集卷之十三終
