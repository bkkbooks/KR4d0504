body:
  text: 卷之一賦天馬賦辟雍賦義門賦墨梅賦頌天馬頌卷之二五言古詩舟師諸閘寄詩奉謝都水分監瑞卿監丞送振先宗丈歸祖庭并列小序于左為所性姪題小景三首題東坡怪石七言律詩大明殿早朝試院倡和四首相臺祭祖墓二首祭祖墓于防里用春洲先生韻送李宜忠之教寧州竹澗敗筆郊天禮成應制謝恩日呈同年比干墓接花木壷清過洞庭二首侍宴北省春洲夀慶堂寄許參政謝家建通濟橋夜宿寺前農家贈西明道人瀏江昌山讀鐂養吾虞青城書聽秋居士園池鐂草亭詩冡排律賜經筵官酒次蘇伯修韻謝德盛春萱堂卷之三七言絶句喜門生中狀元四絶試院偶成及寄諸弟試院偶題贈巽齊六首所貴姪梅為所性姪題小景所性姪家藏東坡看竹圖所性姪藏所翁全身戲珠龍漫題四絶折枝海棠萬竿烟雨圖墨竹驢上曉寒圖灞橋風雪圖四首宣和梅雀一行禪師講經顧子虎再題臨川别卷三牛圖萬竿圖宋徽宗菌圖髙宗御書陳搏睡圖雪夜訪戴圖吳西村雪霽圖老蒲萄蒲萄子昻雪鵠墨荔枝劉山立梅圖天師月梅圖寒雀梅榮碧潭全身龍榮朝瑞正龍榮建翁家藏所翁龍夀卿龍頭吾友龍頭山間山水手卷醉翁亭障為南翁作武三思雙陸贈翠璧玸講主贈彭漢節彭雲溪真過髙郵永清觀天瀾柏庭和尚偶題寄山村兄贈歐陽震逺羮戞圖京城雜詠八絶永清寺白巖清暉方池古松四韻昭文携琴圖和寶雲長老徹一清二絶逄江易藝芳干賦芳洲旱禾田歐陽琅溪四絶用歐陽公琅琊為韻春江釣艇圖贈振先歐陽文東山春景歐陽公牡丹詩蒲萄二首分宜趙尹所藏子昻竹石圖卷之四歌耕學問答四時百子圖趙菊山文肅公閲武像山莊所藏東坡畫古木圖簡劉相公歌贈趙祥表禙詠春閨怨和柯博士歌和李溉之舞姬脫鞋吟贈畫公黎仲瑾號碧山子美尋芳圖𬗋微老人大字歌送鐂子簡之武昌學正送聶以道之官武昌示姪躍海朝天龍道吳山大圍山奉敕題明皇馬雜體􅠥之坰古樂府有序漁家傲南詞并序卷之五記道州路重修濂溪書院記貞文書院記袁州路繕修記安成李氏重修安賢義孰記趙忠簡公祠堂記保靚祠堂記安先生祠堂記秀川羅氏祠堂記仰更齊記吳氏觀樂齊記遜齊記談氏蕭山記芳林記卷之六記分宜縣官題名記分宜縣學復田記求志堂記世綵堂記坦明堂記繼善堂記精道堂記讀書堂記聽雨堂記霞外庵記永思庵記臨溪亭記竹西亭記其樂亭記卷之七序防里歐陽氏族譜序彭氏族譜序白石周氏族譜序後林周氏族譜序廬陵中州劉氏族譜序國朝名臣事略序廬陵鐂氏通鑑綱目書法後序忠史序虛籟集序至正條格序奕序考古臆說序鈐岡續志序風雅類編序濳溪後集序易問辨序鈐南道士歐陽賔實詩集序梅邊先生吾汶藁序環山詩藁序卷之八序玉振詩序梅南詩序李宏謨詩序李希說詩序鐂執中詩序蕭同可詩序羅舜美詩序月樓上人詩序鄭以道文集序劉桂隱先生文集序族兄南翁文集序贈李敏求序送虞德修序送鐂文廷之清江録事序送翰林應奉李一初南歸序送鐂仲宣歸隱東山序送鐂仲賔歸安成詩序送伍成均南歸序慶劉一山八十序卷之九神道碑許文正公神道碑趙文敏公神道碑貫酸齊神道碑虞雍公神道碑碑文曲阜重修宣聖廟碑江陵王新廟碑洞淵閣碑張齊郡公先世碑趙忠靖公馬合馬碑卷之十墓碑銘鐂御史墓碑銘周判官墓碑銘鄭府君墓碑銘劉聘君墓碑銘假徴士墓碑銘劉更齊墓碑銘鐂桂隱墓碑銘歐陽山村先生墓碑銘歐陽南谷墓碑銘龍母吳氏墓銘劉梅國墓銘揭文安公墓志銘劉縣尹墓志銘羅録事墓志銘曽秀才墓志銘歐陽竒翁先生墓志銘卷之十一阡表安成鐂氏儒行阡表哀詞蕭同善哀詞傳髙昌偰氏家傳卷之十二經疑問夫子以小器稱管仲而又以如其仁許之何也問孟子以隘與不恭稱夷惠而又以聖人百世之師推之何也書義翕受敷施九德咸事俊又在官百僚師師百工惟時䇿問今天下之事毋泛毋略制曰朕聞聖賢之君之治天下也或恭已無為㦯不遑暇食朕將親覽焉卷之十三詔表冊文命相出師詔再命出師詔進遼史表進金史表進宋史表進經世大典表明宗皇帝尊號冊文銘友吾銘敬心齊銘說楊鍳瑩之字說劉叔耔字說族子章晦字說李觀尚賔字說彭以恭字說琅溪說彬彬說齊吾說竒峰說明軒說鐂恭安說并銘卷之十四題北行録安成劉氏家譜西平李氏族譜衆芳所存彭功逺先世手澤南谷居士自贊像後五馬圖草蟲圖娛拙集白麟溪三大字後太師石丞相畫墨竹御賜石刻千文搨本後跋逺林鐂君墓銘後跋王大年詩帙跋劉士行墓志銘羅孺文族祖澗谷藁歐陽文忠墨蹟跋眉夀二大字跋沁園春跋跋先公與南谷先生卷之十五贊御書九霄贊麟鳯二大字贊潘雲谷墨贊羅漢像贊兖文忠公像贊自贊山村先生像贊秉彛像贊靜修先生像贊默安先生像贊蘇先生像贊蘇郎中像贊曽文辿贊鐂伯常贊題陽明軒太玄子龍疏寶雲禪寺題疏書啓附與所性姪書答族兄南翁書與意山先生書回所中書回所立書回鐂申齊先生書答劉桂隱書答孫春洲書二與張憲使書慰國博喪母書與鐂文廷書與鐂文廷啓回許參政啓祝告文太祖以下祝文眀宗皇帝附廟祝文焚黃祝版焚黃告后土防里祭祖祝文二祭后土文二祭揭侍講文祭子逹老文卷之十六附録神道碑行狀傳像贊文忠跋文廷答圭齊啓許有壬與圭齊啓并詩文廷次圭齊偶題圭齊文集目録終
