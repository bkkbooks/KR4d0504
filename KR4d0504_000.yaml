front:
  text: 歐陽公文集序文辭與政化相為流通上而朝廷下而臣庶皆資之以逹務是故祭饗郊廟則有祠祝播告寰宇則有詔令胙土分茅則有冊命陳師鞠旅則有誓戒諌諍陳情則有章疏紀功耀德則有銘頌吟詠鼓舞則有詩騷所以著其典章之懿叙其聲名之實制其事為之變發其性情之正闔闢化原推拓政本蓋有不疾而速不行而至者矣然必生于光嶽氣完之時通乎天人精微之藴窮乎厯代盛衰之故洞乎萬物榮悴之情核乎鬼神幽明之賾貫乎華夷離令之由舉其大也則極乎天地語其小也則入夫芒秒而後聚其精魄形諸篇翰渢渢乎泱泱乎誠不可尚巳世有與于斯者其惟大司徒楚國歐陽文公乎公諱玄字原功潭之瀏陽人其先家廬陵與文忠公修同出于安福令萬之後公幼岐㠜十歲䏻屬文逮弱冠下帷數年人莫見其面經史百家靡不研究伊洛諸儒源委尤為淹貫遂擢延祐乙卯進士第厯官四十餘年在朝之日殆四之三三任成均而兩為祭酒六入翰林而三拜承㫖蓋當四海混一之時文物方盛纂修實録大典三史皆大制作兩知貢舉及讀卷官凡宗廟朝廷雄文大冊頒示萬方制詔多出公手金繒上尊之賜幾無虗歲海內名山大川釋老之宫王公墓隧之碑得公文辭以為榮片言隻字流傳人間咸知寶愛文學德行卓然名世羽儀斯文黼黻治具公之功為最多君子評公之文意雄而辭贍如黑雲四與雷電恍惚而雨雹颯然交下可怖可愕及其雲散雨止長空萬里一碧如洗可謂竒偉不凡者矣非見道篤而擇理精其䏻致然乎嗚呼自宋逮元三四百年之間文忠公以斯道倡之于其先天下學士翕然而宗之今我文公復倡之于其後天下學士復翕然而宗之雙璧相望照耀兩間何歐陽氏一宗之多賢也不亦盛哉初虞文靖公集助教成均其父井齊先生汲方教授于潭見公文大驚手封一帙寄文靖謂公他日必與之並駕齊驅由是文靖薦公升朝聲譽赫赫然相埒卒符于井齊之言文靖之文巳盛行公薨二十四年其孫佑持持公集二十四卷來謂濂曰先文公之文自擢第以來多至一百餘冊藏于瀏陽里第皆燬于兵此則在燕所録自辛卯至丁酉七年之間作爾間有見于金石者隨附入之子幸為文叙之以傳濂也不敏自丱角時即知誦公之文屢欲褁糧相從而不可得公嘗見濂所著濳溪集不賜鄙夷輒冠以雄文所以期待者甚至第以志念荒落學識迂踈不足副公之望况敢冒昧而序其文哉雖然公文之在霄壤中上則為德星為慶雲下則為朱草為醴泉光景常新而精神無虧亘萬古猶一日序之與否尚何暇論哉佑持字公輔問學精該論議英發無愧于家學者也金華宋濂撰歐陽先生集序歐陽先生集曰詩流者三卷曰鉛中者十卷曰驅煙者十五卷曰强學者十卷曰述直者三卷曰脞語者三卷其門人王師模所輯也所輯者止此作而未已者不止此先生于書無不讀其為文豐蔚而不繁精密而不晦者有典有則可諷可誦無南方啁哳之音無朔土暴悍之氣惜棄在草野不得與典謨訓誥之述作以黼黻皇度然文關于世教斯可傳矣不繫其人之隱顯學貴于知道知道斯可法矣不繫其書之繁簡先生之可傳可法者固有在矣余獨恨不登先生之堂從諸生之後而請益焉因王君請為集叙姑書以識豫嚮慕之意後至元六年冬十有一月朔揭傒斯序圭齊文集目録
