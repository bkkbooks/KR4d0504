front:
  text: 圭齋文集卷之十四宗孫銘鏞編集
  hash: sha256:69e8e1f00b65f4c2c69cdaf1a77b4b8daf64980fb4182c1e0101df1378a48913
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_014-1a}
body:
  text: 安成後學劉釪校正題跋北行録士生休明之代區宇混一意之所之迹迹皆可以逹即其耳目之所覩記搴英攬華託諸翰墨論議之間異時竒聞偉績因是以有徴于來世也廬陵奔元凱挾其吟詠之學卓犖之才其至京師與當代名縉紳劇談雄辨周咨國家之巨麗而升平諸福之物舉集一時于是黃鵠朱鴈之什人爭誦之至于登髙眺逺追懷往哲風晨月夕排遣羈思佳句尤富使之得展所藴于承明著作之地以任揚厲輔張之風豈不大強人意乎三復降嘆題而歸之安成劉氏家譜往年宗人南記自吉州刺史琮遡歐陽亭侯上及神禹下逮安福府君萬不以地之遐僻族之蕃廣必旁搜逺羅不少遺譜成且欲合祠吉州刺史安福府君為不祧之祖集宗人之近者莭春秋展敬祠下其規措不凡用志亦仁矣嘗因堯賔兄序之惜哉南記已矣安成鐂君思清携先世告身六七通求豫識其後且眂余家譜上推其祖之所自出下列各派之所同出徴兩漢南宋以上至陶唐氏得姓以來之祖其意亦由南記也余嘉其其敦睦之誼圖分派别得别生分類遺意故為之書且告之曰子歸為我訪黃石宗人之賢者謝曰其毋廢譜學毋廢祠事庶幾余猶有望焉思清字清隱于豫先世通家又同生癸未今為湘鄊校官家譜則其從弟思復之所圖也西平李氏族譜桓桓西平為唐中興功著鼎彛德𬒳黎蒸當時賢良風雲依乘如渾侍中如馬北平曽幾何世系冷如氷惟西平裔趾美相仍更唐厯宋我元是承設科曰雋試吏曰能守令之選臺閣之登表表愈偉為時名稱子孫千億蟄蟄繩繩天道之報信哉可慿豫書其概寓勸以懲後之來者于焉斯徴衆芳所存安成劉伯仁號芳所後以扁其齋嗟衆芳之所在宜君子之盤桓巖班璘兮有菊畹紛披兮有蘭朝菲菲兮紉佩文采采兮為餐通神明于鼻觀納上清于泥丸却氛穢而益夀志無昏而氣完襲馨德乎先哲託髙風乎歲寒彭功逺先世手澤先參政冀公曩善廬陵彭君士楚先公上庠髙選雖治春秋能通諸經忍見前代時文散逸每屬士楚收拾士楚至則稇載充牣先公暇日亂紬而泛閲之擇其尤者别彚為帙士楚亦能朗誦先世詩義賔至迭論玄兄弟漫不及省先公朂之曰黃册子會有行世時兒曹毋忽也先公薨之七年科舉興玄首擢第追憶先訓泰㝎甲子彭公沖所以詩經擢進士為士楚從弟于是其家學益振他日沖所子功逺來京師袖其曽祖坦軒祖碧野二先生及一門諸父舊業程文蓋沖所題識手澤謁余求一言是蓋吾先公平日之所購求而士楚之所樂誦者彭氏世科之左劵不在兹乎俯仰四十餘年科目廢而煟興興而歘廢今明詔復飾中書舉行玄叨塵從臣𥘉議闕下力贊其成又適秉筆代言播告海內矣會將見程文復盛當世喜而志于斯南谷居士自贊像後士大夫自贊其真例多自抑之辭而生平自知之明往往見于言表如善寫真者引鏡自照以圖其形宜無遺巧玄嘗銘南谷翁墓今觀其寫真自贊表裏純誠殆非丹青之所能狀尤非發潛者之所可模寫也至正二年三月余客瀏東厚田湯氏家齊吾弟携此見過因贅數語于後五馬圖卷中五馬龍者其誰如隔腦脂如行煙外如辨九疑而况南山四十萬匹中欲求流雲飛電之姿嗚呼世無伯樂龍者其誰草蟲圖蜂戀其房兮不可以遊蛛待以網兮為有所求曽不知蛺蝶與草蟲兮飛躍之自由娛拙集娛拙集者吾宗歐陽存中甫之作也其中古樂府諸篇情景俱至追議當時近體詩清新俊逸佳句層見是何吾宗人之多才也題曰娛拙雖謙辭實出見解六朝劣于漢魏得其巧未得其拙也晚唐愧于盛唐亦得其巧未得其拙也繼自今拙日進則詩日進矣何當見存中甫重揚確之白麟溪三大字後右白麟溪三大字前中書右丞相脫脫為浦江鄭大和書溪舊號香嚴在縣東二十八里白麟則大和二十六世祖之名也有惠淮者字季淵實白麟十九世孫由遂安遷溪上易以今名示有先也淮之孫綺至大和凡六世大和從子鑑至某又三世皆同居共財朝廷表為孝義門于乎溪流無終時公特書是以寵之者蓋將朂其門相為悠久哉字畫方毅酷類顔真卿觀者孰不改容不待贊也大師右丞相畫墨竹右墨竹一枝大師右丞相所畫以遺其館客授經郎鄭浚常者也丞相天資明睿知識過人一日得文與可竹譜學之即臻其妙觀其枝葉面嚮柯幹節脈皆與可法而筆意老蒼與近代李薊丘諸人所作逈然不同浚常在相府直言不阿又多引拔善類為長史甚得體相君雅愛重之故受以心畫云御賜石刻千文拓本後題今上皇帝得智永千文命近臣摹勒刻置宣文閣中所拓墨本從官之有文學者則識以宣文閣寶而賜之授經郎浦陽鄭深浚常嘗侍上經筵故預是賜可謂稽古之榮也夫金璧珠寶天下貴賤之所同尚者也國家以旌有德賞有功于所同尚者而不靳焉所以示恩也至于法書名書遇彌文之代時君聖性好古則其所尚有重于金璧珠寶矣於其文學侍從之臣不靳其所獨尚者而賜之所以示異恩也鄭氏浦陽義門九世同㸑朝廷嘗旌之今浚常以斯文又膺是賜愚故願義門之子孫世世寶之上以無忘聖天子好古博雅之志下無以忘乃祖父漕遇之由足以垂久逺矣跋逺林鐂君墓銘後前代士大夫非居憂人不敢以銘墓情非此則奉勑或契友族屬尊行與座主舉主也今常博鐂君文廷制中作逺林劉君墓銘文字簡古又得古式故特表而出之跋王大年詩帙余從王實初先生得其族孫德生詩賦一帙讀之翩翩然渥窪竒駿筯骨甫壯肆其馳騁未有紀極也他日範以王良造父之法納之和鸞大輅之下則才氣老矣三復題而歸其帙跋劉士行墓志銘廬陵處士劉士行父以經學名家曩豫在京師國學進士解子元嘗請序其詩文矣今其弟解觀又以邵菴虞公所為墓銘求豫跋失廬陵九老以忠節文章顯國史書之天下宗之士行讀其書誦其詩論世尚友顧非斯人之徒與抑卲菴之銘至矣豫奚庸贅族祖澗谷先生留藁跋至正壬午十一月豫訪族至鈐岡之防里縣大夫浚儀趙侯尚之因休日時來勞既而又專其館賔羅君孺文與其子璉求鈐岡題名記等作時豫又之別族之安成孺文蹤迹余所至暇日敬問其先世則先輩澗谷先生之從諸孫也先生分教長沙時先尚書淡軒先生居郡泮前廡道同志合友誼彌篤既去官書問不絶咸淳甲戌先冀公以混輔入國學先生時為權院留臨安貽書相慶以為先尚書宣力學校之報內附後猶數有書於是豫與孺文敘先世通家之好聚首數日歡甚將別出先生長沙藁一帙視豫帙中或手自抄或筆更録朱墨如新皆所點校斂袵讀之如從先世與先生遊詠碧湘翠麓間也獨詢其適傳則有如往時湘中之所傳者使人不能不係之以感慨士大夫寓形天地可託者二一曰有文二曰有後二者未必得兼不得巳而去則有文庶無憾也歐陽文忠公墨迹跋玄生平所見兖國文忠公真迹甚多其篇帙大者于同年許安陽家見毗陵胡文恭公墓銘藁百丈輝上人所見州郡名急就章胡氏碑行草急就章皆微涉行楷余家所藏佳者曰與杜祁公蘇明允書及晚年三乞致仕表草皆筆法如一獨祁公書端謹結體頗若蘇氏父子豈非蘇氏感公之至初年倣公之書後充拓自為一家體邪兹來敘族至早禾田歐氏見集古題名碑跋而歐氏在楓樹下者又出與留守學士書見示皆名墨也第書中貺字兩用雖貺况古文通然意若有所謂留守學士者得非田元均乎旅寓乏文字考訂姑識此説以俟博古之君子眉夀二大字跋至正丁酉九月浦陽鄭深浚常由吏部員外郎除浙西憲僉將行自念先為授經郎學在內府密邇青坊常獲侍皇太子硯席今日逺役誼當入辭乃因宫臣以見既詢其南歸之由對曰老母年近八十思便侍養是以逺涉鯨波不敢憚勞也儲君惻然顧左右取近日所書眉夀二大字賜之蓋以髙其親之年庶以永其子之養也敬惟皇太子天迪仁孝之性于兹一事二美備焉仁事親之實孝為仁之本皇太子平日視膳問安盡其愛敬之道于三宫兾以寧君親之心説君親之志以蘄君之夀也一旦推其錫類之盛心成己成物之功仁與孝不可勝用矣眉夀始見于豳風之七月老人眉有毫夀之徴也後屢見於魯頌之閟宮今鄭氏在浙東九世同㸑旌表孝義之家也部使者興化美俗之官深知斯行奉元良心畫以歸心法之正大筆法之端嚴焜耀山川新民觀瞻於是稱豳雅之兕觥效豳人夀君之敬而竭其忠賦魯頌之駘背保魯侯夀母之樂而遂其孝繼今鄭氏忠孝之祚日熾而日昌其兆在此也深屬玄述其實謹書之下方云沁園春玄旦日先君冀郡公作此示勉敬跋于後玄子來前還憶汝今朝初度時是吾家幾世書香閥閲我翁疇昔心地坦夷宅相伊何泛紅老子汝母慈仁有兒如今恨倚門人去和膽為誰丈夫七十何為算三十功名已是遲要經天緯地拓開實用嘲風弄月省可虗詞我亦平生巵言徒費猶酌花向九疑團欒好待老吾泉石留汝鍾彛大德丁未玄賤生之日先公祝之以沁園春玄受而藏之第年以家貧性亦踈散房中惟有一敗篋以繩約之篋中無所有又以紙外護之甚嚴暇日時復展玩明年戊申不幸先公棄捐自是見輒嗚咽殆不忍觀皇慶壬子玄免先公喪又二年矣先公在時所㝎謝氏歲久不克成婚繼妣長沙郡君謀為玄畢婚􅊚而玄方遊湘中繼妣老妮啓玄篋取故衣浣濯輔紉以俟新婚老妮目不知書篋中文字亦為所持去此詞亦在焉玄歸而求之竟失其所遍索十數日無得深自刻責以為不能寶藏先人之訓遂為此生抱恨之大端每至劬勞之日則泣而識之如是二十五年屢嘗籲之先公兾隂相之庶幾復見此詞以無負付囑之意延祐乙卯以來玄僥幸科第厯官中外至元元年乙亥叨恩翰林直學士國子祭酒先公贈翰林直學士亞中大夫輕車都尉追封渤海郡侯尋蒙奎章近臣奏請有旨申勑詞臣製碑以賜玄感激之餘付書還家囑舍弟信翁先白于彌告祭之日諸昆弟子姪咸集中堂姪進老遽前曰昨日偶治故書得先祖手澤一紙蟫食殆半乃夀八翁沁園春也兄弟相視大驚曰此汝叔平時遍求而不得者汝何得此衆取視之果然即付書報玄京師二年丙子夏謁告南歸立碑甫抵舍姪即以詞見遺玄奉詞涕泣如隋珠和璧去而復還自計生平可喜之事未有過此嗚呼異哉詞所謂宅相伊何泛紅老子者謂外大父臨賀府判理齋李公也倚門人去和膽為誰者是歲免先夫人喪也潮風弄月省可虛詞者玄少作頗患多故先公以實學朂之也猶酌簷花向九疑者先公分教舂陵時將之官也雖然玄之至喜者以此詞之失而驟得則先公若有隂相之也他日或可逭伯魯授簡之責也其至懼者則以先公期待之意如彼而玄之踈文謭學所成就若此其何以逭伯符不克負荷之譏乎裝禠既完蹤迹所至必携以自隨三年丁丑以侍講學士召入京戊寅春以二品恩例申請夏五月進贈中奉大夫湖廣等處行中書省參知政事護軍追封冀郡公先妣追封冀郡夫人六月甲申祭禮畢因出此卷再寫善本并致所感云男玄泣血書于賢良坊寓舍跋先公與南谷先生書先冀公與南谷居士未及一識族中宜翁為之求書于安福同知王君習齋未幾習齋去官故未及投留之篋笥考其歲月蓋大德丙午丁未間書則玄為子弟時代先公作者也至正壬午十一月玄敘族至防里俯仰將四十年南谷先公即世皆久兩家子弟覽之愴然圭齋文集卷之十四終
