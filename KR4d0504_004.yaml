front:
  text: 圭齊文集卷之四宗孫銘鏞編集
  hash: sha256:d31241a5d620e1b0bd688f8e3c21f00091a71d9b2ea5dc142b72859e71784b75
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_004-1a}
body:
  text: 安成後學劉釪校正歌耕學問答世間惟有耕與學思量二藝皆無錯耕者榮華得富豪學者羽翼生鱗角耕問學得恁賢纍年纍月在窗前田地拋荒園圃廢日間忘食夜忘眠學者答非容易筆頭雖小驚天地但看王侯將相家盡是當年勤苦至學問耕得恁苦渾身穢汚生泥土冬月之間被雪霜春天曉暮遭風雨耕者答不辭辛鋤頭翻地出黃金但看世間儲積者盡是當年勤苦人耕可憐學可愛思量二藝皆懷大少年辛苦老來間粉壁朱門多自在題四時百子圖藏藁紙弊墨渝實圭齊親筆近見他集亦有恐悮天無一日具四時人無一母生百兒何人筆端巧造化人事天時俱盡之三三兩兩如魚隊日長逰戲䦨干外采蓮攀栁爭後先繞竹觀梅分向背一真未鑿萬象春誰家苑囿誰家人莫是越王泛螟嗣西湖湖上嬉芳塵當時富貴傍觀羡至今宇宙流傳遍爭如茅屋浣花溪竹根雉子無人見摩挲此圖真拊髀多憂正為多男子但須得似仲謀兒人生一䕫已足矣題趙菊山文肅公閲武像浚儀王孫宫錦𫀆紅鞓玉帶㻫琫刀大夫在官盛冠佩州將按旅陳旌旄汝陽眉宇照今古五陵志氣橫江濤世皇大舉獵德網池上不遺丹鳯毛宫門承詔鑄銅馬瀛洲接武乘金鰲駸駸亳社百年久奕奕燕㙜千仞髙題山莊所藏東坡畫古木圖眉山昔日生三蘇一山草木為之枯後來筆端挾春腴却令生意回枯株樹經公筆無老醜天以春工付公手誰云輩行龍眠翁奚必法嗣洋州守山莊劉氏富清玩家有蘇公舊揮翰恍驚濕蘚粘怪石慣見倒根生斷岸涪翁對此煮春茶為公梢上掛長蛇燈窗細讀假山記秀氣終屬眉山家至正壬午十一月余以疾謁告南歸求醫至安成郡北之族中節判繼先劉君相公不逺一舍携尊爼見勞談邊得知為西皋趙學士之壻别次為余徴詩即席赱筆作長句併呈似王守筠溪相公及郭倅明則相公一粲德州沃野濟岱雄池産往往多明公與君初見問爵里塵邉又復知冰翁冰翁西皋古君子擇壻如君信佳士故應邂逅氣味同逺來勞我于桑梓南州初筮發新硎安成名藩駕屏星金鑾學士已頭白玉潤郎君終眼青我嘗三仕厯郡邑聽訟催科紛蝟集䏻令過客情誼洽可見邦侯才力及古􅈦小飲亟分手因君索詩為君夀郡中政清長二和為我寄聲賢太守贈趙祥表禙浚儀公子今幾葉裝池裝潢以為業道傍蒼玦猶一惜池底玄灰信多劫鋪張幸及時黼藻流落還同故書篋魏武子孫曹霸馬唐家宗室滕王蝶淳化石本墨糢糊宣和印章紅摺疊魚鱗已是善排比鷖尾猶况工剪貼但持絶藝動縉紳勿向同儕論譜牒藝文舊監慚潦倒翰墨當時勤涉獵心期知子價千金只恨無才寫蒲箑詠春閨怨東風園林花草香芳閨寂寞春晝長佳人獨守情默默銀床錦被間鴛鴦終朝倦繡拈針指怕向花前聽鶯語喚回舊事千萬端杏臉蛾眉淚如雨玉郎去年辭家時緑楊紅杏嬌春暉緑楊紅杏色如舊悵望玉郎猶未歸一春魚鴈音書絶雪膚消瘦千腸結斷腸猶立幾黃昏那更青山苦啼鴂頃見同舍柯博士所贈趙孝子歌真佳作也客以是卷繼求余言遂用柯韻作一首利津城城上烏飛向城南叢冢呼冢前無人作寒食但有𬒳髮哀號孤行人厭烏見𬒳髮憾欲射烏金僕姑靈烏下告孤兒苦逺訪親骨踰重湖兒生四歲時父别阿㜷去􅭊老婦已孀養貌為兒娶兒思往從父念􅭊共燥濕今年令伯正陳情他日韓湘竟收骨江南五千里山東二百州州州旅寓有南北爾父存亡何處求跣行及河十趾血河風吹沙天栗烈遭逢執友向燕薊指示丘墟瀕海碣身為衛子髮縋鞍鞍忽墮地開親穴君不聞饒娥江頭哭父尸浮黿魚孝子精神貫今古明神降鍳寒空虗博士作歌傳里閭和李溉之舞姬脫鞋吟宫袍繡蹙金花綺紅綃緊襯雙鸞尾盈盈幔服舞腰輕綵雲飛處香風起藕絲掣斷春雲鬆瑞蓮雙結並頭紅夭夭曲曲玉彎卷翠鳬飛去天欲軟玉階秀茁蘭笋長瓊砂迸出蘆芽淺徘徊困倚東風力濕砌香雲墜無跡無限嬌羞不自持君王喚起扶花立贈畫工黎仲瑾號碧山吾聞萇弘之忠裂金石精氣千年化為碧人生賴有方寸妙萬變神竒從此出又聞西方𣑽僧名法能能令兩眼碧色晶熒熒有時時後灑墨汁纎穠踈秀皆成形碧山畫神欲入品表裏神光碧瞳炯浮嵐曖翠山不受盡付晴窗落泓影碧山學士今為誰玉堂茒舍各有時煩君添我山下屋更看白雲相陸離題子美尋芳圖吾年三歲聲吾伊慈親膝下教杜詩如今蟫蠧三十載夢寐欲見終無期誰家山水空翠濕倣佛相逢拾遺揖金馬門前封事稀碧雞坊裏尋春急野桃官栁春連連水流山店依平川眉尖不著杜䳌恨壷中風月開元天君乘蹇驢步如棘後有驊騮追不得茅屋西風五百年虗度人問幾春色題𬗋微老人大字歌𬗋微老人射生手挽強竟取黃金斗驃騎營中拜驍勇鳯凰池上稱耆舊時平腕力無所施斤力猶能學顔柳縱橫戎略結構休殺活兵機屈伸肘山莊劉氏得最多當日襜䄖駐應久髙樓大扁曰明逺况有愛山并尚友我來後公五十年主人酌我樓中酒平田野水鳬鴈集重岡復嶺蛟龍赱登髙欲賦乏佳興忽覩台躔照窗牗家藏有此希世珍取酒當為主人夀想當洗硯韜筆時羽笑生風劍龍吼焉知今人正傳玩名與麒麟同不朽嶠南鼪鼯十五秋老將如今安得有鄂公九原如可作養夀清啇為公奏送劉子簡之武昌學正劉侯兄弟競秀發仲氏卓犖殊可人訓徒名門示髙爽棖臬中實皆輪囷未誇于氏容駟馬豈羡楊侯朱十輪荆才非止箘簵楛燕璞迭見玗琪珣伯留天庠不可去仲始捧檄歸娛親滔滔南紀盛藩翰文武化行初未泯世皇八駿所厯處扈蹕至今疑有神盤中首蓿不在飽座上芷蘭俱可紉吁嗟劉郎慎勿浪彈鋏自古江漢無窮鱗送聶以道之官武昌天曆聖人在海南南省大臣理鹽策聶君老儒幕下郎日飲清氷鬚髮白是時潜邸具知聞召見殷勤親賜食明年翠華望北還復過湖南駐清蹕試舉郎君問宣閫閫臣上前盛稱𫐠省郎歲滿調江華回瞻馬首天南北生平固自結主知下邑惟思躬吏責志心懇惻撫􅑏婺矛牙宿蠧堆求剔纎悉甘棠遺愛十二碑其中一碑磨崱屴豪民􅐁水三百年力䏻挽注蘇涸轍爾來㳂牒至京師廟堂除吏餘八百重瞳覽奏記姓名呼之以字顧臣列若云賈誼久不見猶喜真卿獨先識秉鈞敷對此掄材司讞無如武昌劇天顔沈思霽色回姑惟首肯心未擇逺臣客舍擁敗氊誰知京兆牛衣泣青天晝有風雲哮猛虎獰蛟向山澤華蕚樓頭賞花葑臨菑門下分竽瑟念昔部使舉政最往往當途多抹揊秪緣早忤耳目司豈復虗蒙股肱力人生榮進自有期簡在淵衷非易得小儒作歌屬山甫愛莫助之增太息示姪吾宗孫子多好學爭持卷軸求余詩嗟豫膏馥有幾許况復老懶惟其時子年弱冠氣方鋭立志要與青雲期冀馬生駒汗血器越女墮地瓊瑶姿固知美質故應爾所貴論道隆師資牧之涉世晚自悮冬至作詩鐫阿宜初陽萌動慎培養萬木一本含春滋題曜海朝天龍玄雲霮䨴海波立神龍挺水趍天潢畫師題筆聣八極意與元氣爭毫芒玉京仙聖驂翶翔雜騎麒麟與鳯凰龍拖雲氣歸洞府海日杲杲天中央道吳山道吳山頭目龍卧疊嶂重岡深𬗋邏靈湫瀑布千丈長古寺神杉十圍大崇祠坎坎風雨來樵徑丁丁鴻鴈過郡人夜望北斗魁下有突兀青蓮座大圍山大圍山髙髙幾許絶頂嵯峨戴林塢石間花開自夏春地爐僧擁無寒暑清流白鷴滌毛距緑樹黃熊引筯膂山腰日午嬰兒啼知有雷公出行雨奉敕題明皇馬明皇八駿爭馳道知是開元是天寶當時一顧傾國姿萬里君王蜀中老奎章閣下文書靜衮衣髙拱唐虞盛此圖一出非偶然要與明時作龜鏡雜體􅠥之坰古樂府有序至正壬午皇帝有敕賜故和寧忠憲王勳德碑命翰林學士玄為文碑立􅠥門近郊戴螭履龜龜有異瑞首如繪足如玉搢紳賦詩紀異玄作􅠥之坰一首􅠥之坰穹碑銘銘維何誄和寧維和寧勳揚庭臣玄詞帝者荓倕琢石石效靈靈何居傴句形顒之文旋瀅濙絡鼻口逹厥䫤匹之晳色晶熒馬䣛武騵腹駉嗟彼蔡象應靈國守器列前廷王之忠格髙冥珉之瑞天使令發幽光炳丹青王有子承德馨决大疑陳大經疇五福詒千齡作傴句寶龜名漁家傲南詞并序余讀歐公李大尉席上作十二月漁家傲鼓子詞王荆公亟稱賞之心服其盛麗生平思倣佛一言不可得近年竊官于朝久客輦下每欲倣此作十二闋以道京師兩城人物之富四時節令之華他日歸農或可資閒暇也至順壬申二月玄修大典既畢經營南歸屬春雪連日無事出門晚寒附火私念及此夜漏數刻腹藁具成枕上不寐稍諧叶之明日筆之于簡雖乏工緻然數歲之中耳目之所聞見情性之所感發者無不􅕍括概見于斯至于國家之典故乘輿之興居與夫盛代之服食器用神京之風俗方言以及四方賓客宦遊之况味山林之士未嘗至京師者欲有所考焉此亦可見其大略矣正月都城寒料峭除非上苑春光到元日班行相見了朝回早闕前褫帕歡相抱漢女姝娥金搭腦國人姬侍金貂帽繡轂雕鞍來往閙間馳驟拜年直過燒燈後二月都城春動野引龍灰向銀床畫士女城西爭買架看馳馬官家迎佛官蘭若水暖天鵝紛欲下鷹房奏獵催車駕却道海青逢燕怕才過社柳林飛放相將罷三月都城逰賞競宫墻官栁青相映十一門頭車馬並清明近豪家寒具金盤飣墦祭留連芳草徑歸來夙送梨花信向晚輕寒添酒病春煙瞑深深院落秋千逈四月都城氷碗凍含桃初薦瑛盤貢南寺新開羅漢洞伊蒲供楊花滿院鶯聲弄歲幸上京車駕動近臣凖備鑾輿從建德門前飛玉鞚爭持送葡萄馬乳歸銀甕五月都城猶衣夾端陽蒲酒新開臘月傍西山青一搯荷花夾西湖近歲過苕霅血色金羅輕汗搨宫中畫扇傅油法雪腕綵絲紅玉甲添香鴨凉糕時候秋生榻六月都城偏晝永轆轤聲動浮瓜井海上紅樓欹扇影河朔飲碧蓮花肺槐芽瀋緑鬢親王初守省乘輿去後嚴巡警大液池心波萬頃間芳景掃宫人户撈漁艇七月都城爭乞巧荷花旖旎新棚笟龍䄂嬌民兒女狡偏相攪穿針月下濃粧佼碧玉蓮房和柄拗晡時飲酒醒時卯淋罷麻秸秋雨飽新凉稍夜燈呌買雞頭炒八月都城新過鴈西風偏解驚遊宦十載辭家衣線綻清宵半家家搗練砧聲亂等待中秋明月玩客中只作家中看秋草墻頭螢火爛踈鐘斷中心臺畔流河漢九月都城秋日亢馬頭白露迎朝爽曽上西山觀蒼莾川原廣千林紅葉同春賞一本黃花金十繦富家菊譜籖銀榜龍虎臺前駝鼓響擎仙掌千官瓜果迎鸞仗十月都人家百蓄霜松雪韭氷蘆蔔暖炕煤爐香豆熟燔獐鹿髙昌家賽羊頭福貂䄂豹祛銀鼠襮美人來往氊車續花户油窗通曉旭回寒燠梅花一夜開金屋十一月都人居暖閣吳中雪紙明如堊錦帳豪家深夜酌金雞喔東家撤雪西家噱纎指柔長宫線弱陽回九九官氷鑿盡道今冬氷不薄都人樂官家喜愛新年朔十二月都人供暖箑宫中障面霜風獵甲弟藏鈎環侍妾紅䄂笑歌聲送金蕉葉倦客玉堂寒正怯曉洮金井冰生鬛凍合竈瓢餳一楪吳霜鑷換年懶寫冝春帖圭齊文集卷之四終
