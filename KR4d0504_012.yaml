front:
  text: 圭齊文集卷之十二宗孫銘鏞編集
  hash: sha256:524908985edb4e3c9f10e6f5fe13d8ee91fae444637b3eca171055a06b4c068d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4d0504_SBCK_012-1a}
body:
  text: 安成後學劉釬校正經疑問夫子以小器稱管仲而又以如其仁許之何也對聖人之用人有以德之體言者有以德之用言者不可以一概觀也夫以德之全體而言則天之所以賦于人人之所以得于天者其體甚大也惟聖人為能踐形下聖人幾等而以德之全體論之烏得不少為之貶哉故喻之以器器者如物之所受淺深限量自有不可得而誣者也若夫有以德之用言者則不然夫德非徒貴乎足已以其有及物之功也而王伯之㑹世變之來有人于此乃能明大義以安斯民聖人即是論之安得不深許之哉故稱之曰仁仁者之用莫大于愛物也迹其惠之在民心功之在天下亦安得而泯之哉昔夫子之論管仲或曰小器或曰如其仁其體用之殊乎夫仁之一字夫子未嘗輕以許人是以顔冉之流工夫造詣之髙下夫子于言仁之際若有分寸較于其間獨于管仲則曰如其仁如其仁既許而又不一許之豈有他哉蓋自姬轍既東楚氛浸盛生民之擾擾紛紛者未有紀極也仲也出而相恆公合諸侯匡天下不以兵車之力焉其仁之及物為何如耶求之當時未見仲比也至於其器之易盈不䏻使已無三歸之僣公無多嬖之失齊政旋踵而衰則器之所受不過如是而止使其擴而充之以至于一初之全體則可以拓聖賢之業載宇宙之重惜乎非重所䏻及也蓋必至是然後為大器之體假焉仲之為小不亦宜乎然則聖人之論何往而非公乎問孟子以隘與不恭稱夷惠而又以聖人百世之師推之何也對人有絶世之行可以為聖矣而未至于化也故不䏻無一偏之弊焉夫聖而至于化則世無得而名有聖人之一事而至其極焉始有絶世之名矣由其有絶世之名是以清者一于清而未必和和者一于和而未必清于是不廣之意擴不恭之氣象生焉雖不害其為聖人也而君子至公之論豈得以此廢彼哉孟子之稱夷惠或曰隘與不恭或以聖人百世之師推之非異論也自今觀之讓國而逃諌伐而餓與夫不羞汚君不卑小官聞其風者頑廉而懦立薄敦而鄙寬則百世一夷惠而已誠聖人也然而朝冠塗炭之偏袒裼我側之汚不幾疾惡之已甚同流之無别乎大抵清不期于隘和不期于不恭特其不䏻化而馴致其弊焉彼夷惠亦不自知其然也由是觀之負絶世之名者夷惠之得為聖人以此也其不得為大而化之之聖人亦以此也若吾孔子則不然絶孺悲拒陽貨見小君于衛國應佛肸于中牟時乎清時乎和無適而不可也夷惠能之乎故不觀孔子無以見夷惠雖然亦豈可以是遽少夷惠哉孟子曰伯夷聖之清下惠聖之和孔子聖之時然則二子亦孔子之徒歟書義翕受敷施九德咸事俊又在官百僚師師百工惟時自古者以成德觀人而人才治效之盛為不可及也夫成德者君子自然之德然君子有是德而不䏻以是德自見于事功惟古之聖人有以知之而每以為觀人之法焉凡有司百執事之臣莫不由是而取材故嘉謨之入告庶績之咸熙無往而非是德之形著也人才治效之盛無越于帝舜之朝此其故歟書曰云云所謂九德者非臯陶所謂人之有九德歟訓書者以為成德之自然非以彼濟此之謂也自帝世以知人為難而臯陶陳九德之目或養直而溫和或簡易而廉隅或果毅以為擾或塞實以為强其他或六或三不一槩也有六德而嚴祗者則錫之以有邦有三德而宣明者則任之以有家觀人之法拳拳于九德焉生斯世者不患其無位也而患其不䏻有是德于是莫不精白以承休勤敏以趍事者以聖人䏻翕合而受之敷布而施之也人見其俊乂在官也而不知九德之時措也故夫九官相遜兹非百僚師師之興起乎十有二牧惟時亮天工兹非百工惟時之則倣乎所以相遜所以亮天工者非九德之君子孰䏻與于斯由是觀之九德咸事之一語其虞朝觀人之法得人之本歟後世惟般周之宅俊灼俊意為近之故其人才之盛亦髣佛有虞之世秦漢而降急于功利權謀之近效而用區區勝德之小才于是九德之目僅存于書耳或曰虞庭君子之多而舜猶以知人為難者蓋慮靜言庸違之在朝讒說殄行之震驚朕師者未盡杜絶聖人觀人之法不可一日廢也然吾觀百僚師師百工惟時之後則君子多而不仁逺矣故又曰何畏乎巧言令色孔仁䇿問今天下之事有可言者多矣姑舉其大者言之冗官之未汰銓選之未精殿最之未明法律之未㝎此四者方今之急務朝廷之所欲聞而士君子所當講者其參酌古今以對母泛母略對洪惟盛時設茂科䇿多士而開其直述之門執事典文衡詢承學而試以時務之大夫天下之事誠多矣至于大而可言者亦今世之所囁嚅者也自士太夫間以道故常為練事以言要切為干時是以至論罕聞今執事不循故常不貴泛略舉急務以詢諸人豈非盛時開直述之門而得為不諱之問然而所謂直述者非以其文朴野而以其言之切直也既以不諱問宜以直𫐠對昔夫子以林放為大哉問非大其問以其知本也事不知本多言何禆愚請言事之本矣明問有曰云云是四者方今所欲聞也愚謂非特方今之所欲聞乃方今之巳行者也其間行之弗竟守之弗一或者未究其本乎如冗官之汰大德之初嘗舉行之中書以打减置局而董之以平章某公或議某司當併某司則創某司以兼領之議者或創而罷者尋復矣辛亥更化渙發德音减遙授之官改升創設者日議併罷乃併通政于兵部武備等院皆復舊制京畿寺監罷者非一是則冗官汰矣然而輿圖之廣郡邑之衆旁蹊曲徑之捷出者未悉汰也銓選之精則自混一以來立省選部選之法為二别子弟承襲承繼承䕃之例為三設吏員譯學儒業軍功出身之科為四是則銓選精矣然而氏族貴賤之未别歲月賢否之同淹或未暇精也殿最之明則自大德皇慶以來定十三條之章法或遣宣撫巡觀或命御史遍厯是則非不明也然而各處廉能五人之薦未見即用也三考黜陟之法未見可久也法律之定則非無至元新格也非無省部之編例也然而掾史一時之議擬而通行者盡合于至元之法意乎廣平何相之撰擬而未進者竟䏻為大德之成書乎由是觀之四者非不知也非不行也愚請論其本焉其一曰汰冗官之本在于减間散之俸以厚正官塞僥幸之路以清正選今正官之俸甚薄而散秩之祿尚多昔劉景升有大牛芻豆數倍而負任不及常畜曹操以之享士戒冗食也况方以厯俸為出身减祿俸之無名則出身有限矣若僥幸之門斯又正選之大患也古者判行使之置損外同之設未必非有所循而為是名以處之而漢之爛胄晋之續貂實濫觴于兹誠能如漢文欲用嗇夫而張釋之終以為不可家人濫求郎官而明帝終不以為私恩則冗者可汰矣其二曰精銓選之本在于嚴族屬之分以尊吾國人略歲月之考以拔其才用今之女真河西眀有著令而自混色目北庭族屬鄰于近似而均視蒙古乘堅驅良並列通顯蓋我國人天性渾厚不自標榜愚恐數百年之後求麟趾之公姓不可復别異矣欲還淳古之風去傑黠之習則必如貞觀之于崔盧氏族命近臣編之使其派系分明不得揉進可也至于歲月之考能否同滯此可畜常調不可以待賢才誠能核名實以甄異能使録録庸吏不得含糊淟涊苟資厯求序遷則當如崔祐甫除官八百而不拘常資寇萊公却例用新進而號得士則銓選可精矣其三曰明殿最之本在于擇才明之監司絶殿序之汚吏夫貨來之徒玩法而殘民者也豈可復為民之父母乎三年之殿邉逺之任未是悛也孟子曰不祥之實蔽賢者當之身為方嶽而見善不舉豈得復為人之耳目乎絶汙吏則願如唐太宗之于党仁弘苟犯贓賄雖至親幸難以滅公責監司則願如齊宣王之封即墨而烹阿大夫晋文公之誅曹而數其不用僖負羈則監司必舉汚吏必除最者非假請托殿者不可僥幸矣其四曰㝎法律之本在于酌古今以成法書優祿秩以選法吏今法書無一㝎法吏無優選推讞混于常流條令裒于書肆官不遍覩法無定科䡖重高下逢其喜怒出入比附係其愛憎無成書則近于罔民無優秩則昧于勸善昔者子産鑄刑書雖曰叔向笑之而鄭以治以䏻止辟也于㝎國為廷尉以民無冤而至三公近代錢若水以同州推官清直而擢樞副前以示勸也如是則法書必作法吏必優刑自平允律自精熟矣四者之本愚既已略言之其目之備更僕未可終也雖然四者之本所以行之者一也一者何也信而巳方今天下急務所可言者孰有大于信之一字乎書曰令出惟行商鞅之伯術亦以示信為先令而不信則冗官何由汰銓選何由精殿最何由明法律何由定乎愚故曰所以行之者信而巳明問有曰宜參酌古今以對母泛母略嗟夫執事以急務為問愚敢以泛略為對乎然四者之有信猶水木之有本源也故敢以為終篇獻執事其思之制曰朕聞聖賢之君之治天下也或恭己無為或不遑暇食或寬化恭儉或力于為善其所以致治雖殊及乎民安物阜風淳俗美刑辟措而鮮用頌聲作于田里制禮作樂翕然大和而麟鳯龜龍嘉禾朱草甘露醴泉諸福之物莫不畢至雖帝王之美不徒在是亦其氣之應也舜文之德化尚矣若漢之文帝唐之太宗猶䏻致治如彼况薄漢唐而不居者乎今天下雖久寧謐户口雖甚蕃滋而稼穡或傷於水旱細民或致于阻飢未能家給人足時猶仰濟縣官豈行仁義有未盡效邪子大夫明古以識今知常而通變母迂濶于事情毋乖戾于典則明以對朕朕將親覽焉臣對臣聞有志者事竟成人主之致治莫先於立志故善觀人主之治者先觀其志夫人主以䏻致之資操可致之勢所圖無不獲所欲無不成以求乎天而天應之以求乎人而人從之所以然者以其志之先定也其或致理之效偶有未備天人之間偶有未和則當守之以專逹之以彊以俟夫悠久之效不可以疑二阻之也臣草茅賤士何敢上揆淵衷然以臣切觀陛下之所為真近古以來大有為之君也陛下曩在東宫仁孝之資英毅之略聞於天下也久矣既而徴四方書以考古今飛龍之祕大召宿儒詢問要道臨御之後不趂聲色不事逰畋凡耳目之娛營繕之事秋毫不經于心惟經籍史傳日接于前于是大興儒科黼黻至治祖宗以來百餘年之曠典一旦舉而行之遂使臣之淺陋亦獲叨奉大對于明時雖然臣之望陛下者以陛下為有大志而陛下之䇿臣者亦適有以發臣之愚臣伏讀聖䇿曰朕聞聖賢之君之治天下也或恭已無為或不遑暇食或寬仁恭儉或力于為善其所以致治雖殊及乎民安物阜風俗淳美刑辟措而鮮用頌聲作于田里制禮作樂翕然大和而麟鳯龜龍嘉禾朱草甘露醴泉諸福之物莫不畢至雖帝王之美不徒在是亦其氣之應也舜文之德化尚矣若漢之文帝唐之太宗猶能致治如彼况薄漢唐而不居者乎嗟夫薄漢唐一語此乃聖志之發見也陛下此志可與四三王可與六五帝矣其曰或恭已無為或不遑暇食或寬仁恭儉或力于為善臣愚以謂此未可以觀致治之殊當有以驗立志之同也古人有言曰始于憂勤終于逸樂若以恭已無為異乎不遑暇食則隆古之恭已無為者莫舜若也然而一日二日萬幾舜何不少自逸豫乎若以恭儉寬仁異乎力于為善則近代之恭儉寬仁者莫漢文若也然而拊髀思賢夜半前席漢文何不為是玄默乎由是觀之未有不自憂勤始者自憂勤始志之同也陛下既薄漢唐臣不復膚引漢唐之事請以舜文終焉舜文之道布在典䇿陛下既慕舜文亦法其所為而巳矣如欲民安而物阜風淳而俗美則當思夫利用厚生之何急也惇典敷教之何先也由庚魚麗何自而多也關雎麟趾何從而厚也陛下能法舜文即舜文矣如欲刑辟措而鮮用頌聲作于田里則當求如臯陶者命之明刑有如虞芮者俾之息訟九歌可使勿壞也大雅可使無廢也陛下能法舜文即舜文矣如欲制禮作樂翕然太和則當求如伯夷后䕫周公者命之制作于其間六典之制或尚可講也九韶之音或尚可學也陛下能法舜文亦舜文矣至如麟鳯龜龍諸福之物莫不畢至聖䇿有曰亦其氣之應也臣愚以謂知氣則知志矣聖人志氣清明若神一動則天地隨之諸福之物皆自聖人方寸中來非自外至也中庸曰致中和天地位焉萬物育焉蓋吾之氣順則天地萬物之氣亦順吾之氣和則天地萬物之氣亦和天地之氣見于萬物同一和順則百獸自舞于舜之庭鳯凰自鳴于文之岐矣又何祥瑞之足羡哉臣伏讀聖䇿曰今天下雖久寧謐戶口雖甚蕃滋而稼穡或傷于水旱細民或致于阻飢未能家給人足時猶仰濟縣官豈行仁義猶未盡效耶臣愚以謂此天以堅陛下之志也古人有言曰天心仁愛人君若曰稼穡或傷于水旱則舜之所謂洚水警豫者猶有甚于今之傷稼者也若曰黎民或致于阻飢則文王所謂小人怨汝詈汝者猶有危于今日之阻飢者也顧二聖人之所以弭灾恤患者罔遊罔淫皇自敬德之外無聞焉陛下既法舜文詎知天之所以啓舜文者不以啓今日耶陛下以敬天為忠則水旱可變為豐穰陛下以恤民為志則阻飢可變為足食在方寸一轉移之間耳若諉之曰豈行仁義而未盡效耶臣愚竊以為未然夫仁義之效如炊之必熟種之必生行仁義而未至者有矣未有行仁義不效者也陛下如以悠久待之或曰聖問如此而臣輒以為可以四三王可以六五帝者何自而知之蓋因其已行者知之也其未行者擴而充之斯無難蓋仁義之積禮樂必興彼漢唐之治如身衣弋綈一臺惜費以致海內殷富與夫斗米三錢外戶不閉自三代而下亦可謂盛矣然賈生勸漢文以禮樂而辭曰未遑祖孝孫杜淹勸太宗以禮樂而曰治之隆替不繫于此臣以是知二君于仁義之效若有所不知也今陛下鋭情儒科日議禮樂而拳拳于仁義之二字視漢唐何啻相千萬耶此志所充宜其儷美于五三盛時也大概國家之治當先論其根本不可責效于目前古之聖賢之君未嘗不憂勤于其始逸樂于其終灾異于其先祥瑞于其後今日之不遑暇食力于為善他日之恭己無為恭儉寬仁也今日之水旱傷稼黎民阻飢他日之麟鳯龜龍嘉禾朱草也若夫備禦之不可無術救荒之不可無政求芻之不可不擇一賢相事耳奚以多言為臣又讀聖䇿曰子大夫明古以識今知常而通變母迂闊于事情母乖戾于典則明以對朕朕將親覽焉臣愚以謂事有古今志無古今事有通變志無通變聖人之志與天地之正氣相通志定于此氣應于彼有理之必然者倘論水旱而牽合于夏侯生輩洪範五事之說則鄰于迂闊矣論民飢用乏而附㑹于權萬紀等建利之謀則流于乖矣矣臣非不知實所不敢臣之拳拳者惟曰有志者事竟成陛下留意焉國家幸甚天下幸甚臣謹對圭齊文集卷之十二終
